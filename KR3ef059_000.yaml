body:
  text: 緒言漢方中分為三派一信醫聖張仲景之遺訓者為古方學派一奉晉唐宋元明清之醫術者為後世學派一為不分古方及後世者為折衷學派余係深信古方派故本書之內容亦大半以張仲景之傷寒論金匱要略為基礎而所引用各家之論說治驗悉以演繹擴充仲景之所論為限余所宗古方派中尾臺榕堂氏所著之類聚方廣義題言中云張仲景為千古用方之鼻祖然其方則咸出於三代聖賢之精製張氏只集其大成而已其方簡明嚴正條理井然寬猛之治和攻之法無不周悉賅備若能精究其意推廣其義則萬病之治易如反掌矣尾臺榕堂氏又云如師之方法為中國古代文明之精華始終一貫條理俱備故其排斥後世派曰世醫動輒以古方稀少難以應付眾病於是有掇拾千金外臺宋明諸家之方者曰非如是則諸病不能悉愈殊不知諸家異趣技術不同故其立論製方亦各不同而摭拾雜亂則其方法不能統一而治療無規則矣夫疾病之多其變無窮古來處方莫善於張氏實為萬世典型豈可與後世諸家私意杜撰之方同日而語哉故研究張氏方者能自幼而壯而老造次顛沛必在於斯猶如身在當時親受訓誨則自然術精技熟遇病開方靈機活動意之所向無不如法操縱自在左右逢源病雖萬殊又何難應之有此即所謂以簡御繁之法也陳實功曰方不在多心契則靈證不難認意會則明可謂至言矣又謂如後世學派者不過漫然拾集諸家之方劑其間能統一連絡者頗少且其方劑之組成多不務本而逐末故方劑雖因是而增多後學者反惑於取捨不能觸類旁通雖然欲求得輕粉等之驅梅藥不得不俟於後世但可暫置不問必須先就古方醫術研究有得行有餘力然後及於後世諸方可也本書網羅諸家之論說治驗是以證明仲景之說為主以便讀者研究非漫然濫用者也揭諸家及余之治驗理由者非欲自表襮也讀者諒之本書立論多本余之經驗事實為基礎益以理論說明之理論中或不免謬誤而事實則斷不虛偽若以理論之錯誤而并沒其事實大不可也總論中西醫學之比較概論不問何種學術理論與事實欲其相應而無毫釐之差如治數學者只需專為理論之研究而已足無所用其經驗之知識至於醫學則非單純之理論所得而解決之故不得不求於經驗的結合若理論脫離經驗的事實直可謂之非真正之理論故當以人體經驗的事實為先而理論為後矣然西醫大半持科學萬能主義者遂以為試驗管於人體相等以動物試驗為一定之律以此所得之結果直試諸人體故研究室內之理論似極精密而行之臨床往往失之不能相應反之中醫數千年來就億萬人體研究所得之病理及其藥能歷千錘百煉之後得出結論立為方劑初見之或疑為空漠逮按其實則秩序井然始終一貫故於實際上每有奇效此余實在之經驗也但此段議論於西醫則揭其所短而遺其所長於中醫則揭其所長而遺其所短然余非僅知中醫而不知西醫者又非但重經驗之知識而不知科學之知識者故於拙著應用漢方醫學解說即學苑出版社日醫應用漢方釋義自序中云余之為此乃欲釋醫聖張仲景所創之東洋古醫學以西洋醫學之原理明其所長併探現代治療術之所短以期二家之融合統一但茲事體大非愚蹇所任苟能通二家之志於願已足矣讀者諸君幸勿以余為一孔之見也如上所述余實一中西醫學之折衷主義者欲助發西醫所長而棄其所短更益以中醫之精粹而為綜合新醫術之導源此予志也然今獨力揚中醫者因此學衰微僅保餘喘行將廢滅故特發揮其獨擅之長認為當務之急而舉西醫所短乃比較討論上不得不爾者余豈好詆西醫以為快哉表裡半表半裡內外陰陽虛實主客本末之界說表裡之表者指皮膚而言也病毒集中於此部所發之病證即稱表證用發汗解熱藥以病毒自汗腺排除為原則若此發汗不徹則病毒轉入呼吸消化泌尿等器惹起種種之疾病裡者指消化管言按消化管之一名詞包括食道胃小腸大腸等而言病毒積集於此部而呈現實證則用瀉下藥以驅逐病毒不然則病毒遂侵入內部往往誘發不治之難證半表半裡者指胸腹二腔間適當支氣管肺心肝脾胰胃等之所在故若病毒集於此部使上列諸臟器之一部或數部發病即稱為半表半裡證此病毒用和劑以緩解之同時以其一部由皮膚或呼吸泌尿等器排泄為準繩是以病毒之傳入也有自表轉入於半表半裡或轉入於裡或自裡轉入於內或自表轉入於內自半表半裡轉入於內然亦有正相反者自內轉出於裡或轉出於半表半裡或轉出於表或於裡轉出於半表半裡或轉出於表或自半表半裡轉出於表者蓋人體活動而至變非單純之理論所得而解決之也內外者相對之辭也所謂內者係指皮膚呼吸器消化管以外之臟器組織也外者係指內以外之臟器組織也故云內時則裡在外云表時則裡亦為內矣而半表半裡者位於表裡之間對裡則為外對表則為內也仲景論治之所以分表裡內外者不外乎明示病毒之所在并欲明其轉變之狀態使醫者不致有所誤也陰陽之陰即陰證之謂是消極的或寒性之意病勢沉伏難以顯發其脈多沉遲沉弱沉細沉微而無力其證多惡寒厥冷等陽即陽證之謂是積極的或熱性之義病勢發揚無不明顯也脈亦準之浮數浮大滑大洪大而多發熱也是以陰陽二證正成反比判若霄壤故不得不嚴密分之設同一病而陰陽不同治法亦異也例如當感冒在表時若為陰證發表藥宜配以熱性發揚性之附子細辛如桂枝加附子湯麻黃附子細辛湯等若為陽證發表藥宜參以冷性沉降性之石膏如葛根湯加石膏小青龍湯加石膏等倘不準此法則如陰證以不加附子細辛之桂枝湯麻黃湯等處陽證以不增石膏之葛根湯小青龍湯等不獨不能愈病反致增劇又若反此法則如陰證以葛根湯加石膏小青龍湯加石膏等處陽證以桂枝加附子湯麻黃附子細辛湯等則陰證益陷於陰沉陽證更增其發揚勢必病症增劇甚至引起危險然西醫不辨此理以檢溫器為唯一之標準只認體溫之升騰不問其陰陽一律處以解熱劑宜施溫藥之陰證反投以陰冷之水藥且更加以冰囊故雖極輕微之感冒反易造成難治之病往往誘發為卡他性肺炎等致使病者瀕危虛實之虛即虛證之謂空虛之意也病毒未去精力已虛其脈多細小微弱腹部軟弱無力按之如棉花此證不宜吐下即發汗亦當大戒宜施和法反之實即實證之謂充實之義也病毒充實於體內但體力猶能抵抗常呈壯實之狀脈見實長大滑等象腹部緊滿有力或堅硬而抵抗強則不得不行徹底的汗吐下等法故有數十日便閉而嚴禁下劑之虛證一日數十次下痢不得不投以下劑之實證也如不解此義專以體溫之上升與大便之秘結決汗下豈無誤乎主客之主是常為主人之意即症狀初發性始終不改之謂也客即來去無常之義其症狀後發的或隱或現之謂也例如桂枝湯證之主證為頭痛初病即見其後持續而乾嘔為後發之客證非必常在者也故桂枝湯以頭痛為主而乾嘔不可以為主是乃主客之別也本末之本即病之根本也末即其末節枝葉也拔去病根則枝葉之症狀有不治而自去之妙故診病必須辨其本末腹證及診腹法中醫之腹證及診腹法創造於東漢時長沙太守醫聖張仲景所著傷寒論及金匱要略晉唐以降醫道漸衰神仙陰陽五行等玄談往往攙入而診腹之法幾被遺亡何謂腹證及診腹法答曰西醫於解剖組織生理病理等之基礎醫學及物理化學器械類進步之關係上對於各臟器之病變的診斷法頗精細周密亦知甲臟器有原發的病變能引起乙臟器或丙丁等之續發的病變之事實與理由然自原發的病變甲臟器及續發的病變乙及其他臟器所發之混淆病狀中檢出固定之他覺證於腹部而以此為目標施以適當之方劑則此數臟器之病變不問其為原發或續發悉能治愈之理則非彼等所能知也故亦無對此目標之方劑反之中醫以數千年之經驗不惟熟知此法且有治療此證之方劑故名此曰腹證其診此之法曰診腹法以之為診治之基本再參以脈應舌證外證即可決定其治法而確定其方劑則腹證與方劑恰如影之隨形不能離矣例如小柴胡湯柴胡薑桂湯大柴胡湯四逆散等之柴胡劑之主治證為胸脅苦滿之腹證即為胃炎腸炎及肝臟膽囊輸膽管之炎證瘧疾腳氣心臟病胸膜炎肺結核腎炎子宮疾患等屢見之腹證若見此類病而有胸脅苦滿證更參脈舌外證等後選用柴胡劑中之適當方劑則諸證皆能治愈故假令肺尖炎誤診為胃炎右側胸膜炎誤為肝臟病然其腹證不誤只其病名之誤診亦可用其療法而治愈與西醫之誤診而誤治者大相徑庭矣又同此理以此診斷法診察各病之初期因症狀不定斷診困難雖不能確定病名但於治法始終無誤決不致造成遷延治期及難以挽回之禍害又同此理用此診腹法時雖有病而不自覺之外觀健康者能觸知其潛伏的病根即可消患於未然仲景云上工治未病蓋此之謂也病變併發於二臟器以上即甲臟器為原發的病變引起乙臟器續發的病變時例如胃腸炎與子宮病併發之際若見胸脅苦滿證則選用柴胡劑中之適當方劑而胃腸炎與子宮病並能治愈又如腳氣病續發心臟病時見有胸脅苦滿證而亦選用柴胡劑中之適當方劑則原發之腳氣病治愈續發之心臟病亦隨之而自愈此中醫之所以微妙非西醫所得而企及也腹證及診腹法之重要腹者生之本故為百病之根是以診病必候其腹中醫腹證及診腹法之大綱亦證之西醫之理論何則腹腔者身體中最大之空洞也貯藏胃腸肝膽囊輸膽管脾胰腎副腎輸尿管膀胱前列腺等於女子則更有卵巢輸卵管子宮等他若頭蓋腔則僅藏腦髓及五官器脊柱管腔則僅藏脊髓即如胸腔亦不過氣管支氣管肺心食管而已都不能與腹部相比故多臟器之腹部其所發生之病亦比他部為多且此部之病多為他部病之原因亦必然之理也不惟如是此腔中之胃腸主全身之營養若此等臟器有障礙時則影響必及於全身是以此部特別重要胃腸者攝取之機關也雖與呼吸器無異然呼吸器所吸入之空氣則各人皆同故無各人體質之差別其為病亦單純此當然之理也至胃腸之攝收飲食物則有習慣嗜好之異人各不同則其為病亦因人而殊複雜多端亦必然之理也腸管為身中最大最長之下水溝為排泄飲食之渣滓及毒物之任務若此種作用障礙工作不能如常則毒物不能排泄而反被吸收即現自己中毒證以余之實驗一般所謂原因不明之多數疾病類由於自己中毒證梅溪尼可夫氏云人類之夭折多由腸性自己中毒之故實為余說之確證中醫方中下劑之多宜也腎臟者液狀廢物排泄之機關也若此種作用障礙則毒物蓄積釀成自己中毒之一種即現體表及體腔之水腫或引起網膜炎心臟病尿毒證等此種事實理由西醫雖亦能知悉然此事實以外由腎臟障礙續發之疾病甚多而彼不知者蓋彼等僅重於尿之鏡檢及定性定量試驗檢尿中不見腎上皮細胞血球圓柱蛋白等即否定腎臟障礙此單純依賴器械之故也何則此種障礙與尿變不但常不一致反以不一致時為多也以余之實驗如水泡性結膜炎同性角膜炎虹膜炎視網膜炎弱視等之眼病及頭痛頭重耳鳴重聽眩暈震戰搐搦不眠神經衰弱癔病神經痛知覺及運動麻痹等之五官器腦脊髓症狀咳嗽呼吸迫促心悸亢進等之心肺症狀胃內停水噁心嘔吐水瀉性下痢等之腸胃症狀等非無其他原因大半係出於腎臟機能障礙的關係而引起之尿性自己中毒證即水毒此可知其毒害之大矣婦女由月經障礙致成經少經閉及產後惡露停滯等證男子由遺傳及其他之關係而引起等證均有瘀血留於腹內而致誘發身體各部之疾病要之疾病之大半因於腸管之排泄障礙即食毒腎臟之排泄障礙即水毒與夫瘀血之停滯即血毒或此二三因之併發其他之所謂原因者皆不過為誘因或近因而已故此三因發源之臟器組織之腹部為百病之根本是以診病者不可不候腹良有以也脈應及診脈法西醫之診脈雖偶遇微弱之脈狀時施行樟腦注射以診脈定療法非全無之然多以之供斷病名預後之參考而已於診脈與治法間不可分之關係不知也豈不生輕視之弊乎反之中醫診脈為僅次於診腹之重要診斷法且負有指示治法之任務如東洞翁之言曰多數之疾病根源於腹部則診腹之重要不俟辯矣然依病證之種類有與腹部毫無關係而專現其徵候於脈象者矣又病雖根源於腹部而現腹證時欲決其為虛為實為陰為陽仍必須參照脈應例如脈浮為表病之徵必當處以發表劑然浮而弱時則當用桂枝湯浮而緊時則當用麻黃湯矣此乃不依腹證專憑脈應以決其治法者也脈沉為裡病之候則宜隨腹證而定其治法然沉而實時則處以下劑若沉而微弱細小時則當處以人參乾薑附子等之溫熱劑矣此乃對照腹證與脈應然後斷其療法也故桂枝證者屬陽證而表虛也麻黃證者屬陽證之表實也下劑證者屬陽證之裡實也人參乾薑附子等證者屬陰證之裡虛也如是脈應及診脈法與斷證療法極有密切關係自古以來名醫輩出極力研究然後完成此脈學然脈原富於敏感性即於平常無病之時精神若稍有感動則脈立呈變動矣況於疾病之時更加種種影響其變化更複雜矣故欲求診脈之無誤須有多年熟練之經驗否則必不能達到以脈診病之目的也大凡不論何學問總須由經驗鍛煉而成若直覺力不發達必不能深入研究技術診脈亦然不能全由書中覓得當就臨床中研究而得之然對於初學者不得不示其定型以為學習之端緒故自脈學輯要中之最要者略加解說以供參考總說朱奉議曰凡初下指之先以中指端按關位關者適當掌後之高骨也乃齊下前後二指謂之三部之脈前指為寸口後指為尺部若人臂長乃疏下指臂短則密下之求真按先以中指端按高骨即橈骨結節部也次下食指及無名指為寸關尺三部之脈適當中指端者為關位當食指者為寸口當無名指者為尺部也徐春甫曰脈有三部曰寸曰關曰尺寸法乎天關法乎人尺法乎地也寸部主上以候胸心肺咽喉頭目之疾關部主中以候胸膈以下至於小腹之疾脾胃肝膽皆在於中也尺部主下以候小腹以下至於腰腎膝胻足之疾大腸小腸膀胱皆在於下也求真按此為十八難三部上中下診候之法也今診病者上部之病則見於寸口中部之病則見於關上下部之病則見於尺中此為最明確之事實春甫之言信不誣也吳山甫曰東垣所著之此事難知中云脈貴有神有力也雖六數七極三遲二敗猶生此可謂得診家精一之旨矣脈之來以有力為陽證沉微無力為陰證浮而有力為風無力為虛沉而有力為積無力為氣遲而有力為痛無力為冷數而有力為熱無力為瘡各於其部見之滑伯仁曰察脈者須識上下來去至止六字此六字不明則不能別陰陽虛實上者為陽來者為陽至者為陽下者為陰去者為陰止者為陰上者自尺部上於寸口也下者自寸口下於尺部也來者自骨肉之間出於皮膚之際去者自皮膚之際還於骨肉之間陳遠公曰診脈者當看其有神無神此誠秘訣也然有神無神何以別之非論浮沉遲數澀滑大小之各脈若指下按之有條理秩然先後不亂者此為有神之至也若指下按之充然有力者有神之次也其餘指下按之微微鼓動者亦為有神也倘按之而散亂者或有或無者或來有力而去無力者或輕按之則有而重按則絕者或時續而時斷者或欲續而不能者或欲接而不得者或沉細之中倏有依稀之狀者或洪大之中忽有飄渺之形者皆是無神之脈也脈至無神即為可畏宜用大補之劑以急救之倘因循等待則變為死脈而後救之亦已晚矣汪石山曰夫脈經一書拳拳示人以診法而開卷入手即言觀形察色彼此互參可以決生死望聞問切醫者不可缺一豈可偏廢耶董西園曰老者氣血已衰脈宜衰弱過旺則病矣若脈盛而不躁健飯如常者此為稟賦之厚壽之徵也若強盛而躁疾則為孤陽少壯者脈宜充實弱則多病當其氣血日盈之時而得此脈故謂之不足若脈體細小而和緩三部相等者此稟之靜而養之定也惟細而勁急者則不吉故執脈審證者一成之矩也隨人變通者圓機之義也肥盛之人氣盛於外而肌肉豐厚則其脈多洪而沉也瘦小之人氣急於中而肌肉淺薄則其脈多數而浮也酒後之脈必數食後之脈常洪遠行之脈必疾久饑之脈必空也孩提襁褓之脈數者為常徐春甫曰無脈之候原因不一久病無脈氣絕者死暴病無脈氣鬱者治求真按久病無脈人事不省者為體力脫盡無論反覆注射樟腦製劑亦無效暴病之無脈人事不省者病毒鬱積之故也以汗吐驅逐病毒可治非注射樟腦製劑所得而治也浮十八難曰浮者脈在肉上行也張介賓曰大都浮而有力有神者陽有餘也陽有餘則火必隨之浮而無力空豁者陰不足也若以此為表證則害莫大焉張璐玉曰浮脈下指則浮象顯按之稍減而不空舉之則泛泛而流利不似虛脈按之而不振芤脈尋之而中空濡脈之綿軟無力也浮者經絡肌表之應也故凡浮脈之主病皆屬於表也譯者按閻德潤脈辨云浮脈者血壓下降心臟搏動猶有力時所現之脈也與所謂平波脈相似矣芤張三錫曰芤為草名其葉類蔥而中空指下浮大而無力者是也為亡血陰虛陽氣浮散之象也多見於諸失血過多及產後張介賓曰浮大中空按之如蔥管芤為孤陽脫陰之候為失血脫血譯者按閻德潤脈辨云此脈當生於血壓降至中等度以下血量不足然心猶有力搏動之時當與小軟虛脈相似滑孫思邈曰按之如珠子之動名曰滑滑者陽也滑伯仁曰滑者不澀也往來流利如盤走珠求真按傷寒論以滑為實熱之脈脈反滑當有去處下之乃愈脈滑而疾者小承氣湯主之脈浮滑此表有寒裡有熱也脈滑而厥者裡有熱也脈滑而數者有宿食也此皆陽盛實熱之候雖然亦有虛象反見滑脈者乃是元氣外泄之候學者可不細心體認乎譯者按閻德潤脈辨云滑脈為澀之反且與數相似而實多也大概即今之頻小脈與血壓無緊要之關係而偏重於心臟一定時間內搏動之數而觀察之也洪吳山甫曰洪猶洪水之洪脈來大而鼓也張介賓曰洪者大而實也舉按皆有餘洪脈為陽血氣燔灼大熱之候也浮洪則為表熱沉洪則為裡熱譯者按閻德潤脈辨云此脈與今之大脈相類數吳山甫曰數為醫者之一呼一吸病者脈來六至也若七至八至則更數矣九至十至十一至十二至則數之極矣七至曰甚八至為難治九至以上皆為不治若嬰兒為純陽之氣體則七至八至又其常也不在大人之例張介賓曰五至六至以上凡急緊疾促之屬皆其類也為寒熱為虛勞為外邪為癰瘍等滑數洪數為熱多澀數細數為寒多暴數多外邪久數必為虛損數脈有陰有陽也洪石山曰大凡病見數脈時多屬難治病久而脈數尤非所宜也蕭萬輿曰蓋數本屬熱而真陰虧損之脈亦急數也然愈數則愈虛而愈虛則愈數一有差誤死生反掌疾李士材曰六至以上之脈有二種或名曰疾或名曰極總是急數之形而數之極也惟傷寒熱極及癆瘵虛憊之人方見此脈是陰髓竭於下陽光亢於上有日無月也以之決其死期必至喘促聲嘶呼吸僅存於胸中數寸之間而不能達於根蒂此真陰極於下孤陽亢於上而短氣已極矣求真按疾乃數之甚也驗之病者腳氣惡證之脈多數疾而來去甚銳也促高陽生曰促者速也迫也近也陽也指下尋之極數而併居於寸口曰促漸加者死漸減者生楊仁齋曰促者陽也貫珠而上促於寸口出於魚際尋之數急時止而復來也方龍潭曰夫促脈者脈之疾促併居寸口之謂也蓋促者數之勝而數者促之源也先數後促此至數之極也弦李中梓曰叔和云如張弓弦巢氏云按之不移綽綽如按琴瑟弦同父云從中直過挺然指下諸家之論弦脈可謂深切著明矣吳山甫曰雙弦者脈來如引二線為肝實痛也若單弦則惟一線耳徐忠可曰一手有兩脈時亦曰雙弦此乃元氣不壯之人往往多見此脈亦屬虛也求真按弦脈大要有三有邪在少陽瘧邪亦在少陽故金匱云瘧脈自弦也者有血氣收斂筋脈拘急者腹痛脅痛痃氣㿉疝故多兼見弦脈有胃氣衰敗木邪乘土者虛勞病多見弦細數脈是也譯者按閻德潤脈辨云弦脈者不重於血壓之高低乃重於壓力降下之狀況或急或緩之謂即今之鈍脈也緊求真按緊之一脈古今方書不得其要領皆謂與弦相似予家君嘗曰素問仲景所謂緊脈必不同諸家之所說蓋緊者不散也其廣有界限而脈與肉劃然分明之謂也寒主收引脈道為緊束而不敢開散渙漫也譯者按閻德潤脈辨云緊脈特重於脈之硬度然此硬度之高因血管壁之變性或因心臟驅血之易而生者不可得而確定概言之當近於強脈也沉黎民壽曰沉者陰氣厥逆陽氣不舒也對浮而言浮者陽邪之所勝以血氣發越在外故為陽主表沉者陰邪之所勝以血氣固滯不振故為陰主裡吳授曰沉之診法重手按至筋骨之上而切之以之察裡證之虛實也若沉微沉細沉遲沉伏而無力則為無神為陰盛陽微急宜回陽生脈若沉實沉滑沉疾而有力則為實熱有神為陽盛而陰微急宜養陰以退陽大抵診沉之法最關緊要以之決陰陽冷熱用藥之生死在於毫釐之間故不可不謹慎從事也凡脈有力為有神為易治無力為無神為難治何夢瑤曰浮沉有得於稟賦者趾高氣揚之輩脈多浮鎮靜沉潛之士脈多沉又肥人之脈多沉瘦人之脈多浮有變於時令者春夏氣升而脈浮秋冬氣降而脈沉也有因其病而致者即病在上人身之上部也在表在府者其脈浮也在下在裡在臟者其脈沉也譯者按閻德潤脈辨云脈之沉者因脈躍之不足伏戴同父云伏脈初下指輕按之不見次尋之中部又不見次重手極按又無其象直待以指推其筋於外而診乃見蓋脈行筋下也若如常診不推筋而求時則無所見昧者以為脈絕也芤脈因按而知伏脈因推而得伏與沉相似沉者重按乃得伏者雖重按亦不得必推筋乃見也若重按不得推筋著骨全無時則脈絕而非伏矣張介賓曰如有如無附骨乃見此陰陽潛伏阻隔閉塞之候或火閉而伏或寒閉而伏或氣閉而伏為痛極為霍亂為疝瘕為閉結為食滯為憤怒為厥逆水氣等伏脈之體雖微細亦必隱隱而有力凡伏脈之見雖與沉微細脫者相類而實有不同也蓋脈之伏者其本有而如無一時惟隱蔽不見耳雖然此必暴病暴逆者乃有之調其氣而脈自復矣吳又可瘟疫論云瘟疫得裡證神色不敗言動自如而別無怪證忽然六脈如絲微細而軟甚至於無或兩手俱無或一手先伏察其人不應有此脈今有此脈應當下而失下由內結壅閉營氣逆於內不能達於四末故也此為脈厥求真按有此脈厥之際徒事注射樟腦製劑而不顧下劑之醫家不少當猛省之譯者按閻德潤脈辨云此為沉脈之甚者即強脈之極者亦即虛脈之兆也革李時珍曰諸家脈書皆視為牢脈故或有革無牢有牢無革混淆不辨不知革者浮牢者沉革者虛牢者實形證皆異也求真按仲景曰脈弦而大弦則為減大則為芤減則為寒芤則為虛虛寒相搏此名為革婦人則半產漏下男子則失精亡血由此觀之則時珍諸家之誤得辨矣譯者按閻德潤脈辨云革脈當為平波脈而稍帶遲脈之性質者也牢孫思邈曰牢脈按之實強其脈有似沉伏名之曰牢牢者陽也求真按革者浮堅無根之極牢者沉堅有根之極也當以此辨之譯者按閻德潤脈辨云牢脈為脈之複象然偏重於硬度可知欲分類之似屬於大甚硬脈實滑伯仁曰實者不虛也按舉不絕迢迢長動而有力不疾不遲為三焦氣滿之候為嘔為痛為氣塞為氣聚為食積為下痢為伏陽在內也張介賓曰實脈有真假真實者易知假實者易誤故必問其所因而兼察形證則必得其神方是高手譯者按閻德潤脈辨云此乃今日實脈之候微滑伯仁曰微者不顯也依稀輕細若有若無為氣血俱虛之候也張璐玉曰微脈者似有若無欲絕非絕而按之稍有模糊之狀不似弱脈之小弱而分明細脈之纖細而有力也譯者按閻德潤脈辨云此即其跳躍之低者澀戴同父曰脈來蹇澀細而遲不能流利圓滑者澀也與滑相反譯者按閻德潤脈辨云澀脈乃今日之不整脈中之結代脈也細一云小李中梓曰細之為義小也微脈則模糊而難見細脈則顯明而易見故細比於微稍稍為大也譯者按閻德潤脈辨云細脈者當以今日小脈當之軟即濡又作輭耎李時珍曰如水上之浮漚重手按之則隨手而沒之象也又曰浮細如綿曰濡沉細如綿曰弱浮而極細不斷曰細李士材曰在久病及老年之人見之亦不至於必絕其脈與證相合也若在平人及少壯或暴病見之則名為無根之脈去死不遠矣譯者按閻德潤脈辨云濡脈者即今日之軟脈也弱李時珍曰弱乃濡之沉者在病後及老人見之則順而平人少年見之則逆也譯者按閻德潤脈辨云弱脈較濡脈尤須沉取當以弱脈視之也虛周正倫曰虛者不實也無力為虛按至骨無脈者謂之無力也譯者按閻德潤脈辨云虛脈者概與今日之虛脈相類矣散滑伯仁曰散者不聚也有陽無陰按之散滿於指而不聚來去不明漫無根柢主虛陽不斂氣血耗散藏府氣絕也譯者按閻德潤脈辨云散脈是無緊張之脈即逍遙自放殆釋蒲克來氏所謂之逍遙脈歟緩吳山甫曰緩之狀如琴弦之久失更張縱而不整曰緩與遲不同遲以數言緩以形言其相別遠矣遲吳山甫曰醫者之一呼一吸病者脈來三至曰遲二至一至則又遲矣若二呼二吸一至者遲之極也陰脈也為陽虛為寒也程應旄曰遲脈有由邪聚熱結腹滿胃實阻住經隧而成者又不可不知也今驗癥瘕痃氣壅遏隧道而有見遲脈者此乃雜病亦有遲脈不得概以為寒也求真按師云脈遲出汗之證有時亦應用大承氣湯為峻下劑者則遲脈未必皆為陰證之徵可得而知矣不但如此余嘗實驗現今有遲脈之病者概屬陽實證無不為下劑之適應證吳山甫之言不可盡信也譯者按閻德潤脈辨云此則屬於今日之稀脈即一定時間內所來之數不及平常也結張介賓曰脈來忽止止而復起總謂之結多由血氣漸衰精力不繼斷而復續續而復斷所以久病者常見之虛勞者亦多有之又無病而一生有結脈者此其素稟之常不足為怪也譯者按閻德潤脈辨云結脈確係今日之不整脈又屬其中之缺乏脈或緩延脈也代張景岳曰代者更代之義而於平脈之中忽見軟弱或乍數乍疏或斷而復起均名曰代譯者按閻德潤脈辨云代脈者即今日之更換脈或交互脈也動何夢瑤曰數而跳突名曰動即跳動之意大驚多見此脈蓋驚則心胸跳突故脈亦應之而跳突矣譯者按閻德潤脈辨云其脈性當不外今日之所謂熱脈是也長李時珍曰長脈者不大不小迢迢自若如循長竿之末梢為平如引繩如循長竿為病實牢弦緊皆兼長脈譯者按閻德潤脈辨云即今日之長脈也短滑伯仁曰短者不長也兩頭無中間有不及於本位氣不足以前導其血也為陰中之伏陽為三焦之氣壅為宿食不消也求真按千金方論腳氣曰心下急氣喘不停或自汗數出或乍寒乍熱其脈短促而數嘔吐不止者死蓋短而數驗之病者其脈來去如催促之短縮而數疾也此毒氣衝心脈道窘迫所致乃死證也是短脈之最可怖者故附於此譯者按閻德潤脈辨云短脈亦即今日所謂之短脈也婦人張景岳曰凡婦人懷孕者其血留氣聚胞宮內實故脈必滑數倍常此當然也然於中年受胎及血氣羸弱之婦則脈細小而不見數者亦有之但於微弱之中亦必隱隱有滑數之象是即有妊娠之脈當辨也又胎孕之脈數勞損之脈亦數大有相似者然損脈之數多兼弦澀胎孕之數必兼和滑此當於微中辨其邪氣與胃氣之異而再審之以證則顯然自見矣求真按離經脈戴父云診其尺脈轉急如切繩轉珠者是將產也是或有然者今試孕婦每屆生產之期破漿之時大抵其脈一息七八至即將分娩之際反而徐遲驗於數十人皆然世傳欲產之婦脈曰離經然與難經所云一呼一至曰離經之義又似各別矣余屢檢將臨產之婦其脈狀真似離經者於數千人中偶得一二人耳凡產事之極易者其破漿後之脈或左右或左或右必沉細而滑也其方娩子時寸口皆離絕而入於指端既畢則復於本位疑此乃離經之謂歟此條根據於賀川子玄氏之產論小兒張介賓曰凡診小兒既不能通其言語則主以脈為最當而參以形色聲音則萬無一失矣然小兒之脈非大人之多端可比但當察其強弱緩急四者之脈是即小兒之肯綮也蓋強弱以見虛實緩急以見邪正也怪脈彈石黎民壽曰彈石之狀堅而促來遲而去數指下尋之搏至而絕如以指彈石此真腎脈也解索黎民壽曰或聚或散如繩索之解難以收約也雀啄黎民壽曰若雀之啄食來三而去一也為脾元穀氣已絕於內腸胃虛乏而無稟賦不能散於諸經則諸經之氣隨而亡竭屋漏吳仲廣曰屋漏者主胃經已絕穀氣空虛其脈之來也指下按之極慢二息之間或來一至若屋漏之水滴於地上四畔濺起之貌也蝦游吳仲廣曰其來指下若蝦之游於水面泛泛然而不動瞥然驚霎而去欲以手趁之則杳然不見須臾又來指下良久不如前而去如蝦蟆入水之形瞥然而上倏然而去此是神魂已去行尸之候立死也魚翔王叔和曰魚翔者似魚之不行但搏尾動頭搖身久住者是也釜沸王叔和曰三部之脈如釜中之沸湯朝得則暮死夜半得則日中死日中得則夜半死橘窗書影中有云脈學者先以浮沉二脈為經緩緊遲數滑澀大脈為緯以考究疾病之進退血氣之旺衰則其餘之脈義得漸漸進步論西醫強心藥之無謂病者心臟漸衰至於脈力減弱多數西醫以反覆注射樟腦劑為萬全之策若不效而死歸之天命深不為怪是乃至無謂之治法也何則因心臟脈力衰弱之原因頗為多端決非單一者可比蓋有因食毒者有因水毒者有因血毒者或有因二毒乃至三毒之合併者又有因是等病毒上更添近因者果能洞察其原因之所在而除去之則不治心臟脈力之衰弱亦自能恢復矣倘不究其原因而謀驅除之策千篇一律以注射樟腦劑為治心臟脈力衰弱之專法恰如水源地之殖林不施河流之修改怠於堤防之工作而欲制下流之泛濫其可得乎若樟腦製劑果有效亦不過如線香火花式一霎時之效而已斷不能永續者也若有永續的效果則非樟腦製劑之力乃併用他藥之功否則病者之體力尚未完全脫盡無關於樟腦製劑之有無自能恢復而樟腦製劑得成徼倖之名反之中醫有治病原之方劑而無所謂樟腦製劑之強心藥反能全強心之作用可謂無名而有實也論瘀血之毒害研究中醫特說之瘀血意義瘀即污穢之謂血是血液則所謂瘀血者即污穢之血液而非正常之血液也以現代的新說解釋之所謂瘀血者既變化而為非生理的血液則不惟已失血液之用反為有害人體之毒物既為毒物即須排除於體外雖片刻亦不能容留之今一轉眼光自他面觀察之婦人之有月經以為妊娠之預備乃造化之妙機然月經血自不關此樞機不過自此樞機之開始至完了期間發生之一現象而已換言之即月經血只為報告此樞機始終之信號旗而已不惟與此樞機無關實此樞機主人所辭退之不良工役而有毒性者與上論對照則成月經血者即瘀血也之結論故月經血若排泄阻礙或全閉止時其毒力不惟足以病人且失抗菌性而等於血液培養基之瘀血適宜於細菌之寄生繁殖不惟容易誘致各種細菌使成各種炎性病而已也瘀血停滯過久不惟沉著於生殖器及鄰接之腸管腸繫膜淋巴腺等之血管內其一部并能與生理的血液循環於周身沉著於臟器組織內而生血塞於肺肝脾腎則蘊成出血性梗塞於腦肺則發血栓凝著於心臟及血管壁則起心臟瓣膜病狹心證動靜脈瘤血管變硬等且由此等疾病使續發種種之病證然病證雖如此複雜要皆因月經之排泄障礙而起是以若不失時機處以適宜之通經劑使經血疏通即將續發之諸病亦得制止於未然在缺乏此種方劑之西醫對於原病的月經排泄障礙應續發之諸病除施姑息苟安的對證療法外無他法也反之中醫之通經劑即驅瘀血劑對於瘀血之屬陽性者配以桃仁牡丹皮之方陰證者配以當歸芎藭之方陳久性者配以蟅蟲水蛭虻蟲乾漆之方劑又對於續發的諸病則以此驅瘀血劑與對證方劑合用或兼用故若非達到器質的變化之高度如古之所謂病入膏盲者則治之不難也讀者自上說觀之於西醫方中不能得之驅瘀血劑而具備於中醫方中則此方豈不至尊且貴乎故列舉往聖先賢之論說治驗於下以為確證仲景師曰婦人經斷未及三月而得漏下不止胎動在臍上者此為癥痼害妊娠所以血不止者其癥不去故也當下其癥桂枝茯苓丸主之所謂癥者玉篇云癥為腹結病也尾臺氏謂腹中有凝結之毒按之則應手可徵知之故癥者明為在腹內之小腫瘤狀物也而與月經閉止子宮出血有因果關係由是觀之可推知其為癥之血塞師又云所以血不止者不去其癥故也因之得知此出血為癥即血塞血流障礙血壓增高於側枝血行之結果師又云當下其癥桂枝茯苓丸主之由此可知此方有治血塞及因此而出血之作用也又曰產婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經血不利下瘀血湯方大黃二兩桃仁二十枚蟅蟲二十枚上三味為末煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝註徐靈胎曰新字當作瘀字尾臺氏曰新血疑為乾血之誤求真按前說不為無理但以後說為優何則師既云乾血著於臍下故本方服後所下者為乾血明矣所謂乾血者係瘀血之陳久者也師云主經水不利又云頓服之後乾血下如豚肝由此觀之則此腹痛之原因為月經排泄不充分瘀血久滯於臍下部之血管內即以形成血塞而壓迫刺激鄰接部之知覺神經故服本方後能鎮痛者因刺激神經之原因的乾血即血塞變為豚肝狀而被排除也續建殊錄云攝州船場某賈人之女年十八便秘而難通者有年近日經閉及三月其父母疑其有私乃使醫察之醫曰懷孕也女不認復使他醫察之不能斷乃就診於先生按其腹於臍下有一小塊以手近之則痛先生曰是蓄血也非重身也乃與大黃牡丹皮湯服湯三劑而下利十數行雜有黑血爾後塊減半又兼用當歸芍藥散不久經水來大便如平日月經閉止三月於臍下部生小塊自服大黃牡丹皮湯後下黑血而減小塊之半由此觀之則其小塊之為血塞無疑矣類聚方廣義桂枝茯苓丸條中云治經水不調時時頭痛腹中拘攣或手足麻痹者或每至經期頭重眩暈腹中及腰腳疼痛者經閉上衝頭痛眼中生翳赤脈縱橫疼痛羞明腹中拘攣者頭痛頭重眩暈者因瘀血上衝於頭腦也生翳與血管怒張疼痛羞明者瘀血波及眼球也手足麻痹腰腳疼痛則傳播於腰部或四肢瘀血侵襲於知覺神經也同書桃核承氣湯條中曰治經水不調上衝頗甚眼中生膜或赤脈怒起瞼胞赤爛或齲齒疼痛小腹急結者治經閉上逆發狂此眼患及齲齒疼痛亦瘀血上衝之結果發狂即發精神病以其劇甚也同書抵當湯條中曰婦人經水不利者棄置不治則其後必發胸腹煩滿或小腹硬滿善饑健忘悲憂驚狂等證或釀成偏枯癱瘓勞瘵鼓脹等證遂至不起宜早用此方通暢血隧以防後患註所謂胸腹煩滿者自覺胸腹部心下部膨滿煩悶也小腹硬滿者下腹部堅硬膨滿也善乃常常之意善饑者即多嗜證也健忘悲憂驚狂者係神經衰弱癔病心悸亢進等之神經證及精神病也偏枯者半身不遂也癱瘓者脊髓麻痹也所謂鼓脹者為腹部膨大病之總稱亦包含如子宮及卵巢之腫瘤也噎嗝者為食管及胃狹窄證之泛稱食管癌胃癌亦含蓄在內也隧為隧道血隧者即血管係之義也以上之論說治驗熟讀而玩味之則余說之不誣自可了然矣婦人之瘀血不惟因月經障礙而起由產後惡露排泄不淨者亦屬不少因惡露不外為瘀血則分娩後有自然排出之必要然或因自然之良能作用不及或由人工的抑止使不能完全排泄則沉著於腹內引致各種疾患與月經障礙其理一也子玄子產論曰大凡產後三日不拘外證與虛實必須先用折衝飲因惡露未盡百患立生危斃可立待也慎之慎之註此說就一般論固甚可然云不拘外證與虛實則言之過盡學者不可盡信生生堂治驗曰一婦人半產後面色黧黑上氣頭暈先生診之脈緊而臍下結硬曰此有蓄血也即與抵當湯三日而覺腰以下寬舒更與桃核承氣湯俄頃果大寒戰發熱汗出譫語四肢搐搦從前陰下血塊其形如雞卵者六日約下二十餘枚仍用前方約二旬所患若失註黧黑者無光澤而黃黑色也頭暈者眩暈也臍下結硬者下腹部堅硬有凝塊也是即血塞譫語讝語也搐搦間代性痙攣也前陰陰戶也此證因流產時惡露排泄未淨於下腹部發生血塞其餘波及於頭腦使至眩暈而自服抵當湯及桃核承氣湯後則瘀血完全排出故獲效也產育論曰凡產後玉門不閉與桂苓黃湯除瘀血則清血流暢其不閉自治矣註玉門者陰戶也玉門不閉即會陰破裂也桂苓黃湯為桂枝茯苓丸加大黃之煎劑也治會陰破裂以內服藥豈不微妙乎又同書曰產後惡露不下腹中脹痛者宜桂苓黃湯又同書曰產後惡露日久不斷時時淋瀝者當審其血色之污濁淺淡臭穢而後辨方藥淺淡者宜芎歸膠艾湯污濁臭穢者則宜桂苓黃湯註惡露之血色淺淡者為脫血之候則宜用芎歸膠艾湯以止血其污濁臭穢者為瘀血之徵則當以本方驅除之也又同書曰產後氣喘者為危在危急便方書中名曰敗血上攻其面必紫黑宜桂苓黃湯及獨龍散註氣喘者咯痰不能咯出為喘鳴息迫之意是由敗血上攻所致敗血即瘀血也此證疑即肺栓塞類聚方廣義桂枝茯苓丸條曰若產後惡露不盡則諸患錯出至於不救故其治法以逐瘀血為至要此方宜之同書桃核承氣湯條曰治產後惡露不下小腹凝結上衝急迫心胸不安者凡產後諸患多因惡露不盡所致早用此方為佳求真按諸說皆可為余說之證婦人之多瘀血且由此胚胎諸疾病既如前述然此瘀血不獨婦人專有之證在男子患者亦頗多余日常經驗其實例不遑枚舉今有一例為自身之經驗試談之余素體健雖有小病恒不覺惟因痔疾時時感發胃部膨滿停滯便閉上逆不眠等腹證隨用大柴胡湯桂枝茯苓丸之合方服藥僅一回即瀉下黏血之便不惟血壓大降下而前證亦為之大減然若單用大柴胡湯則雖能瀉下必無黏血之便且上逆等腦證及血壓並無減輕由此觀之則桂枝茯苓丸有驅瘀血作用益明矣又藉此得知男子亦有瘀血證更舉吉益南涯氏之治驗於下有人嘗患腹痛腹中有一小塊按之則痛劇身體尪羸面色青而大便難通飲食如故乃與大柴胡湯歲餘而少瘥於是病者漸怠不服藥既經七八月前證復發塊倍於前頗似冬瓜煩悸喜怒劇則如狂眾醫交治不能稍瘥復請治於先生再與以前方而兼用當歸芍藥散服之月餘一日大下異物形似海月灰白色之囊其內空虛可盛水漿其餘或圓或長或大或小或似紐或如黃色之魚餒肉敗等物千形萬狀不能枚舉如是者九日宿疴頓除註魚餒者魚肉腐爛之謂如魚餒如敗肉者即不外為瘀血也以是得知當歸芍藥散有驅瘀血之作用又可知男子亦有瘀血也然無月經妊娠等生理之男子而有瘀血者何也答曰其原由恐多端就余所知者有三其第一不得不舉遺傳凡關遺傳之學說直接的雖不能論斷之由統計其他種種之材料間接的推理歸納為常故余說亦援此例以余之經驗診其父有大黃牡丹皮湯之腹證者其兒女中亦間有同湯之腹證母有當歸芍藥散之腹證者其兒女中亦間有同散之腹證其父母有桃核承氣湯或桂枝茯苓丸證者亦同然也然此事實若僅得自少數之實驗則父母與兒女之腹證不得不謂之偶然一致解之今經幾次反覆試驗無不皆然則不可謂偶然暗合矣此余所以主張瘀血遺傳說也其第二原因則為打撲等外傷而溢血也凡打撲之輕微外傷雖任何人亦每有之若所傷稍重則發生溢血於皮下或肌肉之間然此溢血既迸出於血管之外則失血液之性能再不能復歸於生理之狀態而成為死血即瘀血也若放置之則漸吸收於血管內與生理的血液循環於體內遂至成各種疾患之源泉其第三原因則熱性病之熱溶血證也如腸傷寒之高熱持續性傳染病血球因細菌毒素與高熱而崩壞現出所謂熱溶血證者此溶血非生理的血液即不外於瘀血若未失治期而不蕩滌之往往引起腸出血使生命危險即幸而得生而此瘀血未去將來必致續發諸般之病證瘀血之腹證仲景曰但少腹急結者乃可攻之桃核承氣湯主之腸癰者小腹腫痞按之即痛大黃牡丹皮湯主之此為有乾血著臍下下瘀血湯主之脈沉結小腹硬抵當湯主之有熱傷寒小腹滿宜抵當丸如上所論仲景之說瘀血治劑皆以少腹即下腹部為目的而處之蓋腹腔者為身體中最大之腔洞而受容最多量之血液故若有瘀血當較他部為尤多且其一部又為骨盆腔為身體中最下部位之腔洞而因缺少運動若有瘀血停聚最易沉墜於此部易成有形而成血塞此有形之血塞若至一定之容積當診腹時頗足為瘀血診斷之目標此張氏瘀血治劑應用之目的必在下腹部之第一理由也第二理由由門脈之存在而生者也依解剖生理學所示此靜脈有司腹腔內諸臟器組織之靜脈血與由腸管所吸收之乳糜輸送於肝臟之任務然此靜脈無他靜脈所有之瓣膜裝置因之不惟不能促使血液之前進且不得阻止其逆流又為此靜脈下流之肝內靜脈為通過無數分歧而充實之肝實質內其抵抗面甚大由此關係此靜脈之血壓為極微弱動輒於起始部有逆流之情勢故若一有瘀血將使此血壓絕無或生陰壓即呈逆流為此靜脈本源之內諸臟器組織血管內瘀血沉著而將成血塞之理就中與此靜脈之經路殆成一直線恰如其本流之下腸繫膜靜脈之起始部即下腹部當發生最頻繁且最強度之血塞也故若此部之血塞而增大至某限度時復能為瘀血治劑之應用目標第三理由惟婦人有之其理既述於前茲從略如上說之理若於下腹部觸知抵抗物按之而覺疼痛且否定為宿便結石寄生蟲子宮妊娠等則悉可指為瘀血宜選用治瘀血劑而以此抵抗物及壓痛稱為瘀血之腹證瘀血之脈應仲景曰腸癰者少腹腫痞按之則痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹皮湯主之此條文是說明闌尾炎之診斷療法也今且暫置之單就脈候觀察之凡發熱惡寒時脈必浮數今反遲緊者一由於疼痛之反射作用又其過半因少腹腫痞即盲腸部之腫脹硬結的障礙物嵌於血流之間可認為阻礙血流之結果因闌尾炎之化膿時即小腹腫痞減退時由脈之變為洪數此一因化膿熱而證得之也又曰太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦也小腹當硬滿抵當湯主之若曰表證仍在有惡寒發熱等證則脈當浮數所以反微而沉此沉與陰證之沉異沉而結也者因瘀血結聚成形而為小腹硬滿介在血液循路中障阻血流故也又曰太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之此條為論瘀血性黃疸與瘀血性精神病也脈之所以沉結與前條無異王肯堂氏曰有瘀血則脈澀宜桃仁承氣湯下之歸納上述諸論可得結論曰瘀血增劇至一定程度時阻礙血流其脈呈血液不流行之現象雖然此乃限於陽實性而高度者之脈狀非盡如是也又此脈狀必見於左脈不見於右脈是余多年之經驗也瘀血之外證古語云形於面盎於背暢於四肢此蓋吾人表情之顯現於外者必由先充於體內雖欲勉強抑制之亦必顯現於言動之間疾病何莫不然若有病毒發於體內時其應徵必現於外表扁鵲云病之應現於大表亦此意也瘀血為疾病之一自不能外於此理故於體內有瘀血時必顯其徵候於外表如皮膚粘膜之類現於此外部之症狀即稱為瘀血之外證然此外證千態萬狀殆無端緒診之不誤首在醫師之心眼而非筆墨所能形容也茲故揭古人之論說治驗於下以示其一端而為初學之階梯其應變處一任學者自己之研究仲景曰病人胸滿唇痿舌青口燥但欲漱水不欲咽無寒熱脈微大而來遲腹不滿其人言我滿者為有瘀血註但欲漱水而不欲嚥者雖屢見於瘀血家尚難為其確證舌青者於舌有鬱血則可為瘀血之佐證矣又腹滿或不滿而病者訴滿時亦其確證也但此腹滿當知為下腹滿耳續藥徵曰仲景又別有診察瘀血之外證法曰其身甲錯曰胸中甲錯胸中者蓋心胸之上也曰肌膚甲錯註甲錯者皮膚如魚鱗如龜甲之皺紋是恐因有瘀血缺乏生理的血液之灌溉皮膚營養不良之故也有此徵候時則確為有瘀血之存在生生堂醫談中曰鈹針問曰醫者只與藥石而行鈹針至稀也然子獨專行此術傳自何人用於何證有何效力乎答曰予無常師皆以古人為師而學則鈹針云者亦隨古人之遺法而行之也鈹針之用雖止於去毒血而其所奏之功則不可預期施於無量數之證皆有奇效內經亦以鈹針取毒血其事數見不罕明龔廷賢萬病回春云青筋證北人多患之即痧病也又清之郭右陶痧脹玉衡亦同是自古已有之術也然本朝因用心不專而不用聞山脅東門曾行此術又方今荻野臺州亦著刺絡篇右陶始行此術有大效其名亦高後成一家而著玉衡然如前所述因欲神其術而潤色過實則為吾人所不取也吾輩以郭氏之論及方雖不可取而以鈹針去毒血專行此術以取效者實多是皆郭氏之所賜也或謂患痧者千中難遇一人可謂不研究之至矣予常見苦於痧者十中必有一二尤以卒倒者為多於是郭氏始專行此術予甚稱嘆焉予以此術起廢疾愈沉疴者頗多今舉其最著之二三例於下一婦人五十歲兩足冷如冰拘攣而不能遠行眾療不驗請治於予予見兩腳紫筋縱橫如網狀即以鈹針放二三次出血約二三合作桂枝茯苓丸加大黃與之二十日而復常其他以此術取效者不遑枚舉急痧者夕發旦死不知此證者皆云卒中風也雖灸百會人中神闕湧泉等穴另行延齡丹蘇合香丸搐鼻散等而不效終於束手待斃又小兒之諸急證上竄搐搦等刺兩手之五里地倉等穴以口力吸之出血則旋蘇矣至於急卒之處鈹針之效遠勝於藥石扁鵲起虢太子吾亦不讓焉云者以有此術也然痧之見證郭右陶雖大概以脈證不相合為痧病是亦不可信也吾輩當先看血色次看委中尺澤之細絡而定之少見於尺澤而多見於委中也色以紫黑紅之間者為多古書雖謂之青筋然青筋卻少毒血即有不見於皮膚若見薄青者痧也又注視不見而見黑子狀點者痧也刺之則血大出功效甚速也然而刺以三棱針有淺深之規定淺則出血不足深則貫絡有大害也又一針而有血出一二升者有數針亦不出血者不拘血之多少而有瞑眩或卒倒昏暈搐搦嘔吐等事者不可驚慌但平臥之與冷水一碗須臾而正氣復心神忽健爽矣其有瞑眩者其效亦大也若瞑眩愈強則效愈大是吉兆也當知之夫痧者毒滯於絡中使氣血不能流行也故雖有千變萬化之證仍放其毒血則氣血循環即快矣試先刺絡無毒之絡不出血是其證也婦人之經血月月當下若一月停滯則病病痔之人強止其下血則變為異證而為種種之患毒血在身故也痧亦等是拔此毒血則非鈹針不能然施針者若誤刺動脈則一身之血盡出立見其死矣可不慎哉求真按痧之病名古來亦曾慣用然其實不外誤認潛伏瘀血之發動中神氏亦不著眼於此以為瘀血之外猶有所謂痧病誠千慮之一失也故氏之痧病論即為瘀血論則痧病之外證即為瘀血之外證以余之實驗凡瘀血家之面色概暗紫黑色或暗赤色而就中於口唇為甚中神氏先觀血色而定之蓋亦此意乎生生堂治驗曰一婦人周身發斑大者如錢小者如豆色紫黑日晡所必發痛癢又牙齦常出血先生診之臍下拘急而及於腰與桃核承氣湯兼用坐藥自前陰出膿血不數日乃愈求真按此證為瘀血之一部自內及裡而轉出於表也紫癜出血疼痛瘙癢者其外證也生生堂治驗曰一婦人年三十久患頭瘡臭膿滴流不止髮黏結不可梳醫以為梅毒而攻之不愈痛癢不止請診於先生其脈弦細小腹急痛引於腰腿曰瘀血也投以桂枝茯苓丸加大黃湯兼以坐藥不出月全瘥後一夜腹痛二三陣大下蓄血云求真按此證亦瘀血之一部自內及裡轉出於表者而頭部之濕疹疼痛瘙癢者其外證也又曰有一婦人年約四十以全身發黃醫者誤為黃疸先生按之至臍下即疼痛不堪與桃核承氣湯十餘日而痊愈求真按是血性黃疸也余亦曾用大柴胡湯與桃核承氣湯合方治此種黃疸者矣方伎雜志中云余曾治七歲女兒之行經服藥十餘日而愈後此女至十四五歲時始經行不滯十七歲時初產一子又治二歲之女子經行者初疑為小便下血因檢視陰戶經水也誠稀有之事二人均無特別之異證因但見血妄行故用桂枝茯苓丸煎湯皆不日而愈求真按此非真月經因瘀血而子宮出血也故出血亦可知為瘀血之外證榕堂翁療難指示前錄中曰凡血熱證舌色必作殷紅宜辨之求真按殷紅者深紅色也以余之經驗瘀血家不獨舌色如是口唇亦呈殷紅也橘窗書影中曰余數年潛心診蓄血證舌上無特別苔而滿舌有赤紫斑點者在蓄血證為大患也熱候即輕亦不可輕視有吐血或下血而亡陽者其人雖不現血證亦可斷為蓄血證治之不限於外邪即於雜證舌上亦有此候者當思為蓄血證又喘息胸痛肩背痛皆因於蓄血而血若自他竅泄者愈攻擊胃中者而為上奔吐血若蓄血不能上衝下泄者死當其時若大吐血者亦死吐血死者脫氣也不吐血死者壅塞也余聞長崎吉益耕作七十餘歲因中風手足不遂後誤倒石上頭破出血數合不遂旋愈又長崎升齊之話中云中風半身不遂發為癰疽而愈者三人是亦可云天幸矣蓄血不發表而內鬱之人必有發為種種之惡證者此條之理不可不明求真按淺田氏舉瘀血之外證為舌之鮮紅及紫斑點固為確論而眼球結膜有如上之斑點或紫青色者亦為有瘀血之徵此條有附加之必要又喘息胸痛肩背痛吐血腦出血等證因瘀血者頗多余亦有同感焉論傳染病若不以自家中毒為前提則不能成立現今醫家之傳染病觀重視細菌殊甚以為苟有細菌存在則能以獨力得成立傳染病極為恐怖此因受羅貝古斯氏以來勃興之細菌萬能說之感化隨波逐流是但知其一不知其他之偏見也夫疾病成立之要件必須有內外二因之共存外因雖有作用於身若不與內因結合則不能成立此千古不易之鐵案也雖為傳染病等是疾病不能自此原則之外求之更以具體的論之細菌亦為生物之一在理若無適於彼之營養物及水與溫度等則不能續保其命脈也然此營養物及水與溫度即自然的培養基若無自家中毒證則不能生存於抗菌力旺盛之健體反對古斯氏霍亂菌侵入體內即霍亂病發生說嚥下此菌之純粹培養而立證其不然者徵之巴登古發氏之獻身的體驗可明矣又據猛毒之白喉菌不拘放置於口腔或咽喉之內亦有不使其發病之實例及保有病原菌而與康健身體無異之所謂保菌者之存在之事實亦得證明之因細菌學者雖以先天的或後天的免疫性說明此等事實而其所謂先天的及後天的免疫性二者均無適合於細菌之寄生繁殖之自然的培養基即無自家中毒證之謂也假令雖有許多細菌侵襲人身而體力旺盛者無餘地可乘但若祖先或父母有瘀血遺傳或起居飲食不節釀成食水血三毒之停滯即廣義的自家中毒證則對於細菌不惟抵抗力減弱且具有適於寄生繁殖之培養基使成立為傳染病者也譯者按羅貝古斯德人生於西曆年工解剖術且長於顯微鏡之試驗遂發明肺病治療法巴登古發亦德人生於年專講保持健康及疾病預防諸法如室內換氣法飲食預防菌芽法皆為巴氏所發明醫餘曰呂氏春秋曰凡人之三百六十節九竅五臟六腑肌膚者欲其比也血脈欲其通也筋骨欲其固也心志欲其和也精氣欲其行也若此則病無所居而惡無由生病留惡生者精氣之鬱也故水鬱則污樹鬱則蠹草鬱則蕢國亦有鬱則主德不通民志不達此國之鬱也國鬱若久則百惡並起萬災叢至矣註比密也宣通也固堅也和猶安也行流也惡慝也人苟精神流行肢體堅固則病毒無由而生又曰淮南子曰養生以經世抱德以終年則可謂體道若然血脈無鬱滯五臟無蔚氣矣註血脈不鬱滯五臟無蔚氣則精神內守肉腠外拒雖有厲風苛毒莫能侵之雖為道家言亦至論也家語蔚作鬱字通苟血脈臟氣不鬱滯即無自家中毒證雖有厲風苛毒即有千百之細菌亦莫如之何也明矣是亦可證余說之不謬論多數傳染病不當一以其病原體為斷宜隨其發現證治之瘟疫論曰邪之著人如飲酒然凡人酒醉時脈必洪數氣高身熱面目俱赤乃其常也及言其變各有不同有醉後妄言妄動而醒後全然不知者有雖沉醉而神思不亂者有醉後應面赤而反刮白者有應萎弱而反剛強者有應壯熱而反惡寒戰慄者有易醉而易醒者有難醉而難醒者有發呵欠及噴嚏者有頭眩眼花及頭痛者因其氣血虛實之不同臟腑稟賦之各異更兼多飲少飲之別故考其情狀各自不同至於論酒醉一也及其醒也則一切諸態如失上述均為酒醉而其醉態所以有千差萬別者由其稟賦體質之各異則於施治時不應執單治其酒毒而應隨其所呈之症狀以研究之其原因為酒毒固不待說而除去其原因實為理想之療法但酒類既竄入體內浸潤於各臟器組織之中欲一舉而去之恐為不可能之事實故當隨醉者之狀態及酒毒所在之不同或用發汗劑自汗腺驅逐之或以吐劑自口腔驅逐之或以下劑自肛門驅逐之或以利尿劑自尿道驅逐之為不二法門也傳染病亦然假令被侵入同一之病原體亦隨患者之體質及病毒所在之各異發現種種不同之病狀除二三病證外欲無損於身體而使病原體殺滅不留餘孽者為不可能也故吳有性氏曰諸竅者乃人身之戶牖也邪自竅而入未有不自竅而出者經有曰未入於府汗之可已已入於府下之可已麻徵君復增汗吐下三法總是引導其邪自門戶而出為治法之大綱也舍此者皆為治標云爾如上所述必當隨其發現症狀而選用汗吐下三法之理也是即仲景所謂當隨其證而治之之義此所以不拘於病原病名專闡明病者之體質及病毒之所在而創製應對之治劑也如是則西醫之所謂對證療法與中醫之隨證治之似無分別實似是而非前者之對證療法係以病者之自覺不定症狀為目的而期其鎮靜是中醫之所謂治標也與中醫之隨證治之完全不同中醫之治法以自覺證與他覺證合為確固不動之症狀為目的然後對之而處以治法則對於證之本體得稱原因療法亦得稱特效中醫之傳染病療法以驅逐細菌性毒素為主傳染病之種類頗多茲就腸傷寒說明之本病由伊倍忒高夫克氏所發現之腸傷寒桿菌寄生繁殖於小腸黏膜而此菌體所生產之毒素其為害於人身反比其本體為大此西醫之所示也然發病之初期細菌之數猶少毒素之產出不多不過呈輕微之不定症狀若細菌增加至一定程度則呈頭痛項痛肢疲而痛惡寒發熱等證並現浮大浮緊之脈發生此等症狀之理由乃因對此毒素最敏感者為延髓中之體溫生產中樞受毒素之刺激而興奮以致體溫上升故體溫調節中樞如欲調節體溫則必須從無數汗腺中放散因此中樞令其所屬陸續輸送滿含毒素之血液於皮膚面以努力放散其體溫亦自然之妙機也如果不發汗則毒素無路輸出迫於筋骨而為頭項強痛肢疲而痛為欲泄而不能泄使惡寒發熱增量之血液以之呈浮脈於浮面動脈是即中醫所稱為表證而用葛根湯麻黃湯大青龍湯等之發汗解熱劑以補助自然良能作用之不及處使蝟集於皮膚面之毒素驅逐於體外也雖然以此發表而痊愈者甚稀不過表證因此緩解覺一時爽快但不久體溫漸次升騰復發口苦而渴噁心嘔吐食欲不振舌苔等之消化器症狀及咳嗽胸痛等之呼吸器症狀脈浮減而變為弦細此中醫所稱為表證不解而轉入於少陽此證即少陽證也病狀之所以如此變化者因體溫調節中樞疲勞不能如前之輸送多量血液於體表此為必至之趨勢而血液乃充盈於體內部也當於表證轉入舌尚白苔時宜處以小柴胡湯或小柴胡加石膏湯白苔少變黃色時宜處以小柴胡加大黃湯或小柴胡加石膏大黃湯白苔全變黃色上腹部有緊滿壓痛時宜處以大柴胡湯或大柴胡加石膏湯今研究是等方劑蓋以此六方劑中之主藥柴胡與麻黃桂枝葛根等為別義之發表藥有自皮膚呼吸器排出毒素之可能性又與柴胡同為六劑中配用之半夏為一種利尿藥則有從泌尿器驅逐毒素之能力又後四劑中之大黃為瀉下藥則能自腸管排除細菌毒素可無論矣又大小柴胡湯中加用之石膏本為止渴解熱藥然因其他藥物之配合可作發汗利尿或緩下藥又以化學成分來分析之則為含水硫酸鈣有鹼性則不得不云有酸類中和之作用因此不僅本病如是多數細菌性熱病者之血液因毒素之猛襲高熱持久奪取固有之弱鹼性至終化為酸性而屢成酸毒證此時於對證方中加用石膏則可畏之酸毒證當立時消散是據多數經驗之所見石膏不獨學理上如是即於臨床上亦能發揮與酸毒中和之能力由是觀之則在上之大劑中其毒素或自皮膚呼吸器泌尿器而排泄或並自消化器而排泄又或用於此等作用之外更有酸毒中和之能力明矣用以上方劑就病勢猛劇難以制禦時其脈變為沉實遲等象又現神昏譫語潮熱腹滿便秘或下利如惡臭衝鼻之便毒也不欲食舌上黑苔等症狀此於中醫稱為少陽證不解轉屬於陽明者是因毒素不間斷之刺激與持久之高熱體溫調節機能極度攪亂而全失其機能放散絕止之結果毒素無從排出反深集於體內消化管若不從大便排出無他策也故中醫以之為下劑之適應證至為適當之見解隨毒素集積之程度與病者體質之差別而選用調胃承氣湯桃核承氣湯小承氣湯大承氣湯等方則集於消化管內之毒素與細菌全被掃蕩其疾苦則必煙消雲散矣中醫之所以分表裡而用汗下之劑者首以毒素集中之部位與程度及病者體質之如何而用適應之方加以徹底驅逐也與西醫稱為期待療法與以鹽裡母赤酒劑曠日持久者不可同日而論矣但此論是述本病始終屬於陽證者之定型而非謂本病概如是也今所目擊者大都不至現小承氣湯大承氣湯證概以大柴胡湯大柴胡加石膏湯證而已足雖有偶呈陽明證者亦不過調胃承氣湯桃核承氣湯證而已論西醫偏於局部的療法西醫因解剖組織生理病理等之基礎醫學及理化學等自然科學發達之關係故長於局部的療法及器械的療法其臨床醫學宜於全身的觀察之下講究全身的療法然對於此項病證猶頗偏倚於局部的療法至中醫則原無基礎醫學無器械缺乏局部的知識雖欲偏於局部的療法亦不可能故不得不專注力於綜合的診斷療法之研究以之促進診腹診脈法之進步與藥劑組織之發達今舉一二例於下以說明之現今醫家對於胃擴張證多施以胃洗滌欲將胃內蓄水排除此惑於胃內蓄水之局部的所見即使反覆行之亦未必能愈反之中醫對此證之胃內蓄水知其一由於胃肌衰弱收縮運動不全之故一由於利尿機能障礙在此見解之下於衰弱之胃腸肌用助以緊張力之藥物而配以利尿藥故於一方漸次恢復胃腸肌之收縮力同時對停滯之水毒可由泌尿器排泄之兩兩相待奏效頗速不難根治矣又如下痢證中醫不如西醫之單用收斂藥若其原因不在腸管而在於其他臟器組織時則或用發汗劑或用利尿劑治之例如仲景曰太陽與陽明合病者必自下利葛根湯主之是以發汗劑治下痢也又曰此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便其後半為以利尿劑治下痢之機會也此為中醫綜合的診斷療法之佐證與治下痢徒執腸管信賴流動物收斂藥之外不知其他療法者大不相同也論中醫之鎮痛療法為原因療法凡疼痛之自覺症狀由於某種病毒刺激知覺神經之末梢所發之現象也病毒當然為本即原因而疼痛為末即結果也然觀西醫之鎮痛療法概主用嗎啡等之麻醉劑銳意鎮壓痛覺有不問其病毒原因之傾向而中醫則以病毒之撲滅為主而以鎮痛療法為客苟除去原因之病毒則僅為結果之疼痛自愈矣例如對於急性多發性關節風濕病之痛所以用麻黃杏仁薏苡甘草湯者方中之麻黃杏仁發表水毒薏苡仁由利尿以排除水毒並以驅逐其血毒甘草起緩和諸藥之作用故病毒消盡而自能鎮痛也又如以劇痛發病之急性闌尾炎盲腸部有瘀血凝滯之遠因兼挾種種近因而發炎可用大黃牡丹皮加薏苡仁湯方中之桃仁牡丹皮冬瓜子薏苡仁者所以助大黃芒硝以瀉其瘀血冬瓜子薏苡仁之用意由泌尿器以排除炎性滲出液故病毒隨之消滅而其疼痛可不治而自然若失矣是以知中醫之鎮痛療法為原因療法也論中醫方劑為期待復合作用之發顯中醫之方劑非如西醫處方之由於單味藥以期奏效者也皆配合二味以上之同效異質藥物故無一味藥過用中毒之虞而效力反倍蓰也例如發表劑之葛根湯是由表解熱藥之葛根麻黃桂枝所組成解熱利尿劑之越婢加朮湯是由解熱藥之麻黃石膏與利尿藥之石膏朮所組成又如桃核承氣湯調胃承氣湯大承氣湯等是由瀉下藥之大黃芒硝所組成是以中醫之處方多數由緩和無害之藥物所組成所以能奏奇偉之效也論中醫方劑能於一方中發揮多數之能力西醫方中不能於一劑內起多種之效果故有兼用水劑散劑或丸劑有時更兼施頓服藥含漱藥塗布藥濕布藥皮下注射靜脈注射吸入灌腸等方法以圖各個症狀之輕減如此治法不惟失之繁雜且於各個之療法間不能聯絡統一不能適當發揮自然良能之作用反之中醫方劑於一方中有多種之治療效能若於病證較單純者以一方能治其各個症狀雖複雜者亦可合數方治之若猶感不足則此合方兼用丸散劑以應之此合方中之藥物個數雖頗多而在方劑卻極簡易有統一有連絡其效果實偉大也例如葛根湯由葛根麻黃大棗生薑桂枝芍藥甘草七味組成其藥物數雖不少然決非烏合之眾以葛根為主佐以他藥故起殊效是乃以主藥葛根證之項背筋的強直性痙攣為目的而用此方凡感冒腸傷寒腸炎破傷風風濕病喘息熱性下痢病眼疾耳疾上顎竇蓄膿證皮膚病等悉能治之又如小柴胡湯由柴胡黃芩人參甘草大棗生薑半夏七味組成主藥為柴胡其證以胸脅苦滿為目標凡支氣管炎百日咳肺結核胸膜炎腸傷寒瘧疾胃腸炎肝臟病腎臟腎盂炎婦人病等悉能治之又如桂枝茯苓丸由桂枝茯苓芍藥桃仁牡丹皮五味組成因臍下部之瘀血塊左腹直肌之攣急為用此方之目標因此方對瘀血之血管血液諸病悉能治之又如黃解丸由山梔子黃芩黃連大黃四味組成其主證為心煩心下痞上逆便秘等此方對因血管血液之炎性機轉諸病悉能治之如此以一方而能發揮多種之效能若不複雜之病證以上一方已足應用又假令甚複雜者例如有葛根湯小柴胡湯桂枝茯苓丸黃解丸之諸證併發時則合前三方之葛根麻黃大棗生薑桂枝芍藥甘草柴胡黃芩人參半夏茯苓桃仁牡丹皮等為一方再兼用後面之一方以應之亦毫無遺憾而此合方雖其包容藥物頗多非漫然聚集雖似繁而實簡古語所謂以簡御繁精神合致者此中醫之獨到處也論中醫方劑之藥物配合法極巧妙之能事西醫於藥方雖不無藥物配合法然除配合禁忌外殆由醫者之任意各人各樣無規矩準繩之見反之中醫處方有自數千年相傳之經驗歸納而成故藥物配合極其巧妙例如中醫自古以來所慣用而西醫近來亦常使用之半夏若單味咀嚼之則其辛烈酷辣不易咽下然配之以生薑或甘草大棗蜂蜜等經過煎炙則不惟辛辣之性自然消失且得生薑時其鎮吐鎮咳之作用更強配以甘草大棗蜂蜜等之緩和藥其鎮痛作用益增是以用半夏者必於此等諸藥中擇其適當者配之也又大建中湯由川椒人參乾薑飴糖四味組成之劑也方中之川椒性味甚辛辣而有刺激亢奮殺蟲之作用刺激弛緩之胃腸肌使恢復其緊張力之外有驅逐蛔蟲之作用然其性已辛辣而乾薑亦類似之更以人參之苦味故飲服頗難也是以加有甘味之飴糖而矯正其惡味同時由其緩和作用緩解疼痛及其他之急迫症狀又以其滋養強壯性付與胃腸肌而促使其恢復緊張力也大黃雖為瀉下藥然對於大便燥結之結塊難以奏效故欲達此目的不得不配用兼有瀉下溶解二作用之芒硝所以桃核承氣湯大黃牡丹皮湯大承氣湯併用此二藥也雖然僅用此二藥時瀉下作用過於峻烈不適於衰弱病者則復加用甘草此以減二藥之銳氣使緩慢其作用之法也例如腸傷寒之末期或如熱病再發之衰弱者用大黃芒硝甘草三味而成之調胃承氣湯頗能達其目的且不至於影響身體豈非因其配合之妙耶論中醫方劑有適宜加減其溫度之理雖適證之發表劑若不熱服溫覆之則難發汗緩和劑不溫服則其作用不透徹對於陰證溫熱劑若不溫服則其效不顯鎮吐劑不使其冰冷而微量頻服之則不能達其目的是余實驗上的事實之證明也然中醫以煎劑為主故服藥之冷熱應病證之種類使其適宜西醫方是否因劑型之異將此重要問題置之度外甚且宜熱服溫覆之表證不惟投以冷性之水藥更敷以冰囊而阻止其發汗之機往往誘起卡他性肺炎對於宜溫服溫覆之陰證之假相的體溫升騰亦每敷以冰囊遂使病者陷於死地非所當施而施之豈非矛盾魯莽之甚矣論中醫治療中瞑眩症狀之發起者為原因療法之確證尚書曰若藥不瞑眩厥疾不瘳是為前人未發之真理而亦醫者病者所信服之金玉良言也中醫方劑服用後往往其反應有不預期之不快症狀出現是即稱為瞑眩者也因呈此等症狀時誤認為中毒症狀而疑懼者不乏其人其實似是而非之甚者也若為中毒症狀則理當隨服藥之後而益增惡瞑眩者不過為藥劑之反應現象其症狀為一時性片刻後此等症狀固即消滅而本病亦脫然痊愈矣今舉一二實例於下而詳論之余曾用半夏厚朴湯於重證之惡阻病者服後反大嘔吐然須臾而吐止絕食幾於數十日之病者欣然進食矣由此觀之則服藥後之嘔吐為此方驅水毒作用之反應症狀明矣又此病鎮吐之後隨腹證與以桂枝茯苓丸加川芎大黃數日之後腹痛大發并子宮出血同時排出葡萄狀塊胎不數日而如故由此觀之則服藥後之腹痛及子宮出血者為此方之驅瘀作用之反應又了然矣不獨此等之方劑如是其他諸方服用後往往發現種種瞑眩症狀是不外因病的細胞藉有力藥劑之援助奮然蹶起而欲驅逐病毒之作用之返照也則此症狀之發現當為中醫方劑治療實為原因療法之佐證故此症狀之出現洵可慶賀者也昧者不察偶然發現則周章狼狽更易他醫而深詆中醫者不乏其人至可慨嘆東洞翁云世人之畏瞑眩如斧鉞保疾病如赤子真乃悲憫之言也別論傷寒論之大意余所信奉為醫聖張仲景所著之傷寒論及金匱要略二書前者所主為傷寒即述腸傷寒之診斷療法後者為雜病即說明傷寒論所未及之病證之證治者也雖然仲景作傷寒論之真意有如下說永富獨嘯庵氏曰世醫動謂傷寒論治外邪天下無加至於雜病則未必然嗚呼卑哉夫傷寒中有萬病萬病中有傷寒相互參究始可治傷寒始可治萬病況於古醫方中若能徹底了解其內容則千金外臺宋元遼明等眾多之說亦皆為我使用矣吉益羸齊曰傷寒論者遺後世以治萬病之法引而申之舉莫能外此作者立法之精神也能了解傷寒之診斷療法悟其真髓則萬病之治如示諸掌學者不可泥於章句之末宜開眼透視以探其精神也具體論之則此書是闡明同一傷寒病侵入因各人稟賦體質有差病毒所在之異發現症狀不相等之理由同時設適應之治法不損及其體力使可勝藥而驅逐病毒之方術也其法分太陽少陽陽明之三陽太陰少陰厥陰之三陰其曰陽曰陰與後世醫家之空言陰陽五行不同仲景曰病有發熱惡寒者發於陽也無熱惡寒者發於陰也所謂陽證者新陳代謝機能之病的亢進也陰證者此機能衰減之病的沉衰也故陽證者概為實證而易治陰證者多屬虛證而難療而太陽者謂此機能亢進發於體表少陽者發於胸腹間陽明者發於腹內也三陰者皆此機能衰減現於腹內之名稱也太陰為其最輕微者厥陰為最嚴重者而少陰則介乎二者之間也傷寒論依其病勢病位大別為三陽三陰之六編而論列各種病型之腸傷寒更於各編細論種種之證治其用意極為周到證之大小輕重與其治法網羅無遺以下順次講述之太陽病篇太陽病之注釋太陽之為病脈浮頭項強痛而惡寒傷寒論註吉益南涯氏釋曰太者大甚也陽氣盛於表位謂之太陽脈浮頭項強痛此其候也氣盛而血不通暢故致強痛發表則不項強不惡寒發熱汗出矣經過日時則傳於內蓋表位氣之末也末氣常不足今氣盛甚於其末者陽氣大之狀也因名之曰太陽張璐曰脈浮者邪氣併於肌表也程應旄曰太陽經之見證以頭痛惡寒為最確故首揭之成無己曰惡寒者嗇嗇然而憎惡也雖不當風仍自然覺寒惡風者見風之至則惡若得居於密室之內幃帳之中則坦然自舒也丹波元堅氏曰太陽病者表熱證是也蓋邪之初感必先犯表則正氣不暢併而為熱矣由此等注釋皆可得其一端然一言蔽之意謂不論何種病證若脈浮頭項強痛而惡寒時得以之為太陽病而實示太陽病之大綱也脈浮者為血液充盈於淺在動脈之候頭項強痛者頭部項部比於其他體部血液充盈之度強而為凝滯之所致惡寒者將欲發熱而不能發熱之徵也是以太陽病者為病毒集中於上半身之體表則治之者用發汗解熱藥而自汗腺排除之然病者之體質各不相同則處方亦隨之而各異也大凡人之體質千差萬別若窮極之則為二大別其一皮膚粗疏而弛緩有此稟賦之人若患太陽病則為脈浮弱自汗等之症狀以桂枝為主藥之桂枝湯治之可也其一為皮膚緻密緊張者有此體質若患太陽病則現脈浮緊無汗等之徵候故以麻黃為主藥之麻黃湯療之可也太陽病既有此二大別故今先就桂枝湯及其所從出之諸方講述之次及於麻黃湯及其所屬諸劑桂枝湯之注釋太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之傷寒論註太陽者為太陽病之略稱中風者中於風之意即現今之感冒也故所謂太陽中風者為脈浮頭項強痛而惡寒感冒之謂也陽浮而陰弱之陽為外之意陰為內之意陽浮而陰弱者謂脈有浮於外而弱於內之狀陽浮者熱自發陰弱者汗自出二句由脈狀而預斷熱與汗出之詞也嗇嗇惡寒者縮縮然怕冷也淅淅惡風者淅淅然如沃冷水而惡風之來襲也翕翕發熱者翕翕然熱出也鼻鳴乾嘔者鼻有聲而嘔惡也太陽病頭痛發熱汗出惡風者桂枝湯主之傷寒論太陽病下之後其氣上衝者可與桂枝湯若不上衝中者不可與之傷寒論註太陽病者可專發表不可下也醫誤下之因反動而致氣上衝者可與桂枝湯降其上衝之氣非其候者不可與之氣者觸於五官而無形然有活動力此所謂氣即神經作用之意上衝者方機中云凡上衝者非上逆之謂氣自少腹上衝胸者是也如是則氣上衝者即發作的上走性神經證之謂此是上衝之劇者其有緩者非必自少腹而上衝於胸只為上衝之應而但現頭痛耳前條之頭痛即是也太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之傷寒論註三日云者自患太陽病經過三日許之意發汗者桂枝湯證而誤以麻黃劑發汗也吐者太陽病不可吐復誤吐之也下者為不可下而下也溫針者太陽病當汗解古代民間療法燒針加於體表而劫熱也以上諸療法因均為誤治故病仍不解也此為壞病謂因上之誤治而使病證頹廢之意所謂與桂枝不中與者如此病證既然頹廢已無桂枝湯證之理則不宜再與此方也知犯何逆者應研究是否汗劑之逆治吐劑之逆治下劑之逆治抑溫針之逆治須審其誤治之經過也隨證治之與隨證而治二語似同而實異不可不辨隨證而治者以每一獨立症狀為目的而施治隨證治之者以各證相關連者為目的而行治療者也二者不可不辨例如脈浮弱頭痛發熱汗出惡風鼻鳴乾嘔之際以脈浮弱或頭痛或發熱或汗出或惡風或鼻鳴或乾嘔每一症狀為目的而治之者即為隨證而治者也以脈浮弱頭痛發熱汗出惡風鼻鳴乾嘔之所有症狀為目的而施治者即隨證治之也二者之間大相徑庭桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也當須識此勿令誤也傷寒論註解肌者和解肌膚之意桂枝本為解肌謂桂枝湯為本來和解肌膚之方暗示與麻黃湯純為發汗之劑功效不完全相同也故於次句脈浮緊發熱汗不出即當用麻黃劑而使發汗者斷言不可與此方此為桂枝麻黃應用上之重要鑒別點故復申言當須識此勿令誤也大書特書以示警告尾臺榕堂氏云若其人脈浮緊發熱不汗出則宜用麻黃湯是證而煩躁或渴者宜用大青龍湯可謂有識矣太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈傷寒論註當太陽病之有桂枝湯證與適方桂枝湯其煩當即可解而反不解者先刺風池風府再與桂枝湯即可愈矣所謂風池風府者甲乙經云風池之兩穴在顳顬之後髮際之陷中風府一穴在項之髮際之上一寸大筋宛宛中故可知風池在顳顬後頭縫合部風府在左右僧帽肌停止部之中央然何故必刺此三穴乃因本條之病證為太陽病則本為脈浮頭項強痛惡寒之證而頭項所以強痛既如前述頭項部比他部充血為甚若其充血更達於高度時雖與桂枝湯因阻止藥力而煩不解故刺此三穴使鬱滯之血液流通除卻阻止藥力之原因然後藥力可奏效也太陽病外證未解脈浮弱者當以汗解宜桂枝湯傷寒論註外證未解者頭項強痛惡寒等症狀未全去之謂也太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯傷寒論註為逆者為逆治之意而明非正治也欲解外者欲治外證之義也太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯傷寒論註太陽病先發汗不解一句意謂此太陽病宜用桂枝湯誤以麻黃劑發汗故不愈而復下之者不宜瀉下之太陽病而以瀉下一再誤治故特加復字也脈浮者不愈云者凡呈浮脈者病在外即在表之候宜發表為正當而反與以瀉下以致不愈之意也今脈浮更經再三之誤治仍見脈浮可知病尚在外即在表故當用發表劑治其外證即可愈也其發表劑宜用桂枝湯也病人藏無他病時發熱自汗出不愈者先其時發汗則愈宜桂枝湯傷寒論註藏即內臟診病者內臟無病則其病必在表有此表病而時時發熱自汗出久不愈者於其發熱自汗出以前發汗即愈宜用桂枝湯傷寒不大便六七日頭痛有熱小便反赤者與承氣湯其小便清者知不在裡仍在表也當須發汗若頭痛者必衄宜桂枝湯傷寒論註本條之前半論桂枝湯證與大承氣湯證之鑒別法甚重要也蓋大承氣湯證與桂枝證俱有頭痛有熱大相疑似也大承氣湯證者裡證即於消化管有急性炎證影響於頭腦而頭痛走於外表而發熱則其小便必為赤濁反之桂枝湯證者表證即病專在體表主證為頭痛發熱內臟無變化則決不呈尿變常澄清也又後半云若頭痛者謂頭痛有熱小便清其頭痛若劇者必衄血此證宜用桂枝湯也今推究其理既如前述此頭痛為太陽病本來之病勢上於頭項部充血頗甚血液難以暢流若此充血達於極度時血壓亦隨之亢進突破抵抗力最薄弱之篩骨蜂窩部而外走則為衄血故既衄血後血壓降低血液比較的得以流暢對於頭痛與其他症狀反有良好之影響此際與桂枝湯恰如刺風池風府後除去阻止藥力之原因則桂枝湯能盡量發揮其能力故頭痛衄血等皆得治之也傷寒醫下之續得下利清穀不止身疼痛者急當救裡後身疼痛清便自調者急當救表救裡宜四逆湯救表宜桂枝湯傷寒論註傷寒醫下之者謂醫誤與下劑續得下利者下劑之藥力雖盡下利尚不止也清穀謂完穀下利之無糞臭者當救裡者宜止瀉之意也清便自調者謂便通如平常當救表者當發表之意也傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯傷寒論註傷寒有桂枝湯證時用大瀉下或以麻黃劑發汗均為誤治於此誤治之後成心下痞頭痛發熱身疼痛惡寒者雖有心下痞表證未去者不可先攻其痞須先發表去其表證而後可攻痞發表宜用桂枝湯攻痞宜大黃黃連瀉心湯也前條是述四逆湯證與桂枝湯證之合併常法則宜先表而後裡然有下利清穀裡證亦不可忽視故宜先用四逆湯而後用桂枝湯也本條為桂枝湯證與大黃黃連瀉心湯證之合併而心下痞非如下利清穀之危急證則循常法先用桂枝湯而後用大黃黃連瀉心湯也陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯傷寒論註本條為陽明病與太陽病之合併證脈遲為陽明病之脈證汗出多者為二者共有之證然微惡寒者非陽明證而為表證也因此知表證尚存所以用桂枝湯也雖然此病證本來為陽明病而兼太陽病者則用桂枝湯者為一時之處置若表證全去仍宜以大承氣湯治陽明證也病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯傷寒論註病者煩熱即為熱煩悶因汗出一旦輕快後又發作如瘧於日暮時發熱者自表證直轉屬於陽明也若脈實者可與大承氣湯下之脈虛浮者宜以桂枝湯發其汗也尾臺氏曰病人煩熱云云此證雖脈虛浮恐用桂枝二麻黃一湯為佳此見甚是處方之際宜留意之太陰病脈浮者可發汗宜桂枝湯傷寒論註仲景曰太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬則太陰病者為嘔吐下利腹痛病證之名稱也本條之意謂以下利病而脈浮者發汗則愈其發汗宜用桂枝湯也下利腹脹滿身體疼痛者先溫其裡乃攻其表溫裡宜四逆湯攻表宜桂枝湯傷寒論註本條是述陰證之四逆湯證與陽證之桂枝湯證合併處即下利腹脹滿者四逆湯證也身體疼痛者桂枝湯證也而下利腹脹滿者重證故先用四逆湯治之身體疼痛者輕證故後以桂枝湯治之也吐利止而身痛不休者當消息和解其外宜桂枝湯小和之下利後身疼痛清便自調者急當救表宜桂枝湯以發汗傷寒論註二條雖俱說以桂枝湯治下利後身疼痛然不獨限於下利後也不拘任何之身疼痛其證存在悉以桂枝湯為主治可知矣產後中風續數十日不解頭微痛惡寒時時有熱心下悶乾嘔汗出雖久陽旦證續在者金匱要略求真按陽旦者桂枝之別名也註產後患感冒雖經過數十日未愈頭微痛惡寒時時發熱胃部苦悶乾嘔者雖感冒後經過頗久時日桂枝湯證依然存在者則宜仍用此方也桂枝湯方桂枝芍藥生薑大棗各克甘草克上銼細以水二合五勺煎成一合去滓一日分三回溫服桂枝加桔梗湯方於桂枝湯中加桔梗克煎法用法同前主治桂枝湯證而有咽喉痛或有黏痰難以咯出者或有化膿證者本方雖為吉益東洞翁之創方實合仲景之桂枝湯桔梗湯排膿湯三方而成者也桂枝加半夏湯方於桂枝湯中加半夏克煎法用法同前主治治桂枝湯證中有咽喉痛或咳嗽者本方本於仲景之桂枝湯半夏散及湯之方意合此二方而成者也桂枝湯之腹證由余之經驗芍藥大棗甘草之證必診得肌肉之攣急而就中成游離狀態之腹直肌最能明確觸知之故若認為此肌肉攣急時以之為三藥應用之目標以此肌之攣急稱為三藥之腹證然含此三藥之桂枝湯證亦有腹直肌攣急之現象則此三藥之腹證即不能不謂為此方之腹證也但如桂枝湯證非瘀血性之腹直肌攣急必現於右側而左側不全攣急即或攣急亦較右側為輕而於氣上衝之際亦必沿右側而發而左側不見矣上說純屬理論於實際上本方似當遵仲景所論以脈證外證為依據而應用之不問腹證亦可然不可先有成見也先輩之論說治驗方機本方條曰頭痛發熱汗出惡風者正證也頭痛一證亦當投以此方若由咳嗽嘔逆而頭痛者非此方所治也惡寒鼻鳴乾嘔者外邪之候也此方主之脈浮弱或浮數而惡寒者證雖不具亦當用此方浮數浮弱者蓋桂枝湯之脈狀也汗吐下之後更增一證發熱汗出身疼痛者猶當用此方若脈浮緊而疼痛者則非此方所治也成績錄曰一小兒外襲衄血門人某與麻黃湯衄益多先生診之與以桂枝加桔梗湯兼用黃連解毒散而愈求真按用桂枝加桔梗湯恐桂枝湯證之外尚有咽喉痛也用黃連解毒散者恐單用桂枝加桔梗湯之治衄血之作用猶感不足故也方輿輗曰痢疾初起脈浮而有表證者宜發汗論曰太陽與陽明合病者必自下利葛根湯主之太陰病脈浮者當發汗宜桂枝湯當以此二條為治利之準則吾國近來古醫方流行痢疾專用葛根湯可謂醫道闡明矣雖然此說一起時醫遇痢疾初起輒不詳察其脈證概用葛根湯者亦未必對也蓋此證初起有當發汗者有不當發汗者其當發汗者有桂枝證葛根證豈宜一律固定乎當發汗者宜從太陰病脈浮云云條又當下者本少陰病自利清水云云條而治之生生堂治驗曰一婦人患下利數年不進食形體羸瘦肌膚甲錯不能起臥醫時以參附訶罌之類治之先生診之曰百合篇所謂見於陰者以陽法拯之者也乃與大劑之桂枝湯使覆而取汗下利止更與百合知母湯以穀食調理之漸漸復原類聚方廣義曰桂枝湯者蓋經方之權輿也傷寒論資始於桂枝湯雜病論發端於瓜蔞桂枝湯必非偶然也此書亦列以桂枝湯為眾方之嚆矢仲景之方凡二百餘首其用桂枝者殆六十方其中以桂枝為主藥者垂三十方可見是方亦比其他諸方變化為最多也桂枝之醫治效用肘後百一方曰治卒心痛方桂末或乾薑末並二藥亦可獨用以溫酒服方寸匕須臾六七服則瘥心腹脹痛短氣欲死或治已絕之方桂三兩水一升二合合煎八合頓服之本草綱目曰桂氣味甘辛大熱有小毒主治霍亂轉筋頭痛腰痛出汗止煩止唾咳嗽鼻齆墮胎溫中堅筋骨通血脈疏理不足宣導百藥別錄補下焦不足治沉寒痼冷之病表虛自汗下部腹痛元素治寒疽風瘖陰盛失血瀉痢驚疳時珍桂心氣味苦辛無毒主治治九種心痛腹內冷氣痛不可忍結氣壅痹腳痹不仁止下痢鼻中息肉破血通利月閉胞衣不下甄權治一切風氣通九竅利關節益精明目暖腰膝治風痹骨節攣縮生肌肉消瘀血消痃癖癥瘕殺草木之毒大明風癖失音喉痹陽虛之失血癰疽內托痘疽能引血而化汗化膿時珍牡桂氣味辛溫無毒主治上氣咳逆利關節補中益氣本經心痛脅痛脅風溫筋通脈止煩止汗別錄去冷風疼痛甄權去傷風之頭痛開腠理解表發汗去皮膚之風濕元素泄奔豚散下焦之蓄血利肺氣成無己治橫行於手臂之痛風震亨和蘭藥鏡曰桂試效融和溫壯神經活潑健運精氣收固脈管之縱緩用於一切虛疲之證能挽回精力為壯神之要藥患者有虛憊之神經熱腐敗熱性之熱病尤兼胃腸諸證者有效熱病之患者虛脫而兼嘔吐者用桂為泡劑良有健胃及驅風之良效故胃腸虛衰而噁心嘔吐或下痢或兼風氣痞滯諸證經久而不治者多效發泄表發之蒸氣利小便治精力虛損之留飲停水難以運輸之水腫萎黃病處女病之虛弱諸證或婦人由抑鬱憂悶困苦窮厄等神思之勞傷而發為虛損之諸病加幾那鐵屑於桂中而為散劑多有驗治由子宮病及孕婦等之虛弱所發諸病或臨產婦人精力虛乏而發為痙攣衝逆眩暈昏瞶等更能催生下胞衣死胎治婦人因血液不足不能盈滿於子宮動脈而發生之經閉此證多為萎黃病之經閉或自子宮動脈弛虛緩弱而失括約發生之月經過多屬於諸失血虛弱證於桂中加入鐵劑等之收斂藥為散劑更易見效驅逐下利或淋疾白帶經久不治者於對證之散劑丸藥中用桂末加入尤良桂水試效以氣味芳竄爽活精氣溫壯虛冷而強健頭腦神經胃腸之衰弱有破氣驅風及鎮痙之殊效用於一切虛脫諸證為挽回精力之良藥子宮病喘息半身不遂搐掣癇瘛等用桂露加入適宜橙汁有良驗能使肺管凝著之黏液稀釋疏解而咯出開胸利肺治痰喘壅盛呼吸息迫等哮喘諸證以下方有殊效桂蔥救喘飲和漢藥物考曰桂皮中國產成分為揮發油桂皮油乃至樹脂護謨質糖質單寧酸等藥物學曰揮發油之作用揮發油除為一般刺激皮膚作用之外有多少之防腐作用且適量內服有健胃之效對氣管有防腐作用兼能減少分泌故適用於肺壞疽化膿性支氣管炎等又能利尿且對尿有防腐作用又其二三物質應用於神經性諸病芳香苦味藥純芳香藥及辛辣藥屬於此類藥物皆含有揮發油故多少具有防腐之作用得竄入於皮膚黏膜等組織內故有局部刺激作用外用則起灼熱充血之感覺若長用此劇烈之物則誘起炎證發為疼痛之水泡故含有一定之揮發油之生藥又為有效之皮膚刺激藥而內服之則刺激胃腸之黏膜一部為反射一部以充血之結果使其機能亢進且依其香味亦易於自口鼻之反射故為健胃藥其效力比苦味藥更大然頗劇烈若大量內服每易引起發炎若經常用則引起慢性胃病揮發油對腸之作用能亢進其機能促進其蠕動是以含有揮發油之藥物可用為驅風藥也若用大量則引起腹痛吐瀉且充血及於腹膜或波及其接近部之臟器是以此種藥物有時用為通經藥有時則為子宮出血流產等之原因也揮發油於通常量雖不可謂有吸收作用然其一部自肺排泄容易咯痰故應用於支氣管疾患又其一部與糖碳基酸結合而出於尿中呈利尿作用但用大量則刺激腎臟發為蛋白尿等由肘後百一方至和蘭藥鏡所說知桂枝有發汗解熱及止汗作用鎮靜鎮痙鎮痛作用興奮強心強壯作用祛痰作用健胃驅風作用疏通瘀血通經催產及下胎盤死胎之作用利尿作用矯味矯臭作用於和漢藥物考則桂枝之主要成分因含有桂皮油及揮發油故藥物學所載揮發油之醫治效用可謂即桂枝之醫治效用也是則桂枝有防腐刺激皮膚鎮靜鎮痙健胃驅風通經祛痰利尿諸作用也明矣茲可謂以科學證明舊學說之少分又仲景之所以多用桂枝亦可謂略得闡明矣雖然於臨床上皮膚鬆粗而弛緩且易自汗者之體質與上衝證為主目的上記諸說為副目的而應用桂枝可也今更參照下說藥徵曰桂枝主治上衝也兼治奔豚頭痛發熱惡風汗出身痛也氣血水藥徵中桂枝條曰是皆衝氣之證也在表則為頭痛為惡寒為疼痛在裡則為悸為上衝若小便不利則有桂枝若自利則無桂枝也芍藥之醫治效用東洞翁歷觀仲景之芍藥去加諸方而歸納之曰芍藥者為主治結實而拘攣也兼治腹痛頭痛身體不仁腹滿咳逆下利腫膿也此言信而有徵欲解說之則用芍藥之目的為肌肉之觸診上有凝結充實之感覺而攣急也故腹痛頭痛身體不仁疼痛咳逆下利腫膿悉得治之而診其結實拘攣在於腹直肌既述於上是本藥之應用原則盡於翁之所說矣然關於其枝葉之知識亦有時而需要之今揭之於下本草備要曰白芍苦酸微寒安脾肺固腠理和血脈收陰氣斂逆氣酸主收斂也緩中止痛斂汗安胎補勞退熱治瀉利後重脾虛腹痛心痞脅痛肺脹喘逆其收降之體又能入於血海至於厥陰治鼻衄目澀肝血不足婦人胎產及一切血病傷寒論正義曰逐水氣之劑未有如芍藥者和蘭藥鏡曰芍藥試效用根生根微有麻醉催眠質之臭氣乾者其臭消而為微甘苦收斂也為鎮痙止痛藥之一自神思感動而發之痙攣搐掣諸證神經諸肌之攣急頭旋眩暈癇證睡魘小兒癇瘛子宮衝逆痛痛風等有良效和漢藥物考曰由朝比奈博士奧野改造氏之報告芍藥中含有之安息香酸芍藥應用上之注意芍藥為一種收斂藥如欲發汗祛痰瀉下利尿諸作用以不用此藥物為宜故於一種止汗藥之桂枝湯中有芍藥而為猛發汗劑之麻黃湯大青龍湯中則無之為鎮咳劑之小青龍湯中有芍藥而祛痰劑之桔梗湯排膿湯中則無之止瀉劑之桂枝湯桂枝加芍藥湯黃芩湯中有芍藥而大瀉下劑之小承氣湯大承氣湯大黃牡丹皮湯中則無之利尿劑之越婢加朮湯五苓散豬苓湯中亦無之也夫以是項單純之理由固不足以規律全體然用芍藥為配合劑者於此點不可不深加注意也大棗之醫治效用東洞翁曰大棗主治攣引強急也兼治咳嗽奔豚煩躁身疼脅痛腹中痛此說頗有卓見茲詳解之且補其不備大棗之主治攣引強急者雖同於芍藥但芍藥適應於肌肉拘攣而為凝結充實之觸覺而大棗則適應於肌肉知覺過敏且牽引痛甚故大棗兼有利水作用也此所以有水毒而禁忌芍藥時而反適用大棗也即於十棗湯葶藶大棗瀉肺湯越婢加朮湯麻黃連軺赤小豆湯等之驅水劑亦用之也傷寒論正義茯苓桂枝甘草大棗湯條曰病人有水氣故以茯苓大棗治水氣也山田業廣氏曰用多量之大棗如仲景之炙甘草湯橘皮竹茹湯等用三十枚當歸四逆湯用二十五枚年少之時不能玩索其精義漫覺此三方用多量之大棗以後世方每於方後加薑棗引為怪迨年長始能領會大棗之所長於本草養脾平胃氣成無己注中以甘緩之等義雖任何人亦能知之但補心氣與成氏之十棗湯注中云大棗之甘益土勝水云云則心知其意者鮮如甘麥大棗湯之大棗即補心脾苓桂甘棗湯之大棗有逐水之功也以上二說可為我說之證甘草之醫治效用甘草與大棗俱為緩和藥之代表故有緩解組織之作用尤以因肌肉之急劇緊縮所發疼痛及其他諸般急迫症狀為宜比之大棗其緩和作用則勝之然治牽引痛及利水之能力則不及也於腹證上彼此大同小異東洞翁曰甘草主治急迫也故治裡急急痛攣急而兼治厥冷煩躁衝逆等諸般急迫之毒也又曰仲景之用甘草也其急迫若劇則用甘草亦多不劇則少由此觀之則甘草之治急迫也明矣古語曰病者苦急急食甘以緩之洵當服膺之言也然此語失於簡約初學者不易通曉故以前輩所說擴充之饗庭家秘說曰只知甘草有緩急迫之能者此大謬也以不僅甘草但食之味甘者其效能雖有多少厚薄之不同然俱能緩急迫如人參阿膠大棗等之類亦有緩急迫之功能也甘草俗醫有用梢末者畢竟亦有緩急迫之效也古方中炙甘草湯芍藥甘草湯建中湯甘草粉蜜湯茯苓甘草湯甘草瀉心湯之類若不倍加甘草則宜知其均為無效之方其中甘草大黃湯等合大黃之下甘草之緩而其證早解甘草粉蜜湯等之切痛亦以甘草之以甘緩故有效也此外如建中湯有飴亦以飴之甘緩其急痛故亦有效也由此等配劑甘草有緩急迫之效能當切心體會而用之也可一人患大便秘結用一切之通下藥不能治因用大黃甘草湯以倍加甘草則大便暢通此處亦以大黃通氣以甘草緩肛門之急迫因而大便暢通也其後考知此理凡秘結之證倍加甘草而得屢效調胃承氣湯之有甘草亦可知皆是緩急迫而取效之方也方名雖有調胃之名然其實則不然予治一小兒其證足不舒用芍藥甘草湯五六帖而足舒此因以甘草之甘而緩其筋急之故也以上之經驗可知皆由緩急迫之功能而著其效也於發積氣之急用甘草蟲痛甚亦用甘草腫物等痛甚用甘草中風中氣等之拘攣亦用甘草皆因緩其病以取功也善考其理於諸病多經驗之一醫之醫案云一人常性急氣甚是皆積氣也胸下如有棒與大柴胡湯倍加甘草此證用甘草可知以甘草緩其性急與積氣也又云近世太平之人過於逸樂而肝積之人多宜用大柴胡加甘草湯等此外甘草之藥劑多源於此是亦以柴胡治肝鬱甘草緩肝積之意也又云甘麥大棗湯以各等分而用甘草亦以甘草緩肝積也求真按大柴胡湯中加甘草雖不得不謂為大柴胡湯芍藥甘草湯合方之意然由余之經驗於此症狀反用大柴胡湯桃核承氣湯合方之機會為多由此所說東洞翁立言之一部具體的解釋之即欲試轉眼光於西洋學說而觀察之也據藥物學則甘草屬於矯正藥中之甘味藥而矯正藥味之外不僅對咽喉氣管之分泌亢進有效而使容易咯痰且含有甘草糖酸之有甘味膠樣糖質及糖澱粉黏液質同時可知兼有黏滑藥之作用也然為黏藥則其同書中云用作黏滑藥有偉大分子量無晶形膠樣之物質取水分時漸漸膨大遂有形成黏稠之假性溶液之性用以敷於黏膜創面等全無化學的與生理的之能力惟機械的包攝之但對於外表之相當刺激有防禦之功能耳即味覺溫覺痛覺等皆由黏滑藥而鈍麻例如砂糖之水溶液與同一之比例溶液之於樹膠漿中則不同其甘冷水比同一溫度之乳汁使大感低溫以苛辣刺激之味亦加入黏滑藥時則成為微弱局部刺激藥之作用亦由黏滑藥而緩和以加入一二滴芥子油之水注射於腸管之一部結紮其上下即時黏膜發赤腫脹腸腔充滿炎性滲出液若用之阿拉伯膠漿溶液代水時僅至充血而已黏滑藥之消化溶解不迅速以其吸收非常緩慢且同時被水及其他易吸收物質所阻礙故凡欲使藥物作用於腸管則宜擇含有黏滑藥之生藥為便利又如內服黏滑藥之量大時腸內容稠厚發為瀉下恰等於硫酸鈉等之鹽類下劑黏滑藥用於腸管之卡他症狀時則被包腸壁以防刺激故有抑制疼痛鎮靜反射的蠕動以促其治愈之效尤於腸管內刺激性之分解產物發生之時為然且又用於腐蝕性或刺激性物質之中毒或為有刺激性味藥物之調味等或為防止瀉下藥驅蟲藥之吸收而配入之又往往用為賦形藥或結合藥黏滑藥者樹膠澱粉及含此等性質之生藥是也如上說則可移黏滑藥之醫治效用而為甘草之醫治效用此森島氏之所論以科學的立證說明東洞翁學說之一部吾人得益不鮮然甘草之應用僅止於皮膚口腔咽喉支氣管腸疾病等未及於他體部之病證實不備也生薑之醫治效用生薑為矯味藥則等於桂枝大棗甘草至於其他之作用則大異其趣主治由水毒之上逆而咳嗽呃逆噁心嘔吐等證由本藥之應用水毒以之下降以此藥兼有利尿作用得排除於體外故胃內之停水自然消失使食欲亢進且本藥之健胃作用不但此也其主要成分之揮發油於胃黏膜刺激作用亦大有力焉故本藥有下降水毒利尿黏膜刺激之作用如欲達鎮咳鎮嘔及其他之目的狀況始可用之若胃內不獨毫無水氣反因高熱持久體內外俱甚乾燥而欲速使濕潤時則宜禁忌也仲景於大熱病之治劑如白虎湯白虎加人參湯白虎加桂枝湯調胃承氣湯大承氣湯等不用之者蓋有故矣本草備要曰生薑辛溫祛寒發表宣肺氣解鬱調中暢胃口開痰下食治傷寒之頭痛傷風之鼻塞咳逆嘔噦胸壅痰膈寒痛濕瀉消水氣行血閉救暴卒凡中風中氣中暑中惡一切暴卒之病薑汁和童便飲有效薑汁開痰童便降火也療狐臭薑汁頻塗搽凍耳熬膏塗殺半夏南星厚朴菌蕈野禽之毒早行時含一塊辟霧露山嵐邪氣搗汁和黃明膠熬貼風濕痹痛久食則積熱患目多食兼酒則發痔瘡癰之人多食則生惡肉若要涼則留皮皮者辛涼和脾行水治皮膚水腫腹脹痞滿也桂枝加桂湯之注釋燒針使汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩傷寒論註古代有燒針刺於人體使發汗之療法此原非正治而仲景特舉之者因誤治病證轉變之際而立應之之方法也本條之意以燒針所刺之部分被寒邪氣即受細菌之侵入發赤腫脹者必發奔豚奔豚者即氣自下腹部上衝心臟也於其發赤腫脹處施灸一壯與以桂枝加桂湯則奔豚即治云所謂奔豚者類聚方廣義中藤田椿齊曰奔豚者言悸而衝逆甚之狀也金匱要略中曰奔豚病起自少腹上衝咽喉發作欲死復還止豚與遯遁古字通用案吳昆之素問陰陽別論息賁注中曰賁同奔息奔者氣息奔迫也此亦可謂併發奔豚之義古方便覽本方條云所謂奔豚氣者塊物自少腹急起向心下衝或如刺痛或有積氣者有此證宜選用三黃丸或硝石大丸一男子年六十患積聚數年發作有時奔豚氣上衝於心不能息氣力全無不得俯仰不思飲食以此方兼用三黃丸而愈後不再發證治摘要曰桂枝加桂湯治氣自少腹上衝者上述即為發作的上衝性神經證之劇烈者也本方不過桂枝湯之桂枝增量則為其主治雖無大差然桂枝湯以桂枝之量少故治上衝之輕證本方以其量多故療劇證有差別也此東洞翁所以下本方定義為治桂枝湯證之上衝劇者乃不易之言也桂枝加桂湯方桂枝克芍藥大棗生薑各克甘草克煎法用法同前桂枝加芍藥湯及桂枝加芍藥大黃湯之注釋本太陽病醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之大實痛者桂枝加大黃湯主之傷寒論註本為太陽病則宜汗解醫反誤下之因而腹部膨滿至於時時腹痛者屬於太陰病為桂枝加芍藥湯所主治也然不惟腹滿更於腹內充實有毒而疼痛者則以桂枝加大黃湯主治也所謂太陰病者即如前所述之嘔吐下利腹痛等證屬者附從之謂蓋本條之病證雖因誤治變為太陰病然有終未全變之意也桂枝加芍藥湯方桂枝大棗生薑各克芍藥克甘草克煎法用法同前桂枝加芍藥大黃湯方桂枝大棗生薑各克芍藥克甘草克大黃克煎法用法同前桂枝加芍藥湯及桂枝加芍藥大黃湯之腹證桂枝加芍藥湯證如東洞翁云腹滿時痛者即拘急而痛也故獨以芍藥為主蓋因腹直肌之攣急過甚有自覺的疼痛且腹壁膨滿者則以芍藥為主藥之此方治之也桂枝加芍藥大黃湯證雖與前者無大差異然其所以大實痛者不僅腹直肌之攣急而已並為腸內有病毒則以桂枝加芍藥湯治腹直肌之攣痛以大黃驅除腸內之病毒也故於診腹上桂枝加芍藥湯證則恰如按鼓皮僅腹肌攣急膨滿而腹內空虛也而桂枝加芍藥大黃湯證者則並其腹內亦觸知多少之抵抗以指壓之而訴疼痛也此二方證如前述可謂漸漸移行於太陰病而云本太陽病則脈浮頭項強痛惡寒等證尚依然存在此不可忘也是以東洞翁對前者謂桂枝湯證而以治腹拘攣劇者為定義後者為桂枝加芍藥湯證而以治有停滯者也先輩之論說治驗方輿輗曰桂枝加芍藥湯此乃其人宿有癥瘕痼癖兼以痢疾而引起固有之毒因之腹痛者主用之劑也假令因宿食而腹痛吐瀉以後尚腹痛不止者此由有固有之毒蓋桂枝加芍藥湯者用於痢毒不甚強只痛甚或痢毒既解而痛不止之類皆因其有固有之毒也有固有之毒之人其腹拘攣或有塊者又毒劇痛不止者桂枝加芍藥大黃湯主之桂枝加芍藥大黃湯既粗辨於前曾有一人病痢用桂枝加芍藥大黃湯其人於左橫骨上約二寸處疼痛不堪始終以手按之用此方痢止痛亦治是痢毒也此方痢疾初起有表證腹痛而裡急後重不甚者用之此表證比葛根湯等為輕又有痢疾初起則用桂枝湯等而腹痛少強者用此方亦有用於痢中之調理者其痛劇時先用之以和痛而制之也求真按此二方證者與桂枝茯苓丸證桂枝茯苓丸加大黃證易誤也然前二者主右腹直肌攣痛後二者主左腹直肌攣痛是則有分別矣麻疹一哈曰予嘗治一婦人發熱僅二三日疹子已出復驟隱診之腹滿拘攣甚臍邊有結塊自言經信不利因作桂枝加芍藥湯使飲之又雜以浮石丸方中有芒硝使服其夜發熱甚疹子從汗出經信利而諸證自安求真按此證始由表轉入於裡及內然以適治乃由內及裡轉出於表也大倉氏以桂枝加芍藥湯兼用浮石丸然予以為當處以桂枝加芍藥湯桂枝茯苓丸加大黃之合方一人年二十有五發熱如燃而無汗經四五日疹子不出腹滿拘痛二便不利時或腰甚痛因作桂枝加芍藥大黃湯使飲之微利二三行拘痛漸安兼用紫丸下之下水五六行其夜熟眠發汗如洗疹子隨汗出疹子收全復舊東洞南涯二翁與其門人及其同派之醫以此二方加用附子或朮附治梅毒性風濕病腳氣等證云桂枝去芍藥湯之注釋與腹證太陽病下之後脈促胸滿者桂枝去芍藥湯主之傷寒論註意即太陽病者當汗解為醫誤而下之致氣上衝脈促胸滿即心下膨滿者以本方主治之與太陽病下之後氣上衝者宜與桂枝湯之時相似然其間自有差別即桂枝湯證雖經誤治未至腹力脫弱腹直肌尚攣急故用有芍藥之桂枝湯然本方證由誤治腹力既脫弱腹直肌不惟不攣急且此腹力脫弱使上衝證增劇並使脈促胸滿故用桂枝湯去芍藥之本方以應之也此東洞翁所以下本方定義為治桂枝湯證之不拘攣者以其不拘急故去芍藥也桂枝去芍藥湯方桂枝大棗生薑各克甘草克煎法用法同前桂枝加葛根湯之注釋太陽病項背強几几反汗出惡風者桂枝加葛根湯主之傷寒論註項背強几几者為項背肌之強直性痙攣處治以葛根為君藥之本方也強几几與汗出之間所以用反字者為示以本方證與葛根湯證之鑒別法也即葛根湯亦以葛根為君藥與本方同雖有項背几几證然葛根湯證有臣藥之麻黃故有無汗之證而本方中以無麻黃不惟無無汗證反如桂枝湯證之自汗出故特用反字也本方證與葛根湯證大相類似然暗示其間有汗出與無汗之別之意也東洞翁下本方之定義曰治桂枝湯證而項背強急者可謂得其要矣桂枝加葛根湯方桂枝芍藥大棗生薑各克甘草克葛根克煎法用法同前瓜蔞桂枝湯之注釋太陽病其證備身體強几几然脈反沉遲此為痙瓜蔞桂枝湯主之金匱要略註太陽病其證備者謂脈浮頭項強痛惡寒等證悉具也身體強几几者謂身體全部起強直性痙攣也加然字者示強直之不劇也又用反字者因太陽病脈必浮本方證反沉遲也瓜蔞桂枝湯方桂枝芍藥大棗生薑各克甘草克瓜蔞根克前藥細銼以水三合煎一合去滓一日分三回溫服瓜蔞根之醫治效用本藥因虛熱臟器組織枯燥之結果而於外表發輕微強直性痙攣於裡現口燥口渴及其他之症狀故本藥之解熱止渴作用類乎石膏然石膏多用於實熱其渴極劇烈而有煩渴欲引飲飲水數升之狀然本藥主用於虛熱其渴大概不劇雖嗜水而無煩渴引飲之情又本藥主治虛熱止渴鎮咳作用似乎麥門冬然麥門冬之治虛熱以鎮咳作用為主止渴作用為客本藥之治虛熱以止渴作用為主以鎮咳作用為客也又本藥之治虛熱止渴作用類似地黃然地黃之治煩熱以治血作用為主而以止渴作用為客也本藥但治虛熱而不能治煩熱又不能治血證而止渴作用為強是以本藥少與石膏為伍而多與麥門冬地黃合用也又石膏主用於肺結核之初期中期絕少用於末期者而本藥與麥門冬地黃則少用於其初期而多用於中期以後也本草綱目曰瓜蔞根根修治為天花粉氣味苦寒無毒主治消渴身熱大熱補虛本經除腸胃中之痼熱唇乾口燥短氣止小便通月水別錄治狂熱時疾消腫毒乳癰發背痔瘻瘡癤排膿生肌長肉消撲損瘀血大明發明恭曰用根作粉則潔白美好食之則大宜於虛熱杲曰瓜蔞根解消渴行津液心中枯涸者非此不能除成無己曰津液不足則渴瓜蔞根潤枯燥通津液是以宜於治渴也時珍曰瓜蔞根能止渴潤枯下火不傷胃附方虛熱咳嗽天花粉一兩人參三錢為末每服一錢米湯下集簡方乳汁不下燒瓜蔞根存性研為末飲服方寸匕或以酒水煎服五錢楊氏產乳蕉窗雜話中曰乳汁不通者無格別之子細只欲通而不能通也不拘虛實以極上品之天花粉附以砂糖等作餅如葛糕大抵食三斤許則必出也橘窗書影中曰一婦人年四十後時時發血熱肩背強急發齒痛與小柴胡湯加地黃瓜蔞根而痊愈余於小柴胡湯加瓜蔞根者非去半夏加瓜蔞根之意也是本瓜蔞桂枝湯之意也凡熱者之宗筋為之乾燥強急故以清熱劑加瓜蔞地黃滋潤之品時奏效頗速千金獨活湯之地黃亦此意也和漢藥物學曰瓜蔞根天花粉形態本品如甘藷為長形之肥大根成連珠狀外部黃褐色內部呈白色含有多量之澱粉由此瓜蔞根所得之澱粉稱為天花粉為白色之粉末而質重插入銅匙亦不黏著者藥物之醫治效用僅由其主要成分之性能不能判定桂枝加葛根湯之君藥為葛根瓜蔞桂枝湯之主藥為瓜蔞根均以澱粉為其主要成分而一以治項背強几几與脈浮一以治身體強几几然與脈沉遲其作用異者何也此理雖屬不明然分析上因含有一主要成分之藥物亦當有同一之效果誠為辯論家所執之一端耳淺田氏曰專以分析判藥之效能者如割木而求花但知歌頌科學而不知有他之醫家以為何如桂枝加黃耆湯之注釋黃汗之病兩脛自冷假令發熱此屬歷節金匱要略註黃汗之病由於表虛兩脛冷者陽氣不旺於下也凡表虛者氣衝逆氣衝逆者下部自冷是內因病之常情也假令雖發熱知非外因之邪氣此病以汗由歷節出屬歷節病屬者附從之義以示非主證也名從主人故謂屬歷節病歷節者歷節痛而黃汗出之病名食已汗出又身常暮盜汗出者此勞氣也金匱要略註又者非一次之謂食事畢出汗又每於日暮時煩躁於寐中盜汗出者此為勞氣使然也盜汗者睡寢間出汗之名勞氣者正氣衛於表津液潛於內今腠理不密者因疲勞而失其守衛也不可誤認為心氣之勞暮出汗者蓋由熱而出之汗虛熱者其發多自午後若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡金匱要略註凡發熱者汗出已即解今汗出已而發熱者是反常也故加反字然則此發熱非表證而由於氣血之鬱氣血之鬱乃正氣之勞也此汗此熱久久不止則津液枯竭而其身必甲錯也甲錯者肌膚如鮫皮也發熱不止氣血之鬱不散故必知其將生惡瘡成癰膿也若身重汗出已輒輕者久久必身瞤瞤即胸中痛金匱要略註若汗未出之前身重汗出已輒輕者其身重因肌表有瘀水也此證久久不止必身瞤動此為水氣入經而衝逆之候也若身動即胸中痛是其瞤由水氣之衝逆故同時胸中痛者氣上衝胸也瞤下用即字者當時即痛不容有間之意此段較前段虛候尤重一等又從腰以上汗出下無汗腰髖弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃耆湯主之金匱要略註此一段承前四段論又一等之劇證故以又字接上也從腰以上必汗出下無汗之二句應前之兩脛自冷下部冷而汗不出也及於腰以下者比脛冷重一等也弛者鬆也腰髖者腰之畔處如鬆緩而痛是由瘀水與鬱熱也如有物在皮中者麻痹之狀也覺循肌隔一物在皮中身外無樣可覺也此有瘀水在腰中陽氣不能達於下部也劇者不能食者因衝逆頗劇胸中窒塞雖欲食而不能食也不能二字非謂無食意乃雖欲食不能食之意例曰身腫而冷狀如周痹胸中窒不能食反而聚痛暮躁不得眠此為黃汗是也乃應前之胸中痛之句而至於劇一等也身疼重亦由瘀水與鬱熱應前之身重也煩躁者應前之暮盜汗出例所謂煩躁不得眠是也小便不利者由氣不下降也加以上諸證而汗出者名之真黃汗病而其治法以調和營衛使血氣不鬱滯衝氣自降矣以桂枝湯為本方更加托表而實肌膚之黃耆使服之則陽氣旺於肌膚衝氣自然低降腠理自然固密而瘀水不能停留小便自然清利諸證悉退信有徵也諸病黃家但利其小便假令脈浮者當以汗解桂枝加黃耆湯主之金匱要略註諸種之黃疸病者只用利尿劑使尿利則治矣然若假定脈浮則當以發汗劑治之是即本方主治之意也桂枝加黃耆湯方桂枝芍藥大棗生薑各克甘草克黃耆克煎法用法同桂枝湯黃耆之醫治效用本藥之作用予雖未知悉然涉獵群籍而揣摩之則此藥主治身體虛弱皮膚營養不良而水毒停滯於皮膚及皮下組織內之一種強壯性止汗利尿藥本草綱目曰黃耆氣味甘微溫無毒主治排癰疽及久敗瘡之膿而止痛本經補丈夫之虛損五勞羸瘦別錄助氣壯筋骨長肉補血破癥瘕瘰癧癭贅日華治虛勞自汗補肺實皮毛益胃氣去肌熱及諸經之痛元素發明元素曰黃耆其用有五補諸虛不足一也益元氣二也壯脾胃三也去肌熱四也排膿止痛活血生血內托陰疽為瘡家之聖藥五也好古曰黃耆治氣虛之盜汗並自汗及膚病附方小便不通綿黃耆二錢水二盞煎一盞溫服總微論藥徵曰黃耆主治肌表之水也故能治黃汗盜汗皮水兼治身體腫或不仁桂枝加芍藥生薑人參湯之注釋發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之傷寒論註仲景附如是之方名者因凡方劑當隨證加減勿使死守不能固執一方本條脈沉遲者裡證即為胃虛衰之應徵然表證尚未去則如例用桂枝湯新加人參增加生薑以復胃之虛衰增加芍藥以治身體疼痛也東洞翁稱本方為桂枝加芍藥生薑人參湯以治桂枝湯證而心下痞硬身疼痛及嘔者為定義又主心下痞硬或有拘急或有嘔證者良說也然增量生薑者不惟使此藥獨治嘔證亦以輔佐人參促進健胃作用故本方定義治桂枝加芍藥湯證而有心下痞硬時嘔身疼痛者然所謂之心下痞硬痞者胸塞之意硬者堅固之義也則心下痞者即自他覺的胃部停滯膨滿之意而心下痞硬者即於此膨滿部觸知一種之抵抗之意也然人參主治心下痞硬與大柴胡湯等之實證全異屬於虛證也故不如實證之堅硬恰如撫薄板止於凝結物之程度而已又此心下痞硬者為一種虛證與桂枝去芍藥湯之胸滿及苓桂朮甘湯之心下逆滿頗類似然此二方之胸滿逆滿者不過為氣上衝之餘波上衝劇時則呈現顯著上衝稍降時減弱上衝全下降時則消失為不定之症狀不同於人參主治恒存的心下痞硬胸滿逆滿只於心下部膨滿而止無有抵抗亦與人參主治之心下痞硬有別桂枝加芍藥生薑人參湯方桂枝大棗人參各克芍藥生薑各克甘草克煎法用法同前先輩之治驗續建殊錄曰一老人大便不通數日上逆頭眩醫與以備急丸而自若因倍加分量而投之得利於是身體麻痹上逆益甚而大便復結更醫診之與以大劑承氣湯一服不得下利服三帖下利如傾盆身體冷痛不得臥大便復結又轉醫作地黃劑使服之上逆尤劇面色如醉大便益不通於是請治於先生先生診之心下痞硬少腹無力即與桂枝加芍藥生薑人參湯服之三帖衝氣即降大便通快經過二三日冷痛止得臥大便續通快二旬之後諸證去而復常求真按不用下劑而使大便通快此中藥方之至妙處也麻疹一哈曰一婦人年三十餘發熱二三日身熱驟退口鼻清冷四肢微厥診脈難以摸索頭出冷汗時或嘔逆按其腹狀心下痞硬臍腹拘急頗甚自言月經不來已兩月與桂枝加芍藥生薑人參湯明日蒸蒸發熱遍身出汗疹子從汗出而拘急未安兼與浮石丸方中有芒硝約三四日月經利而倍常疹收而後復常求真按本方兼用浮石丸不如本方合用桂枝茯苓丸加大黃為佳人參之醫治效用人參以治胃衰弱痞硬由於新陳代謝機能之減衰為主目的與續發之食欲不振噁心嘔吐消化不良下利等之症狀為副目的而用之反之則必有害而無效也故假令雖有胃衰弱之徵然無心下痞硬者則不宜用本藥雖有心下痞硬若非此機能減衰之候亦不宜用本藥例如柴胡桂枝乾薑湯證雖屢呈胃衰弱胃內停水然心下不痞硬故不用本藥大柴胡湯證雖有心下痞硬然此痞硬係實證且是證之總因為新陳代謝機能之亢進故亦不用本藥也又附子之證為此機能極度減衰故頗類似於本藥證但無心下痞硬故分別之不難由此觀之人參者為振起復興新陳代謝機能之衰減但不如附子之作用猛劇故此藥雖用於機能亢進之陽證亦有利而無害也此少陽之原方小柴胡湯中所以亦用本藥也以是可知二藥之別矣本草綱目曰人參氣味甘微溫而無毒主治安精神定魂魄止驚悸本經療胃腸中冷心腹鼓痛胸脅逆滿霍亂吐逆通血脈破堅別錄主五勞七傷虛損痿弱止嘔吐消胸中之痰治肺痿及癇疾之冷氣逆上傷寒之食不下凡因虛而多夢紛紜者加之甄權止煩躁變酸水李殉消食開胃大明治肺胃之陽氣不足肺氣虛促短氣少氣補中緩中止渴生津液元素治男婦一切之虛證發熱自汗眩暈頭痛反胃吐食痎瘧滑利久利小便頻數瘰癧中風中氣痿痹吐血嗽血下血血淋血崩胎前產後之諸病時珍求真按云腸胃中冷曰冷氣逆上云陽氣不足者即為新陳代謝機能衰減之候治之以人參理所當然也安精神定魂魄止驚悸者為此藥治胃性神經證之佐證也又通血脈者為此藥鼓舞新陳代謝機能衰減之結果而破堅者即謂此藥之治心下痞硬作用也又此藥之治吐血嗽血下血血淋血崩者為前機能衰減過久因而血管弛弛不能制止血液之滲漏而以限制此類之出血可知非為純粹之止血藥也藥徵曰人參主治心下痞堅痞硬支結兼治不食嘔吐喜唾心痛腹痛煩悸桂枝加厚朴杏子湯之注釋喘家作桂枝湯加厚朴杏子佳傷寒論註喘家謂本來有喘證病者故本條之意指原有喘證人若現桂枝湯證時於此湯加厚朴杏子則佳也太陽病下之微喘者表未解故也桂枝加厚朴杏子湯主之傷寒論註太陽病如法不汗解而誤下時多為氣上衝若微喘者為表證未去之徵然桂枝湯不能獨力治之當加厚朴杏子如本方始可治之也東洞翁下本方之定義云治桂枝湯證而胸滿微喘者至言也所以追加胸滿二字者以本方中有主治胸腹滿之厚朴則其證當有胸腹滿然厚朴之用量少故只表胸滿而無腹滿比之桂枝去芍藥湯之胸滿則本方證為比較的實證而恒存者也又此胸滿與人參主治之心下痞硬有異蓋彼為局限的痞硬而此為普遍的膨滿也桂枝加厚朴杏子湯方桂枝芍藥大棗生薑各克甘草厚朴杏子各克煎法用法同前先輩之論說類聚方廣義本方條曰本有喘證則謂之喘家喘家見桂枝湯證者以此方發汗則愈若喘因邪而其勢急邪乘喘而其威盛者非此方所得而治也宜參考他方以施治不宜拘拘也求真按此說可信桂枝加附子湯之注釋太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之傷寒論註太陽病桂枝湯證以麻黃劑誤汗其藥力雖盡而漏汗不止病者惡觸於風小便難通四肢稍攣急難以屈伸者以本方為主治也所以汗漏不止至於惡風者由誤治而皮膚虛衰乃半移行於陰證故也小便難通者因汗漏出不止失去多量液體之結果四肢微急難以屈伸者亦由體液亡失肌肉之營養失調也以上之症狀可謂因於誤治表證尚未全去同時陷於陰虛證者則用桂枝湯以解表證以附子治陰虛證也故本條之病證可知其為虛證而表裡陰陽各相半也桂枝加附子湯方桂枝芍藥大棗生薑各克甘草克附子克煎法用法同前桂枝加朮附湯方前方中加朮克煎法用法同前桂枝加苓朮附湯方前方中加茯苓克煎法用法同前求真按此二方者為東洞翁之創製然余不用前方惟用後方耳桂枝加苓朮附湯之鄙見桂枝加苓朮附湯者為吉益東洞翁之創方然其實不出仲景之桂枝加附子湯及桂枝去芍藥加茯苓朮湯之合方故於本方當然含此二方之精神又不僅包含為此二方原方之桂枝湯方意且本方中包含茯苓桂枝朮甘草故寓苓桂朮甘湯之精神又以有茯苓芍藥生薑白朮附子亦含蓄真武湯之方意故本方者宜參照關於桂枝湯桂枝加附子湯桂枝去芍藥加茯苓朮湯真武湯之仲景論及諸說而活用之概括的說明之至難也是以本方意複雜而臨床應用範圍廣大也先輩之論說治驗類聚方曰桂枝加附子湯者治桂枝湯證之惡寒或肢節微痛者求真按此說作本方之定義甚為不備因桂枝湯證已有惡寒身疼痛之證不加陰證之二字則不足為本方之定義也方機曰濕家骨節疼痛者兼用應鐘七寶或半身不遂口眼喎斜者兼用南呂或紫圓或頭疼重者兼用應鐘或身體麻痹者或頭痛劇者桂枝加朮附湯主之濕家眼目不明者兼用應鐘或紫圓或七寶或耳聾或肉瞤筋惕者桂枝加苓朮附湯主之求真按東洞翁治術往往過劇而有濫用峻下劑之癖故關於所說之兼用方不宜盡信也建殊錄曰老人病後肘骨突出難以屈伸先生診之腹皮攣急四肢沉惰時有上逆作桂枝加附子湯及芎黃散使飲之時以梅肉散攻之數十日肘骨復故屈伸如意求真按腹皮攣急者即右腹直肌攣急之謂時有上逆者時時有上衝發作之意也一病者臥病三年許其病口眼喎斜四肢不遂居常唾涎語言難通先生診之作桂枝湯加朮附各三兩使飲之時以平水丸雜進出入半歲許全復常續建殊錄曰一男子嘗患頭重而微痛鼻中冷清涕不止者有年於是按其腹自少腹至心下攣急脈微細飲食如平日與桂枝加茯苓朮附湯兼用應鐘散而諸證得治求真按自少腹至於心下攣急者右腹直肌攣急之謂也一男子年五十餘手足麻痹不覺痛癢頭重小便不利舌上有黑苔飲食如平日與以桂枝加苓朮附湯兼用應鐘散服之月餘諸證悉愈求真按陽證之黑苔則於理舌必乾燥飲食當減有黑苔而飲食如平日者明為陰證則當處以此方一旅客嘗游學於浪華出名片進謁曰吾嘗有濕瘡百方無效荏苒至於今日其始身疼腰痛四肢不仁狀類癱瘓不能危坐唯如跏趺僧得以安息耳今又加乾咳一證其咳不輕因之晝夜不得安臥醫以為勞瘵束手不能療故來請診治先生診之曰此為血咳非勞瘵也乃與桂枝加朮附湯服之而得愈求真按此病恐為肺梅毒成績錄曰一男子周身疼痛足痛頗甚變為大熱手不可近堪以浸於冷水中先生診之腹中無實處乃與桂枝加朮附湯而愈求真按於表雖有大熱然腹部虛軟故決為陰證發熱可與本方也一男子年三十許尿毒淋瀝莖中疼痛身體羸毀時有蒸熱醫曰毒在骨髓藥所不及其人頗懼遂謀於先生先生曰此內疳瘡也與桂枝加朮附湯兼以七寶丸痛止膿清遂得全治求真按若僅用水銀劑恐無此捷效證治摘要曰按病人每患附子劑之證不多其人患下疳時則宜與葛根加朮附湯後與桂枝加朮附湯則不用他藥而愈此證若用輕粉丸則多死求真按此下疳之硬軟雖不明然其無論屬於何類而水銀劑概不適也因有附子劑之病者外觀上雖如常人然其虛弱已極不堪峻藥矣桂秀馬氏之外科總論曰甲直接衝動法凡營養不良之老人或惡液家特易患慢性炎有是等之病者以全身營養旺盛而得驅除炎證物且與以赤酒及其他之衝動藥時治療最速也舊時患梅毒雖以水銀劑碘劑等不奏寸效數發者單由強壯食餌法及入浴法而往往有全治者亦足以知衝動法之有奇效矣求真按此說可與鄙見互證一男子三十五歲嘗患傷風或頭痛或腦痛或泄瀉之證每病不以附子劑則不愈爾後患下疳予與葛根加朮附湯家人疑余非專門託外科治之與輕粉丸下利數行變證蜂起不日而死一男子二十歲患蠟燭疳陰莖原長四寸腐蝕而成二寸半先父與桂枝加朮附湯二十日不用他藥而腐蝕止龜頭生如故但陰莖比平素短一寸半耳求真按外科疾病僅以內服能易為治可見古方之微妙也附子烏頭之醫治效用附子烏頭者與雙鸞菊同屬而主要成分為烏頭鹼之藥物也其作用依用量之多少配合藥之如何而有種種之不同然吾人最多使用為少量及中等量此藥物用於陰虛證即新陳代謝機能之極度衰沉者能使之興奮則以此機能衰沉之甚者為主要目的以仲景論及諸說為副目的而用之可也若更詳論之凡新陳代謝機能甚衰沉時則體溫之發生減少故皮膚寒冷而惡寒粟起至於呼氣及糞便等之排泄物亦帶冷氣也又以致心臟衰弱脈變微細沉弱沉微沉小沉遲等口唇四肢之末端鬱血厥冷且四肢之運動神經因營養不良而引起不全麻痹或全麻痹知覺神經由停滯老廢物之刺激而發異常感覺或疼痛又肌肉亦為營養失調而弛縱故在外表感四肢倦怠脫力腹壁軟弱無力於裡致大便失禁或下利完穀下利又以分解機轉減弱而排泄物之臭氣消失尿變稀薄透明等招來其他臟器組織機能之衰沉此時若用烏頭附子若生機不至於完全絕滅則能興奮此等機能非因此證而用之則極有害矣本草綱目曰烏頭氣味辛溫有大毒主治除寒濕痹咳逆上氣破積聚寒熱其汁名射罔殺禽獸本經消胸上之痰冷食不下心腹冷痰胸間痛不能俯仰目中痛不能久視又墮胎別錄主惡風憎寒寒冷痰包心腸腹㽲痛痃癖氣塊齒痛益陽事強志甄權治頭風喉痹癰腫療毒時珍烏喙一名兩頭尖氣味辛微溫有大毒主治歷節掣引腰痛不能行步癰腫膿結墮胎別錄男子腎氣衰弱陰汗瘰癧歲月不消甄權射罔氣味苦有大毒主治尸疰之瘕堅及頭中風痹別錄瘻瘡瘡根結核瘰癧毒腫及蛇咬先塗肉之四畔漸漸及於瘡口藏器白附子氣味辛甘大溫有大毒主治心痛血痹面上百病行藥勢別錄中風之失音一切之冷風氣面皯瘢疵大明諸風冷氣足弱無力疥癬風瘡陰下濕癢頭面之痕李珣天雄氣味辛溫有大毒主治大風寒濕痹歷節痛拘攣緩急破積聚強筋骨輕身健行本經療頭面風去來疼痛心腹積聚關節重不能行步除骨間痛長陰氣強志令人武勇力作不倦別錄治風痰冷痹軟腳毒風能止氣喘促急殺禽獸毒甄權治一切風一切氣助陽道暖水臟補腰膝益精明目通九竅利皮膚調血脈四肢不遂下胸膈之水破痃癖癰結排膿止痛背脊傴僂霍亂轉筋發汗止陰汗炮食治喉痹大明側子氣味苦辛有毒主治癰腫風痹歷節腰腳疼冷別錄療腳氣冷風濕痹大風之筋骨攣急甄權冷酒調服治遍身風疹有神效雷斅漏監子氣味苦辛有毒主治惡痢冷漏瘡惡瘡癘風時珍求真按以上之藥物惟有老稚大小之差附子與烏頭同效也藥徵曰附子主逐水故能治惡寒身體四肢及骨節疼痛或沉重或不仁或厥冷而兼治腹痛失精下利求真按此說亦發本藥作用之一面者也證治摘要曰門人稻葉節以附子之用法問余答曰夫烏附之性猛烈用之有瞑眩而愈者有不暝眩而愈者有徒中毒者烏頭桂枝湯條云其知者如醉狀得吐為中病又桂枝附子去桂加朮湯條云如冒狀此為瞑眩而愈也又用之其病須臾而增劇發頭痛眩暈或身體不仁或發熱上逆嘔吐等證者則為中毒也當速止附子復問瞑眩吐者與中毒吐者何以辨之答曰瞑眩吐者其病愈後吐也中毒吐者其病增劇而吐也是其別也大凡用附子即愈心氣爽快者為藥證相應也與療外科之結毒為動其痼毒而用之者自有徑庭然則附子之症狀如何答曰仲景云無熱惡寒者又真武湯證曰腹痛下利附子湯證曰口中和由是考之無熱惡寒大便滑或溏口中和者當以附子為準的凡大便秘者用之不中惟冷秘之證用附子而大便通快此冬節薄衣之人或婦人月經之時一身冰冷少腹痛者多有此證然惟百人中之一人耳又痛風之一證用附子非數日不效者若大便難則宜兼用大黃劑又久服附子有患眼病者宜速止附子不然則致後有失明者慎諸求真按此說雖未備然甚切當學者宜熟讀之桂枝去芍藥加附子湯之注釋太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者桂枝去芍藥加附子湯主之傷寒論註本方為桂枝去芍藥湯中加附子如東洞翁之說治桂枝去芍藥湯證之微惡寒者然此惡寒與表證之惡寒異乃因誤治而成陰證之惡寒不可忽也桂枝去芍藥加附子湯方桂枝大棗生薑各克甘草克附子克煎法用法同前桂枝附子湯之注釋傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之傷寒論註傷寒八九日者自患傷寒約經八九日許之意風濕相搏者由本來之水毒感外來之風邪相互搏激也身體疼煩者為身體全部疼痛煩悶也不能自轉側者不能以自力臥而轉動也不嘔不渴者讀之雖如字意然有深意在焉因傷寒經過八九日為現少陽柴胡湯證及陽明白虎湯證之時期故云不嘔不渴所以暗示無柴胡白虎之證也又脈浮者為表證之徵然虛而澀為陰虛證之候故本條之病證以虛證與表裡陰陽相半者也桂枝附子湯方桂枝克附子生薑各克甘草克大棗克上藥銼細以水三合煎一合去滓一日分三回溫服桂枝附子去桂加朮湯之注釋傷寒八九日風濕相搏身體疼煩不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者去桂加朮湯主之傷寒論註本方與桂枝附子湯異無桂枝故無上衝之候有朮以有小便自利證小便自利即為尿利過多腸內枯竭以致大便難也故東洞翁謂本方之定義治桂枝附子湯證而大便難小便自利無上衝證者尾臺氏曰小便自利者謂猶不禁也朮附子茯苓者皆治小便之不利與自利猶麻桂之治無汗與自汗也桂枝附子去桂加朮湯方朮克附子克甘草克大棗生薑各克煎法用法同前初服其人身覺痹半日許復服之三服盡其人如冒狀勿怪此以朮附併走皮中逐水氣未得除故使之爾求真按東洞翁云附子主治逐水本此甘草附子湯之注釋風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之金匱要略註和久田氏曰濕者水也不曰水而曰濕者因水每成腫按之不凹但以皮膚無種種之固結肌膚如濕者故名濕也俗呼脹大之類皆可謂為濕也此亦由正氣之弱水氣得以乘之後世所謂氣虛之候也風濕相搏者其人素有濕氣感冒風邪以風邪與濕氣相搏而名之也骨節疼煩者節節關節疼煩也掣者緊也由後引之而痛也謂驚恐與疼痛也不得屈伸之句應骨節疼煩也近之者以手近於疼處也汗出者風濕相搏也短氣者呼吸急迫也小便不利者氣衝逆不能下降也惡風欲示較重於尋常故又以不欲去衣足之凡此皆風濕相搏之證也此證汗出短氣以表證而衝逆急迫有桂枝甘草又以惡風骨節疼煩小便不利等證相伍以朮附而附子之分量多者以表證劇有內寒也凡有內寒者右小腹結聚腹皮軟弱也求真按此說雖是然治骨節疼煩不僅朮附之作用而已桂枝甘草亦與有力焉不可不追加之東洞翁本方定義曰治骨節煩疼不得屈伸上衝汗出惡寒小便不利者此說亦佳然本方與由桂枝附子湯桂枝去芍藥湯出發者異是本於桂枝甘草湯者故與彼較有上衝短氣之加證也甘草附子湯方甘草朮各克附子克桂枝克上細銼以水二合煎一合去滓一日分三回溫服桂枝去芍藥加茯芩白朮湯之注釋服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加苓朮湯主之傷寒論註傷寒論自著者落筆至於今日約二千餘年其中經多數醫家之注釋改竄故或以注文混入於本文中或依改竄本而傳故其何真何偽往往難以判斷疑問處不一而足本條亦同此例去桂之二字即疑問之焦點也尾臺氏曰桂枝去桂加茯苓朮湯之去桂二字可疑太陽篇瓜蒂散條曰病如桂枝證頭不痛項不強是頭痛項強者本桂枝湯證也今雖已服桂枝湯或下之然仍頭項強痛翕翕發熱不止者是桂枝湯證依然存在也故不應不用此證之主藥桂枝桂枝去芍藥加附子湯桂枝去芍藥加皂莢湯桂枝去芍藥加蜀漆龍骨牡蠣湯柴胡去半夏加瓜蔞湯木防己去石膏加茯苓芒硝湯諸方其所去加皆不過臣佐藥可以證矣後讀徐靈胎之說與余意如合符契益信鄙見之不謬成無己亦曰頭項強痛翕翕發熱雖經汗下邪氣仍在表也心下滿微痛小便自利者則將成結胸今外證未解而無汗小便不利則心下滿微痛為停飲也與桂枝湯以解外加茯苓朮以利小便行留飲也由是觀之則成氏所注之本必無去桂二字也吉益南涯以去桂為去芍藥之誤舉其理由曰本去桂也今從醫宗金鑒作去芍藥歷觀此證無去桂枝之理此因水氣結滯而心下滿微痛致頭項強痛不逐心下之水則不得外發故雖服桂枝湯或下之亦不解也今加茯苓朮以逐水氣以桂枝散其滿去芍藥而欲專其力也試觀逐水氣之劑未嘗有芍藥故知當去之前列二說若依尾臺氏說則本方宜稱桂枝加茯苓朮湯而去字全無意味故余意準南涯氏說認去桂二字為去芍藥之誤應名本方為桂枝去芍藥加茯苓朮湯本方為桂枝湯之去加方於理當汗出今翕翕發熱無汗者此理自南涯氏說雖非不能推究但太倉氏所著麻疹一哈云發熱之時固無留飲凝結腹氣和暢表氣通透則為疹子之候備用藥宜表汗之若留飲凝結而腹氣不和暢則為疹子之候不備蓋因他證先見故也宜詳悉腹候以處之留飲解散腹氣和暢則表氣通豁疹子易從汗出矣就上說觀之本方證之無汗者為小便不利之結果心下微滿痛即為胃內停水明矣桂枝去芍藥加茯苓朮湯方桂枝大棗生薑茯苓朮各克甘草克煎法用法同桂枝湯茯苓之醫治效用本草綱目曰茯苓氣味甘平無毒主治胸脅逆氣憂恚驚邪恐悸心下結痛寒熱煩滿咳逆口焦舌乾利小便久服則安魂養神本經止消渴好睡膈中痰水水腫淋結開胸腑調臟器伐腎邪長陰益氣力保神氣別錄開胃止嘔逆善安心神主肺痿痰壅心腹脹滿小兒驚癇女人熱淋甄權補五勞七傷開心益志止健忘暖腰膝安胎大明止渴利小便除濕益燥和中益氣利腰臍間血元素逐水緩脾生津導氣平火止泄除虛熱開腠理李杲瀉膀胱益脾胃治腎積奔豚好古赤茯苓主治破結氣甄權瀉心小腸膀胱之濕熱利竅行水時珍茯苓皮主治水腫膚脹開水道開腠理時珍發明宗奭曰茯苓行水之功多益心脾不可缺也元素曰茯苓其用有五利小便也開腠理也生津液也除虛熱也止瀉也杲曰甘而淡降也其用有六利竅而除濕益氣而和中治驚悸生津液小便多者能止小便結者能通能益脾逐水乃除濕之聖藥也茯神氣味甘平無毒主治療風眩風虛五勞口乾能止驚悸多恚怒善忘開心益志安魂魄養精神別錄補勞乏主心下急痛堅滿甄權神木主治偏風口面喎斜毒風筋攣不語心神驚掣虛而健忘甄權治腳氣痹痛諸筋攣縮時珍本草備要曰茯苓甘溫益脾助陽淡滲利竅除濕色白入肺瀉熱而下通膀胱能通心氣於腎使熱自小便而出寧心益氣調營理衛定魄安魂治憂恚驚悸心下結痛寒熱煩滿口焦舌乾咳逆嘔噦膈中之廢水脾虛之所致水腫淋瀝泄瀉遺精小便結者能通多者能止生津止渴退熱安胎為松根之靈氣凝結而成以大如斗色白堅實者良皮專行水治水腫膚脹茯神主治略同茯苓但茯苓以入脾胃之用為多茯神以入心之用為多開心益智安魂養神療風眩心虛多恚健忘即抱茯苓之根而生者去皮及中木用之茯苓之心木名黃松節療諸筋攣縮中風喎斜心掣健忘求真按茯苓茯苓皮茯神神木其效略同藥徵曰茯苓主治心悸及肉瞤筋惕也兼治小便不利頭眩煩躁曰心下悸曰臍下悸曰四肢聶聶而動曰身瞤動曰頭眩曰煩躁一是皆悸之類也小便不利而悸者用茯苓則治其無悸證者用之亦未見其效然則悸為茯苓所主治而小便不利其兼治也頭眩煩躁亦然觀證辨宜曰裡水外行而疼痛者發熱汗出朮苓主之吐水者茯苓澤瀉主之心下痞曰頭眩曰小便不利者水滯而氣不行也茯苓主之心下悸曰頭眩曰厥曰癲眩是水氣上攻之證也茯苓主之心下滿曰上衝曰頭眩曰小便不利有氣逆之證者茯苓主之咳水在血分而致者茯苓主之本藥之作用雖如前諸說然由余之實驗本藥以利尿之頻數或減少與胃內停水及心悸亢進或肌肉之間代性痙攣為主目的而仲景論及前諸說為副目的其症狀不問為神經性與心臟或腎臟原因性皆佳也朮之醫治效用藥徵曰朮主利水故能治小便不利及自利兼治身體煩疼痰飲失精眩冒下利喜唾此說雖非全屬無稽然利水非獨本藥之特能他藥亦多有此作用故以利水為本藥之主治不惟不妥當由此抽象的解釋臨床上將如何處之乎朮之為利尿藥毋待辯矣然於臨床上為腎機能障礙之徵此尿利之頻數或減少與胃內停水為主目的仲景論及下記諸說為副目的乃可應用之也故其作用頗類似於茯苓而實異本藥性溫含特殊之揮發油故能刺激胃腸黏膜使之充血此等臟器有急性炎證時即中醫所謂有裡熱之際假令其適應證雖具備亦宜忌之先宜治療急性炎證然後可用此藥也或以為尿量減少為腎臟機能障礙之徵是矣然小便頻數證亦為此機能障礙之候者乃因小便次數增加而尿量反減少也即腎臟機能發生病變之症狀也尿意頻數之際有苓朮澤瀉等對證利尿劑或對證劑加用此等藥物而腎臟機能尚不至嚴重的衰弱時可得援助以驅逐水毒則病自能痊愈凡胃內停水者由於胃肌之衰弱胃壁緩弛若再因心臟或腎臟有障礙時尿排泄量減少以致尿毒蓄積在其他體部在停水不十分嚴重時每能容於組織內而肉眼不易察覺然於緩弛之胃腔內之水毒由打聽觸診最易於確認此胃內停水與尿利障礙均得以茯苓朮澤瀉等應用之有此主要目的之時若用本藥則此停滯之水毒通過腎臟而排除於體外同時此藥含有揮發油能發揮健胃作用若得他藥之協力時西醫雖稱為難治之胃擴張證亦不難治之今欲證鄙見之不誤揭許叔微之體驗談於下本事方曰微患飲澼三十年自左下有聲脅痛食減嘈雜飲酒半杯即止十數日必嘔酸水數升暑月只右邊有汗左邊絕無自揣為澼囊如有水窠臼時窠不盈則不行但清者得行而濁者停滯以無可決之路故積至五六日則必嘔去也脾土惡濕而水則流濕若不燥脾以去濕宜崇其土以填窠臼乃悉摒諸藥只以蒼朮麻油大棗為丸服三月而疾除由此常服之不嘔不痛胸膈寬利飲食如故註意譯此文則許叔微自身患胃內停水證三十年胃內有水鳴左季肋部疼痛食欲減退吞酸嘈雜故飲酒則輕快然十數日後必吐出酸敗之胃內容物夏季右半身常有汗然於左半身則無故自己想象為胃擴張於其內有停水揣摩其理凡胃擴張而停水恰如水在凹所不充滿則不流出停水中之澄清者能流行之然汙濁者則停滯無去路故漸次增量積至五六日必嘔吐以排出之夫胃原忌水之停留若不去此停留之水以乾燥胃當無治愈之期也因悉止從來所用諸藥只服蒼朮麻油大棗為丸至三月後殆已痊愈自此之後常服此方無嘔吐疼痛諸證至於飲食亦如健時云許氏之說病理雖甚幼稚然朮之去胃內停水有健胃之殊效也明矣而關於此藥物之利尿作用雖無何等言及然據不發汗不嘔吐不下痢觀之則胃內停水由利尿排除無疑義矣本藥用於身體煩疼者乃以由尿利障礙水毒久於關節內停蓄則引致身體煩疼而其理則如下之淺田氏說骨節疼痛者其痛及於最裡者也說文云骨節者骨肉之竅也蓋三百六十骨節為神氣游行出入之處而即為邪氣游行出入之處也是以不惟風寒迫於此如痰飲梅毒久鬱於內則亦能為骨節疼痛論曰濕流關節是也如是則尿利障礙與胃內停水為主目的身體煩疼為副目的而用本藥則隨胃內停水被驅逐而關節內之水毒亦隨之消失矣故身體煩疼不治而自治也茯苓朮澤瀉用於水瀉之下痢者乃因小便不暢水毒停滯於消化管內至一定程度時腸管發生水瀉的下痢以代腎之機能此時用茯苓朮澤瀉則此三藥能恢復腎機能而消化管內之水毒由腎臟排出故腸管水分減少則不致下痢是中醫以利尿劑治下痢之慣用療法因知腸管與腎臟有表裡相互之關係也其他病證亦有用本藥者亦可由上理推究之茲從略今舉諸說於下以資參考本草綱目曰朮氣味甘溫無毒主治風寒濕痹死肌消食本經大風在身面風眩頭痛目淚出消痰水逐皮間風水結腫除心下急滿霍亂吐下不止利腰臍間血益津液暖胃消穀嗜食別錄治心腹脹滿腹中冷痛胃虛下利多年氣利止嘔逆甄權反胃利小便補腰膝長肌肉治冷氣痃癖氣塊婦人冷癥瘕大明除濕益氣和中補陽消痰逐水生津止渴止瀉痢消足脛濕腫得枳實消痞滿氣分佐黃芩安胎清熱元素理胃益脾主舌本強食則嘔胃脘痛身體重心下急痛心下水痞臍腹痛好古蒼朮氣味苦溫無毒主治除惡氣弭災沴弘景主大風𢂽痹心腹脹滿止嘔逆下泄冷痢甄權治筋骨軟弱痃癖氣塊婦人冷氣癥瘕山嵐瘴氣溫疾大明明目暖水臟劉元素除濕發汗健胃安脾為治痿要藥李杲散風益氣總解諸鬱震亨治濕痰留飲或挾瘀血成窠囊及脾濕下流濁瀝帶下滑瀉腸風時珍本草備要曰白朮苦燥濕經曰脾苦濕急食苦以燥之甘補脾溫和中在血補血在氣補氣同血藥則補血同氣藥則補氣無汗能發有汗能止燥濕則能利小便生津液止泄瀉泄瀉者水瀉也凡水瀉者濕也消痰水腫滿黃疸濕痹補脾則能進飲食袪勞倦脾主四肢虛則四肢倦怠化癥癖同枳實則消痞一消一補名枳朮丸因脾運而積化也和中則能已嘔吐定痛安胎血燥無濕者禁用能生膿作痛潰瘍忌之蒼朮甘溫辛烈燥胃強脾發汗除濕能升發胃中陽氣止吐瀉逐痰水消腫滿辟惡寒辟一切嵐瘴邪惡暑濕月焚之為佳散風寒濕為治痿要藥陽明虛則宗筋縱弛而帶脈不引故手足痿又能總解痰火氣血濕食六鬱燥結多汗者禁用求真按由弭災沴及辟惡氣觀之則朮如有殺菌性其當否雖未明然本藥含特種之揮發油則或然歟此問題暫置之若夏時以此薰室內則蚊群悉死而墜落由是觀之揮發油則此藥有殺蟲性之確實矣千金桂枝去芍藥加皂莢湯之注釋千金桂枝去芍藥加皂莢湯治肺痿吐涎沫金匱要略註方名之上冠以千金二字者何因仲景著傷寒雜病論十六卷惟傷寒論十卷傳於後世餘皆散逸宋時有王洙者自蠹簡中發現仲景之金匱玉函要略方三卷然玉函者說明傷寒之證治故與傷寒論無大差異僅於字句間有多少之相違耳然金匱有傷寒論中所無之論說方劑故為必要而不可缺但因歷時頗久每有散缺故其時高保衡孫奇林億三氏協力引用仲景之方法由千金方外臺秘要等之古書中抄書之而成完本命名為金匱要略此際編者等因引用仲景之法方之書籍或尊敬其編著者之精神故於仲景之方名上冠以此書名或編著之名此係金匱要略之由來而以千金二字冠於本方者意謂本方不存於金匱而由千金方抄錄之也其他諸方亦同此例所謂肺痿者金匱曰熱在上焦因咳為肺痿咳唾膿血脈數虛者為肺痿淺田氏云熱在上焦肺氣痿弱咳有濁唾涎沫脈數者名曰肺痿故以為虛證後世所謂勞嗽是也尊生書云勞傷脾肺甚者多吐膿血漸成為肺痿將成勞瘵與肺痿者可視為勞嗽之一證也據上所云肺痿即現今之肺結核然丹波氏在所著金匱要略述義本方條有按此方蓋亦屬肺冷之痿由是觀之則肺痿有冷熱二種而本方能治肺冷之痿然不可用於發熱不熱的現時之肺結核矣桂枝去芍藥加皂莢湯方桂枝生薑大棗各克甘草皂莢各克煎法用法同前皂莢丸之注釋咳逆上氣時時唾濁但坐不得眠皂莢丸主之金匱要略註所謂咳逆上氣者為咳嗽頻發之意時時吐濁者時時吐濁痰也但坐不得眠者坐則咳嗽少呼吸稍舒臥則咳嗽頻發而不得眠也皂莢丸方皂莢末棗肉等分上藥以蜂蜜為丸一回克許一日三回服用皂莢之醫治效用本草備要曰皂莢辛溫而性燥吹之導之則通上下關竅而湧吐痰涎搐鼻立作噴嚏治中風口噤胸痹喉痹服之則除濕去垢消痰破堅殺蟲下胎治風濕風癩痰喘腫滿堅癥囊結塗之則散腫消毒煎膏貼一切痹痛合蒼朮焚之辟瘟疫濕氣一種小如豬牙一種長而枯燥一種肥厚多脂多脂者良方輿輗曰心嘈無可奈何與皂莢如粟米者僅五七丸據此二說觀之則本藥為猛烈之刺激藥似不可輕輕內用桂枝加龍骨牡蠣湯之注釋夫失精家小腹弦急陰頭寒目眩髮落脈極虛芤遲為清穀亡血失精脈得諸芤動微緊男子失精女子夢交桂枝加龍骨牡蠣湯主之金匱要略註和久田氏曰失精者夢交而失精也別男女為互文其實一也小腹弦急者強急如弓弦其證在於小腹為下虛之候氣血不和也失精亦由於是陰頭寒目眩髮落並為衝逆之候而無下降之氣陽氣不旺於下部也髮落者皆由於上實瘀血集於頭部也脈極虛芤遲為清穀亡血失精之十二字應為脈例斜插之文言凡脈有極虛芤遲之三象為下利清穀亡血失精之三病中脈應之例也虛者有場所而無物之義為浮大無根之脈芤者言中空之脈遲者不速脈三脈屬於氣血之虛為陽氣衰之脈應也得脈以下為此方所取之脈證就以上之脈例言時其三脈中得之芤動而微緊則為失精夢交之脈動者惟關上有而無上下首尾之脈蓋得與臍上之築動應之此方非虛寒之意微緊而不遲故也桂枝加龍骨牡蠣湯方桂枝芍藥大棗生薑龍骨牡蠣各克煎法用法同前先輩之論說東洞翁本方定義曰治桂枝湯證之有胸腹動者類聚方廣義本方條曰稟性薄弱之人因色欲過多則血精減耗身體羸瘦面無血色身體常有微熱四肢倦怠唇舌乾燥小腹弦急胸腹動甚及至於窮不死何待若以此方長服嚴慎閨房保嗇調攝則能肉生於骨可望回生婦人心氣鬱結胸腹動甚寒熱交作經行常衍期多夢驚惕鬼交漏精身體漸就羸瘦其狀恰似勞瘵孀婦室女情欲妄動而不遂者多有此證此方宜之此方及桂枝去芍藥加蜀漆龍骨牡蠣湯桂枝甘草龍骨壯蠣湯三方所謂癲癇家上衝眩暈耳鳴胸腹動悸夢寐驚起精神恍惚或無故悲愁者隨證選用各有效也若心下痞大便難者宜兼用瀉心湯又火傷湯潑大熱口渴煩躁悶亂欲死者及灸後煩冤者亦宜選用三方或兼用瀉心湯黃連解毒湯等由余之實驗以上病證須此三方者反少而小柴胡湯柴胡桂枝乾薑湯苓桂朮甘湯桂枝茯苓丸當歸芍藥散等之單用或二乃至三方之合用或須兼用黃解丸等之場合極多火傷者概以瀉心湯或黃連解毒湯等之單用亦已足矣桂枝去芍藥加蜀漆龍骨牡蠣湯之注釋傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣湯主之傷寒論註和久田氏曰劫者因威脅而出物也夫表邪之輕證其初不用湯藥以燒針於肌威脅出汗為當時醫者之術以此病名為傷寒固非輕證然醫以火迫於肌劫而出汗因亡陽也亡者言不自衛其處也出汗以劫因而陽氣不能衛於表衝氣劇而為胸腹之動氣則必發驚狂之證也起臥不安者亦起亦臥而不能安乃詳驚狂之狀之辭也此證以亡陽而致衝逆下之而致胸滿內外雖如異途然其歸趣一也加龍骨牡蠣之意以鎮動氣且加蜀漆去痰逐水也亦由衝逆而逐逼痰氣於心胸也火邪者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之金匱要略註勿誤藥室方函口訣本方條曰此方主火邪故湯火傷之煩悶疼痛者及灸瘡發熱者有效以牡蠣一味麻油調塗湯火傷則火毒忽去其效可推想而知矣方輿輗本方條曰不寐之人徹夜雖一目亦不得瞑及於五六夜時必發狂可懼也亟宜服此方蜀漆去心腹之邪積也東洞翁於本方定義曰治桂枝去芍藥湯證而胸腹動劇者求真按淺田氏由火邪之側面說明本方有持氏自驚狂之方面說明本方東洞翁由腹證上說明本方則本方宜用東洞翁說為主二氏之言為副桂枝去芍藥加蜀漆龍骨牡蠣湯方桂枝生薑大棗蜀漆各克甘草克牡蠣克龍骨克上銼細以水四合煎成一合去滓一日分三回溫服桂枝甘草龍骨牡蠣湯之注釋火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之傷寒論註和久田氏曰按此證可作三逆二因觀火逆一下之一燒針一三逆也下之一因燒針二因也煩躁二字承上之二因火逆例曰脈浮宜以汗解而以火灸之則邪無從出因火而盛也病自腰以下必重而痹名為火逆是也火逆猶宜和表而救之反下之而發為煩躁燒針亦非發汗之正法因是亦發為煩躁故成二因並成一煩躁證以桂枝甘草和表緩急以龍骨牡蠣鎮驚狂之動氣煩躁自治之意也東洞翁對本方之定義雖曰治胸腹有動而急迫者然不若治桂枝甘草湯證而胸腹有動者之為當也桂枝甘草龍骨牡蠣湯方桂枝克甘草龍骨牡蠣各克上藥銼細以水二合煎一合去滓一日分三回溫服蜀漆之醫治效用本草備要曰常山辛苦而寒有毒能引吐行水去老痰積飲專治諸瘧然悍暴能損真氣弱者慎用苗名蜀漆效用略同續藥徵曰蜀漆主治胸腹及臍下動劇者兼治驚狂火逆瘧疾據上說觀之則本藥主治胸腹臍下之悸動劇者且兼治驚狂火逆有殺蟲殺菌性然以有毒不可輕用牡蠣之醫治效用本藥含多量之碳酸鈣故有制酸作用然中醫多用於此目的以外茲詳說於下藥徵曰牡蠣主治胸腹之動兼治驚狂煩躁牡蠣黃連龍骨同為治煩躁之藥而各有所主治也膻中者黃連所主治也臍下者龍骨所主治也而部位不定胸腹煩躁者牡蠣之所主治也氣血水藥徵曰外行之血下陷甚者則作驚作躁其不甚者多寒而煩不致驚躁耳此血下陷之候也下陷之血氣自心胸作動者牡蠣主之也蕉窗雜話曰牡蠣能下水使久蓄之寒水下達於水道故其初得遍歷胃中而免吐水腹痛等證也蛇含石鐵粉辰砂禹餘糧牡蠣等皆有鎮墜利水之效各有其適用處故有小差耳至其細微不能盡論當以意會也歸納之均有鎮墜其氣之效故有鎮氣及利水之能餐英館治療雜話曰世醫僅知牡蠣止汗澀精然不知除心下氣痛消疝癥積塊者皆不讀本草之弊也丹溪心法中有心脾氣痛服牡蠣一味酒之方又好古曰牡蠣者入足少陽為軟堅之劑其他本草亦有療疝癥積聚者要之心胸嘈雜心下氣痛者牡蠣妙也反胃之證起居未至大衰者亦以此方加牡蠣為佳吞酸嘈雜嘔吐為目的有心胸刺痛者則更佳也牡蠣治氣滯痛詳於本草牡蠣治吞酸嘈雜有蘭醫之說明其說曰白酒腐敗加以石灰則改味人所飲之水飲留滯於心胸之間久則腐敗成為酸水故用石灰類之牡蠣治吞酸嘈雜是理之常也云云非簡短之說明耶近世由氣發之病人不少以牡蠣加於順氣豁痰劑中宜研究之本草備要曰牡蠣澀腸補水軟堅鹹以軟堅化痰消瘰癧結核老血瘕疝澀以收脫治遺精崩帶止嗽斂汗固大小腸微寒以清熱補水以上諸說雖無不可然或未備或過偏或涉於枝葉之議論皆非完璧也本藥以胸腹之動為主目的驚狂煩躁為副目的雖如東洞翁之所言然有是等證而亦有不當用者血下陷云云即血液集於體之內部不循於體表故成驚狂及煩躁或寒多而煩未致驚躁當用本藥雖如南涯氏之說然亦難為此藥應用上恒久不變之法則其他諸說不無參考之價值然亦難為本藥之主目的由余之實驗當用牡蠣之病者由於先天的或誤治等之身體虛弱腹部軟弱而未陷於陰證者用本藥以此體質與胸腹動為主目的驚狂煩躁幻覺不眠等之神經症狀及前諸家所說為副目的而用之也可本藥之作用大有類似於茯苓然其間亦自有分別即茯苓之悸雖應於手而小而本藥之動大也茯苓有肌肉痙攣本藥無此證也茯苓無渴症本藥有此證也又本藥之作用疑似於黃連然黃連用於實證本藥虛證也黃連有熱伏有腦充血徵之顏面潮紅本藥則不然龍骨之醫治效用本草備要曰龍骨甘澀能收斂浮越之正氣澀腸益腎安魂鎮驚驚癇瘧利吐衄崩帶遺精脫肛利大小腸固精止汗定喘斂瘡皆澀以止脫之義藥徵曰龍骨主治臍下之動兼治煩驚失精據此二說觀之則本藥為收斂藥之一種其主目的為衰脫之徵候與臍下之動副目的為煩驚失精等亦可用之小建中湯之注釋傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之傷寒論註汪氏曰此條乃少陽病兼挾裡虛之證也傷寒之脈弦弦者本為少陽之脈宜與小柴胡湯茲但陰脈弦而陽脈澀此陰陽以浮沉言脈浮取之則澀而不流利沉取之則亦弦而不和緩澀主氣血之虛少弦又主痛法當腹中急痛與建中湯者溫中補虛以緩其痛而兼散其邪先以溫補而弦脈不除痛猶未止者為不瘥此為有邪留於少陽經後與小柴胡湯去黃芩加芍藥以和解之蓋腹中痛亦為柴胡證中之一候余以先補後解乃仲景之妙法也求真按小柴胡湯去芩為紊亂仲景法加芍藥蛇足也但知芍藥證必在而加之不責也錫氏曰先與小建中湯便有與柴胡之意非因小建中無效而又與柴胡也柯氏曰仲景有一證用兩方者如用麻黃以解汗半日復煩用桂枝以更汗者同法然皆因設法以禦病非必然也先麻黃繼桂枝者是由外而之內之法也先建中繼柴胡是自內而之外之法也傷寒二三日心中悸煩者小建中湯主之傷寒論註方輿輗曰傷寒裡虛時為悸邪擾時為煩故初起二三日即有此證候者不宜攻其邪但與小建中湯溫養中氣中氣建邪自解矣雖不即解然發表攻裡之機亦自此出是仲景禦變之法也疝氣癥瘕等證往往亦宜用此法治之虛勞裡急悸衄腹中痛夢失精四肢酸疼手足煩熱咽乾口燥小建中湯主之金匱要略註和久田氏曰虛勞病名也然古人命名無一不取於證虛者有場所而其內無物之謂皮骨場所也實其內之物血肉精液也今精液肌肉不潤血亦有不能流動之勢肉瘦筋弱顏面無血色而薄白皮骨僅存其內無實物故名以虛證曰男子色薄者主渴及亡血卒喘悸脈浮者是裡虛也亡有逃亡之意勞者疲也血不榮肉精不守骨虛熱入於骨髓而手足心熱四肢痛夢遺精手足瘦削不能遠行所以名為勞也裡急之裡即表裡之裡皮膚之內筋脈之意也悸者乃心中悸也衄者鼻血也由於衝逆之故腹中痛由於裡急也夢失精者夢像也精以靜而守於內今內虛而失守因夢而失下焦之虛也手足煩熱者手足之心發熱也酸痛者酸楚疼痛也咽乾口燥者血氣衝逆虛熱之候與口舌乾燥不同口舌乾燥由於胃中實熱故捨其舌而曰咽乾口燥總是虛勞之證也類聚方廣義本方條下曰虛勞裡急云云此證余每用黃耆建中湯其效勝於小建中湯學者試之求真按此說較是男子黃小便自利者當與虛勞小建中湯金匱要略註黃者為黃疸然惟黃疸之小便自利宜與本方恐不似仲景之口吻或有本方證而省略前提乎類聚方廣義本方條曰金匱要略黃疸篇曰男子黃小便自利者當與虛勞小建中湯按小便自利與不利至失其常則同於桂枝加黃耆湯證曰黃汗云云小便不利由是觀之則疑虛勞小建中湯或謂黃耆建中湯乎又按仲景於黃耆建中湯證曰虛勞云云小便多必效方之黃耆建中湯證曰小便數曰多曰數是亦失常更可為證故余每用黃耆建中湯也求真按此說較是婦人腹中痛小建中湯主之金匱要略註本條亦與前條有同樣之可疑不宜有男子婦人之拘定小建中湯方桂枝生薑大棗各克甘草克芍藥克膠飴十二兩上藥銼細以水二合五勺煎一合去渣加膠飴溶之一日分三回溫服茯苓建中湯方加茯苓克於小建中湯中煎法用法同前先輩之論說治驗醫方集解曰昂按此湯以飴糖為君故不名桂枝芍藥而名建中今人用小建中者絕不用飴糖是失仲景之遺意也蘇沈良方本方條曰此藥治腹痛如神然腹痛按之便痛重按之卻不甚痛此是氣痛重按則愈痛而堅者當自有積也氣痛不可下下之則愈甚此虛寒證也此藥偏治腹中虛寒補血尤治腹痛求真按然腹痛按之則便痛重按卻不甚痛者此是氣痛重按則愈痛而堅者當自有積也氣痛不可下下之則愈甚之章句是說本方證腹痛與實證腹痛之鑒別法亦可為一般虛證與實證之判別法而此說係基於金匱之病者腹滿按之不痛者為虛痛者為實而擴充之也證治準繩本方條曰治痢不分赤白新久但腹中大痛者有神效其脈弦急或浮大而澀按之則空虛或舉按皆無力者是也張氏醫通曰形寒飲冷之咳嗽腹痛而兼脈弦者小建中湯加桔梗以提肺氣之陷東洞翁本方定義曰小建中湯治裡急腹皮拘急及急痛者按當有腹中拘急之證其方類芍藥甘草湯求真按其方當作類於桂枝加芍藥湯淺田氏曰此方治中氣虛而腹中引痛者凡古方書云脾胃云建中者皆建立脾胃之義也此方唯血乾俄頃腹皮拘急或強按無底力譬如按琴上之系雖為積聚腹痛等證宜建中以潤血緩急迫之意用之全體腹中無力而有凝滯者此湯有效建殊錄曰一患者四肢憊惰有時心腹切痛居常鬱鬱志意不樂諸治無效某醫以先生有異能勸迎之患者家人曰固聞先生名然古方家多用峻藥是以懼而未請醫更勸之且保其無害遂迎先生診之腹皮攣急按之不弛乃作建中湯使飲之其夜胸腹煩悶吐下如傾家人大驚急召某醫責之醫曰東洞所用非峻劑也因病適將發動耳家人尚疑又召先生意欲不復服先生曰余所用非吐下之劑而如是其甚者蓋彼之病毒之勢已敗而無所伏因而自潰宜益攻之家人服其言先生乃還翌早病者自來謁曰吐下之後諸證脫然如平日求真按是藥瞑眩而即治也生生堂治驗曰一男子久患頭痛立則暈倒醫以為梅毒與芎黃湯及輕粉巴豆之類攻之數百日先生診之自心下至小腹拘攣如繩索乃以小建中湯百餘帖愈之求真按自心下至小腹拘攣如繩索者即腹直肌攣急也方機曰心悸或肉瞤筋惕或頭眩者應鐘心悸甚者解毒茯苓建中湯主之求真按此方揭載於方機恐係東洞翁之創方生生堂醫談曰一男子年三十許患面色如土息短而腹中有物時時衝心眾醫為奔豚治無效如是三年農事廢弛請於予予與茯苓建中湯並放其痧血出如濺衝心遂止諸證隨退求真按此證此方中或可合用桂枝茯苓丸黃耆建中湯之注釋虛勞裡急諸不足黃耆建中湯主之金匱要略註和久田氏曰諸不足者氣血均不充足之謂也案黃耆有伸張正氣於肌表而回復其津液之能諸肌表之不足者皮膚乾而不潤衛氣不固其腠理津液由自汗或盜汗而消失黃耆能伸正氣回津液固密其腠理則瘀水自回降小便通利滑肌膚而得潤澤抑黃耆雖云治自汗盜汗然皆由正氣之不足故不可以此為主能也余之用黃耆不必汗之有無但得肌表乏正氣者即不誤矣勿誤藥室方函口訣本方條曰此方主小建中湯之中氣不足腹裡拘急而帶諸虛不足者故加黃耆也仲景之黃耆大抵為托表止汗去水之用此方可知亦以外體不足為目的也此方雖用於虛勞之證腹皮貼於背無熱而咳者然或有微熱者或汗出者無汗者俱可用之黃耆建中湯方小建中湯加黃耆克煎法用法同前先輩之治驗續建殊錄曰一男子久患咳嘗吐血爾後氣力大衰短氣息迫胸中悸而煩腹肌攣急不能左臥寐則汗出下利日一二行目上足跗微腫咳不止飲食減少羸瘦尤甚與黃耆建中湯盜汗止攣急漸緩得以左臥而不下利微腫散咳依然更兼用解毒散逾日諸證全退當歸建中湯之注釋千金內補當歸建中湯治婦人產後虛羸不足腹中刺痛不止吸吸少氣或小腹中拘急痛引腰背不能飲食產後一月日得服四五劑為善令人強壯宜當歸建中湯金匱要略註吸吸者吸氣性呼吸困難少氣者極度之淺表性呼吸也當歸建中湯方當歸克桂枝生薑大棗各克芍藥克甘草克煎法用法同前若大虛則加飴糖六兩湯成納之暖於火上令飴消若去血過多崩傷內衄不止加地黃六兩阿膠二兩合八味湯成納阿膠若無當歸以芎藭代之若無生薑以乾薑代之當歸建中湯之腹證本方於桂枝加芍藥湯或小建中湯加以治貧血性之瘀血之當歸則於腹證上亦同為腹直肌攣急然左側殊甚臍下部殊於左腸骨窩部有軟弱瘀血塊呈一般貧血之虛狀先輩之治驗漫游雜記曰有一婦人經水至五十餘不斷其至也每月十四五日血下三倍於常人面目黧黑肌膚甲錯暈眩日發四五次數步不能徹夜不眠呻吟之聲聞於四鄰其脈沉細其腹空脹心下暨肚腹各有一塊堅如石蓋因敗血凝結震蕩鮮血也余一診曰腹力虛竭不當攻積塊惟與滋潤之方觀其動靜家有二子懇請不罷乃與當歸建中湯使日服二帖經五十餘日無他異唯覺暈眩稍減耳又數日其左足發腫毒一日三五次暴熱來去家人驚請他醫他醫診為氣疾與三黃湯二日許暈眩大發卒厥欲死於是遑遽再請於予余曰病不可攻而攻故有斯變斯人斯疾除當歸建中湯不宜別進一方也使服建中湯數百日覺身體滋潤徐徐以艾炷於是再作建中湯與之半歲暈眩不發日行數百步血來減於前於是灸於脊際日三四穴漸增至五六穴共約三十七穴每月輪次為之終則與建中湯如是一年許血來減半面目皮膚生津液又經一年徒步涉山河詣築後之善導寺續建殊錄曰一老婦腿足疼痛十餘年遂成攣急而痿躄身體羸瘦腹中拘攣胸脹如龜背仰臥不能轉側唯飲食如常故氣力不衰先生與當歸建中湯及消塊丸逾月能步行矣成績錄曰一男子二十餘歲腰腳攣急微痛上衝耳鳴經年不治先生用當歸建中湯兼以應鐘散而愈歸耆建中湯方黃耆建中湯中加當歸克煎法用法同前本方雖為華岡青州氏之創方其實為師之黃耆當歸二建中湯之合方常用於外科的疾患其法散見於所著諸書但皆零星雜出茲不集錄先輩之論說類聚方廣義黃耆建中湯條曰此方加當歸名歸耆建中湯治諸瘍膿潰之後荏苒不愈虛羸煩熱自汗盜汗稀膿不止新肉不長者若惡寒下利四肢厥冷者更加附子又治痘瘡淡白而不灌膿之際及灌膿之際平塌灰白或內陷外剝下利微冷聲啞脈微者兼用伯州散勿誤藥室方函口訣本方條曰此方為青州所意創雖用於瘡瘍亦宜用於虛勞之盜汗自汗證黃耆及建中劑不可應用於肺結核余往年誤認關於桂枝加黃耆湯以下仲景之意及此等諸方之諸家學說用黃耆及建中劑於肺結核而致失敗當時學尚淺陋不知其故後讀蘭臺軌範等書乃始得解余恐後世或有蹈余之故轍者故將此等諸說特書大書於下以為鑒戒蘭臺軌范曰古人所云之虛勞皆是純虛無陽之證近日之陰虛火旺吐血咳嗽者正與相反若誤治之必斃近日吐血咳嗽之病乃係血證而有似於虛勞其實非虛勞也註所謂純虛者真虛證之意無陽者非無陽證而有陰證之義陰虛亦陰證而非虛證之意共為陽證而為虛證之義也火旺者炎證劇烈之謂全文之意古虛勞為陽虛證與現今之炎證熾盛吐血咳嗽者正相反若以古虛勞治方與現今之吐血咳嗽病時必死云又同書小建中湯條曰此方治陰寒陽衰之虛勞正與陰虛火旺之病相反庸醫誤治害人甚多此處咽乾口燥者乃非由津液少而有火也方輿輗曰小建中湯者古聖治虛勞之大方也然今試用之病者輒有覺上逆熱悶中滿等證者予嘗疑此近日廣集名家書論始似有所得蓋古之所謂虛勞為虛寒之證而後世所謂虛勞火動之證也雖名同而實異余前辨病不明且惑於藥無寒熱溫涼之僻說只據病名以求方藥所以不能得也夫寒熱溫涼藥之性也豈可謂無乎試言一驗繼淇曰有麻黃之地冬不積雪其溫熱之性使然也如建中湯雖非大溫然有桂枝若投於火旺之證如以湯沃沸要之治療以辨證為首務然後以方隨之不然行之雖得偶中然其失多矣張氏醫通云有十餘歲之女子因發熱咳嗽喘急小便少成腫病用利水藥而得愈然因虛羸過甚遂用黃耆建中湯日一服三十餘日遂愈夫人之稟受不同虛勞小便白濁之陰臟之人服橘皮煎黃耆建中湯獲愈者多至於陽臟之人則不宜用暖藥矣建中湯雖不甚熱因有肉桂若服之稍多亦反為害要之用藥亦當量其所稟審其冷熱不宜一概以建中湯治虛勞也求真按有持與張二氏舉建中湯不適宜於肺結核之理由歸罪於桂枝可謂已甚之論何則小建中湯之君藥為膠飴其量最多臣藥為芍藥量次之今二氏指摘其罪於桂枝夫桂枝與生薑大棗甘草只為佐使藥其量甚少故討究本方之能力當求於其君臣藥之膠飴芍藥不當及於佐使藥之桂枝也二氏之說正反之其議論之不當理論上已極明矣然小建中湯之不適於肺結核乃因此方之君藥為膠飴其性大溫有助長炎證之弊而臣藥芍藥富收斂性有抑遏皮膚肺腸腎之排泄機能之作用若誤以主此二藥之本方與此病者時一面助長炎證一面則阻止結核毒素之排泄是以反使增惡耳雜病辨要曰按古之所謂虛勞者皆是裡虛不足之證與今勞嗽吐血相反誤治必斃勞嗽吐血是肺萎雖似虛勞其實不然也膠飴之醫治效用本草綱目曰氣味甘大溫無毒宗奭曰多食則動脾氣震亨曰大發濕中之熱時珍曰凡中滿吐逆牙齒䘌赤目疳病者宜切忌之生痰動火為最甚主治補虛乏別錄補虛冷益氣力止腸鳴咽痛消痰潤肺止咳思邈健脾胃補中孟詵脾弱不思食人若少用之能和胃氣宗奭解附子烏頭毒時珍發明成無己曰脾欲緩急食甘以緩之膠飴之甘以緩中也本藥之作用酷似甘草治急迫作用二者殆相伯仲甘草性平通用於表裡陰陽虛實各證本藥性大溫雖可用於陽虛證然陽實陰虛及寒實證不可用之有適於裡證而不適於表證又甘草無營養成分而本藥有豐富之滋養成分亦是其別也和漢藥物考曰飴糖或作膠飴成分主要成分為麥芽糖糊精兼含蛋白質及少量之鹽分效能飴糖以含水碳素之加溶物故易消化自古用為小兒及產婦之滋養物又為配伍藥物而制成飴劑黃耆桂枝五物湯之注釋血痹陰陽俱微寸口關上微尺中小緊外證身體不仁如風痹狀黃耆桂枝五物湯主之金匱要略註陰陽俱微無定說寸口關上微尺中小緊非師之正文或係注文竄入云血痹者和久田氏云血脈澀滯麻痹之名也尾臺氏云身體痹而覺肌膚習習者淺田氏云邪入血分形體麻痹如被微風吹者是可知矣風痹者和久田氏曰風痹者為正氣虛邪氣入犯麻痹不仁之名也尾臺氏曰身體痹而不仁者謂之風痹風痹者肌膚頑麻而不知痛癢之謂也淺田氏謂風痹者頑麻兼有疼痛也據上所說觀之則血痹者為外證身體不仁所謂如風痹狀者因血液之變調身體雖麻痹尚未甚也且可知不疼痛矣黃耆桂枝五物湯方黃耆芍藥桂枝大棗各克生薑克上藥細銼以水三合煎成一合去滓一日分三回溫服先輩之論說東洞翁本方定義曰治桂枝湯證而嘔身體不仁不甚急迫者和久田氏駁之曰方極云桂枝加黃耆湯證而不急迫作嘔者愚云此但就去加言之未思及本文之證此證雖有桂枝無衝逆之證無痹而不仁之外證及發嘔之候非以嘔而增加生薑也求真按和久田氏所說較是淺田氏曰又血痹證不止而氣虛者有因瘀血積滯者治屬桂枝茯苓丸不可不知也求真按此說雖是余意當屬於桂枝茯苓丸或當歸芍藥散之治學者不可不知也知覺麻痹者非因知覺神經之原發的病變因病毒而引起續發的知覺神經病變之結果也多數西醫以知覺麻痹即為知覺神經之炎證或變質是謬見之甚也凡知覺神經若不因外傷或特種毒物之作用則不能自動成病換言之即知覺神經非原發性而是續發麻痹也病毒使續發知覺神經病故發生麻痹也即病毒為原因知覺神經病為結果而麻痹亦其結果也因有此理故血痹用桂枝茯苓丸或當歸芍藥散主驅逐麻痹真正病原的瘀血或瘀血兼水毒而不拘知覺神經病變之如何也所以中醫反比深知此理之西醫能治麻痹也黃耆芍藥桂枝苦酒湯之注釋問曰黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色正黃如藥汁脈自沉從何得之師曰以汗出入水中浴水從汗孔入得之黃耆芍藥桂枝苦酒湯主之金匱要略註尾臺氏曰千金方沾作染藥作蘗求真按蘗汁為黃蘗汁其色正黃以之形容黃汗也和久田氏曰身體腫者肌表之瘀水多也肌表之多瘀水因為正氣之虛弱故黃耆分量為之特多也發熱者由於血氣之鬱故發熱汗亦出也因出汗致內渴故曰發熱汗出而渴風水者身腫脈浮汗出其狀相似故曰狀如風水然風水之汗不黃其脈不沉故舉汗色脈狀以辨其疑又風水因感外邪所以脈浮也此證為陽氣鬱遏難宣故雖發熱而脈沉也云自沉者為本分之脈證非受其他妨害之意也黃耆芍藥桂枝苦酒湯方黃耆克芍藥桂枝各克上銼細以水二合六勺苦酒四勺煎一合去滓一日分三回溫服若心煩服至六七日乃解若心煩不止者以苦酒阻故也註尾臺氏曰本邦之醋氣味釅烈故如法煮之間有不能服者倘爾宜以水煮用又曰阻者格也與病毒阻格故發心煩也防己茯苓湯之注釋皮水為病四肢腫水氣在皮膚中四肢聶聶動者防己茯苓湯主之金匱要略註和久田氏曰聶聶者微動貌即為肉瞤貌也又曰防己茯苓湯治皮水病四肢腫衝逆肉瞤者是亦正氣不能達於皮膚而腫滿也加以水氣衝逆至於肉瞤故重用茯苓為主治佐以防己黃耆桂枝甘草以宣正氣而降衝氣可見是利水氣之意尾臺氏曰聶聶而動與瞤動略同皆由水氣所成故以茯苓為主治也小補韻會曰聶動貌素問平人氣象論曰厭厭聶聶如榆莢之落又難經十五難曰厭厭聶聶如循榆葉防己茯苓湯方防己黃耆桂枝各克茯苓克甘草克上銼細以水三合煎一合去滓一日分三回溫服先輩之論說治驗東洞翁本方定義曰治四肢聶聶而動水氣在皮膚而上衝者勿誤藥室方函口訣本方條曰此方主治皮水然方意近於防己黃耆湯但去朮加桂苓者專行於皮膚也一人身體肥胖運動不利手足振掉前醫投以桂苓朮甘湯真武湯之類或以為痰之所為使服導痰化痰之藥更無效者服此方而愈又下利久不治服利水藥不愈者有用此方而收意外之治效防己黃耆湯之注釋風濕脈浮身重汗出惡風者防己黃耆湯主之金匱要略註和久田氏曰脈浮汗出惡風者是風感之證也身重者肌表有濕氣之候此方非風邪發表之劑是專實肌表而降水氣自小便利去之則與濕氣相感之風邪不治而能自去矣外臺防己黃耆湯治風水脈浮為在表其人或頭汗出表無他病病者但下重從腰以上為和腰以下當腫及陰難以屈伸者金匱要略註風水其脈自浮外證為骨節疼痛惡風但下重者以水氣集於腰以下而下部覺重感也為和者無異於平常也防己黃耆湯方防己克黃耆克甘草克朮生薑大棗各克煎法用法同前先輩之論說東洞翁本方定義曰治水病身重汗出惡風小便不利者類聚方廣義本方條曰防己茯苓湯專主肌表有水氣者此方主有水在表裡者故防己黃耆二味之分量皆比防己茯苓湯多也治風毒腫附骨疽穿踝疽稠膿已盡稀膿不止或痛或不痛身體瘦削或見浮腫者若惡寒或下利者更加附子為佳兼用伯州應鐘七寶等凡附骨疽久不治或治而復發者以毒之根蒂未除也宜刮開瘡口以抉剔除病根無不治矣勿誤藥室方函口訣本方條曰此方治風濕表虛者故自汗久不止表分常有濕氣者用之有效蓋此方與麻黃杏仁薏苡甘草湯有虛實之分彼湯用於脈浮汗不出惡風者以發汗此方用於脈浮汗出惡風者解肌而愈即如傷寒中風有麻黃桂枝之分身重者濕邪也脈浮汗出者表虛故也故不以麻黃發表而以防己驅之也金匱治水治痰之方用防己者取運氣於上而水能就下也服後如蟲行及腰以下如水云云皆可知為濕氣下行之徵桂枝甘草湯之注釋發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之傷寒論註叉手者即叉手以蔽心臟部之意此證以心悸亢進甚雖自叉手以蔽心臟部而制之然尚不能鎮靜故欲他人為按此部未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此傷寒論註此耳聾無用本方之明文然本條與前條對照則本方之主治明矣桂枝甘草湯方桂枝克甘草克煎法用法同前桂枝甘草湯之腹證本方證因發汗過多亡失體液變為虛證故腹部見軟弱無力然尚未陷於陰證故有熱狀而無寒狀且上衝急迫心悸亢進頗劇脈促疾而心臟及心下部現悸動腹部之大動脈搏動亦甚較桂枝去芍藥湯證之脈促胸滿其上衝急迫更為高度然此心悸亢進異於實證以不伴血壓之升騰為常本方自身實用雖少然由此變化而成之要方如苓桂朮甘湯桃核承氣湯等方意之解釋上甚緊要也半夏散及湯之注釋少陰病咽中痛者半夏散及湯主之傷寒論註傷寒雜病辨證曰咽痛者謂或左或右之一處痛也咽中痛者謂咽中皆痛也甚則痰涎纏於咽中不得息或咽中傷而生瘡滴水不得下若不急治則必死即俗所謂之急喉痹走馬喉風者皆云其速也其證屬於少陰蓋少陰為裡之本咽喉為裡之竅其位深且急也是故雖有一二表證若見咽痛之一侯法當急救其裡若徒攻其表則愈攻而愈劇遂使咽喉緊閉腐爛致穀氣絕而斃本論不載於太陽而舉之於少陰者亦有深義存焉甘草湯桔梗湯曰咽痛半夏散及湯曰咽中痛半夏苦酒湯曰咽中傷而生瘡則皆咽痛為主者也蓋咽痛本有輕重之分輕者未必腫重者必大腫以是咽痛不腫之輕者為甘草湯其大腫之重者為桔梗湯但不腫或涎纏咽中而不堪痛楚者為半夏散及湯與苦酒湯也求真按此說甚是故以解本條之意亦可為此方與類方之鑒別法半夏散及湯方半夏桂枝甘草各克煎法用法同前先輩之論說東洞翁本方定義曰治咽喉痛上衝急迫者勿誤藥室方函口訣本方條曰此方宜於冬時中寒咽喉疼痛者雖有發熱惡寒可治然此證冬時為多又後世所謂陰火喉癬證上焦有虛熱而喉頭糜爛痛苦不堪飲食不能下咽用甘桔湯及其他諸治咽痛之藥無寸效者用之一旦而有效古本草載有桂枝治咽痛之效合半夏之簽辣甘草之和緩而其效尤捷此古方之妙用也桂枝人參湯之注釋太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之傷寒論註尾臺氏曰協同挾玉函脈經千金翼皆作挾宋本作協協熱下利者此為表證未除而數下之故素有之裡寒挾表熱而下利不止也主以桂枝人參湯者以桂枝解表朮與乾薑蠲寒飲而止下利人參解心下之痞硬甘草緩其急不得一味加減古方之簡約而其妙用有如此者求真按本方證可謂為表裡二證之合併又可稱為陰陽二證之混淆然表雖有熱而裡則真寒若未確認之則本方不可輕用也桂枝人參湯方桂枝甘草各克朮人參乾薑各克煎法用法同前先輩之論說東洞翁本方定義曰治人參湯證上衝急迫頗劇者求真按可作治桂枝甘草湯人參湯二證之併發者類聚方廣義本方條曰頭痛發熱汗出惡風肢體倦怠心下支撐水瀉如傾者多於夏秋間有之宜此方按人參湯主吐利此方主下利有表證者腎著湯苓薑朮甘湯甘草乾薑茯苓白朮湯之注釋腎著之病其人身體重腰中冷如坐水中形如水狀反不渴小便自利飲食如故病屬下焦身勞汗出衣裡冷濕久久得之腰以下冷痛如帶五千錢甘草乾薑茯苓白朮湯主之金匱要略註和久田氏曰腎位夾臍左右故腰以下病名腎著記其位也水氣病多渴故云反不渴凡水氣病氣上衝者小便不利此病無衝逆之證而在下焦故小便自利也所謂自利者不用藥而自通即小便比尋常較多之謂也所謂飲食如故者與未得病以前飲食無異也此屬下焦以示胃中無變化也下焦臍以下也身勞云云病因也然此但云下焦得濕氣之由不僅得諸衣裡之冷濕也余按下焦易虛故寒濕必感自下焦蓋下焦感寒濕之所也此方主以茯苓乾薑者去寒利水也其無心下悸目眩等證者以無氣衝逆之候也苓薑朮甘湯方甘草朮各克乾薑茯苓各克上銼細以水二合煎一合去滓一日分三回溫服苓薑朮甘湯之腹證本方不但於苓桂朮甘湯去桂枝加乾薑然二方之異處歸結於一為有乾薑而無桂枝一為有桂枝而無乾薑之點即苓桂朮甘湯無乾薑而有桂枝故其證必有上衝目眩之證是水毒之上衝也然此毒主集於上半身前證之外且現胃內停水至本方以無桂枝而有乾薑此水毒不上衝而下降集中於下半身故其證無上衝目眩之證胃內停水完全不存或雖存在亦不過些微而已乾薑與附子併稱大熱藥且有驅逐水毒之作用故其證必有寒冷或厥冷與水毒之隱見此仲景所以云身體重總有重感為組織中有水毒之徵也又稱腰中冷如坐水中形如水狀是浮腫狀也又云腰以下冷痛腫重如帶五千錢也如是本方證因水毒聚集於下半身為此毒浸潤之結果組織弛縱膨大故腹部軟弱無力也往往類似八味丸證之臍下不仁然無如彼之有口渴煩熱之證得以分之又本方證之小便自利疑似豬苓湯證之小便淋瀝彼以陽證有口渴熱狀本方證以陰證而無此等證得以別之先輩之論說治驗宣明論曰腎著湯治胞痹膀胱麻痹小便不利鼻出清涕求真按小便自利者有膀胱括約肌之麻痹小便不利者為利尿肌之麻痹也古方便覽本方條曰友人某患淋瀝之證多年腰腳冷而夜不能寐心下悸與此方諸證痊愈一婦人平素上衝頗甚且有心悸之證先師令服苓桂朮甘湯盡夜大腹痛苦楚不可言師往復診見疼痛之狀集於腰部因與此方一劑頓瘥一人年七十三平生小便頻數腰冷如坐水中厚衣蓋坐時精液自泄不禁諸治無效已十餘年矣余診有心下悸即用此方痊愈生生堂醫談曰一老婦人來請治腰腳冷腳痿弱一步不能行如此已十年矣予乃作苓薑朮甘湯並放痧使出血甚多初來時以肩輿次以人扶又次以杖倚復次能自步不俟杖矣求真按此病者為本方證兼有瘀血也用方經權本方條曰吾子幹先生以此劑專治夏秋之月身體懈惰手足酸疼腰以下重或浮腫或發熱惡寒泄瀉腹痛渴而引飲或下利後重者活潑自在其效如神蓋是得心應手者先生嘗云夏秋月水冷大行當此時若人有固有之寒飲則內外相感成上述之患令備此劑以為通治求真按吾氏所述有發熱惡寒渴欲引飲之證正與師論矛盾本方果有此等症狀否余未知之茲記之以為後日之參考麻疹一哈曰一婦女年約三十發疹時身熱甚疹出不多兩顴色赤如以帛裹朱喘咳短氣煩躁不得眠口渴欲飲水因作大青龍湯使服之五帖前證稍安遍身汗出如流疹子從汗而出疹收後月經至期不來右脅下凝結成塊腰以下至足跗皆浮腫大便自利小便不利更作苓薑朮甘湯使飲之三十餘日月經倍常或下黑塊數枚於是脅下凝結者消浮腫亦退經信不違矣類聚方廣義本方條曰此方加杏仁名腎著湯治孕婦浮腫小便自利腰髀冷痛喘咳者又治老人平日小便失禁腰腿沉重冷痛者又男女遺尿已十四五歲猶不已者最為難治此方加反鼻能奏效並宜隨證加以附子譯者按反鼻詳拾掇篇中求真按本方有治遺尿之效雖如尾臺氏說然非特效藥不可漫用以余之經驗則此病者反多石膏劑之證乾薑之醫治效用本藥與附子俱為大熱藥興奮新陳代謝之機能驅逐水毒二者相等然其異處在附子劑證有下利厥冷等水毒下降之徵而少上迫之候而本藥證則水毒下降之徵少上迫而發嘔吐咳嗽眩暈煩躁等證者多換言之即附子治水毒之下降為主而治上迫為客本藥治上迫為主而治下降為客也可知二藥之別矣藥徵曰乾薑主治水毒之結滯兼治嘔吐咳嗽下利厥冷煩躁腹痛腰痛等證本草備要曰乾薑生用則辛溫逐寒邪而發表炮則辛苦大熱除胃冷守中溫經止血消痰定嘔去臟腑之沉寒痼冷能去惡生新使陽生陰長故吐衄下血之有陰無陽者宜之芩桂朮甘湯之注釋傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之傷寒論註方氏曰心下逆滿者伏飲上溢而搏實於膈也氣上衝胸者寒邪上湧挾飲為逆也動經者振振奮動動傷經脈也蓋人之經脈賴津液以滋養飲物津液之類也靜則為養動則為病宜制勝之尤氏曰此傷寒之邪解而為飲發之證也飲停於中則滿上逆則氣衝頭眩入經則身振振而動搖金匱云膈間支飲其人喘滿心下痞堅其脈沉緊又云心有痰飲胸脅支滿目眩又云其人振振而身瞤劇必有伏飲也是也發汗則動經者邪無可發而反動其經氣也故與茯苓白朮以蠲飲氣桂枝甘草以生陽氣所謂痰飲病者當以溫藥和之是也丹波元堅曰此條脈止沉緊即為此湯之所主治矣若吐若下則胃虛飲動而致之且更發汗傷其表陽則變為動經而身振振搖是與身瞤動振振欲擗地者相同即為真武湯之所主也又此方專取利水以健胃與甘棗湯有小異也求真按吐後或下後云者示腹內無充實之毒心下逆滿謂自下方向心下部而作滿也而所以致此者與桂枝去芍藥證所致之胸滿無異大概由於吐或瀉下後內毒脫盡同時不外其反動而氣上衝之結果也然與桂枝去芍藥湯之只為胸滿氣上衝不同此心下逆滿乃氣與水毒相伴而上衝之徵與前者胸滿之內空虛異也心下逆滿即停水於胃部膨滿之內部又氣上而衝胸起則頭眩亦均與發心下逆滿之理同然因水毒侵襲之部位不同故所現之症狀各異也又脈之沉緊為裡有水毒之徵故仲景舉此脈侯以示本方證水毒之由來也是以本條之病證因於水毒之上衝故治之必須本方也若誤以發汗劑則即為逆治矣經血管係也氣衝動經使肌肉失調身振振搖即使身體至於振戰動搖然只有此症狀而無餘症即成誤治後之逆證尚須本方為主治之意也心下有痰飲胸脅支滿目眩苓桂朮甘湯主之金匱要略註痰飲者金匱痰飲咳嗽篇曰問曰夫飲有四何謂耶師曰有痰飲有懸飲有溢飲有支飲問曰四飲有何異師曰其人素盛今瘦水走腸間瀝瀝有聲謂之痰飲由是觀之心下有痰飲者胃內有停水之謂也支滿者徐彬謂支撐定不去如痞狀也見類聚方廣義據此則胸脅支滿即肋骨弓下部膨滿之意與心下逆滿同自下向上衝上而滿也目眩與頭眩同即眩暈也夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之金匱要略註短氣呼吸促迫之意金匱要略曰凡食少飲多水停心下甚者悸微有短氣如上之說胃內若停水量多則侵凌心臟使心悸亢進若少量則呼吸促迫此微飲即有少量之停水用本方使利尿則呼吸促迫自治苓桂朮甘湯主之腎氣丸亦主之云者在短氣與微飲藉利尿而治之之作用上示二方相若而非主治悉同之意也傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿傷寒論註錫氏曰痿者肢體痿廢不為我用也久而成痿者經血不外行於四肢也方氏曰此由述苓桂朮甘湯證而有不復治之失故云成痿之意彼條脈沉緊以未發汗言此條脈甚微以已發汗言經脈動者即為動經之變文惕即振振搖也大抵為兩相更互發明之詞久者言既經八九日若猶不得解而更有不治之失則津液內亡濕淫外漬不致兩足痿軟而不能及也尤氏曰心下痞硬脅下痛氣上衝咽喉眩冒者邪氣搏飲內聚上逆也內聚者不能四布上逆者以不逮於下也夫經脈資血液以為用者也汗吐下後血液所存幾何而復搏結為飲不能散布於諸經今經脈既失浸潤於前又不能長養於後筋膜必將乾急而為攣樞折脛縱而不任地如內經所云脈痿經痿是也故曰久而成痿求真按此二說雖與基礎醫學不大相符然能以舊說解釋本條故揭之而供參考水在心心下堅築短氣惡水不欲飲金匱要略註金匱要略述義曰堅者心下堅實也築者築築然悸動貌也水在腎心下悸金匱要略夫心下有留飲其人背寒冷如掌大金匱要略註胃內有停水之人與其胃一致之背部如手掌大之部分覺寒冷之意也四肢歷節痛脈沉者有留飲金匱要略註歷節痛者關節之風濕性神經痛也關節之風濕性神經痛等證呈沉脈者為胃內有停水之徵則此沉脈與胃內停水為主目的疼痛為副目的選用適方則治矣胸中病痰喘滿咳吐發則寒熱背痛腰疼目泣自出其人振振身瞤動而劇者必有伏飲金匱要略註伏飲者即水毒之潛伏雖不得診為胃內停水然有前證時推斷為水毒潛伏用治胃內停水之劑則此等症狀不治而自治矣前數條之病證雖無宜用本方之明文然多以本方為主治故列載之如古人所謂怪病治痰也實由水毒現為千變萬化之怪證殆莫得其端倪善探仲景之論及前記諸說之真諦以全本方之運用可也苓桂朮甘湯方茯苓克桂枝克朮甘草各克煎法用法同前苓桂朮甘湯之腹證自前仲景之論以及本方祖方之桂枝甘草湯條綜合而觀察之則本方之腹脈外證自明矣似無重述之必要然前說所漏而於臨床上緊要之二三事項不得不追加之凡當瘀血上衝必發於左腹部且沿同側腹直肌不憑右側而現氣及水毒上衝之際必發於右腹部且隨同側之腹直肌而上常不憑左側而現至於此差別之理由雖屬未明然早為古人注意余徵之於實驗亦為不偽之事實故於本方證亦不乖此原則而氣上衝胸心下逆滿亦必沿右側腹直肌而發現胸脅支滿亦在於右肋骨弓下雖頭痛時亦右側痛而左側不痛或右側比左側痛甚金匱云奔豚病自少腹起上衝咽喉發作欲死復還止又於茯桂五味甘草湯條云手足厥逆氣自少腹上衝胸咽手足痹其面翕然如醉狀因復下流陰股小便難時復冒者如上所云以茯苓桂枝為君臣藥之方證大概發作無定故本方證亦有發作則增劇休止則輕快或潛伏而此發作由於心身之過勞及其他近因而誘起是癇及驚悸等病證即現今之神經衰弱等之神經證所以本方多適應用於此類證也此本方證之所以恒多不完症狀而其一定不變者為尿利之減少或頻數與胃內停水故用本方者須先認此二症之存在次肯定其心悸亢進且更參照其餘之症狀後始可用之先輩之論說治驗方機於本方之主治曰心下逆滿起則頭眩者眼痛生赤脈不能開者求真按由余之經驗則此眼患為水疱性結膜炎或同性角膜炎也耳聾衝逆甚而頭眩者求真按本方祖出桂枝甘草湯此其所以能治耳聾不僅聾且能治耳鳴也方輿輗在癇癲狂驚悸不寐健忘奔豚等篇曰癇之證候千端萬緒不遑枚舉今考其目錄略述其治因夫奔豚雖為古來一種特病要之亦惟癇中之一證耳是非余之管見先賢已辨之矣又曰苓桂朮甘湯治氣上衝於咽喉眩冒經脈動惕久而成痿氣上衝咽喉者氣上逆而衝至胸咽俗云咽塞是也眩頭目眩暈之謂冒者何自覺如蒙被狀也經脈動惕者謂周身經脈時時跳動也以上數證經久不愈時則足弱不能履地遂致成痿此四句在本論為說者所削余採拾之而以苓桂朮甘湯為主治動氣甚者可加鐵屑牡蠣曾有一蕩兒患前證一時頓仆不省人事病者遽招數醫皆曰難治余診之形證雖似危急其脈尚平癇之所為也乃與苓桂朮甘湯二帖而蘇使續服三四十日痊愈凡卒厥之病其脈平者多屬癇此義初學須知同書眩暈篇曰茯苓桂枝白朮甘草湯治心下逆滿氣起上衝於胸則頭眩者此方治眩暈之聖劑也仲景雖言起則頭眩之一證宜善為推用不必拘於起臥也類聚方廣義本方條曰治飲家眼目生雲翳昏暗疼痛上衝頭眩臉腫眵淚多者加芣茨尤有奇效當以心胸動悸胸脅支滿心下逆滿等證為目的雀目證亦有奇驗註飲家係有水毒病者芣茨車前子也勿誤藥室方函口訣本方條曰此方去支飲為目的氣上衝於咽喉及目眩手足振掉皆由水飲所致也不論起則頭眩者或臥時眩暈者但有心下逆滿者則用之若不治者澤瀉湯也彼方始終無眩然以冒眩顏面有緊張之候也又此方以動悸為的侯易與柴胡薑桂湯混亂然此方若顏面色明第一脈不沉緊者則無效也又此方加沒食子治喘息又由水氣而痿躄者有效足或腰仍動劇者臥時則脊骨邊戰動或一身中經脈跳動有耳鳴逆上之候者凡本論所謂久而成痿之任何證候此方皆可百發百中也建殊錄曰某僧請診治曰貧道眼目有外障而不礙明然看物不能久視或勉強時則無方圓大小須臾即漸滅最後輒如錐芒射目中即痛不能忍如是者凡三年矣先生診之上氣煩熱體肉瞤動作苓桂朮甘湯及芎黃散使服之數十日其視稍真不復有錐芒矣求真按此證為亂視而兼眼睛疲勞者也一女子初患頭瘡瘳後兩目生翳卒以失明召先生求診治先生診之上逆心煩有時小便不利作苓桂朮甘湯及芎黃散而雜進之或時以紫丸攻之翳障稍退左眼復明於是其族或以為古方家多峻藥障翳雖退恐有不測其父亦以為然大懼乃謝罷更召他醫服緩補之劑久復生翳漠漠不能見其父復來謁曰我向賴先生之庇一目復明然惑於人之間阻遂復失明今甚悔焉幸再治之則先生之惠也請甚懇先生因復診之仍使服前方數月兩目復明求真按頭瘡為外治事不行內治往往變眼疾皮膚科醫者不可不三省之一和尚年七十餘其耳聾者數年嘗聞先生之論百疾生於一毒深服其理因來求診治心胸微煩上氣殊甚作苓桂朮甘湯及芎黃散使服之數月未見其效乃謝罷居數日復謁曰自謝先生後頗能通聽意者上焦之邪毒將盡耶先生診之曰未也試再服湯液當不能復聽然後再能聽者可信其毒盡矣因服前方數月果如先生言求真按東洞翁於前數證均兼用芎黃散然余信以黃解丸為優一女子患痿躄諸治無效先生診之體肉瞤動上氣殊甚作苓桂朮甘湯使飲之須臾坐尿二十四次忽然起居如常求真按此治驗實本於久而成痿之論而奏偉效以是可知仲景之論如何的確矣東洞家配劑抄曰狂亂苓桂朮甘湯紫圓一分許成績錄曰某婦人鬱冒上逆平常善驚聞足音跫然即驚悸怵惕故不欲見人常獨處深閨其家富有家人咸敷氈以步使其不聞席音攝養修治無微不至但不見寸效在床已數年矣於是請診於先生先生與以苓桂朮甘湯積年之病以之漸愈求真按此病者為重證之癔病也生生堂治驗曰一男子腰痛大便時每下血合餘面色鮮明立則昏眩先生處以桂枝茯苓白朮甘草加五靈脂湯而頓愈求真按考五靈脂為寒號蟲之矢有驅瘀血性則此病應與本方及桂枝茯苓丸之合方為正治乎橘窗書影曰一人患臍下有動悸時時迫於心下眩冒欲卒倒頭中常如戴大石上盛下虛不得健步醫治無效出都下乞治於予余與苓桂朮甘湯兼用妙香散服數旬積年之病脫然而愈苓桂甘棗湯之注釋發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之傷寒論苓桂甘棗湯方茯苓克桂枝克甘草克大棗克上藥銼細以水三合煎一合去滓一日分三回溫服苓桂甘棗湯之腹證本方但以苓桂朮甘湯去朮加大棗而已故其主治亦與之大相類似但本方獨存茯苓而不佐以白朮則於利尿作用相差甚遠然有大棗則治攣急作用過之此本方之所以治奔豚也於腹證上前方為右腹直肌之攣急微弱而本方有明顯按之則痛之證但與芍藥之攣急浮於腹表而強硬者又異此則沉於腹底有軟弱觸覺而攣引也故東洞翁下本方定義曰治臍下悸而攣急上衝者先輩之論說治驗生生堂治驗曰一男子年三十奔豚日發一次或二次甚則牙關緊急人事不省百治不效先生診之臍下悸按之痛使服苓桂甘棗加大黃湯兼用反胃丸二十丸每日一次旬餘愈求真按余亦曾以黃解丸兼用本方治此證證治摘要曰苓桂甘棗湯臍下悸者欲作奔豚按腹痛衝胸者有屢用屢驗之效求真按余亦曾用本方以治此證勿誤藥室方函口訣本方條曰此方主臍下之動悸大棗能治臍下之動者也此方原治奔豚之屬於水氣者為主然運用之而治澼飲亦有特效求真按澼飲者胃內停水之宿患也橘窗書影曰一婦人年三十餘少腹有塊時時衝逆於心下顏色青慘身體微腫前陰漏下污水雖經醫治療藥汁入口則吐余診曰病非難治藥力不達也誓服藥必可治病者大悅因與苓桂甘棗湯加紅花始得胃納乃連服數月上衝止腫氣去兼用龍硫丸污水減塊大安一女子年二十餘臍下有動悸任脈道拘急時時衝逆於心下發則角弓反張人事不省四肢厥冷呼吸如絕數醫療而不驗余診曰奔豚也與苓桂甘棗湯使服數旬病減十之七八但腹中尚拘急或手足牽掣拘攣因兼用當歸建中湯數月痊愈苓桂五味甘草湯之注釋咳逆倚息不得臥小青龍湯主之青龍湯下已多唾口燥寸脈沉尺脈微手足厥逆氣從少腹上衝胸咽手足痹其面翕熱如醉狀因復下流陰股小便難時復冒者與茯苓桂枝五味甘草湯治其氣衝金匱要略註丹波元堅曰按下已者服畢也唾多者為青龍湯之效顯著飲豁之徵猶今患支飲者及其欲愈必吐稠痰唾亦稠痰也口躁亦為飲將去之徵與渴同機續後三條求真曰所謂續後三條者指苓甘薑味辛湯苓甘薑味辛夏湯苓甘薑味辛夏仁湯諸條也俱舉藥驗此證亦然而其中寓咳止息平之義此下脈證非為青龍而發蓋其飲之所在不僅上焦即中下焦亦有所瀦而更於他處或有所挾今服湯後支飲雖散而他證續見者也寸脈沉尺脈微者魏氏曰寸脈沉支飲有窠囊欲去之而不能盡去也尺脈微者正陽虛於下而陰寒之氣斯厥逆而上奔也此解似佳唯尺脈微者或亦為血虛之現象手足厥逆者陽素不盛今為飲遏住所致與瓜蒂散之厥其情相近氣自少腹上衝胸咽者下焦之水上逆也手足痹者其人血虛故也其面翕熱如醉狀復下流於陰股胃中有熱飲被迫動或升或降也小便難者膀胱不輸也時復冒者即此心下支飲之故有時而失於升也此證三焦俱有水加以血虛胃熱然其所急者特有氣衝耳故用桂苓五味甘草湯以抑逆散飲此方比之苓桂朮甘湯有五味而無朮彼以胃為主此猶兼肺故用五味以利肺氣比之苓桂甘棗湯彼有飲在下而此有飲在上也求真按本方為苓桂朮甘湯之去朮加五味子故頗與彼相類似然本方有茯苓而無輔翼之朮利尿作用較彼稍弱惟有五味子故於鎮咳作用則凌駕於彼之上矣苓桂五味甘草湯方茯苓桂枝各克甘草克五味子克煎法用法同前先輩之論說治驗類聚方廣義本方條曰小青龍湯者主治內飲外邪感動觸發而作喘咳者以下五方主治無發熱惡風頭痛乾嘔等之外候但發內飲之咳嗽嘔逆鬱冒浮腫等證者若咳家有稠涎膠痰血絲腐臭蒸熱口燥等證者非五方所得而治也求真按此說是也當遵奉之麻疹一哈曰有一男孩年十三疹後咳嗽不已聲啞不出數十日雖用藥而無效更請診於予按其腹狀心下悸上逆耳鳴目眩胸間痰鳴因作苓桂五味甘草湯使服之又使雜服滾痰丸下利日二三行半月許前證全治而復舊苓甘五味薑辛湯之注釋衝氣即低而反更咳胸滿者用苓桂五味甘草湯去桂加乾薑細辛以治其咳滿金匱要略註衝氣即低者謂服苓桂五味甘草湯後上衝低降也而反更咳云云者雖上衝降下而反更咳嗽胸滿之意此所以以下申述不得不用本方之理由也即於此證雖宜用苓桂五味甘草湯因無上衝故去桂枝以有咳嗽胸滿故加乾薑細辛以治之之意也苓甘五味薑辛湯方茯苓克甘草乾薑細辛各克五味子克煎法用法同前苓甘五味薑辛夏湯之注釋咳滿即止而更復渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復納半夏以去其水金匱要略註丹波氏曰按此節當以細辛乾薑為熱藥也作一段看咳滿即止是薑辛之效著也然藥勢燥胃故發渴而下焦之水亦隨而發動此際更宜苓桂五味甘草湯者意在言外矣服之以下是承上節治其咳滿之句服之咳滿即止當發渴而反不渴者言心下為有支飲也渴反止宜從趙氏注趙注服湯後咳滿即止三變而更渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴反不渴者為支飲之水蓄積於胸中故也讀為反不渴程氏亦然此支飲與青龍湯證不同所謂冒者即前條時復冒之加重也復納半夏所以驅水飲止嘔逆也苓甘五味薑辛夏湯方茯苓克甘草細辛乾薑各克五味子克半夏克煎法用法同前先輩之治驗續建殊錄曰一男子鬱鬱不樂咳嗽短氣動搖則胸悸甚上氣微嘔不欲飲食小便不利盜汗出時時搶於心下或胸中痛與苓甘薑味辛夏湯加人參服藥後諸證漸退逾月痊愈求真按苓甘薑味辛夏湯加人參者為苓甘薑味辛夏湯與人參湯合方之意也苓甘五味薑辛夏仁湯之注釋水去嘔止其人形腫者加杏仁主之其證應納麻黃以其人遂痹故不納之若逆而納之必厥所以然者以其人血虛而麻黃發其陽故也金匱要略註丹波氏曰按水去者心下之水去也故嘔止是半夏之效著也然內水溢於外以為形腫故治猶遵前法而表水非麻黃不能驅除蓋杏仁與麻黃其性雖有緊慢之別而其功用稍相類似以其人血虛故以此易彼其人遂痹者前段之手足痹也厥者亦即前段之手足厥逆倘得麻黃亡其陽則更甚矣血虛者尺脈微之應也苓甘五味薑辛夏仁湯方茯苓克甘草乾薑細辛各克五味子克半夏杏仁各克煎法用法同前類聚方廣義本方條曰痰飲家平日苦於咳嗽者此方之半夏代以瓜蔞實用白蜜為膏則甚有效求真按若無嘔證則以瓜蔞實代半夏亦無不可但此證有時不可代用瓜蔞實余每以本方用於老人之慢性支氣管炎尤以併發肺氣腫者得偉效苓甘薑味辛夏仁黃湯之注釋若面熱如醉此為胃熱上衝熏其面加大黃以利之金匱要略註丹波氏曰按以上四條謂治其氣衝而承以衝氣即低之類其文上下相應特此條自為起端故程氏尤氏以為別證然其治仍守上方則知亦為自上接來面熱如醉者即前段所謂面翕熱也其初胃熱未長故敢不以為意今蓄飲未散胃熱增劇故加大黃以利之也徐氏所謂雖有薑辛之熱各自為效而無妨者實得其理矣又按以上六條皆為設法備變者蓋病者證候錯雜或陸續變換應就其所急為之處療是以設此諸條使人知圓機之妙唯所敘諸證未必一人兼備亦未必不兼備於一人且所處之藥皆其著效如更發他證者是必無藥之所致要之不過假此數端述為治之次序也其初則觸時氣而動其次則下焦之水逆次則肺飲復動次則飲遏於中焦次則水氣溢於外於是飲之情形纖悉無遺而加以兼虛挾熱可謂密矣苓甘薑味辛夏仁黃湯方茯苓克甘草乾薑細辛大黃各克五味子克半夏杏仁各克煎法用法同前先輩之治驗橘窗書影曰一婦人年五十餘曾患下血過多以後面色青慘唇色淡白四肢浮腫胸中動悸短氣不能步行時復下血余與六君子湯加香附厚朴木香兼用鐵砂丸下血止水氣亦減然血澤不能復常秋冬之交咳嗽胸滿頗甚遍身浮腫倚息不得臥一醫以為水腫與利水劑無效余診曰恐有支飲先制其飲則咳嗽浮腫自當隨愈因與苓甘薑味辛夏仁黃湯加葶藶子服二三日咳嗽胸滿減浮腫忽消散余以此法復愈水腫數人故記之以示後學五味子之醫治效用本草備要曰五味子性溫五味俱備皮甘肉酸核中苦辛都有鹹味酸鹹為多故專收斂肺氣滋腎水強陰澀精補虛明目退熱斂汗止嘔住瀉寧嗽定喘除煩渴消水腫解酒毒收耗散之氣嗽初起脈數有實火者忌用寇氏所謂食之而虛熱多者收補之驟也北產紫黑者良入於滋補藥中蜜浸蒸藥徵曰五味子主治咳而冒五味子澤瀉皆主治冒病而有其別五味子治咳而冒者澤瀉治眩而冒者也據此二說觀之則五味子可謂為收斂性鎮咳藥兼有治冒作用之溫藥矣細辛之醫治效用東洞翁云細辛主治宿飲停水也故治水氣在心下而咳滿或上逆或脅痛者又其咳者上逆者胸滿者脅痛者心下堅大者皆為宿飲停水在胸脅心下所致也用細辛則水飲去其證可已可以見其主治矣然此說非惟遼闊難循其結果且難與半夏茯苓等之治效區別故仲景以乾薑細辛為熱藥也本草綱目述細辛辛溫無毒故當作主治陰證之宿飲停水始近定說因本藥為吐根譯者按吐根為催吐藥祛痰藥之同屬用少量呈鎮咳作用若大量則變為吐劑不可忘之本草綱目曰細辛根氣味辛溫無毒主治咳逆上氣頭痛腦動百節拘攣風濕痹痛死肌本經溫中下氣破痰利水道開胸中滯結除喉痹齆鼻香臭不聞下乳結別錄治嗽去皮風濕癢風眼淚下除齒痛血閉婦人血瀝腰痛甄權發明宗奭曰治頭風痛不可缺之元素曰細辛治少陰之頭痛如神散水氣去內寒成無己曰水停心下而不行以細辛之辛行水潤燥承曰細辛若單用末不可過一錢多則氣悶塞不通者死澤瀉湯之注釋心下有支飲其人苦冒眩澤瀉湯主之金匱要略註冒者如蔽如帽之意本條之冒亦自覺如以物蔽頭部之義若更有眩暈即為冒眩臨床上最易遭遇者也而其劇者如尾臺氏所云支飲冒眩證其劇者昏昏搖搖如居暗室如坐舟中如步霧裡如升空中居屋床蓐旋轉如走雖瞑目斂神仍復如是非此方則不能治之然本條之病證如仲景云心下有支飲其人苦冒眩因胃內有停水致成此冒眩也又成此胃內停水者如東洞翁之本方定義云治苦冒眩小便不利者因腎臟機能障礙耳故於本方證必有尿利減少或頻數之候也由余之經驗因臨床上需要本方者雖少然解釋淵源於此方之五苓散當歸芍藥散等之方意必不可缺故不可輕視之澤瀉湯方澤瀉克白朮克上細銼以水二合煎成一合去滓一日分三回溫服先輩之治驗成績錄曰一婦人鬱冒眩甚起臥不安無他證不治約三年許先生與澤瀉湯旬餘痊愈澤瀉之醫治效用本藥亦為一種利尿藥以尿利之減少或頻數與胃內停水為主目的方可用之與茯苓白朮無異然茯苓適於此等症狀之外兼治心悸亢進眩暈肌肉之間代性痙攣等而通用於表裡陰陽虛實之各證本藥不能治心悸亢進及肌肉之間代性痙攣有醫冒眩之作用多用於裡虛證白朮之用於虛證與本藥無異但其性溫故適於陽虛證不適於陰虛證本藥性冷故不適於陽虛證而適於陰虛證有去溫熱及治渴之效能此三藥之分別也至於其他概為大同小異耳本草綱目曰澤瀉根氣味甘寒無毒主治風寒濕痹乳難養五臟益氣力肥健消水久服則聰明耳目本經補虛損五臟痞滿起陰氣止泄精消渴淋瀝逐三焦膀胱之停水別錄主腎虛精自出治五淋通宣水道甄權主頭眩耳虛鳴筋骨攣縮通小腸止尿血主難產補女人之血海令人有子大明入腎經去舊水養新水利小便消腫脹止渴元素去脬中之留垢心下水痞李杲滲濕熱行痰飲止嘔吐瀉痢疝痛腳氣時珍茯苓澤瀉湯之注釋胃反吐而渴欲飲水者茯苓澤瀉湯主之金匱要略註胃反者如金匱云脾傷則不磨朝食暮吐暮食朝吐宿食不化名曰胃反即胃弛緩擴張證等之總稱吐字以下得由下說詳解之藤田謙造曰茯苓澤瀉湯亦為治嘔吐於方中既云渴又重言欲飲水是明其渴為主證求真按重言明其渴為主證之意也又已成胃反則當知有腹痛證故不唯胃反本此意而有嘔吐者即無嘔吐若有停飲心下痛發渴者亦可用之是泛論運用於諸病其效亦多此古方之妙也茯苓澤瀉湯方茯苓克澤瀉克甘草桂枝各克朮克生薑克上細銼以水三合煎成一合去滓一日分三回或數回溫或冷服先輩之論說治驗類聚方本方條曰治心下悸小便不利上衝及嘔吐渴欲飲水者方機本方主治曰吐而渴欲飲水者此正證也渴有水而渴為水滿也而小便不利或心下悸或腹脹滿者水滿也續建殊錄曰一禪師平日飲食停滯胸腹有動悸雷鳴嘔吐而腹中痛志氣鬱鬱不樂一醫與附子粳米湯及半夏瀉心湯不愈一日嘔吐甚絕穀累日而病益加服小半夏湯小半夏加茯苓湯益增疲勞煩悶欲死予投茯苓澤瀉湯而嘔吐止翌日啜糜粥不過十日而諸證痊愈成績錄曰一人患胃反其初頗吐水間雜以食吐已乃渴諸醫多方治療不得一效一醫教其斷食諸證果已七日始飲復吐如初至今已五年迄無寧日請先生治之先生乃診其腹自胸下至於臍旁均頗硬滿先生乃與茯苓澤瀉湯數日痊愈求真按此病為胃擴張之重證今治以健胃止渴利尿劑之本方使不出數日而痊愈又一人患胃反飲食停滯肚腹膨脹心胸不安每隔三日或五日必大吐宿水吐已乃渴如是者凡三年雖慎食斷飲針灸百治皆莫能奏效先生與茯苓澤瀉湯使兼服南呂丸月餘痊愈藤田謙造曰一寡婦年三十許自初冬患腹滿漸膨大經水不通諸醫多方治其腹滿均無效至季冬加以腹痛乍休乍作困苦殆極至是乞治於同藩師崎省庵其證腹部緊滿脈數舌上有白苔而腹中如癥瘕者出沒甚頻或乍橫梗如臂或乍磊砢如塊上下往來時出時沒出則痛作沒則痛止似大七氣湯證又常腹中雷鳴痛作則歇痛止又必雷鳴其聲如傾水口舌乾燥頗甚二便秘極又似於己椒藶黃丸證但出沒痛苦心下最甚頻渴引飲不論溫冷飲已則必慍慍欲吐前醫用氣劑則渴益甚用芒硝大黃則痛增劇服驅蛔藥無效亦無害省庵診之謂宜先治心下之飲因與茯苓澤瀉湯四五日痛減渴緩滿稍寬又連進十五六日小便通利病勢減十之七八惟小腹依然脹滿一夜忽暴瀉如傾翌朝又瀉如前兩次約下水四五升滿氣頓失如忘未幾經水亦通利爾後強健如前亦奇驗也求真按本方非下劑服後反大水瀉者是即藥之瞑眩也又一患者年八十極強健唯耳聾其他與壯人無異性嗜酒雖不多飲然每日非二三次不可某年當夏暑時患腹滿四肢羸瘦如水蠱不能進食大便秘結小水不利赤濁脈滑數舌上黃苔乾燥渴欲湯水心下痛惡聞酒香余先瀉其實使服小承氣湯便下初硬而後溏裡急後重數至圊而不通快腹滿反甚食益不進余知其誤乃更與茯苓澤瀉湯四五日諸證漸緩三十日許腹滿如失惟氣力困倦飲食未復以香砂六君子湯調理而愈一婦年二十四五患嘔吐三四日或五六日一發發必心下痛如此者二三月後至每日二三發甚者振寒昏塞吐後發熱諸醫治其嘔吐或與驅蛔藥不效余診之渴好湯水因與茯苓澤瀉湯使小量頻服之其夜病即稍緩二十餘日諸證悉退惟腰間有水氣使服牡蠣澤瀉散料而愈茯苓甘草湯之注釋傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之傷寒論註尾臺氏曰考傷寒汗出章似脫發熱脈浮數小便不利等證方中多用生薑則不渴之上又似脫嘔而二字特於汗出者豈可用此方乎其有脫逸明矣傷寒厥而心下悸者先宜治水當服茯苓甘草湯卻治其厥不爾則水漬入胃必作利也傷寒論註本條為陰證與本方證併發之證候若陰證危急則宜先治為通則然今僅有厥更無其他危急之證則當以本方先去心下之水毒然後可治其厥不然則水毒流入腸內必作下痢也而仲景此論乃暗示本方不僅能治因腎藏機能障礙之水瀉的下痢於未發亦能治其既發之意也本方為苓桂朮甘湯之去朮加生薑故其作用亦相類似然有別者彼方長於利尿作用而本方有長於鎮嘔的健胃作用故於嘔吐諸病尤於惡阻證有應用之宜也茯苓甘草湯方茯苓克桂枝克生薑克甘草克上藥銼細以水二合煎成一合去滓一日三回或分數回溫或冷服先輩之論說治驗東洞翁本方定義曰治心下悸上衝而嘔者東洞家配劑抄曰一人年五十七年前患俗所謂癇證月四五發發則顛仆不知人事茯苓甘草湯應鐘及紫丸方輿輗本方條曰心下悸概屬癇與飲以此方加龍骨牡蠣絕妙又此證有致不寐者以酸棗湯及歸脾湯不能治也余用此方屢奏奇效有一婦人自心下至膈上動悸頗甚勢如城郭撼搖遂眩暈不能起夜悸煩而目不合如是數年屢易醫不愈余最後診視謂病家曰群醫之案不一今我姑置其病因不論止投以一神方服之不怠則可令能起即與茯苓甘草湯加龍骨梅花蠣日漸有效淹久之病半年痊愈病家欣忭不勝此非奇藥異術而能起沉疴痼疾者以為漢以上之方藥也雜病辨要痘瘡條曰放點稀朗紅潤而心下悸者急當治其悸否則小便不利水氣滿於皮膚而結痂必遲治悸宜茯苓甘草湯求真按觀此可見腎臟與心下悸胃內停水與痘瘡之關係如何密切矣五苓散之注釋太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之傷寒論註自首句迄於則愈因發汗太陽病解唯因強發汗失其體液胃亦隨而乾燥故煩躁而不眠此時只欲得水無處藥劑之必要故只與少量之水則體液復胃亦得以滋潤而煩躁不眠不治而自愈之意也若脈浮以下謂若上之狀態有脈浮數尿利減少微熱消渴渴而飲水不止尿利反小者之證與前不同則以有解熱止渴利尿作用之本方為之主治之義也和久田氏曰大汗出三字斜插法也非發汗後更出汗欲言胃中乾故插此三字耳此言有理發汗已脈浮數煩渴者五苓散主之傷寒論註本條雖說唯脈浮數與煩渴二證可用本方其實既於前條示以小便不利故於本條省略之非無此證之意也尾臺氏云於發汗已脈浮數之下似脫發熱小便不利等證蓋發汗後煩渴者概非本方證而為石膏劑證然石膏劑之煩渴必伴以脈浮滑或滑或洪大等決不浮數今脈浮數與煩渴併舉則雖略去發熱小便不利於本方亦無不可也傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之傷寒論註本條雖以茯苓甘草湯注中之尾臺氏說可解之然恐與前條同為省文乎中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之傷寒論註所謂有表裡證者有脈浮發熱汗出而惡寒頭項強痛桂枝證之表證又有胃內停水之裡證之意此胃內生停水者由小便不利即腎臟機能障礙之結果排泄阻止水毒充滿於胃腸之內而此水毒伴熱毒故渴欲飲水然咽下之則既為水毒充填之胃腔再無容受之餘地勢不得已而吐出之也是師之所謂水逆也此時若用本方則方中之桂枝由汗腺排除水毒同時發揮解熱作用且抑制水毒之上衝以資他藥之活動澤瀉為君以治煩渴又由豬苓茯苓白朮之援助則水毒與熱毒由泌尿器驅逐之故胃腸內之停水消失而自能鎮吐矣此古方之神妙真可嘆服也病在陽應以汗解之反以冷水潠之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散傷寒論譯者按原本水字之上無冷字今從傷寒論淺注補正本增之註尾臺氏曰病在陽應以汗解云云是以潠灌劫激致生變證猶傷寒脈浮自汗出小便數心煩微惡寒腳攣急者誤用桂枝湯致成種種之轉變也今世無醫藥常識之輩其身已有邪熱不以為意或冒雷雨而上途或入水游泳而貪涼至成是證者夏秋之間間亦有之病情正同宜用文蛤湯連進可發汗若用本論文蛤散則誤矣潠同噀說文云含水噴也灌溉也玉函彌更作須臾解和久田氏曰古人有潠水灌水之法潠者以水吹於面也灌者以水澆於身也此二法用於陽鬱證自外以水氣激之令鬱陽勃起發散而解無此陽鬱者若行潠水灌水之法則表熱被劫不得外出彌更內逼而心煩肉上卻因正氣虛而粟起也粟起者俗謂之雞皮是被水劫之故熱既被水劫而內攻雖意欲飲水然反渴而不引水漿若不與則不久而又思水是文蛤散之證也若文蛤散不瘥愈欲得水如渴狀者此煩熱有熱復有水氣則與五苓散以觀其應否也求真按此二說各有一理於理論上難定其是非學者宜就病者以驗其正否本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之傷寒論註太陽病因誤下則表熱內陷而致心下痞胃部膨滿是即大黃黃連瀉心湯之所主治也然本條之心下痞不僅由於表熱之內陷並由小便不利致胃內停水使然者故雖與瀉心湯其痞不解也有此痞而口燥煩小便不利者為本方主治之意也是本方證與大黃黃連瀉心湯之鑒別法也尾臺氏曰渴而口燥煩當作渴而煩躁以供參考霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之傷寒論註霍亂者為吐瀉而揮霍撩亂病之總稱尾臺榕堂今村了庵二氏用葛根加朮湯於其初期頗能頓挫之又用本方或茯苓澤瀉湯能治下痢發熱口舌乾燥煩渴貪飲冷水或有水逆之證者由此觀之則仲景之方法可謂八面玲瓏圓滿無礙矣脈浮小便不利微熱消渴者五苓散主之金匱要略假令瘦人臍下有悸吐涎沫而癲眩此水也五苓散主之金匱要略註尾臺氏曰癲眩當從沈明宗作顛眩余不知其是非然本條明示本方可用於癲癇其他之發作的失神性痙攣病而方中包含澤瀉湯及茯苓桂枝等則由此可推知仲景之意五苓散方澤瀉克豬苓茯苓朮各克桂枝克上為細末一日三回分服又銼細以水二合五勺煎成一合去滓一日分三回溫或冷服但水逆之際宜作散服其他宜增上用量之二倍以上而煎服之先輩之論說治驗和劑局方曰辰砂五苓散治傷寒表裡不解頭痛發熱心胸鬱悶唇舌乾焦神思昏沉狂言譫語如見鬼神及瘴瘧煩悶不省者如中暑發渴小便赤澀調以新汲水下小兒五心煩熱焦躁多哭咬牙上攛欲成驚狀每服半錢以溫熱水下三因方曰己未之年京師大疫汗之則死下之亦死服五苓散則遂愈此無他瘟疫也五苓散治伏暑飲熱暑氣流入經絡壅溢發衄或胃氣虛血滲入胃停飲不散吐出一二升許者傷寒百問經絡卷曰五苓散治瘴氣溫瘧不服水土及黃疸或瀉者又治中酒噁心或嘔吐痰水水入便吐心下痞悶者又治黃疸如橘黃色心中煩急眼睛如金小便赤澀或大便自利者若治黃疸以山茵陳煎湯下日三服直指曰五苓散治濕證小便不利經云治濕之法不利小便則非其治又治傷寒煩渴引飲過多小便赤澀心下有水氣者又欲使水飲流行每服二錢沸湯調下若小便更不利則加防己以佐之又治尿血又治便毒羅謙甫曰春夏之交人病如傷寒其人汗自出肢體重痛難以轉側小便不利此名風濕非傷寒也陰雨之後感受水濕或引飲過多則多成此證若多服五苓散使小便通利濕去則愈初虞世曰醫者不識作傷風治之發汗而死下之亦死己未之年京師大疫正因此也羅得其說救人甚多大抵五苓散惟能利水去濕胸中有停飲及小兒吐哯欲作癇者五苓散最妙也醫方口訣集曰予嘗治平野庄一人傷風發熱口燥而渴與水則吐後服湯藥亦吐諸醫袖手請治於予診脈浮數記得傷寒論中中風六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之之言遂以五苓散末白飲和服一匕知三匕已又治一人消渴經年且胸脅支滿而頭暈與五苓散加甘草水煎使服之不三劑諸證悉治此蓋用金匱苓桂朮甘湯及五苓散之二法也曾世榮曰小兒驚風及泄瀉並宜用五苓散以瀉丙火滲濕土因其內有桂枝能抑肝風助脾土也傳云木得桂而枯是也傷寒三四日之間往來寒熱自利者邪入太陰而猶在少陽之經也宜本方合小柴胡湯名柴苓湯求真按往來寒熱自利者係五苓散證與小柴胡湯證併發非邪入於太陰也續建殊錄曰有一男子年五十有餘從未有疾矍鑠如常飲食倍於少壯時自以為昔時好角抵之戲故血氣能如是周流自客歲食餌又三倍於少壯至今年而添渴飲水數升未嘗腹滿近頗自警以數合為度如是能飲能食理當漸肥而反日瘦他亦無所苦先生診之問及其他答曰唯腹皮麻痹小便頻數耳乃與五苓散服之不日而渴愈成績錄曰男子患消渴日飲水數斗小便亦多食倍於平日先生與以五苓散服月餘奏全效求真按此二病可能是糖尿病或尿崩證類聚方廣義本方條曰霍亂吐下之後厥冷煩躁渴飲不止而水藥共吐者宜嚴禁湯水果物每欲飲水與五苓散但一帖分二三次服為佳不過三帖嘔吐煩渴必止吐渴若止則必厥復而熱發身體惰痛仍用五苓散則必漐漐汗出諸證脫然而愈此五苓散與小半夏湯效用之分別也此方治眼患與苓桂朮甘湯略似而彼以心下悸心下逆滿胸脅支滿上衝等證為目的此以發熱消渴目多眵泪小便不利為目的二方俱以利小便而奏效也茵陳五苓散之注釋黃疸病茵陳五苓散主之金匱要略註此方證僅有黃疸病三字頗漠然故東洞翁下本方定義為治五苓散證而發黃者此言有理可從之勿誤藥室方函口訣本方條曰此方主小便不利用於發黃之輕證故聖濟總錄云此方治陰黃身如橘色小便不利陰黃之證詳見於巢氏病源非謂陰證也謂無熱狀耳若此證有熱狀者宜選用梔子蘗皮湯及茵陳蒿湯東垣治酒客病以用此方為最宜蓋平日醉酒與煩悶不止者以發汗利小便之方法為適宜也求真按上說亦可補仲景所未備茵陳五苓散方茵陳蒿克五苓散克煎法用法同前先輩之治驗醫方口訣集曰有一人五月間乘梅雨往返於大阪自覺身體微熱四肢倦怠一醫作風濕用藥則惡食甚一醫作傷寒治則發熱甚醫治經月前證愈甚至寓求治診之脈沉問曰渴乎曰渴小便利乎曰不利而色黃予曰金匱有曰脈沉渴欲飲水小便不利者當發黃又曰黃疸病茵陳五苓散主之因日晚不及為末唯作湯藥服之一帖而食進五帖而熱退十帖而病如失後用調理而安求真按如據此治驗觀之則本方證必非無熱者則前記淺田氏之說似不可盡信也豬苓湯之注釋陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之傷寒論註本條雖論白虎湯及大承氣湯梔子豉湯白虎加人參湯豬苓湯等之五證及其鑒別法茲止說白虎加人參湯證與豬苓湯證之區別於下本方證與白虎加人參湯證於渴欲飲水一點俱相等然彼因熱毒之故體液消耗內外俱枯故必有口舌乾燥煩渴引飲之狀而無小便不利之候而本方證以水毒蓄積為主證熱毒不過為客證故無口舌乾燥雖渴欲飲水然無煩渴引飲之狀小便必不利以之不難分別之且彼證之脈常洪大或滑大本方證之脈必浮以此又可得而區別之陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也傷寒論註陽明病汗出多而渴者為白虎加人參湯證故本條亦如上條所以示二方證之鑒別法也即陽明病之煩渴因高熱持久體液涸竭故可與白虎加人參湯以滋潤枯燥之組織若誤以有奪取水分作用之本方則體液益奪反而增惡故有不可與之之誡少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之傷寒論註所謂少陰病者脈微細但欲寐且下痢也然本方證亦有下痢且心煩不得眠類似於陰病之但欲寐故仲景假以本方證為少陰病本方列於少陰篇然其實本方證非陰病而為陽病則本方亦非熱劑而為冷劑也本條不舉小便不利是因已述於前故略之其下利與嘔俱由小便不利所致也又渴者為有濕熱而心煩不眠亦由濕熱侵入頭腦也東洞翁本方定義云治小便不利或淋瀝渴欲飲水者又云小便淋瀝便膿血者便小便也求真按上說能補仲景之不足故余亦從以本方用於膀胱尿道疾患尤於淋病有奇效也豬苓湯方豬苓茯苓阿膠滑石澤瀉各克上銼細以水二合煎成一合去滓一日分三回溫或冷服豬苓加甘草湯方豬苓湯中加甘草克煎法用法同前主治治豬苓湯證有劇痛者豬苓加大黃湯方豬苓湯中加大黃克煎法用法同前主治治豬苓湯證而宜下者此二方為和田東郭之創方也豬苓加薏苡仁湯方豬苓湯中加薏苡仁克主治治豬苓湯證而排膿不止者此方余所始創也先輩之論說治驗古方便覽本方條曰一男子患血淋二三年一日血大出痛不可忍目眩不知人事余即與此方漸漸收效而不再發尊水瑣言曰滿身洪腫以手按其腫頗有力放手即復脹然氣息如平常者是豬苓湯證也又一種腫勢如前腰以下雖滿腫臂肩胸背無恙呼吸如平常者是亦可用豬苓湯不必問其渴之有無也東郭醫談曰一男子下血大小便不通腹滿欲死醫與四物湯加山梔黃柏之方腹滿仍甚余以豬苓湯加大黃小便漸次通快求真按此下血未明言為腸出血抑係血尿恐為前者青州治驗錄曰師曰前有若山某患淋疾者乞治診得莖中有贅肉如紉小便淋瀝如絲疼痛甚故如圖作具入尿道口以取其贅肉去畢小便出如瀧而後入青蛇或後衝紉青蛇後衝者為膏藥之名青蛇紉後衝紉者塗膏藥於紉也並以豬苓加將主治之不日痊愈求真按大黃之別名為將軍故豬苓加將者即豬苓加大黃湯也類聚方廣義本方條曰治淋病點滴不通陰頭腫痛少腹膨脹而痛者若莖中痛出腫血者兼用滑石礬甘散孕婦七八月後有陰戶焮熱腫痛不能起臥小便淋瀝者以三棱針輕輕刺腫處放出瘀水後再用此方則腫痛立消小便快利若一身悉腫發前證者宜越婢加朮湯豬苓之醫治效用本草綱目曰豬苓集解豬苓弘景曰是楓樹苓其皮黑色肉白而實者佳時珍曰豬苓亦是木之餘氣所結如松之餘氣結茯苓之義他木皆有楓樹為多耳氣味甘平無毒主治解傷寒瘟疫大熱發汗主腫脹滿腹急痛甄權治渴除濕心中懊憹元素瀉膀胱好古開腠理治淋腫腳氣白濁帶下妊娠子淋胎腫小便不利時珍發明元素曰豬苓淡滲大燥亡津液無濕證者勿服之時珍曰豬苓淡滲氣升而又能降故能開腠理利小便與茯苓同功但入補藥不如茯苓也藥徵曰豬苓主治渴而小便不利也如上諸說豬苓亦為一種之利尿藥其作用類似於茯苓澤瀉所異者本藥解熱止渴作用雖強然治心悸亢進肌肉痙攣則不如茯苓治冒眩則不如澤瀉但解熱利尿作用則較強而有力此本藥所以用於一般之實證也阿膠之醫治效用阿膠之止血作用毋俟西醫之所教已於二千年前周知矣然此止血作用限於因血液之凝固性減弱與血管壁弛縱致血液之滲透亢進而出血者可知又本藥為一種黏滑藥自其緩和包攝作用緩解組織之緊縮或包攝糜爛面等其滋潤性能醫組織之枯燥故由此等原因而發為疼痛出血排膿尿量減少或頻數咳嗽等亦為本藥之主治也滑石之醫治效用本草綱目曰氣味甘寒無毒主治身熱泄澼女子乳難癃閉利小便療胃中積聚寒熱益精氣本經通九竅六腑津液去留結止渴令人利中別錄燥濕分水道實大腸化食毒行積滯逐凝血解燥渴補脾胃降心火偏主石淋為要藥震亨發明頌曰古方治淋瀝多單使滑石又主石淋權曰療五淋主產難使胎滑易生除煩熱心躁好古曰滑能利竅以通水道為至燥之劑豬苓湯用滑石阿膠同為滑劑以利水道藥徵曰滑石主治小便不利兼治渴也據以上諸說觀之則本藥於內用時亦與外用時同其黏滑性能緩和包攝膀胱尿道腸管之炎性黏膜面故能利尿或止瀉且其寒性同時有益於消炎的作用故能助長此作用乎頌震亨二氏對滑石治結石說以豬苓湯內有此藥之能善治該證也牡蠣澤瀉散之注釋大病差後從腰以下有水氣者牡蠣澤瀉散主之傷寒論註差同瘥然與愈之全治異是過半治尚未全治之義也牡蠣澤瀉散方牡蠣澤瀉瓜蔞根蜀漆葶藶商陸根海藻各等分上研細末一回克許一日三回服用或將上藥量增量二倍以上以水二合煎成一合服先輩之論說東洞翁本方定義曰治身體腫腹中作動渴而小便不利者類聚方廣義本方條曰後世稱虛腫有宜用此方者當審其證以與之勿誤藥室方函口訣本方條曰此方治腰以下之水氣然用於腰以上之水氣亦有效但宜分其虛實若實者可加大黃此劉教論茞庭之經驗也葶藶之醫治效用本草綱目曰葶藶子氣味辛寒無毒主治破堅逐邪通利水道本經下膀胱水皮間邪水上出目浮腫利小腸久服令人虛別錄療肺壅上氣咳嗽止喘促除痰飲甄權發明杲曰葶藶大降氣與辛酸同用以導腫氣本草十劑云泄可去閉葶藶大黃之屬也據以上各說觀之則葶藶為兼有緩下作用之利尿藥也商陸之醫治效用本草綱目曰商陸根氣味辛平有毒主治療水腫腹滿洪腫疏五臟散水氣別錄瀉十種之水病甄權通大小腸瀉蠱毒大明據以上各說觀之則商陸為兼有峻下作用之利尿藥也海藻之醫治效用本草綱目曰海藻氣味苦鹹寒無毒主治癭瘤結氣散頸下硬核痛癰腫癥瘕堅氣下十二水腫本經療皮間積聚暴㿉瘤氣結熱利小便別錄治氣急心下滿疝氣下墜疼痛卵腫甄權治奔豚氣腳氣水氣浮腫宿食不消五膈痰壅李殉據以上各說觀之則海藻可謂為解凝性利尿藥也八味丸之注釋崔氏八味丸治腳氣上入少腹不仁金匱要略註不仁者本係知覺麻痹之義然少腹不仁非唯下腹部知覺麻痹之意寓有該部軟弱無力恰如按棉花然之觸覺之意也由余之實驗則此腳氣與普通一般者不同多現於孕產婦尤以產後之婦人為特種之病證俗稱血腳氣者是也虛勞腰痛小腹拘急小便不利者八味丸主之金匱要略註小腹拘急者以指撮下腹內部有緊張狀的自覺之謂也夫短氣有微飲當從小便去之苓桂朮甘湯主之腎氣丸亦主之金匱要略註尾臺氏曰短氣云云之二方雖同為利小便然其主治則不同此方余謂苓桂朮甘湯也主心下之水飲故施於此證余曰指心下停飲短氣之證也則有效八味丸主少腹不仁故用於心下停飲短氣之證絕無其效夫少腹不仁者不特僅因水毒血亦不循也此所以用八味丸之有效也此說雖當然說明猶未充分故補足之凡水毒原因性之短氣恒為淺在的力弱者與熱毒原因性短氣例如大承氣湯證之短氣是也之深而有力者異茯桂朮甘湯證比八味丸證則較實故其短氣亦比之有力是二方證可以判別矣餐英館治療雜話曰呼氣短者水氣也吸氣短者腎虛也為八味丸之適應證也求真按此說可謂苓桂朮甘湯之短氣發於呼氣時而八味丸之短氣生於吸氣時也果然與否須俟他日之研究男子消渴小便反多以飲一斗小便亦一斗腎氣丸主之金匱要略譯者按原本無亦字茲從唐氏金匱淺注補正本增註消渴者雖渴而飲水然尿利少也今反尿利多故用反字以飲一斗云云者形容消渴小便反多也古來醫家雖因本條文而用本方以治糖尿病及尿崩證然由余之經驗現時該病之大半為石膏劑證也不可眩惑於仲景所論之表面而輕忽誤治之問曰婦人病飲食如故煩熱不得臥而反倚息者何也師曰此名轉胞不得溺也以胞繫了戾故致此病但利小便則愈宜腎氣丸主之金匱要略註飲食如故云者飲食與平常無異固為胃中無病然是亦為陰證之徵所謂煩熱者於觀證辨疑云煩熱虛熱也為心中手掌足心之熱也煩者為無可奈何之狀血脫者地黃主之又傷寒雜病辨證曰煩熱者因熱而苦煩也其證心胸之間如蒸如焮熱氣沸鬱煩擾不安故名煩熱成無己曰煩熱者與發熱若同而實異也發熱者怫怫然發於肌表有時而休也煩熱者因煩而熱無時或歇者也二者均是表熱而煩熱者因熱而煩發熱乃時發無時或也是得之矣又有謂手掌足心煩熱者蓋取諸煩擾無可奈何之義也然此煩熱非本方證之特有而同本方含大量地黃之三物黃芩湯炙甘草湯黃土湯芎歸膠艾湯大黃蟅蟲丸等證亦有發現者又無地黃之梔子劑小柴胡湯小建中湯等證亦有發現者僅手掌足蹠之煩熱於驅瘀血劑之大黃牡丹皮湯桃核承氣湯桂枝茯苓丸當歸芍藥散等證亦有發現者故憑此一證之存在不可為本方證之特徵也倚息者倚懸於物而呼吸之意即伴短氣以呼吸也轉胞之胞即指膀胱稱轉胞時雖為膀胱轉移之意其實不然是由以下之胞繫了戾而來之病名也溺者排尿之意胞繫之繫繫或緊之義了戾者為屈曲旋轉之意膀胱如繫之緊者非輸尿管與尿道之外而發病則此屈曲旋轉者即輸尿管也故全文之意有人問曰婦人飲食如平常然煩熱而不得橫臥倚懸於物而呼吸者何故師答之曰此病稱轉胞因輸尿管曲捻不能排尿之結果也故與本方以整復輸尿管而使利尿之意也輸尿管之屈曲捻轉因組織之緊張力減退則由此原因之子宮下垂證亦多以本方為主治也八味丸方地黃克山茱萸薯蕷各克澤瀉茯苓牡丹皮各克桂枝附子各克上研細末以蜂蜜為丸一日分三回服若作煎劑時除附子外諸藥須增量至二倍以上以水三合煎成一合服八味丸之腹證地黃治臍下不仁及煩熱具強心作用地黃合澤瀉茯苓附子為利尿作用薯蕷山茱萸有滋養強壯作用牡丹皮佐地黃而治煩熱並可和血桂枝抑制水毒之上衝附子刺激新陳代謝機能使臍下不仁等之組織弛縱者可以復舊並治下體部之冷感及知覺運動之不全或全麻痹等故包含是等藥品之本方以臍下不仁為主目的尿利之減少或頻數及全身之煩熱或手掌足蹠之更互的出沒煩熱與冷感為副目的更參照上記及下列諸說而用之也可先輩之論說治驗方機於本方之主治曰腳氣疼痛少腹不仁蕤賓足冷或痛少腹拘急其便不利者應鐘求真按疼痛者為附子桂枝之治處足冷者附子之療所也夜尿或遺尿者建殊錄曰某僧一身腫脹小便不利心中煩悶氣息欲絕腳尤濡弱一醫作越婢加朮附湯飲之數日無效先生診之按至少腹得其不仁之狀乃與八味丸一服心中稍安再服小便快利未盡十劑而痊愈求真按此病恐係慢性腎炎余亦於此證而煩熱不堪病者與本方而得速效者矣醫方口訣集本書方條曰下焦虛憊或小便不禁者或癃閉者痿痹者皆可用之古方便覽本方條曰一人患熱病後口渴飲茶湯每日約三四升小便晝夜五六十次其他無少苦諸治不得奏效余即作八味丸料使飲之諸證頓除成績錄曰一男子腰以下痹冷痛手足煩熱舌上黑苔如實狀先生與八味丸而痊愈求真按此舌黑苔必為濕潤類聚方廣義本方條曰治產後水腫腰腳冷痛小腹不仁小便不利者以水煮服之淋家小便晝夜數十行便了微痛常有便意咽乾口渴者稱氣淋老人多患斯證宜此方又治陰痿及白濁證小腹不仁無力腰腳酸軟或痹痛小便頻數者婦人白帶甚者亦宜此方求真按余亦屢用本方治是等之病矣地黃之醫治效用本草綱目曰地黃集解別錄曰地黃生咸陽川澤黃土地者佳二月八月採根陰乾弘景曰咸陽即長安也乾地黃氣味甘寒無毒主治傷中逐血痹填骨髓長肌肉作湯除寒熱積聚除痹本經主男子五勞七傷女子傷中胞漏下血破惡血溺血利大小腸去胃中宿食補五臟內傷不足通血脈益氣力利耳目別錄助心膽氣強筋骨長志安魂定魄治驚悸勞劣心肺損吐血鼻衄婦人崩中血運大明產後腹痛甄權涼血生血補腎水真陰除皮膚燥去諸濕熱元素主心病掌中熱痛脾氣痿蹶嗜臥足下熱而痛吐血好古生地黃主治治婦人崩中血不止及產後血上薄心悶絕傷身胎動下血胎不落瘀血留血鼻衄吐血皆搗飲之別錄解諸熱通月水利水道甄權本草備要曰乾地黃甘苦寒涼血治血虛發熱勞傷咳嗽痿痹驚悸血運崩中長肌肉利大小便調經胎不安又能殺蟲治心腹急痛由是觀之則地黃有止血利尿強壯強心解熱鎮咳鎮靜鎮痛等諸作用也明矣然以之應用於臨床上當以血脫南涯翁所說血虛本草備要所說即貧血虛弱與臍下不仁為主目的煩熱及其他症狀為副目的薯蕷之醫治效用本草備要曰山藥入脾肺二經補其不足清其虛熱固腸胃潤皮毛化痰涎止瀉痢益腎強陰治虛損勞傷又能益心氣治遺精健忘據此說觀之則本藥為滋養強壯性的止瀉藥矣山茱萸之醫治效用本草綱目曰山茱萸實氣味酸平無毒主治強陰益精安五臟通九竅止小便利久服明目強力別錄治腦骨痛療耳鳴補腎氣與陽道強陰莖添精髓止老人尿不節治面上瘡止月水不定甄權暖腰膝助水臟大明發明好古曰滑則氣脫澀劑所以收之山茱萸止小便利秘精氣取其味酸澀以收滑也據以上各說觀之則本藥為滋養強壯性的收斂藥矣麻黃湯之注釋太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之傷寒論註本方雖與桂枝湯同為太陽病之治劑然如既述之桂枝湯證為皮膚弛縱而汗自出者即水毒不鬱滯於體表身體非不疼痛然身疼腰痛骨節疼痛不至劇烈又此毒不迫於呼吸器故不喘而本方證因皮膚緻密而緊張汗不出故排泄被阻止於是水毒迫於肌肉或關節致成身疼腰痛骨節疼痛侵入呼吸器而使作喘也由此觀之僅由汗出與不出之差即有霄壤之別故診斷時務宜謹慎從事不可有誤太陽與陽明合病喘而胸滿者不可下之宜麻黃湯傷寒論註所謂太陽與陽明合病者是指示太陽病不解而轉屬於陽明之機會與有陽明證時而兼發太陽證之時相似也前者自表及於裡後者由裡達於表也然太陽陽明二證在共存時則相等而前者為普通所見故暫置之今就後者說明之大概陽明證以瀉下可解然有時病毒之一部欲由皮膚逃遁而現表證同時有迫呼吸器而發喘證者此際固有陽明證而太陽證亦一時的存在也故成氏所謂太陽與陽明之合病而胸滿者由喘而胸腔之內壓增高壓下橫膈膜心下與肋骨弓下部膨滿之謂即喘為主證而胸滿為客證也故以主證之喘為目的而用本方則喘與胸滿亦皆治愈之意也何以特記此無意味之客證之胸滿而猶云不可下之是亦仲景之深意所在此喘而胸滿與大承氣湯證之腹滿而喘者頗相類似而示其鑒別法也詳言之大承氣湯證之腹滿而喘由病毒充實於腹內而成腹滿因腹滿而迫使橫膈膜上升致成喘證是以腹滿為主證而喘為客證也故以腹滿為目的而以大承氣湯瀉下病毒時則腹滿與喘皆愈矣然不能治喘而胸滿者則麻黃湯證之喘而胸滿者暗示不可誤為腹滿而喘以大承氣湯下之之意也決斷病證之表裡主客為決汗下之重大關鍵不可不深留意之太陽病十日已去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯傷寒論註當患太陽病經過十日以上尚不愈時呈脈浮細而好橫臥者表證之謂外即表證已解也設有此狀而胸滿骨痛者可與小柴胡湯脈但現浮無他證者為表證未全去宜與本方之意也本條所以稱與不稱宜者稱宜為應一時病變之活用手段而權其機宜也稱與者見目前之證為一時的處方之謂寓有依證變化或至於轉方亦未可知之意也至病證完備無絲毫疑者則稱主之是三者之區別也太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已須臾其人發煩目瞑劇者必衄衄則解所以然者陽氣重故也麻黃湯主之傷寒論註表證仍在似非仲景之正文故刪之亦佳又原文於服藥已之下有微除二字從尾臺氏說認為須臾之誤已改之目瞑與目眩同衄血後治病之理與所述於桂枝湯條者無異又於陽氣重故也句雖有諸說何莫非捕風捉影之論故不揭之余亦不知其義然於本方運用上無大關係故暫不問亦佳唯有一要言麻黃湯主之之一句以在本條之末似非不作衄血病瘥之後尚用本方解然此由不知仲景之文法之過蓋此句假定續於此當發其汗句之下而解釋之較合於理脈浮者病在表可發汗宜麻黃湯傷寒論脈浮而數者可發汗宜麻黃湯傷寒論註以上二條云脈浮脈浮而數恐省略緊字或有力等字傷寒脈浮緊不發汗因致衄者麻黃湯主之傷寒論註可參照桂枝湯條於理無異陽明病脈浮無汗而喘者發汗則愈麻黃湯主之傷寒論註已見首條及太陽與陽明合病條救卒死客忤死還魂湯主之金匱要略譯者按唐氏金匱淺注補正本無此一條註千金方本方主治曰主卒忤鬼擊飛尸及諸奄忽氣絕而不復覺或已無脈口噤拗而不開則去齒下湯入口不下者分病人之髮以左右足蹈肩引之則藥下復增一升則立甦所謂卒忤者急卒忤觸生氣之義飛尸者從肘後方則游走於皮膚洞穿臟腑發每刺痛變作無常也鬼擊者卒然著人如刀刺狀胸脅腹內切痛而不可抑按或為吐血鼻血下血一名稱鬼排然本條之所謂卒忤飛尸鬼擊者係體內有病變不然唯因某種原因突然皮膚呼吸斷絕當由皮膚排泄之毒物急激襲擊頭腦之結果陷於人事不省之謂則用峻發汗劑之本方一掃鬱滯之病毒則意識自恢復矣麻黃湯方麻黃杏仁各克桂枝克甘草克上細銼以水三合煎成一合去滓一日三回溫服麻黃加桔梗湯方於前方中加桔梗克煎法用法同前主治治麻黃湯證支氣管及肺泡內有凝痰呼吸困難者本方係余之創設也先輩之論說治驗東洞翁於本方定義曰治喘而無汗頭痛發熱惡寒身體疼痛者方輿輗還魂湯條曰此方為起死回生之神劑誠不愧還魂之名也小兒發搐而死二三日不醒間有起之者余通家一芽兒曾患此證醫生群集投以驚藥數方且施針灸治法殆盡未見一效病勢已發極點皆曰不治余後諸醫師至初診其脈則可謂沉絕暫對之則時見而生機仿佛因向病家曰此子雖病勢已危以余觀之全是熱邪鬱閉之極若一得發泄庶幾可以回春即作還魂湯與之使其母抱而被覆之須臾汗出即醒蓋還魂湯原無發汗之說今用之使覆被出於余之理想先覺者請政之余嘗值小兒之發熱昏沉者則務發其汗十不誤一此證遽用金石腦麝不唯不醒反引邪深入於內禍在反掌之間喻嘉言曰若小兒病發熱昏沉務擇傷寒名家循經救療則百不失一矣真確論也求真按現今醫家對於此證除注射樟腦精外殆無他策是非其治也明矣當猛省生生堂治驗曰一女子年甫八歲患狂癇休作有時發則心氣恍惚妄言不已諸治無驗延至十八年春愈甚劇則每夜三四發醫皆束手父母甚憂之謁師請治師挈其女入浴室以冷水灌之食頃乃與麻黃湯使覆以取汗二三次遂不復發求真按此治驗之證候記載不充分故用本方之理由亦不明然恐中神氏諦認此狂癇之原因為皮膚呼吸障礙所以灌注冷水衝動皮膚以期藥力之透徹乎方伎雜志曰余十三歲時病家來請診適長兄蘿薺他出王父紫峰君曰汝往診之因診視歸王父問其病證答曰以傷寒頭痛如破惡寒發熱脈浮數而有力又問以何法治之答以麻黃湯王父笑頷之乃告使者調合三帖使溫服可大發汗翌日診之大汗而苦患脫然矣惟尚有餘熱轉與小柴胡湯不日復故此余之初陣也類聚方廣義本方條曰卒中風痰涎壅盛人事不省心下堅身大熱脈浮大者以白散或瓜蒂取吐下後有可用本方者宜參考之初生兒時發熱鼻塞不通哺乳不能者用此方即愈治痘瘡見點之時身熱如灼表鬱難發及大熱煩躁而喘起脹不能者治哮喘痰潮聲音不出抬肩滾肚而不得臥惡寒發熱冷汗如油者合生薑半夏湯用之則立效按哮喘證大抵一年一二發或五六發亦有每月一二發者其發也必由外感或過食由外感來者宜麻黃湯麻杏甘石湯大青龍湯等因飲食或大便不利而發者先以陷胸丸紫圓等以吐下疏蕩宿滯後再用對證方為佳求真按由余之實驗因飲食或大便不利而發者可用大柴胡湯桃仁承氣湯大黃牡丹皮湯之一方乃至三方者甚多需陷胸丸及紫圓者極稀也橘窗書影曰一婦人臨產破漿後振寒腰痛如折不能分娩前醫與破血劑余診曰脈浮數而肌熱恐係外感與麻黃湯加附子溫覆使發汗須臾腰痛稍寬而發陣縮余謂產期將至使坐草俄產一女舒氏女科要訣曰偶醫一產婦發動六日兒已出胞頭已向下而竟不產醫用催生諸方又用催生之靈符又求靈神爐丹俱無效延予視之其身壯熱無汗頭項腰背強痛此寒傷太陽之營也法主麻黃湯作一大劑投之使溫覆少頃得汗熱退身安乃索食食迄豁然而生此治其病而產自順上工之法也求真按可見用內服藥而使催生之妙麻黃之醫治效用東洞翁曰麻黃主治喘咳水氣兼治惡風惡寒無汗身疼骨節疼痛一身黃腫此說雖不無理然以本藥無應用上之定則為難耳喘咳水氣原因頗多則隨其異以主治之故藥物亦不得不異也因而本藥不宜泛稱主治喘咳水氣也然麻黃主治喘咳水氣在本草綱目麻黃發明條下李時珍曰然風寒之邪皆由皮毛而入皮毛者肺之合也肺主衛氣包羅一身天之象也是證雖屬乎太陽而肺實受邪氣其證時兼面赤怫鬱咳嗽有痰喘而胸滿諸證非肺病乎蓋皮毛外閉則邪熱內攻而肺氣膹鬱故用麻黃甘草云又按丹波氏所著金匱要略述義之肺痿肺癰咳嗽上氣病篇於本篇中用麻黃者四方宜作二義觀注家皆謂其證為內飲挾外邪故用麻黃發其表是一義也今驗肺脹證多是因宿飲時令而觸發者不必具表候則用麻黃適取發泄肺中之鬱飲亦猶麻杏甘石湯之意是一義也故不可拘泥於一說之下也如上所述本藥之效用不問外因或內因等苟因表閉即皮膚排泄機能障礙所成之喘咳水氣即能奏效也若由其他原因者則無關係矣今補足二氏之說以現代之解析如下凡皮膚與肺臟俱為氣體毒及水毒之排泄機關不論何種疾病若皮膚機能被障礙或被停止時則肺臟不得不代償此機能必要上使氣體及水毒之排泄旺盛然此代償作用自有限度故其結果為肺部蓄積此等毒物其徵候發為呼吸困難及喘咳於此時能用本藥則其峻烈之發表作用使氣體及水毒自汗腺排出則皮膚機能復舊而肺臟之代償作用之任務解除則喘咳水氣而自消失矣故麻黃者因表閉即皮膚排泄障礙或停止發為喘咳水氣為主目的其他症狀為副目的而用之否則徒有害而無效也然則本藥有用於無喘咳水氣之候之頭痛身疼腰痛骨節疼痛者又何也蓋因此等證用本藥之理亦與喘咳水氣無異此時之氣體及水毒如其情形不過不迫於呼吸器而有侵入頭部或腰部或關節等之差耳由余之經驗假令雖不聞喘咳水氣之音響然聽診胸部認為乾性囉音則即為本藥證而無誤何也是不外為喘咳水氣之輕微或潛伏者耳本草備要曰麻黃辛苦而溫為肺家之專藥發汗解肌去營中之寒邪衛中之風熱調血脈通九竅開毛孔治中風傷寒頭痛咳逆上氣風寒鬱於肺經經曰諸氣膹鬱皆屬於肺痰哮氣喘赤黑斑毒毒風疹痹皮肉不仁目赤腫痛水腫風腫若過劑則有汗多亡陽之患杏仁之醫治效用本草備要曰杏仁辛苦甘溫而利瀉肺解肌能發汗除風散寒降氣行痰潤燥消積利胸膈之氣滯通大腸之氣秘治時行頭痛上焦風燥咳逆上氣煩熱喘息有小毒能殺蟲治瘡猘狗毒錫毒肺虛而咳者禁用藥徵曰杏仁主治胸間之停水故治喘咳而兼治短氣結胸心痛及形體浮腫杏仁與麻黃同為治喘而有其別胸滿不用麻黃身疼不用杏仁其二物同用者以有胸滿身疼二證也氣血水藥徵曰以上諸證為水滯氣不暢之候而杏仁終不得逐水故表有水者合麻黃以逐之水在裡則合茯苓或葶藶或巴豆以逐之觀證辨疑曰喘者水在咽中而氣不行之證也麻黃湯麻黃杏仁甘草石膏湯桂枝加厚朴杏子湯上為表水逆於咽中所致以杏仁主之曰身疼曰惡風無汗曰發汗曰太陽病下之後等證是皆表水逆於咽中之證也小青龍湯小青龍加石膏湯越婢加半夏湯上為裡水迫於咽中所致以半夏主之曰心下有水氣曰乾嘔曰或渴或不渴曰目如脫狀是皆裡水之證也半夏之所治者咳而喘杏仁之所治者喘而不咳此其別也和漢藥物學曰杏仁成分主成分為脂肪油即杏仁油含百分之五十分以上應用為鎮咳祛痰藥應用於支氣管炎及喘息等藥物學曰氰酸藏化水素為極有毒之氣體也植物界中多作糖原質而存在例如由苦扁桃中之糖原質由同時存在之果乳加水分解發生氰酸葡萄糖及揮發苦扁桃油杏桃櫻實之核中亦含有同一或類似之糖原質及果乳故加水搗碎時亦發生氰酸氰酸為原形質毒奪一切動植物之生活機於高等動物抑遏細胞之酸化作用故內呼吸及新陳代謝作用緩慢或被制止因而血液雖流通組織之毛細管而不被靜脈血化仍作鮮紅色是細胞內發酵素麻痹故也不僅細胞內發酵素有膠樣金屬等觸媒作用亦由氰酸而麻痹即一般有制腐制酵作用於局所麻痹於知覺神經末端皮膚亦引起鈍麻總觀以上諸說則杏仁無獨力治水毒之能水毒在表時須藉麻黃之協力在裡時須俟茯苓葶藶甘逐巴豆等之力始有治喘咳或逐水作用而以治喘作用為主鎮咳作用為客也又本藥有緩下作用則宜於實證而不宜於虛證為其含有脂肪油故也又此藥有鎮痛作用因有麻痹知覺神經末端之性又含有制腐制酵作用故有治下等動物性及細菌性疾病之可能性可知麻黃加朮湯之注釋濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之金匱要略註雜病辨要曰所謂濕者乃雨濕氣霧露氣卑濕氣及山嵐瘴氣之鬱蒸而為淫邪者也蓋六淫之氣中於人軀惟此氣濡滯故漸侵入關節為痛為痹於是有風濕濕痹之別關節疼痛而煩者名曰濕痹其病在表宜發汗此麻黃加朮湯之所宜也由此說可解本條由余之經驗本方證頗少而葛根加朮薏苡仁湯證反多也麻黃加朮湯方麻黃杏仁各克桂枝克甘草克朮克煎法用法同前先輩之論說東洞翁本方定義曰治麻黃湯證之小便不利者類聚方廣義本方條曰治麻黃湯證一身浮腫小便不利者隨證加附子婦人稟性薄弱妊娠每因水腫墜胎者其人用越婢加朮湯及木防己湯等即有墜胎者宜此方又合葵子茯苓散亦良山行冒瘴霧或入屈穴中或於居室浴所諸濕氣熱氣鬱閼之處暈倒氣絕者俱使連服大劑即蘇求真按本方可知於碳酸氣中毒有吸入酸素以上之妙效勿誤藥室方函口訣本方條曰此方為風濕初期發表之藥也歷節初期亦可以此方發之此證脈雖浮緩然以身體煩疼為目的若最重者宜越婢加朮湯甘草麻黃湯之注釋裡水越婢加朮湯主之甘草麻黃湯亦主之金匱要略註南涯氏曰麻黃湯治表水不治裡水柴胡湯治裡水不治表水類聚方廣義本方條曰按裡水疑皮水之誤外臺作皮水一身面目悉腫據此二說觀之則裡水即皮水之誤也明矣而仲景云越婢加朮湯主之甘草麻黃湯亦主之者二方非治同證之意也但治皮水一點為二方同一之義耳本方宜隨下說而運用之東洞翁曰甘草麻黃湯治喘急息迫或自汗或無汗者求真按治水病而腫脹或喘或自汗出或無汗者南涯氏注金匱要略防己茯苓湯條曰此證故四肢先腫而身不腫與麻黃證異麻黃證者身腫而及於四肢也又防己黃耆湯條曰凡防己所治者為虛腫而自下起也麻黃所治者為實腫而自上起也類聚方廣義本方條曰千金方云有人患氣急積久不瘥遂成水腫如此者眾諸皮中之浮水致面目身體自腰以上腫者皆可以此湯發汗之金匱水氣病篇云中皮水其脈浮外證浮腫按之沒指不惡風其腹如鼓不渴當發其汗按此證亦宜甘草麻黃湯求真按麻黃本以無汗為目的而諸家茲云有自汗者乃因此自汗與桂枝湯證之自然自汗者不同因汗不出病毒無由發泄鬱積之極幸開一條血路而現自汗也如桂枝湯證其量不多且不稀薄也甘草麻黃湯方甘草克麻黃克上銼細以水二合煎一合去滓一日分三回溫服先輩之論說治驗方輿輗曰按金匱水氣病篇中有甘草麻黃湯一方此雖亦用於裡水然亦屬可疑金鑒云裡字當是皮字豈有裡水而用麻黃之理乎一男子六十餘歲患上證余診之即與甘草麻黃湯服之一夜汗出煩悶而死後閱濟生方有云有患氣促積久不瘥遂成水腫者服之有效但此藥發表於老人虛人不可輕用余當弱冠方脈未妥逮讀濟生而大悔前非橘窗書影曰一人患久年哮喘感觸風寒則必發作不能動搖余諭之曰積年沉疴非一朝藥石所能除但可先驅其風寒以桂枝加厚朴杏子湯及小青龍湯發表之表證解則與麻黃甘草湯服二三帖喘息忽平行動復常得以出事其人大喜每自效此法而調藥有效經年後外感稍觸喘息亦大減云余多年苦思治哮喘得二法觸觴風寒者主發汗如森村氏法為第一法由寒冷澼飲者與外臺柴胡鱉甲湯及延年半夏湯等驅除其解飲後以苓桂朮甘湯加沒食子華岡經驗方使散服則喘氣大收是第二法也求真按仲景之治法萬病俱隨證處方故喘息之治法亦無一定淺田氏處方之適宜處雖不能謂為全無然由余之經驗誘發於感冒者以葛根湯大柴胡湯桃核承氣湯之合方證為最多葛根湯桂枝茯苓丸合方或葛根湯桂枝茯苓丸大黃牡丹皮湯合方之證次之麻黃湯甘草麻黃湯小青龍湯證等則較少也又不關於感冒而發作者大概為大柴胡湯桃核承氣湯之合方或大柴胡湯桃核承氣湯大黃牡丹皮湯之合方殆有百發百中之效似覺無柴胡鱉甲湯延年半夏湯之必要淺田氏為學識淵博經驗豐富之名醫也余亦多從其所學然從來古方後世折衷家每有對於古方活用上往往有不徹底之短此氏所以用如柴胡鱉甲湯延年半夏湯之愚方乎麻黃附子甘草湯之注釋少陰病得之二三日以麻黃附子甘草湯微發汗以二三日無裡證故微發汗也傷寒論註少陰病者謂脈微細但欲寐且有惡寒蜷臥小便清利等證裡證者與陽證之裡證即陽明證全異陰證之裡證謂有吐利清穀等之候本條與次條之麻黃附子細辛湯條均論陰證兼表證之治法即稟賦薄弱或後天有缺陷者若患中風或傷寒時不如強壯者之呈太陽少陽陽明證而直發為少陰之症狀初期二三日間無陰證之裡證即吐利清穀之症狀而現陰證之表證即微發熱惡寒等之證候故於發表藥之麻黃中加入治陰證藥之附子或附子細辛如本方或麻黃附子細辛湯用之以微發汗而治其表證也所謂微發其汗者因陰證宜禁汗吐下然今有表證故不得已而發表是發汗不宜令其過度之意也水之為病其脈沉小屬少陰浮者為風無水虛脹者為氣水發其汗即已脈沉者宜麻黃附子甘草湯浮者宜杏子湯金匱要略註類聚方廣義本方條曰金鑒云氣水之氣字當為風字若無水虛脹者為風水發其汗即已按風水脈沉者宜此方汗之當參看防己黃耆湯條又按金匱小注未見杏子湯恐是麻黃杏仁甘草石膏湯子炳以為未妥謂為麻黃杏仁薏苡甘草湯試於事實子炳為優東洞翁本方定義曰治甘草麻黃湯證之惡寒或身微痛者由此二說可知本條之意矣麻黃附子甘草湯方麻黃甘草各克附子克上細銼以水二合五勺煎成一合去滓一日分三回溫服麻黃附子細辛湯之注釋少陰病始得之反發熱脈沉者麻黃附子細辛湯主之傷寒論註少陰病始得之者初病脈微細而有欲寐之情況開始即病陰證之謂也少陰病普通不發熱今反發熱又陽證之發熱脈必浮今亦反之發熱而脈沉是證與脈反於常規故云反也麻黃附子細辛湯方麻黃細辛各克附子克上細銼以水三合煎成一合去滓一日分三回溫服先輩之論說治驗醫經會解本方條曰若少陰證脈沉但欲寐始得之發熱肢厥無汗者為表病裡和當用此方以緩汗之張氏醫通曰暴啞聲不出咽痛異常卒然而起或欲咳而不能咳或有痰或清痰上溢脈多弦緊或數疾無倫是大寒犯腎也以麻黃附子細辛湯溫之東洞翁本方定義曰治麻黃附子甘草湯證之不急迫而有痰飲之變者方輿輗曰余壯年時治一患者年甫五歲病痘初發與葛根加大黃湯自第三日放點至第四日而痘皆沒但欲寐絕飲食脈沉熱除宛然少陰之病狀也因勸轉就他醫病家不聽強請治之再潛心細診沉脈之中猶覺神存乃與麻黃附子細辛湯翌日痘再透發脈復氣力稍增由是起脹貫膿順候也結痂而愈惟此兒無熱毒為尋常之痘耳因多用葛根加大黃湯使發汗過多大便微溏故有此變此是余初年未熟之咎也然幸兒未夭折得免其父母之譏譴亦大幸矣勿誤藥室方函口訣本方條曰此方解少陰之表熱一老人咳嗽吐痰午後背脊洒淅惡寒後微似發汗不止一醫以為陽虛之惡寒與醫王湯無效服此方五帖而愈求真按余亦曾治老人之支氣管炎用本方即得效矣麻黃杏仁甘草石膏湯之注釋發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯傷寒論註麻黃本以無汗為目的今用於汗出而喘者乃因氣血水藥徵中以麻黃合杏仁則治疼痛而喘合桂枝則治惡寒無汗合石膏則治汗出也云由是觀之本方有麻黃杏仁石膏無桂枝此所以本方治汗出而喘也然麻黃與石膏之本方及越婢湯等證之汗與桂枝湯證之自汗全然異趣乃因伏熱而榨出富黏稠性臭氣強又無大熱云者觀證辨疑中以為當有大熱而無大熱者也云云傷寒雜病辨證中以為有無大熱者大即大表之大非大小之大故謂大表無顯熱非全無熱之謂也云云故雖有發大熱之資格但現在於體表無大熱之謂也麻黃杏仁甘草石膏湯方麻黃克杏仁甘草各克石膏克上細銼以水二合五勺煎成一合去滓一日分三回溫服先輩之論說東洞翁本方定義曰治甘草麻黃湯證之咳而煩渴者方輿輗本方條曰雖用小青龍湯以解表然喘猶甚者水熱結也此時以麻杏甘石為必效之主方也類聚方廣義本方條曰治喘咳不止面目浮腫咽乾口渴或胸痛者兼用南呂丸姑洗丸哮喘胸中如火氣逆涎潮大息呻吟聲如拽鋸鼻流清涕心下硬塞巨里動如奔馬者宜此方待痰融聲出之後以陷胸丸紫圓之類疏導之肺癰發熱喘咳脈浮數臭痰膿血渴欲飲水者宜加桔梗有時以白散攻之求真按尾臺氏為東洞翁間接之門人亦有濫用峻下劑之癖是以氏關於兼用方所說不可悉信勿誤藥室方函口訣本方條曰此方為麻黃湯裡面之藥謂汗出而喘為目的也其熱沉淪於肉裡而熏蒸於上肺部者以麻石之力解之故此方與越婢湯有下無大熱之句也麻黃杏仁薏苡甘草湯之注釋病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也可與麻黃杏仁薏苡甘草湯金匱要略譯者按原文無尾句今從唐氏金匱淺注補正本加之註一身盡疼者一身之關節盡痛也日晡所者黃昏時也發熱二字在日晡所之上者謂常發熱然至日暮時更增劇之意也此下是說明病名與病因東洞翁本方定義云治麻黃杏仁甘草石膏湯證之不煩渴有水氣者然茫然之議論難以為確據又當有喘滿之證然是亦非必有之證故難為定則也由余之實驗本條明述急性多發性關節炎之證治苟存其證於他病亦可活用之無待言矣麻黃杏仁薏苡甘草湯方麻黃克甘草克薏苡仁克杏仁克煎法用法同前先輩之論說治驗方輿輗本方條曰此湯之證較麻黃加朮湯則濕邪膩滯稍深故用薏苡等品歟夫薏苡本經云治濕痹別錄云除筋骨中之邪氣余曾運用於梅毒及痛痹等類聚方廣義本方條曰治孕婦浮腫喘咳息迫或身體麻痹或疼痛者治肺癰初起惡寒息迫咳嗽不止面目浮腫濁唾臭痰及胸痛者當其精氣未脫兼用白散蕩滌邪穢則可平復矣風濕痛風發熱劇痛關節腫起者加朮附有奇效求真按有朮附之證方可加之否則不宜加也勿誤藥室方函口訣本方條曰此方治風濕之流注而痛不解者蓋風濕尚在皮膚未至關節故只發熱身疼痛此方能強烈發汗又一男子周身生疣子數百走痛者與此方而即治求真按淺田氏謂本方不治關節痛非也不可從之又此方之治疣不外薏苡仁之作用故單用之亦可有效但其陳久硬固者效少薏苡仁之醫治效用腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿薏苡附子敗醬散主之金匱要略方後云小便當下血求真按甲錯者皮膚如魚鱗之謂癰膿者化膿之意由薏苡附子敗醬散之治等證觀之則為此方君藥之薏苡仁其治甲錯及化膿也明矣又此方服後尿量增加則主藥之薏苡仁有利尿作用亦明矣方機同方主治曰瘡家身甲錯者求真按瘡家者謂有癰腫癤腫等之皮膚病人也所謂鵝掌風者求真按鵝掌風者手掌或足蹠甲錯者之病名也方輿輗同方條曰治白帶不止脈沉緊者此本腸癰藥也余活用於帶下間有效驗求真按據此說則薏苡仁能治白帶也明矣千金葦莖湯治咳有微熱煩滿胸中甲錯者是為肺癰金匱要略註類聚方廣義本方條曰當以吐膿血臭痰為目的求真按薏苡仁為本方之臣藥則其治膿血臭痰也明矣證治摘要肺痿肺癰篇曰桔梗湯加薏苡仁則尤有效一男兒六歲患肺癰吐膿血與桔梗湯加薏苡及犀角每日使食薏苡粥及鯉魚膾乾柿等十餘日膿血日減月餘痊愈肺癰用薏苡根搗汁溫熱服之其效驗最捷已潰未潰皆可挽回諸方所不及也又云薏苡為肺癰之專藥根汁最有效明韓懋醫通松蔭醫誤曰疣類多出與薏苡子則有驗肩臂痛如吹出物然用之亦有驗云本草綱目曰薏苡仁氣味甘微寒無毒主治筋急拘攣不可屈伸久風濕痹本經除筋骨中之邪氣不仁利腸胃消水腫令人能食止消渴殺蟲藏器治肺痿肺氣積之膿血咳嗽涕唾上氣煎服則破毒腫甄權去乾濕腳氣大驗孟詵健脾益胃補肺清熱去風勝濕利小便熱淋時珍歸納上說本藥有治甲錯治膿汁膿血白帶利尿治疣贅發疹鎮痛鎮痙消炎解凝諸作用也明矣余以之加於葛根湯治項背筋之痙攣肩凝又與朮加於同方治急慢之關節痛同桔梗配用於柴胡劑療腐敗性支氣管炎及肺壞疽配用於大黃牡丹皮湯及大黃牡丹皮湯去芒硝大黃牡丹皮湯去大黃芒硝以醫魚鱗癬闌尾炎及淋病此藥加於豬苓湯及豬苓湯加甘草豬苓湯加甘草大黃治淋病加於桃核承氣湯大黃牡丹皮湯及其類方桂枝茯苓丸及當歸芍藥散等治白帶又單用或配用於諸方治疣贅悉收卓效唯須注意者薏苡仁之性寒為利尿藥又為緩下藥則於如石膏劑證之組織枯燥者及屬於下痢陰虛證者宜禁忌之牡蠣湯之注釋牡蠣湯治牡瘧金匱要略註尾臺氏曰牡為牝之誤外臺作牝瘧謂瘧之寒多者牡蠣湯方牡蠣麻黃各克甘草克蜀漆克上細銼以水二合煎成五勺去滓頓服先輩之論說東洞翁本方定義曰治甘草麻黃湯證之胸腹有動者尾臺氏曰此方亦須先於其發時用之以取大汗則愈唯蜀漆氣臭間有吐者吐亦效也桂枝二麻黃一湯之注釋服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯傷寒論註尾臺氏曰服桂枝湯以下十八字為白虎加人參湯之條文錯亂混入也此說是也因脈洪大者未曾有與桂枝湯之理故也若以下雖為本方證然宜桂枝二麻黃一湯之句當接續於日再發者之下解非汗出解後與本方之謂東洞翁本方定義謂治桂枝湯證多麻黃湯證少者此說宜從之桂枝二麻黃一湯方桂枝克芍藥生薑大棗各克麻黃杏仁各克甘草克上細銼以水二合五勺煎一合去滓一日分三回溫服先輩之論說類聚方廣義論本方條曰中風傷寒棄置多日或發汗後邪氣猶纏繞不去發熱惡寒咳嗽或渴者宜選用以下三方求真按以下三方謂桂枝二麻黃一湯桂枝麻黃各半湯桂枝二越婢一湯也瘧疾熱多寒少肢體惰痛者五七發之後擇桂枝二麻黃一湯或桂枝麻黃各半湯先發時溫覆發大汗則一汗即愈若渴者宜桂枝二越婢一湯三方皆截瘧之良劑也桂枝麻黃各半湯之注釋太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便續自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以不能得小汗出其身必癢宜桂枝麻黃各半湯傷寒論註自太陽病至熱多寒少句自面色反有熱色者至其身必癢句使接續之即為本方證其他皆示類證鑒別法即如其人所以不嘔者因患太陽病經過八九日頃當發嘔吐與寒熱往來而現小柴胡湯證少陽證之時期今反有如瘧狀此證為類似於小柴胡湯證之寒熱往來也之外證而疑似於小柴胡湯證故特云不嘔以示其非小柴胡湯證也清便續自可者為普通便通順之意然特舉之者以明自裡證陽明證也又一日二三度發脈微緩者為欲愈也者雖如瘧狀日二三發然脈微緩者為將愈之徵則不可用本方也所謂脈微惡寒者雖如瘧狀日二三發但脈微惡寒者為體力虛衰已陷於陰證也是則禁汗吐下之義也余雖不必解惟面色反有熱色者之熱色二字為顏面泛赤之意也桂枝麻黃各半湯方桂枝克芍藥生薑甘草麻黃大棗各克杏仁克煎法用法同前先輩之論說治驗東洞翁本方定義曰治桂枝湯麻黃湯二方之證相半者類聚方廣義本方條曰痘瘡熱氣如灼表鬱難以見點或見點稠密風疹交出或痘不起脹喘咳咽痛者宜服此湯勿誤藥室方函口訣本方條曰此方可活用於外邪之壞證者或類瘧者不必論並宜於其他發風疹而癢痛者一男子患風邪後腰痛不止醫作疝療其痛益劇一夕使服此方發汗脫然而愈桂枝去芍藥加麻黃附子細辛湯之注釋氣分心下堅大如盤邊如旋盤水飲所作桂枝去芍藥加麻黃附子細辛湯主之金匱要略註本條諸說紛紜余亦無定見故列載下說以代注釋東洞翁本方定義曰治桂枝去芍藥湯麻黃附子細辛湯二方之證相合者又曰枳朮湯桂薑棗草黃辛附湯之二方金匱要略中所載其因與證同而不可別今審其方劑桂薑棗草黃辛附湯為桂枝去芍藥湯及麻黃附子細辛湯之合方也而桂枝去芍藥湯以頭痛發熱惡風有汗等為主證而腹中無結實者也麻黃附子細辛湯證曰少陰病發熱云云按所謂少陰病者惡寒甚者也故用附子附子主惡寒也依二湯之證推之心下堅大而惡寒發熱上逆者桂薑棗草黃辛附湯主之朮主利水是以心下堅大小便不利者枳朮湯主之方機本方之主治曰惡寒或身體不仁或手足逆冷而心下堅者及有痰飲之變者四肢惰痛惡寒甚者世俗所謂勞咳脊骨之灸骨蒸惡熱惡寒心中鬱鬱此處文字不明心下痞堅者南呂無痞堅者以解毒散及紫圓時時攻之類聚方廣義本方條曰氣分以下十六字此枳朮湯證醫宗金鑒以為衍文是也且氣分二字不似仲景之口氣今據他例推之上衝頭痛發熱喘咳身體疼痛惡寒甚者主之老人秋冬之交每有痰飲咳嗽胸背脅腹攣痛而惡寒者宜此方兼用南呂丸尚有其他諸說因涉冗長故略之桂枝去芍藥加麻黃附子細辛湯方桂枝生薑大棗各克甘草麻黃細辛各克附子克上細銼以水二合五勺煎成一合去滓一日分三回溫服當汗出如蟲行皮中則愈桂枝芍藥知母湯之注釋諸肢節疼痛身體尫羸腳腫如脫頭眩短氣溫溫欲吐桂枝芍藥知母湯主之金匱要略註類聚方廣義本方條曰按尪謂瘠病之人也金匱要略述義曰諸肢節疼痛身體尪羸脈經作魁瘰類聚同輯義訛魁為瘣趙原刻作魁按尪羸恐以魁瘰為是據此則魁瘰者蓋以爾雅之魁瘣謂疼痛之處如盤結磈磊也勿誤藥室方函口訣本方條曰此方謂以身體瘣㿔為目的治歷節經數日骨節如木之疣而腫起兩腳有微腫而疼痛因而逆上為頭眩乾嘔等證者又用於腰痛鶴膝風等又俗稱腳氣者此方有效腳腫如脫者謂足腫如脫不能行步也求真按余之實驗則以前說為非後二說為是也即本條是述慢性關節炎猶如畸形性關節炎之證治桂枝芍藥知母湯方桂枝知母防風各克芍藥克甘草麻黃附子各克生薑白朮各克煎法用法同前先輩之論說類聚方廣義本方條曰治風毒腫痛憎寒壯熱渴而脈數痘瘡將欲成膿者而不能十分灌膿或過期不結痂憎寒身熱一處疼痛脈數者此為餘毒將成膿也宜此方若膿已成者宜早以鈹針割開兼用伯州散防風之醫治效用本草綱目曰防風集解別錄曰防風生沙苑川澤及邯鄲琅琊上蔡二月十月採根曝乾氣味甘溫無毒主治大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痛本經煩滿脅風痛四肢攣急別錄治上焦風邪瀉肺實散頭目中之滯氣經絡中之留濕主上部見血元素發明元素曰防風治風去濕之仙藥也杲曰防風治一身盡痛乃卒伍卑賤之職隨所引而至凡脊痛項強不可回顧腰似折項似拔者當用防風凡瘡在胸膈以上雖無手足太陽證亦當用之為能散結去上部風病人身體拘倦者風也諸瘡見此證亦須用之由以上諸說觀之則本藥似葛根之作用而緩弱者也續命湯之注釋古今錄驗續命湯治中風痱身體不能自收持口不能言冒昧不知痛處或拘急不得轉側姚云與大續命同治婦人產後去血者及老人小兒金匱要略註中風腦溢血也痱與中風同意但今為身體一部不能自由之義冒者茫然自失之意昧者愚之義也本方雖為麻黃劑然其中含治陽虛藥之人參與乾薑治貧血性瘀血藥之當歸與川芎故麻黃湯或大青龍湯或越婢湯證而有虛候帶貧血者可用之續命湯方麻黃桂枝當歸人參石膏乾薑甘草杏仁各克川芎克上細銼以水二合五勺煎成一合去滓一日分三回溫服當小汗薄覆脊憑几坐汗出則愈不汗更服無所禁勿當風並治但伏不得臥咳逆上氣面目浮腫先輩之論說治驗方輿輗本方條曰此病雖非風然熱盛脈浮者先用表法無不可此時續命湯非為全廢之方今脈不浮熱不盛猶有用此方者果何意耶金匱要略述義本方條曰按此方即為大青龍湯之變方惟尤氏所謂攻補兼施者中風之邪氣本輕但以血氣衰弱殊甚故受侵襲大抵表候為內證所掩往往使人難以辨認蓋續命湯為發表補虛對待之方實為中風正始之劑推其立方之旨則亦足以明中風所因之理學者豈可不深味之乎求真按本方不過治腦出血之貧血衰弱而帶表證者故不得為中風正治之劑丹波氏之言不可悉信類聚方廣義本方條曰婦人有於草蓐得風頭痛發熱惡寒身體痹痛腹部拘急心下痞硬乾嘔微利咽乾口燥咳嗽頗甚者若不速治必成蓐勞宜此方勿誤藥室方函口訣本方條曰此方用於偏枯之初期有效其他產後中風身體疼痛者或風濕涉於血分疼痛不止者又可用於後世五積散證之熱勢劇烈者橘窗書影曰一婦人得外感表證解後右腳拘急腫痛不能起步而脈浮數余診曰熱雖解而脈浮數此為邪氣下注筋脈不能流通也與金匱續命湯四五日愈求真按余每以續命湯治前證及歷節風越婢湯證而帶血虛者又用於後世五積散之所主治有速效此古方之妙不可輕侮也一男子年七十餘平日肩背強急時覺臂痛一日右肩強急甚使按摩生療之時言語蹇澀右身不遂驚而迎醫服藥四五日自若余診之候腹和快飲食如故他無所苦但右脈洪盛耳與金匱續命湯四五日言語滑利偏枯少瘥脈無偏勝得以扶杖起步麻黃連軺赤小豆湯之注釋傷寒瘀熱在裡身必發黃麻黃連軺赤小豆湯主之傷寒論註錢氏曰瘀者言留蓄壅滯也傷寒之鬱熱與胃中之濕氣互結濕蒸如淖淖中之淤泥水土黏濘而不分經云濕熱相交民多病癉蓋以濕熱膠著壅積於胃故云瘀熱在裡必發黃也麻黃連軺赤小豆湯能治表利小便解鬱熱故以此主之瀾氏曰此證雖曰在裡必因邪氣在表之時有失解散故今雖發黃猶宜兼汗解以治之求真按瀾氏說為是麻黃連軺赤小豆湯方麻黃連翹生薑杏仁各克赤小豆克甘草克生梓白皮今以桑白皮代之克上細銼以水二合煎一合去滓一日分三回溫服先輩之論說類聚方廣義本方條曰疥癬內陷一身瘙癢發熱喘咳腫滿者加反鼻詳拾掇篇中有奇效生梓白皮採用不易今權以乾梓藥或桑白皮代之求真按余曾以本方兼用伯州散治濕疹內攻性腎炎連翹之醫治效用本草綱目曰連翹氣味元素曰性涼味苦主治寒熱鼠瘻瘰癧癰腫惡瘡癭瘤結熱本經通利五淋小便不利除心家客熱甄權排膿治瘡癤止痛通月經大明散諸經血結氣聚消腫李杲瀉心火除脾胃濕熱震亨發明元素曰連翹之用有三瀉心經客熱一也去上焦諸熱二也為瘡家聖藥三也好古曰為手足少陽之藥治瘡瘍瘤癭結核有神效與柴胡同功但分氣血之異耳牛山治套曰大人小兒嘔吐不止可用連翹加入任何藥方之內此家傳之大秘密也口授心傳非其人則勿傳生生堂治驗曰某氏兒二歲患驚風瘥後猶吐乳連綿不止眾醫為之技窮及先生診之無熱而腹亦和即作連翹湯使服一服有奇效連翹湯方連翹三錢上一味以水一合煎取半合溫服據諸說觀之則本藥為解凝消炎性利尿藥有時得為鎮吐藥者抑亦可謂具消炎利尿之作用也赤小豆之醫治效用本草綱目曰赤小豆氣味甘酸平無毒主治下水腫排癰腫膿血本經和鯉魚煮食善治腳氣孟詵和鯉魚蠡魚鯽魚黃雌雞煮食並能利水消腫時珍發明弘景曰赤小豆逐津液利小便好古曰赤小豆消水通氣而健脾胃藏器曰赤小豆和桑白皮煮食去濕氣脾腫由上諸說及余之實驗則本藥除其滋養性外有消炎利尿緩下作用也明矣桑白皮之醫治效用本草備要曰桑白皮甘辛而寒瀉肺火利二便散瘀血下氣行水清痰止嗽治肺熱喘滿唾血熱渴水腫臚脹然性非純良肺氣虛及風寒作嗽者慎用作線可縫金瘡刮去薄皮取白皮由此說觀之則本藥為消炎性利尿兼緩下藥有時可作鎮咳藥者抑可謂具消炎利尿之作用也射干麻黃湯之注釋咳而上氣喉中水雞聲射干麻黃湯主之金匱要略註類聚方廣義本方條曰水雞聲者為痰與氣相觸之聲在喉中連連不絕也蘇頌曰蛙即今水雞是也陶弘景曰蛙與蝦蟆一類小形而善鳴者為蛙余按水雞非今之水雞秧雞蛙即今之青蛙喉中水雞聲者當呼吸時咽喉之內發出如蛙鳴之謂也射干麻黃湯方射干克麻黃生薑各克細辛紫菀款冬花各克五味子克大棗克半夏克上細銼以水三合煎一合去滓一日分三回溫服先輩之論說類聚方廣義本方條曰治久咳不止或產後喘咳頸項生痰癧累累如貫珠者去細辛五味子倍射干加皂角子有效兼用南呂丸勿誤藥室方函口訣本方條曰此方用於後世之哮喘水雞聲者形容哮喘之呼吸也射干紫菀款冬花利肺氣合麻黃細辛生薑之發散與半夏之降逆五味子之收斂大棗之安中而成一方之妙用比西洋合煉之制藥較勝多多矣故恩師和田先生曰本方用於急性肺炎大勢解後有妙效求真按先師治急性肺炎先以桔梗白散經吐下後用本方然本方含細辛紫菀款冬花之溫藥故發熱時不可輕用射干之醫治效用本草備要曰射干苦寒有毒能瀉實火火降則血散腫消痰結自解能消老血行太陰厥陰之積痰為治喉痹咽痛之要藥消結核癜疝瘧母通經閉利大腸鎮肝明目由此說觀之則本藥當為有力之消炎解凝藥有驅瘀血及緩下作用紫菀之醫治效用本草備要曰紫菀辛溫潤肺苦溫下氣補虛調中消痰止渴治寒熱結氣咳逆上氣喘嗽膿血專治血痰為血勞之聖藥肺經虛熱小兒驚癇能開喉痹取惡涎然辛散而性滑故不宜多用獨用由此說觀之則本藥當為溫性之鎮咳祛痰藥兼有和血作用款冬花之醫治效用本草備要曰款冬花辛溫純陽瀉熱潤肺消痰除煩定驚明目治咳逆上氣氣喘喉痹肺痿肺癰咳吐膿血為治嗽之要藥由此觀之則本藥當為溫性之鎮咳祛痰藥厚朴麻黃湯之注釋咳而脈浮者厚朴麻黃湯主之金匱要略註淺田氏曰此方之藥有似小青龍加石膏湯然降氣之力為優故用於喘息上氣有效主溢飲者宜小青龍加石膏又與射干麻黃湯互用然此方宜於熱強脈浮者與彼方之用於無熱有異也又富貴安佚之人過於膏粱腹滿而咳者此方加大黃有效麻黃與大黃為伍勢如表裡與千金黑散同意有奇效也求真按此說甚佳以之解本條並可作類方之鑒別法厚朴麻黃湯方厚朴克麻黃克石膏克杏仁半夏五味子各克乾薑細辛各克小麥克上細銼以水三合煎一合去滓一日分三回溫服小青龍湯之注釋傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎小便不利少腹滿或喘者小青龍湯主之傷寒論註平素胃內有停水之人若患感冒或腸傷寒時表證與胃內停水因相互錯綜之關係引起諸般之症狀即乾嘔者因胃內停水被表熱衝動而上逆發熱者因有表證咳者因表熱與停水迫於呼吸器渴與利即下痢因停水之下行噎者由咽下之飲食物與上迫之停水衝突也小便不利者由於停水上行而不下降少腹滿者因停水集於下腹部喘者表熱與停水內迫於呼吸器也故以麻黃桂枝解表證用桂枝抑壓水毒之上迫以細辛乾薑半夏去胃內停水用芍藥五味子收固咳嗽及其他以甘草調和諸藥且緩和組織之緊縮則宿疴之胃內停水與新病之表證俱可脫然消散故師斷定以小青龍湯主之也小青龍湯與大青龍湯之名稱因此二方中麻黃之色青以擬往古四神即青龍白虎玄武朱雀之一青龍神之意而命名之也白虎湯之稱呼因君藥之石膏色白擬白虎神玄武湯又名真武湯之名因所配之附子色黑以象玄武神也朱雀湯亦名十棗湯之稱因大棗之色赤象朱雀神也傷寒表不解心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之傷寒論註小青龍湯主之一句當假定接續發熱不渴句解之又服湯已以下湯即本方是敘服後起治愈轉機可知始不渴者因胃內有停水服藥後渴者藥力能驅逐停水使胃內乾燥比較的故曰寒去欲解也咳逆倚息不得臥小青龍湯主之金匱要略註倚息者憑依於物而呼吸之意即呼吸困難也婦人吐涎沫醫反下之心下即痞當先治其吐涎沫小青龍湯主之涎沫止乃治痞瀉心湯主之金匱要略註本條是示先表後裡之法則即先宜解表而後可攻裡也涎沫者如類聚方廣義云程林曰連綿不斷者曰涎輕浮而白者曰沫涎為津液所化沫為水飲所作百方口訣外傳云凡治咳痰以小青龍湯者其涎沫與咳嗽宜注意其所吐之痰如淡茶是名痰沫此痰沫而喘急者是小青龍湯之咳嗽也小青龍湯方麻黃芍藥乾薑甘草桂枝細辛各克五味子克半夏克煎法用法同前先輩之論說治驗千金方曰小青龍湯治婦人霍亂嘔吐御藥院方細辛五味子湯即本方治肺氣不利咳嗽喘滿胸膈煩悶痰沫多喉中有聲鼻塞清涕頭痛目眩四肢倦怠咽嗌不利惡逆噁心醫學六要曰腳氣上氣喘息初起有表邪者小青龍湯加檳榔醫宗金鑒曰小青龍湯用於雜病之膚脹水腫證以發汗而利水建殊錄曰一女子患病眾醫以為勞瘵也而處方皆無效羸瘦日甚旦夕且死其父素懼古方逾月其女死後二年其妹病其父謁曰僕初有五子四人已亡其病皆勞瘵也蓋年及十七則其春正月瘵必發至秋八月則必死今季子年十七又病此僕固非不知古方有奇效但懼其多用峻藥耳然顧以緩補之劑救之未見一效願先生治之雖死亦無悔焉先生診之氣力沉弱四肢憊惰寒熱往來咳嗽殊甚作小青龍湯及滾痰丸雜進其年未至八月痊愈復常求真按此證雖稱癆瘵其實恐似是而非也何則余診多數之肺結核未曾見有麻黃劑證也讀者不可輕信之方輿輗本方條曰初學小青龍為治咳之主方然小青龍之專效在於逐水發邪蓋此咳由於水與邪相激而發故用此湯以發邪則咳自止矣金鑒沈明宗注此方乃為寒風挾飲而成咳嗽之主方也可謂能得方意矣余又讀吉益氏建殊錄有曰長門瀧鶴臺貽書於吉益東洞曰凡中風寒邪有水迎之則其候有頭痛惡寒汗出痰湧目淚鼻涕一身走痛等類逐水則邪除故汗出而愈於是桂枝麻黃細辛半夏乾生薑輩之才能可得而知矣夫醫雖小道然以之事親與養身瀧氏亦深知此道原以有力之大儒先生其所見固與庸醫之眼目不同也勿誤藥室方函口訣本方條曰此方治表不解而心下有水氣喘咳者又可用於溢飲之咳嗽其人咳嗽喘急至於寒暑則必發吐痰沫而不得臥喉中如結心下有水飲也宜此方若上氣煩躁宜加石膏又於胸痛頭疼惡寒汗出與發汗劑雖為禁法然於喘而有汗證仍用小青龍湯與麻杏甘石之用於汗出者同意一老醫傳中云此證之汗必臭氣頗甚可為一徵此方用於諸病之目的主痰沫咳嗽無裡熱之證求真按上二說甚佳宜玩味之小青龍湯加石膏之注釋肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍湯加石膏主之金匱要略註肺脹云者雜病辨要曰風寒客肺上氣喘躁者名曰肺脹由肺脹之字義考之肺脹者恐為急性支氣管炎或同性支氣管肺炎兼急性肺氣腫也上氣與上逆略同因咳嗽劇烈之所致故云咳而上氣也煩躁者混亂憂悶之義與上氣均為石膏證故新加之小青龍湯加石膏方小青龍湯中加石膏克煎法用法同前先輩之論說方輿輗本方條曰大青龍小青龍加石膏二湯雖俱有煩躁然在大青龍係不汗出在小青龍加石膏係偏於心下有水氣此二方之所以分也又按小青龍本條其證緩而金匱咳逆倚息不得臥則頗急矣此條之煩躁而至於喘是尤急也故證立肺脹之名於方加石膏也發熱咳嗽多吐白沫者以平劑緩圖則不日成勞矣予乘其初起用小青龍加石膏而全生保命者數十人大青龍湯之注釋太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也傷寒論註和久田氏曰此章大概以不汗出三字求真按因原文云不汗出故和久田指之為主眼按論中之不汗出文有異同其旨趣當各有別如曰汗不出曰不汗出曰無汗曰不發汗是也汗不出者可讀雖發汗亦不出即促使其出汗而仍不出也不汗出者可讀以汗不出表有水氣當成汗而出但不成汗而出也故以而煩躁三字接之謂汗不出而煩躁也無為有之反對宜有汗處其汗無也是因表有瘀水之隔故曰無汗葛根湯證及麻黃湯證是也不發汗者用發汗劑而不發汗也然則此大青龍湯證首句冠以太陽中風是示素無重病肌表之水不汗可愈但今其水不自汗出故腠理閉塞脈中有勢而現浮緊及發熱惡寒身疼痛而煩躁也活人書曰治大青龍湯之病與麻黃湯相似但病最重又加煩躁者為用此湯之指南宜復無異議矣柯氏曰蓋仲景憑脈辨證只審其虛實故中風傷寒不論脈之緩緊但於指下有力者為實脈弱無力者為虛汗不出而煩躁者為實汗出多而煩躁者為虛證在太陽而煩躁者為實證在少陰而煩躁者為虛實者宜服大青龍湯虛者不宜服也此最易知也求真按互參以上三說則本方之用途自然了解然服之則厥逆云云是因誤用本方也至於此變證之治法古說紛紜未能一致尚論編後條辨及纘論均云宜用真武湯東洞亦讚之殆有定論之觀獨吉益南涯反對之曰若誤服之即致此逆筋惕肉瞤故云逆也尚論編後條辨及纘論中為逆也之下有以真武湯救之六字非也此條是舉逆證以戒其誤治非為處方也諸家之載處方非作者之本意若論處方則為茯苓四逆湯證非真武湯證也誤治厥逆未嘗見真武湯證也以甘草之有無可考之其是非雖難判定然余往年偶然遭遇此證茯苓四逆湯僅一服而愈由此觀之則南涯氏說似優傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之傷寒論註和久田氏曰此條可疑為少陰真武湯之證就前之中風不劇而反深也然此但身重一證可疑故名曰傷寒而用大青龍湯也少陰真武湯證者四肢沉重疼痛然此證身不疼但重乍有輕時則非有裡水所致之重可知是邪隱伏於肌表之間而未發大青龍湯為發肌表之水邪及邪氣之主方既辨如前今若詳審無少陰真武證故以大青龍湯發隱伏之邪氣可自汗出之不曰主之而曰發之可知此方為發汗之主劑矣余曾治一病婦有如此證者數日不愈然使服大青龍湯一帖一炊時汗出如流不日復常可知古方之妙用矣求真按本方為桂枝去芍藥湯之加味方則其腹證亦相類似中有石膏則其證常如舌有白苔或帶微黃白色否則其舌與口唇均乾燥無津宜注意之病溢飲者當發其汗大青龍湯主之小青龍湯亦主之金匱要略註溢飲者金匱云飲水流行歸於四肢當汗出而不汗出身體疼重謂之溢飲由此觀之則為一種水腫或水氣性疼痛證也明矣然此一證何以有大小二青龍湯之異古來議論紛紛如尾臺氏斷此證當以大青龍湯發汗無關於小青龍湯也是知其一不知其二之僻說也因大青龍湯為治外表之水氣不能治心下之水氣小青龍湯治心下之水氣不主外表之水氣則大青龍湯可用於溢飲者較為明顯無可議論也然於小青龍湯證若任久不治則心下之水氣不泄遂泛濫於外表致成溢飲也是仲景所以稱大青龍湯主之小青龍湯亦主之而斷為不誤也大青龍湯方麻黃克桂枝甘草杏仁各克生薑大棗各克石膏克煎法用法同前先輩之論說治驗東洞翁本方定義曰治喘及咳嗽渴欲飲水上衝或身痛惡風寒者醫事惑問曰一男子患腫滿乞診於余診之喘鳴迫息煩渴小便不通因與大青龍湯經過四十日無藥效其時疑其藥方之當否余曰藥效之遲速不可論當論方誠的中否也然猶有疑色除此外無的中之方也故猶用大劑再經二十日以有急變來告往觀之前證益劇惡寒戰慄漉漉汗出舉家騷然以為命將終矣余曰無關生死事此所謂若藥不暝眩厥疾不瘳也猶用前劑則終夜大汗出換衣六七次至翌日腫滿減半喘鳴亦平小便快利再過十日而復常求真按余亦曾以本方速愈劇性腎臟炎生生堂治驗曰一婦人產後浮腫腹部脹滿大小便不利飲食不進其夫醫也躬親療之不效年許病愈進短氣微喘時與桃花加芒硝湯無效於是請救於師師往診之脈浮滑按其腹水聲漉漉然謂其主人曰子之術當也然病猶未知時則當更求他法夫當下而不下即當更吐之和之不當即當發之所謂開南窗而北窗自通又張機所謂與大承氣湯不愈者瓜蒂散主之之類也主人曰善因與大青龍湯溫覆之其夜大發熱汗出如流翌日又與之如初三四日後小便通利日數行五六日間腹滿如忘與前方幾百餘帖復原方輿輗本方條曰溢飲為四飲之一此由水氣溢於表也其變或腫如風水者有之或痛類痛風者有之比類取大青龍湯微似汗即愈求真按大小青龍湯方意相似大青龍者以大發之劑伍以石膏小青龍者雖無石膏品味八也其緩急以此亦可知矣喻嘉言曰大青龍者升天而行雲雨也小青龍者鼓波而奔滄海也治飲證者以小青龍為第一義也又吉益氏亦為醫中之傑大嘆此論之美為千載之卓見可謂能知仲景之方矣類聚方廣義本方條曰治麻疹脈浮緊寒熱頭眩身體疼痛喘咳咽痛不汗出而煩躁者治眼目疼痛流淚不止赤脈怒張雲翳四圍或眉棱骨疼痛或頭疼耳痛者又治爛瞼風涕淚稠黏癢痛甚者俱加芣茨佳兼以黃連解毒湯加枯礬頻頻熏洗每夜臨臥服應鐘散每隔五日或十日可與紫圓五分或一錢以下之治雷頭風發熱惡寒頭腦劇痛如裂每夜不能眠者若心下痞胸膈煩熱者兼服瀉心湯黃連解毒湯若胸膈有飲心中滿肩背強急者當以瓜蒂散吐之風眼證暴發劇痛者若不早行救治則眼球破裂進出最為險急之證急用紫圓一錢至一錢五分取峻瀉數行大勢已解而後宜用此方隨其腹證情形兼用大承氣湯或大黃硝石湯瀉心湯桃核承氣湯等治小兒赤游丹毒大熱煩渴驚惕或痰喘壅盛者兼用紫圓或龍葵丸急驚風痰涎沸湧直視口噤者當先選熊膽紫圓走馬湯等取吐下後大熱煩躁喘鳴搐搦不止者宜以此方發汗之勿誤藥室方函口訣本方條曰此方為發汗之峻發劑無待論矣即其他之溢飲或肺脹其脈緊大表證盛者用之有效又天行赤眼或風眼初起此方加車前子以大發汗時有奇效蓋風眼為目之疫熱故非峻發無效也此方為麻黃湯之重要者文蛤湯之注釋吐後渴欲得水而貪飲者文蛤湯主之兼主微風脈緊頭痛金匱要略註尾臺氏曰文蛤湯其證明有錯誤驗之事實則自了了夫此方與大青龍湯較相差僅一味惟分量有小異耳此方本為發散之劑觀方後之汗出則愈一語可知兼主云云八字雖似注語亦足以見其方意今特舉渴飲一證是與渴欲飲水不止之文蛤散證同因是以觀則吐後以下之十字其錯簡斷然明矣按五苓散條所別舉之證正是文蛤湯之證也本論作文蛤散者誤也然本方若隨東洞翁之定義以煩躁而渴惡寒喘咳急迫者為目的則可用矣文蛤湯方文蛤克石膏克麻黃甘草生薑大棗各克杏仁克煎法用法同前汗出即愈文蛤散之注釋渴欲飲水不止者文蛤散主之金匱要略文蛤散方文蛤上為細末一回以克入熱湯中攪拌而頓服之文蛤之醫治效用文蛤為有斑紋之蛤殼本草備要云止消渴解酒毒與牡蠣同效可知其作用矣越婢湯之注釋風水惡風一身悉腫脈浮不渴續自汗出無大熱者越婢湯主之金匱要略註類聚方廣義本方條曰為則按大青龍湯證無咳嗽衝逆而有腳攣急之證者主之不渴當作渴自汗出之下當有或無汗之字又越婢湯治一身悉腫喘而渴自汗出惡風者俱可從之越婢湯方麻黃克石膏克生薑克大棗克甘草克上細銼以水二合煎一合去滓一日分三回溫服惡風者加附子一枚風水加朮四兩先輩之論說方輿輗本方條曰上體下體或一身悉腫脈浮而渴自汗出惡風小便不利或喘咳者越婢湯主之腳氣痛風瘡毒內攻等多此證又犯風邪久咳等沐浴而變此證者往往見之青州醫談曰傷寒有多汗憎寒若近衣被則汗漏不止去之則憎寒不可忍數日不止世醫試與柴胡湯柴胡桂枝湯或桂枝加黃耆湯等不愈有變譫語飲食不進終至危殆者逢此證而內熱如此其甚者宜越婢湯求真按余曾治類似此證之感冒如惡寒發熱自汗口舌乾燥舌有白苔者與本方得速效勿誤藥室方函口訣本方條曰此方之本義云發越脾氣雖同為麻黃劑而與麻黃湯大青龍湯異趣以無大熱自汗出為目的也故用於肺脹皮水等而不用於傷寒溢飲也又論中之麻黃甘石湯亦與此方同類求真按越婢湯之名稱有云因此方有發越脾氣之作用而名者亦云以仲景得自越國之婢故有此名者皆想象之說也越婢加朮湯之注釋裡水者一身面目黃腫其脈沉小便不利故令病水假令小便自利此亡津液故令渴越婢加朮湯主之金匱要略註裡水為風水之誤既如前述黃腫之黃非黃疸色意謂微帶黃色也脈沉為水腫病之脈證故令病水者即因脈沉小便不利故發水腫病之義也假令云云者假令小便頻多則致體液亡失故令渴之意然此為行文上必要上作如是記非小便不利時不渴惟自利時有渴之義則其在任何症狀皆有渴證可知矣裡水越婢加朮湯主之甘草麻黃湯亦主之金匱要略註見甘草麻黃湯條下肉熱極則身體津脫腠理開汗大泄厲風氣下焦腳弱越婢加朮湯主之金匱要略註尾臺氏曰按外臺引刪繁肉極論曰肉極云者肉變色多汗體重怠惰四肢不欲舉不欲飲食食則咳咳則右脅下痛陰陰引肩背不得移動名曰厲風則本條之義似無遺憾然本方可用於腳氣是根據於下焦腳弱之四字不可不附詳也越婢加朮湯方麻黃克石膏克大棗克甘草克生薑克朮克煎法用法同前越婢加苓朮湯方越婢加朮湯中加茯苓克煎法用法同前主治治越婢加朮湯證之有茯苓證者越婢加朮附湯方越婢加朮湯中加附子克以上煎法用法同前主治治越婢加朮湯證之有附子證者越婢加苓朮附湯方越婢加朮附湯中加茯苓克煎法用法同前主治治越婢加朮附湯證之有茯苓證者越婢加半夏湯之注釋咳而上氣此為肺脹其人喘目如脫狀脈大者越婢加半夏湯主之傷寒論註尤怡心典曰外邪內飲填塞肺中為脹為喘為咳而上氣以越婢湯散邪之力多蠲飲之力少故加半夏以輔其不逮不用小青龍者以脈浮且大屬於陽熱證故利辛寒不利辛熱也尾臺氏曰目如脫狀者因衝逆而眼目痛甚也素問至真要大論曰病衝頭而痛目如脫項如拔靈樞經脈篇中亦同由此二說可知本條之意矣越婢加半夏湯方麻黃克石膏克生薑克甘草克大棗克半夏克煎法用法同前先輩之論說治驗醫宗必讀曰社友孫芳其之女久嗽而喘凡順氣化痰清金降火之劑幾乎無不遍嘗絕不取效一日喘甚煩躁余視其目脹出鼻則鼓扇脈浮且大肺脹無疑遂投以此湯一劑減再劑愈東洞翁本方定義曰治越婢湯證之嘔逆者為則按當有煩渴嘔逆之證求真按半夏不獨治嘔逆此定義未妥方輿輗本方條曰哮喘經日不治痰氣益盛時則有目脹出或鼻鼓扇之見證若脈浮大是陽熱之候所謂肺脹之證也以越婢加半夏湯二三劑可取效勿誤藥室方函口訣本方條曰此方主肺脹其證咳而上氣有喘而氣急甚似支飲然支飲之喘初起胸痛或手足厥冷而氣急不得側臥肺脹之上氣熱勢強而卒發有目如脫狀然非難以側臥半夏與石膏為伍時有破飲鎮墜之效與小青龍湯加石膏厚朴麻黃湯等同功又心下有水氣或脅下痛引缺盆者宜小青龍湯加石膏也桂枝二越婢一湯之注釋太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可發汗宜桂枝二越婢一湯傷寒論註本條之宜桂枝二越婢一湯句當接於熱多寒少句解脈微弱者云云謂假令有發熱惡寒熱多寒少之證而脈微弱者則不宜以本方發汗是暗示本方之脈證必當浮而有力也桂枝二越婢一湯方桂枝芍藥甘草各克生薑克大棗克麻黃克石膏克煎法用法同前先輩之論說類聚方廣義本方條曰風濕痛風之初起寒熱間作肢體疼重或攣痛或走注腫起者此方發汗之後可與加朮附湯兼用應鐘散蕤賓丸等求真按以本方發汗後不必定與加朮附湯若確知有朮附證然後可處之葛根湯之注釋太陽病項背強几几無汗惡風者葛根湯主之傷寒論註和久田氏曰几几者以項背強形容不便反顧伸舒之辭也因其強極甚故以此狀之尾臺氏曰成無己云音几引頸貌几者短羽之鳥也短羽之鳥不能飛騰欲動時則先唯伸其頸項背強者欲動時亦如之程應旄曰几几者俯仰不自如之貌按素問刺腰痛論曰腰痛俠脊而至於頭几几然几几之義可見矣淺田氏曰蓋邪氣屯於太陽則項背几几然而強不特項強腰背亦然素問云傷寒一日巨陽受之故頸項痛腰背強是也求真按項背強几几之意依上三說解之未免有隔靴搔癢之弊余由多年之研究知項背強几几者乃自腰部沿脊柱兩側向後頭結節處上走之肌肉群強直性痙攣之意故病者若自云肩凝或腰背攣痛可照余說問診尚有疑義時則於右肌肉群以指頭沿其橫徑強力按壓而觸知有凝結攣急同時病者訴疼痛則斷為項背強几几百不一失矣然不拘此證之存否有不自覺此證者有雖自覺而觸診上難以確知者亦不少此則非期問觸診之周密與參照外證及脈證而決之不可而所以無汗惡風者雖與一般麻黃劑無異然此惡風寒除大青龍湯證外較其他麻黃劑證為劇可知矣太陽與陽明合病者必自下利葛根湯主之傷寒論註太陽為表證陽明為裡證常例病表者不病裡今有脈浮頭項強痛而惡寒之表證且有自下利之裡證因設二陽合病之名目但其真意此自下利非真正之裡證乃示因無汗當自表排泄之水毒迫於裡之所致也換言之乃暗示此下利之原因不在腸而在表故不問其自下利而以本方解其表證則自下利可不治而愈矣之意也本方之止瀉作用因由諸藥之協力使水毒由皮膚排除之結果然其主動者但為葛根芍藥因葛根與麻黃桂枝雖俱屬發汗解熱藥但與此二藥異趣含多量之澱粉則由其緩和被護作用於表緩解肌肉痙攣於裡抑制腸蠕動之亢進及緩和被護腸黏膜故能發揮止瀉作用而芍藥之治攣急及止瀉作用尤為已明之事實本條所以不說項背強几几者由余考之因本條之病證初起即有自下利故項背之水毒蓄積不甚劇恰如開放安全瓣之蒸汽罐破裂之關係故不至現項背強几几證又麻疹及其他之發疹病不現項背強几几者亦同此理因毒物既發出於體表內毒減少之結果故不呈此證又其他病證亦無項背強几几者水毒之蓄積尚不甚未達現此證之程度耳然則無項背強几几之際以何種症狀為目的而處方此問題當俟於多年之經驗的自得非筆舌所能形容也但今為初學者示其一端第一當採用間接的診斷法即診有表證病者非桂枝湯證非麻黃湯證非小大青龍湯證如此表證湯方各證悉否定後乃可斷為本方證也第二本方治惡寒作用有力則有惡寒之證時先決其非陰證更否定其為大青龍湯證然後可肯定為本方證也第三如本方之君藥葛根治發疹及小瘡有特種之作用故有此等病證之際若見有發熱惡寒或惡瘙癢等之表證則亦可決定為本方證也其他方法由此類推太陽病無汗小便反少氣上衝胸口噤不得語欲作剛痙葛根湯主之金匱要略註口噤者牙關緊急也剛痙者金匱云太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出不惡寒者名曰柔痙又曰病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖卒口噤背反張者痙病也如上所述則剛痙者即現今之破傷風也本條即說其證治且本條雖以破傷風為題目而立論然仲景之真意非僅為破傷風之證治而述其實表示項背強几几達於高度時則遂呈破傷風類似之狀態且現此狀態者不問病證如何悉以本方為主治也蓋凡呈此狀態之諸病即各種之腦膜炎尿毒證及子癇等若用本方每奏奇效此可得而證之也葛根湯方葛根克麻黃生薑大棗各克桂枝芍藥甘草各克上銼細以水三合煎一合去滓一日分三回溫服葛根加半夏湯之注釋太陽與陽明合病不下利但嘔者葛根加半夏湯主之傷寒論註不下利但嘔者可用本方雖如仲景所論然下痢且嘔吐者亦可用之勿誤藥室方函口訣本方條曰此方不僅治合病之嘔平素有停飲求真按停飲者胃內停水也難服本方求真按此指葛根湯也或酒客外感等求真按酒客往往有噁心嘔吐此方以加半夏反能得效蓋葛根湯動則害胃往往食欲不振致噁心嘔吐等故若胃不健全有噁心嘔吐之傾向或認為有胃內停水則不用葛根湯而用葛根湯與小半夏湯合方之本方可預防服用葛根湯之弊葛根加半夏湯方葛根湯中加半夏克煎法用法同前葛根加桔梗湯方葛根湯中加桔梗克乃至克煎法用法同前主治本方為葛根湯桔梗湯排膿湯之合方治葛根湯證之咽喉痛者或黏痰難以咯出或有化膿機轉諸病葛根加枳實桔梗湯方前方中加枳實克煎法用法同前主治本方為葛根湯排膿散及湯桔梗湯之合方故治前方類似諸病葛根加石膏湯方葛根湯中加石膏克乃至克煎法用法同前主治本方可作葛根湯與白虎湯合方故治葛根湯證之有身熱頭痛咽喉痛煩渴等證葛根加桔梗石膏湯方為葛根加桔梗湯葛根加石膏湯之合方煎法用法同前主治治葛根加桔梗葛根加石膏湯二方證相合者葛根加朮湯方葛根湯中加朮克煎法用法同前主治治葛根湯證之有朮證者而此方可用於霍亂已述於前矣葛根加薏苡仁湯方葛根湯中加薏苡仁克乃至克煎法用法同前主治治葛根湯證之項背強急劇甚者或關節腫痛者或排膿者或有贅疣者葛根加朮薏苡仁湯方為上二方之合方也主治治上二方證相合者以上二方為余所創製葛根加大黃湯方葛根湯中加大黃克以上煎法用法同前主治治葛根湯證之可下者葛根加桔梗大黃湯方為葛根加桔梗湯葛根加大黃湯二方之合方煎法用法同前主治治葛根加桔梗湯葛根加大黃湯之二方證相合者葛根加桔梗薏苡仁湯方為葛根加桔梗湯葛根加薏苡仁湯二方之合方煎法用法同前主治治葛根加桔梗湯葛根加薏苡仁湯之二方證相合者葛根加苓朮湯方葛根加朮湯中加茯苓克煎法用法同前主治治葛根加朮湯證之有茯苓證者葛根加朮附湯方葛根加朮湯中加附子克以上煎法用法同前主治治葛根加朮湯證之有附子證者葛根加苓朮附湯方葛根加苓朮湯中加附子克以上煎法用法同前主治治葛根加苓朮湯證之有附子證者余用本方於脊髓炎或髓癆俱效先輩之論說治驗東洞翁葛根湯定義曰治項背強急發熱惡風或喘或身疼痛者方機葛根湯條曰自痘瘡初起至於見點投以本方兼用紫圓自起脹至於灌膿葛根加桔梗湯主之於本方內加桔梗五分自落痂以後葛根加大黃湯主之本方內加大黃五分若惡寒劇起脹甚一身腫脹或疼痛者葛根加朮附湯主之本方內加朮附子各四分若腫脹甚者桃花散寒戰咬牙而下利者俱加朮附湯兼用紫圓頭瘡加大黃湯主之小瘡葛根加梓葉湯以桃花散蓖麻子擦之毒劇者以梅肉散攻之主之本方內加梓葉五分諸頑腫惡腫加朮附湯主之瘰癧日投七寶梅肉亦可便毒瘍疔之類以梅肉攻之或伯州散朝五分夕五分用酒送下疳瘡選用七寶或梅肉之類凡諸有膿時則加桔梗若疼劇時則加朮附世俗所謂赤游丹毒之類皆加朮附湯主之漫游雜記曰有兒約五六歲病天行痢二日而發驚癇直視攣急身冷脈絕醫將用三黃湯余止之曰癇發於痢之初起其腹氣堅實雖危不至於死今外證未散而用三黃湯則痢毒鬱結將延數十日而不愈數十日後腹氣虛竭若癇再發則不能救矣今日之治唯有發散一法耳乃以葛根發之兼少用熊膽經過五日痢愈癇不再發痙病有太陽證其手足類於拘攣癱瘓者以葛根湯發汗表證既去拘攣癱瘓不休者與大柴胡湯四五十日則愈有一僧三十餘歲來宿於浪速之寓居卒然感外邪寒熱往來頭痛如割腰背疼痛四肢困倦脈洪數飲食不進全與傷寒相類急作大劑之葛根湯一日夜進五帖襲被褥以取汗如是三日惡寒稍減餘證如前余呼塾生曰此疫後當為大患慎勿輕視當夜五更起診其脈如轉索來去不自由余意以為受邪不淺恐陷不起進葛根湯而增其分量既而經五日塾生來告紅痘點點滿面余抵掌曰有是乎無他故矣翌日熱去食進脈如平日再經二十日而復原可知年邁患痘者難以透達而以葛根桂枝拯其誤死也吉益先生險症百問曰世稱淋證梅毒之發於尿道者多實屬淋證者甚稀也出膿或血而疼痛小水難通若得通則快利者梅毒也葛根加大黃湯甚效若難治則與梅肉散或七寶丸亦可求真按若無其證不可妄用葛根加大黃湯問曰梅毒家身體如松樹皮者何師曰梅毒家云云有與葛根加大黃湯者若有喘證者與麻黃杏仁薏苡甘草湯時以梅肉散攻之有效求真按用葛根加薏苡仁大黃湯比葛根加大黃湯佳問曰臍腐爛有出膿不已者有臭者有無臭者有痛者有不痛者有綿延數年寒熱羸瘦類於勞證者何治乎師曰臍腐爛出膿汁者以葛根加大黃湯則治求真按二方俱宜加薏苡仁婦人有陰處乍起脹而癢不可言一身各處瞤動發熱者有此證發作時或時發疹或時口舌咽喉痛診其腹自心下至少腹右方拘急而大硬經數十歲不已針灸諸藥無所不至者如何師曰婦人陰處乍起脹云云而有癢者以蛇床子湯洗之可也用葛根加朮附湯應鐘散可也求真按自心下至少腹之右方拘急而大硬者即右腹直肌之攣急也有此腹證加以陰處起脹瘙癢寒熱發疹等之外證處以葛根湯可也然至於用加朮附湯則難首肯蓋用之者必不得不確認有朮附證之存在今無之雖又用應鐘散亦無效余意代之以起廢丸可也如蛇床子湯之洗滌不過為對證療法之優者耳梅毒腐爛焮痛甚者何也師曰梅毒腐爛焮痛甚云云處以葛根加朮附湯梅肉散可也求真按南涯氏為東洞翁之長子雖比父治術稍緩然尚未脫其習癖故氏之兼用方說亦不可悉信古方便覽葛根湯條曰一男子面部發腫毒漸漸及於兩目或破流膿汁狀如癩瘡臭穢難近余以此方兼用梅肉散即愈求真按此證恐用葛根加桔梗薏苡湯兼用黃解丸為佳六角氏為東洞翁之門人亦不免有翁之習氣其說不可不慎也生生堂治驗曰老婦人年六十餘一朝無故覺項背強痛延及全身四肢攣倦不能轉側及昏迎師師診之脈緊急也即舉其手指頭皆扎住刺取黑血即有效又有一條青筋結於喉旁即刺之血大進由是四肢得以屈伸因與葛根加大黃湯三日復原求真按就刺絡無發言之資格然其處方於葛根加大黃湯中宜合桂枝茯苓丸或桃核承氣湯也叢桂亭醫事小言曰一商婦一至秋間則常大苦喘息動作不自由猶如廢人求治於余往診之支臂於爐架而坐已數十日不動亦不能睡若將此坐形稍倚側之則立即喘悸食僅碗許問其發時自脊至頸如板狀回顧亦痛以一醫之勸用八味丸數百兩喘少減云與葛根湯五帖許得以起步再服痊愈求真按余於喘息用葛根湯本此治驗翳者星也星者眼中生腫物故膿生也眼中無他疾故多用葛根湯惟上逆故宜斟酌用三黃湯或桂枝湯求真按此說雖有卓見但云桂枝湯者非也因桂枝湯雖能主治上衝然不能醫眼疾故治上逆者當以三黃湯苓桂朮甘湯桂枝茯苓丸桃核承氣湯等斟酌其宜此當訂正者也腦漏者非鼻病也是作膿於頭腦中由鼻漏下此人頭痛隱隱淚膿交出若鼻淵亦與是病同因然患鼻淵之人有他病時可愈鼻淵與腦漏證同而輕重異病由風寒者為多酒客患者多輕證僅有惡臭無膿氣也感冒時則發風邪去則其證退矣勞心之人受其障大也方用葛根湯五物解毒湯等加辛夷有效求真按此說雖龐雜然上顎竇蓄膿證用葛根湯卓見也原氏云加辛夷然余以為加桔梗石膏或加桔梗薏苡仁為優凡人身發瘡疥痤痱則發熱此時醫之投藥以發散敗毒劑發表之為宜此為古今同法此法亦可為痘瘡初起之治療催膿功效第一因逐毒出外則無死證矣夫達表戴毒溫散以桂枝為上非桂枝則不能達於四肢以解肌桂枝合於溫補之藥主四肢厥冷等云者未讀古書之誤也一旦欲達肌表當以葛根湯為佳不辨桂枝之味則恐有實實之弊不易用之近時發驚亦單服葛根湯又於下利最妙從速逐毒為第一解毒為第二見毒痘不可用定法毒氣內壅則表氣難達行將焦枯黑陷當用黃連解毒湯或三黃湯或一角紫圓之類內壅通暢速則痘勢快活亦速矣善治者此時仍用葛根湯頻服多味相合之方鈍且不值當以單用為貴求真按此說頗能說明天花麻疹及其他發疹病不得不用葛根湯之故學者須熟讀玩味之類聚方廣義本方條曰此方主治項背強急也故善治驚癇破傷風產後感冒卒痙痘初起等之角弓反張上竄搐搦身體強直者宜隨證兼用熊膽紫圓參連湯瀉心湯等治麻疹初起惡寒發熱頭項強痛無汗脈浮數或乾嘔下利者若熱熾咽喉刺激心胸煩悶者兼用黃連解毒湯痘瘡序熱驚搐腹痛或嘔吐下利者先用紫圓得快利二三行後可用此方若嘔吐不止直視驚搐不安者更用紫圓或熊膽有蛔者可用鷓鴣菜湯若見點不齊及起脹不灌膿者選用桔梗黃耆等兼用伯州散煉蜜為膏或本方加鹿角等亦佳若發痘疔者當速以鈹針挑破去其惡血否則危險競起遂難救治矣若收靨以後餘熱不退脈數惡寒一處疼痛者將成痘癰也宜加大黃以驅逐殘毒小兒遺毒爛斑及赤游風兼用紫圓龍葵丸梅肉丸等疫痢初起發熱惡寒脈數者當先用本方溫覆發汗若嘔者加半夏湯以取汗後將大柴胡湯厚朴三七物湯大小承氣湯調胃承氣湯桃核承氣湯大黃牡丹皮湯大黃附子湯等隨各證處之以疏蕩裡熱宿毒咽喉腫痛時毒痄腮疫眼焮熱腫痛項背強急發熱惡寒脈浮數者擇加桔梗大黃石膏或兼用應鐘散再造散瀉心湯黃連解毒湯等本方加朮附名葛根加朮附湯治發斑證每發惡寒發熱腹痛者及風疹瘙癢甚者兼用再造散求真按東洞南涯尾臺三氏之時疑朮附證多故頻用加朮附湯但現在此證甚稀則不可輕用之又尾臺氏嘗用再造散但能活用伯州散亦已足矣頭瘡疥癬下疳楊梅瘡等及一切瘡瘍不論未成膿已成膿凝𩊅腫痛者皆當加朮附湯以排毒兼用應鐘散伯州散梅肉丸七寶丸等或本方中選加川芎大黃等使毒速釀膿為佳宜加朮附湯當候膿成以鈹針割開後選用排膿散及湯或大黃牡丹皮湯兼用伯州散隨毒之輕重於五日十日間以梅肉散攻之鼻淵腦漏鼻齆鼻中息肉等之臭膿滴溉或濁涕不止不聞香臭者皆由頭中鬱毒淤液之所致腦漏尤為惡證若不早制之則或至不起俱宜加朮附湯兼用再造散如息肉者縛以磠砂散或瓜蒂一字吹鼻中則清涕多漏而息肉旋消矣求真按息肉者鼻茸也磠砂散瓜蒂末奪取組織水分之性強故若以此藥吹入鼻腔內能使鼻茸縮小但有刺激鼻黏膜及鼻淚管之弊癰疽初起壯熱憎寒脈數者以葛根湯發汗後轉以加朮附湯而促其釀膿膿成者速可入針若心胸煩悶鬱熱便秘者宜兼用瀉心湯大柴胡湯等凡諸瘍腫流注附骨疽痘癰臀癰等之漫腫皮色不變其毒深潛而遠隔肌肉者若膿已成則膿處必皮毛微作枯槁色若可割開者認定此處入針則百不失一但其候法至微若非面前指授則不能悉其蘊奧凡陳痼結毒凝閉不動沉滯難發者以葛根加朮附湯桂枝加朮附湯烏頭湯等鼓動之振發之兼以七寶丸十乾丸等驅逐之更以梅肉散蕩滌之若有不治者蓋亦稀矣求真按此乃轉化慢性炎證使成急性炎證之治法也方伎雜志曰一男子右眼瞳子處年年生星翳三年目之星翳胞腫潰其痕白色如痘痕視物不見云余瞟之眵泪不出不痛癢亦無赤脈但潰破之跡如新月形覆瞳子問其經過之詳細情形云三歲時曾患痘瘡余思其毒未淨盡潛伏痼滯而為星翳胞腫之禍胎告以難治以葛根湯加桔梗兼用紫圓使日日通利二三行與前方一月許白色次第淡薄凹處亦少淺仍尚前方稍能見物用前方又廿日許能見論語之本文又用前方廿日許已能讀注文其時白色已極薄凹處亦高矣再用前方一月許眼睛復常今已三十年眼無少許之患因始終不轉方驅毒務盡故不再患也一人攜四五歲之小兒相遇於途云小兒有眼病故視之為胎毒眼兩目為厚翳頑膜所敷掩謂之曰非容易之證也乃乞治使服葛根加桔梗湯兼用龍葵丸每十天許入梅肉丸二分大下之另用生生乳詳拾掇篇中以新汲水調極薄頑膜漸漸消卻其頑膜四五十日而快復以生生乳紫圓等浸眼若無定見不能妄用以甚難也非師傳決不可用逸仙曾療山梨某者其人感觸瘴毒病頗甚經數醫麻痹諸證雖漸漸治愈繼發浮腫而不能治適因魯西亞船來托治於鄂醫鄂醫使水藥塗於全身並服其丸藥次次水瀉一月許水氣雖治又發為周身疼痛如歷節風狀鄂醫雖用種種方法不能愈因起病已久辭歸江戶又經西醫數人醫治而不瘥後乞診於余視之面色如土一身肉脫粗糙如乾蛙脈微數病者云身痛有作輟近來更少力故居宅少出遇天氣晴和則游步於近邊然於途中每因疼痛忽發一步亦不能行其時則坐於路旁不拘身體手足其痛處命從僕以指頭按之則暫時痛止其痛之發也如霹靂之驟起疼痛之狀難以言語形容此後氣分漸漸爽快得以行動矣余思之此由瘴毒未盡故也於是每日以葛根加朮附湯兼用通天再造散一錢兩便快利痛之作輟日減服一月許平愈再服前方一旬許殘毒如洗葛根之醫治效用本藥治效概述於前茲再舉二三學說於下以補足之本草綱目曰葛根氣味甘辛平無毒主治消渴身大熱諸痹解諸毒本經療傷寒中風頭痛解肌發表出汗開腠理療金瘡治脅風痛別錄治胸膈煩熱發狂止血痢通小腸排膿破血大明作粉止渴利大小便解酒去煩熱開寶發明弘景曰解溫病之發熱療金瘡斷血之要藥也杲曰解肌熱治脾胃虛弱泄瀉之聖藥也徐用誠曰其用有四止渴一也解酒二也發散表邪三也發痘疹難出四也和漢藥物考曰葛根基本屬豆科植物藥用其根部冬月採掘曝乾附錄葛根中含有多量之澱粉稱葛粉供藥用與天花粉同葛根黃連黃芩湯之注釋太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之傷寒論註和久田氏曰此由誤治致熱內攻而下利者瀉內攻之熱則下利與喘自治矣故用芩連以解胸中之熱促者來數而時一止之脈也其促者由於誤治然猶數者表未解也其喘而汗出者由內攻之熱與下且合氣逆而發因喘而汗出也中間插而字示喘為主之意故瀉胸中之熱與和解其表則喘自愈而汗隨止矣然以表不解故用葛根以解表也按葛根雖無解表之明文其項背強几几者乃表證也考外臺有以獨味葛根治表邪則亦可知其主治表證解項背強也此方有甘草以緩內外之急也要之遇項背強胸中煩悸而有熱者不問其下利及喘而自汗之證之有無可用此方也因而可知酒客病火證熱瘡湯火傷小兒丹毒等俱可以此方活用也求真按此說雖可解析本條然謂促脈為來數而時一止者非也宜參照脈應及診脈法葛根黃連黃芩湯方葛根克甘草克黃連黃芩各克煎法用法同前先輩之論說東洞翁本方定義曰治項背強急心下痞心悸下利者求真按不必須項背強急方輿輗本方條曰下利初發用桂枝湯葛根湯之類以解表證但脈益促熱尚盛者可用此湯小兒之痢疾熱熾難用下劑之證多效求真按此用於表證半解後非謂全解後用之也類聚方廣義本條曰治平日項背強急心胸痞塞神思悒鬱而不舒暢者或加大黃求真按本方加大黃即本方與瀉心湯合方然依余之經驗此方加味不如用葛根湯與瀉心湯合方或葛根湯兼用三黃丸瀉心湯之丸方之處反多項背強急心下痞塞胸中冤熱眼目牙齒疼痛或口舌腫痛腐爛者若加大黃其效尤速橘窗書影曰凡大熱下利挾驚者葛芩連也昏睡不醒者為重證下利劇者亦葛芩連也緩者葛根加黃連勿誤藥室方函口訣本方條曰此方治表邪下陷之下利有效尾洲醫師用於小兒疫痢之下利屢有效云余亦於小兒之下利多經驗之此方之喘為熱勢內壅之處非主證也古人用於酒客之表證者活用也加紅花石膏治口瘡亦同發汗劑之禁忌咽喉乾燥者不可發汗傷寒論註咽喉乾燥者為當部體液缺乏之結果不宜更奪取之此發汗療法在所禁忌如肺結核喉頭結核者準此例淋家不可發汗發汗必便血傷寒論註淋家為膀胱尿道有疾患者便血尿血也瘡家雖身疼痛不可發汗汗出則痙傷寒論註瘡家有二說有謂因割而成貧血者有謂患腐骨疽骨瘍潰瘍等久排膿血者未有定論然減少血液組織液則一也又曰雖身疼痛此證類似麻黃湯證之身疼痛恐醫有失誤之虞故特加不可發汗也本條之痙與葛根湯條之剛痙異由發汗益失其既虛乏之體液肌肉之營養失調所致衄家不可發汗汗出必額上陷脈緊急直視不能瞤不得眠傷寒論註額上陷者體液亡失前額部組織退縮也直視者謂眼球不能回轉而注視一點也不得瞤者不能視也亡血家不可發汗發汗則寒慄而振傷寒論註寒慄者寒怖振身也汗家不可發汗發汗必恍惚心亂小便已陰疼宜禹餘糧丸傷寒論註陰謂陰部小便已而疼者則適當尿道口也禹餘糧丸方後世不傳應用發汗劑之科學的根據仲景用發汗劑處頗多且其種類亦繁然仲景之法與方為自古以來經驗之結晶品若非經科學的研究則發汗由如何的機轉而發生又因之排除如何物質不能洞悉其理由森島博士之所說為闡明仲景理論之一半揭之於下以供活用仲景方之參考藥物學有曰汗者為汗腺之分泌物其反應為酸性中性或亞爾加裡性也新鮮之汗雖為亞爾加裡性然由分泌後之分解又因由皮脂腺分泌之脂酸當成中性或酸性故多量發汗時有亞爾加裡性反應者為常汗中含有之固形分其中主要者為食鹽尿素及其他少量之磷酸鹽硫酸鹽尿酸類之肌酸酐芳香體之糞臭質等種種代謝產物據阿盧羅阿之檢驗汗有毒性試於體重一公斤之犬注射十至十五立方公分於血管中則發腸胃之症狀於十五乃至八十四小時內可致死云汗量之多寡由於攝收水量氣溫運動之如何而不一定在普通之安靜狀態體重一公斤之人於二十四小時中約十立方公分汗中固形分之量隨汗量之增加而減其相對量然其絕對量則顯著增加由過劇之勞動等流汗時其窒素量往往一晝夜有達一克者即人體之全窒素量排泄約也此時之食鹽量亦約達如以霍亂及尿毒證等尿分泌阻滯時其量愈增大而至於皮膚上形成尿素及食鹽之結晶異常成分如碘水銀之毒物在糖尿病患者之糖安息香酸攝後之安息香酸及馬尿酸及食蔥蒜等之後有特殊臭氣之揮發分得以證明於汗中汗量普通雖與皮膚血行之速度成比例汗在常態以體溫調節為其主要任務然於異常時汗能排泄多量之水食鹽尿素等在一定度中有代償腎臟機能之力往昔醫師每以疾病之原因概為由有害物蓄積於體內多主發汗利尿瀉下等方法欲速排泄之故發汗藥似有濫用之弊惟欲排除代謝產物或蓄積於體中之異常物質而用發汗藥者固極合理也現今普通則只用於下列諸證一有浮腫滲出液混濁等時發汗可使血液濃厚有促進此等吸收之效此時利尿藥亦非無效然尿分泌因不由神經係興奮故血液達一定之濃度即使不用利尿之劑而用興奮神經之發汗藥物亦能有作用也二腎臟之急性或慢性機能不全時發汗可由皮膚排泄尿中應排之水分及代謝產物以減輕腎臟之負擔且有預防尿毒證之效在一定之尿閉證發汗後因血液之滲透壓下降或腹腔蓄水減退有呈現尿利者三水銀或鋁等中毒之際可發汗以促其排泄四熱性傳染病及氣道之急性卡他感冒等之初期可使用發汗藥此說論旨緻密正確余亦得力頗多然不能首肯處亦不少因其謂往昔醫師每以疾病之原因概屬有害物蓄積於體內多主發汗利尿瀉下等之方法欲速排除之有詰其不當之口吻然疾病之原因古今不變概因有害物蓄積於體內而其他之原因實不過其誘因也故主發汗利尿瀉下等方法欲速排除之乃至當之見解無可議也又謂有濫用發汗劑之弊今按西洋古代之醫師暫置不論仲景則未嘗濫用之又奉仲景說之醫家亦惟期其不誤用而已又云現今普通使用於下列諸證分四項目僅舉十餘病證發汗劑用途如是其狹恐非醫術進步之徵實其退步之象矣此余所以對於此說不能全信也少陽病篇少陽病之注釋少陽之為病口苦咽乾目眩也傷寒論註金鑒曰口苦者熱蒸膽氣上溢也咽乾者熱耗其津液也目眩者熱薰眼發黑也此揭中風傷寒邪傳少陽之總綱凡篇中稱少陽中風傷寒者即具此證之謂也柯氏曰太陽主表頭項強痛為提綱陽明主裡胃家實為提綱少陽位於半表半裡故仲景特揭口苦咽乾目眩為提綱蓋口咽目之三者不可謂之表又不可謂之裡是由表入於裡裡出於表之處故謂之半表半裡也苦乾眩者他人所不知惟病者獨知之所以診家不可無問法也南涯氏曰少者微少也陽氣盛於裡位者謂之少陽口苦咽乾目眩者此其候也曰口曰咽曰目皆裡位也曰苦曰乾曰眩皆熱氣上進所致氣稍盛於裡不能暢達於表者此陽氣微少之狀也因名曰少陽求真按歸納以上諸說則本條之意義自明概括言之不問為傷寒為中風及其他諸病總有口苦咽乾目眩之自覺證者皆可準少陽病治之實亦少陽病診斷法之大綱也然咽乾目眩二證非少陽病亦有之難為準據唯口苦一證無所疑似可為確徵以之為主目標他二證為副目標後可肯定為少陽病也苦乾眩三證於半表半裡炎證之餘波上達於口腔咽頭眼球可知矣少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚傷寒論註少陽中風是口苦咽乾目眩之候以中風而兩耳無所聞目赤者與口苦咽乾目眩同乃胸腹間炎證之餘波迫於頭腦使然也可知柴胡劑所以治重聽耳聾眼疾矣胸中滿者說詳後為胸脅苦滿之略文胸中滿而煩者即因胸脅苦滿而煩悶也下謂少陽病在半表半裡而非在裡者故可和之而不宜吐下也若誤用吐下必至於心悸而驚躁唯其不可吐下故宜主以小柴胡湯也傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸傷寒論註金鑒曰脈弦細少陽之脈也上條不言脈此言脈者補言之也頭痛發熱無汗傷寒之證也又兼見口苦咽乾目眩少陽之證故曰屬少陽也蓋少陽之病已屬半裡故不可發汗若發汗則益傷其津而助其熱必發譫語既發譫語則是轉屬胃矣若其人津液素充胃能自和則或可愈否則津乾熱結胃不能和不但譫語且更煩而悸矣求真按注語若其人以下非是不可從王氏曰凡頭痛發熱俱為在表惟此頭痛發熱為少陽何也以其脈弦細故知邪入於少陽之界也求真按本條之前半說少陽病與太陽病之鑒別法而後半論少陽病誤為太陽病因誤治而生變證也即頭痛發熱雖似太陽病然太陽病脈必浮今脈弦細則非太陽病而為少陽病明矣又少陽不可發汗者因少陽病脈弦細而不浮非由發汗可解之機故不可以桂枝麻黃葛根劑發汗則譫語者若誤以桂麻葛劑發汗徒竭其津液使胃腸枯燥至成陽明病而發譫語此處暗示為調胃承氣湯證也此屬胃者因誤汗而譫語轉屬於陽明之謂也胃和則愈以下蓋謂因誤汗而譫語者以調胃承氣湯除熱毒調和胃腸則治愈矣若不然至成煩悶而心悸動矣云云總括上列三條解釋之凡所謂少陽病者不問其由太陽病轉入或由自然發生均在胸腹二腔之限界部的臟器組織發生炎證其餘波迫於上部成為定則的口苦咽乾目眩且有時使兩耳聾目赤頭痛波及於外表而使發熱因非表病故脈不浮非裡病故脈不沉因位此二者之間故脈亦準之而在浮沉之中位呈為弦細之象故當嚴禁汗吐下也此乃述少陽病之大綱至於細目揭載於下與諸條不相矛盾例如嚴禁汗吐下並柴胡桂枝湯之發汗大柴胡湯之瀉下是也小柴胡湯之注釋太陽病十日以去脈浮細而嗜臥者外已解也設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯傷寒論註本條大意已粗辨於前卷麻黃湯條下茲欲詳論之脈浮細者浮脈兼細脈也嗜臥者橫臥多眠之意然與無病安眠不同因自患太陽病十日以上不治故有多少之疲勞因病毒侵及內臟故使身神倦怠橫臥嗜眠也胸滿者胸脅苦滿也脅痛者側胸痛也設者假設之辭承上文而言全文之意謂脈浮細嗜臥者若有胸脅苦滿側胸痛之見證則可與小柴胡湯也云與不云主之者因本條不如次條為小柴胡湯之正證也由仲景此論觀之則胸膜炎風濕性胸肌炎肋間神經痛等可為本方之適應證傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之傷寒論註傷寒云五六日中風所以不舉日數者因前者太陽病不解而轉入於少陽率自發病經過五六日為常故揭既略之日數欲示後者不必有如是之經過隨時得以轉入之意故不記日數也往來寒熱者寒熱往來之意即惡寒去則發熱現發熱去則惡寒現常為惡寒與發熱交代的出沒之熱狀與惡寒發熱同時存在之表證的惡寒發熱大異此為太陽病與少陽病之重要鑒別點故學者當切記之胸脅苦滿有二義一謂他覺的證候觸診時覺肋骨弓裡面有抵抗物一謂自覺的證候傷寒論集成云滿與懣通悶也悶而加苦字更甚之詞也猶苦病苦痛苦患苦勞之苦又考小補注曰苦者集韻作困苦滿者便是苦悶也傷寒雜病辨證云胸脅滿者胸脅之間氣塞滿悶之謂非心下滿也脅滿者謂脅肋之下氣脹填滿非腹滿也如是之胸脅苦滿云肋骨弓下部有填滿之自覺而困悶也默默不欲飲食之默默傷寒論集成云嘿嘿又作默默漢書匡衡傳云默默而自不安柳宗元詩云嘿嘿含悲辛喻昌云默默即昏昏之意非靜默也又傷寒論正義云默默不欲飲食默默者不好語言也不欲飲食者鬱滯故也默默不欲飲食者因病毒鬱滯於肋骨弓下部是以精神鬱鬱言語飲食無氣力也心煩之心亦有二義一指精神一指心臟然此處並稱二者謂之煩傷寒雜病辨證云煩者增韻訓為悶按煩本熱悶之義故三陽皆有煩成無己曰煩熱也三因方云外熱曰躁內熱曰煩柯琴曰熱鬱於心胸者謂之煩發於皮肉者謂之熱是也又為假苦惱難忍之貌如煩痛疼煩煩渴煩逆煩悸煩滿煩躁躁煩之煩是也凡此等證三陰亦有之而互為寒熱則不可但以熱視之故此處之心煩即謂因內熱而精神及心臟有苦悶之情也喜嘔者傷寒論集成云喜與善通喜嘔者謂數嘔吐也按喜善好三字互訓並有數義左傳襄公二十八年云慶氏之馬善驚正義云善驚謂數驚也古有此語今人謂數驚為好驚亦猶此意漢書溝洫志云岸善崩師古注云言喜崩也字典之喜字注云喜與憙同好也又憙字注云好也又省作喜合考之則喜善好三字皆宜訓數也即屢作嘔吐之意也或胸中煩而不嘔言胸中煩者與心煩之局限於心臟者異蓋是胸中全部悉煩然未至侵入心臟故比心煩則熱毒較輕耳善嘔者因水毒被熱毒激動故熱毒熾盛者嘔吐亦強劇然輕微者不嘔吐為常也是以熱毒劇烈心煩喜嘔其緩弱者僅為胸中煩而不嘔吐也渴者因水毒下降而不上迫腹中痛者水熱二毒侵及胃腸神經也脅下痞硬者即胸脅苦滿謂肋骨弓裡面抵抗物增大達於肋骨弓下也心下悸小便不利者熱毒迫於心臟或腎臟也不渴者因水毒上攻身有微熱而不往來寒熱者因本來熱毒緩弱也咳者熱水二毒迫於呼吸器也種種各證皆以本方為主治之義也但自往來寒熱至於心煩喜嘔止為本方之正證或字以下傷寒論集成云其或字以下之數證即是所兼之客證不問其兼與不兼皆得以小柴胡湯主之也蓋人體有虛有實有老有少有有宿疾者有無宿疾者故邪氣所留之處雖同而所兼各證不一其種種不同有若此者如上所說不過為其客證耳故本方之正證當以胸脅苦滿為主目的以此諸客證為副目的而用之可知也本仲景此論可知本方能適應於腸傷寒感冒往來寒熱諸病例如瘧疾等及腦心臟呼吸器胃腸腎臟等諸疾患矣服柴胡湯已渴者屬陽明也以法治之傷寒論註鄭氏曰少陽陽明之病機分於嘔渴之中若渴則為轉屬陽明嘔則仍在少陽如嘔多則雖有陽明證不可攻之因病未離少陽也服柴胡湯則嘔當止若服柴胡湯已加渴者是為熱入胃府耗津消水此屬陽明胃病矣錢氏曰但云以法治之而不言其法者蓋法非定法也假令無形之熱邪在胃爍其津液則以白虎湯法解之若津竭胃虛則又以白虎加人參湯法救之若為有形之實邪則有小承氣及調胃承氣湯和胃之法若大滿實而潮熱譫語大便硬者則有大承氣攻下之法若胃既實身熱未除者則有大柴胡湯兩解之法等若此一類當隨時應變因證隨宜耳求真按本條之意上二說雖詳然以余之經驗遇此宜用小柴胡加石膏湯或大柴胡加石膏湯者頗多後世醫派雖常用小柴胡湯與白虎湯合方之柴白湯不如用小柴胡加石膏湯為簡捷也傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之傷寒論註傷寒四五日者患傷寒經過四五日頃為自表轉入少陽之時期因欲顯此候故舉概略之日數身熱者傷寒雜病辨證云身熱者大熱也以太陽上篇曰身大熱乾薑附子湯曰身無大熱等可徵其位屬於陽明與微熱相反蓋微熱者潛在裡也身熱者顯發在表也大抵身字以表言如身黃身疼身涼之類可見注家或以為表熱或以為裡熱紛然詞費中西深齊曰身熱者胸腹常熱也而其熱在肌膚得之使人身重微煩也如小柴胡湯曰身熱惡風則是治三陽合病者取於少陽者也非謂往來寒熱之變態也總以上諸證觀之皆邪熱傳裡未成實證而表裡俱熱者但較純在裡者為輕耳他若稱表熱稱外熱者亦均係身熱總當以不可下為法如上說即熱之根源在於半表半裡或在於裡而現熱於皮膚然僅自他覺的得以知之非如表證之翕翕惡寒發熱又非如前條之寒熱往來也所謂頸項強者傷寒論正義云頸項強此證亦非表證葛根湯條云項背強此條云頸項強也背屬表頸屬裡以是可知葛根柴胡之別矣意義尚未明顯腹證奇覽云如柴胡湯非項背強也所謂頸項強脅下滿者乃脅下滿之應也是因缺盆強及耳後也此說雖近是然尚未的確由余之實驗頸項強者乃自肩胛關節部沿鎖骨上窩之上緣向顳顬骨乳突起部攣急之謂也故小柴胡湯與葛根湯證之項背強大有區別此臨床上重要之點不可忽也又脅下滿者是胸脅苦滿之略與前頸項強上下相應者也手足溫者如陸氏曰手足溫者手足熱也乃病人自覺其熱按之不可得也病者自覺手掌足蹠熱者為下條四肢煩熱之輕微證渴者為有熱故云手足溫而渴也要之本條是說本方之證治並可知暗示此證與表證尤其與葛根湯證之鑒別法傷寒陽脈澀陰脈弦法當腹中急痛先與小建中湯不差者與小柴胡湯傷寒論註見太陽病篇小建中湯條傷寒中風有柴胡證但見一證便是不必悉具傷寒論註不論傷寒或中風若現柴胡湯證之一確證即據之處以柴胡湯不必諸證悉具也所謂一確證者分述如下劉棟曰凡柴胡湯正證中之往來寒熱一證胸脅苦滿一證默默不欲飲食一證心煩喜嘔一證之四證中但見一證即當服柴胡湯其他各證不必悉具也此謂四證中之一證僅就傷寒五六日條云爾若下條之嘔而發熱者及諸黃腹痛而嘔者亦得為其確證不可不知但諸確證中之尤確者胸脅苦滿也凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解傷寒論註錢氏曰蒸蒸者熱氣自內達於外如蒸炊之狀也邪在半裡不易達表必得氣蒸膚潤振戰鼓慄而後發熱汗出而解也顧氏溯源集曰翕翕者熱在表也蒸蒸者熱在裡也繹蒸字之義雖不言有汗而義在其中矣傷寒論集成曰蒸蒸者內熱貌蒸蒸而振者熱欲出而遏於外則為振寒也凡病人已經數日之後藥能中於膏肓則間有振寒發熱而解者豈唯下後為然哉亦豈唯柴胡湯為然哉尾臺氏曰凡用大小柴胡湯蒸蒸而振卻發熱汗出者所謂戰汗也傷寒累日雖已經汗下之後柴胡證仍在者當復用柴胡湯必蒸蒸而戰慄大汗淋漓所患脫然而解矣宜預告病家若發振寒則以重衾溫覆而取汗當使勿失其候求真按本條是述本方之瞑眩轉機諸解無遺憾矣今更欲進一步解釋爰揭一適例於下建殊錄曰某僧請診治因復診之前證皆除但覺胸脅苦滿乃書小柴胡湯方與之僧歸後信而服之雖有別證亦不復改他藥一日俄大惡寒四肢戰慄心中煩悶不能呼吸弟子驚愕欲更延他醫病者掩心徐言曰寧死不更服他藥復連服小柴胡湯數劑少頃蒸振煩熱汗溢腹背至是舊患諸證一旦頓除四體清快大異往昔僧乃作書遣價走謝先生云太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈傷寒論註過經者分述如下續醫斷曰過為經過之過經為經絡之經經脈血道是也其病過經脈而迄於內故帶表裡之證及於內者謂之過經所以分病狀也傷寒論集成釋過經者邪氣既過經脈之表轉入於少陽或陽明之辭也故每稱少陽或陽明者蓋表解之意也過者字典云越也超也又曰經過之過經者經脈之經即太陽病者介乎血液淋巴而轉入於少陽或陽明之意本條之過經者謂太陽病轉入於少陽也故全文之意太陽病過經於少陽即自轉入經過十餘日醫誤以二三次瀉下之其後再經四五日仍為柴胡證即胸脅苦滿依然者可先與小柴胡湯之謂也傷寒十三日不解脅胸滿而嘔發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之傷寒論註潮熱者觀證辨疑云潮熱者實熱也舊釋潮熱曰以熱如潮信之時來也然則日晡所發熱亦以時來何以別之古之命名也密若以時命之則何不曰夕熱此非潮信之義可知矣又按潮熱者取其充實之義海水若潮則海隅江曲空穴岩間之水無所不充潮熱若發則身體手足胸腹各處之熱無不充滿故曰潮熱者實也有潮熱者水不能走於外為身重為腹滿為短氣而發熱則遂成潮熱故汗出時則其熱不潮水未實也其水未實時則必發熱調胃承氣湯證是也其所舉潮熱者以小柴胡湯大陷胸湯大承氣湯等方中有逐水之藥也學者宜注意之知醫以丸藥下之非其治也者凡熱性病以湯劑下之為法醫以丸藥攻下之故仲景責其失治法也何則凡熱性病用下劑者非為得以通便係驅逐熱毒為主目的故用寒藥配有消炎性之大黃芒硝成湯劑為合理若用富於刺激性且熱性之巴豆及其他配合之丸藥極不適宜也又發潮熱者實也者凡發潮熱之病證概為實證先宜小柴胡湯以解外之外字非外證表證之義本來柴胡加芒硝湯證為少陽陽明之合病比小柴胡湯證則為內位對於其內則云外以示病位之深淺也故所謂解外者以小柴胡湯解少陽證之意也全文之意云傷寒經十二三日不治胸脅苦滿而嘔吐至日沒時發潮熱不間斷的微下利者此本柴胡湯證故雖與普通之下劑亦不下痢今自反對之下痢觀之則明為醫者與以峻烈之丸藥而失其治法姑置不論然自尚有潮熱觀之則為實證也明矣故先與小柴胡湯治其少陽證尤其是嘔證後宜以柴胡加芒硝湯為主治也尾臺氏曰先宜以下十一字為後人之注文宜刪去其所以潮熱微利者所謂內實證有燥屎或有臭穢之毒故加芒硝也醫者宜就病人體驗之此說似是而實非也蓋潮熱微利者宜柴胡加芒硝湯雖如尾臺氏說然本條之病證加有胸脅滿而嘔有嘔證者芒硝不適故仲景不拘於潮熱微利先與小柴胡湯以治嘔吐嘔止後用柴胡加芒硝湯以治潮熱微利換言之以小柴胡湯主治嘔證為一時權宜之手段此證去即當轉方故不云主之而云與之也柴胡加芒硝湯治潮熱微利可持長用之故不言與之而云主之也其理甚明無可異議何得以為注文而刪去之傷寒論陽明篇曰傷寒嘔多雖有陽明證不可攻之傷寒嘔吐甚時假令有陽明證不可以下劑攻下之是暗示先以小柴胡湯鎮嘔後然後可下之意故尾臺氏之說之錯誤益明矣婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之傷寒論註婦人中風者婦人之感冒也七八日續得寒熱者自患感冒經過七八日許得往來寒熱也經水適斷者由月經適來得往來寒熱時月經偶然閉止之謂然亦有因往來寒熱而不閉止或因閉止而為往來寒熱也此為熱入血室者感冒之熱陷入子宮之意其血必結者閉止之經血凝結於生殖器及胃腸等處之義也故使如瘧狀發作有時者解如字義然仲景特加此一句者是示因此而得寒熱因寒熱而月經閉止凝結也總而言之復言其寒熱如瘧狀發作的往來寒熱也治熱入血室宜用本方雖如仲景此論然瘟疫論於此證云經水適斷血室空虛其邪乘虛傳入邪勝正虧經氣不振不能鼓散其邪為難治且血結而不泄邪氣何由即解乎與適來者有血虛血實之分由是觀之熱入血室有血虛貧血血實多血之別若本方不與治貧血的驅瘀血藥或治多血的驅瘀血劑合用則難達完全所期之目的以余之經驗前者宜本方加地黃或本方與當歸芍藥散合用或與當歸芍藥散加地黃合用後者宜本方加石膏與桂枝茯苓丸合用或與桂枝茯苓丸加大黃合用此皆鄙見取舍於許叔微馬印麟劉完素淺田宗伯四氏之說茲列四氏之所論於下而批評之許叔微著本事方曰小柴胡地黃湯治婦人室女之傷寒發熱或發寒熱經水適來或適斷晝明了夜則譫語如見鬼狀者亦治產後惡露方來忽爾斷絕者求真按此方治小柴胡湯證有貧血之候而成煩熱者但不能治熱入血室馬印麟有言曰經水適斷時瘟邪內搏血結不散邪無出路晝則輕夜則熱重譫語發渴此熱結瘀血也用小柴胡湯去半夏加花粉桃仁紅花牡丹皮生犀角等味以破血逐邪如腹滿而痛不大便者前方中酌加熟大黃而微利之求真按馬氏之用小柴胡去半夏加花粉者即柴胡去半夏加瓜蔞湯之意其故不出主治其渴為目的以余之經驗則本病之渴是石膏之渴非瓜蔞根之渴故當用小柴胡加石膏湯者不當處以小柴胡去半夏加瓜蔞湯也又小柴胡湯加桃仁牡丹皮等不外驅瘀血之意然頗龐雜故不如小柴胡湯合用桂枝茯苓丸之正當也又加用大黃者宜以腹滿腹痛便秘之有無有參照此等證候之必要與脈應之沉實謂比小柴胡湯之脈應也舌之黃苔為目的劉完素著保命集曰治產後感於經水適斷之異證手足牽搐咬牙昏冒宜增損柴胡湯求真按增損柴胡湯方即小柴胡加石膏知母黃耆也求真按小柴胡湯加石膏知母為小柴胡湯白虎湯合方之意然不如小柴胡湯加石膏之簡捷也淺田氏勿誤藥室方函口訣小柴胡加地黃湯條曰此方許叔微為熱入血室之主劑不拘經水適斷血熱之甚者有效凡治血熱有三等之別頭疼面赤耳鳴齒痛者宜小柴胡加石膏血氣刺痛心下衝逆嘔吐者宜小柴胡加紅花五心煩熱日晡發寒熱如瘧者宜小柴胡加鮮芐求真按淺田氏喋喋於小柴胡加紅花者蓋由不知小柴胡與桂枝茯苓丸之合方證也婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而取之傷寒論註山田正珍曰經水適來四字當在得之七八日之下又原文有隨其實而取之者成本玉函脈經是隨其實而瀉之二說俱當茲隨解之婦人中風發熱惡寒得之七八日經水適來者謂婦人患感冒發熱惡寒將及七八日時適逢月經來潮也熱除脈遲身涼者因表熱內陷於子宮是以外表之熱去身涼浮數之脈變為遲脈而此遲脈即胸脅下滿如結胸狀之應徵胸脅下滿如結胸狀者自左肋骨弓下沿同側腹直肌至下腹部緊滿攣急之意所謂其血必結是也如結胸狀者大陷胸湯條云太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所少有潮熱自心下至少腹硬滿而痛不可近者大陷胸湯主之此云如結胸狀謂其狀態酷似彼證也又譫語者為血熱侵及頭腦當刺期門期門者甲乙經云期門者肝募也在第二肋端不容旁一寸五分直上於兩乳不容者德本遺稿云不容者鳩尾胸骨劍狀突起尖端之直下部也下一寸點墨橫量於脅一寸處也由此觀之則不容即在自兩乳頭所引之垂直線與胸骨劍突之尖端下一寸處所引水平線之交叉點處左右各一謂俱存於腹直肌內也刺之謂刺其絡也即示可施於左期門也隨其實而瀉之者期門為瘀血充實之所謂可於其充實處瀉血之意也本條之病證刺絡有效雖如仲景所論然余實驗此證選用小柴胡湯與桂枝茯苓丸合方或小柴胡湯桂枝茯苓丸加大黃合方小柴胡加石膏湯桂枝茯苓丸合方小柴胡加石膏湯桂枝茯苓丸加大黃合方之一雖不兼刺絡猶能奏效也鄙見係發源於吳錢二氏之說茲列於下吳氏瘟疫論曰婦人之傷寒時疫與男子無二惟經水適斷適來及崩漏產後等與男子稍有不同耳夫經水之來乃血滿於諸經歸注於血室下泄為月水血室一名血海即衝任之脈也為諸經之總任經水適來則疫邪不入於胃乘勢而入血室故夜發熱譫語蓋衛氣晝行於陽與陰不爭故晝明了也夜行於陰與邪相搏故夜則發熱譫語至夜只發熱而不譫語者亦為熱入血室因有輕重之分不必拘於譫語也經曰無犯胃氣及上二焦必自愈胸膈併胃無邪勿以譫語為胃實而妄攻之但熱隨血下時則自愈矣若如結胸狀者血因邪而結也當刺期門以通其結活人書治以柴胡湯然不若刺期門之效捷也求真按說明月經來潮之由來及晝日明了至夜發熱譫語之理雖不免附會其他則甚佳也然云小柴胡湯效果不若刺期門之效捷是僅知單用柴胡湯之法而不知前舉合用法之故不可從之錢乙曰小柴胡湯中應量加如牛膝桃仁丹皮類之血藥其脈遲身涼者或少加薑桂及酒製大黃少許則取效尤速所謂隨其實而瀉之也若用補不應者人參亦當去取尤不可執方以為治也求真按小柴胡湯加牛膝桃仁牡丹皮之類不如小柴胡湯合用桂枝茯苓丸之正當脈遲身涼者加薑桂及酒製大黃又小柴胡湯中去取人參等說俱誤不可從之婦人傷寒發熱經水適來晝日明了暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈傷寒論註自婦人傷寒發熱至此為熱入血室云云者謂婦人當患傷寒而發熱適遇月經來潮日中精神雖明了至日沒時則譫語且現奇怪之狀態恰如見妖怪者此為熱內陷於子宮也無犯胃氣及上二焦必自愈者如下說方氏曰無禁止辭犯胃氣者言下也必自愈者伺其經行之血下則邪熱得以隨血而俱出猶如鼻衄之紅汗故言自愈也蓋警人勿以妄攻而致變亂之意方氏程氏汪氏俱曰胃氣及上二焦者謂汗吐也山田正珍曰無犯胃氣者以似譫語如見鬼狀之承氣證宜辨之若不施汗吐又不以大承氣湯而誤下一任自然則熱毒伴經血被排出於體外故必自然而愈然此以月經通順為前提若不然者當準前條施治陽明病下血譫語者此為熱入血室當刺期門隨其實而瀉之濈然汗出者愈傷寒論註下血謂子宮出血也濈然汗出貌本條之病證亦宜準前條之治法傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯傷寒論註自傷寒至汗出而解止謂傷寒經過五六日頃為病毒轉入於少陽之時期此時當嘔吐與發熱以不在小柴胡湯證之外指此嘔吐發熱發於同時是以謂柴胡證悉具也然醫不知此用下劑誤下後尚依然有柴胡證胸脅苦滿證也者雖經誤治未成逆證故再與柴胡湯時必瞑眩而治愈也若字以下示柴胡劑胸脅苦滿證大陷胸湯結胸半夏瀉心湯痞三證之鑒別法即心下部膨滿而硬有自他覺的疼痛者名結胸主治以大陷胸湯但心下部膨滿無他覺的疼痛稱為痞者則不以胸脅苦滿為主治而以心下滿為主治是以柴胡湯非適中之方宜用半夏瀉心湯也上之鑒別法臨床時甚關緊要將更詳論之柴胡劑主胸脅苦滿而不主心下大柴胡湯證有心下急且必有胸脅苦滿當知肋骨弓下毫釐之關係為結胸與痞之區別結胸證者心下部必膨滿而硬有自覺他覺的疼痛痞證者雖心下部膨滿而有自發痛然不堅硬且無壓痛是三證之區別也陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之傷寒論註仲景雖稱此為陽明病然胸脅苦滿未去者是少陽陽明合病也溏者傷寒雜病辨證云溏者即鶩溏也靈樞云多熱則溏而出麋馬蒔注云溏者穢不堅而雜水者也樓英曰鶩溏者寒泄也鶩鴨也大便如水其中小有結糞者也總觀以上諸說則溏義盡矣蓋其證比下利為稍輕但舊時微溏者為虛寒故即為下痢之稍緩弱者所謂小便自可者與小便自調同尿量度數與平常無異由是觀之則本條為說明本方治腸傷寒性之下痢作用然以余之實驗則本方不特限於此病凡一般之急性亞急性慢性胃腸炎尤以小兒之疫痢消化不良證等最有奇效若效力微弱時宜加芍藥有不消化之便或黏液黏血便時宜加大黃有口舌乾燥發熱煩渴等證時當更加石膏蓋余根據本條及下條之嘔而發熱者小柴胡湯主之及黃芩湯黃芩加半夏生薑湯白虎湯諸條潛心精思綜合玩索而得之者也陽明病脅下硬滿不大便而嘔舌上白苔者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也傷寒論註錢氏有曰不大便為陽明裡熱然嘔則又為少陽證矣若邪實於胃則舌苔不黃即黑或乾硬或芒刺舌上白苔為舌苔之初現若夫邪初在表舌尚無苔既有白苔雖邪未必全在於表然猶未入於裡也故仍為半表半裡證錫氏曰不大便者下焦不通津液不得下也嘔者中焦不治胃氣不和也舌上白苔者上焦不通火鬱於上也與小柴胡湯可調和三焦之氣而白苔去津液得下而大便利胃氣因和而嘔止三焦通暢氣機旋轉身濈然而汗出解也尾臺氏曰陽明胃實證舌色多黑若未至黑必煤黃色也此條雖稱陽明病實陽明少陽之併病所以白苔也苔本以黑為義故加以白字素問五臟生成篇云黑如炲者死此雖非論舌色亦可併發苔字之義求真按陽明病雖有腹滿然無脅下硬滿及嘔舌上白苔等故仲景雖稱陽明病其實非單純之陽明病而為少陽與陽明之併病也明矣故以脅下硬滿及嘔舌上白苔三證為目的而可與小柴胡湯也若與之則胸部以上被障礙之臟器組織機能得以復活上逆之體液得以下降枯燥之腸胃被滋潤而調和而大便通順體液疏通之結果得以發汗諸證悉治也以非下劑之小柴胡湯反有瀉下作用之妙其故蓋可知矣尾臺氏曰陽明病發潮熱云云陽明病脅下硬滿云云此二章蓋所謂少陽陽明之併病也過此等證反有宜柴胡加芒硝湯或大柴胡湯者臨證之際宜注意之是或一理可作參考陽明中風脈弦浮大而短氣腹都滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小瘥外不解病過十日脈續浮者與小柴胡湯脈但浮無餘證者與麻黃湯若不尿腹滿加噦者不治傷寒論註先輩多以為本條非仲景之正文余亦然之今特列之者以其不無可資於治術即作注文亦無不可求真本時時噦句以本方配用橘皮本方加橘皮即為本方橘皮湯合方之意治呃逆及噁心嘔吐乾咳頻發因耳前後腫句以本方加石膏治耳下腺炎耳後及頸部淋巴腺炎乳突炎等又活用此意療睾丸炎得卓效學者試之本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之傷寒論註以法治之與隨證治之同其他可參照既述之注釋嘔而發熱者小柴胡湯主之傷寒論註仲景稱嘔而發熱者其實係嘔吐發熱兼備之意故不論嘔吐後發熱或嘔吐與發熱同時或發熱後嘔吐者均以本方為主治可知矣傷寒瘥後更發熱者小柴胡湯主之脈浮者以汗解之脈沉者以下解之傷寒論註此謂傷寒大半瘥後再發熱者雖大概主治以小柴胡湯然若脈浮者宜治以發汗劑脈沉者宜治以瀉下劑也尾臺氏曰按瘥後更發熱者有三義死灰欲再燃者宜與小柴胡湯其熱因新外感而發者求真按脈浮者是也宜選用麻黃桂枝二湯以發汗因過食宿滯者求真按脈沉者是也宜審其證以枳實梔子大黃豉湯大柴胡湯調胃承氣湯大承氣湯等下之此說是矣然諸方之外尚有竹葉石膏湯麥門冬湯應用之機會不可不知諸黃腹痛而嘔者小柴胡湯主之金匱要略註諸黃諸種之黃疸也此證腹痛嘔吐者本方主治雖如仲景之論假令腹痛雖不嘔吐然有胸脅苦滿者亦可知以本方主治之矣問曰新產婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新產血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難產婦鬱冒其脈微弱嘔而不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以產婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實大承氣湯主之金匱要略註本條論產後之痙鬱冒大便難胃實之四證本方所關者為前三證惟後一證治法不同即自新產血虛多汗出至小柴胡湯主之止可作如下之讀法新產血虛多汗出喜中風故令病痙大便堅嘔而不能食小柴胡湯主之產婦鬱冒其脈微弱嘔而不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出大便堅嘔而不能食者小柴胡湯主之其餘不過補足此等章句而已試注釋於下本條之痙與葛根湯證剛痙不汗出異因分娩而血虛即貧血汗出多大便堅嘔而不能食假令雖喜中風善感冒亦病不在表而在半表半裡也明矣故謂本方主治之也又鬱冒者明理論云鬱者鬱結而氣不舒者也冒者昏冒而神不明者也此即現今之腦貧血其嘔而不能食大便反堅者雖不外於本方證然此證大便不堅為常今反大便堅故云反堅也而所以致此者吉益南涯云大便反堅嘔而不能食是水毒在上故嘔而不能食下無水氣故大便堅為水毒集於上半身下半身缺乏故也又自所以然者至必冒止是說發鬱冒之理貧血者則四肢厥冷四肢厥冷時則必發鬱冒然四肢厥冷不獨因貧血之故有水毒亦然故鬱冒亦同此理由大汗出而解則明為水毒之所主矣冒家欲解者冒家服小柴胡湯而欲解之義大汗出者金匱要略述義云冒家大汗出即是小柴胡湯適宜之效亦與少陽病振汗相類如上條凡柴胡湯之病證下之若柴胡證未罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解之類即因戰汗而治者也以是可知鬱冒頭汗大便難四肢厥冷不外因水毒之變動而本方有鎮痙鎮靜止汗鎮嘔通便利尿諸作用矣病解能食者為服用小柴胡湯之結果即痙證鬱冒或大便難等證已治愈之徵以下如七八日再發熱者非少陽病而為胃實即陽明病矣故以大承氣湯為主治也婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩者三物黃芩湯主之金匱要略註金匱作但煩者千金方作但煩熱者千金為是茲隨解之但煩熱者但四肢煩熱之略草蓐者產褥之意自發露得風者褥婦自己暴露其肉體而患感冒也四肢苦煩熱者謂四肢煩熱頗劇而以手掌足蹠為尤甚之意方輿輗三物黃芩湯條曰臨盆之際露體用力無暇他顧此時風寒乘虛襲入又有血氣尚未平復輕舉妄動而感於邪此皆在草蓐自發露得風之類也其證惡寒發熱頭痛脈浮不即用解肌藥以為新產後不宜發汗使邪氣延綿將成煩熱然猶頭痛者與小柴胡湯即可解如頭不痛但至於煩者則黃芩湯所主治也此證雖可用小柴胡加地黃湯或加味逍遙散然不如黃芩湯之簡捷所可惜者此藥苦劣難吃故世醫以黃連代苦參或依本方加甘草余按加甘草猶可去苦參有失仲景之方意別錄云苦參除伏熱求真按不可用苦參之代用藥百疢一貫曰恐是產後蓐勞證先生云此證宜小柴胡合三物黃芩湯二方治蓐勞非他方所能及也三物黃芩用於強熱小柴胡用於輕熱若未至嚴重止宜三物黃芩湯先生活用此方嘗用於婦人自十六七歲經水斷絕成為勞病者有效若用此方以下蟲則益佳果若此則縱見勞狀雖危可治矣先生常加甘草而用之因難吃也類聚方廣義本方條曰草蓐者為產褥也凡四肢苦煩熱頭痛者非特產後中風如是即男女之諸血證久咳