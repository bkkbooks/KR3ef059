front:
  text: 自序余少以親命學醫於金澤醫學專門學校明治三十四年卒業旋供職醫院嗣復自設診所從事診療至明治四十三年長女以疫痢殤恨醫之無術中懷沮喪涉月經時精神幾至潰亂偶讀先師和田啟十郎所著之醫界鐵椎始發憤學中醫經十有八年其間雖流轉四方窮困備至未嘗稍易其志用力既久漸有悟入乃知此學雖舊苟能抉其蘊奧而活用之勝於今日之新法多矣無如舉世之人競以歐美新醫相矜炫中醫之傳不絕如縷此余所為日夜悼嘆者也既以稍明此學不忍終默竊欲振而起之故不揣淺陋撰為是書以俟天下具眼之士昭和二年一九二七六月上旬湯本求真謹識於田端之陋室皇漢醫學序余以疾病人所時有而良醫不常見遂感憤而學醫孜孜矻矻歷十餘年未能有所發明也每見西醫詆中醫無科學之研究試驗之證明而中醫亦詆西醫不識氣化之原不知標本之治二者交譏各封故步不能相通心竊病之嘗謂中西醫術各有所長亦互有所短時欲比較同異捨短取長融會為一以見殊途同歸之用然有志而未逮也近以弘一大師之介獲識馬湛翁先生先生以日人湯本求真所撰皇漢醫學見貽且以譯事相勗展而讀之實獲我心凡湯本之所言皆余所欲言而不能言者也中醫垂絕之緒庶幾可以復振矣夫資科學之實驗則不偏尚懸解明古方之妙用則不徒重機械是誠醫林之準繩民生之根本也因不揣謭陋從事迻譯仍其舊題皇漢醫學以諗同志日文則多得韓陶齋先生校訂違失中文則多得葉伯敬先生商榷未允皆余所當感謝者也其猶有未能信達之處望海內賢達加以是正幸甚幸甚一九二八年十月黃巖周子敘序於杭州客次
