宜服之求真按可見嘔而發熱者不論何證悉皆以本方主治之保赤全書曰痘瘡靨後身熱不退或寒熱往來者用小柴胡湯正體類要曰小柴胡湯治一切撲傷等證因肝膽經火盛作痛出血自汗寒熱往來日晡發熱或潮熱身熱咳嗽發熱脅下作痛兩胠痞滿者求真按由頭部打撲發為外傷性神經證與本方加石膏得速效保命集曰治產後日久而脈浮數者宜使服三元湯小柴胡湯合四物湯又名柴胡四物湯求真按四物湯由當歸川芎芍藥地黃四味成方後世雖尊崇之然若選用師之芎歸膠艾湯或當歸芍藥散更無此方之必要則此證宜用小柴胡湯與當歸芍藥散之合方產後日久虛勞針灸各藥俱無效者宜使服三分湯小柴胡湯合四物湯加白朮茯苓黃耆求真按此證亦宜用前節之合方得效方曰小柴胡湯治嵐嶂溪源蒸毒之氣自嶺以南地毒苦炎燥濕無常人多患此狀血乘上焦病欲來者使人迷困甚則發躁而使狂妄亦有使啞而不能言者皆由敗毒瘀心毒涎聚脾所致此藥中加大黃枳殼各五錢求真按此說病原病理雖未必合理然示小柴胡湯治腦證則是矣加大黃枳殼與枳實同其證兼有大柴胡湯類似之證傷寒蘊要小柴胡湯之近代名醫加減法曰若胸膈痞滿不寬或胸中痛或脅下痞滿或脅下痛者去人參加枳實桔梗各二錢名柴胡枳殼湯求真按此證宜處以小柴胡湯枳實芍藥散之合方小柴胡加枳實芍藥湯而加桔梗者殆因有咽痛抑或黏痰難以咯出或有此證而胸痛或有化膿機轉不然者則不可加之若加桔梗即為小柴胡湯排膿散排膿湯合方之意依余之經驗此二合方證肺結核頗多若有熱熾口舌乾燥者宜更加石膏若胸中痞滿按之痛者去人參加瓜蔞仁三錢枳實桔梗各二錢五分黃連二錢名柴胡陷胸湯求真按此證宜處以小柴胡湯小陷胸湯排膿散之合方而肺結核多有此證若有石膏者宜更加之若脈弦虛發熱口乾或大便不實胃弱不食者加白朮茯苓白芍藥各一錢五分名參胡三白湯求真按此證宜用小柴胡加芍藥苓朮湯然有時宜處以小柴胡加茯苓湯或小柴胡加苓朮湯若發熱煩渴脈浮弦數小便不利大便泄利者加四苓散而用之名柴苓湯求真按此證宜用小柴胡湯與五苓散之合方若內熱頗甚錯語心煩不眠者加黃連黃柏山梔仁各一錢名柴胡解毒湯求真按此證宜小柴胡湯與黃連解毒湯或與第二黃連解毒湯合用然味甚苦頗難服飲故余常以小柴胡湯兼用黃解丸或第二黃解丸內臺方議小柴胡湯條曰如發熱小便不利者和以五苓散嘔噁者加橘紅胸中痞結者加枳實求真按小柴胡加橘皮湯不僅治噁心嘔吐有效即呃逆及乾咳頻發諸病百日咳肺結核等亦有奇效若熱熾煩渴者加石膏祛痰困難者更加桔梗或隨腹證宜合用排膿散本草權度曰玉莖挺長者亦濕熱也加連於小柴胡湯求真按此證可用本方兼黃解丸萬病回春曰小柴胡加青皮山梔治胸脅脹痛喘咳吐痰求真按此證宜小柴胡加橘皮湯兼用黃解丸醫方口訣集小柴胡湯條余常用之有五口訣曰其一傷寒半表半裡證加減用之其二溫瘧初發增減用之求真按本方雖說有治瘧之效然無胸脅苦滿證則不可妄用其三下疳瘡及便毒囊癰之類凡在前陰之疾皆用本方求真按本方非陰部疾患之特效藥故雖有此部病證然不呈胸脅苦滿者則不可濫用其四胸脅痛而寒熱往來因怒而成病之類凡屬肝膽者皆以本方治之求真按有本方證病者往往易怒是以未必為此證之特徵故不可僅據此而處劑其五寡尼室女寒熱往來頭痛胸脅牽引口苦經候失常者似瘧非瘧似傷寒而非傷寒此熱入血室也以此方為本藥再隨證作佐使用之古書中勞瘵骨蒸者多以本方加秦艽鱉甲等藥主之求真按肺結核雖說以本方證為多然無胸脅苦滿者則不可妄用加用秦艽鱉甲者後世家傳統的惡癖也不可從之余雖未試然非無其理故為口訣之五一女子病瘧熱多寒少一醫用藥而嘔一醫用藥反泄請余診治時瘧利併作且嘔脈之但弦投以本方加芍藥未至五帖諸證併瘳求真按此為瘧疾兼胃腸炎也以小柴胡加芍藥湯而兼治之有速效一寡婦不時寒熱脈上魚際此血盛證也用本方加地黃治之而愈一婦人身震顫口妄言諸藥不效以為鬱怒所致詢其故蓋因素嫌其夫含怒久久以本方治之稍可又用加味歸脾湯而愈求真按此證用本方非也加味歸脾湯雖於酸棗仁湯加減而成然僅後世醫家之捏造蕪雜不足取若由初病處以小柴胡湯與酸棗仁湯之合方更有一層捷效一室女十四歲天癸未至身發赤斑而癢痛左關脈弦數此因肝火血熱也以本方加生地山梔丹皮治之而愈求真按此證宜用小柴胡湯桂枝茯苓丸之合方兼用黃解丸東洞翁本方定義曰小柴胡湯治胸脅苦滿往來寒熱心下痞硬而嘔者建殊錄曰一人生五歲啞而癇癇則日一發或再發虛尪羸憊旦夕待斃且苦悶之狀日甚一日父母之情不忍坐視願先生一診雖死無悔先生因是診之心下痞按之濡乃作大黃黃連湯使飲之約百日許痞去而癇不復發然胸脅煩脹脅下支滿啞尚如故又作小柴胡湯及三黃丸與之時以大陷胸丸攻之半年許一日乳母抱兒倚門間眺適有牽馬而過者兒忽呼曰牟麻馬也父母喜甚乃襁負俱來以告先生先生試拈糖果以挑其呼兒忽復呼曰牟麻日本以甘美之味總呼牟麻馬亦曰牟麻因其國音相通也父母以為過其所望踴躍不自勝因服前方數月言語卒如常見求真按胸脅煩脹者云胸廓之一部尤其是下部沿其左右經而隆起也脅下支滿者脅骨弓下有支障物膨滿之意故脅下痞硬之輕度者俱以柴胡劑為應用之目標也一賈人面色紫潤掌中脫肉四肢癢痛眾醫以為癩疾處方皆無效先生診之胸脅煩脹心下痞硬作小柴胡湯及梅肉丸而雜進之數十日掌肉復原紫潤始退一男子十四歲通身浮腫心胸煩滿小便不利腳尤濡弱眾醫無效先生診之胸脅煩脹心下痞硬作小柴胡湯使飲之盡三服小便快利腫脹隨減未滿十服痊愈求真按此證若與以小柴胡加茯苓湯或小柴胡加茯朮湯則當更加捷效凡患惡疾者多由於傳繼其身發時有辱及祖先者江洲一賈人患之謁先生求診治先生診視之面色紫潤身體遍爛按其腹兩脅拘急心下痞硬先用小柴胡湯和解胸腹後作七寶丸使服之半年許諸證全退方機本方主治曰若上逆者柴胡加桂枝湯主之本方內加桂枝五分若本方證嘔逆劇者倍半夏湯熟加生薑汁一錢求真按是本方合生薑半夏湯之意故有效然多處均隨小半夏湯之方意方中加重半夏生薑即可火熱癇宜服麥門冬加石湯間有宜柴胡加石湯者求真按麥門冬加石湯柴胡加石湯為麥門冬加石膏湯小柴胡加石膏湯之略稱也成績錄曰一男子患瘧他醫已與藥一二發後一日大汗出不休因請先生先生與小柴胡加石膏湯乃復原又男子患耳聾脅下硬時時短氣上衝發則昏冒不能言兩腳攣急不能轉側每月一二發先生診之投以小柴胡湯兼硫黃丸而愈險症百問曰產後耳鳴或耳聾者師曰宜苓桂朮甘湯小柴胡湯隨其證而投之兼用應鐘散求真按前證可用上之二方雖如南涯氏說然此等之外可處以柴胡薑桂湯大柴胡湯桃核承氣湯者不少又南涯氏主張兼用應鐘散余以三黃丸或黃解丸為優吉益南涯曰小柴胡加石膏湯治耳前耳後腫者原南陽曰又瘰癧亦為勞形蓋合病者同為死證也此亦係瘀血之因雖不與勞併病亦有死者馬刀瘡亦有名馬刀挾癭者因其根盤似馬刀故瘰癧之形狀耳下及頸項處累累歷歷凝結於皮膚之內此凝結物與俗名痰核者同無底淺根此非因痰之故皆由瘀血結於絡中小柴胡加石膏湯有神驗華岡青州曰柴胡加石不僅治胸脅頭目之病亦可用之柴胡散血凝氣聚石膏解伏凝或云解散概括言之散腫之謂也由以上三說觀之則小柴胡加石膏湯者為一種消炎解凝劑明矣古方便覽本方條曰表熱散後氣痞不欲食者宜之凡是小兒驚風或夜不寐者宜之疳證下利發熱脅腹滿宜兼用紫圓婦人產後寒熱如狂者有此方證瘧疾宜隨其腹證用之古今一概以小柴胡湯用為瘧疾之專方然多不效者皆因以寒熱為準據而不知腹證故也東洞先生以診腹為主教弟子若不精於診腹者則不能治疾病求真按不特以本方治瘧疾如此萬病俱宜以腹證為主目的非然者反有害而無效也東洞翁之英名至今不朽者因首倡診腹法且精其術之故也水腫有胸脅苦滿小便不利者宜兼用三黃丸或平水丸一男子年四十餘初於手背發腫毒愈後一日忽然惡寒發熱一身面目浮腫小便不通余診之心下痞硬胸脅煩脹乃以此方及平水丸雜進小便快利而愈求真按本方亦為一種利尿劑不必兼用平水丸一婦人發黃心中煩亂口燥胸脅苦滿不欲食數日後目盲無所見余乃作此湯及芎黃散與之目遂復明一月餘諸證痊愈求真按由余之經驗黃疸證宜用小柴胡湯或小柴胡加石膏湯兼用枳實梔子豉湯或合用枳實梔子大黃豉湯處頗多一男子吐血數日不止日益劇余診其腹胸脅煩脹而痛乃作此方二三劑而奏效求真按此證宜兼用三黃丸或黃解丸一男子年三十患傷寒四肢逆冷攣急而惡寒其脈沉微欲斃諸醫投以參附劑無效余診之胸脅苦滿乃與此方二三劑而應其脈復續使服二十餘劑痊愈求真按不究病原而遇心臟衰弱即手足無措妄用參附劑之後世家恰如濫用樟腦製劑等強心藥之西醫家而希冀收得效果者同一見解小柴胡湯雖非心臟衰弱之特效藥然能於其病原處發生作用故不治心力而自能恢復此余所以云古醫道中雖無強心劑之名而有其實者也一男子年五十餘得一病常鬱鬱不樂獨閉戶塞牖而居聞雞犬之聲則惕然而驚上衝目昏寐臥不安或遺瀝漏精飲食無味百治不效綿延三年許余診視之胸脅苦滿乃以柴胡加桂湯及三黃丸使飲之時以紫丸攻之三月病痊愈求真按是本方治神經衰弱之佐證也一女年十八咳嗽吐痰氣上衝而頭目昏眩四肢倦怠心志不寧寒熱往來飲食無味日就羸瘦而不愈約一年許眾醫皆以為勞瘵余診之胸脅煩脹乃以小柴胡加桂湯及滾痰丸使服之三月許收全效求真按此證雖稱勞瘵實似是而非也若真為肺結核則兼用滾痰丸有害而無效也生生堂治驗曰一婦人患傷寒經水適來譫語如見鬼狀且渴欲飲水禁而不與病勢益甚邀先生診之脈浮滑是熱入血室兼白虎湯證也即與水不禁而投以小柴胡湯曰張氏所謂其人如狂血自下血下者愈病勢雖如此猶當從經水而解也五六日果痊愈求真按此證用小柴胡加石膏湯為至當之方中神氏不加之者因其證比較的輕微代之以冷水也古人曰水天然之白虎湯也其主藥為石膏以是可知其義矣又氏察病勢雖如此答以當從經水而解果如其言由是觀之則腸傷寒之毒素可由經血排除也明矣是以余謂中藥方對傳染病之療法以驅逐細菌性毒素為主的原因之一也方伎雜志曰一女子年十六七患咳嗽吐血寒熱往來經水不轉柴瘦而心氣鬱鬱其證如勞瘵初起然脈急數無度食不能進告以難治用柴陷湯兼瀉心湯反盜汗出動悸口燥等證轉服柴胡桂枝乾薑湯三月許諸證大宜但吐血或止或出至翌春經行後不來時已服藥四月矣欲梳頭而髮脫如尼至秋病愈而大快可謂幸矣然畢竟由用心用藥故也通計服藥十月許求真按此證恐係肺結核余於同證亦用柴陷湯即小柴胡湯小陷胸湯之合方或用小柴胡湯小陷胸湯排膿散之合方或加石膏黃解丸或兼用第二黃解丸而痊愈者屢矣一男子年三十餘患咳逆吐血經數醫不愈其證寒熱時作咳逆不止時時吐血倚床高枕不能仰臥安眠舌唇燥白脈浮數大無力精力脫乏胸部動甚余以小柴胡湯小陷胸湯合方加桔梗晝夜使服六貼十日許血止寒熱咳嗽大減又一旬許至近邊散步再發寒熱咳嗽吐血頗多此次復發恐不能治愈仍用前方與瀉心湯交互服之咳嗽漸減熱亦漸退血亦漸止五旬許痊愈將養一月餘出而就職求真按此病初起即宜兼用瀉心湯麻疹一哈曰有一婦人年四十五患麻疹其證或發熱或不發熱時或頭疼目眩背強而疼煩或如瘧狀而無汗鬱悶不樂飲食漸減六七日始進葛根湯無效乃按其腹狀胸脅煩悶脅下微痛痼瘕如盤應指而痛大便秘結小便短少更進小柴胡湯及三黃丸大便快利汗出如流疹子從汗而出疹子收後專治痼瘕而後諸證痊愈健履倍常求真按小柴胡湯證之頸項強誤認為項背強處以葛根湯所以無效以是知二者分別不可稍忽也餐英館治療雜話小柴胡湯條曰此方應用極廣不僅傷寒半表半裡證而已凡萬病寒熱往來者古人亦云價值千金應用之目的左脅下拘攣或凝按則痛往來寒熱者無不效所謂胸脅苦滿是也求真按胸脅苦滿者有左右平等者有右側強度比左側強者又不無反之者但不限存於左側耳又此方不必以其寒熱往來為主目的瘧疾寒熱各半者與桂枝湯合用有效求真按小柴胡合桂枝湯即柴胡桂枝湯此方治瘧疾雖可不論然不以寒熱相半者為目的說詳下風勞證寒熱往來或只發熱咳嗽自汗或有盜汗等證者加秦艽鱉甲誠妙此出於醫方口訣余亦每有經驗求真按凡加味必當隨證不可漫然加秦艽鱉甲也婦人經行不順發寒熱如瘧或諸病因怒而發者加香附子青皮木香莪朮妙求真按非因怒而發病因有病而發怒也此後世俗醫妄論不足取又此證宜小柴胡湯與桂枝茯苓丸合用無須用此等加味也徐春甫合四物湯名柴物湯余曾治驗一婦人二十四月事不順小腹結塊時痛時止三四年不愈形體頗瘦飲食無味以後即臍腹疼痛不已一醫以大黃牡丹皮湯或桂枝茯苓丸加大黃之類攻之僅能下利塊物與刺痛依然不愈求治於余亦無別法唯思用下劑如桃核承氣湯兼用螝蛤一味為丸或用濟生通經丸等但更不動刺痛益甚於是計窮只以左脅之拘攣為目的用柴物湯約四五日下如魚腸物紅白相雜於是余思柴物湯無下瘀血之理或係前用之強烈攻裡劑未曾發生瀉下作用因用此湯而起緩下乎此非柴物之效也後遇同病者以為從前之柴物湯一時偶然之效故不敢用仍用通經丸抵當丸之類頻攻血塊但唯增刺痛而不能瀉下因用柴物加莪朮蘇木鬱金等則下白物六七塊調理數日全愈此病人有凝物在左脅下按之則痛往來寒熱等證後見同證者前醫投以桃核承氣硝石大圓等仍自若余用柴物湯得速效雖不知柴物下血塊之所以然但已經驗數人故覺必有下血塊之理生等當更宜經驗之求真按以上病證不宜用柴物湯當處以小柴胡湯當歸芍藥散之合方此合方之排除瘀血由於當歸川芎之作用而他藥援助之又上病者之胸脅苦滿甚於左側者是不獨小柴胡湯證然也當歸芍藥散證之瘀血亦由衝逆凝集於此部故可以合用此二方者乃不悟此而以為小柴胡湯之胸脅苦滿限於左側此大誤也不可從之因云不僅當歸芍藥散證即桂枝茯苓丸桃核承氣湯證亦屢因瘀血衝逆凝結於左肋骨弓下或心下也故此時若當小柴胡湯或大柴胡湯證存在之胸脅苦滿必右側甚於左側許學士以小柴胡加生芐用於熱入血室證名小柴胡加芐湯又見婦人耳鳴手足麻痹疼痛證皆由血滯以小柴胡加桂枝湯再加大黃有大效大黃者婦人之聖藥也此見古方節義求真按此證宜小柴胡湯桂枝茯苓丸加大黃之合用方大黃者非特婦人為聖藥用之得當則男子婦人皆聖藥也又小兒感於風邪表證已去大半後餘熱不清大便不利煩渴者用小柴胡湯加大黃以代大柴胡湯見幼幼集求真按不拘小兒大人若表證未全去不可加用大黃又以煩渴及大便不利為大黃應用之目的非也何則煩渴者為石膏之主治無關於大黃大便不利雖為大黃之主治然此外小柴胡湯非不能治之痢疾熱氣強裡急後重者或傷食腹痛之類兼有外邪表裡俱熱痛不止者宜用大柴胡湯求真按若無大柴胡湯之腹證不可用蛔蟲身熱不退者以小柴胡加黃柏烏梅苦楝皮山梔子乾薑細辛去大棗有奇效見全生集名加味小柴胡湯又載於回春求真按此證似宜小柴胡湯與鷓鴣菜湯互用或小柴胡湯加鷓鴣菜大黃餘藥可暫置之身熱不退者加乾薑細辛之熱藥非也不可從夜靜晝熱者熱在氣分小柴胡湯加山梔黃連知母地骨皮晝夜俱熱者熱在血分小柴胡合四物湯又伏暑發熱汗出而渴不語者暑入心包絡也小柴胡加茯苓等有別效求真按小柴胡湯加山梔子黃連者即同方加黃解丸或兼用第二黃解丸之意小柴胡湯合四物湯者即同方與當歸芍藥散加地黃合方之意小柴胡湯加茯苓者即同方合小半夏加茯苓湯之意是皆本於此等之合方然預定是等之方劑配當各種之病證不無膠柱鼓瑟之謬見為識者所不取也宜詳審病者之脈腹外證而處以適方而小柴胡湯四物湯之合方即小柴胡湯與當歸芍藥散加地黃之合方溫藥包含當歸川芎白朮等故用於有微熱者雖非不可但熱氣熾盛者服之不但無效反而有害也若手足心煩熱並言及左脅者則小柴胡無不治之又邪氣在表裡陰陽不分其證寒熱往來或渴而小便澀或下利者合五苓散名柴苓湯凡肝膽二經之病總以小柴胡湯為佳但以左脅下之攣急緊縮為目的則有百發百中之效求真按如所謂陰陽不分及肝膽二經等語後世派之陳言也不可取又小柴胡湯不僅以左脅下為目的已述於前矣俄而耳鳴頭目鬱冒者多由鬱怒所致合香蘇散則百發百中見於眾方規矩求真按非因鬱怒而鬱冒是由所伏之病毒每因鬱怒而誘發此證宜小柴胡湯合用半夏厚朴湯為佳又曰灸後發熱煩悶加黃連山梔子若不止則加艾葉此亦經余屢試無誤然灸後發熱之重證非此方所能治詳載經驗於後之柴胡加龍骨牡蠣湯條求真按小柴胡湯加黃連山梔子不若同方兼用黃解丸也勿誤藥室方函口訣小柴胡湯條曰此方以往來寒熱胸脅苦滿默默不欲飲食嘔吐或耳聾者為目的凡有此等證雖有胃實之候亦可與柴胡即老醫所說脅下與手足心無汗者雖有胃實證亦可與柴胡之意也總之處此方者以兩脅痞硬拘急為目的即所謂胸脅苦滿是也又胸腹痛而拘急與小建中湯不愈用此方今人多積氣感受風邪熱閉於裡而不發者則必心腹疼痛此時積也其施針藥無效者與此方可速愈求真按積氣後世派之病名也不足取凡不問感冒與腹痛若見胸脅苦滿證則悉以本方主治之小兒停食兼有外邪或如瘧狀者以此方解之又久久大便不通者此方亦能通大便而解病即上焦和津液通之義也後世名三禁湯者蓋用於禁汗吐下故也求真按是師所謂上焦得通津液得下胃氣因和之略也又此方加五味子乾薑用於風邪迫於胸脅舌上有微白苔引兩脅而咳嗽者治驗見本草衍義之序例中求真按本方加大熱之乾薑與微溫酸澀之五味子若係陰陽交錯之證則尚佳然吾人通常遇之陽性證則頗不宜余於此證加重本方中之大棗更加用大量之橘皮有奇效又加葛根草果天花粉用於寒熱如瘧咳嗽甚者此東郭之經驗也求真按此證可以本方合用葛根湯溫知堂雜著曰考古來治諸病方中無不配以健胃藥者如大小柴胡湯等雖云解熱劑不如稱健胃劑為妥當求真按大小柴胡湯既為解熱劑又可作健胃劑既為通便催進劑又可作止瀉劑既為鎮咳祛痰藥又可作鎮嘔利尿藥其他難以枚舉此古方之所以微妙也論古方與後世方之關係後世醫之讀傷寒金匱也徒拘泥其文辭之表面不能推察其真意僅知仲景方之單用不悟加味合用之活機遂以古方寡少難應眾病杜撰無數之劣方故學者切戒不可惑溺於此種謬論焉雖然後世方亦不無可取之處其大半皆淵源於仲景之古方故寓有加味或合方之意義者不少非絕無參考之價值不可盡廢但須學者之對於後世方必以仲景方為準據取其當然者而舍其不當然者耳余今列舉後世方與仲景方對比者欲使學者知其一端焉醫方口訣集曰抑肝散專治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹食少睡臥不安者柴胡甘草各五分川芎八分當歸白朮炒茯苓鉤藤各二錢上水煎子母同服加蜜丸名抑青丸一產婦未及滿月發熱脅痛咳嗽肢體搐動唇目抽搭醫用補血調氣之劑再三其證彌盛反加小便澀少因證已急延余診之六脈弦數余反覆思之莫得病因因摒人細問其情乃夫以實告曰如此如此因舉本方未三帖而平後與加味歸脾湯而愈夫產後新血未充真元未固凡事情一忤則怒火如焰致焚身命醫者臨機稍有疑惑不可不細問之蕉窗方意解抑肝散加芍藥湯條曰此藥亦四逆散之變方也其腹形雖大概與四逆散同樣然拘攣浮於腹表為抑肝散之標的四逆散當以拘攣沉於腹底為標的抑肝之方以多怒不眠性急等證頗甚者為主證此主證為肝氣亢極之徵肝氣亢極則肝火熾盛肝血亦隨而損耗故以歸芍潤肝血川芎疏肝血柴胡鉤藤甘草緩肝氣但肝氣既亢極而引上胸脅腸胃之水飲亦不下降而引上佐以疏肝緩肝潤肝之藥和其兩脅及心下則水飲亦易下降矣此由苓朮利水之功也本方無芍藥甘草之分量亦少按此藥專以潤緩肝氣為主故余常合芍藥甘草湯用之又按此方用歸芍川芎專以潤血即潤皮膚枯燥之意全體為四逆散之變方加川芎當歸白芍猶逍遙散為小柴胡之變方加用歸芍也逍遙散之用苓朮亦與抑肝散之用苓朮同意餐英館治療雜話曰此方本為小兒肝血不足而動肝火的發熱有驚搐咬牙等證者而設此人所共知也然小兒稟受不足體質薄弱面部及全體肉色白無潤澤甚至以小刀少割而不出血者及腹部虛軟惟腹左肌稍硬然無蟲積之候由惱怒性急而成者皆肝血不足之證久服此方佳又用於大人半身不遂和田氏之經驗也用於不寐證有效者前溫膽湯條云不寐證有因虛者有因痰飲者能辨脈腹證方可處之此方用於不寐及半身不遂者其腹證自心下至任脈有攣急動悸氣聚於心下有痞狀醫以手按之則左不見痞問之則云痞又左脅下雖軟稍有硬肌問之當不怒若有怒則不云無效此二證俱宜加芍藥求真按以上之抑肝散及抑肝散加芍藥湯之適應證本可用小柴胡湯柴胡去半夏加瓜蔞湯柴胡桂枝湯中之一方與當歸芍藥散合用為最適當但後世醫不知此法遂致杜撰劣方也茲舉小柴胡湯當歸芍藥散合方之例如當歸芍藥散方由當歸川芎茯苓朮澤瀉芍藥十三味與抑肝散加芍藥湯對比如下圖小柴胡湯當歸芍藥散合方澤瀉芍藥白朮茯苓芎藭當歸甘草柴胡大棗半夏人參黃芩生薑鉤藤芍藥白朮茯苓芎藭當歸甘草柴胡抑肝散加芍藥湯方如圖所示二方共通之藥達七種之多以是可知抑肝散加芍藥湯之合用法由一知半解而生也和劑局方曰逍遙散治肝家血虛火旺頭痛目眩頭赤口苦倦怠煩渴抑鬱不樂兩脅作痛寒熱小腹重墜婦人經水不調脈弦大而虛者芍藥酒炒當歸白朮炒茯苓甘草炙柴胡各二錢加煨薑三片薄荷少許煎服蕉窗方意解逍遙散條曰是亦小柴胡湯之變方也但與小柴胡湯較則稍有肝虛之形與補中益氣湯比較則胃氣不甚薄弱故方中不用參者也其腹形心中痞硬兩脅亦稍有拘攣若用黃芩半夏等所組成之小柴胡湯則味劣難服故用少帶和劑之當歸芍藥柴胡甘草四味平緩心下及兩脅以薄荷開胸膈及胃口以白朮茯苓下胃中之水飲即所以消導水道也本方加牡丹皮山梔子名加味逍遙散是有鎮攝肝腎虛火之意按宜用加味逍遙散者見證亦有多種而無一定茲舉其一婦人胎產前後口舌赤爛證等有用此方而愈者此證可謂因肝腎之虛火迫於心肺所致勿誤藥室方函口訣逍遙散條曰此方為小柴胡湯之變方比小柴胡湯稍有肝虛之形比醫王湯則胃氣不甚薄弱者也謂此方專治婦人虛勞其實體氣不甚強壯平生血氣薄肝火亢或寒熱往來或頭痛口苦或頭赤寒熱如瘧或月經不調或小便淋瀝澀痛而混濁所謂一切肝火皆有效內科摘要加牡丹皮山梔子者有鎮肝部虛火之能譬如胎產前後之口赤糜爛者有效是治虛火上炎也東郭加地黃香附子者宜於肝虛之證水分動悸頗甚兩脅拘急而思慮鬱結者求真按以上逍遙散之適應證宜小柴胡湯或柴胡去半夏加瓜蔞湯柴胡桂枝湯中之一方與當歸芍藥散合用為適當加味道遙散之適應證以前方兼用黃解丸或第二黃解丸為宜產前後口舌赤爛者前方加地黃又兼用黃解丸或第二黃解丸為宜然後世俗工不知此遂杜撰此等之劣方醫方口訣集補中益氣湯條曰補中益氣湯內傷諸證及諸病陽氣下陷者此方主之黃耆一錢五分人參甘草各一錢陳皮白朮當歸柴胡各五分升麻三分上藥水煎服余常用之有六口訣夫內傷病頭痛惡寒發熱寒熱往來身痛口乾甚似外感細察之果有內傷不足之候則用此方此其一也稟受虛弱之人感受風寒而病此為內傷挾外感之候內傷重者則用此方從六經之見證而加減之外感重者先用外感之藥後以此方調理之此其二也稟受雖壯實已歷汗吐下猶未愈者必用此方是因邪盡而正氣虛之故此其三也瘧久不愈者必投此方蓋因病久則氣血虛而邪氣深入以人參白朮當歸黃耆補氣血升麻柴胡升發陷邪陳皮行痰故也其餘瀉利咳嗽等疾陽氣下陷者皆宜用之此其四也手足痿弱或攣痛或半身不遂或身如蟲行者多屬脾胃虛弱醫為中風之候用二陳四物排風順氣之類然細察脈證當用此方此其五也日晡發熱小便淋瀝大便燥結舌裂口乾自汗盜汗者為陰血虛用此方兼與八味丸或此方合地黃丸料煎而用之亦可此其六也勿誤藥室方函口訣醫王湯條曰此方東垣本建中湯十全大補湯人參養榮湯等加減而成後世俗醫雖有種種之口訣然究竟宜用於小柴胡湯之帶虛候者不可拘於名義而謂補中益氣之升提其虛候云者第一手足倦怠第二語言輕微第三眼勢無力第四口中生白沫第五飲食無味第六喜好熱物第七當臍動悸第八脈散大無力等八證之內若有一二證即為此方之目的而宜用之其他薛立齋所謂飲食勞倦而患瘧痢等證脾胃因久虛而不能愈者龔云林所謂氣虛卒倒中風等證因於內傷處著眼而宜用之前述總以有少陽柴胡之適證兼內傷者與之則無誤矣故不拘男女因虛勞而成雜證長服此方有效尤以婦人為最有效又用於諸痔脫肛之類多疲乏者又此證而好熱物者宜加附子雖云口渴者亦不以附子為苦也求真按上列諸證宜用小柴胡湯柴胡去半夏加瓜蔞湯柴胡薑桂湯等方中之一方與當歸芍藥散合用之而以為補中益氣湯證者因眼光不能透徹師論之所致也同書柴葛解肌湯條曰此方余家新定之宜用於麻黃葛根二湯證未解已進於少陽而嘔渴甚四肢煩疼者此局方之十神湯六書之柴葛解肌湯其效為優柴胡黃芩半夏甘草麻黃桂枝芍藥石膏葛根生薑求真按此方因誤認葛根和石膏湯與小柴胡湯之合方證而組成故無用此方之必要依余之經驗凡感冒稍劇者不論太陽證之現否既兼發少陽證者則不宜舉用葛根湯宜於起初即用葛根湯小柴胡湯之合方先制其機若咽痛或有黏痰難以咯出之情者則宜加桔梗有口舌乾燥煩渴高熱等情者更宜加大量之石膏假令雖發嚴重之流行性感冒及同性肺炎者其效亦可期日而待也柴胡之醫治效用藥徵曰柴胡主治胸脅苦滿也兼治寒熱往來腹中痛脅下痞硬歷觀上方柴胡主治胸脅苦滿也其他治往來寒熱或腹中痛或嘔吐或小便不利者此一方之所主治非一味之所主治也為則按傷寒論中寒熱腹痛嘔吐小便不利等不用柴胡者多若胸脅苦滿而有前證者則主以柴胡因此可知柴胡之所主治矣本草綱目柴胡部中往往以寒熱往來為其主治夫世之所謂痞疾其寒熱往來也劇有用柴胡治愈者有不愈者於是質之仲景之書其用柴胡也無不有胸脅苦滿證今乃施諸胸脅苦滿而寒熱往來者其應猶響不僅瘧疾如是百疾莫不皆然無胸脅苦滿證者則用之無效是則柴胡之所主治也在彼而不在此矣古來未正解仲景之書者莫不以柴胡為一種之解熱藥自東洞翁蹶起高唱前說後世醫始得其真面目故以此為本藥之應用主目的本草綱目曰柴胡根氣味苦平無毒主治心腹腸胃中結氣飲食積聚寒熱邪氣推陳致新明目益精本經註結氣謂無形物之聚集積聚謂有形物之凝結故飲食積聚者即食水二毒凝集之謂也除傷寒心下煩熱諸痰熱結實大腸停積水脹及濕痹拘攣亦可作浴湯別錄註痰熱結實水熱二毒凝結之意如胸脅苦滿亦屬此類停積與積聚同義水脹水腫也濕痹拘攣者水氣性麻痹兼肌肉攣急之意即腳氣及類似此證之謂也治熱勞之骨節煩疼熱氣肩背疼痛勞乏羸瘦下氣消食宣暢氣血主時疾之內外熱不解甄權註熱勞有熱性肺結核也肩背疼痛頸項強也時疾流行性疾患也除煩止驚益氣力消痰止嗽潤心肺添精髓治健忘大明除虛勞散肌熱去早晨潮熱寒熱往來膽癉婦人產前產後諸熱心下痞胸脅痛治頭痛眩暈目昏赤痛障翳耳聾耳鳴諸瘧及婦人熱入血室經水不調小兒痘疹之餘熱五疳之羸熱時珍註疳者不問原因如何是小兒羸瘦衰弱神經過敏等證候的病名之總稱也本草備要曰柴胡苦微寒宣暢氣血散結調經治傷寒邪熱痰熱結實虛勞肌熱心下煩熱諸瘧寒熱頭眩目赤嘔吐脅痛口苦耳聾婦人熱入血室胎前產後諸熱小兒痘疹五疳羸熱散十二經之瘡疽血凝氣聚效同連翹綱目及備要所論概涉及問題之枝葉不無擅弄抽象的文字之弊但皆由諸家實歷之成果不無擴充仲景學說之處學者宜分其真偽而取之以為本藥應用之副目的半夏之醫治效用藥徵曰半夏主治痰飲嘔吐也兼治心痛逆滿咳悸腹中雷鳴此說是也欲以意解之半夏者因胃內有停水而上逆發為噁心嘔吐為目的而用之若噁心嘔吐已愈則心痛逆滿咳悸腹中雷鳴諸證雖不治亦自然消散矣且本藥不獨噁心嘔吐發作時有效即於其間歇時亦可用之故不可忽略其既往證之問診就中如噁心不過純然是自覺證故病者若未說明時易被忽略是以問診不可不注意之如上所述本藥以噁心或噁心嘔吐為目的而應用之但有時須要此藥物而病者反不呈是等症狀而現他證者不少故對仲景關於本藥配合劑之論及下列記諸說須熟讀而玩味之以明了其應用之範圍本草綱目半夏根氣味辛平有毒主治心下堅胸脹咳逆頭眩咽喉腫痛腸鳴下氣止汗本經註咳逆者咳嗽頻發也頭眩即為眩暈腸鳴者腸內水鳴也下氣者下水毒之意而本藥治眩暈之事實因半夏為小柴胡之臣藥治乘車乘船時等之噁心嘔吐及眩暈而明故半夏之主治眩暈必有噁心或噁心嘔吐併發或相繼而發者可知消心腹胸膈之痰熱滿結咳嗽上氣心下急痛堅痞嘔逆消癰腫療痿黃別錄註痰熱滿結者水熱二毒凝結之意然本藥不能醫熱毒只能解散水毒之結聚又能治心下急痛堅痞消癰腫療痿黃即療黃疸也亦可知限於由水毒的原因者例如上竇蓄膿證不外於水毒的癰腫故能治之即為本藥有用之處消痰下肺氣開胃健脾止嘔吐去胸中之痰滿甄權註下肺氣者使上逆於肺之水毒下降之意開胃健脾為互文即健胃之義而本藥所以有祛痰鎮咳健胃作用者因驅逐呼吸及消化器內之水毒而生者也又兼有黏液被溶解作用亦與有力焉可以青州醫談為證小兒禿瘡後赤光不能生髮者煉半夏末貼之則髮自生又半夏有稀釋黏液之效以半夏瀉心湯之類可以知之治痰厥頭痛消腫散結元素註痰厥頭痛者因水毒上逆而頭痛也治眉棱骨痛震亨除腹脹目不得瞑白濁夢遺帶下時珍註眉棱骨痛者鼻骨疼痛也目不得瞑者不眠證也白濁即尿之白濁夢遺遺精也眉棱骨痛目不得瞑者由水毒上逆於頭部腹脹者由水毒鬱滯於腹部也白濁夢遺帶下者由水毒泛濫於下體部也發明成無己曰半夏之辛以散逆氣結氣除煩嘔發音聲行水氣而潤腎燥求真按半夏之散逆氣結氣除煩嘔發音聲者皆由利尿作用之結果也宗奭曰今人惟知半夏去痰不言益腎蓋能分水故也脾惡濕濕則濡困困則不能治水經云濕勝則濡瀉一男子夜數如廁或教以生薑一兩半夏大棗各三十枚水一升瓷瓶中慢火燒為熟水時呷之便已也註此病者夜間數水瀉者因腎機能障礙致水毒停滯於腸管失卻代償作用之結果自服用半夏而止瀉者因此藥能解除腎機能障礙使尿利復原腸管遂行代償作用之任務故也機曰若涎者脾之液美味高梁炙煿皆能生脾胃濕熱故涎化為痰久則痰火上攻令人昏憒口噤偏廢僵仆蹇澀不語生死旦夕自非半夏南星曷可治乎註美味佳肴不知有節則胃腸內生水熱二毒若久置不理則二毒遂上迫頭腦誘發腦出血此證若非半夏南星無效然大小柴胡湯對於此證有效者不可不云方中臣藥半夏作用之大力也時珍曰脾無留濕不生痰故脾為生痰之源肺為貯痰之器半夏能主痰飲及腹脹者為其體滑而味辛性溫也體滑能潤辛溫能散亦能潤故行濕而通大便利竅而泄小便也註由此說觀之則呼吸器內之停水咯痰及胃腸內之蓄水黏液腹部之膨滿等皆由水毒使然只因其存在部位之不同而異其形體耳又半夏主治此等諸證可知其有水毒低降力與利尿作用然不含何等瀉下藥而小柴胡湯所以能順通大便者亦可謂因佐藥內之半夏作用故也本草備要曰半夏辛溫有毒體滑性燥能走能散能燥能潤和胃健脾補肝潤腎除濕化痰發表開鬱下逆氣止煩嘔發音聲利水道燥去濕故利水治咳逆頭眩火炎痰升則眩胸脹咽痛痰瘧不眠反胃吐食散痞除癭癭多屬痰消腫止汗柴胡加芒硝湯之注釋傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡湯以解外後以柴胡加芒硝湯主之傷寒論註本條已解說於小柴胡湯條矣今更補足之東洞翁曰柴胡加芒硝湯治小柴胡湯證而苦滿難解者又曰小柴胡湯證有堅塊者主之此說有理故本方因之可活用矣然蕉窗雜話云按先生於傷寒論柴胡加芒硝湯章云此證日脯所發潮熱潮熱者實也則是證帶陽明胃實證矣故宜用承氣湯然胸脅滿而嘔證未去故用芒硝加於大柴胡湯中是即大柴胡大承氣之合方中去厚朴之方也吉益南涯淺田宗伯二氏亦主張同說非不有理然肯定大柴胡加芒硝湯非否定柴胡加芒硝湯也二方俱宜隨證而活用之為是柴胡加芒硝湯方小柴胡湯之方中加芒硝克煎法用法同小柴胡湯柴胡去半夏加瓜蔞湯之注釋柴胡去半夏加瓜蔞湯治瘧病發渴者亦治勞瘧金匱要略註治瘧病發渴者即治瘧疾有渴證者之意但此渴證是虛熱所致非實熱使然故不加石膏而加瓜蔞根去半夏者因體液已枯竭非有水毒也又治勞瘧者乃治疲勞困憊之義仲景就本方之應用不言及瘧疾以外者是仲景將托此病而述其用途非本病之外不可用之之意也故宜用小柴胡湯之病證而無半夏證有瓜蔞根證者或加有疲勞困憊之狀者特不限於瘧疾焉凡一切病證而宜與此方者即用之為佳東洞翁本方定義曰治小柴胡湯證渴而不嘔者又尾臺氏類聚方廣義本方條曰此方與小柴胡湯異者惟渴與嘔耳宜照小柴胡標準而運用之如上所述亦不外此意余以本方加麥門冬地黃兼用第二黃解丸而治肺結核之身體枯瘦微咳虛熱手掌足蹠煩熱者屢效柴胡去半夏加瓜蔞湯方小柴胡湯方中去半夏加瓜蔞根克煎法用法同前柴胡去半夏加瓜蔞湯再加麥門冬地黃方前方中加麥門冬克地黃克煎法用法同前柴胡桂枝湯之注釋傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之傷寒論註本條之病證是太陽桂枝湯證未去已轉入少陽與小柴胡湯證合併矣故用桂枝湯與小柴胡湯之合方如本方者發熱微惡寒證即二方證之相交錯者凡傷寒經過六七日頃為從太陽轉入少陽之時期適此時若完全轉入少陽更不帶表證時當往來寒熱但本條病證已轉入少陽尚未離表證而桂枝湯證依然故不往來寒熱而為發熱微惡寒也肢節煩疼者四肢關節劇痛之意以桂枝湯證為主也微嘔者為桂枝湯證之乾嘔與小柴胡湯證心煩喜嘔之合併者心下支結心下痞硬之帶急迫者而本條云心下支結不云胸脅苦滿者此係省略法非無此證之意也發汗多亡陽譫語者不可下與柴胡桂枝湯和其榮衛以通津液後自愈傷寒論註謂發汗過多為亡失體液至於譫語者不可瀉下當與本方調和血液淋巴且使疏通則自愈也不可下云者恐或以此譫語誤認為陽明胃實證而用大小承氣湯等下劑故誡之也尾臺氏類聚方廣義本方條云發汗多亡陽譫語云云是稟賦脆薄之人或見斯證與表虛裡實之譫語相似而不同宜審其證以施治若屬表虛裡實者宜選用調胃及大小承氣湯此說可從外臺柴胡桂枝湯方治心腹卒中痛者金匱要略註卒中痛者突然疼痛之意也柴胡桂枝湯方桂枝黃芩人參芍藥生薑大棗各克甘草克半夏克柴胡克煎法用法同前柴胡桂枝加石膏湯方前方中加石膏克煎法用法同前主治治柴胡桂枝湯證而兼石膏證者用本方自余始先輩之論說傷寒緒論曰傷寒若脈浮緊而潮熱盜汗則柴胡桂枝湯求真按本方治脈浮弱者但不能治浮緊三因方曰柴胡加桂湯余曰是即本方也治少陽傷風四五日身熱惡風頸項強脅下滿手足溫口苦而渴自汗其脈陽浮陰弦者傷寒六書曰陽明病脈浮而緊必潮熱發作有時但脈浮必盜汗出柴胡桂枝湯仁齋直指方曰柴胡桂枝湯腹中左右上下動氣築觸不可汗下用此湯求真按此說但可供參考不可妄信證治準繩曰柴胡桂枝湯治瘧身熱汗多者求真按瘧疾身熱汗多者有石膏劑證也不可混同東洞翁本方定義曰柴胡桂枝湯治小柴胡湯桂枝湯之二方證相合者求真按此說是也足以為本方之定義類聚方廣義本方條曰發汗期已失胸脅滿而嘔頭疼身痛往來寒熱累日不愈心下支撐飲食不進者或汗下後病猶未解亦不增重但熱氣纏繞不去胸滿微惡寒嘔而不欲食過數日若愈若不愈者間亦有之當其發熱期之初宜用此方重覆取汗求真按稟賦薄弱之人患感冒時往往發生此證非必誤治而後然也婦人無故憎寒壯熱頭痛眩暈心下支結嘔吐噁心肢體酸軟或麻痹鬱鬱惡於對人或頻頻欠伸者俗謂之血道宜服此方或兼瀉心湯求真按此證恐宜用小柴胡湯桂枝茯苓丸之合方或本方兼用瀉心湯三黃丸或本方兼用黃連解毒湯黃解丸為宜蓋婦人之疾病每有原因不明者多由於瘀血今將合方與本方之關係列圖於下小柴胡湯方桂枝茯苓丸柴胡黃芩人參甘草大棗生薑半夏桂枝芍藥茯苓牡丹皮桃仁柴胡桂枝湯方治疝家腰腹拘急痛連胸脅寒熱休作心下痞硬而嘔者求真按是仲景之所謂心腹卒中痛也附以現代的病名即熱性腸疝痛是也勿誤藥室方函口訣本方條曰此方世醫雖為風藥之套方然尚不誤而以結胸之類證心下支結為目的之藥也因有表證之殘餘故用桂枝也求真按雖非我藥之套方然非無風味也金匱有用於寒疝腹痛即今之所謂疝氣者又腸癰將生腹部一面拘急肋下牽強其熱狀似傷寒而非者宜此方求真按不僅闌尾炎初期之腹痛有效其經過中用大黃牡丹皮湯等便反不通而腹痛噁心嘔吐上衝發熱者與之有速效然此不過為一時的處置即鎮痛後亦可復與本方也又世醫用此方適當傷寒蘊要之柴葛解肌湯即小柴胡湯加葛根芍藥者是也求真按感冒時有時用柴胡桂枝湯有用小柴胡湯加葛根芍藥即桂枝加葛根湯小柴胡湯合方之機會又如上述可用葛根湯小柴胡湯合方等則不可預為肯定者也又此方加大黃用於婦人心下支結而經閉者是奧道逸法眼之經驗也求真按此證宜用小柴胡湯桂枝茯苓丸之合方若有大黃證則更加之為佳溫知堂雜著曰風濕肢節痛疼者柴桂加蒼朮有效者多不必拘於風濕門諸方也初起多宜葛根加蒼朮者烏附當麻之類無效者大抵宜此方蓋柴胡桂枝湯條有肢節煩疼外證未去者為目的故也近來余屢以此方得奇效求真按此證用柴胡桂枝湯加石膏或用小柴胡加石膏湯與桂枝茯苓丸之合方屢得奇效柴胡桂枝乾薑湯柴胡薑桂湯之注釋傷寒五六日已發汗而復下之中胸脅滿微結小便不利渴而不嘔但頭汗多往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之傷寒論註據已發汗而復下之以觀則此汗下為誤治明矣故此誤治為因本來體質薄弱致成胸脅滿微結以下之變證若體質不虛弱假令雖經誤治不致有此變證當現小柴胡湯證也而胸脅滿微結為胸脅苦滿之輕微者不外於左右腹直肌上端與前胸壁裡面間存有微小硬結物之謂若不精細診之則不易發覺又小便不利與小柴胡湯證異而為心臟之衰弱渴而不嘔者由胃內有虛熱非水毒上攻於口腔也方中有瓜蔞根無半夏生薑也但頭汗出多者水毒於頭部而使脫汗也方中含桂枝甘草湯所以能沉降上衝含牡蠣所以能收澀脫汗也又往來寒熱為少陽病之佐證是柴胡之主治處心煩者為病毒侵入頭腦主以牡蠣為治者也柴胡薑桂湯治瘧寒多有微熱或但寒不熱金匱要略註當瘧疾之往來寒熱時發強劇惡寒而續發微弱的發熱或但惡寒而不發熱者以本方為主治之意也而寒多有微熱者為發方中之熱藥乾薑證強而現冷藥之柴胡黃芩瓜蔞根證弱也而但寒不熱者由於乾薑證強度而柴胡等證全被壓伏也因是本方治惡寒作用頗有力但治發熱作用則至微弱也總之有高熱病者宜禁忌之雖然若以此熱狀為目的而處方時恐有片言斷獄之失故用之者不可不參照前條也柴胡桂薑湯方柴胡克桂枝乾薑黃芩牡蠣各克瓜蔞根克甘草克煎法用法同前柴胡桂枝乾薑湯之腹證東洞翁以本方治小柴胡湯證而不嘔不痞求真按痞下略一硬字上衝而渴胸腹有動者為定義如本方比小柴胡湯證則因本方不含生薑半夏故無噁心嘔吐無人參故心下不痞硬有桂枝甘草故有上衝急迫之證以有瓜蔞根亦有渴證有牡蠣故胸腹動即心臟及腹部之大動脈搏動較著也此二方證之不同處余當參照以前之所述先輩之論說治驗建殊錄曰某生嘗讀書苦學有所發憤遂倚幾廢寢者七晝夜已而獨語妄笑指摘前儒罵不絕口久之人覺其發狂先生診之胸肋煩脹臍上有動氣上氣不降作柴胡薑桂湯使飲之時以紫圓攻之數日復常有賈人每歲病發時頭面必熱頭上生瘡癢極而搔之則腐爛至凋落之候則不藥而自已者數年矣來求診治先生診之心下微動胸脅支滿上氣殊甚用柴胡薑桂湯及芎黃散一月許諸證痊愈後不復發古方便覽曰一婦人平生月經不調氣上衝兩脅急縮腰痛不可忍其經將行時臍腹㽲痛下如豆汁或如米泔水一日或半日即止如是者已十二三年余診之胸脅苦滿臍上動悸甚乃作此方及硝石大圓雜進之時時下泄赤黑之膿血服數月前證得以痊愈求真按此證恐可用本方與桂枝茯苓丸之合方或兼用下瘀血湯或起廢丸成績錄曰遠州一農夫三十餘歲自去年起鬱冒時發時少吐血盜汗出往來寒熱微渴臍旁動甚就先生請治與柴胡薑桂湯而愈一女子素有癇證一時患疫諸醫療之無效迎先生乞診治其腹有動但頭汗出往來寒熱大便燥結時時上衝昏不識人日夜二三發乃與柴胡薑桂湯及紫圓攻之不一月諸證悉除一男子恒易驚恐胸腹動悸攣急惡寒手足微冷雖夏月亦須覆衣若驚後必下痢得大黃劑則利甚十餘年不瘥就先生請診治與柴胡薑桂湯而愈一男子平居鬱鬱不樂喜端坐密室不欲見人動輒直視胸腹有動氣六年許不愈先生診之與柴胡薑桂湯而愈一患者請醫醫診之以為外邪與藥而愈自亦以為邪已解矣乃梳髮浴身而疾復發煩渴引飲胸腹有動明日即愈愈而復發每一發約隔六七日如是數次醫不為虛即為邪熱雖藥之亦不愈遂請先生先生曰此醫誤矣瘧耳斯疾使服柴胡薑桂湯不過數帖疾去如失一人居恒口吃謁先生曰僕患口吃已久自知非普通醫藥可效特來求先生幸勿以為罪也先生問曰其吃日日相同否士曰否時有劇易若心氣不了了時則必甚先生曰可乃診之心胸之下無力胸腹動甚因與柴胡薑桂湯告之曰服之勿惰士受劑去後貽書謝曰積年之病全得復原矣蕉窗雜話曰某老人患尿閉證一醫雖頻用八味丸料然點滴不通經數日病人苦極求治於余余即用柴胡薑桂湯加吳茱萸茯苓得以頓愈唯左脅下拘攣而有動悸是因水飲上逆故成前證求真按所謂左脅下拘攣者即左腹直肌攣急之意亦即為桂枝茯苓丸或當歸芍藥散之腹證但因熱藥吳茱萸比較的奏效觀之則非前丸之證是後散之證也故此病證用柴胡薑桂湯加吳茱萸茯苓者其變則也處以柴胡薑桂湯當歸芍藥散之合方者其正則也一婦人胎前患腳氣痿弱小水不利三四日漸一行因其腹候用柴胡薑桂加萸苓使久服前方小便漸利日約四五行其足得以行立求真按此證亦宜用柴胡薑桂湯當歸芍藥散之合方不當處以柴胡薑桂湯加吳茱萸茯苓也和田氏為古方後世折衷家不知合方之機是以慣用畸形方也不可從之依余之經驗當歸芍藥散兼有驅瘀血利尿之二作用能治知覺及運動之不全麻痹所以腳氣痿弱有效也方輿輗本方條曰此方所主雖同於胸脅但較大小柴胡證則不急求真按非如大柴胡湯證之心下急也不硬求真按非如小柴胡湯證心下痞硬之意是腹中無力而微結者也此腹多蓄飲或帶動悸者求真按如此說則本方證之腹部一般軟弱無力多有停水於胃內此停水非如生薑半夏證之上迫也為腹部大動脈搏動者也上古天真論云志閒而少欲心安而不懼形勞而不倦云云是養性之要道延壽之真訣也而今天下升平萬民形樂而志苦風俗與上古相反於是乎人患虛怯而疝癇不無留飲故此藥自然盛行於世亦有故矣虛勞之初多由風邪感召漢諺云傷風不醒變成勞即此之謂也又留飲家數被微風遂有成勞狀者此等證總宜柴胡薑桂湯余少時視世醫之治療若值此證遽投參歸地之類甚用獺肝紫河車等藥求真按用此等藥者皆後世派醫家也余亦同之今刀圭之道漸辟俗醫亦不以薑桂入口無乃道與時有污降乎求真按本方雖亦可用於肺結核但用之者宜以前記仲景所論及腹證為目的余說僅備參考而已一高僧病證多端其最苦者為肩背強痛日使小沙彌按摩之甚用鐵錘鐵尺以擊之如是者二三年服藥刺絡灼艾等法無所不施而無一效余診之其病全是柴胡薑桂湯之所主余謂肩背之患我無智術只有柴胡薑桂湯以治本證肩背亦或可安乎即作劑與之服僅六七日諸證十去六七經久肩背強痛不治而自愈矣其功效實出意外師大歡喜贈謝繒寶焉求真按此證非肩背強痛是頸項強痛也故本方所以有效青州醫談曰又麻疹之後成勞證者多余用柴胡薑桂湯兼服解毒散求真按與余之黃連解毒丸同方治數人不長服者無效柴胡薑桂湯條下有心下滿微結求真按非心下滿微結是胸脅滿微結也夫滿與微結甚難窺視究屬如何曾質於琴山翁求真按琴山是村井氏東洞翁之學生也翁曰是甚難窺唯於臍邊動悸高者其心下滿而微結也譬如河流之上源有巨石阻之者其下必激發也其理相似有此象者不拘何病皆可奏效也梅毒久年不愈等用此方而得奇效者不勝枚舉求真按村井華岡二氏俱不知胸脅滿微結之義徒摸索於暗中其說不可信也然其認腹證而處方則梅毒及其他萬病有效者事實也此古方之所以微妙非西醫夢想所能及也麻疹一哈曰一女子年十八許未婚發熱蒸蒸疹子出而不收三四日光彩燦爛兩顴如赤朱兩耳蟬鳴頭疼目眩經水不利已二三月矣按其腹狀胸脅支滿腹中有動臍邊而結實若按之則通達腰腳因作柴胡薑桂湯及浮石丸使服之大便下利日二三行月經來而倍常諸證漸減光彩徐銷疹子亦減二十四五日全復舊求真按是因月經閉止瘀血衝逆於頭腦致兩顴額如赤朱且使兩耳蟬鳴頭疼目眩故宜用本方與桂枝茯苓丸之合方兼用下瘀血丸或起廢丸也類聚方廣義本方條曰凡勞瘵肺痿肺癰癰疽瘰癧痔漏結毒梅毒等證經久不愈漸就衰憊胸滿乾嘔寒熱交作動悸煩悶盜汗自汗痰嗽乾咳咽乾口燥大便溏泄小便不利面無血色精神困乏不耐厚味者宜此方求真按如此說一般衰弱慢性病者患本方證甚多宜注意之勿誤藥室方函口訣本方條曰此方亦治結胸之類證水飲微結於心下求真按非微結於心下是微結於胸脅也小便不利但頭汗出者骨蒸初起由外感而顯此證者多與此方加黃耆鱉甲有效求真按此證宜本方合用桂枝茯苓丸不宜加黃耆鱉甲也高階家加鱉甲芍藥名緩痃湯用於脅下或臍旁有痃癖而成骨蒸狀者求真按左脅下痃癖即凝塊者由瘀血衝逆於此部也此瘀血塊有常存於臍部者俱宜主治以桂枝茯苓丸故此證宜本方合用桂枝茯苓者非加鱉甲芍藥也不可從之又此方宜以微結為目的津液結聚於胸脅不滋於五內而乾咳出者此固不比小青龍湯等因心下水飲而痰咳頻出者也又非加小柴胡加五味子乾薑湯之胸脅苦滿而胸肋引痛者唯用於由表證而來身體不疼痛雖有熱但脈不浮或頭汗盜汗乾咳者又用於瘧之寒多熱少者有效又水腫證心下不和築築動悸者因水氣合時病之積聚聚於心下者宜此方加茯苓求真按此證宜本方合用苓桂朮甘湯又此方證由左脅下刺痛難緩者或有澼飲證者加用吳茱萸茯苓求真按是祖述和田氏之說其非已述於前矣又婦人之積聚兼水飲時時衝逆肩背強急者有驗求真按此非肩背強急是頸項強也橘窗書影曰一婦人產後惡露盡後時時惡寒面熱舌上赤爛但頭汗出心下微結腹滿小便不利腰以下有微腫醫或為蓐勞或為黃胖眾治不驗余診為血熱挾蓄飲證與柴胡薑桂湯加吳茱萸茯苓自秋至明年春舊疴已愈逾半矣仍守前方遂得全治於是沉疴痼疾皆乞診而至矣一婦人年四十餘臍旁有塊已數年矣時時衝逆心下動悸不能行步腰以下有水氣面色萎黃經水不調治宜先行其水並利其血與柴胡薑桂湯加吳茱萸茯苓兼用鐵砂丸服數日小便夜中快利五六行臍旁之塊次第減小數旬諸證痊愈求真按上二證宜處以柴胡薑桂湯當歸芍藥散之合方一婦人年二十七八產後發頭痛目眩一西醫治之反甚胸脅微結小便不利腹中有動悸飲食不進時發寒熱或身振振而搖每每頭眩不能閉目夜間驚惕不得眠或如身坐舟中不得片刻安每使二人抱持之眾醫雜投滋血鎮痙抑肝等藥凡二年依然無寸效余診曰病沉痼不當急治宜先利其胸脅鎮定動悸使心氣得旺則上下之氣得以交通頭眩身搖自安矣主人深以為然因與柴胡薑桂湯加吳茱萸茯苓夜間使服朱砂安心丸時正嚴寒其證雖有動靜但使主人確守前方而服之至翌年春而愈一婦人產後患頭眩身體不能動搖即蓐臥亦如坐舟中若欲維持其身須使人扶持且心下動悸足心冷汗濈濈然出而浸蓐上診之為貧血之候飲食如故脈亦和平經事亦不失期因與柴胡薑桂湯加吳茱萸茯苓兼用妙香散數月後雖頭汗止心下動收但目眩未止惟起居可以無需扶持矣然身體血氣枯瘦頭重如戴百斤之石與聯珠飲間服長靈散頭眩日減一日右足股間腫起逐逐如流注狀余以為頭中之瘀濁下流為腫瘍必佳兆也因貼膏以俟膿期使瘍醫刺之瘡口收後頭眩隨止前後歷七年而全治求真按上二證當處以本方與苓桂朮甘湯茯桂朮甘湯當歸芍藥散之合方或兼用黃解丸及第二黃解丸也因前治驗之胸脅滿微結小便不利腹中有動悸時發寒熱者本方證也身體振振動搖每因頭眩不能開目者茯桂朮甘湯證也身如坐舟中不得片刻安每使二人抱持者即澤瀉湯證之冒眩也但因此病者發於分娩之後故當被推測為貧血不能用治冒眩作用之外無能力之澤瀉湯則宜處以冒眩與貧血兼治之當歸芍藥散矣後之治驗產後頭眩身體不能動搖蓐臥亦如坐舟中須使人扶持得以維持其身及頭重如戴百斤石者是苓桂朮甘湯證與當歸芍藥散證之雜出也心下動悸足心冷汗濈濈而出浸及蓐上者即本方證也故此二病初起即當與本方及苓桂朮甘湯當歸芍藥散之合方矣淺田氏不知此理濫用本方加吳茱萸茯苓故輕證雖能以漸收效然遇重篤者雖經數月僅得少效而止終至用聯珠飲而得已此方原由南陽氏不明苓桂朮甘湯當歸芍藥散之合方證而用苓桂朮甘湯合後世方之四物湯當歸川芎芍藥地黃等份而成為不倫不類的方劑而已其所期之效果不問可知矣淺田氏以如是之治療術故其得以全治也前後費時七年之久以是可知用方之不可忽略矣一婦人外感不解日日發有定時惡寒發熱如類瘧汗出不止眾醫治之月餘無效或謂風勞或謂血熱議論不一余診曰脈沉弦且心下微結有蓄飲有動悸恐係邪熱水飲併鬱之證與柴胡薑桂加鱉甲茯苓後因時時氣鬱乾嘔兼用三黃瀉心湯加香附檳榔紅花作泡劑服之二三日諸證減半不數旬而痊愈求真按此證當用本方桂枝茯苓丸之合方兼用瀉心湯為是一婦人年五十餘外感後熱不解時時發熱如瘧盜汗出胸腹動悸目眩耳鳴或肩背強急頭上如戴大石耳如聞撞大鐘經眾醫一年餘無寸效余用柴胡薑桂湯加黃耆鱉甲數十日熱減盜汗止因去黃耆鱉甲加吳茱萸茯苓兼用六味地黃加煉鐵砂諸證痊愈求真按此證宜先與本方及桂枝茯苓丸之合方熱去後當處以本方及當歸芍藥散之合方一人外感後咳嗽聲啞久不愈將成肺痿余用麥門冬湯加桔梗兼用六味生津液病減半一日冒雨出行途中即覺惡寒頗甚歸家即壯熱大渴身體酸疼急使延余翌日始至寒熱已止但脈浮弦惟腰以下懈怠余曰恐成瘧疾當俟明日處方翌日果發振寒大熱渴而引飲汗出如流即與小柴胡加知母石膏四五日瘧邪大解頭痛心下支結小便不利自汗不止因轉與柴胡薑桂湯加黃耆鱉甲諸證漸安但隔日少覺惡寒精氣不爽乃使於拂曉時服反鼻霜瘧全止後以補中益氣湯加芍藥茯苓調理之咳嗽聲啞亦愈求真按此瘧初期宜與小柴胡加石膏湯加知母亦佳及桂枝茯苓丸之合方中期宜用本方與桂枝茯苓丸之合方善後療法宜用本方與當歸芍藥散用之合方兼用伯州散而用本方加黃耆鱉甲及補中益氣湯加芍藥茯苓者非也柴胡加龍骨牡蠣湯之注釋傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之傷寒論註本方即係小柴胡湯加龍骨牡蠣鉛丹桂枝茯苓大黃也如東洞翁本方定義曰治小柴胡湯證胸腹有動煩躁驚狂大便難小便不利者是治小柴胡湯證加心下部膨滿桂枝茯苓大黃主治之胸腹動龍骨牡蠣茯苓主治之煩躁驚狂龍骨牡蠣鉛丹茯苓桂枝主治之大便難大黃主治之小便不利桂枝茯苓大黃主治之等證其譫語者濕熱上攻頭腦也一身盡重不可轉側者裡水外行也吉益南涯和田東郭二氏以本方是大柴胡湯加龍骨牡蠣是否如此尚難確定茲列之於下以供參考傷寒論正義曰胸滿煩驚煩驚者如狂狀因傷寒外襲故致胸滿煩驚小便不利因水氣熱結而致小便不利譫語是有內熱之候一身盡重不可轉側者傷寒不解致外襲胸滿不得外出故身重不能轉側也柴胡加龍骨牡蠣湯主之此方者大柴胡加龍骨牡蠣湯也蕉窗方意解本方條曰是亦於大柴胡湯方中加龍骨四兩牡蠣五兩者也即大柴胡湯證自胃口至胸中多蓄飲而欲鎮其飲之激動藥也故本論亦有胸滿煩驚小便不利自胃中蓄飲至胸中而胃中蓄有燥屎實熱之證也柴胡加龍骨牡蠣湯方柴胡克半夏克大棗生薑人參龍骨鉛丹桂枝茯苓牡蠣各克大黃克煎法用法同前尾臺氏曰此方似脫甘草黃芩宋版有黃芩一兩半此說如是先輩之論說治驗傷寒類方曰柴胡加龍骨牡蠣湯能下肝膽之驚痰而以之治癲癇則必有效經驗集錄本方主治曰治小兒連日壯熱實滯不去寒熱往來而驚悸者方機本方主治曰本方證求真按本方者即小柴胡也胸腹有動者失精者俱是應鐘胸滿煩驚者解毒散或紫圓柴胡加龍骨牡蠣湯主之方輿輗本方條曰此方以胸滿煩驚為主證其餘皆客證也徐氏傷寒類方等以各藥配各證似屬詳審而實非也學士唯於胸滿煩驚四字上用工夫宜變通當時流行於世間之癇氣疾重者即煩驚也稱柴胡腹者概即胸滿證也此方誠最上之良法矣善動悸者加鐵砂則更佳於是當世之醫以鐵砂為治動悸之藥一概用之素問以發狂而善怒用生鐵落又有下氣疾之效本綱云鎮心安五臟治癇疾鐵之功專在於是吾輩切記之生鐵落者為爐冶間鐵上落下之屑凡藥中所用之鐵精鐵華粉鐵鐵鏽之類皆同類也餐英館治療雜話本方條曰此方用於癇證及癲狂屢得效如前所記今世病氣鬱與肝鬱者十有七八肝鬱者為癇證之漸婦人尤多肝鬱與癇證若能知此當今之雜病不難治療矣傷寒論用於胸滿煩驚小便不利者此數證中以胸滿為主證煩驚及小便不利為客證也是因胸滿則胸中自煩煩則心神不安觸事而驚也氣上行於胸膈而結故鬱而不行因此小便不利故用此方之標準為胸滿也若由大小便秘而煩驚者則正面之證矣又癇證之證候不一因病或夜寐時目見種種形色者或水氣由臍下上攻呼吸短促發如腳氣之狀手足拘急甚者如痙病之反張夜若偶眠則見種種之夢雖所見之證候不同若胸滿煩驚小便不利者則必當用此方癇狂證加鐵粉有別效癲狂並挾癇痰者加青礞石鎮墜胸膈之痰甚有效又一種癇證別於臍下而悸動上攻心胸發則呼吸短促手足拘急日七八次或十餘次當用苓桂朮甘湯或苓桂甘棗湯之類其中由少腹至心下水氣上衝臍下善動悸者苓桂甘棗湯為佳病人似有容體自下上迄於胸中每發則眩暈宜苓桂朮甘湯此證有用奔豚湯有用五苓散者金匱瘦人臍下有悸吐涎沫而癲眩者此水也腎水侮心火而上行者宜選用此四方中之一金匱曰外證小便不利宜以渴為目的然而不見癲證因有肝鬱證而次第增劇心腹膨脹或痞塞至於胸中大小便不利肩背氣塞等之病人男人雖少婦人為多世醫用順氣和中沉香降氣之類亦不動此證非氣鬱肝鬱也柴胡加龍骨牡蠣湯甚有效只宜以胸滿為標準又有一訣灸後發煩熱證用小柴胡加山梔子牡丹黃連艾葉之類煩熱不退者此火邪入心經迫亂神明見煩驚等證者柴胡加龍牡之效速也此亦以胸滿為標準有起死之效焉求真按此說頗佳但本方非特以胸滿為目的是胸脅苦滿兼胸滿為目的也類聚方廣義本方條曰治狂證胸腹動甚驚懼避人兀坐獨語晝夜不眠或多猜疑或欲自殺不安於床者治癇證時時寒熱交作鬱鬱而悲愁多夢少寐或惡於接人或屏居暗室殆如勞瘵者狂癇二證亦當以胸脅苦滿上逆胸腹動悸等為目的癲癇居常胸滿上逆胸腹有動及每月二三發者常服此方不懈則無屢發之患求真按諸家論本方治癲癇有效余未知其然否但稻葉克禮以大柴胡湯兼用桃核承氣湯治此證余亦以大柴胡湯桃核承氣湯大黃牡丹皮湯之合方兼用黃解丸治同證由此觀之則本方必非癲癇之專藥明矣諸家之論不可輕信勿誤藥室方函口訣本方條曰此方為鎮墜肝膽鬱熱之主藥故不僅傷寒之胸滿煩驚已也凡小兒驚癇大人癲癇均宜用之又有一種中風稱熱癱者應用此方佳又加鐵砂以治婦人之發狂此方雖於傷寒亦不相左至於雜病與柴胡薑桂湯雖同為主治動悸之方但薑桂取虛候此方宜取實候而施之求真按如上說柴胡薑桂湯與本方均為主治胸腹動悸及腦證所異者彼係虛證此有實證也即彼之腹證為胸脅滿微結腹部軟弱而悸動者此則胸脅苦滿及胸滿腹部比較的充實而悸動者也二方宜鑒別之生生堂治驗曰一婦人幼患癲癇長而益劇立輒暈倒少時乃蘇日一二發如是者三十餘年醫治無效其主人偶聞先生之異術乃來請治往診之脈緊數心下硬滿乳下悸動謂先生曰心神惘惘飲食亦不安數十年來如一日也視其顏色愁容可憐先生慰之曰可治病婦實不信之乃使服柴胡加龍骨牡蠣湯精神頗旺使調服瓜蒂散五分吐黏痰數升臭氣衝鼻毒減過半於是僅五六日發一次周年痊愈其間行吐劑約十六次彼病未愈時性忌雷聲聞即發病用瓜蒂散後雖迅雷震動彼仍不畏一老婦有奇疾每見人面有疣贅屢經醫治無寸效先生診之脈弦急心下滿使服三聖散八分而吐之後與柴胡加龍骨牡蠣湯由是不復發時年七十許矣一婦年五十餘恚怒時則少腹有物上衝心而絕倒牙關緊急半時許自蘇月或一二發先生診之胸腹動悸與柴胡加龍骨牡蠣湯數旬而愈一婦人年五十右半身不仁常懶於飲食月事不定每行必倍於常人先生以三聖散一錢約吐冷黏痰二三升由是飲食大進切其腹胸滿自心下至少腹動悸如奔馬與柴胡加龍骨牡蠣湯數月痊愈鉛丹之醫治效用鉛丹不外為鉛之化合物故有收斂鎮靜鎮痙殺蟲殺菌作用也明矣尚宜參考下說本草綱目曰鉛丹主治吐逆反胃驚癇癲疾除熱下氣本經驚悸狂走消渴甄權鎮心安神止吐血及嗽敷瘡長肉及湯火瘡染鬚大明治瘧及久積宗奭墜痰殺蟲去怯除忤惡止痢明目時珍發明成無己曰仲景龍骨牡蠣湯中用鉛丹乃收斂神氣以鎮驚也好古曰可止脫而固氣時珍曰鉛丹體重而性沉味兼鹹能墜痰去怯故治驚癇癲狂吐逆反胃有奇效能消積殺蟲故治疳疾下痢瘧疾有實積能解熱拔毒長肉去瘀故治惡瘡腫毒及入膏藥為外科必要之物也大柴胡湯之注釋太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也與大柴胡湯下之則愈傷寒論註過經者表證已解轉入於少陽或陽明之謂也反二三下之者以不當瀉下之少陽病而下之故云反也此雖誤下其後四五日間尚有柴胡證者宜先與小柴胡湯雖與之而嘔吐不止心下急鬱鬱微煩者以小柴胡湯非其治也故以大柴胡湯瀉下則愈矣心下急尾臺氏曰心下急拘急也丹波元堅曰心下急之急字無明白之解說柯氏曰急滿也猶未明了考急是緩之對蓋謂有物窘迫之勢非謂拘急也李氏脾胃論曰裡急者是腹中不寬快也蓋以所謂不寬快釋裡急雖不當而於心下急則其義甚切貼與桃核承氣湯條少腹急結之急同義山田業廣曰說文急褊也褊者如大人著小兒衣服而行也始能了解心下急之義所謂仲景之文一字不苟者實可佩服也注家皆以急迫解者猶似隔一層也今徵之事實前說非也後二說當以山田氏說為是所以致此者病毒集積於此部故也鬱鬱者小柴胡湯證之默默增進也微煩者微微煩悶之意特加此二字者為欲示大柴胡湯證雖比小柴胡湯證之默默增進而至於鬱鬱之劇但與大承氣湯證之心中懊憹而煩之猛劇者比則不及焉由此觀之本條是明傷寒病機始於太陽病次轉入少陽由小柴胡湯證進展於大柴胡湯證且暗示由大柴胡湯證有移行於陽明病之機轉皆所以說明大小柴胡湯之類證鑒別茲詳論之大小柴胡湯內含生薑半夏故能治嘔證但其發揮鎮嘔作用是限於胸脅苦滿而非心下急者即無內實之候病毒不內實故不便秘小柴胡湯雖不無治便閉之作用但其便秘非因內實是由水毒上逆而不下降也是以方中無瀉下內實病毒之枳實大黃也然大柴胡湯中亦有生薑半夏其鎮嘔作用雖與小柴胡湯類似特以此證不僅胸脅苦滿且有心下急證即病毒內實而便秘者故與水毒比較容易下降之小柴胡湯證不同其上逆之水毒而為內實之病毒阻止下降之機故致嘔證增劇是以方中有生薑半夏外更有枳實大黃也尾臺氏以此二方證別其嘔之劇易曰小柴胡湯證曰喜嘔曰乾嘔曰嘔其用生薑重只三兩耳此方證求真按此方證者指大柴胡湯證也曰嘔不止曰嘔吐其用生薑至五兩是用生薑之多少須隨嘔證之劇易而增減也偏歸於生薑之多少是知其一不知其二者夫小柴胡湯證不過默默不欲飲食心煩喜嘔而已至於大柴胡湯證則嘔不止鬱鬱微煩其故因心下急即病毒內實所致故由小柴胡湯中去病毒止遏性之人參甘草加有驅逐水毒作用之枳實與瀉下藥之大黃且增量生薑以應之此二方之分別也但大柴胡湯由小柴胡湯而出發故共通之藥物甚多其作用亦相類似故仲景關於大柴胡湯之論亦多由小柴胡湯變通者可知矣傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之傷寒論註傷寒經過十餘日頃為現陽明裡實證之時期故云熱結在裡也然若純屬陽明證時當發惡熱或潮熱而無往來寒熱也今以往來寒熱更加以復字者欲示本條之病證非純陽明證是少陽陽明之合病及大柴胡湯是治少陽證之末期兼治陽明證初期之劑也傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之傷寒論註傷寒發熱汗出不解者是傷寒發熱時以發汗而汗出不解之略也傷寒表證即有惡寒發熱時當服適證之發表劑而不因汗出病仍不解也心下痞硬者胃部自覺停滯膨滿按之則硬固之意雖非與心下急有別義但明其自他方面觀察之情狀也嘔吐而下利者示嘔吐為主而下利為客也本條之病證無經過由表證而小柴胡湯證至於大柴胡湯證之緩慢次序即由表證直入於大柴胡湯證者故為本方證中之最劇者依余之經驗本方應用於由暴飲暴食等之急性胃腸炎大腸炎赤痢等之機會極多傷寒後脈沉沉者內實也以下解之宜大柴胡湯傷寒論註傷寒後脈沉者傷寒至後日現沉脈之意是暗示浮細或弦細脈之小柴胡湯證至後日變為沉脈之義又沉者內實也凡呈沉脈者為消化管內病毒充實之徵故此沉脈非沉弱沉細沉微之沉當能察得沉實沉遲沉滑之沉也又由末句宜大柴胡湯觀之可知此內實即心下急之謂也按之心下滿痛者此為實也當下之宜大柴胡湯金匱要略註凡觸診心下膨滿且有壓痛者其為實證明矣當以大柴胡湯下之也病者腹滿按之不痛者為虛痛者為實宜下之舌黃未下者下之則黃自去金匱要略註病者當腹部膨滿按壓之不覺疼痛者為虛證故禁忌下劑按之疼痛者實證也宜下之而此腹滿加舌有黃苔未經瀉下者下之則黃苔自去之意病者腹滿云云由玉函經下之則黃自去之下宜大承氣湯觀之則仲景所論之實證明為大承氣湯證但現時此證頗少反以大柴胡湯證為多故宜改為病者心下痞而硬滿按之不痛者為虛痛者為實當下之舌黃未下者下之則黃自去宜大柴胡湯能與事實相符故載本論於此大柴胡湯方柴胡克黃芩大棗芍藥各克生薑克枳實克半夏克大黃克煎法用法同前大柴胡加芒硝湯方大柴胡湯中加芒硝克煎法用法同前主治治大柴胡湯證兼芒硝證者大柴胡加厚朴湯方大柴胡湯中加厚朴克煎法用法同前主治治大柴胡湯證兼厚朴證者本方余所創設也其他之加味合方概可仿效小柴胡湯法茲略之大柴胡湯之腹證本方證之胸脅苦滿比諸小柴胡湯則甚強屢達於肋骨弓下其左右之內端相合而連及於心下則心下急其餘波左右分歧沿腹直肌至下腹部即所謂腹直肌之結實拘攣者是也而此胸脅苦滿為柴胡及副藥之黃芩枳實大黃之所治心下急為枳實芍藥及佐藥之大棗大黃之所療腹直肌之結實拘攣與瘀血性者異以右側高度為常為枳實芍藥大棗之所治也故能精究是等之藥能者即為意會腹證之捷徑也先輩之論說治驗醫方集解本方條曰此少陽陽明也故加減小柴胡小承氣而成一方少陽固不可下然兼陽明腑證時則當下宜大柴胡湯直指附遺曰大柴胡湯治下痢舌黃口燥胸滿作渴身熱腹脹譫語者必有燥屎宜於下後服木香黃連之苦以堅之求真按若微渴則本方猶能治之至其甚者非加用石膏則無效又下後用木香黃連以止瀉非也因本方非主疏通大便以驅逐病毒為目的迄至其減盡為止不拘便通之多少也亦可持長用之至病毒完全消失為止假令瀉下的用本方亦自能止瀉者也又瘧疾熱多寒少目痛多汗脈大者則以此方微利為度求真按不可以微利為度當以證盡為度傷寒緒論曰傷寒斑發已盡外勢已退內實不大便譫語者以小劑之涼膈散或大柴胡微下之又潮熱脅下汗出者為膽實宜大柴胡湯手足心汗出者為胃實宜大承氣湯求真按此說供參考固佳但不可妄從醫經會解曰本大柴胡湯證則當下求真按本大柴胡湯證則當以大柴胡湯下之之意醫以丸藥下之而病不解胸脅滿而嘔日晡所潮熱微利者仍宜加芒硝以再下連日不大便熱盛煩躁舌焦口渴飲水短氣面赤脈洪實加芒硝心下實滿連左脅難以轉側大便閉而痛加瓜蔞青皮求真按此證宜本方合用小陷胸湯昏亂譫語者加黃連山梔子求真按此證宜本方合用黃連解毒湯兼用黃解丸發狂加生地牡丹皮玄參求真按此證宜本方合用桃核承氣湯發黃加茵陳黃柏求真按此證宜本方合用茵陳蒿湯鼻血加犀角求真按此證宜本方加用石膏夏月熱病煩躁脈洪大者加知母麥門冬石膏求真按加知母石膏可也加麥門冬非也因此藥物適於虛證不適於實證故也東洞翁本方定義曰治小柴胡湯證之腹滿拘攣而嘔劇者治小柴胡湯證之胸腹拘攣而可下者求真按此說是也宜與前述腹證對照其旨可了然矣芳翁醫談曰一婦人妊娠數月適當夏暑下利嘔噦終而噓唏噯氣不已諸醫踟躕家人狼狽無法救治尋發暈如眠乃以熨斗盛炭火用釅醋注火上以薰患婦之鼻別作大柴胡湯使服之暈乍止熟眠而安求真按以峻烈之食醋注火上而蒸發之使病人吸入刺激鼻黏膜之知覺神經末梢由反射作用使恢復意識不過救急方法耳故本方主治之餘證不難推知矣方機本方主治曰心下滿痛大便不通者胸脅苦滿腹拘攣大便不通者漫游雜記曰痙病有太陽證其手足拘攣類癱瘓者以葛根湯發汗表證既去拘攣癱瘓不休者與大柴胡湯四五十日愈求真按痙病用本方剛痙用大承氣湯是由仲景理論脫胎而來也一人病疫經十五日不解請余診之面赤微喘潮熱舌強狂吼脈數急胸腹硬滿有時微利醫與麻黃杏仁甘草石膏湯數日病益劇余曰是因初病時發汗不徹邪氣鬱菀而入裡欲為結胸也可下之作大柴胡湯與之翌日大便二行胸滿漸減下痢亦止作小柴胡加枳實湯與之日二帖三日大便秘而不通與大柴胡湯又秘則又與如是三十日而得愈求真按喘鳴非必為麻黃之主治也可知矣續建殊錄曰一人患腹痛憂慘憤懥者數年矣來謁求診先生診之疾在胸脅且心下有物幾將成塊按之則痛身體羸瘦面如菜色大便硬飲食減先生與服大柴胡湯歲餘病稍退以他故停藥半年病復發心下之毒果成塊大如瓜硬且滿病者苦之喜怒如狂他醫治之無效復迎先生又使服前方兼用芍藥散三月大下臭穢病痊愈求真按此證初起即處以大柴胡湯當歸芍藥散之合方則其經過更可縮短也一男子卒然氣急息迫心下硬滿腹中攣痛但坐不得臥微嘔小便不利與以大柴胡湯諸證悉愈一男子卒患腹中痛渴而時嘔不大便數日小便快利短氣息迫頭汗不止舌上黑苔心下硬滿按之則痛手不欲近四肢微冷脈沉結乃與大柴胡湯大效求真按此證雖似陰證但由腹脈舌諸證觀之則可斷為陽證而舉本方一商人志氣鬱鬱嘔不能食平臥數十日自心下至脅下硬滿按之則痛時時呃逆夜則妄語而無熱狀脈沉微乃與大柴胡湯服之後下利黑物諸證痊愈求真按自心下至脅下硬滿有壓痛者主證也其餘不過客證耳所以不以脈之沉微亦與本方也又此方治嘔吐呃逆者因方中含生薑半夏即小半夏湯故也但欲使此作用更加有力可再加橘皮是即本方與橘皮湯合方之意也成績錄曰一男子每飲食即覺觸掠胸上心下結硬大便秘久治無效請先生診使飲大柴胡湯而愈求真按此證恐是輕度的食管狹窄也一人曾患所謂癇證居恒頗大食食後惟驚有音響則忽覺饑不得不食胸脅高動與大柴胡加茯苓牡蠣湯而愈一男子恒怵惕怯悸凡所觸目雖書畫器物悉如梟首或如鬼怪故不欲見物然有客訪之則一見如親故其人歸去則戀戀悲哀瞻望不止如是數月百事咸廢於是求治於先生先生診之胸腹有動心下硬滿大便不通劇則胸間如怒濤其勢延及胸肋築築現於皮外乃與大柴胡湯加茯苓牡蠣服數劑後穢物屢下病減十之七八既而頭眩頻起更與苓桂朮甘湯不日而舊疴如洗另一男子所患亦略與前證相同但所見諸物以為人首始遇人則必畏懼稍相識則不然其人去則反悲哀是以雖家人亦不得出外若出外則不堪眷慕遂致暈絕先生診之胸腹高動為向來所未見且胸骨隨動而有聲乃與大柴胡加茯苓牡蠣湯大下穢物而愈求真按此二證俱由下穢物觀之雖屬精神病亦可知為自家中毒之一分證耳蕉窗方意解本方條曰本方雖即為小柴胡湯之變方但熱候頗高是柴胡證中兼有胃實之氣味故其蒸蒸之熱候本論亦云鬱鬱微煩即以形容蒸蒸出熱之根本潛伏於心下之煩亂而較痞硬為尤甚至於心下之狀態則本論有心下急急者急縮也是以用柴胡以緩兩脅黃芩以透胸中及心下芍藥大棗以和心下半夏生薑以散胸中胃口之停飲大黃枳實瀉下胃中之熱便則各藥之奏效適與病勢相當故本論亦有嘔不止心下急鬱鬱微煩者與大柴胡湯下之則愈之句也嘔不止者謂心下之證候與小柴胡湯證不同雖用小柴胡而嘔仍不止也故本論有四五日柴胡證仍在者先與小柴胡湯之句也由此可知應用大黃枳實之旨趣矣求真按此說雖非完善然頗佳宜玩味之蕉窗雜話曰凡用大柴胡湯及柴胡加芒硝湯求真按此柴胡加芒硝湯即大柴胡加芒硝湯也處而用承氣湯求真按此即大承氣湯也則瀉下雖同然兩脅及心下之痞硬則寬緩無力此處宜留意承氣湯之腹候在心下則寬自臍上至臍下則極脹硬有力也求真按據此說可知大柴胡與大承氣二湯腹證之區別矣總之胸肋與鳩尾間成如仌二種之形若其人之胸肋成如人之狹形者則多患瘵疾者也余曾屢試若見此形者則此證受自先天愧不能治之求真按由余之經驗上腹角成鈍角者則胸廓及頭部短厚所謂屬於卒中質者多見大柴胡湯之腹證其銳角者胸廓扁平頭部細長所謂屬於勞瘵質者多診為小柴胡湯之腹證故若有此二種體質之人用大小柴胡湯則或能改造比較的是等之體質得以預防腦出血及肺結核之發生是仲景所謂上工治未病之治法也俗謂卒中風證心下急縮甚者可治心下及臍下如蛻而見洪大弦緊等脈面上戴陽者不治求真按心下急縮甚者即本方證之心下急也肝實之眼求真按眼下略一疾字可用大柴胡求真按肝實者謂強度之胸脅苦滿也某人右足有病已十五年雖騎馬步行即覺麻痹而不用由六月上旬求治於余余診察之用大柴胡湯病人云前曾用巴遂大黃等多矣初用雖下至二三日則不下矣任用多少大黃等藥亦不下總而言之有大黃之藥無一效驗者於是用本方至中旬云因感風邪而有熱故請再診熱氣雖強風邪不見自服大柴胡至是一日有下利一二行再經二日腹部大痛下如古之雜巾者無數有如棒形長八九寸以刀切之不易至十四五日許下如上之穢物者無數於是痛解熱止足之麻痹亦忘近日暑天惟著木屐初往來北野之代參午時歸又直行東福寺至暮方歸又夜行至細川屋鋪由是得免十五年來之苦惱矣求真按此病者之發熱腹痛下穢物者是為本方瞑眩症狀因方能徹於患處之反映也又本方不特有效於此證若能中其肯綮則如腳氣之浮腫型麻痹型萎縮型等悉皆治之有神效大抵平日口臭頗甚之男子則宜加大黃石膏之類以取下求真按此證概屬大柴胡加石膏湯證一婦人久不受孕詳其脈腹用大柴胡湯後即有孕矣求真按恐因服用本方後鬱毒退出血行佳良之故余曾治左睾丸缺除之十五歲男子隨腹證處以本方睾丸遂漸次下降全入於陰囊內唯比右側稍小以是可知古方之妙矣東郭醫談曰凡今云中風皆係類中風者因腹內有積氣左右之氣不順閉塞於左或右故也當時病人之腹裡成積氣宜注意診腹而與藥但世醫對之惟注意於手足等之疼痛或漫延成痿躄等證不知治手足氣血所附之腹裡若腹裡治而足病無不治之理中風足不仁之病宜用大柴胡加甘草後用抑肝散加芍藥有治愈者求真按用本方加甘草時反不如本方合用桃核承氣湯之機會較多抑肝散加芍藥之非已辨於前矣一男子三十五歲形甚肥滿但寢臥時盜汗出而息甚苦外無別證此病人幼年時不肥滿自二十二三頃漸成肥滿是留飲也用大柴胡湯加甘草分解心下之飲物而愈求真按此證不外於肥胖病故以本方治之不難推想也但由余之經驗此病不僅因於水毒血毒亦有雜入故宜用大柴胡湯或大柴胡加厚朴湯合用桃核承氣湯及大黃牡丹皮湯者為尤多其貧血者殊以前方合用當歸芍藥散為多百疢一貫曰中風偏枯證左臍旁有塊上長於脅者此為偏枯之原見乏者十有八九可以漸漸治療用大柴胡湯有效者也求真按左臍旁有塊由此塊漸增長而上於脅此不外為桂枝茯苓丸之腹證故不可不以本方合用桂枝茯苓丸焉又曰龜胸龜背可知多由毒成且龜胸必後於龜背而成者輕者大柴胡湯或山繭湯重者大陷胸湯之類宜隨證用之求真按龜胸鳩胸龜背脊柱前彎證雖不無小陷胸湯及大陷胸丸證但以本方證為最多老人之前彎證亦然古方便覽本方條曰有一男子年四十餘患卒倒不知人事醒後半身不遂舌強不能語諸醫無效余診之胸脅痞硬腹滿甚而拘攣按之則徹於手足乃作此方使飲十二三日身體略能舉動又時以紫圓攻之二十日許得以痊愈一酒客年五十餘左脅下硬滿大如盤者已久腹皮攣急而痛煩熱時發喘逆不得臥面色萎黃身體羸瘦丙申之春發潮熱如燃火不愈者五十餘日余乃作此方使飲凡五十餘劑其熱稍退又時時以紫圓攻之病者信服前方一年許舊疴盡除一婦人年三十四五患熱病十八九日譫語煩躁不安熱不退不飲食諸醫以為必死余診之胸肋煩脹腹滿而拘攣乃以此方服六七日腹滿去而欲食以此方出入二十日許收全效方輿輗本方條曰世謂大柴胡湯為疝癇留飲等證之胸腹滿急者的效之方劑也夫柴胡者善理胸脅庸醫雖以柴胡為寒熱之藥但柴胡之實效主理胸脅其治寒熱者亦以寒熱為少陽之證也少陽之位配於身體係胸脅故以柴胡理胸脅時則寒熱隨而治矣其證據為太陽表熱與陽明裡熱用任何藥無效故也此義熟讀傷寒論者自能分辨之然有一說柴胡之用於胸脅凡患在左胸者如鼓之應桴若在右胸者雖與數十劑如石投水然此雖長沙未及論但余數十年來得心應手之訣也余曾以此語人曰人身一也何有左右之別乎蓋人身雖一既有表裡上下之別則左右豈無別乎余非敢好僭越是由天地陰陽之理人身造化之機耳求真按此說前半頗可後半極非不可信之生生堂治驗曰一人年知命卒倒不省人事半身麻木先生刺其口吻及期門即蘇後與大柴胡湯有心下急腹滿等證兼敷遂散三年後復發竟死求真按此病者若行刺絡及用本方與桂枝茯苓丸合方兼黃解丸或可預防其再發餐英館治療雜話本方條曰當今半身不遂而不語者世醫雖皆以中風名之然因肝氣塞於經絡血氣運行不暢致成半身不遂之證者於世不少屬肝實者宜用此方尤宜以自左脅至心下有凝結狀或左脅筋脈拘攣按之則痛大便秘喜怒等證為目的是近世古方家之新發明間有奏效者又痢疾初起有發熱心下痞嘔等證者此方可用亦和田家之口訣也男女至成人時每有髮少與年不相應者肝火也此方有大效此中華醫書所未載亦和田氏之發明也若用此方則既脫之髮能復生云余未試用又四逆散亦頗佳云求真按此說和田氏之效顰也不可盡信類聚方廣義本方條曰治麻疹胸脅苦滿心下硬塞嘔吐腹滿痛脈沉者治狂證胸脅苦滿心下硬塞膻中動甚者加鐵粉有奇效平日心思鬱塞胸滿少食大便二三日或四五日一行心下時時作痛吐宿水者或其人多胸脅煩脹肩項強急臍旁大肌堅韌上入胸脅下連小腹或痛或不痛按之則必攣痛或兼吞酸嘈雜等證者俗稱疝積留飲痛宜長服此方當隔五日或十日時用大陷胸湯或十棗湯等以攻之求真按胸滿少食者胃部有停滯膨滿之感不能多食也與食無氣力不欲飲食之小柴胡湯證大相徑庭肩項強急為頸項強之誤臍旁之大肌堅韌上入胸脅下連小腹者兩側腹直肌結實攣結之謂也或痛者此肌有自發痛之意或不痛者無此自發痛之義按之必攣痛者不拘自發痛之有無必有壓痛之謂其說本方之腹證可謂詳審矣然關於兼用方之所論是泥守東洞翁之僻說不可輕輕附和之治梅毒沉滯頭痛耳鳴眼目雲翳或赤眼疼痛胸脅苦滿腹部拘攣者時以紫圓梅肉散等攻之大便燥結者加芒硝為佳方伎雜志曰余三十歲時因岡田炎藏贈書牘故傍幾案以翻閱至夜半卒然惡寒戰慄因家人已臥爐火又滅不得溫暖藥亦不服雖蒙衾臥仍甚戰慄至翌日咽喉腫塞即所謂急喉痹是也遂乞診於家兄蘿齊但因咽喉至口凝腫不能開故咽中之形未見荊妻大憂迎岳父河本道一先生視咽中亦不能刺喉痹針嘔氣逆上不能用藥熱氣盛於咽喉聲音亦不少出腫痛頗甚滴水難通不能施治但苦居耳然過四日夜忽咳嗽創處破潰由此言語通嘔氣減粥亦可下乃用桔梗湯加大黃因血氣方盛雖受苦痛三四日故疲勞不甚飲食隨進六七日間即復舊有病人冒風雪而出即咽喉微疼聲音漏鼻語言不辨看護者雖驚怖但余以其有腫痛亦有前方經二旬尚不愈因令仰臥而診其腹胸脅煩滿心下痞塞腹拘攣吐涎沫有嘔氣故不拘咽喉之聲音用大柴胡湯一月許聲音出所患盡已以後四十年無何種之疾患故治病者宜隨腹證以用藥也求真按本方之治咽喉腫痛固由全方之作用然由主治之柴胡可參考柴胡之醫治效用半夏可參考半夏之醫治效用及半夏苦酒湯條下之證治枳實芍藥可參考枳實及芍藥之醫治效用併枳實芍藥散條下之證治等等之治效也可知矣麻疹一哈曰一兒年二旬發熱三四日疹子遍發稠密乾燥色紫黑煩渴引飲煩悶不眠譫語如見鬼狀人事不省按其腹熱如烙脅腹微滿大便難小溲不利因與白虎湯盡十帖諸證漸安疹子亦收但身熱猶未退胸膈滿悶大便不通五六日兩目黯然晝不見物更與大柴胡湯又兼與芎黃散併時以紫圓攻之每服下利數行五十日許痊愈求真按此證初起即當用本方加石膏湯又曰一女子十七歲疹後患耳聾用藥數十日不知乞余診治按其腹胸脅滿悶小腹堅塊大便四五日一次經信不來者二三月矣因與大柴胡湯及承氣丸約三十日許大便日二三行經利倍常時或下黑血塊數枚至是耳復聰求真按此證宜用本方合用桃核承氣湯因胸脅滿悶者本方證也小腹堅塊者桃核承氣湯證也而本方治耳聾者由少陽病總論中曰少陽中風兩耳無所聞云云可知矣桃核承氣湯亦療之者由此方成於桂枝甘草湯之加味方可知山田業廣曰業廣於明治十二年初冬感受微邪咳嗽頻頻雖用有桂麻瓜蔞蘇子杏仁諸方不愈因飲食起居如常不以為意至本年二月初咳嗽特甚聲啞短氣息迫如哮喘一日併發嘈雜怔忡診脈有結代之象始知不可輕視使小兒診腹狀謂有心下硬滿之形為大柴胡湯之候因思弱冠之時咳嗽久不愈先友伊澤榛軒處以宋版大柴胡湯求真按他版傷寒論之大柴胡湯方無大黃惟宋版者有之故於大柴胡湯之上加以宋版二字而愈因急用大柴胡湯七八日咳嗽十減五六繼用二十日許諸證漸愈以七十餘歲之人而有大柴胡湯之證壽命當未有艾也竊喜之以大柴胡湯治喘息古人已有不可以淺學視之求真按古人概不知本方可多用雖如故尾臺山田氏之名醫尚須至窮時用之而悟其偉效也本方不特療實證之喘息咳嗽胸痛等若去大黃加大量之橘皮或合用半夏厚朴湯時有本方證而不可下之肺結核及其他一般虛證之咳嗽發作等能鎮壓之試之可知溫知堂雜著曰同業某妻年三十許本年某月經期之前月經過多不止時左小腹急痛而衝逆於心下某醫用當歸芍藥散桂枝茯苓丸等皆無效又用麻醉鎮痛之西藥則僅能減輕一時的痛苦不能根本治療如此者三十日許痛苦益甚發則四肢厥冷寸脈沉微顏面蒼白汗出至於人事亦不省經血雖大減但尚有少許云於是延一西醫用強壯及防炎藥又招余往診之皮膚蒼白身體羸瘦肚腹悉拘急按之則痛舌上有黃苔不思進食大小便不利曾施灌腸術及導尿數回余曰身體雖衰弱與貧血然語氣尚盛諸證皆實不足畏也使服大柴胡加當歸甘草翌日大便通利肚腹緩解痛苦不再發數日後轉內消散飲食日進而全快在治療時西醫謂此證為子宮內膜炎專注意於局部治療故不能愈然中醫之治法則稍異因肚腹如此拘急為有瘀物之候腹內不能融通若用局部治法故難立效又留滯於小腹之血液不得循環故由子宮出血難以阻止余之用大柴胡加味者務使腹部得以緩解腹部既緩解腸胃自健運血液亦隨而循環則子宮內膜炎自愈自然之良能亦隨而恢復矣故治療時局部固宜注意但須於全體無損後然後顧及之此當注意者也求真按藤田氏說甚佳然用大柴胡湯加當歸甘草不若用大柴胡湯合用當歸芍藥散或芍藥甘草湯與內消散時不若用大柴胡湯去大黃合用當歸芍藥散橘窗書影曰一人年四十餘小腹左旁有堅塊時時於心下衝逆刺痛或牽腰股而痛不能屈伸俯仰大小便不利醫作寒疝治益甚余診之脈沉緊舌上黃苔乾燥與大柴胡湯加茴香甘草大小便快利疼痛大減霍然而愈按世醫之治寒疝概投烏附辛溫之劑而益激者用此方屢奏效蓋本外臺疝門治腹中卒痛者用柴胡桂枝湯之例其痛輕者用柴桂重者用此方求真按此證用本方加茴香甘草變例也用本方與芍藥甘草湯之合方正例也然由小腹臍旁有堅塊云云觀之二方俱不適宜比較的可用本方與桃核承氣湯之合方又淺田氏云其痛輕者柴桂重者此方亦謬見之甚者也此二湯不拘於痛之輕重宜隨其脈腹及外證而用之又曰一人患疫痢日數十行頭痛時時惡寒口渴不食上廁則肛門如灼焮痛頗甚御番醫師阪本元安與芍藥湯及疏滌之劑反增劇余診曰此太陽與陽明合病雖經數日表證猶在宜發汗即與大劑葛根湯使發汗至翌日下痢漸減頭痛惡寒亦止連服一日肛門之苦亦忘但舌苔不去心下時時急迫飲食不進因與大柴胡湯不日諸證痊愈四逆散之注釋少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之傷寒論註少陰病者脈微細但欲寐也四逆者四肢厥逆之意謂有此厥逆現象或有以下之證者為本方所主治也但本方證非真少陰病本方亦與少陰病之主方四逆湯異無熱藥之乾薑附子則無治陰證之能力然仲景謂本方證為少陰病四逆方名亦名四逆雖似矛盾抑亦深意之所存欲示本方之治熱厥時疑似於少陰病之寒厥也因裡熱極時阻止血流使人之四肢厥逆而呈陰證之外觀實與陰證之四肢厥逆寒厥內外俱厥冷者異表雖厥冷而裡有熱所謂表寒裡熱者熱厥是也故不可被表證之陰狀所惑以直治其裡熱為古今寒熱二厥之大別本方證雖本來為陽熱證然可能熱極而疑似寒厥則呈熱厥之證雖然此證甚少故本方通常不拘於冒頭之五字而以下列腹證為主目的仲景謂其人或咳云云及諸家之說為副目的而運用之可也四逆散方甘草枳實柴胡芍藥各克煎法用法同前大柴胡湯方此為散方之用量若為煎劑當增量二倍以上四逆散之腹證本方之腹證酷似於大柴胡湯其所異者因彼含大黃故其腹部現一般之實狀有內部充實之觸覺按之則覺抵抗本方無大黃故有虛狀內部按之則空虛而無抵抗又本方無生薑半夏故無噁心嘔吐無黃芩大黃故熱勢不劇舌苔亦稀也雖然此方中含枳實芍藥甘草有帶枳實芍藥散芍藥甘草湯之方意故腹肌之攣急急迫反較大柴胡湯證為甚此是二者之別也先輩之論說治驗蕉窗方意解本方條曰是亦大柴胡湯之變方也其腹形專凝聚於心下及兩肋下延及胸中兩脅而拘急然少實熱故不用大黃黃芩其主藥亦唯緩和心下及兩肋下也再本論說明證候略而不詳且文章亦不見於正文恐係後人所附全部之腹形若能領會心下肋下之狀如上所述者雖四肢逆厥亦可以此藥治之與真少陰之四逆厥其脈狀腹候等大有不同也又疫兼癇證其甚者發為譫語煩躁而呃逆等證用陶氏散火湯之類無寸效者用本方即驗固不及用呃逆之藥心下及肋下胸中成強硬狀態者即不誤矣證候外有發為種種之證候者必不可眩惑於見證余多年用此藥以治疫證及雜證並及種種之異證不可勝數真稀有之靈方也常用之可知其效之不凡求真按古來活用本方以和田氏為嚆矢故其議論極痛切學者宜熟讀之蕉窗雜話曰一人年四十得病已十八年其間唯服用一醫之藥不絕其證頭痛眩冒惟席上行步耳因是面細長而瘦皺蒼白無血色骨瘦如柴月經亦十年不行矣腹候右臍旁有疝塊脅肋之下亦甚拘攣余即用四逆散加良薑牡蠣劉寄奴使服之並日施灸火於風市三里三陰交各穴始終不轉方尚未期年脅腹漸大肌肉漸長如無病時頭眩鬱冒等證亦已如洗月信亦稍稍至矣求真按此證可用四逆散合用當歸芍藥散一老人患鼻淵已三年諸醫以為肺虛百治不效後應東武之役過京師求治於余時其人兩鼻流濁涕極多與四逆散加吳茱萸牡蠣使服之翌日自京出發而東去於途中日服三帖至品川之前日濁涕鼻水已停止而不流矣此證自古以來均作肺部之病多用辛夷白芷之類又有云成自風邪後之餘邪者均誤也是皆由肝火上逆於肺上下之氣隔塞而成也求真按此蓄膿證也可用本方加薏苡仁合用當歸芍藥散類聚方廣義本方條曰治痢疾累日下利不止胸脅苦滿心下痞塞腹中結實而痛裡急後重者求真按余亦當用本方治同證橘窗書影曰一人年十四氣宇閉塞顏色青慘身體羸瘦醫以為勞瘵余診之任脈拘急胸中有動悸自左脅下延鳩尾煩悶余以為癖疾所為與四逆散加鱉甲茯苓數日煩悶去拘急解氣宇大開但四肢無力倦怠因與千金茯苓湯數旬痊愈求真按此證先宜四逆散桂枝茯苓丸之合方後用柴胡去半夏加瓜蔞湯再加地黃麥門冬為是千金茯苓湯後世方也合茯苓人參柴胡麥門冬地黃桂枝芍藥而成故與柴胡去半夏加瓜蔞湯再加地黃麥門冬者大同小異也一人年年患腳氣惟今年不發但心下痞塞任脈拘急鬱閉而不堪職業余與四逆散加吳茱萸茯苓數日腹裡大和然飲食不美元氣頗餒與柴芍六君子湯元氣不旺時避免職業恬然靜養遂不藥而愈求真按此證初起宜用四逆散與當歸芍藥散之合方終用小柴胡加橘皮湯與當歸芍藥散之合方一人患心下痞塞任脈拘急有動氣不得安眠時時吐血醫與滋補之劑無效余診曰非虛證也肝火所為宜和暢腹中清涼肝火為治與四逆散加黃連茯苓兼用黃連解毒散數旬宿疾漸愈求真按此證可用四逆散桂枝茯苓丸之合方兼用黃解丸也一女子脊骨六七椎之上突起如覆杯胸膈亦高張氣分因而鬱塞不能工作腹裡拘急背覺強硬伸屈不靈余與四逆散加鉤藤羚羊角兼用大陷胸丸經過旬日胸腹寬快但氣色不甚旺益進前方脊骨凹沒身體如故求真按依余之經驗結核性之脊椎炎股關節炎等證因瘀血存在者甚多故此病宜四逆散桂枝茯苓丸之合方兼用大陷胸丸治之枳朮湯之注釋心下堅大如盤邊如旋盤水飲所作枳朮湯主之金匱要略註類聚方廣義本方條曰難經五十六難曰肥氣在左脅下如覆杯可見旋杯為覆杯之誤且已云如盤又云如覆杯者言心下堅大如盤其形狀中高邊低也按之雖外堅但內如無物故曰如覆杯是水飲所作也此條及木防己湯之痞堅十棗湯之痞硬滿甘遂半夏湯之堅滿大陷胸湯之石硬其形狀雖不同然均屬於水飲但因緩急劇易及兼證之各異故不僅主方不同也又按五十六難之如覆大盤疑為大如覆盤之誤本條由此說雖可解但由余之實驗是述肝脾二臟中之一種腫大連及於心下之證治也是以本方單用於此證者頗少而與大小柴胡湯合用之處較多也枳朮湯方枳實克朮克上細銼以水二合煎成一合去滓一日分三回溫或冷服腹中奐即當散也先輩之論說千金月令曰主結氣方白朮枳殼炒各等分搗篩蜜丸如梧桐子大空腹時以飲送下二十五丸治隔氣心胸間痛方前方加神麴各一兩為散不計時候以熱酒調下一錢脾胃論曰枳朮丸求真按此即本方之丸方也寬痞消食強胃保命集曰束胎丸求真按此亦本方之丸方也宜於妊娠八九月醫統曰枳朮湯治產後浮腫之屬氣者求真按隨病名擬方者皆非也不可從之東洞翁本方定義曰治心下堅滿小便不利者求真按前述鄙見據此說可以想見本方之治腹水作用矣叢桂亭醫事小言曰又心下有大結塊如盤如覆杯水飲所作也此為仲景之所論者凡酒客惡酒並忌聞酒氣之後其心下必成如是之症狀此因酒病所致初起用中正湯等即可治矣已成水腫則死若用枳朮湯與甘遂丸一下而治如大柴胡或柴胡加芒硝之腹證多者可十全三四求真按是述肝臟硬變證之證治但與甘遂丸或單用枳朮湯均屬下策宜本方合用小大柴胡湯及柴胡加芒硝湯等或兼用甘遂半夏湯為是枳實芍藥散之注釋產後腹痛煩滿不得臥枳實芍藥散主之金匱要略註曰產後腹痛暗示疼痛在下腹部也煩滿不得臥者其煩悶因於腹部膨滿由此腹滿與疼痛而不得橫臥之意然仲景列本方於婦人產後病門之關係上論之則不獨止於下腹痛若有胸痛或心下痛或癰膿等在於下列之腹證者則可用之師曰產後腹痛法當以枳實芍藥散假令不愈者此為腹中有瘀血著臍下宜下瘀血湯主之亦主經水不利金匱要略註只稱產婦腹痛恐於腹痛之下省略煩滿不得臥五字因本方非產婦腹痛之特效藥乃其主治兼煩滿者耳枳實芍藥散方枳實芍藥各等分上二味杵為散服方寸匕日三服並主癰膿以麥粥下之求真按本方服法宜作散劑但現在不用麥粥改為如下之煎劑為常枳實芍藥各克上細銼以水二合五勺煎成一合去滓一日分三回溫或冷服枳實芍藥散之腹證本方之腹證包含本方及大柴胡湯四逆散等尤其類似於四逆散之腹證但以無胸脅苦滿為別先輩之論說東洞翁本方定義曰治腹滿拘攣或痛者險證百問曰半產後腹痛嘔吐發熱下利不食或吐下蛔蟲舌正赤色者師曰半產後腹痛云云枳實芍藥散可也嘔吐止則與當歸建中湯有蛔蟲者可與鷓鴣菜湯求真按據此本方似有鎮嘔作用但未知其然否排膿散之補遺瘡癰腸癰浸淫病之脈證並治法曰金匱要略問曰寸口脈微浮而澀法當亡血若汗出設不汗者云何師曰若身有瘡被刀斧所傷亡血故也此名金瘡無膿者王不留行散主之有膿者排膿散主之排膿湯亦主之排膿散方枳實十六枚芍藥六分桔梗二分上三味杵為散取雞子黃一枚以藥散與雞黃相等揉和令相得飲和服之日一服求真按仲景稱脈證並治云云是有治方而無脈證者恐係後世亡佚然東洞翁本方定義曰治瘡家胸腹拘滿或吐黏痰或便膿血又有瘡癰而胸腹拘滿者主之此為不可易之確論則本方可隨之運用矣但現今用之者改為如下之煎劑而不用卵黃耳枳實芍藥各克桔梗克煎法用法同前排膿散之腹證本方不過加微量之桔梗於枳實芍藥散中則於腹證上亦不能分彼此但因有桔梗之參加則治癰膿作用更為有力而且有祛痰作用為異耳先輩之論說治驗醫通曰排膿散治內癰由膿便而出方機本方條曰瘡癰痛欲潰膿者梅肉險證百問曰青州云有眼下鼻旁之一處腫起者初起頭痛腫處亦微痛色全不變久不愈其腫漸大痛漸增遂潰膿而死又有一證其初為上齒之一處疼痛拔其齒視之有小孔甚深但不覺痛師曰眼下鼻旁之一處腫起云云以排膿散兼用伯州散時時以梅肉散攻之間有得效者成績錄曰一人便膿血已五年來浪華從醫治三年一門人雖與桂枝加朮附湯及七寶丸無效遂請先生診之腹滿攣急小腹硬而底有硬物重按之則痛乃與排膿散受劑而去未幾來謝曰宿疴盡除矣類聚方廣義本方條曰東洞先生以本方合排膿湯名排膿散及湯治諸瘡癰隨各症狀而兼用應鐘再造伯州七寶等骨槽風膿潰後不收口者必因毒之根蒂著於齒根故不拔去其齒決不能全治須先拔去其齒而後可與此方必有效也當兼用伯州散時以梅肉散下之產後惡露壅滯發為小腹癰臀癰等腹部拘攣而痛大便泄利心下痞塞不欲飲食而有嘔有咳者亦宜此方兼用伯州散咽喉結毒腐爛疼痛頸項生結核者宜兼用鼴鼠丸用鼴鼠丸者則咽喉更加腐爛而後漸漸平復結核亦隨而消卻求真按用伯州散頗佳無特用鼴鼠丸之必要勿誤藥室方函口訣本方條曰此方排撻諸瘡瘍為最有效其妙處在桔梗合枳實局方之人參敗毒散連用枳殼桔梗亦此方意用枳實於發散用當歸於下氣者為古本草之說又此方活用於煎湯時宜與排膿湯合方求真按本方有可合排膿湯有不可合排膿湯於通常不能一定桂枝生薑枳實湯之注釋心中痞諸逆心懸痛桂枝生薑枳實湯主之金匱要略註胸痹者心臟部有異常感覺病證之總稱心中痞者謂心臟部有閉塞之自覺也諸逆者云氣逆嘔逆吐逆噦逆等證也所謂心懸痛者類聚方廣義曰按素問玉機真藏論曰心懸如病饑王注曰心中虛如病饑至真要大論曰饑而不欲食云云心如懸靈樞經脈篇曰如心懸如病饑師傅篇曰胃中熱則消穀令人懸心善饑此證有痛者即心懸痛也傷寒雜病辨證曰蓋心痛有結痛懸痛之異心中支結而痛時此謂結痛若弦引他處而痛時此為懸痛懸與弦通懸癖古或作弦癖巢源云癖氣在脅肋間覺有弦起則咳唾引脅下而懸痛此謂懸癖之所以也懸痛以弦痛而可徵如上云云則本條當即述狹心證之證治者也桂枝生薑枳實湯方桂枝生薑各克枳實克上細銼以水二合煎一合去滓一日分三回冷或溫服先輩之論說治驗東洞翁本方定義曰治胸滿上衝或嘔者又曰按當有嘔證又按痞之下脫落滿字乎方機本方主治曰逆滿吐水不受水藥者消塊或南呂成績錄曰一婦人患吐水水升胸間漫漫有聲遂致吐水每發於日晡至初更乃已諸醫與大小柴胡湯及小半夏湯之類無效先生診之用桂枝枳實生薑湯痊愈一人求治曰吾疾常起於薄暮逮初更而止初起有聲於橫骨之下邊漸升而至於心下此時胸痛大吐水吐後即如平日他無所苦丸藥交治五旬不瘥先生診之與桂枝枳實生薑湯三服病頓除一男子患吐水數十日羸瘦日加其證至黃昏每於臍旁有水聲揚騰上迫心下滿痛吐水數升至初更必止飲食如故先生投桂枝枳實生薑湯其夜水雖上行然已不吐翌夜諸證盡退五六日痊愈求真按南涯氏以本方用於吐水證仲景所論之活用也雜病辨要曰心之包絡挾寒飲微痛者名曰心痛心中痞諸逆心懸痛者桂枝生薑枳實湯主之求真按余於狹心證用大柴胡湯桃核承氣湯合方屢奏奇效是因方中包含本方故也觀下圖自明茯苓杏仁甘草湯之注釋胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之金匱要略註胸痹者由金匱胸痹之病喘息咳唾胸背痛短氣云云之說雖不難推測此病位於胸膈之內但尚未盡明了由經幾多之苦心與經驗得知不外於心臟病之謂即喘息咳唾者心臟性喘息也胸背痛者為絞心證短氣呼吸息迫者心臟性呼吸困難也氣塞者如胸內被填塞呼吸如被抑制之自覺證此亦為一種之心臟性呼吸困難也然此二方證與瓜蔞薤白白酒湯證等詳下不同因喘息咳唾胸背痛不過為其客證而氣塞短氣為主證故仲景特加此四字標明於胸痹之下而仲景曰茯苓杏仁甘草湯主之橘枳薑湯亦主之者意蓋欲示主治胸痹氣塞短氣之作用相似而非全相等也依余之經驗二方雖皆主治氣塞短氣但茯苓杏仁甘草湯以短氣為主證而以氣塞為客證橘枳薑湯以氣塞為主證而以短氣為客證也茯苓杏仁甘草湯方茯苓克杏仁克甘草克上細銼以水二合煎一合去滓一日分三回冷或溫服先輩之論說治驗方機本方主治曰短氣息迫或喘急紫圓者酒客最多此病以此湯有大效求真按依余之經驗本方證以老人為最多成績錄曰一男子短氣息迫喘而不得臥面色青胸中悸脈沉微先生與茯苓杏仁甘草湯三帖小便快利諸證痊愈橘皮枳實生薑湯之注釋胸痹胸中氣塞短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之金匱要略橘皮枳實生薑湯方橘皮克枳實克生薑克上細銼以水二合五勺煎一合去滓一日分三回冷或溫服先輩之論說東洞翁本方定義曰治胸痹心下痞滿嘔噦者方機本方主治曰胸中痞塞逆滿短氣者呃逆不止者腹證奇覽曰橘皮枳實生薑湯千金論云治胸痹胸中愊愊如滿噎塞習習如癢喉中澀燥唾沫者其義即胸滿一倍每食咽詰常如濛濛而癢喉中澀燥而唾沫橘皮解胸中之氣滿枳實破痞退痰生薑開胃而暖冷此方意也類聚方廣義本方條曰千金為治胸痹胸中愊愊如滿噎塞習習如癢喉中澀燥吐沫諸病源候論噎塞之下有不利二字脈經曰實脈大而長微弦應指愊愊然注愊愊堅實貌又外臺甘草瀉心湯方後云兼治下痢不止心中愊愊堅而嘔腸中鳴者按愊愊填塞之義橘皮之醫治效用藥徵曰橘皮主治呃逆也兼治胸痹停痰橘皮之治呃逆雖如東洞翁說但無此證而須用此藥者不少故難為定則由余之經驗本藥有鎮咳鎮嘔鎮痙健胃諸作用兼有作利尿藥及解魚毒之特能觀下說可知之本草綱目曰黃橘皮氣味苦辛溫無毒主治胸中之瘕熱逆氣利水穀降氣通神本經下氣止嘔咳治氣衝胸中吐逆霍亂療脾不能消穀止泄除膀胱留熱停水起淋利小便去寸白蟲別錄清痰涎治上氣咳嗽開胃主氣痢破癥瘕痃癖甄權療嘔噦反胃嘈雜時吐清水痰痞痎瘧大腸悶塞婦人乳癰入食料解魚腥毒時珍發明杲曰橘皮為脾肺二經氣分藥一能導胸中寒邪二破滯氣三益脾胃頌曰橘皮能散能瀉能溫能和化痰治嗽順氣理中調脾快膈通五淋療酒病其效在諸藥之上時珍曰橘皮苦能瀉能燥辛能散溫能和其治百病總是取其理氣燥濕之效同補藥則補同瀉藥則瀉同升藥則升同降藥則降脾乃元氣之母肺乃攝氣之器故橘皮為二經氣分之藥但隨所配而補瀉升降也張潔古云橘皮枳殼利其氣而痰自下蓋此義也本草備要曰青皮辛苦而溫色青氣烈入肝膽氣分疏肝瀉肺破滯削堅消痰散痞治肝氣鬱積脅痛多怒久瘧結癖疝痛乳癰最能發汗有汗及氣虛人禁用橘皮湯之注釋乾嘔噦若手足厥者橘皮湯主之金匱要略註乾嘔者有聲無物也噦者呃逆也若手足厥者是乾嘔噦手足厥冷者之義全文之意謂乾嘔噦者及因乾嘔噦之甚而手足厥冷者橘皮湯主治之也橘皮湯方橘皮克生薑克煎法用法同前下咽即愈先輩之論說治驗東洞翁本方定義曰治胸中痹而嘔噦者古方便覽曰一男子患熱病十日許發呃逆不愈一晝夜已欲死余與此方而治方輿輗本方條曰此證雖曰手足厥實因氣逆得之非發於虛寒也其手足厥者氣逆於胸膈不行於四末之所致故症狀雖似危殆但用此輕淡之藥以行其氣則愈矣曾有一男子於暑月患霍亂吐瀉雖已止而乾嘔未除兼有噦逆甚至手足微厥脈細欲絕更醫數人殆皆附子理中湯及四逆加人參湯或吳茱萸湯參附參薑之類雖盡其術未見寸效余最後至診之亦所少見即作橘皮湯令煮之斟取澄清冷熱得中使細細啜之余亦整日留連病家再四診視甚至藥之服法亦不使稍誤時刻因是得以安靜遂得救冶此證若不使乾嘔微減豈有生路哉余以輕劑出之於死地者因此一證存也此案由少陰病下利不止厥逆無脈及乾嘔煩者仲景不棄置之而與白通加豬膽汁之訣而悟入求真按此證乾嘔噦主證也手足微厥及脈細欲絕客證也故用本方治其主證則客證隨而治矣若於此時被眩惑於劇烈之客證而施治以樟腦等興奮藥之注射不惟不能治病反足以促其死此余之所以排斥近時強心劑之一原因也橘皮竹茹湯之注釋噦逆者橘皮竹茹湯主之金匱要略註噦逆者由氣逆而噦也橘皮湯之噦亦何莫不然但其噦以水毒上迫而發噦為主然後致成乾嘔或手足厥也反之本方之噦以氣逆為主水毒上迫為客也故但為噦耳尚未致成乾嘔及手足厥也觀二方中之橘皮生薑之多少可知矣橘皮竹茹湯方橘皮克竹茹克大棗克生薑克甘草克人參克上細銼以水三合煎一合去滓一日分三回冷或溫服求真按加用半夏克以上是本方與小半夏湯合方之意所以有妙效先輩之論說治驗三因方本方條曰治咳逆嘔噦胃中虛冷每一噦至於八九聲相連收氣不回至可驚人者求真按此證百日咳發作也此發作有呃逆狀者本方或有效雖然云胃中虛冷者非也因本方是陽虛證而非陰虛證也東洞翁本方定義曰治胸中痹而噦逆者古方便覽曰一賈人七十餘歲患呃逆三十日勺飲亦不能通於口諸醫治不愈十七八日東洞先生往診咽喉之肉脫而吃吃之聲已盡出雖腹中有響乃作橘皮竹茹湯一帖重十二錢與二劑而奏效類聚方廣義本方條曰此方之藥量與水率不甚相當且他藥之分量重而人參之重僅一兩長沙方中絕無如是者疑有錯誤又按朱肱活人書有半夏小兒吐乳及百日咳此方加半夏極效並宜隨腹證兼用紫圓或南呂丸求真按依余之經驗百日咳宜小柴胡湯或小柴胡加石膏湯合用半夏厚朴湯者為多數需要本方者比較的稀少也勿誤藥室方函口訣本方條曰此方主以橘皮之下氣兼竹茹之潤降故能主治氣逆發噦者又多用甘草者手段也若少量則無效茯苓飲苓朮枳橘薑參之注釋外臺茯苓飲治心胸中有停痰宿水自吐出水後心胸間虛氣滿不能食消痰氣令能食金匱要略註心胸中者胃中之意氣滿不能食者方食時猶未攝食胃部已生膨滿之感而不能飲食之義也茯苓飲方茯苓人參朮各克枳實克橘皮克生薑克煎法用法同前本方亦以加半夏為佳茯芩飲之腹證本方中以有人參於腹證上則心下痞硬有枳實故上腹部當膨滿又以有茯苓朮橘皮生薑則認停水於胃內有茯苓朮故尿利減少或頻數因有茯苓而心下悸動有茯苓人參枳實橘皮生薑故至於吐水是以東洞翁於本方定義治心下痞硬而悸小便不利胸滿自吐宿水者則此腹證與仲景所論互考而可運用本方矣先輩之論說治驗方機本方主治曰胸中有痰飲滿而不能食者南呂吐出水心下痞硬小便不利者紫圓腳氣小便不利心下悸逆滿而嘔者蕤賓或紫圓建殊錄曰一人年已九十餘生來不信醫藥以為無益至是大崇先生之術謂家人曰余如有病其所賴唯東洞耳後數年患傷寒心胸煩熱譫語妄言小便不利食不進者凡六日家人乃召先生診之心胸煩滿四肢微腫乃作茯苓飲使飲之吐出水數升而愈初年六十雖盛夏重衣猶寒以為衰老也自病愈後更服綺絺無異少壯由此觀之蓋病也非衰老也成績錄曰一婦人患胃反九年醫治不效先生診之心下攣結吐而不渴食觸於口即不爽快心胸間有痰飲也即與茯苓飲服數日而愈類聚方廣義本方條曰治胃反吞酸嘈雜等心下痞硬小便不利或心胸痛者又治每朝噁心吐苦酸水或痰沫者兼用南呂丸或陷胸丸等治老人常苦痰飲心下痞滿飲食不消易下利者又治小兒乳食不化吐下不止及百日咳心下痞滿咳逆甚者均加半夏有特效脅腹苦有癖塊或大便難者兼用紫圓方伎雜志曰一婦人患所謂疝積留飲痛者三四年發則苦痛欲死醫治無效飲食漸減精力衰弱僅不死耳是時有美國名醫來橫濱求治者戶限為滿患者亦乘轎至橫濱乞診察美醫乃用種種器械診察鼻耳胸腹各部咸嘆觀止以為日醫不及也診畢云此證不治雖苦求之亦不與藥病人大失所望歸而悒鬱不食經家人親戚苦勸始漸進食並集議乞治於余余診之羸瘦而無血色心下痞硬脊痛無度時吐水飲食物不進夜不安眠故晝鬱鬱疲憊惡人余思初不禁食兼誤醫藥所致且面部四肢脫肉中現微腫脈雖沉弱想不必死之證因與茯苓飲加半夏每夜用消塊丸八分一月許痞硬吐水稍減胃納稍佳轉與當歸四逆加吳茱萸生薑湯兼用消塊丸一錢又一月餘諸患去飲食如常病人及家人均謝再造之恩可笑也枳實薤白桂枝湯之注釋胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之金匱要略註方輿輗本方條曰此方治心中痞氣結而胸滿自脅下逆搶於心者勿誤藥室方函口訣本方條曰此方治胸痹搶逆之勢甚心中痞結者雖為瓜蔞薤白白酒湯一類之藥但白酒湯主喘息胸痛半夏湯主心痛徹背不得臥此方主脅下逆搶心其趣各異新崎國林能用之治心腹痛及噎嗝反胃云由此二說本條之意可解矣枳實薤白桂枝湯方枳實厚朴各克薤白克桂枝克瓜蔞實克上細銼以水三合煎一合去滓一日分三回冷或溫服先輩之論說治驗東洞翁本方定義曰治胸痹胸腹滿痛上逆者求真按由此腹證上立論胸腹滿枳實厚朴之所治也治疼痛諸藥協力之所致主上逆則桂枝之力也方機本方主治曰心中痞胸脅滿自脅下逆搶心者胸滿心痛或背痛者南呂或控涎丹嗝噎胸痛者控涎或紫圓險證百問曰真膈噎者師曰真膈噎云云與枳實薤白桂枝湯或瓜蔞薤白白酒湯或茯苓飲或小陷胸湯并以紫圓攻之間有得治者其治者必有一塊物由胸下於腹初按脅下如半月狀盡下於腹則大如瓜乃噎止不吐飲食矣穢物下則如瓜者減而全得愈求真按此證恐因胃癌而愈著於鄰接臟器由藥力使之剝離故得愈矣生生堂治驗曰一人患胸痛嘔吐者已七年變為嗝噎師診之六脈細小心下悸有水聲瀝瀝然與枳實薤白桂枝湯每時下赫赫圓三十丸三日所下痢皆色黑如漆病勢頗退後十餘日心中懊憹吐膠固黑痰後所患方除後經十餘年之久復發而死類聚方廣義本方條曰世之所謂痰勞咳嗽胸滿而痛或脅肋肩背攣痛而吐黏痰或唾血者宜此方當以胸滿胸背攣痛為目的兼用南呂丸或姑洗丸薤白之醫治效用本草綱目曰薤白氣味辛苦溫無毒主治除寒熱去水氣溫中散結氣作羹食利病人諸瘡中風寒水氣腫痛搗塗之別錄煮食耐寒調中補不足止久痢冷瀉肥健人日華治泄痢下重能除下焦陽明之氣滯李杲好古曰下重者氣滯也四逆散加此以泄氣滯治少陰病之厥逆泄痢及胸痹刺痛下氣散血安胎時珍補虛解毒藏器本草備要曰薤辛苦溫滑調中助陽散血生肌泄下焦大腸之氣滯治泄痢下重胸痹刺痛肺氣喘急安胎利產塗湯火傷藥徵曰薤白主治心胸痛而喘息咳唾也兼治背痛心中痞方伎雜志曰薤白五月時採根之實割為二而置於乾臨用自小口切之黴樣氣出治痰飲胸痹肩背之痛等洵聖藥也類聚方中用薤白諸方其效可知矣由以上諸說本藥可謂為溫性解凝藥主治心臟性喘息心臟神經痛等有特能瓜蔞實之醫治效用本草綱目曰瓜蔞實氣味苦寒無毒主治胸痹悅澤人面別錄潤肺燥降火治咳嗽滌痰結利咽喉止消渴利大腸消癰腫瘡毒時珍補虛勞口乾潤心肺治吐血腸風瀉血赤白痢手面皺別錄本草備要曰瓜蔞仁甘補肺寒潤下能消上焦之火使痰氣下降為治嗽要藥又能蕩滌胸中之鬱熱垢膩生津利腸通乳消腫治結胸胸痹治一切之血證瀉者忌用藥徵曰瓜蔞實主治胸痹也兼治痰飲方伎雜志曰瓜蔞實由東洞翁先生之試驗用土瓜實也胸痹痰飲咳嗽其效非瓜蔞仁所及今藥鋪採鬻土瓜實者多且仲景方稱實非謂仁也由以上諸說觀之則本藥可謂為冷性之消炎解凝藥有主治心肺原因性喘咳胸痛等之特能瓜蔞薤白白酒湯之注釋胸痹之病喘息咳唾胸背痛短氣寸口脈沉而遲關上小緊數瓜蔞薤白白酒湯主之金匱要略註徐氏曰此段實注胸痹之證脈以後凡言胸痹皆當以此概之但微有參差不同耳故特首揭之以為胸痹之主證主脈主方也吉益南涯曰凡曰胸痹必有喘息咳唾之證胸痹之病喘息咳唾痰飲閉塞血氣而氣僅能通達而不暢行所致胸背痛短氣血氣欲流通故痛痰飲自外閉故短氣也脈沉而遲本上有寸口二字下有關上小緊數之五字是因自外痰飲閉塞之所見也遲實貌瓜蔞薤白白酒湯主之此湯逐痰飲循血氣也依此二說可解本條之義矣瓜蔞薤白白酒湯方瓜蔞實克薤白克上細銼以上清酒一合五勺煎五勺去滓頓服求真按本方及次方以白酒煎出雖為原法但日本不產此物故本吉益東洞翁之經驗以清酒代之先輩之論說治驗續建殊錄曰一婦人胸中痛煩悶無可奈何切而按摩之則其痛移於背飲食及藥汁均不能下若下咽則必痛甚一身肉脫而脈微細與瓜蔞薤白白酒湯服二三帖疼痛大減飲食得以下咽爾後經十餘日痛再發以粉蜜湯作丹兼用之不數日痊愈類聚方廣義本方條曰胸痹心胸痛徹背者非此二方不能治求真按此二方者謂本方及次方也而尤以下方為勝隨證兼用姑洗丸真心痛不得息者宜選用以下二方瓜蔞薤白半夏湯之注釋胸痹不得臥心痛徹背者瓜蔞薤白半夏湯主之金匱要略註本條胸痹之下當看做喘息咳唾胸背痛短氣之九字解不得臥者喘息咳唾短氣所使然心痛即心臟神經痛徹於背部不外胸背痛之增劇者故本方主治前方證之劇者二者之異處乃在半夏之有無以是可見其治效矣東洞翁本方定義云治瓜蔞薤白白酒湯證而嘔者又按云當有嘔或胸腹鳴證此不過但云半夏治效之一部耳不足為定義然可供參考瓜蔞薤白半夏湯方瓜蔞實克薤白克半夏克煎法用法同前先輩之論說類聚方廣義本方條曰千金瓜蔞湯瓜蔞實一枚半夏半斤薤白一斤枳實二兩生薑四兩上五味㕮咀以白酒一斗煮取四升服一升主療正同求真按主療正與本方同意也今試之於瓜蔞薤白半夏湯證而心胸痞滿者甚良求真按此擴充本方方意也可隨證用之蛔痛間有疑似二方證者然二方必有痰涎短息且痛必徹背蛔痛必吐清水或白沫或噁心或痛有轉移以此為異耳甘草湯之注釋少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯傷寒論註仲景稱少陰病云云有深意存焉可參照太陽病篇半夏散及湯條但本方不限於少陰病總以主治急迫者故雖咽喉痛但視診上無著變只由急迫而疼痛者以本方為主治也詳細處可對照太陽病篇甘草之醫治效用條甘草湯方甘草克上細銼以水一合煎五勺去滓溫服先輩之論說得效方曰獨勝散求真按即本方也解藥毒蟲毒毒蟲蛇諸毒外臺秘要曰近效一方求真按此亦本方也療赤白痢日數十行不問老少錦囊秘錄曰國老膏求真按此即本方之煉藥也一切癰疽將發預期服之則能消腫逐毒使毒氣不內攻其效不可具述聖濟總錄曰甘草湯治熱毒腫或身生瘭漿者又治舌卒腫起滿口塞喉氣息不通頃刻殺人求真按以上諸證本方有效者悉皆由治急迫之能也類聚方廣義本方條曰凡用紫圓備急圓梅肉丸白散等未得吐下快利噁心腹痛苦楚悶亂者用甘草湯則吐瀉俱快腹痛頓安孫思邈曰凡服湯而嘔逆不入腹者先以甘草三兩水三升煮取二升服之得吐若不吐則益佳消息定後服餘湯即流利不更吐矣此急迫憒悶之證不與半夏生薑之所主病同情宜注意處置之桔梗湯之注釋少陰病二三日咽痛者可與甘草湯不瘥者與桔梗湯傷寒論註與甘草湯而咽痛不瘥者可與本方之意以甘草湯不治之咽痛其證候不僅由於急迫是因咽喉內發赤腫脹或化膿也故加桔梗於甘草湯中以治急迫並以治療器質的病變也咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之金匱要略註咳而胸滿者因咳而心下部膨滿之意唾與痰同義出濁唾腥臭者咯出有腥臭之濁痰也又肺癰者為咯出膿或膿血的病證之泛稱包含現今之腐敗性及化膿性氣管炎及急性肺炎肺壞疽肺膿瘍等證也在金匱因本方與桔梗白散之主治相等而引起種種之議論如尾臺榕堂曰咳而胸滿振寒脈數云云此肺癰證之至劇至重者雖與白散猶且難求其效況此方乎金匱桔梗湯與外臺之桔梗白散證治正同全屬錯誤驗之事實二方所主治其病之輕重治之緩急自判然矣此說不為無理但因此引起有桔梗白散證而無桔梗湯證之不合理之理點故淺田氏曰若咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為嚴重之證候若精氣耗損不能攻者宜桔梗湯由是觀之二方之主治正同恐其間解有虛實之差者較為妥當耳桔梗湯方桔梗克甘草克上細銼以水三合煎一合去滓一日分三回溫或冷服先輩之論說聖惠方曰喉痹腫痛飲食不下者宜服此方服後膿出即消和劑局方曰如聖湯求真按即本方也治風熱毒氣上攻咽喉咽痛喉痹腫塞煩悶及肺癰咳嗽咯唾膿血胸滿振寒咽乾不渴時出濁沫氣息腥臭久久吐膿狀如米粥又治傷寒之咽痛預備百要方曰治喉痹飲食不通欲死之方求真按即此方也兼治馬喉痹馬項長故凡痹在項內深而不見腫連於頰壯熱吐氣數者是也證治準繩曰痘瘡初出咳嗽到今未愈者是肺中之餘邪未盡也宜甘桔湯求真按即本方也求真按本方以祛痰作用為主鎮咳作用為客也不可誤東洞翁本方定義曰治甘草湯證有腫膿或吐黏痰者又曰按黏痰如膿者主之求真按此說雖是若不作有膿或有膿血者亦主之則不完方機本方主治曰咽痛者應鐘咽中腫不能飲食者肺癰應鐘癰疽伯州或梅肉初發者宜灸之諸腫有膿者伯州梅肉叢桂亭醫事小言曰肺癰出於靈樞素問隱隱而痛者肺疽也上肉微起者肺癰也此病初發無異風邪咳嗽引膈而咳痛其痛處隱隱於左右之肋骨間張戴人云限於左脅余所見則不然常有咳嗽而引釣痛故用意不辨則誤矣此證音聲發金鏽聲又云水咳樣聲類似於麻疹之咳濁唾臭其中有如米粥之團塊痰而似於膿故投於水則膿沉形散而凝於底有如米粥間有帶血者尤有腥臭醫燈續焰曰試肺癰法凡人覺隱痛咳嗽有臭痰吐在水內沉者是癰膿浮者是痰也其人言語氣息頗臭而自己亦覺臭氣膈間且有弱痛或背脊有隱隱微腫張戴人云有微寒熱自汗盜汗而似勞瘵者更其證脈浮洪或大數或滑數等皆可治此證之各證候均以桔梗為主藥求真按雖如南陽氏說此證以桔梗為主藥但亦有以薏苡仁為主藥者矣排膿湯之注釋瘡癰腸癰浸淫病脈證並治法金匱要略問曰寸口脈微浮而澀法當亡血若汗出設不汗者云何師曰若身有瘡被刀斧所傷亡血故也此名金瘡無膿者王不留行散主之有膿者排膿散主之排膿湯亦主之排膿湯方甘草二兩桔梗三兩生薑一兩大棗十枚上四味以水三升煮取一升溫服五合日再服求真按換算今之克量則如下甘草克桔梗克生薑克大棗克上細銼以水三合煎一合去滓一日分三回溫服有是方而無證後學無所適從茲錄東洞翁之說如下排膿湯之證雖缺若據桔梗湯觀之則其主治也明矣桔梗湯證曰出濁唾腥臭久久吐膿仲景曰咽痛者可與甘草湯不瘥者與桔梗湯是乃以甘草緩其毒之急迫而吐濁唾膿非甘草之所主也故不瘥者乃加桔梗也由是觀之若腫痛急迫時則用桔梗湯吐濁唾膿多時則用排膿湯求真按腫痛急迫為主吐濁唾膿為客時則用桔梗湯吐濁唾膿為主腫痛急迫為客時宜用排膿湯上說論定學者須根據此說以運用本方先輩之論說治驗金匱要略本義曰排膿湯之一方尤為緩治蓋上部胸喉之間有欲成瘡癰之機則當急服之求真按用本方者可不問體之上部或下部及瘡癰之將成與已成無乎不可張氏醫通曰排膿湯治內癰從嘔膿而出者求真按內癰者即體內部的化膿性疾患之本方證可以不問膿之從嘔而出或從咳嗽而出或從二便而出悉皆用本方為佳東洞翁本方定義曰治諸瘍有膿血或吐黏痰而急迫者求真按可與東洞翁之前說對照續建殊錄曰一男子某患肺癰其友人佐佐氏投藥爾後膿從口鼻出兩便皆帶膿或身有微熱而時惡寒身體羸瘦殆如不可藥乃來求治先生與排膿湯及伯州散經日而瘳一人患淋病七年百治不效其友人有學醫者診之與湯藥兼用七寶丸或梅肉散久服無效於是請治於先生先生診之小腹攣急陰頭含膿而疼痛不能行步乃作排膿湯與之服湯數日舊疴全瘳求真按本方中以含甘草大棗於腹證上右腹直肌攣急南涯氏稱小腹攣急蓋此意也成績錄曰一男子患癰俗謂發背者大如盤一醫療之三月不瘥因轉醫加外治腫痛引股小便難大便不通腹硬滿短氣微喘舌上無苔脈弦數先生視其硬滿與大黃牡丹皮湯穢物下硬滿減但唯發背自若喘滿時加濁唾黏沫如米粥因與排膿湯兼服伯州散吐黏痰數升諸證痊愈求真按以一方並治癰腫及肺癰可見其妙矣桔梗之醫治效用藥徵曰桔梗主治濁唾腫膿也兼治咽喉痛上四方皆仲景之方也而排膿湯以桔梗為君藥其證不載今乃歷觀用桔梗諸方或曰肺癰或曰濁唾腥臭或曰吐膿而以桔梗為君藥者名為排膿則其能排膿也明矣諸說雖是若不以主治為濁唾腫膿或膿血或祛痰困難等及兼治咽喉腫痛者則不全本草備要曰桔梗苦辛微溫開提氣血表散寒邪清利頭目咽喉胸膈之滯氣凡痰壅求真按是壅滯於咯痰之支氣管或肺泡內而不得咯出者如毛細管炎及肺炎等即此例也喘息求真按是亦限於由咯痰之壅滯者鼻塞乾咳求真按此乾咳欲將鬱滯者由咯痰咯出然者與其他乾咳異胸膈刺痛求真按是鬱滯於肺泡內之咯痰刺激於胸膜故也並宜以桔梗開之養血排膿補內漏故治肺癰此說雖不脫陰陽五行之氣味但可取之處不少故合上二說可以知本藥之作用矣芍藥甘草湯之注釋傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯以攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之傷寒論註傷寒脈浮自汗出小便數心煩微惡寒腳攣急者為表裡陰陽相半證即為桂枝加附子湯證故不能治其陰證與桂枝湯發表者誤也若已與之而誤治便發為四肢厥冷咽中乾煩躁吐逆之變證此時宜與甘草乾薑湯使恢復其陽即血氣是也若服此湯後四肢厥冷恢復足溫暖者則更與芍藥甘草湯時其足自能伸展也芍藥甘草湯方芍藥甘草各克上細銼以水二合煎一合去滓一日分三回溫服芍藥甘草湯之腹證已述於太陽病篇之芍藥及甘草之醫治效用其腹證現腹直肌攣急故認此腹證而處本方時不僅主治下肢而已即上肢之攣急及其他因一般臟器組織之緊縮急劇而發諸證此東洞翁所以謂本方以治拘孿急迫者為定義也先輩之論說治驗魏氏家藏方曰六半湯求真按即本方也治熱濕腳氣不能行步者內科摘要曰芍藥甘草湯治小腸府發咳而矢氣求真按矢氣放屁也者朱氏集驗方曰去杖湯求真按即本方也治腳弱無力行步艱難者醫學心悟曰芍藥甘草湯止腹痛如神古今醫統曰芍藥甘草湯治小兒熱腹痛小便不通及治痘疹之肚痛求真按本方非利尿劑此說不可輕信建殊錄曰雲州醫生祝求馬年二十許一日忽苦跟痛如錐刺如刀刮不可觸近眾醫無能處方者有一瘍醫以為當有膿以刀劈之亦無效於是迎先生診之腹皮按之攣急不馳作芍藥甘草湯使飲之一服即已生生堂醫談曰有一翁五十餘歲閑居則安靜稍勞動即身體疼痛不寧家事廢治者殆三十年醫藥亦無一驗來請余治察視周身有青筋放之毒血進出甚多即與芍藥甘草湯後來請治十次而復常耕稼隨意矣求真按此證宜刺絡外並宜合用桂枝茯苓丸於芍藥甘草湯中麻疹一哈曰一人患麻疹疹後經數十日自舌本之左邊至牙齦腫痛如刺又自耳後連左額痛楚不堪呻吟之聲達於四鄰更醫十一人芎黃梅肉之類亦無所不知或緩或急遷延自若越二年春三月請余診治舌本強直腫痛不能言妻為代告苦楚之狀因按其腹自心下至臍上惟腹皮拘急甚而無他異乃作芍藥甘草湯使飲之下痢日二三行三日痛楚減半二十日許腫痛痊愈已能言語矣再為詳悉腹候胸腹微滿時或微痛以紫丸攻之服後每下利如傾約十日許用一次凡五六次約經百日許諸證治愈而健食倍常云求真按本方非下劑服之下痢者是即瞑眩也類聚方廣義本方條曰治腹中攣急而痛者小兒夜啼不止腹中攣急甚者亦有奇效芍藥甘草附子湯之注釋發汗病不解反惡寒者虛故也芍藥甘草附子湯主之傷寒論註有表證當發汗則病解而惡寒止雖為至當之發汗但病不惟不治而反惡寒者此非表證之惡寒是因身體虛弱之所致故宜以本方為主治之意也芍藥甘草附子湯方芍藥甘草各克附子克上細銼以水三合煎一合去滓一日分三回溫服芍藥甘草附子湯之腹證本方為芍藥甘草湯加附子故其腹證亦即芍藥甘草湯之腹證加有附子證者以為本方之腹證也東洞翁以本方治芍藥甘草湯證之惡寒者為定義將芍藥甘草湯證與此仲景論參酌雖不為無理但惡寒二字只能代表附子之外證而無脈腹二證之意味故其說未為盡是先輩之論說張氏醫通曰芍藥甘草附子湯治瘡家發汗而成痙者類聚方廣義本方條曰治痼毒沉滯四肢攣急難以屈伸或骨筋疼痛寒冷麻痹者兼用七寶承氣丸或十乾承氣丸此方加大黃名芍藥甘草附子大黃湯治寒疝腹中拘急惡寒甚腰腳攣痛睾丸柳腫二便不利者有奇效勿誤藥室方函口訣本方條曰此方不僅治發汗後之惡寒並治芍藥甘草湯證之屬於陰位者又附子代以草烏頭而有治蟲積痛之妙又活用於疝病或痛風鶴膝風等由痛風而鶴膝也以綿包足云有效於冷證凡下部之冷專於腰以下者芩薑朮甘也專於腳部者此方也又濕毒之後足大冷者亦可用之若有餘毒者可兼用伯州散甘草小麥大棗湯之注釋婦人臟躁喜悲傷欲哭象如神靈所作數欠伸甘麥大棗湯主之金匱要略註臟者子宮也臟躁者子宮病性神經證也喜及數字屢之意像如神靈所作者病者言動之狀態恰如神靈憑依而使動作之意也欠伸者呵欠也甘草小麥大棗湯方甘草克小麥克大棗克上細銼以水二合煎一合去滓一日分三回溫服甘草小麥大棗湯之腹證本方以有甘草大棗於腹證上是右腹直肌攣急若有此腹證不問老少男女與本方頗佳先輩之論說治驗東洞翁本方定義曰治急迫而驚狂者古方便覽本方條曰一婦人年二十八無故悲泣不止余診之腹皮攣急小腹有塊即作此方及硝石大圓四五日愈方輿輗本方條曰此方在金匱治婦人臟躁實可不拘男女老少妄自悲傷啼哭者用之皆有效蓋甘草大棗者緩急迫也小麥者靈樞云心病宜食小麥千金云小麥養心氣凡以心疾而迫者概可用之近有一婦人笑不止諸藥無效余沉思良久笑與哭是出於心之病也因與甘麥大棗湯不日得愈一小孩晝夜啼哭不止用甘連紫丸芍藥甘草等無寸效試與甘麥大棗湯一兩日而止自是以後用治小兒啼哭甚多此方本療婦人臟躁悲傷證然能有利於嬰兒又如此故凡用藥當無老少男女之別於方書雖有標婦人稱小兒者但可不必拘執也生生堂治驗曰一婦人妊娠至五月患水腫及分娩尚甚爾後發癇狂呼妄罵晝夜無常將脈則張目舉手勢不可近因換以甘麥大棗湯服百數帖漸漸復原類聚方廣義本方條曰臟子宮也此方治臟躁以能緩急迫也孀婦室女平素憂鬱無聊夜夜失眠等人多發此證發則惡寒發熱戰慄錯語心神恍惚坐臥不安慘泣不已服此方有立效又癇證狂證仿佛前證者亦有奇驗勿誤藥室方函口訣本方條曰此方雖為主治婦人臟躁之藥但凡右腋下及臍旁有拘攣結塊處用之有效又用於小兒啼泣不止者有速效又有用於大人之癇病是根據病急者食甘以緩之之意也小麥之醫治效用本草綱目曰小麥氣味甘微寒無毒恭曰小麥作湯不許皮坼坼則性溫不能消熱止煩也主治除客熱止煩渴咽燥利小便養肝氣止漏血唾血令女人易孕別錄養心氣心病宜食之思邈煎湯飲治暴淋宗奭陳者煎湯飲止虛汗燒存性油調塗諸瘡湯火傷灼時珍小麥中由含多量之澱粉雖不難推知有緩和包攝作用但如恭氏之說觀之則其外皮有解熱消炎緩和腦神經之特能矣甘草粉蜜湯之注釋蛔蟲之為病令人吐涎心痛發作有時毒藥不止者甘草粉蜜湯主之金匱要略註方輿輗本方條曰蛔蟲之心腹痛發作有時毒藥無效者以此甘平之品而得安者間有之此證脈多洪大者也勿誤藥室方函口訣本方條曰此方不僅治蛔蟲之吐涎雖無吐涎亦可用於心腹痛甚者故若投烏梅丸或鷓鴣菜湯等而反激痛者與此湯而弛緩時必止腹痛也凡治蟲積痛嫌藥苦味強與則嘔噦者宜此方論中毒藥不止四字宜深味之故諸病服眾藥而嘔逆不止者有效一婦人傷寒熱甚嘔逆不止用小柴胡湯不解一醫為水逆與五苓散益劇與此方嘔逆即瘥此即玉函單甘草湯之意更妙由此二說觀之則以毒藥不止者是以他種之驅蛔藥使人吐涎不能止心痛發作有時之證也甘草粉蜜湯方甘草克鉛粉克蜜克以水九勺先煮甘草取六勺去滓納粉蜜煎如薄粥頓服之求真按原書只云粉但未明何種之粉末諸說紛紜莫衷一是現余依下列尾臺說為鉛粉類聚方廣義本方條曰粉者粉錫也千金用梁米粉外臺用白梁粉近世又有用輕粉甘草粉等者俱誤也余家以粉錫大黃二味等分為丸名粉黃丸治蛔蟲心腹攪痛吐白沫者蛔下其痛立愈按神農本經曰粉錫殺三蟲陶弘景曰療尸蟲李彣之陳藏器曰殺蟲又本草綱目粉錫條引邵真人治婦人心痛方曰急者官粉為末和蔥汁丸如小豆大每服七丸黃酒送下即止粉能殺蟲蔥透氣故也又引張文仲備急方云治寸白蛔蟲以胡粉炒燥入方寸匕於肉臛中空心服有大效又蔥白條引楊氏經驗方云蛔蟲心痛用蔥白莖二寸鉛粉二錢搗丸服之即止蔥能通氣粉能殺蟲也粉錫驅蟲之功學者宜體驗之三蟲者蛔蟲蟯蟲寸白蟲也先輩之論說東洞翁本方定義曰治吐涎吐蟲心痛發作有時者方輿輗本方條曰此本治蟲痛之方也吾常活用於水飲之腹痛而得效者甚多但此藥若不應手足身體即發腫者此胃氣將復之佳兆也浮腫者不可遽用利水劑經日則自消矣若或不消者與腎氣丸等亦可大凡一旦無腫而愈者永不再發百試百效真可謂神方矣此事古書未曾道及即今復古之大醫先生亦有所不知也余不秘惜而記之以告同志生薑甘草湯生薑甘草大棗人參之注釋千金生薑甘草湯治肺痿咳唾涎沫不止咽燥而渴金匱要略註東洞翁本方定義曰治咳唾涎沫不止心下痞硬者仲景方中用人參者以此方用量最大又按當有心下痞硬腹拘急之證此說是示腹診上有人參證者為心下痞硬有甘草大棗證者為腹直肌攣急者也故本方宜參酌仲景之論與翁之所說而用之但依余之經驗此方於臨床上不甚緊要師所以特別提出者蓋欲示此方包含小柴胡湯等之方意耳生薑甘草湯方生薑克人參克甘草大棗各克上細銼以水二合五勺煎一合去滓一日分三回溫或冷服甘遂半夏湯之注釋病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之金匱要略註和久田氏曰心下堅腹滿有青筋者為甘遂半夏湯之腹證其心下堅者似枳朮湯及桂薑草棗黃辛附湯之腹而如覆杯但宜依各外證而分辨之又其有青筋者似於大黃甘遂湯證但彼心下不成堅滿是其別也或雖無腹脹滿及青筋但心下堅滿者是此方證也此堅滿亦留飲所作而加血結者也半夏甘遂者逐下有痰飲留於心下者甘草芍藥者解血結攣急者是故外證必有短氣宜兼痰飲之變而為脅下攣痛等證論曰病者脈伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘遂半夏湯主之按本文有錯置此為留飲欲去故也八字當在利反快之下大意病者脈伏時其人未藥但欲自利凡自利者不當有快利因病而下利故也然其自利反快者此下利因留飲欲去故也留飲下於胃中而自利欲去則病毒自解而利反快也若心下由初起堅滿雖下利但不減續自堅滿者是雖有下利但為留飲無獨自欲去之候以甘遂半夏湯下其心下堅滿之留飲也十棗湯主引痛此方主心下堅滿是其別也由此說雖可意解本條但由余之經驗此心下堅滿者是肝臟左葉腫大漫延於心下之意味故本條當述肝臟腫大尤其為硬變證及因此而成腹水之證治者也甘遂半夏湯方甘遂克半夏克芍藥克甘草克上藥以水一合六勺煮取四勺去滓納蜜四勺煎取五勺頓服之先輩之論說東洞翁本方定義曰治芍藥甘草湯證而心下痞滿及嘔者又曰按為芍藥甘草湯之加減方也故當有攣急證類聚方廣義本方條曰治飲家心下滿痛而欲嘔吐或胸腹攣痛者此方之妙在乎用蜜故若不用蜜不特不得效且有因瞑眩而生變者宜遵守古法用之求真按此瞑眩非真瞑眩實中毒也不可混之勿誤藥室方函口訣本方條曰此方以利反快與心下堅滿為目的而脈不當伏也雖為去一切心下留飲之主方實非僅留飲已也凡支飲及腳氣等有氣喘急者用之有緩急之妙控涎丹本於此方之輕處者又此方若不加蜜則無反激之效二宮桃亭壯年時因用此方不加蜜而致敗事受東洞之督責可不慎諸求真按脈伏者為水毒鬱滯劇烈之徵故以此脈候與腹證為目的而用此峻下劑也云脈不當伏者非也不可從之十棗湯之注釋太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裡未和也十棗湯主之傷寒論註和久田氏曰心下痞硬而滿引脅下痛若以指頭稍觸心下及脅下之邊即驚恐而痛或咳則引連脅腹或動身舉手則胸乳痛即呼吸時亦無不如是因水飲留於胸間心下而不下之所致也故名懸飲懸者鉤掛也例曰飲後水流在脅下咳唾引痛謂之懸飲是也此方主治支飲或咳家由胸間脅下心下之水飲引痛者論曰太陽中風下利嘔逆表解者乃可攻之太陽中風因表邪而水氣走於裡而致下利嘔逆者凡表邪未解者不可治下利嘔逆當治其表表邪散而下利嘔逆自止矣求真按此葛根加半夏湯之所主治也若表邪解仍有下利嘔逆者若係水飲則可攻去其水矣其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裡未和也十棗湯主之此人病太陽中風兼裡證也漐漐汗出者汗至微貌也可知其謂遍身漐漐微似有汗也而其汗為發作有時而非常出若為表證則非發作有時當時常汗出也頭痛亦非表證水氣上逆而痛也自心下痞硬滿引連脅下痛時非熱結之心下痞硬是示水飲在心下之所致此心下痞硬滿而乾嘔者當不因於表邪短氣亦非裡實之候水留心氣之所致求真按是水留於心之意謂汗出不惡寒是表證已解明矣此汗出非謂漐漐汗出謂表證解時雖一旦汗出而惡寒已止矣此謂為水氣在裡其表證雖解而裡未解也十棗湯非解裡熱之劑是下水氣在裡使和諧表裡之方也總之以心下痞硬滿引脅下痛為此證之眼目攻之而水瀉則餘證可隨而解矣謂表解者雖頭痛乾嘔亦非表證皆裡水之所致也按此說深得本條之義病懸飲者十棗湯主之金匱要略註解在前條咳家其脈弦為有水十棗湯主之金匱要略註為有水者為有水懸之略也夫有支飲家咳煩胸中痛者不卒死至一百日或一歲十棗湯主之金匱要略註支飲者咳逆倚息短氣不得臥其形如腫者是也支飲家者有此宿疾的病者也此病者若咳煩兼胸中痛時不急死猶能生存一百日或一年然放置之則遂至於死故當用本方驅逐水毒也歸納以上之仲景所論則用本方者當以心下痞硬滿之腹證與弦或沉弦之脈應為主目的而以咳嗽頻發或牽引痛為副目的者也故不問咳嗽的原因為支氣管或胸膜或心臟或肋間之神經痛與四肢等皆可用之也而如本方之治咳嗽及牽引痛者固由諸藥協力之作用但其主藥以大棗為君故也十棗湯方芫花甘遂大戟各等分上為細末以水一合先煮大棗克取五勺去滓納上藥末克攪和頓服之先輩之論說治驗外臺秘要曰深師朱雀湯求真按此即本方也治久病癖飲停痰不消在胸膈上液液時若頭痛眼睛攣身體手足十指甲盡黃者又治脅下支滿若飲即引脅下痛者汪氏曰陳無擇之三因方以十棗湯藥料為末用棗肉和為丸治水氣四肢浮腫上氣喘息大小便不通者蓋善變通者也嘉定縣志曰唐杲字德明善醫治大倉武指揮之妻起立如常臥則氣絕欲死杲曰是懸飲也在喉間坐則遂故無害臥則壅塞諸竅不得出入而欲死也投以十棗湯而平東洞翁本方定義曰治病在胸腹掣痛者方機本方主治曰胸背掣痛不得息者成績錄曰一婦人心胸下硬滿痛不可忍乾嘔短氣輾轉反側手足微冷其背強急如入板狀先生與十棗湯一服而痛頓止下利五六行諸證悉愈生生堂治驗曰一婦人年三十餘每咳嗽輒小便涓滴而污下裳者數回醫或以為下部虛或以為畜血經過各種治法百數日先生切按之其腹微滿心下急按之則痛牽兩乳以及於咽而咳至不禁與十棗湯每夜五分五六日瘥類聚方廣義本方條曰治支飲咳嗽胸脅刺痛及肩背手腳走痛者痛風及支飲走注手足微腫者與甘草附子湯兼用此方則有掎捔之功為丸用亦佳勿誤藥室方函口訣本方條曰此方主懸飲內痛懸飲云者外邪內陷胃中之水引舉入胸而成水飲在胸也又雖有外表方張之情形而汗出兼有頭痛發熱等證者但以裡水為主而以表為客也故以胸下痛乾嘔短氣或咳煩水氣浮腫上氣喘急大小便不利為目的而可與此方又引缺盆為目的而用之其脈沉而弦或緊也又此方烈處而用者亦不覺之因咳家之水飲若舍置之則變為勞瘵雖無引痛而見水飲之候者亦可直用此方前田長庵之經驗一人手腫其餘無恙元氣飲食如故者用此方而水得瀉則速愈可謂妙手矣橘窗書影曰一人時時肩背急痛脅下如刺呼吸迫逼不得動搖醫皆以為痰飲治之而不愈余以為懸飲之所屬與十棗湯得大效其人平日嗜酒食肉不能攝養五六年後此證大發卒斃葶藶大棗瀉肺湯之注釋肺癰喘不得臥葶藶大棗瀉肺湯主之金匱要略肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞者葶藶大棗瀉肺湯主之金匱要略註清涕出者稀薄鼻涕出也不聞香臭酸辛者嗅覺脫失也支飲不得息葶藶大棗瀉肺湯主之金匱要略註此不得息呼吸困難因水毒充滿氣道也葶藶大棗瀉肺湯方葶藶克大棗克以水一合八勺先煮大棗取一合二勺去滓納葶藶煮取五勺去滓頓服先輩之論說治驗醫學綱目曰孫兆視雷道矩病吐痰頃間已及一升喘咳不已面色鬱暗精神不快兆與仲景之葶藶大棗湯使服之一服訖已覺胸中快利略無痰唾矣聖濟總錄曰葶藶湯求真按即本方也治傷寒後上氣喘粗身面腫小便澀者東洞翁本方定義曰治浮腫咳逆喘鳴迫塞胸滿強急者求真按強急者謂胸腹肌強而攣急也甘遂大戟芫花葶藶之醫治效用此四藥者為主治瀉下胸廓之停水的峻藥但以甘遂為最有力大戟芫花次之葶藶更次之故雖皆主治胸痛及咳嗽喘鳴但其異處前三者鎮痛作用為主喘咳作用為客後者治喘咳作用為主鎮痛作用為客宜參照下說本草備要曰甘遂苦寒有毒能瀉腎經及隧道之水濕直達水氣結處以攻決為用為下水聖藥主十二種水大腹腫滿瘕疝積聚留飲宿食痰迷癲癇虛者禁用藥徵曰甘遂主利水也兼治掣痛咳煩短氣小便難心下滿本草備要曰大戟苦寒有毒能瀉藏府之水濕行血發汗利大小便治十二種水腹滿急痛積聚瘕結頸腋之癰腫通經墮胎瀉肺誤服則損真氣藥徵曰大戟主利水也兼治掣痛咳煩本草備要曰芫花苦溫有毒去水氣痰癖療五水在五藏皮膚脹滿喘急痛引胸脅咳嗽瘴瘧藥徵曰芫花主逐水也兼治咳及掣痛本草備要曰葶藶辛苦大寒屬火性急也大能下氣行膀胱之水肺中水氣急者非此不能除破積聚癥結伏留熱氣消腫除痰止嗽定喘通經利便久服令人虛藥徵曰葶藶主治水病也兼治肺癰結胸用葶藶之證浮腫清涕咳逆喘鳴者也大陷胸湯之注釋太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出餘處無汗劑頸而還小便不利身必發黃也茵陳蒿湯主之傷寒論註自首句至表未解也一段文意可以頭痛發熱至表未解也數句接太陽病脈浮而動數之下觀之又此證如下說成氏曰動數皆陽脈也當責其邪在表錢氏曰表未解者乃桂枝湯證也若係桂枝湯證則表未解之下宜有桂枝湯字句即假定可解者自浮則為風至數則為虛之數句雖釋脈浮而動數之一句但為王叔和之注文摻入之說為多則宜以省略為佳故全體之意云太陽病脈浮而動數頭痛發熱微盜汗出反惡寒者表證未去則當以桂枝湯發汗不可下也然若誤下時仲景曰病發於陽而下之則因熱入而為結胸病發於陰而反下之因為痞所以成結胸者以下之太早故也因誤下表熱內陷而至於成結胸者此解在下為欲示此結胸之證治因醫反下之以下之建論也即醫反下之不可下而下故云反也動數變遲表證動數之脈因誤下表邪內陷變為遲脈者為病毒內實之應也拒痛拒者反抗之意拒痛者因胸廓內之正氣與內陷之邪氣抗爭而發為痛也胃中空虛謂因誤下損胃之正氣也客氣動膈客氣者邪氣之意故客氣動膈者內陷之邪氣衝動胸內也短氣躁煩短氣者呼吸短促之意躁煩者擾亂煩悶也心中懊憹解揭梔子豉湯條陽氣內陷陽氣者客氣之別稱即邪氣在表之意故陽氣內陷者因誤下在表之邪氣即表熱內陷也心下因硬者則為結胸大陷胸湯主之因者關係於前所舉之事實也故心下因之以下舉前事之關係而心下部致硬者稱為結胸當即以本方為主治也傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之傷寒論註本條論非因誤下而為自然之結胸傷寒經過六七日頃為當發柴胡證之時期則所謂傷寒六七日結胸熱實者暗示由柴胡證而至於結胸也並謂結胸之熱實即熱證且係實證也而沉脈者謂不病於外而在於內之候緊脈者有水毒之徵故沉而緊云者其結胸不僅由熱毒是指示水毒亦與有力焉又心下痛者心下部自有作痛也石硬者如石堅硬也傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之傷寒論註傷寒經過十餘日頃為當發陽明證之時期則雖云熱結在裡若為陽明證時理當但熱不寒茲為熱結在裡而又往來寒熱者非純陽明證而為少陽陽明之合病也明矣故云與大柴胡湯也然反之只為結胸而無大熱且無往來寒熱只由頭部微出汗者與純熱結證異由水熱二毒前條云結胸熱實而本條云水結由是觀之則結胸由於水熱二毒也明矣凝結於胸脅者故以本方為主治也丹波元堅曰結胸者何耶因飲邪求真按飲即水毒邪即熱毒也相結盤踞於胸膛求真按胸膛胸廓也遂及於心下者是也明理論曰所謂結者係結之結若不能分解者也此說能釋結胸當深思之太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱心胸發大煩從心下至少腹硬滿而痛不可近者大陷胸湯主之傷寒論註太陽病若發汗而解則不可再發汗又不可下之為法然重發汗而復下之者皆為誤治故加一復字是暗示此意雖與初條表熱內陷而作結胸者一樣但於彼條誤治僅一回止為比較的輕證而本條則由屢次之誤治故有重證之差耳即於此五六日便不通舌乾燥而渴心部發大煩至日沒時現潮熱者不獨心下部且至下腹部皆堅緊滿而疼痛且知覺極過敏而為手指不能近之劇證也傷寒五六日嘔而發熱者柴胡證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯傷寒論註解詳小柴胡湯條大陷胸湯方大黃克芒硝克甘遂克上細銼以水一合五勺先煮大黃取五勺去滓納芒硝溶後納甘遂末攪和頓服之先輩之論說治驗柯琴方論曰大陷胸湯丸求真按此即本方為丸方者也若比大承氣湯則更峻治水腫及痢疾初起者甚有捷效然必視其身體壯實者而施之若平素虛弱或病後不任攻伐者當慮有虛虛之禍求真按不特限於本方總之甘遂劑若辨證不明則不可輕用古方便覽曰胸高起或跼背成佝僂狀者或腹內陷下而濡引連於背腳細軟羸瘦不能步行手臂不遂者此方頗佳求真按本方不背陷胸之名能治胸廓前後高起所以能治龜胸及壓迫性脊髓麻痹類聚方廣義本方條曰肩背強急不能言語忽然而死者俗稱早打肩急以針放血並與此方以取峻瀉可回一生於九死中求真按余亦嘗以本方用於此證而得奇效腳氣衝心心下石硬胸中大煩肩背強急短氣不得息者或產後血暈及小兒急驚風胸滿心下石硬咽喉痰潮直視痙攣胸動如奔馬者或真心痛心下硬滿苦悶欲死者以上諸證若非治法神速方劑峻快則不能救治宜用此方是摧堅應變之兵也惟能得其肯綮執其樞機者乃可用之耳勿誤藥室方函口訣本方條曰此方為熱實結胸之主藥其他胸痛劇者有特效一士人胸背徹痛晝夜苦楚不可忍百治無效自欲死服大陷胸湯三帖而霍然又腳氣衝心昏悶欲絕者服此方而蘇凡醫者臨危證若無此手段則不可又因留飲而凝於肩背者有速效小兒龜背等有用此方者其輕者宜大陷胸丸又小兒欲成龜胸者早用此方則可收效橘窗書影曰一男孩年十一腹滿而痛嘔吐甚不能納藥醫作疝治增劇胸腹脹痛煩躁不可忍余作大陷胸湯使淡煎冷飲須臾吐利如傾腹痛煩躁頓減後與建中湯時時兼用大陷胸丸而平復求真按此證以胸腹脹痛煩躁為主證而嘔吐其客證也故以主證為目的而處以本方則客證不治而自治矣若誤以嘔吐為主證而用小半夏湯等之鎮吐劑不僅嘔吐不能治且其死期可待以是可知主客之不可忽也二人嘗患腹痛一日大發腹堅滿自心下至小腹刺痛不可近舌上黃苔大小便不利醫以為寒疝施藥反增嘔逆晝夜苦悶難堪余診之以為結胸與大陷胸湯因嘔氣而不能下痢乃以唧筒自穀道灌入蜜水爾後大便快利數十行嘔止腹滿痛頓減後與建中湯而痊愈求真按主證先現客證後見大陷胸丸之注釋結胸者項亦強如柔痙狀下之則和宜大陷胸丸傷寒論註病結胸者不僅心下硬滿且項部亦強其狀恰如柔痙者以大陷胸丸瀉下之則復常態也如柔痙狀者柯氏云頭不痛而項猶強不惡寒而頭汗出故曰如柔痙狀即似葛根湯證之項背強急而不頭痛不惡寒而自汗出者又此證所以不用大陷胸湯者山田氏云凡結胸有熱者宜用大陷胸湯以下之其無熱者宜用大陷胸丸以下之論云過經譫語者以有熱也當以湯下之而醫以丸藥下者非其治也可見丸方本為無熱者而設如上所述本來無熱證故也和久田氏曰胸骨高起心下按之亦硬而不痛項背常強俗稱鳩胸者所謂龜胸是也此證多得於胎毒非一時之劇證也故無伏熱或手不可近之痛論曰結胸者項亦強如柔痙狀下之則和宜大陷胸丸柔痙者云身體強几几也几几者項背強貌俗稱伸延豬頭或謂反顧堅強者此因結胸之毒達於項背而項背亦強如柔痙也若以大陷胸丸下之則其強者和如常人矣不云愈而云和者關係於結毒的形狀也若攻自胎受病或血塊等陳痼之證者湯藥反不能專攻其結毒故以丸藥治之為法是故所謂龜胸龜背及瘂癇之得於胎毒者其毒漸增成為傴僂廢疾之類而成傴僂老人者俗云見於莊子之背蟲是也此證在奇覽為葛根湯證恐非也既云結胸項亦強時因結胸而項背強或成龜背者可知其結胸之毒大矣皆為大陷胸丸所治也雖然因此方為攻擊劑不可日日用之是以須審其外證求真按當改為審其脈腹外證或日用小陷胸或旋覆花代赭石湯或半夏厚朴湯或厚朴生薑半夏人參甘草湯之類求真按以小陷胸湯或大小柴胡湯證為最多加以灸灼隔五日或七日可以大陷胸丸攻之此說是也當可詳審仲景意矣大陷胸丸方大黃克葶藶杏仁各克芒硝克甘遂克上為細末以蜂蜜為丸頓服克先輩之論說醫宗金鑒曰大陷胸丸治水腫腸澼之初起形氣俱實者類聚方廣義本方條曰東洞先生晚年以大陷胸湯為丸而用之猶理中抵當二丸例瀉下之力頗峻如毒聚胸背喘鳴咳嗽項背共痛者此方為勝治痰飲疝癥心胸痞塞結痛痛連項背臂膊者或隨宜用湯藥中兼用此方亦良小陷胸湯之注釋小結胸者正在心下按之則痛脈浮滑者小陷胸湯主之傷寒論註傷寒論雖作小結胸病不如小結胸者為妥茲從玉函千金翼改之而小結胸者為對於大陷胸湯證比較之辭本方證正在心下按之則止於痛無如彼心下石硬硬滿又無手不可近之劇痛是以對彼稱大而此稱小也故治方亦不如彼之用峻下劑僅用消痰解凝利尿藥之黃連半夏瓜蔞實也又正在心下按之則痛者謂以指頭輕打胸骨劍狀突起之直下部即訴疼痛也試此輕打與疼痛時間不容發不比於其他之壓痛故欲示此義所以插入則字於其間也又此證之脈浮滑者非如大陷胸湯之病位深沉因結實之程度淺弱也小陷胸湯方黃連克半夏克瓜蔞實克煎法用法同小柴胡湯先輩之論說治驗丹溪心法一方求真按此即本方也治食積及痰壅滯而喘急者為末糊丸服之內臺方議曰小陷胸湯又治心下結痛而氣喘悶者醫方集解曰劉心田曰結胸多挾飲凝結於心胸用甘遂半夏瓜蔞枳實旋覆之類皆為痰飲而設也汪氏曰大抵此湯病人痰熱內結者正宜用之錫駒云按湯有大小之別證有輕重之殊今人多以小陷胸湯治大結胸證皆致不救遂諉結胸為不可治之證不知結胸不可治者只一二節餘皆可治者也苟不體認經旨以臨時而推諉致誤人之性命深可嘆也醫學綱目曰工部郎中鄭忠厚因患傷寒胸腹滿面黃如金色諸翰林醫官雖商議但略不定推讓曰胸滿雖可下但恐脈浮虛召孫兆至曰諸公雖疑不用下藥者鄭之福也下之則必死某有一二服藥服之則必瘥遂下小陷胸湯尋利其病遂良愈明日面色改白京人嘆服又曰孫主簿述其母患胸中痞急喘不得息按之則痛脈數且澀此胸痹也因與仲景三物小陷胸湯一劑和二劑愈求真按胸中痞急者心下痞急也三物小陷胸湯者本方由三味之藥物而成之別名也赤水玄珠曰徐文學三泉先生之令郎每於下午發熱直至天明夜熱更甚右脅脹痛咳嗽吊疼坐臥俱疼醫作瘧治罔效延余診之左弦大右滑大搏指余曰內經云左右者陰陽之道路也據脈則必肝膽之火為痰所凝而用功作文過思不決鬱而為痰也夜甚者肝邪實也乃以仲景小陷胸湯為主瓜蔞一兩求真按瓜蔞同栝樓黃連三錢半夏二錢前胡青皮各一錢使水煎飲之夜服當歸龍薈丸微下之夜半痛止熱退兩帖全安求真按孫一奎治此證專隨脈應而不據腹證者是昧於仲景之本旨也雖幸得治不免偶中之誹又本方加前胡橘皮者雖為本方加柴胡橘皮之意是亦不徹底也此證當本方合用小柴胡湯為是證治大要曰加味小陷胸湯治火動其痰而嘈雜者本方加枳實梔子求真按本方加枳實梔子者是本方與枳實梔子豉湯合方之意吞酸嘈雜有效者茲不論若不確認腹證則不可輕用張氏醫通曰凡咳嗽面赤胸腹常熱惟手足有涼時其脈洪者痰在膈上也小陷胸湯求真按專事脈應外證不問腹證者非也建殊錄曰一人年十三生而病瘂先生診之胸脅煩脹如有物支之乃作小陷胸湯及滾痰丸與之月餘又作七寶丸使飲之數日如此者凡六次出入二歲許乃無不言成績錄曰一男子六十餘歲時時飲食窒於胸膈而不得下狀如嗝噎咳嗽有痰飲先生與小陷胸湯兼用南呂丸而愈一獵夫乘轎來告曰一日入山逐獸放鳥槍中之獸僵投槍欲捕獸忽蘇因與之鬥克而捕之爾後雖無痛苦然兩肘屈而不伸普求醫治無效先生診之胸滿頗甚他無所異乃與小陷胸湯服之而愈求真按余亦隨腹證吞酸嘈雜兩腳攣急難以行步者與本方得速效生生堂治驗曰一婦人產後嘔吐不止飲食無味形容日瘦精神困倦醫者皆以為產勞師診之正在心下酸痛不可按曰水飲也與小陷胸湯佐以赫赫圓乃已麻疹一哈曰一人年四十餘發熱三四日發疹未及半而心下結痛一日夜頭出冷汗兩足微厥喉中痰鳴胸滿短氣大便不通與小陷胸湯及滾痰九下利二三行翌日發熱大甚炎炎如燃大汗洗然疹子皆發出而安一人年可二十發熱無汗疹欲出而不出心下結痛肩背強直因與小陷胸湯前證漸安翌日以紫圓下之下利數行譫語發熱汗出如流疹子從汗出疹收後全復舊求真按此病者肩背強直且心下結痛即小結胸使然故與大陷胸丸證同轍方伎雜志曰一男子年十四五來乞診其父母曰伏枕已三年藥餌無所不求而病患加重至於羸憊瘦削余診之薄暮發寒熱胸骨呈露肌膚無澤身面黧黑眼泡微腫腹滿而臍之四周引張以指觸之立即驚痛且每夜發腹痛微利其狀腹脹四肢柴瘦恰如乾蝦蟆不能起床不思飲食舌上黃苔小溲黃色脈沉微數若仰臥則臍邊攣痛余告其父母曰此所謂疳勞之重證也余不能治之父母愀然曰若無生路則不歸矣僅此一子愛情之餘欲幸於萬死一生之命願托先生懇垂矜恤余不能辭乃用小陷胸湯與四逆散合方每日兼用蟅蟲丸五分日下雜穢二三行飲食少進父母大悅自冬迄春均用前劑其間數日用鷓鴣菜湯下蛔蟲數條由是腹痛截然而止腹滿攣急亦皆大和能自動上廁矣又用前藥半歲餘舉動略如意其父攜之出浴益覺暢快於是服藥更不怠至初秋始停藥此兒得治真意外也求真按此證恐係結核性腹膜炎之重證余雖未曾遇此篤疾但其初期及中期者以小陷胸湯及四逆散之合方兼用大黃蟅蟲丸或起廢丸其肺及淋巴腺兼結核者用小柴胡湯或加石膏小陷胸湯四逆散或排膿散之合方兼用前之丸方或兼用黃解丸或第二黃解丸屢得全效勿誤藥室方函口訣本方條曰此方治飲邪結於心下而痛者因瓜蔞實主痛也以金匱胸痹諸方可徵故名醫類案以此方治孫主簿述之胸痹張氏醫通治熱痰在膈上者其他或治胸滿而氣塞不通或嘈雜或腹鳴下利或食物不進或胸痛者橘窗書影曰一人因心氣疲勞過度致伏胸痹痰飲證客冬外感之後邪氣不解胸痛更甚項背如負板屈伸不便倚息不得臥飲食減少脈沉微眾醫作虛候治之不愈余診曰雖屬老憊現邪氣未解脈尚帶數先宜治邪後治本病不遲因與柴陷湯加竹茹兼用大陷胸丸服之而邪氣漸解本病隨而緩和數日連服二方而痊愈求真按柴陷湯加竹茹者即小柴胡湯與小陷胸湯合方加竹茹也一婦人外感後熱氣不解胸痛短氣咳嗽甚脈數舌上白苔食不進侍醫療之數日病益重因遣使召余余診曰是飲邪併結之證然因其虛弱未至結胸與柴陷湯加竹茹服之四五日胸痛大減咳嗽亦隨安後但胸部拘急因痰飲未除也以四逆散合茯苓杏仁甘草湯服之而愈桔梗白散之注釋病在陽應以汗解之反以冷水灌之若灌之其熱被劫不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不瘥者與五苓散寒實結胸無熱證者與三物小陷胸湯白散亦可服傷寒論註尾臺氏曰寒實結胸無熱證者白散之正證也按寒實結胸以下與上文意義不相屬疑錯簡且白散與小陷胸湯其主治本不同豈可濫投耶若非錯簡則為後人之補綴無疑丹波元堅曰活人書云與三物白散無小陷胸湯亦可用之七字蓋小陷胸湯為寒劑無熱者所不宜也由是觀之則本條當作寒實結胸無熱證者與三物白散可去三物小陷胸湯及亦可服之字句解之寒實結胸者病毒結實於胸廓地位雖無異於結胸但非如彼之由水熱二毒凝結而成是由內陷之熱氣為固有之水毒寒化故無如彼之舌上燥而渴或日晡所潮熱等熱候故雖與甘遂同為水毒瀉下之峻藥但用反於彼者以熱性之巴豆為主藥之本方也醫宗金鑒曰結胸證身無大熱口燥不渴則非熱實證乃寒實也與三物白散丹波元堅曰如寒實結胸者此因膈間素有寒涎邪氣內陷相化為實或有膈痛及心下硬等證其勢連及於下而陽猶能維持者故峻利之以是可揣摩仲景之意矣外臺桔梗白散治咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰金匱要略註見桔梗湯條桔梗白散方桔梗貝母各克巴豆克上三味為細末混合頓服克病在膈上者吐膿血膈下者瀉出若下多不止飲冷水一杯則定先輩之論說治驗東洞翁本方定義曰治毒在胸中吐濁唾臭膿者方機本方主治曰毒在胸咽不得息者求真按白喉性呼吸困難者此適例也余用本病之血清無效將欲窒息之小兒與本方得速效成績錄曰一男子卒然咽痛自申及酉下午三點七點四肢厥冷口不能言若存若亡眾醫以為必死舉家頗騷擾及戌時下午七點九點迎先生往治脈微欲絕一身盡冷呼吸不絕如線急取桔梗白散二錢調白湯灌之下利五六行咽痛殆減厥復氣爽矣乃與五物桂枝桔梗加大黃湯須臾大下黑血咽痛盡除數日平復古方便覽本方條曰一男子冬月發喘急痰迫入咽肩息欲死用此方一錢吐痰涎二三合而愈一婦病小瘡敷藥後忽然遍身發腫小便不利心胸煩悶喘鳴迫促幾欲死余用此方一錢吐水數升再飲而大吐下疾苦立安用前方五六日痊愈一男子咽喉腫痛不能言語湯水亦不下有痰咳而痛不可忍余使飲此方一撮吐稠痰數升痛忽愈後用排膿湯而痊愈叢桂亭醫事小言曰一士人久咳午後微寒熱人以為勞飲食不美半日臥床經數醫後而迎余至其家未診時聞咳聲肺癰也診之脈非細數而浮大數左膈間因咳嗽引痛背邊亦隱隱痛晝夜吐痰甚多間有帶血者云雖灸四花服獺肝無效驗其痰如米粥者有膿也乃雖告以肺癰而不信投痰水中說明痰膿之異始信余言與肺癰湯兼用白散二度經數十日而愈類聚方廣義本方條曰此方不僅治肺癰所謂幽癰胃脘癰及胸膈中有頑痰而胸背攣痛者咳家膠痰纏繞咽喉不利氣息穢臭者皆有效求真按幽癰胃脘癰者可能是幽門或胃體部之膿瘍又尾臺氏用本方於此等證者可能是基於本方方後所云膈下者瀉出之關係卒中風馬脾風痰潮息迫牙關緊閉藥汁不入者取一字吹鼻中吐痰涎咽喉立通求真按此是能利用自然門戶而收優良之偉效肺癰用此方當其咳逆喘急胸中隱痛黃痰頗臭時而斷然投之以掃蕩鬱毒可以斷除根柢若猶豫不決持重曠日毒氣浸潤胸背徹痛膿穢湧溢極臭撲鼻蒸熱柴瘦脈至細數則噬臍莫及矣醫者不可不小心又不可不放膽者良有以也求真按如兵家有兵機醫家亦有醫機而得機與不得機者成敗之所分生死之所決也苟得其機生死極自在非如小心放膽之問題也橘窗書影曰一男子咽喉閉塞不得息手足微冷自汗出煩悶甚急使迎余余診曰急喉痹也不可忽視製桔梗白散以白湯灌入須臾發吐瀉氣息方安因與桔梗湯痊愈世醫不知此證曾見緩治而急斃者數人故記之以為後鑒貝母之醫治效用藥徵曰貝母主治胸膈鬱結痰飲也仲景氏之用貝母僅此一方耳海考之本草古人用貝母主治鬱結痰飲兼治咳嗽及乳汁不下與仲景氏治濁唾腥臭而已總而言之其效殆與桔梗大同小異也如上說觀之則本藥亦為一種之祛痰排膿藥故於理論上殆與桔梗之作用難分學者須就病者而研究之則可自得瓜蒂散之注釋病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散傷寒論註病如桂枝證者以寸脈微浮也氣上衝咽喉雖似桂枝湯證但不如彼之頭項強痛故有不同耳寸部者候上半身之病之部位也今此部云微浮由不言及關尺觀之則此寸脈微浮是指示此病毒有由內達外之機也胸中者雖自心下亦上部之謂則胸中痞硬者即胸骨劍狀突直下之內部痞硬之義氣上衝咽喉者痞硬於胸中的病毒之餘波迫於上部所致故與桂枝湯證之只氣上衝者不同使不得息也寒者病毒閉塞之義則此為胸有寒者有以上之症狀者是病毒閉塞於胸中也故於次句曰當吐之病人手足厥冷脈乍緊者邪結在胸中心中滿而煩饑不能食者病在胸中當須吐之宜瓜蒂散傷寒論註本條宜作邪結在胸中之下亦有宜瓜蒂散之字句解因病人手足厥冷脈乍緊者邪結在胸中宜瓜蒂散是基於他覺證而施吐法之候也心中滿而煩饑不能食者病在胸中當須吐之宜瓜蒂散是隨自覺證而行吐法之候也即前段凡緊脈者不問證之表裡內外總為病毒鬱滯之象徵故病者手足厥冷並現脈乍緊者為病毒鬱滯於胸中之候宜以瓜蒂散使吐也後段不拘病者心中此胸中尤上部也有填滿之自覺的煩悶且有空腹之自覺而不能飲食者是病毒鬱滯之所致為病毒在胸中之候故以本方吐之為當然之義也宿食在上脘當吐之宜瓜蒂散金匱要略註加古坎主水氏之吐法撮要不僅能注釋仲景之意且能擴充而光大之啟發吾人不少茲列全文於下加以短評則本條之注釋亦在其內矣吐法撮要曰獨嘯庵之吐方考曰汗吐下並行者古道也今能汗下而不能吐則其於能亦不難乎今知可吐之病而當汗下之病不知者其於知亦不危耶古方書之學汗下之術敷於四方至於吐方十數年來尚艱澀未行也夫汗吐下者異途而同歸者也學者若能冥會其機則吐豈獨難哉此為千古不朽之確論初學之要訓也凡欲為醫者深究為宜豈可忽哉又曰盛夏嚴冬毒人非不少羸弱之人雖無病亦宜謹其修養況吐下之方其時可避也惡是何言也蓋吐方之治始詳於傷寒論所謂傷寒者正於嚴寒之時患之故古語云冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳凡傷四時之氣皆能致病以傷寒為毒其最殺厲之氣耳求真按此病理是未知細菌學之故然無害於治術故不當深責且傷寒篤劇之證以去胸間之結毒為最難陽明胃實次之此二證若不用吐下之藥則患難併起而立斃者不可勝數也是故雖嚴寒墮指時苟有其證則宜速用其藥盛夏炎熱之時亦然何畏之有哉求真按此說是也論曰傷寒二三日心下痞硬脈沉數者當吐之又曰太陽中暍身熱而疼重脈微弱者一物瓜蒂散主之如此二證卒暴最甚宜急吐之證也此證若不用吐劑時則諸患蜂起變證雜出死如反掌矣可不懼乎余嘗於嚴寒盛暑之時當用吐劑者亦未一見其害經曰有故無損也學者勿眩於論說而失實用又曰張子和汗吐下齊行者是欲銳意奪病之弊也此非醫病之言也余嘗汗吐下齊行率多見其利未嘗見其害何弊之有哉凡諸般疾病千態萬狀未有窮止若隨其現狀臨機應變則治術亦無窮乎故有當汗者有當吐者有當下者有當和者有當緩者各隨其病之所在而治之也今舉一二例於下假令痘瘡將發時頭痛身熱渴而煩躁或身體疼痛惡痘隱於肌肉之間者與大青龍湯以發之別用紫圓瀉下鬱熱胎毒時則痘之形色光圓紅活始終將無恙是以汗下齊行未嘗見其害者餘病亦皆準此且如所謂癲癇反胃之類吐下交用而後能奏其效又如所謂鬱證狂癇之類專用吐劑別用灌水之法或兼用下劑交錯雜攻則可百發百中運治術於掌上矣然則汗吐下齊行亦惟顧其當否如何耳如嘯庵子之說徒拘泥於一定之規矩不知擴充古醫方運用之妙理則僻狹之弊駟舌莫及又曰病在床褥者不可吐是幼學之繩墨云云是訓戒初學之大概耳至於用術則未必然夫當吐之證病臥褥者十居五六若當用不用則病毒滋蔓沒有出路終至於斃者多矣此時若先用吐方則病毒自除臥褥將自離矣何憚之有哉世醫為此說所抑壓終以為難用之術雖偶有英才之土唯賣弄其章句而不親試以致終身不得行此術嗚呼悲哉世遠人亡經殘教弛雖欲正之未由也已宜乎世醫活人無術反有害也又曰凡腹氣虛者決不可用吐方此亦慎戒初學之大概也若拘泥於腹氣虛實之說而不能用吐方此庸醫之所為也蓋當吐之證毒在胸膈之間連迫於臟腑之上致成腹氣空虛者其大半也此證一皆危急篤劇之候此時當用吐方而不用則死於非命者多矣醫者豈可不憂之乎若憂之則當師古詩曰不愆不忘率由舊章求真按獨嘯庵氏與加古氏之意見至相反者因腹之定義異而所歸則一獨嘯庵氏之腹如現時之學說指胸骨劍狀突起及肋骨弓以下也加古氏則如舊說以通左右第十二肋骨下緣之直線以上及胸膈間以下為腹故也不知此見解以致相違而責獨嘯庵氏太酷也諸病以候腹為第一義蓋腹為生之本也至於用吐法則不必然凡欲行此術者以候胸膈為先務蓋病毒結窒於胸膈間故也論曰傷寒吐後腹脹者與調胃承氣湯夫古今用吐方之人吐後必用通和之劑戴人用舟車丸奧村氏用瀉心湯吾嘗雖無腹脹之證吐後必用調胃承氣湯以通和其逆氣求真按吐後有可用瀉心湯或黃連解毒湯者又有可用調胃承氣湯者不可偏執論曰病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者當吐之病如桂枝證者謂疑似於表證也雖然頭不痛項不強且脈微浮者此非真表證之徵也凡脈以寸尺而辨之者後人所加非古法醫者之意也求真按此說非也輕視脈應是東洞翁之缺點其門下及歌頌者亦陷於此弊不可從之胸中痞硬者為毒在此之徵氣上衝咽喉不得息者乃胸中鬱伏之毒激沸而上迫所致故注曰此為胸中有寒也所謂寒者指其毒也又曰病人手足厥冷脈乍緊者邪結在胸中心中滿而煩饑不能食者當吐之毒鬱結於胸中見手足厥冷者是所謂旁證也求真按旁證者客證之意脈乍緊心中滿而煩者毒鬱結於胸間之候饑而不能食者因胸中之結毒妨礙食道求真按恐係壓迫胃及食道之意故腹中空虛雖欲飲食而不能也注曰病在胸中當須吐之者凡毒實於胸中者皆是當吐之證也又曰宿食在上脘者當吐之食滯在上脘者其證或心痛嘔吐求真按此心痛胃痛之意或手足厥冷脈沉遲或心中懊憹或溫溫求真按溫溫者謂噁心欲吐貌或吞酸嘈雜及其餘數種之證候屬於停食者宜審其證而吐之世有傷於食者卒然揮霍擾亂變出數證忽然而死者其急者一二日緩者四五日必死究其源無他皆由不用吐劑之誤為信庸醫死於非命者噫惜哉求真按滯食腹痛病者主用麻醉藥而稀用吐下劑者當三省之又曰心中溫溫而欲吐者溫溫者嗢嗢也雖欲吐而不能吐也此乃胸中之滯毒動搖而迫於上之候也凡諸病百藥無效而旁有此證者先以瓜蒂散開達其鬱結之毒二三次或四五次後則其證必變因其變而隨機投以得當之劑或攻之或和緩之或運動之或熔化之則世醫所謂不治之痼疾亦可治十之六七其終不治者蓋固由在於必死而天真絕乏者也醫者宜察審之不可誤於古醫方不利之名而毀聖人之遺法也又曰病胸上諸實胸中鬱鬱而痛不能食欲使人按之而反有涎唾下痢日十餘行其脈反沉而微滑此當吐之胸上指胸膈間也欲使人按者此證疑似於結胸病夫毒凝結於胸間者大陷胸湯之所主治也如此證則非凝結之毒故曰而反有涎唾下痢日十餘行蓋有涎唾者毒動於上也下痢者毒動於下也此乃鬱滯之毒而非凝結之毒也夫毒鬱滯於胸間者是瓜蒂散之所主治也若毒凝結於胸間心下石硬者是大陷胸湯之所主治也又曰太陽中暍身熱疼重脈微弱注曰此以夏月傷於冷水水行皮中之所致也一物瓜蒂湯主之又曰發汗吐下後虛煩不得眠若劇者反覆顛倒心中懊憹梔子豉湯主之又曰發汗或下之煩熱胸中窒者又曰傷寒五六日大下後身熱不去心中結痛者又曰傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之上數條曰發汗吐下後曰發汗或下之曰大下後曰下後則此證本從汗吐下之變而來蓋得發汗吐下而邪毒除去但津液虛竭氣血不和其氣迫於胸間而致此證也故以此湯和之若未經汗吐下而見此證者固非此湯之所主治乃吐劑之證也庸工不察此理若見此證動輒用此湯且謂古方徒然而不論其所以然者直見顯證而處方此皆不思之論而不知用吐方者之僻言也東洞先生雖亦有此言然今為此論者其義與古人大異毫釐千里之謬其此之謂乎夫梔子枳實厚朴豉者淡薄平和之品也何足利胸間之蟄毒余故曰經汗吐下之變而見此證者為梔子豉湯之所主惟和其不和而窘迫之氣耳若未經汗吐下而見此證者皆為當吐之證也求真按此說雖不無理但知其一而不知其二也仲景云發汗吐下後是示致虛煩之由來非於汗吐下後無不可用此方也又曰太陽病過經十餘日心下溫溫欲吐胸中痛大便反溏腹微滿鬱鬱微煩先此時極自吐下者與調胃承氣湯若不爾者不可與之此章與前證同意瓜蒂散證曰心中溫溫欲嘔吐此證曰心下溫溫欲吐曰心中曰心下所在自異也雖然胸中痛溫溫欲吐或鬱鬱微煩此全是吐劑之所宜也故曰先此時極吐下者與調胃承氣湯不爾者不可與之不爾者謂未極自吐下也若已極自吐下則其毒已除去但有動搖不和之餘勢故以調胃承氣湯通和其餘勢耳又曰陽明病無汗小便不利心中懊憹者身必發黃夫心中懊憹者吐劑之所治而本論無處方恐脫簡也求真按心中懊憹者亦未必以吐劑為主治不可從之又曰太陽病二三日不得臥但欲起心下必結脈微弱者凡謂太陽病者皆謂表病而無裡病也所謂病人臟無他病者是也然今此證不能臥但欲起者蓋此證之毒壅塞於胸間乃非真太陽表證而臟有他病者也故曰心下必結且曰脈微弱也由此觀之此亦吐劑之證也凡古書謂臟者皆指裡內之言也求真按此說不無一理然似強解須待後日之研究又曰傷寒嘔多時雖有陽明證不可攻之凡傷寒論中所謂陽明證者多用下劑以攻之是即古法也今雖有陽明證而不可攻之謂以其嘔多故也蓋嘔者毒在胸膈之間故其氣上迫而為嘔也今謂其嘔多可見其毒鬱於胸中也余故曰此為當吐之證也求真按陽明病嘔多者非純陽明病為少陽陽明之合病也則以先解少陽病後攻陽明病為法故曰嘔多證者即少陽病未解時不可攻下陽明證斷非吐劑之證不可從之又曰傷寒二三日心中痞硬脈沉數者獨嘯庵氏曰此證或為後之大患微當吐之余往往治此證其言果然又曰少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者當吐之此條方證正對毋待辨矣又曰太陽病無汗小便反少氣上衝胸口噤不得語欲作剛痙者瓜蒂散主之氣上衝胸口噤不得語者此所謂胸中實當吐之證也求真按此證為當用葛根湯之候故不必用吐劑也以上十餘章為張仲景之所用是後世吐方之準繩也至於隨機運用之際以默識深思而擴充之則吐方之效將塞於天地之間不至著於世醫之眼目僅以二三章之吐方為極趣且不能行其術於病者噫世醫何如斯之愚且昧乎此余所以平居嘆息也願有志之士深求其妙機則此術得以廣行於後世胸中有停痰宿水而為諸證者求真按是引用獨嘯庵氏說也下亦同夫胸中有停痰宿水者則是毒之所在而為諸證者乃其旁證也如此者余用吐方能治之且所謂久年腹痛不已而為諸患者皆吐方之所能治也世醫不達此每見此證動輒用茯苓飲或附子粳米湯類遷延日月竟使病者至於危篤矣因徒拘泥於論說心胸中有停痰宿水自能吐出水或腹中寒氣切痛逆滿嘔吐等之章句自以為方證相對不知變通之故也所謂噤口痢者水藥不得入口入則吐出是固嚴重之暴病世醫之所難能也如此證者先用吐劑以通利胸間之毒則水藥悉得下咽而後以隨證處方則世醫所謂必斃者可治十之六七所謂卒中昏厥不知人口眼喎斜半身不遂痰氣壅塞者世醫於此證率用三聖飲導痰湯之類偶然得瘥輕證二三人則愈自信以為卒中家之要方嗚呼愚拙哉若夫輕證雖不藥亦自能復原其危篤卒暴之證若命懸旦夕此時當救危紓暴者舍吐方其何由所謂龜胸龜背者隨證處方時間用吐劑以攻之則能收效所謂狂癇者數當吐之所謂藏結者多宜吐劑所謂淋疾諸藥無效者宜詳其證而吐之獨嘯庵氏曰反胃諸嘔者最宜吐之知言哉至盡矣蓋吐方之需要足以蔽後世也然世醫不達此理若每見證動輒乾薑人參半夏茯苓或補脾降氣之類雖間有知其機者亦不過用大黃甘遂巴豆之類而曰方證相對何病不瘥乎嗚呼可慨也夫所謂反胃者毒壅窒於胸間故胃脘被妨礙而不能容水穀朝食則暮吐夕食則朝吐也半夏人參茯苓等之藥安得而制之求真按有當用吐劑者有當用乾薑生薑半夏茯苓人參等者焉得專重偏廢哉且巴豆大黃甘遂下劑也夫下劑之功能先納之於胸腹熟化運造而後為用今毒鬱窒於胸間以是不能容納水穀及藥汁雖強飲之亦與胸間隔絕不得留藥氣於內則何效之有哉此時當用吐劑則其毒與藥氣併馳逐激動發泄於上如此數回隨其毒之輕重或一二次或三四次則胸中之蟄毒豁然開除若猶有他證者則隨證理之此所謂通因通用者也學者苟能通其機則吐方之偉效將如白日矣病者悲哭啼泣者先吐之後隨證處方或先處方後時用吐方攻之子和氏曰咳嗽痰厥涎潮痞塞口眼喎斜半身不遂者當吐之咳嗽痰厥涎潮痞塞者此毒實於胸間之候口眼喎斜半身不遂者皆旁證也求真按咳嗽痰厥涎潮痞塞即呼吸器病吐劑所以奏效者因服吐劑後則以刺激於胃黏膜之迷走神經末梢而由反射作用刺激於呼吸器黏膜之同名神經末梢使吐出胃內容物同時使咯出在肺泡及支氣管內之病的產物也又曰上喘中滿酸心腹脹時時作聲痞氣上下而不宣暢者當吐之自注曰所謂氣壅三焦不暢是也坎按此證所謂留飲病而毒窒於胸間作上喘中滿酸心求真按中滿者胃部膨滿也酸心者吞酸嘈雜也之證其腹滿時時作聲者是乃留飲之徵痞氣上下而不宣暢者旁證也蓋所謂痞氣者指毒氣而言又曰頭腫瘰癧及胸臆胠脅之間或瘡痂不消及膿水不止者吐之余雖未試之然潛思求之或當有益學者審諸余於此證皆用生生乳而萬舉萬全悉能得驗求真按生生乳者砒素水銀之化合劑也於梅毒性者或能萬舉萬全至於其他未必然也又曰赤白帶下或如白物脂者獨聖散主之婦人有污濁水不止亦同此方此證若術能中其機則效若不中其機則無益夫機者非筆舌所能盡也但在其人耳求真按機者達者能捕之凡庸不與焉如加古氏言然汗下和皆有機豈獨吐法乎又曰小兒自三五歲或七八歲至十四歲發驚涎潮搐搦如拽鋸人事不省目瞪喘急將欲死者當吐之此所謂急驚熱癇之類宜吐之庸醫不察妄投盲行動輒用鉤藤胡黃連或辰砂茯神麝香之類因此死於非命之兒殆難勝數嗚呼悲哉又曰所謂癲癇者宜數吐之獨嘯庵子曰十歲以裡者吐後灸數千壯則止不復發十歲以外者雖用之無效此言頗當坎嘗試之雖及二三十歲其病新發者用吐劑有效凡危急短氣太甚者或平居有吐血之患或其證候有血證者決不可用吐方若犯之則促命期學者詳之用吐方之法先與吐劑使服之使病人安臥二時許勿使動搖若動搖則忽吐其藥汁使藥氣不得透徹於病毒須待心中溫溫上迫於咽喉然後使病人跂足蹲坐而臨吐盆一人自後抱持之以鳥羽探咽中則得快吐如是三四回或五六回凡當吐之證隔五六日或七八日如法吐之則終吐黏膠污穢之物而後其病乃盡凡服吐劑至欲吐時先飲沸湯一碗則易吐既吐之後暫使安臥休息更使飲沸湯一碗取吐數次而後與冷粥或冷水一碗以止之吐中或吐後煩躁脈絕不知人事四肢厥逆者勿駭是乃瞑眩也以冷水灌面或使飲之則醒或以麝香和冷水使飲之亦佳凡服吐方後精神昏冒者宜服瀉心湯吐中有黑死血者佳若有真生血者危急宜用麝香以消化其藥毒語曰瓜苗聞麝香即死也諸緩慢之證宜吐者先用烏頭附子劑以運動鬱滯之毒而時以瓜蒂散吐之夫吐方之難用自古以來僅五六先哲用之耳坎嘗從事於此而用吐方者數年如其瞑眩者直與十棗湯備急丸相比擬然世醫不能用者何也無他是因不知古意也考諸傷寒論曰太陽病云云一二日吐之則腹中饑口不能食三四日吐之則不喜糜粥欲食冷食朝食暮吐者醫吐之所致也此為小逆夫所謂太陽病者是表證當用發散劑之證也而醫反誤吐之是逆治之甚者也猶且謂之小逆況用之於胸中鬱滯之證乎嗚呼世醫何畏之甚耶瓜蒂散方瓜蒂赤小豆各克上為細末混合之先以熱湯七勺煮香豉克作稀粥去滓以稀粥和藥末服克先輩之論說治驗古今醫統引朱丹溪曰小兒急驚風熱口瘡手心伏熱痰嗽痰喘並重用湧法若以瓜蒂散為輕則用赤小豆苦參末奇效良方曰瓜蒂散治風癲宜服此藥以吐之獨嘯庵氏吐方考曰求真按已引用加古氏之說者從略扁鵲望桓公之色而走此我技古之道也故從事於此者知死者與不治者為第一義世醫不能知此者誤施汗吐下而取凶暴之名非古方之罪也決死生欲定治不治者當候腹以審腹氣之虛實此事如易而實難其故何哉因如虛而有實者如實而有虛者有邪來虛而邪去實者有邪來實而邪去虛者此在得心應手父不能以喻子也人之有脈猶戶之有樞微乎微乎感而能通思不可得如水陸草木之花實不一有忽開忽落者有忽花而徐萎者有花盛而實者有結實而無花者有花至小而長存者染病之人亦猶此也當察其開落之機而謹艾刈之期求真按候腹診脈者感而能通得心應手者言文所不及嘯庵氏之言實然吐後三五日當調飲食省思慮不當風不宜內不可勞動古語云病在膈上者吐之是用吐方之大表也而其變不可勝數若沉研不久經事不多者則難得而窮詰之吐後氣逆極多用下氣之方可也或三黃湯或承氣湯膈噎勞瘵鼓脹等若吐之則促其命期張子和吐癩余未見其可也張子和儒門事親有時氣溫病傷寒等一二日以裡頭痛身熱惡寒者以通聖散益元散蔥白蓮鬚豆豉一撮吐之之法余試之數十人時有效要之不為之亦可初學者妊娠產後痰血咳血癥毒血崩亡血虛家等暨年過六十者不可吐之傷寒吐之不宜過二三回得一快吐則止用瓜蒂者或三分或五分其治一次逆時急者促命期緩者為壞證苦瓠瓤其仁如大豆有七粒者有十粒者窮鄉無瓜蒂時可代之其形至小瑩潔無黶翳者為佳品藜蘆華產為佳尤多毒用之者二分或三分常山華產為佳為末用之五分或一錢巴豆不去油可也豆豉從本草製法可也傷寒用承氣湯而不下者吐後再下之求真按用承氣湯不下者若有欲吐之機則先行吐方後再下之諸氣疾諸積聚心下痞硬遍於臟腑上者問其平生無吐血咳血衄血等之患者悉可吐之後服瀉心之方數十日喘息初發暨未發者按其腹脈知腹氣堅實時則吐之後服瀉心湯小承氣湯之類數十日灸數千壯五十以裡偏枯痰涎滿胸者可吐之腹氣不堅定者決不可與之月事積年不下心下痞硬抵當諸藥不驗者吐後再服黃疸煩喘欲吐者可吐之腫病用吐尤難須謹慎其方法由口吐大便者吐之後服附子瀉心生薑瀉心半夏瀉心之類數日求真按由口吐大便者是即現今之腸閉塞西醫若不用開腹術是治之為難痿躄初發暨欲發者按其心下痞時則吐之後論所宜服之藥上各以瓜蒂散吐之腹氣不堅實者決不可吐之又曰服吐方既吐之時直視搐搦之候見者即當止其吐瘧以常山吐之病發後十日許可服肺癰未見浮腫者以桔梗白散吐之腹氣不堅實者雖吐之無益河豚毒暨一切魚毒之吐方藍汁待考一盞溫服之又方八九月橘子將熟時裂之納胡椒三粒待果熟取燒為末使少許入小竹管吹入咽中過咽則吐按傷食尤暴急用蒂得吐遲用此方可也求真按現今醫家之對於急性中毒每用洗胃或用解毒劑未嘗見用吐法者真怪事也如洗胃法雖頗合理然以口徑微小之消息子通於內而欲排出胃內容之全部難望其成為事實用解毒劑者於試驗管內其化學的試驗成績雖佳然人體非如試驗管之單純不能如試驗之發現完全解毒作用故毒物猶有存於胃內而未被吸收者是以必當應用吐劑也就中以鹽酸阿朴嗎啡之皮下注射為上乘之策生生堂醫談曰問曰當世之醫行下劑者雖有人然行吐劑者至稀也雖有人偶用平生亦不過二三度乃至十餘度耳然子於一年間使用瓜蒂數斤且無誤治願聞其方法答曰治病之大綱為汗吐下三法汗者逐毒之在表者下者驅毒之在裡者吐者條達毒在胸膈者此三法者誠醫術之寶筏而無病不可能者也如前云越前之奧村良築為醫中之豪傑始興吐法其時有山脅東門獨嘯庵惠美三伯等相和而行此法其後遂絕聞前所行之吐劑方法與余所行者不同其藥毒烈故其弊終為病家所恐懼以迄於後世夫良築輩之行此先呼病人之親屬問之若因藥之瞑眩而死亦無怨乎否耶然後行之其法服吐藥後使人起病人而擁之或抱其頭兩手自下腹推上咽中探以鳥羽等醫者待其擁抱而吐畢則臥之若不止則與麝香如是用藥而病家恐懼亦不再與他藥其先病人上衝時瞑眩頗強自然損人世人勿論即醫者亦以為大恐吐劑是殺人之利器非至此法不行而不已即有欲行此法者亦遭病家阻止雖有志欲醫行之者非至法窮術盡將成廢疾之候者則不行之余生於後世而業醫因他法不治之病甚多依數年之專精研究吐劑之服法而終於不誤以瓜蒂為吐劑之第一產於越前者為上品宜精察病人之虛實其分量從病人之病位及毒之多寡不可預定大概用瓜蒂末自二分至一錢煎湯亦可用又可自三分至一錢或三聖散同湯或一物瓜蒂散同湯或瓜蒂赤小豆研末等分或豆豉汁或虀汁或蘿蔔葉煎汁等送下當隨宜用之胸膈中之毒他藥難拔者亦可盡拔之其服法通例散劑與煎湯無異服畢須臾有催嘔氣者或有催於一日半日之後者其遲速因人而殊若雖有嘔氣而吐來遲者則團綿如棗大中央縛以繫吞之既下咽則倏然拽出乃忽嘔甚而得快吐矣如是行之其眩瞑至輕乃有用紫圓十粒許者余行吐法數百人無有一人誤事者且未見以麝香止吐之瞑眩者如是用法輕病一吐而愈劇者數吐而治也回憶六七年前余在大津時近鄉遍處纏喉風流行自五六歲至三十歲者卒然憎寒壯熱咽喉腫痛不能飲食四五日之內咽喉腐爛而死醫術不能救其內若用半夏苦酒湯者亦僅延四五日而死余初施治亦與他醫同法而殺多人此時始覺作三聖散與之得快吐而頓愈亦不用調理之藥自得此法後於余手死者稀矣後得此證者皆請治於余及移居京師亦治此證極多茲舉一二例於下一婦人因纏喉風絕食欲死眾治無效余作三聖散吹入咽中忽吐黏痰升餘病頓愈即能飲食言語矣求真按此證吹入桔梗白散為佳此外以吐劑治纏喉風證不可勝數必有百發百中之數又用吐方治難證亦中一女子年二十許狀如癲癇卒倒不省人事暫自蘇而愈年發四五次自幼即有此病百療無效余用瓜蒂末五分以虀汁送下吐黏痰一升餘其臭莫名病頓愈不復發余妹嘗患喘多年與吐劑一回頓愈不復發一僧癇證若發則亂言或欲自縊且足攣急困於步來請治余知不以吐劑不能治因被同道阻難不肯治而請他醫治之與四逆散加吳茱萸牡蠣服半年無寸效於是再來請余用瓜蒂赤小豆末以虀汁使服之吐黏痰許多癇不復發足攣急頓治如是之病只一帖而治者非他藥所能及也然世醫不親試之謾恐何為哉余以是欲為吐方之木鐸有志之士用之勿疑生生堂治驗曰一婦人發狂癇發則欲拔刀自殺或投井終夜狂躁不眠間有脫然謹厚女事無一誤者先生以瓜蒂散一錢五分其痰上湧二三升許使再服白虎加人參湯不再發一男子年三十全身麻木目不能視口不能言其人肥大性好酒先生診之脈澀而不結心下急喜嘔即使飲三聖散六分不吐而暴瀉五六次越三日又使服分量同前湧出三升許由是目能視口能言兩手亦漸漸能動矣後與桃花湯百餘帖痊愈一男子二十歲晚飯後半時許卒然腹痛入於陰囊陰囊挺脹其痛如剜身為之不能屈伸陣陣悶亂叫喊振伏遽迎先生診之其脈弦三動一止或五動一止四肢微冷腹熱如燔囊大如瓜按之石硬也病者昏憒中愀然告曰心下有物如欲上衝咽喉者先生聞之乃釋然撫掌而謂之曰汝言極當以瓜蒂散一錢湧出寒痰一升餘次與紫圓三分瀉五六行及其夜半熟睡達天明前日之病頓如忘求真按治此嵌頓小腸氣以內服藥而奏此偉效此乃中醫學之可貴也求真按吐法為治病之要術應用頗廣如永富氏等永富為獨嘯庵氏之姓也之說然因尊重過甚以致下劑適應之病證不無猶且行之之弊故不可盡信之例如宜用大柴胡湯之嘔不止心下急鬱鬱微煩者與宜用瓜蒂散之胸中痞硬心中溫溫欲吐者混同是宜與大柴胡者常處以瓜蒂散之例不少瓜蒂之醫治效用本草綱目曰瓜蒂氣味苦寒有毒主治大水身面四肢浮腫下水殺蠱毒咳逆上氣及食諸果病在胸腹中皆吐下之本經去鼻中瘜肉療黃疸別錄吐風熱痰涎治風眩頭痛癲癇喉痹頭目有濕氣時珍發明宗奭曰此物吐涎甚不損人全勝石綠磠砂輩也時珍曰瓜蒂乃陽明經除濕熱之藥故能引去胸脘痰涎頭目濕氣皮膚水氣黃疸濕熱諸證凡胃弱人及病後產後用吐藥皆宜加慎何獨瓜蒂為然上說由余之經驗觀之則本藥屬於苦味催吐藥以其刺激黏膜之力弱奪取水分之性強為催吐藥之上乘於胃腸有上逆之蠕動或有其機轉為主目的其他諸症狀為副目的而應用之為宜大黃黃連瀉心湯之注釋心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之傷寒論註心下痞者類聚方廣義云痞者取周易否卦之義劉熙釋名曰痞者否也為氣否結也諸病源候論曰否心下滿也增韻曰痞者氣隔不通也如上所述若以現代之學說解釋之即胃部有停滯膨滿之自覺而以他覺的觸知之意也按濡者雖為右膨滿部軟弱之義然此濡字非謂自腹壁到腹底俱軟弱也是寓淺按之則濡深按之則否之意何則若全部軟弱無力絕無抵抗則為純虛證下劑是絕對所禁忌由方中有瀉下藥之大黃觀之可知矣黃連之證淺部雖軟弱膨滿然深部必有抵抗也又其脈關上浮者雖於關部有浮脈之意然先輩多以為注文竄入而刪之故余亦隨之而不採用傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯傷寒論註解詳太陽病篇桂枝湯條本方以心下痞按之濡為目的雖如仲景所云然於臨床上此痞的症狀不易發現往往以本方倒行逆施而誤治者古來不少由余苦心後所得本方不必拘泥於仲景原文但以顏面潮紅如醉而有便秘之候是陽虛而非陰虛者為目的而用之可也大黃黃連瀉心湯方大黃克黃連克上銼細以沸湯五勺漬之須臾絞去滓頓服之甘連大黃湯方前方中加甘草克煎法用法同前主治本方為大黃黃連瀉心湯及大黃甘草湯合方故治大黃黃連瀉心湯證而急迫者及大黃甘草湯證而心煩心下痞者先輩之論說治驗東門隨筆曰余十七八歲時患痰血一歲四五發每發時吐血半茶碗冷汗出而無脈痰血於咽喉如哮喘之牽鋸初用生地黃藕汁童便等未服參連湯後每用人參而得效此外因積氣而至於直視之病人若單用人參亦難療之求真按本方之止血作用非人參一味之力因黃連協力之功也漫游雜記曰有一婦人產後八九十日飲水不甘肌膚瘦削無肉胸腹痞滿時時雷鳴大便滑泄其脈沉微平日晝間無故悲愁經醫數人不愈請治於余乃與參連湯兼抵當丸每日灸脊際二穴自項門至腰眼約三十餘日而復舊一童十二歲兩足痿如無骨語言蹇澀目脈赤無故悲愁經數醫無效請余診之其脈滑數腹位逼於胸脅臍下如空審問其平生氣稟猛烈過於群兒其怒罵之時眼光炯炯血氣如湧蓋為氣疾之一種與偏枯相類唯有老嫩之異耳與參連湯兼用熊膽二分十四日病稍輕續與參連湯六十餘日痊愈求真按氣疾神經病與偏枯半身不遂同視非也不可信之叢桂亭醫事小言曰參連湯治諸氣疾衝心直視煩悶或吐血不止者方輿輗曰參連湯嘔吐全不食者謂之噤口用此方濃煎終日細細呷之如吐則再服但一呷下咽便開噤口者謂絕食也此為裡熱至劇之證真難治之病也故不已者則濃煎參連細細呷之如吐再服但一呷下咽則十中可望一生古醫者流雖不無用乾薑黃連黃芩人參湯三黃湯之類但難立效噤口痢脈促者不日即手足厥冷而死也此證溫補清涼俱無效求真按雖噤口痢亦當隨證治之故不必拘泥於此說急驚直視煩悶者先與此湯後用對證之方求真按此說亦不可拘勿誤藥室方函口訣本方條曰此方元之丹溪治噤口痢雖見於入門但今運用之用於諸氣疾及直視煩悶即有效又用於吐血心下痞硬者奏奇效此為卒病之要藥藥籠中亦不可一日無之不用此時則用熊參湯所以熊膽一物人家不可不預蓄之見沈括筆談求真按此說是也可信黃連之醫治效用藥徵曰黃連主治心中煩悸也兼治心下痞吐下腹中痛此說為至論已有定評余亦讚之但言簡而旨深初學者不易通曉故為釋之此心中煩悸有二種意義其一當心臟部觸診時有熱狀即為充血或炎證之徵而疾速之心悸動應於手裡其二由腦之充血或炎證致精神不安是以心中煩悸四字為此二意義之代表的術語但於現代難通耳然本藥之性能不漏且無含蓄故余將上文改竄之黃連者由心臟部之觸診而有充血或炎證之象徵及心悸動疾速之情狀與頭腔內外之臟器組織由充血或炎證而有刺激症狀者為主目的心下痞吐下腹中痛出血等之證候為副目的而可用之尚須參照下說乃可擴充本藥之用途本草綱目曰黃連根氣味苦寒無毒主治熱氣目痛眥傷泣出求真按泣者有淚無聲之意即與流淚同義明目腸澼腹痛下痢婦人陰中腫痛本經主五臟冷熱久下泄澼膿血求真按此膿血為黏血便之意止消渴大驚除水利骨求真按本藥治濕熱非利尿作用也開胃厚腸求真按開胃者健胃作用之意厚腸者收斂作用之義也益膽求真按是強神經作用之謂也療口瘡別錄治五勞七傷益氣止心腹痛驚悸煩躁潤心腸長肉止血求真按本藥之止血作用為其消炎收斂作用之歸結也天行熱疾止盜汗並療瘡疥求真按本藥治療以上諸證者皆其消炎作用所致小兒疳氣殺蟲大明治鬱熱在中煩躁噁心兀兀欲吐心下痞滿元素主心病逆而盛心積伏梁好古去心竅惡血解服藥過劑煩悶及巴豆輕粉之毒時珍求真按由好古氏云主心積伏梁時珍氏云去心竅惡血觀之則本藥對於腦及心臟有消炎止血作用可知矣發明元素曰黃連性寒味苦氣味俱厚其用有六瀉心臟火一也去中焦濕熱二也諸瘡必用三也求真按諸瘡不必用之去風濕四也求真按此藥無去風濕之能治赤眼暴發五也止中部見血六也求真按血管係有充血或炎證之因而出血者不問中部與否此藥均能治之成無己曰苦入心寒勝熱黃連大黃之苦寒以導心下之虛熱求真按黃連雖不無導心下之虛熱但大黃則不然震亨曰黃連去中焦濕熱而瀉心火下痢胃口熱噤口者用黃連人參煎湯終日呷之如吐再強飲但得一呷下咽便好劉完素曰古方以黃連為治痢之最諸苦寒藥多泄惟黃連性冷而燥能降火去濕而止瀉痢故治痢以之為君杲曰諸痛癢瘡瘍皆屬心火凡諸瘡以黃連當歸為君凡眼暴發赤腫不可忍者宜黃連當歸求真按諸瘡及眼疾此二藥非特效惟用此二藥之處頗多耳宿食不消心下痞滿者須用黃連枳實本草備要曰黃連大苦大寒入心瀉火王海藏曰瀉心實宜瀉脾也鎮肝涼血燥濕開鬱除煩解渴益肝膽厚腸胃消心瘀治腸澼瀉痢便血曰澼濕熱鬱而為痢黃連為治痢之要藥痞滿燥濕開鬱腹痛清火心痛伏梁心積目痛眥傷癰瘡瘡疥酒毒胎毒明目定驚除疳殺蛔蛔得甘則動得苦則伏虛寒病者禁用瀉心湯之注釋心氣不足吐血衄血瀉心湯主之金匱要略註就此不足二字諸說紛紜東洞翁類聚方本方條下按不足外臺作不定今從之自此論後歷代醫家多左袒之故余亦從之不足當作不定解若心氣不足當和之而無以大黃劑瀉下之理夫心氣者即精神之意不定者變動無常之義也故心氣不定者精神不安之謂吐血衄血讀如字義故全文之意精神不安吐血衄血者以本方為主治之義也本方何以主治精神不安吐血衄血此為頗重要之問題茲詳說之由余之經驗有本方證病者如在大黃黃連瀉心湯證之心下痞按之濡而心悸動亢盛若按觸心尖部則有煩悸之狀因血壓升騰故脈呈數疾及皮膚黏膜尤其於顏面口唇現充血之候而神經過敏者往往致諸種出血為常由此事實考之其心氣不定即神經過敏者由顏面充血而推知腦充血之故致大腦皮質被刺激其必然之結果惹起吐血衄血及其他諸種之出血者不外因血壓升騰與血管係支配下之臟器組織有充血或炎性機轉也有本方證之病者常有充血或熱狀且屢因發熱而往往伴以出血有此機轉可知矣故仲景用有健胃收斂消炎性之黃連黃芩配以健胃消炎且有誘導作用之大黃如本方者乎瀉心湯方大黃克黃芩黃連各克煎法用法同前本方為丸名三黃丸又名三黃圓先輩之論說治驗千金方曰巴郡太守奏以三黃丸治男子五勞七傷消渴肌肉不生婦人帶下手足寒熱求真按五勞七傷者雖為後世醫之妄語但含有結核性疾患之意味消渴者糖尿病也帶下者為子宮出血及白帶下之總稱也手足寒熱為手足煩熱之誤三黃湯治下焦結熱不得大便千金翼曰三黃湯主解散腹痛脹滿之發於卒急者外臺秘要曰集驗大黃散求真按即本方療黃疸身體面目皆黃肘後百一方曰惡瘡三十年不愈者大黃黃芩黃連各三兩為散洗瘡淨粉之日三次無不瘥者醫林集要曰瀉心湯治咳逆大便軟利者和劑局方曰三黃圓治丈夫婦人之三焦積熱上焦有熱則攻衝眼目而赤腫頭項脹痛口舌生瘡中焦有熱則心膈煩躁飲食不美下焦有熱則小便赤澀大便秘結五藏俱熱即生癰癤瘡痍及治五體之痔疾糞門腫痛或下鮮血小兒之積熱亦宜服之求真按以上諸證皆炎性充血使然故本方能治之而本方證之出血如此說以鮮赤色為常非如瘀血性出血而帶暗紫黑色者宜注意分別之三因方曰三黃圓治骨實極熱耳鳴面色焦枯隱曲而膀胱不通牙齒腦髓苦痛手足酸疼大小便閉求真按骨實極熱隱曲而膀胱不通者是古之病理說雖意義不明但其他之由於炎性機轉者不難察知聖濟總錄曰金花丸求真按即本方之丸方急勞煩躁羸瘦面色萎黃頭痛眼澀多困少力者三味等分為末煉蜜丸服之衛生寶鑒補遺曰煩躁發熱胸中煩悶已經汗解而內耗胸中煩滿其證不虛不實用活人三黃瀉心湯求真按亦即本方古今醫統曰三黃丸治遺精有熱者名醫方考曰三黃瀉心湯治心膈實熱狂躁面赤者活人書曰三黃湯治婦人傷寒六七日胃中有燥屎大便難煩躁譫語面赤毒氣閉塞不得流通者幼科發揮曰三黃瀉心丸求真按此即本方之丸方一名三黃五色丸利諸驚熱痘證寶箋曰痘瘡有胃實聲啞者必口渴熱盛大便秘結其瘡不起發宜三黃湯又大便閉結脹悶痘發不齊並不起脹形色赤紫三黃湯以通之則痘易起而色轉順保赤全書曰三黃丸治麻後赤白痢裡急後重身實者松原家藏方曰瀉心湯治卒倒人事不知心下痞堅痰喘急迫者瀉心湯卒倒瘛瘲口噤不知人事手足逆冷脈沉遲者或狂癇癲癇癡癇皆主之芳翁醫談曰凡癇家雖有數百千證然治之莫如三黃瀉心湯其眼泡惰而數瞬呼吸促迫如唏之類用之則最效欲使其長服宜為丸與之但效稍緩耳癇家衝突卒然衝膈似衝心而非者甚有見異證者宜辰砂丸其自汗甚者亦因衝突而然宜三黃瀉心湯甚者加牡蠣主之一男子患失精數年與人並坐自不知其漏泄諸醫盡力不得治故延師師至將診之問曰余之病可治乎曰可治病者乃屈一指尋又問如初師曰可治又如是不已至十指抱劍去師曰癇也以三黃瀉心湯而痊愈一婦人嘗患哮喘平居多忘而嫌師診師亦知其癇與同方至五年痊愈今其夫亦有疾屬癇近更吐血久不止自作三黃加地黃湯求真按即本方加地黃服然無效終至於招余余至曰此方實適宜於病豈有他邪耶但去地黃加芒硝則益佳然尚有方略請作劑以芩連各六分大黃一錢二分芒硝一錢為一劑以水一合半小便半合合煎一沸日服二三劑三日全止求真按雖處適當之劑若藥量不得其宜難期奏效此學者最宜留心處也豈獨本方為然哉發狂莫如三黃瀉心湯若兼用瀑布泉則更妙小兒多驚搐宜三黃瀉心湯如有表證者宜葛根湯痘家宜甘連湯求真按宜小柴胡小柴胡加石膏湯者反多當注意一男子患齒齦出血每旦起則出頃刻而止雖午眠寤後亦必出檢無他證但舌上少有褐色而勞思則更甚云醫治無效年餘請治此癇也若不怕下則可治乃與三黃加芒硝湯三十日許痊愈建殊錄曰有一人年二十餘積年患吐血每旬必一發丙午秋大吐吐已氣息頓絕迎眾醫救之皆以為不可為矣於是家人環泣謀葬事先生後至視之似未定為死者因以纊著鼻間猶能蠕蠕而動乃按其腹有微動蓋氣未盡也急作三黃瀉心湯飲之每帖重十五錢須臾腹中雷鳴下利數十行即醒出入二十日許痊愈十餘年不復發漫游雜記曰一男子患下疳修治不順如愈如不愈經數月秋間浴於溫泉二十日毒氣大發骨節刺痛遍身腫脹不能起作過十餘旬經治三醫不愈其兄與余相商往診之不出室者已百餘日脈數氣促夜不安眠目光瑩然常依悲愁髮亂面腫潰爛如新發之桃花診其腹膿汁粘手乃作再造散六十錢三黃湯二十帖與之曰十日間服盡十日後一人來乞藥且曰穢物已下六七行又十日往再診病形減半寤寐安靜乃作五寶丹使如法服之二劑而愈余曰子毋太喜五寶丹可散毒而不能盡毒今得愈者非痊愈也惟散遍身耳不日將再發也不信修養有間三十日果再發於是遽服前方自秋至冬更越春夏漸漸平復惟瘡根堅凝未散余曰餘毒猶未盡也宜益服前方又一年以上三十餘月而痊愈嗚呼濕毒浸潤急急難除有如此者一女子患腫毒左肘腫起如饅頭遍身無肉脈數氣急咳嗽潮熱一如傳尸審問其病狀近年骨節疼痛腰背冷月事不下蓋因濕毒壅於經脈乾血得攻其中也乃與濕漆丸一錢十餘日大便下臭穢物遍身發赤疹陰門突出痛癢難堪而脈數氣急減半於是作瀉心湯與濕漆丸併進三十日覺肌膚生肉咳嗽潮熱徐徐而退約二月許而愈求真按濕漆丸由生漆大黃二味而成雖為驅瘀血的殺蟲殺菌劑但其作用峻烈故余以起廢丸代之古方便覽本方條曰一男子三十餘患熱病不愈三十日許背惡寒殊甚皮膚燥熱飲食不進余診之腹內濡唯心下滿按之不痞與此方汗大出諸證頓退十五六日痊愈求真按不痞者不痞硬之誤也方輿輗曰瀉心湯治子癇若發則目吊口噤痰涎壅盛昏暈不省時醒時作者子癇者孕婦卒發癇也治方宜瀉心湯或使間服參連熊膽汁等折其大勢然後視證轉方可也此證往時世醫通用羚羊角散但不如瀉心湯之單捷求真按參連即參連湯也經血錯出於口鼻稱逆經又謂錯經先哲謂火載血上也龔雲林用生地黃於四物湯中加大黃童便治驗載萬病回春甚有理往年一女子患此疾起時吐衄後至眼目耳十指頭皆血出形體麻木手足亦至於強直余投瀉心湯十日血止後與回生湯調理復舊此婦之病為錯經中之最劇者也求真按回生湯由當歸川芎大黃黃連桂枝白朮芍藥黃芩茯苓地黃甘草人參木香丁香萍蓬十五味而成之方但不外當歸芍藥散苓桂朮甘湯瀉心湯合方之意若合用此三方不如合前二方兼後一方其丸方已可無須回生湯也瀉心湯此方不僅治吐血衄血即下血尿血齒衄舌衄耳衄等一身九竅出備者無不治之誠為血證之玉液金丹也瀉心湯墜打損傷昏眩不省人事者及出血不已者大宜此湯金瘡亦唯用此湯可也墜打者自高處墜下或被重物壓下或被物擊等而致身體損傷時氣逆昏眩者急與瀉心湯為妙血出不已者益佳求真按此證有當以桃核承氣湯治之者不可不知腹證奇覽曰三黃瀉心湯治心氣不定心下痞不定者覺心中急無著落跳動而塞於胸中若以手按之卻不似跳動此氣血之熱也故有吐血衄血等證者或成痔疾下血便血等證者或致狂亂證者是由心氣不定也或血氣上衝而眼目生赤翳或頭項腫熱口舌熱瘡疔癤熱疼或氣疾積聚之心悸驚煩產後血崩便秘脈數心下痞硬衝熱面赤等證或小兒丹毒積熱及一切之血熱血氣上逆而心煩心悸者及天行下利膿血求真按天行者流行性或傳染性也等證要之皆以心下痞心中煩悸不定者為腹證之準據而可用之故證曰心氣不定吐血衄血者瀉心湯主之金匱不定作不足非也今從千金方瀉心者瀉心中之血熱也心者血之所注血者得陽氣而循環於一身陽氣有餘時則血上逆而湧出以致吐血衄血也以是心氣搖搖不定常跳動而無著落或驚悸憂慘甚者發狂此之謂心氣不定也求真按此說之心字可作腦髓與心臟二義看因其所在構造機能不同故也若以二臟混同立論者為極不合理也如能深思熟慮時則能立知其不同若心力強盛而悸動加疾速時其動脈係之血量因而異常增加致成全身之充血故此時比他臟器組織之血管為豐富而口徑亦增大以致腦髓之充血亦比其他之充血程度為大而起強度之充血又因腦髓比其他弱度者更易受刺激故先於他臟器發其強的機能障礙也明矣況腦髓之感受性比其他為銳敏乎是以心腦二者關係密接而不可分也故假令二者混同於事實上亦無不可但學者必須有此觀察法不可堅執於文字之表面而當探知其真相也用方經驗曰瀉心湯按吐血衄血下血及氣逆血暈或發狂癇癖者以此為的治因能鎮心氣理血脈之劑也求真按理血脈九字實為本方之眼目故心下鬱熱上衝而至眼之血膜攀睛或胃火上逆口臭舌衄牙疳齒痔者加羌活石膏則益妙此證當與大黃黃連瀉心湯互參求真按加石膏已足無加羌活之必要餐英館治療雜話本方論曰此方以心下痞大便秘而上氣者為目的及一切上焦有蓄熱或口舌生瘡或逆上而眼目赤者皆當以大便秘為目的又痔瘡肛門腫痛下鮮血者亦必有效見局方以鮮血之鮮字為眼目鮮血者真赤色之血也凡血證色黯淡者寒也鮮者熱也吐血證世醫雖知用此方然不知用於下血證又謙齊之訣過食辛熱厚味而足脛痛者有效若不知者則不可用之類聚方廣義本方條曰中風卒倒人事不省身熱牙關緊急脈洪大或鼾睡大息頻頻欠伸者及省後偏枯癱瘓不遂緘默不語或口眼喎斜言語蹇澀流涎泣笑或神思恍惚機轉如木偶人者宜此方能解宿酲甚妙酒客鬱熱下血者腸痔腫痛下血者痘瘡熱氣熾盛而七孔出血者產前後血暈鬱冒或如狂者眼目焮痛赤脈怒張面熱如醉者齲齒疼痛齒縫出血口舌腐爛唇風走馬疳喉痹焮熱腫痛而重舌痰胞不能語言者此二證以鈹針橫割去其惡血取瘀液為佳癰疔內攻胸膈冤熱心氣恍惚者發狂眼光瑩瑩倨傲妄語晝夜不眠者以上諸證若有心下痞心中煩悸之證用瀉心湯其效如響方伎雜志曰一人下血即請診治周身面色青白爪甲白舌亦無血色而乾燥脈沉弱胸動亢息強切飲食不進大便晝夜有數次檢其大便皆血也且有數血塊日日如是云是因嚴冬之寒氣劇烈日日餐風不宿亭旅寒氣難堪血氣耗脫故身體手足逆冷也余與瀉心湯合四逆加人參湯三帖使交互服之服藥後血少減身體手足亦溫至春血止大快但尚有虛熱之候一身手足蒸熱因轉柴物湯通計三十餘日而復舊此人已六十餘歲矣若以其年齡與病證之脫血及嚴寒之氣候而論當時預料其不能治愈今得痊愈者可謂大幸矣求真按柴物湯者即柴胡四物湯之變則的方劑也已述於前不可用之黃芩之醫治效用藥徵曰黃芩主治心下痞也兼治胸脅滿嘔吐下利此說雖是若不加因於充血或炎性機轉九字則難為完璧心下痞者有因於充血或炎性機轉者有因氣逆者有因停水者原因不一故也是以上文須改作黃芩因於充血或炎性機轉而心下痞者為主目的胸脅滿嘔吐下痢等為副目的而用之下說亦同為本藥應用之副目的本草綱目曰黃芩根氣味苦平無毒主治諸熱黃疸腸澼泄痢惡瘡疽蝕火瘡本經療痰熱胃中熱小腹絞痛消穀求真按消穀者促進消化也女子血閉淋露下血小兒腹痛別錄治熱毒骨蒸寒熱往來腸胃不利治五淋去關節煩悶解熱渴求真按本藥治熱渴作用效力微弱甄權下氣主天行熱疾疔瘡排膿治乳癰發背大明治肺中濕熱瀉肺火上逆療上熱目中腫赤瘀血壅盛求真按此瘀血非真瘀血因充血或炎性充血之意可知上部積血安胎元素治風熱濕熱頭疼奔豚熱痛火咳肺疼喉腥諸失血求真按諸失血出血也時珍發明元素曰黃芩之用有九瀉肺熱一也治上焦皮膚風熱風濕二也去諸熱三也求真按諸熱之上當冠以少陽病三字利胸中氣四也消痰膈五也除脾經諸濕六也消痰膈除脾經諸濕者即除呼吸及消化器之濕熱也夏月須用七也婦人產後養陰退陽八也安胎九也求真按養陰退陽者去熱也本藥之安胎者恐母體有炎證而致將欲流產之際若用本藥則能去此炎證故得安胎也酒炒上行主上部積血求真按雖不用酒炒亦能主上部之積血非此不能除下痢膿血腹痛後重身熱久不能止者與芍藥甘草同用之求真按本藥與芍藥甘草同用即黃芩湯之方意唯少大棗耳凡諸瘡痛不可忍者宜芩連苦寒之藥求真按凡諸瘡熱痛云云若不作則不得以黃連黃芩為主治附子瀉心湯之注釋心下痞而復惡寒汗出者附子瀉心湯主之傷寒論註心下痞呈瀉心湯證者若為陽實證則有發熱而無惡寒今不拘心下痞而惡寒汗出之上加一復字者暗示反於瀉心湯證也而此惡寒與汗出者是非有表候為陽虛證之徵故以瀉心湯治心下痞以附子治此惡寒與汗出也附子瀉心湯方大黃克黃連黃芩附子各克上藥各別細銼漬大黃黃連黃芩味於沸湯克內須臾絞去滓別以水克煮附子取克合而頓服之先輩之論說芳翁醫談曰中風卒倒者最難治與附子瀉心湯間有得效然多死者求真按是論腦出血之陰陽虛實相半者其陽實證者不可混同之方輿輗本方條曰瀉心湯證有但欲寐者甚者食時與服藥亦睡又手尖微冷等證亦宜此方類聚方廣義本方條曰老人停食瞀悶暈倒不省人事心下滿四肢厥冷面無血色額上冷汗脈伏如絕其狀類中風者稱為食鬱食厥宜附子瀉心湯梔子豉湯之注釋發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之傷寒論註本條發汗吐下後虛煩不得眠者梔子豉湯主之發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之可分作如是解則前者為輕證後者為劇證也而虛煩不得眠者因發汗吐下諸毒悉被驅逐但欲示僅有殘餘熱毒遺留刺激大腦皮質若已經汗吐下則腹內空虛無病毒之阻滯因有不眠煩悶之虛狀故加虛煩二字也又反覆顛倒者輾轉反側也因不眠之甚而遂致此心中懊憹者類聚方廣義云成無己曰懊憹者俗謂骨突是也蓋心中憒悶不可名狀之義劉完素曰懊憹者煩心熱躁悶亂不寧也若以現代的解說換言之則懊憹者即因炎性充血腦刺激症狀中之劇烈者而不眠與反覆顛倒亦皆由於此也發汗若下之而煩熱胸中窒者梔子豉湯主之傷寒論註窒者腹證奇覽云窒者如空房滿塞不受物也雖能吞咽食物胸中亦覺阻塞此亦因熱鬱結於心胸所致即有食管狹窄之自覺而因熱毒之故致食道黏膜乾燥食物不滑利也故酒客之咽下困難等可知以本方及類方為主治矣傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之傷寒論註心中結痛者謂心臟部之一處疼痛也詳解於桂枝生薑枳實湯條下凡用梔子豉湯病人舊微溏者不可與服之傷寒論註舊即久微溏微下痢者因陰虛證當處以溫熱藥故不可用冷藥如本方也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之傷寒論註尾臺氏曰此章凡四段若擬其治法自陽明至身重白虎湯證也若發汗以下當與大承氣湯若加燒針以下直與桂枝甘草龍骨牡蠣湯若下之以下梔子豉湯證也若渴欲飲水以下不屬上文恐有誤乎山田氏曰自陽明至身重二十七字乃熱結在裡為無燥屎之證與前三陽合病條求真按此條揭於陽明病篇白虎湯條同宜與白虎湯以挫其熱若認其脈浮以為表未解而發其汗則津液越出大便為硬使人反煩躁心亂而譫語此承氣證也云反者謂徒發其汗不惟無益而反使增劇也若加燒針則致大逆怵惕煩躁不得眠即所謂太陽傷寒若加溫針則必驚是也乃係桂枝去芍藥加蜀漆龍骨牡蠣湯或桂枝甘草龍骨牡蠣湯證也求真按以上雖為良說以下卻有謬論不可不取舍之若以其腹滿汗出而惡熱以為有燥屎而下之則胃中空虛客氣動膈使人心下痞硬所以然者以本無燥屎也乃甘草瀉心湯證求真按妄加心下痞硬以為甘草瀉心湯證非也又按梔子豬苓二證並非陽明病而冒以陽明病者以舌苔口渴皆為陽明部位之證也此二說雖不無瑕瑾但足以窺本條之大意胃中空虛者為白虎湯證而誤以大承氣湯下之之結果客氣者反於正氣之邪氣也膈者胸膈也客氣動膈者邪氣攪亂胸膈也若由心中懊憹舌上有苔觀之則此邪氣為熱氣也明矣故以本方為主治也陽明病下之其外有熱手足溫不結胸心中懊憹饑不能食但頭汗出者梔子豉湯主之傷寒論註結胸則當心下硬滿本方證以胃中空虛為常故云不結胸暗示與大陷胸湯證各別宜與同湯條對照饑而不能食者由於胸中窒但頭汗出者頭腔內外之熱氣比他部為劇也下利後更煩按之心下濡者為虛煩梔子豉湯主之傷寒論註以前諸條主就舌及外證而論惟本條則專述其腹證下痢後煩悶一旦已去而更再發觸診病者之心下部到腹底皆軟弱者此非實證之煩悶而為虛證也故當以本方治之以是可知胃中空虛及虛煩之義又可推之以為一般虛實之鑒別梔子豉湯方梔子克香豉克上各別細銼以水克煎梔子成克去滓入香豉再煎為克去滓頓服先輩之論說治驗千金方本方條曰治少年房多短氣聖濟總錄曰豉梔湯求真按此即本方也治蝦蟆黃舌上起青脈晝夜不睡者求真按蝦蟆黃者黃疸之一種也時後百一方本方條曰治霍亂吐下後心腹脹滿者求真按雖云心腹脹滿恐是腹內中空屬於所謂虛滿者乎名醫類案曰一男子患傷寒十餘日身熱無汗怫鬱不得臥不躁不煩不寒不痛時發一聲如嘆息狀醫者不知何證迎余診視曰懊憹怫鬱證也投以梔子豉湯一劑減十之二三再與大柴胡湯下其燥屎怫鬱除而安臥調理數日而起小兒藥證直訣曰梔子飲子求真按是即本方也治小兒蓄熱在中身熱狂躁昏迷不食者腹證奇覽本方條載松川世德之治驗曰一婦人年二十五血下數日身體倦怠心煩微熱服藥無效余與本方二帖血下減半婦人喜乞藥與前方數帖痊愈某君跌而撲腰爾來血下小腹微痛服藥無效余以為此病由於轉仆驚惕所致乃進本方數帖痊愈一婦人年七十餘鼻衄過多止衄諸方無效余問其狀頗有虛煩之象因作本方與之四五日後來謝曰服良方忽已一老人年八十許一日鼻衄過多鬱冒恍惚乃與本方而愈類聚方廣義本方條此方惟梔子香豉二味然施於其證時其效如響若不親試安知其效梔子甘草豉湯之注釋發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之傷寒論註少氣者雖為淺表性呼吸然不外急迫症狀故欲緩和之新加甘草也梔子甘草豉湯方梔子甘草各克香豉克煎法用法同梔子豉湯先輩之治驗千金方本方條曰梔子豉湯治食宿飯陳臭肉及羹宿菜等而發者松川世德之本方治驗曰伴藏之妻產後下血過多忽唇舌色白氣陷如眠脈如有如無殆將死矣乃以荐齅苦酒使作本方加甘草與之半時許盡五六帖忽如大寐之寤矣求真按荐齅川芎也川芎之古名為芎藭苦酒食醋也則以荐齅苦酒使作本方加甘草者加川芎於本方以醋及水煎之也梔子生薑豉湯之注釋發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯生之若嘔者梔子生薑豉湯主之傷寒論註以梔子豉湯證而嘔者故方中新加生薑也梔子生薑豉湯方梔子克香豉生薑各克煎法用法同前先輩之治驗松川世德之本方治驗曰一男子便血數月雖服藥漸愈但身體無色面上及兩腳浮腫心中煩悸頭微痛時時嘔寸口脈微乃與本方加生薑愈枳實梔子豉湯之注釋大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子大五六枚服之則愈傷寒論註瘥者病雖已治大半尚未全復健體也勞復者因種種不攝生而病證再發也本條之勞復以飲食不適為主治之以本方也所以者病者若怠於飲食等之攝生時尚未全復常態不僅使刺激消化管而發炎且使胃部有停滯膨滿之自他覺故用梔子豉湯治炎證以苦味健胃解凝藥微有緩下作用之枳實治胃部之停滯膨滿感也故於腹證上診得梔子豉湯證外更於心下部有膨滿也是以東洞翁以本方為治梔子豉湯證而胸滿者為定義也枳實梔子豉湯方枳實克梔子克香豉克上各別細銼先空煮醋二勺水二合為一合二勺納枳實梔子煮為五勺去滓納豉五六沸頓服之先輩之論說傷寒蘊義曰枳實梔子豉湯治食復勞復而身熱心下痞悶者如宿食不下大便秘實脈中有力者宜加大黃內外傷辨惑論本方條曰食膏粱過多而煩熱悶亂者亦宜服之類聚方廣義本方條曰凡大病新瘥血氣未復勞動食啖過度時則心胸滿悶或作煩熱與此方使將養之則愈若大便不通有宿食者宜枳實梔子大黃豉湯枳實梔子大黃豉湯之注釋大病瘥後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子大五六枚服之則愈傷寒論註前方證若因不消化物停滯於胃腸內者於前方加用大黃如博棋子大者五六個則治矣而博棋子大者千金方云博棋子者長二寸方一寸也東洞翁以博棋子大五六枚為六分故以克量換算時為克可以推想其意矣前方證於梔子豉湯證外僅有胃部停滯膨滿之自他覺證故加枳實於梔子豉湯以對應之但本方證加不消化物停滯以枳實獨力不足以治之故更加大黃以驅除之於其腹證上不止胃部有停滯膨滿之自他覺證若按之則有比較的緊滿充實於腹內之感且概伴便秘而覺有多少之抵抗是以東洞翁以本方為治枳實梔子豉湯證之大便閉者為定義也酒黃疸心中懊憹或熱痛枳實梔子大黃豉湯主之金匱要略註酒黃疸酒客黃疸也熱痛者肝或膽囊部有熱有疼痛也但由余之經驗本方證之黃疸於肝或膽囊部腫脹硬結有自他覺的疼痛或懊憹或熱痛者故有此腹證時不論是否酒客總以用本方與大小柴胡湯合用之機會為多枳實梔子大黃豉湯方梔子克大黃克枳實克香豉克煎法用法同小柴胡湯梔子柏皮湯之注釋傷寒身黃發熱者梔子柏皮湯主之傷寒論註腸傷寒經過中致黃疸發熱者以本方為主治也其與前方異處以彼方中有枳實大黃故呈前記之腹證本方為治熱毒黃疸梔子蘗皮之外不過有緩和藥之甘草故於腹診上無何等可以徵知是以東洞翁謂本方定義為治身黃發熱心煩者梔子柏皮湯方梔子克甘草克黃柏克煎法用法同前先輩之論說方輿輗本方條曰茲云發熱者是蒸蒸發熱非翕翕發熱也此方之治專為解熱也求真按此說是也可從之類聚方廣義本方條曰洗眼球黃赤熱痛甚有效又胞瞼糜爛癢痛及痘瘡落痂以後眼猶不開者加枯礬少許洗之皆妙梔子之醫治效用藥徵曰梔子主治心煩也兼治發黃此說雖無不可但心煩之原因極多以此一藥而主治多種原因性之心煩似不妥當故此論當改作梔子主治因充血或炎性機轉之劇性心煩也兼治發黃出血等若由此論則與黃連似無區別此藥除有以上治效之外更有利尿之物能故不難鑒別之尚宜參考以下諸說本草綱目曰梔子氣味苦寒無毒主治胃中熱氣面赤求真按此即因顏面充血也酒疱皶鼻求真按此即酒皶鼻也白癩赤癩瘡瘍本經療目赤熱痛胸心大小腸大熱心中煩悶別錄去熱毒風除時疾熱解五種黃病求真按黃病黃疸也利五淋求真按五淋者乃膀胱尿道疾患有種種之別也通小便解消渴明目甄權主瘖啞紫癜風孟詵治心煩懊憹不得眠臍下血滯而小便不利元素瀉三焦火清胃脘血治熱厥心痛解熱鬱行結氣震亨治吐血衄血血痢下血血淋損傷瘀血及傷寒勞復熱厥頭痛疝氣湯火傷時珍發明元素曰梔子能瀉肺中火邪其用有四治心經客熱一也除煩躁二也去上焦虛熱三也治風四也求真按此風癩也震亨曰梔子瀉三焦之火及痞塊中火邪最清胃脘之血其性屈曲下行能降火從小便中泄去本草備要曰梔子苦寒瀉心肺邪熱使其屈曲下降自小便出以解三焦之鬱火以平熱厥心痛以息吐衄血痢血淋之病治心煩懊憹不眠五黃五淋亡血津枯口渴目赤紫癜白癩疱皶瘡瘍香豉之醫治效用治六畜鳥獸肝中毒方豆豉浸水絞取汁服數升即愈金匱要略本草綱目曰淡豆豉氣味苦寒無毒主治傷寒頭痛寒熱瘴氣惡毒煩躁滿悶殺六畜胎子諸毒別錄治時疾熱病發汗熬末能止盜汗除煩生搗為丸服治寒熱風胸中生痞煮服治血痢腹痛研末塗陰莖生瘡藥性治瘧疾骨蒸中毒藥蠱氣犬咬大明下氣調中治傷寒溫毒發斑嘔逆時珍本草備要曰淡豆豉苦泄肺寒勝熱發汗解肌調中下氣治傷寒頭痛煩躁滿悶懊憹不眠發斑嘔逆血痢溫瘧藥徵曰香豉主治心中懊憹也兼治心中結痛及心中滿而煩氣血水藥徵曰香豉治腫膿之水由以上諸說則可知本藥為消炎解熱性之解毒藥有作用於腦及心臟之特能黃柏之醫治效用本藥為消炎性收斂藥也由下說可以證明本草綱目曰柏木一名黃柏氣味苦寒無毒主治五臟腸胃中結熱黃疸腸痔止泄痢女子漏下赤白陰傷蝕瘡本經療皮膚熱赤起目熱赤痛口瘡別錄熱瘡疱起血痢止消渴藏器敷莖上瘡治下血如雞鴨肝片甄權治鼻衄腸風下血後急熱腫痛大明梔子乾薑湯之注釋傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之傷寒論註本條讀如字義故無特解之必要但此微煩與梔子豉湯之純熱虛煩異是陰陽交錯而然故合治熱之梔子醫寒之乾薑以為本方而應之梔子乾薑湯方梔子乾薑各克煎法用法同前先輩之論說楊氏家藏方曰二氣散求真按此即本方也治陰陽痞結咽膈噎塞如梅核妨礙飲食久而不愈即成反胃者求真按楊氏轉用本方於食管狹窄者恐著眼於仲景所說梔子豉湯之胸中窒與乾薑之治噁心嘔吐也聖惠方曰治赤白痢不問日數老少乾薑散方求真按此即本方加薤白七莖豉半合也成績錄曰己未秋疫痢流行其證多相似大概胸滿煩躁身熱殊甚頭汗如流腹痛下痢色如塵煤行數無度醫療之皆入鬼簿先生取桃仁承氣湯梔子乾薑湯相互為治無一不救者黃連解毒湯及丸方連芩梔大黃此丸方余略稱為黃解丸黃連黃芩梔子各克大黃克上細銼如瀉心湯法煎服又為丸一日三回分服但作煎劑時當適宜增量之本方外臺秘要稱大黃湯雖為著者唐之王燾創方但不外出於仲景之瀉心湯與梔子豉湯去香豉之合方故瀉心湯之主治即為本方之主治而梔子豉湯主治之半亦為本方之主治此本方之所以應用範圍廣大也故余大概不用以上二方及大黃黃連瀉心湯而惟運用本方也第二黃連解毒湯及丸方連芩梔柏求真按此即後世醫所謂黃連解毒湯及丸方也恐與前混故有此新名黃連黃芩梔子黃柏各克煎法用法同前本方本稱黃連解毒湯亦王燾所創其實去瀉心湯中之大黃與梔子柏皮湯除甘草之合方而已故本方之方意與方用即於瀉心湯去大黃及梔子柏皮湯去甘草中求之與前方異處是在大黃之有無如何而不關於黃柏之存否黃柏之存否雖不無關係但此藥物與彼此二方共通之梔子大同小異故暫除外亦無不可故前方有大黃所以治實證而本方則治虛證也酸棗仁湯之注釋虛勞虛煩不得眠酸棗仁湯主之金匱要略註仲景以冒頭稱虛勞如有本方證者一見有貧血虛弱之狀而虛煩不得眠者類似於梔子豉湯證但無如彼之熱及舌苔腹證亦相似以此方中有茯苓故心尖心下有虛悸而富於神經症狀且無如彼之充血及炎性機轉是二者之區別也酸棗仁湯方酸棗仁克甘草克知母茯苓芎藭各克煎法用法同小柴胡湯先輩之論說方機本方主治曰煩而不得眠者煩躁而眠不寤者方輿輗曰酸棗仁湯治虛勞煩悸不得眠煩悸金匱原作虛煩今從千金方改之煩悸二字能貫不寤之病源學者宜注意虛勞可輕視之求真按虛勞不可輕視類聚方廣義本方條曰諸病久久不愈尪羸困憊身熱寢汗口乾咳嗽大便溏小便澀飲啖無味者宜此方隨證選加黃耆麥門冬乾薑附子等健忘驚悸怔忡三證有宜此方者隨證擇加黃連辰砂求真按此等證以本方證為多由余所經驗者無加辰砂之必要脫血過多心神恍惚眩暈不寐而現煩熱盜汗浮腫者宜此方合當歸芍藥散求真按有本方證病者往往有以眩暈為主訴者當注意尾臺氏雖稱煩熱但非高熱不可誤解東洞先生治一病人昏昏不醒如死狀已及五六日者用此方有速效可謂圓機活法矣勿誤藥室方函口訣本方條曰此方和潤心氣而使安眠也夫治不得眠有三法若心下當肝膽部分因有停飲而動悸不得眠者溫膽湯證也求真按此非溫膽湯證是大小柴胡或柴胡桂薑湯證也若胃中虛客氣動膈不得眠者甘草瀉心湯證也求真按不特甘草瀉心湯證梔子豉湯證不少若血氣虛燥心火亢而不得眠者此方主之濟生之歸脾湯實由此方引申而成者也又千金配石膏於酸棗仁湯者可用於此方證之有餘熱者求真按不眠之原因極多不可預擬方劑也酸棗仁之醫治效用本藥為收斂性神經強壯藥故不問為不眠或多眠或其他苟神經證而屬於虛證宜收斂者悉皆主治之觀前記及下列諸說可知此義矣本草備要曰酸棗仁甘酸而潤專補肝膽炒熟則酸溫而香亦能醒脾助陰氣堅筋骨除煩渴斂汗寧心療膽虛不眠酸痹久瀉取其酸收也生用則酸平療膽熱好眠藥徵曰酸棗仁主治胸膈煩躁不得眠又曰時珍曰熟用不得眠生用則好眠誤矣眠與不眠無關於生熟乃因胸膈煩躁或眠或不眠者服酸棗仁則復常耳然則酸棗仁之所主非眠與不眠也求真按本藥非由生熟分其作用已如東洞翁所言但主治胸膈煩躁而不得眠者亦非也夫胸膈不僅不得為左右眠與不眠之機關且煩躁之原因不一故不可以本藥為主治也黃芩湯及黃芩加半夏生薑湯之注釋太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯主之傷寒論註太陽與少陽合病者有太陽病之頭項強痛而惡寒發熱自包在內與少陽病之口苦咽乾目眩併發也自下利者非由藥力自然下痢也前半段之頭項強痛惡寒發熱口苦咽乾目眩及自然的下痢者可與黃芩湯也後半段若更加噁心嘔吐者以黃芩加半夏生薑湯為主治也然仲景此論僅述本方之外證而未及腹證故以東洞翁之黃芩治心下痞及芍藥大棗甘草之醫腹直肌攣急者補之於下前方之定義治下利腹拘急心下痞者後方之定義治黃芩湯證而嘔逆者自此論定故可從之假令外證雖未備而有此腹證時亦可與此二方此二方與小柴胡加芍藥湯之主治頗相類後方尤似所不同者此二方有多量之黃芩故心下痞明顯而惡寒發熱此惡寒發熱非真表證故脈無浮數之候因大棗芍藥甘草之量亦大故腹直肌攣急亦隨甚小柴胡加芍藥湯因此等藥物少量故心下痞腹直肌攣急微弱但用多量之柴胡故有胸脅苦滿往來寒熱也乾嘔而下利者黃芩加半夏生薑湯主之金匱要略註與前所異者僅嘔與乾嘔之差耳乾嘔俗稱呃逆傷寒雜病辨證云乾空也乾嘔者空嘔無物也巢氏云乾嘔者胃氣逆故也但嘔而欲吐吐無所出也故謂之乾嘔成無己曰嘔者有聲者也吐者吐出其物也故有乾嘔而無乾吐以是乾嘔則曰食穀欲嘔乾吐則云飲食入口即吐可知嘔吐之有輕重矣合參二說其義彰然蓋嘔與吐較則吐較嘔輕吐與乾嘔較則乾嘔比吐輕然三者亦各有輕重不可一概拘定之黃芩湯方黃芩大棗各克甘草芍藥各克煎法用法同前黃芩加半夏生薑湯方黃芩大棗生薑各克甘草芍藥各克半夏克煎法用法同前先輩之論說傷寒六書曰黃芩湯治發熱口乾鼻燥能食者拔萃方曰芍藥黃芩湯求真按此即黃芩湯也治泄利腹疼或裡急後重身熱久不愈而脈洪疾及下痢膿血稠黏者醫方集解曰黃芩加半夏生薑湯治膽腑發咳嘔苦水如膽汁者證治要訣曰黃芩加半夏生薑湯治太陽與少陽合病頭痛腰痛往來寒熱胸脅疼痛而嘔者類聚方廣義本方條曰治痢疾發熱腹痛心下痞裡急後重便膿血者加大黃若嘔者黃芩加半夏生薑湯中加大黃求真按痢疾者為大腸炎與赤痢等之總稱膿血者黏血便之謂也此等病證裡急後重者乃欲驅逐腸內毒物而自然妙機之力有所不及之徵故有此症狀時不拘黏血便之有無不得不加用大黃以補助此妙機又有黏液便或黏血便者因細菌毒素之刺激而腸黏膜發炎炎性產物停滯與炎性機轉之進展為黏膜血管破潰之候故亦當講加用大黃以消炎之策且欲蕩滌此等毒物也故裡急後重已去至不認為黏血或黏液便時若無特別情形時當即去大黃也勿誤藥室方函口訣黃芩湯條曰此方為少陽部位下痢之神方與後世之芍藥湯等方不可同日而論也但同為下利柴胡主往來寒熱此方主腹疼故此證若有嘔氣即不用柴胡而用後方求真按後方者指黃芩加半夏生薑湯也也六物黃芩湯之注釋外臺黃芩湯治乾嘔下利金匱要略註外臺黃芩湯因與前之黃芩湯易混而本方包容藥物六味故名六物黃芩湯也本方治乾嘔下利與黃芩加半夏生薑湯治乾嘔而利者文義上殆無差別故東洞翁以本方治心下痞硬乾嘔下利而上衝者為定義與彼治黃芩湯證而嘔逆者有別也然此大別耳欲詳論之彼證為純陽證有腹直肌攣急者本方證為陰陽相半方中有人參乾薑因兼陰證也無芍藥甘草故腹直肌之攣急輕微有人參故有心下痞硬含桂枝故有上衝之候且呈一般之虛狀故不難分別之六物黃芩湯方黃芩人參乾薑大棗各克桂枝克半夏克煎法用法同前先輩之論說治驗成績錄曰一男子患痢日三十餘行自不知其利求真按無裡急後重可知腹痛乾嘔不能食胸中煩心下痞硬身熱微渴口苦唇乾舌上無苔脈微數求真按舌上無苔脈微數為陰虛證之徵不能起臥醫以為困極先生與六物黃芩湯而愈類聚方廣義本方條曰久痢疝痢乾嘔不止間有宜此方者勿誤藥室方函口訣本方條曰此方位於黃芩湯求真按宜作黃芩加半夏生薑湯與桂枝人參湯之間用於上熱下寒之下痢有效且黃芩湯主腹痛求真按不必以腹痛為主此方主乾嘔桂枝人參湯主無腹痛與嘔而有表熱屬於虛寒者蓋此方類於半夏瀉心湯而治下利之效為尤捷也三物黃芩湯之注釋婦人在草蓐自發露得風四肢苦煩熱頭痛者與小柴胡湯頭不痛但煩熱者三物黃芩湯主之金匱要略註金匱作但煩者今從千金方作但煩熱者尾臺氏曰小柴胡湯治四肢煩熱頭痛惡風嘔而不欲食等證此方治外證已解但四肢煩熱或心胸苦煩者以此分辨之則可明本條之義矣三物黃芩湯方黃芩苦參各克乾地黃克煎法用法同前多吐下蟲先輩之論說治驗千金方曰苦參湯求真按此即本方也治天行熱病五六日以上者外臺引肘後療傷寒汗出不已三四日胸中惡欲使吐方求真按此方即本方惡噁心之略也方機本方主治曰四肢煩熱者兼用黃連解毒散類聚方辨曰三物黃芩湯治血脫鬱熱在裡者曰四肢苦煩熱者示有鬱熱在裡也煩熱也是虛熱而非實熱故攻四肢也若頭痛者為邪氣外襲而煩熱故致頭痛非以煩熱為主也是以小柴胡湯逐外襲之邪氣則煩熱自治矣若自然煩熱者此方主之成績錄曰一人年二十餘胸中煩悶按腹則空洞無物神氣鬱鬱悲喜無常手足煩熱汗出如油口乾燥大便秘朝間小便濁夜則諸證皆緩先生診之與三物黃芩湯兼黃連解毒散而愈求真按按腹空洞無物者即本方三物黃芩湯之腹狀也類聚方廣義本方條曰治骨蒸勞熱久咳男女諸血證肢體煩熱甚口舌乾涸心氣鬱塞者求真按乾涸二字能表示地黃之舌狀可玩味之治每至夏月手掌足心煩熱難堪夜間最甚不能眠者治諸失血之後身體煩熱倦怠手掌足下熱更甚唇舌乾燥者勿誤藥室方函口訣本方條曰此方不限於蓐勞婦人血證頭痛有奇效又用於乾血勞求真按因於陳久瘀血之肺結核也之任何頭痛煩熱為目的此證俗稱疳勞女子十七八歲時必多患之可用此方一老醫傳手掌煩熱有赤紋者為瘀血之候乾血勞有此候無他證候者此方為得治亦可備一徵又治凡婦人血熱不解諸藥不應者求真按本方證若有頭痛煩熱時似與小柴胡湯證無所分別但此證以煩熱為主頭痛為客小柴胡湯證則以胸脅苦滿為主頭痛煩熱為客可以此分別之橘窗書影曰一婦人產後發煩熱頭痛如破飲食不進日漸虛嬴醫以為蓐勞而辭去余與金匱三物黃芩湯服四五日煩熱大減頭痛若失時惡露再下腰痛如折與小柴胡湯合四物湯兼用鹿角霜而全安求真按余治血熱用竹皮大丸料三物黃芩湯屢奏奇效如竹皮大丸已屢載治驗茲不贅往年吾友尾臺榕堂女寒熱久不解遂成勞狀諸藥無效父母深患之乞診於余余以為有血熱之候處三物黃芩湯服數日熱漸解後服當歸建中湯而痊愈爾後發血熱時自製此方而服云苦參之醫治效用本草備要曰苦參苦燥濕寒勝熱治溫病血痢腸風溺赤黃疸酒毒熱生風濕生蟲又能祛風逐水殺蟲治大風疥癩然大苦寒肝腎虛而無熱者勿服由此說觀之則本藥為有力之解熱藥兼有殺蟲殺菌作用者炙甘草湯之注釋傷寒脈結代心動悸炙甘草湯主之傷寒論註脈結代者結脈兼代脈也心動悸者心悸亢進之謂心悸動者為脈之源泉故心亦不可無結代之理仲景未言及者恐當時聽診法尚未備其運動狀態無由詳知如本方證雖為心悸亢進但如瀉心湯證而不惟血壓不升騰反而低降致現脈之結代故用本方高其血壓且復脈狀也是以本方有復脈湯之一名也故與瀉心湯之名對照時則虛實之差自然了然矣千金翼炙甘草湯一云復脈湯治虛勞不足汗出而悶脈結心悸行動如常不出百日危急者十一日死金匱要略註金匱悸之上無心字今從千金翼加之仲景以虛勞不足為首句者欲明因此四字致汗出而悶脈結心悸之虛證其行動如常也有此虛證時雖動作如常若不服藥則不出百日生命危矣其證危急不能動作者十一日而死也外臺炙甘草湯治肺痿涎唾多心中溫溫液液者金匱要略註肺痿者肺結核也涎是咯痰之稀薄者唾其濃厚者也溫溫液液者噁心甚也茲不云脈結心悸者省文也炙甘草湯方甘草克生薑桂枝大棗各克人參阿膠各克生地黃克麥門冬克麻子仁克上細銼以酒一合勺水一合煎一合去滓入阿膠溶之一日分三回溫服或冷服但以水代酒亦可炙甘草湯之腹證本方由來於桂枝去芍藥湯故腹狀亦相類但此以地黃為主藥則有臍下不仁及煩熱之證且心尖及腹部大動脈之悸動亢進為異耳先輩之論說治驗衛生寶鑒曰至元庚辰六月中許伯威五旬餘中氣本弱病傷寒八九日醫者見其熱甚以涼劑下之又食梨三四枚而傷脾胃四肢冷時昏憒請余治之診其脈有時動而中止而自還乃結脈也心亦動悸吃噫不絕色青黃精神減少不欲開目踡臥惡與人語余以炙甘草湯治之減生地者恐損陽氣也銼一兩使服之不效再於市鋪選嘗氣味厚者再使煎服之其病減半再服而愈方輿輗本方條曰此為仲景治傷寒脈結代心動悸之聖方也孫真人用之以治虛勞王刺史用之以治肺痿凡仲景諸方無不變通如此雖云變通但此方之妙在治結代脈故一名復脈湯也不論何病凡脈結代者皆可先用此方詳言之來緩而時一止復來者結脈也結者止而即還不失至數但少跳動耳代者止而不還斷而復動此絕彼來交代之義也二脈相似而稍異然治法惟此一方而已故連稱為結代脈此脈大病有之頗可畏又平人有時見此脈者無害雖藥不必也昔人有曰有病見之為難治若氣逆得之則可憂確言也此湯雖金匱引千金翼但今閱翼標為復脈湯而注云仲景炙甘草湯蓋後世調氣血補虛勞不足諸方似多由此方而出金匱炙甘草湯方下之行動如常數句說者削而不取雖不見於正文但有徐大椿說不可謂為無理曰凡脈見結悸者雖行動如常亦不出百日必死若復危急不能行動則過十日必死語極明顯從前解者多誤求真按脈結代動悸者有陰陽虛實之別故若非確認為陽虛證則不可妄用本方余屢用桃核承氣湯治此證者宜注意之靜儉堂治驗曰一婦人心中悸胸下痞硬臍上動悸失音不能開聲不大便五六日時復頭眩脈沉細飲食不進雖諸證稍快惟聲音不發悸動不止十九日改劑用炙甘草湯七八日動悸止音聲開得以復常餐英館治療雜話曰炙甘草湯訣治癇證此方主之老人虛人津液枯大便閉者此湯主之虛勞動履如常脈至虛數又細而若有若無者此所謂脈病人不病平人雖視為不死但必死也或發寒熱或咳嗽自汗盜汗胸中痞悶或眩暈耳聾或夢中獨語見種種之異證者其腹中自心下至小腹兩脅腹之一邊悸動強巨里虛里動高以及於肩若動在左者不可惑於種種之見證唯以脈動悸為標準也類聚方廣義本方條曰骨蒸勞嗽抬肩喘息多夢不寐自汗盜汗痰中血絲寒熱交發兩頰紅赤巨里動甚噁心憒憒而欲吐者宜此方若下利者去麻子仁加乾薑水煮為佳求真按下痢去麻子仁可也加乾薑者非也因本方證為陰虛證而非陽虛證故用乾薑之大熱者矛盾也余代乾薑以芍藥勿誤藥室方函口訣本方條曰此方以心動悸為目的凡心臟之血不足時氣管動搖而悸是心臟之血不能達於動血脈求真按動脈也時而間歇故致脈結代也此方滋養心臟之血潤流脈路不僅治動悸即人迎邊之血脈凝滯氣急促迫者亦有效求真按人迎邊云云當於鎖骨上窩之動脈瘤也是余數年之經驗也又肺痿之少氣而胸動甚者用之亦有一時之效龍野之秋山玄端用此方加桔梗為肺痿之主方蓋根據於金匱也橘窗書影曰一婦人消渴數日不愈一醫認為胃熱屢下之消渴止舌上赤爛至於齒齦亦糜爛不能飲食脈虛數濁吐有腥臭余以為肺痿之一證與炙甘草加桔梗湯病漸愈求真按治口舌糜爛者以地黃為主要作用也一婦人年四十餘傷寒後心中動悸甚時時迫於咽喉而少氣咽喉之外肉癰腫如肉瘤脈虛數身體羸瘦如枯柴腹部凹陷飲食不進其父延余議方余曰舍炙甘草湯加桔梗無適方乃大服使連服其方數旬動悸漸安肌肉大生咽喉癰腫自然減退氣息寬快而得閑步後輿至奧州弘前其體更無恙云按此方之妙處有奇效故有用於虛證有熱而草臥之熱病者甘桂助陽氣補元氣生地麻子仁阿膠以潤燥可有效於仲景不言處此方涼補元氣而非溫補在於平補涼補之間而無溫補之燥氣也又陽氣虛而有火之狀者亦佳又補上焦之元氣世人不知補心可惜麻子仁之醫治效用本藥中含植物性脂肪油故即兼為黏滑性緩下藥有緩弱消炎作用由下列各說可知此義本草綱目曰麻仁氣味甘平無毒主治潤五臟利太陽風熱結燥及熱淋士良通乳汁催生難產日華潤肺孟詵本草備要曰大麻仁甘平滑為利脾胃大腸之藥而緩脾潤燥治陽明病胃熱汗多而便難麥門冬湯之注釋火逆上氣咽喉不利止逆下氣者麥門冬湯主之金匱要略註外臺無者字可去之又可解作火逆上氣咽喉不利者麥門冬湯主之止逆下氣也火逆者火逆於上也上氣者此處雖作為濕熱上衝之義但傷寒雜病辨證云上氣者如麥門冬湯之火逆上氣咽喉不利是也故古書往往咳嗽與上氣連言周禮天官疾醫職嗽上氣鄭注云上氣者逆喘也素問五藏生成篇咳嗽上氣張氏云上氣喘息也如上述是寓喘息非現今之喘息發作也之意又咽喉不利者咽喉內不豁利也所以致之者因咽喉黏膜枯燥與有痰氣也故全文大意為火伴濕熱上逆而痰喘致咽喉內不豁利者若用本方則此證因滋潤鎮降而至於治也玉函經曰病後勞復發熱者麥門冬湯主之註病後者熱病後也勞復者由不攝生而再發也全文熱病雖大半瘥但尚未完全恢復敢不攝生致再發熱者本方為主治也然本方非該證之特效藥故不認為陽虛火逆上氣咽喉不利之傾向與皮膚黏膜枯槁之狀者不可妄用之麥門冬湯方麥門冬克半夏克人參甘草各克粳米克大棗克上細銼以水二合煎一合去滓一日分三回冷服先輩之論說治驗肘後百一方本方條曰治肺痿咳唾涎沫不止咽燥而渴求真按肺結核之枯瘦骨立咳嗽頻發痰沫黏著於咽喉而難咯出呼吸淺表心力減衰發熱不食微渴者用本方屢得奇效但未嘗得救其死故葛洪所說恐就其一時之效時云爾松原家藏方曰麥門冬湯治諸黃胖脈弦大氣逆胸滿心下硬身色淡黃行動則氣急或爪甲枯黃而張者求真按黃胖病為一種之貧血證余未知此說之是否麥門冬加地黃連石湯治咳血不止者求真按是本方加地黃黃連石膏治咯血無可否麥門冬加石膏湯治中風脈洪大上逆有熱大便少半身不遂者麥門冬湯治咳嗽火逆上氣咽喉不利痰聲不濕者求真按痰聲不濕者五字宜注意麥門冬湯治虛勞咳逆手足煩熱羸瘦骨立者或咳血及衄者芳翁醫談曰偏枯中風言語蹇澀者當與麥門冬加石膏湯此本據火逆上氣咽喉不利之語師家以為常法求真按雖腦溢血有本方證者亦可與之然為常法非也不可從之癇家舌焦或白色如漬水數日者主用連石二味為末外敷內用諸藥加於麥門冬湯之類以服之虛勞多汗寒熱咳嗽諸證備者咳甚者皆宜麥門冬湯必兼起廢丸大概此丸男婦皆可用求真按有起廢丸證則可用之不然者不可用之一婦人下利不止三年面色痿黃眼泡腫重舌上糙澀而色淡白帶灰或時如常不大羸脫雖臥床如欲遠行時有中途畏懼發暈之狀必還家後得愈云此實癇也乃與麥門冬加石湯二十日許利止又服二十日許痊愈方輿輗本方條曰火逆上氣咽喉不利止逆下氣者雖為此湯之本旨今且可為勞熱咳嗽之主方矣沈明宗注金匱云余竊擬為肺痿之主方也更有古之葛洪肘後百一方治肺痿咳唾涎沫不止咽燥而渴聖濟云無人參有竹葉生薑治虛勞煩熱口乾舌燥欲得飲水方此語可用參考餐英館治療雜話醫宗金鑒謂大逆之大字當是火字因此外感證既歷汗下又歷病因之痰促及一切雜證宜以津液枯燥虛火挾痰上炎於咽咽喉不利痰少有聲為的證時而面赤則更為確證是以用麥冬人參大棗培養胃中之真陰以鎮虛火之上逆更以半夏滌痰下氣則陰水自生火邪自不上奔矣此誠仲景通天之手段故喻嘉言先生謂麥門冬湯為治本之良方也若以頭痛必用川芎蔓荊之類咳者必用五味桑白之類者此庸醫之所為豈能治其病源乎沈明宗曰余竊擬為肺痿之主方一切痿證皆可有效老人及虛人亦應此方證為多求真按此說解上氣咽喉不利頗詳可熟讀之蕉窗雜話曰一人過於勞碌暇時恣食酒肉後大發衄血經醫四十餘人不能治三日後自止但因是左邊頭痛如裂晝夜不安故辭歸來求余治見其人面如長棗且問前醫之治法悉作血虛用地黃類滋潤劑余即云欲吾治此惟用大劑麥門冬湯加黃連石膏耳不十日頓愈此因諸醫皆惑於血證之所致而不知為厚味鬱積邪火之證故也求真按面如長棗者顏面充血恰如大棗之赤色也類聚方廣義本方條曰治消渴身熱喘而咽喉不利者加天花粉大便燥結腹微滿者兼用調胃承氣湯治久咳勞嗽喘滿短氣咽喉不利時噁心嘔吐者肘後方曰治肺痿咳唾涎沫不止咽燥而渴按生薑甘草湯證亦如爾云可疑今驗病者此方為勝勿誤藥室方函口訣本方條曰此方肘後云通用於肺痿咳唾涎沫不止咽燥而渴者為的治也金匱有大逆上氣句雖漫然不確蓋肺痿頓嗽勞嗽妊娠咳逆等證有大逆上氣之意味若用之則有大效故此四字有簡古之深旨存焉小兒久咳此方加石膏有妙驗咳血此方加石膏雖為先輩之經驗但有變為肺痿者因用石膏過久則有不食脈減之虞故若用外臺麥門冬湯類方之意加地黃阿膠黃連則適合而能奏效又仿聖惠五味子散意加五味桑白皮則咳逆甚者有效又老人津液枯槁食物難以下咽類似膈證者亦可用之又大病後飲藥嫌惡咽下有喘氣如竹葉石膏湯證無虛煩者用之皆咽喉不利之餘旨也橘窗書影曰一婦人年二十三四產後得外感咽喉腫塞痰喘壅盛口中臭氣甚絕食數日手足微冷脈無力疲勞極余作麥門冬湯加桔梗使徐咽下又煎祛風解毒加桔梗石膏使冷而含嗽之一晝夜咽喉分利少下粥飲後經二三日現發熱煩渴咳嗽脈虛數有外感之狀與竹葉石膏湯加桔梗杏仁而愈一人患梅毒數年不瘥咽喉糜爛聲音嗄而不出虛瘦骨立來都下醫治無效余與麥門冬湯加桔梗山豆根兼用結毒紫金丹數日聲音朗亮咽喉復常竹葉石膏湯之注釋傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之傷寒論註汪氏曰傷寒本是熱病耗於熱邪則精液銷鑠元氣虧損故其人必虛羸少氣氣逆欲吐氣虛不能消飲則停蓄於胸中故上逆欲吐也與竹葉石膏湯以調胃氣散熱逆也錢氏曰仲景雖未言脈若察其脈虛數而渴者當以竹葉石膏湯主之虛寒者別當消息之丹波元堅曰竹葉性寒止煩熱石膏入陽明清胃熱半夏蠲飲止嘔吐人參補病後之虛與麥冬同大添胃中之津液又恐寒涼損胃故用甘草以和之且又以粳米助其胃氣也參看以上諸說本條之意義雖能明了但由余之經驗有本方證之病者概有肉脫羸瘦疲勞困憊之狀脈亦虛數無力皮膚及口唇口腔黏膜多枯燥舌乾燥有白苔而訴煩渴呼吸淺表屢伴咳嗽腹部凹陷甚者如舟底狀食機不振而常噁心若此本為陽虛證而非陰虛證則有熱狀而無寒狀呼氣及其他排泄物有多少之熱臭尿濃稠而赤濁等因是得以徵知內熱之情狀矣竹葉石膏湯方竹葉克石膏克半夏克人參克甘草克粳米克麥門冬克上細銼以水三合煎一合去滓一日分三回冷服先輩之論說治驗外臺秘要曰文仲竹葉湯求真按即本方療天行表裡虛煩不可攻者和劑局方曰竹葉石膏湯治傷寒時氣表裡俱虛遍身發熱心胸煩悶或得汗已解內無津液虛羸少氣胸中煩滿氣逆欲吐者及諸虛煩熱並宜服之諸虛煩熱者與傷寒相似但不惡寒身不疼痛頭亦不痛脈不緊數即不可汗下宜服此藥傷寒六書曰動氣在右下之則津液竭咽乾鼻燥頭眩心悸者宜竹葉石膏湯總病曰竹葉湯求真按即本方治虛煩病兼治中暍渴吐逆而脈滑數者直指方曰竹葉石膏湯治伏暑因內熱熾而煩躁大渴者傷寒選錄曰竹葉湯求真按即本方陽明汗多而渴或衄而渴欲水水入即瘥而復渴者即本方張氏醫通曰唇青有二若唇與爪甲俱青煩渴引飲者為熱伏於厥陰竹葉石膏湯證也若唇青厥冷而畏寒振振欲擗地者為寒犯少陰真武湯證也夏月感冒吐瀉霍亂甚則手足厥冷少氣唇面爪甲皆青六脈俱伏吐出酸穢瀉下臭惡便溺黃赤者此火伏厥陰也為熱極似陰之候急宜作地漿煎竹葉石膏湯誤作寒治必死求真按無作地漿煎之必要傷寒緒論曰太陽證下之頭痛未除唇寒面青指頭微厥復發熱者為表邪內陷於陰分雖頭痛發熱不可用表藥宜竹葉石膏湯瘥後虛煩不得眠者竹葉石膏湯求真按此證為真熱假寒即熱厥之輕微者非表邪內陷於陰分也又虛煩不得眠者似梔子豉湯證病情不同宜注意傷寒論述義曰瘥後如竹葉石膏湯證者病後胃液未復虛熱上逆者也此種症狀誤汗誤下後多有見之者類聚方廣義本方條曰治傷寒餘熱不退煩冤咳嗽渴而心下痞硬或嘔或噦者麻疹痘瘡亦同治骨蒸勞熱咳而上氣衄血唾血燥渴煩悶不能眠者求真按本方有效於肺結核雖如尾臺氏所說但大概只起一時之效而已又曰治消渴貪飲不止口舌乾燥身熱不食多夢寢汗身體枯槁者若大便不通腹微滿舌上黑苔者兼用調胃承氣湯求真按枯槁二字能表現本方證宜熟慮之勿誤藥室方函口訣本方條曰此方治麥門冬湯有一等之熱候而煩悶少氣或嘔渴咳嗽者雖同一石劑此方與竹皮大丸專於上焦白虎湯專於中焦麻杏甘石與越婢加半夏關係於肺部其惟大青龍專於表熱耳可參照其方而區別之又張璐玉之經驗謂宜於病後虛渴而小便赤者云治瘟編曰一婦人發熱微惡寒心下苦悶下利嘔逆舌上白苔臍上動悸高脈弦緊與大柴胡湯下利稍止嘔逆益劇胸腹熱熾煩渴欲飲水四肢微冷脈沉緊與竹葉石膏湯服七劑痊愈一人年十二下利日二三行略無所苦日日出游一日洞泄如注凡六行眼陷鼻尖身熱熾盛心下苦悶嘔逆舌上白苔渴欲飲水脈沉緊與竹葉石膏湯五日而愈橘窗書影曰一男子年二十餘患暑疫數十日不解虛羸脈細數舌上無苔乾燥好冷水絕穀數日煩冤頗甚余與服竹葉石膏湯二三日煩渴解稍進食後脈數不解氣血枯燥大便難與參胡芍藥湯徐徐恢復田村玄泉曰他醫用參胡芍藥湯其熱不解小便色赤者用竹葉石膏湯十取八九效余與此說相反按病後虛渴小便赤者用竹石說見張璐玉非玄泉之創見也求真按用柴胡去半夏加瓜蔞湯再加麥門冬地黃與枳實芍藥散合用則無參胡芍藥湯之必要一女子外感後寒熱數日不解咳嗽吐痰不食漸漸虛羸殆成勞狀服柴胡劑數百帖無效余診曰此暑邪內伏不得解也宜講伏暑之策與竹葉石膏湯加杏仁五六日熱大解咳嗽隨止能進食後與人參當歸散虛羸復常一老醫曰一女年三十餘晚春感微邪發作如瘧至晚夏尚未解三四醫雜治不愈一日迫於心下如氣絕者余有經驗因與竹葉石膏湯十餘日寒熱去徐進盜汗亦減此因心下有水氣而不下利致發此證其他於胸膈有水氣而吐水者有眩暈者有動悸者均能以小半夏加茯苓石膏湯或半夏瀉心加石膏湯等而取效此說似有一理而與余竹葉石膏湯之治驗頗暗合因附記之一婦人年三十傷寒數月熱不解脈虛數舌上黃苔不欲食咳嗽甚痰喘壅盛姬路加藤善庵療之無效余與竹葉石膏湯二三日熱稍解舌上濕潤小便色不減因與竹茹溫膽湯痰退咳安食大進不日全快竹茹及竹葉之醫治效用本草備要曰竹茹甘微寒開胃土之鬱清肺金之燥涼血除熱治上焦之煩熱溫氣寒熱噎膈嘔噦胃熱驚癇肺痿吐血衄血崩中安胎竹葉辛淡甘寒涼心緩脾消痰止渴除上焦之風邪煩熱咳逆喘息嘔噦吐血中風失音小兒驚癇由此說觀之則竹茹竹葉可謂皆為清涼藥兼有鎮咳止血作用麥門冬之醫治效用本藥為黏滑性消炎藥且為鎮咳強心強壯利尿藥由下列各說可知本草綱目曰麥門冬根氣味甘平無毒主治脈絕羸瘦短氣本經療虛勞客熱口乾燥渴止嘔吐愈痿蹶強陰益精消穀調中定肺氣安五臟令人肥健美顏色有子別錄去心熱止煩熱寒熱體勞下痰飲藏器安魂定魄止嗽定肺痿吐膿時疾之熱狂頭痛大明治熱毒大水面目肢節浮腫下水主泄精甄權治肺中伏火補心氣不足主血妄行及經水枯乳汁不下元素發明宗奭曰麥門冬治肺熱之功為多其味苦但專泄而不專收寒多人禁服治心肺虛熱及虛勞與地黃阿膠麻仁同為潤經益血復脈通心之劑元素曰麥門冬治肺中伏火脈氣欲絕者時珍曰按趙繼宗儒醫精要云麥門冬以地黃為使服之令人頭不白補髓通腎氣定喘促令人肌體滑澤除身上一切惡氣不潔之疾本草備要曰麥門冬甘微苦而寒清心潤肺求真按此即本藥之黏滑作用強陰益精此即本藥之強壯作用除煩瀉熱此即本藥之消炎作用消痰止嗽此即本藥之消炎鎮咳作用生津行水此本藥黏滑組織之枯燥故自利尿也治嘔吐痿蹶虛勞客熱脈絕短氣治此等證者由本藥有消炎黏滑強心強壯作用也肺痿吐膿治此證者由本藥有消炎鎮咳作用也血熱妄行治此者本藥之消炎作用也經枯乳閉此等證由於組織之枯燥故用本藥使黏滑之則自通矣小半夏湯之注釋黃疸病小便色不變欲自利腹滿而喘不可除熱除熱必噦噦者小半夏湯主之金匱要略註聖惠方欲自利作不利似是故隨之而解黃疸病之腹滿而喘者似大承氣湯證若是此證時則尿色必當赤濁今尿色無變化有自利之傾向而尿利不充分者非大承氣湯證也明矣故不可用此方瀉下其熱若誤以承氣湯除去其熱時必至於發噦其噦者即以本方為主治也由是觀之本方之所關者尿色不變尿利減少及噦之三證故不僅黃疸病而已總之其病證以噦即呃逆為主目的尿色不變尿利減少為副目的而用之可也諸嘔吐穀不得下者小半夏湯主之金匱要略註雖解如字義但穀字是飲食物也不僅限於穀物而已然仲景特選此字者欲示與五苓散之水逆證區別也小半夏湯方半夏克生薑克上細銼以水一合五勺煎五勺去滓放冷微量頻服之先輩之論說楊氏家藏方曰水玉湯求真按此即本方也治眉棱骨痛不可忍者此痰厥也求真按可見中藥方鎮痛是為原因療法也聖濟總錄曰小半夏湯治霍亂嘔吐涎沫醫反下之作心下痞者保赤全書曰半夏生薑湯求真按此即本方也治小兒痘瘡噎氣者東洞翁曰小半夏湯治吐而不渴者求真按本方證不渴故云爾類聚方廣義本方條曰諸病嘔吐甚或病人惡湯藥而嘔吐噁心不能服對證方者皆宜兼用此方求真按此等證先宜選用本方或小半夏加茯苓湯生薑半夏湯半夏厚朴湯乾薑半夏人參丸等待鎮吐後用對證方為佳此方雖為嘔吐之主藥若嘔吐而渴飲而復嘔吐嘔渴俱甚者非此方為主治也宜選用小半夏加茯苓湯五苓散茯苓澤瀉湯等求真按小半夏加茯苓湯之渴不如五苓散茯苓澤瀉湯之劇此方雖能治噦然傷寒大熱譫語煩躁腹滿便閉諸證未退者當治其主證主證治則噦將自止若噦甚兼用亦甚佳求真按本方加用橘皮則益妙是本方與橘皮湯合方之意勿誤藥室方函口訣本方條曰此方為嘔家之聖劑尤以水飲嘔吐為宜水飲證心下痞硬背七八椎處冷如掌大者若以此等證為目的而用此方則百發百中焉求真按此說根據仲景所論之夫心下有留飲其人背冷如掌大但非必發證故難以為目的又胃虛嘔吐穀不得下者先使服此方不愈者與大半夏湯此大小之別也求真按與本方不愈者必不可與大半夏湯也小半夏加茯苓湯之注釋嘔家本渴渴者為欲解也今反不渴者心下有支飲故也小半夏加茯苓湯主之金匱要略註千金方作嘔家不渴渴者為欲解也本渴今反不渴心下有支飲故也小半夏加茯苓湯主之為是故欲隨而解之本來嘔吐者為胃內有停水故普通概不渴時而有渴者因停水下降胃內停水減少也故嘔家不渴者因嘔吐者胃內有停水則不渴也渴為欲解者若先不渴今至於渴者當作停水下降之徵則有治愈之傾向也以下本來不渴今至於渴者為胃內來停水是即以本方為主治也卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯主之金匱要略註金匱半夏上無小字今從千金方加之卒嘔吐者突然嘔吐也心下痞者雖為胃部停滯膨滿之義但與大黃黃連瀉心湯等異乃由停水而然故欲示此意為加膈間有水一句又眩悸者有眩暈心悸亢進之二證皆為茯苓半夏之所治也以是可知本條之義矣先渴後嘔為水停心下此屬飲家小半夏加茯苓湯主之金匱要略註本條注釋已詳於前數條由仲景云先渴後嘔則本方證為有渴也明矣但由余之經驗則此渴為極輕微若劇者宜加用石膏又嘔吐甚者加橘皮以伏龍肝汁黃土汁煎用小半夏加茯苓湯方半夏克生薑克茯苓克煎法用法同前先輩之論說治驗仁齋直指方曰小半夏加茯苓湯治水結胸證心下忪滿無大熱頭汗出張氏醫通曰小半夏加茯苓湯治痰飲汗多小便不利婦人良方曰大半夏湯即本方也治痰飲脾胃不和咳嗽嘔吐飲食不入東洞翁本方定義曰治小半夏證而眩悸者求真按眩悸非必在證故此定義不完全叢桂亭醫事小言曰一商人患腳氣咳嗽甚一身皆腫呼吸迫促有衝心之兆與越婢如朮附無驗轉豁胸湯又無效與甘遂丸不下利一日忽嘔逆水藥皆不受氣息急迫不能平臥坐而按摩脊背陰囊腫脹寸時不安以其嘔甚投小半夏加茯苓能飲而不吐次日依然但欲其少嘔吐故使連服之三日許嘔吐止而食粥小便清利故猶用前方逐日快利腫亦隨消呼吸穩安得以平臥乃更守服前方三十日許痊愈求真按本方不惟為鎮嘔之對方證亦可為拔本塞源之劑方輿輗曰小半夏加茯苓湯卒嘔吐心下痞膈間有水眩悸者方下所敘之一種病證往往有之西尾氏曾於中途卒發眩暈從者來請余治即往診之手足微厥脈細欲絕坐中一醫云虛候可畏余潛心診之脈與證雖似危候但嘔多悸甚心下痞滿此乃仲景氏所謂膈間有水之一證也決不足慮即作大劑之小半夏加茯苓湯連進六七帖至次早數證稍安用前方數日雖漸痊唯有冒眩意因用澤瀉湯二三旬而平復凡藥若能中病即微飲微湯能立偉效者如此余遇此證卒發者兩三人皆以此方取效因思本文之卒字可謂大眼目矣外臺改作諸字非也又於金匱注書作病中卒然嘔吐解亦非也勿誤藥室方函口訣本方條曰此方治前方證求真按前方指小半夏湯兼停飲而渴者又有停飲而嘔吐不食心下痞硬求真按心下痞硬為心下痞滿之誤或頭眩者有效總之飲食不進者或瘧疾經日而食不進者此方倍加生薑能奏效求真按不進食者胃內有停水故也橘窗書影曰一男子傷寒數十日不解羸瘦骨立臍上築築而動悸甚飲食不納脈虛數瀕於死余以為厥陰正證本柯琴之說與烏梅丸其人惡藥臭不能服消渴殊甚即權與小半夏加茯苓湯雜以前丸服之五日嘔氣止諸證退連服三十日病痊愈余於似此證而有水氣在胸脅者用石膏而危險證有得救者今記其一二於下胸膈有水氣其證有吐水者有眩暈者有動氣者有因動氣而呼吸不穩者皆以小半夏加茯苓石膏或半夏瀉心加石膏等能收效按心下有水氣停飲證證候不一非一方一藥可得而治之其尤輕者桂苓朮甘湯之頭眩小半夏加茯苓湯之水停心下皆所以燥水飲利小便而為治者也此等處能注意用附子石膏皆可奏非常之效一婦人多年患反胃至今冬增劇飲食不納由心下至臍上痛甚不能堪余乃與小半夏加茯苓橘皮湯兼用起廢丸至於食料僅啜蕎麥湯少許過四五日嘔吐止痛減更連進前方不復發生薑半夏湯之注釋病人胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憤然無奈者生薑半夏湯主之金匱要略註尾臺氏類聚方廣義本方條曰正字通云憒憒者心亂又昏眊貌蓋心胸昏悶無可奈何之謂也考生薑半夏之作用則本條之病證可謂因消化管內之水毒急劇侵及心肺使呈難以名狀之苦悶狀態而本方與小半夏湯藥味相同所以其主治異者本方以生薑為君藥半夏為臣藥彼方以半夏為君藥而以生薑為臣藥也以是可知仲景處方方法之嚴密矣生薑半夏湯方半夏克生薑汁四勺上細銼以水一合一勺煮半夏取七勺納生薑汁取五勺冷卻而頻服先輩之論說外臺秘要曰文仲一方即本方也治腳氣入心悶絕欲死者肘後百一方曰斗門一方即本方之丸方治胸膈壅滯能去胸膈之壅滯大壓痰毒及治傷於酒食其效極驗聖濟總錄曰半夏丸即本方之丸方治風濕腳氣痰壅而頭痛幼幼新書曰一方即本方之丸方治胎驚涎盛而不乳仁齋直指方曰半夏丸即本方之丸方治吐血下血崩中帶下而喘息痰嘔中滿虛脹求真按是咯血吐血腸出血子宮出血而兼喘息嘔吐胃部膨滿水腫虛證者本方為主治也類聚方廣義本方條曰凡諸病痰飲卒迫咽喉閉塞不得息湯藥難以下咽者若非此方不能開通當先以此方解其急後可隨宜處方若加熊膽其效尤速又能治噦逆大半夏湯之注釋胃反嘔吐者大半夏湯主之金匱要略註胃反者如已述之金匱中脾傷則不磨求真按不消化也朝食則暮吐暮食則朝吐是稱宿食不化既有嘔吐證於次句更云嘔吐者為無意義之重言難認為仲景之正文然千金方之大半夏湯作治胃反不受食食入即吐者反似為正文故本方可隨之運用其意胃反病則食不能容受若食即吐出不食則不吐者即以本方為主治也又外臺秘要大半夏湯云治嘔而心下痞硬者由方中有人參觀之甚為合理故用本方者必須參看此說也大半夏湯方半夏克人參克蜂蜜克煎法用法同小柴胡湯先輩之論說治驗三因方曰大半夏湯治心氣不行鬱生涎飲聚結不散心下痞硬腸中瀝瀝有聲食入即吐聖濟總錄曰半夏人參湯求真按此即本方也治霍亂逆滿心下痞塞方機本方主治曰嘔而心下痛者南呂建殊錄曰一男子年二十餘請治曰嗝噎已二年許十日五日必發頃者胸腹脹滿舉體愈不安眾醫皆以為不治無處一方者曾聞先生之論死生天所命疾病醫所治也等於死耳願先生治而死幸為瘳之先生作大半夏湯使飲之飲輒隨吐每吐必係黏痰八九日藥始得下飲食不復吐出入二月許痊愈麻疹一哈曰一男子年三十餘疹子已出發熱猶未減疹欲收不收卒爾吐飲食湯藥亦吐如是二三日前醫不能治更請余治按其腹狀心下痞硬胸腹轆轆有水聲因作大半夏湯使飲之盡二帖欲吐不吐胸中憒憒不安盡三帖後少能就睡寤後下利二三行吐全已而身熱猶不解煩渴引飲更作石膏黃連甘草湯使飲之盡七帖前證漸退疹子全收前後十八九日許如舊蜂蜜之醫治效用本藥為緩和黏滑藥其作用酷似於甘草所異處彼通用於表裡內外各證更不含滋養分此藥專用於裡證有多少之滋養分也本草備要曰蜂蜜生性涼能清熱性溫能補中甘而和故解毒柔而澤故潤燥以甘緩可去急故止心腹肌肉瘡瘍諸痛和百藥與甘草同功煎煉為膠通大便閉然能滑腸泄瀉中滿者禁用半夏苦酒湯之注釋少陰病咽中傷生瘡不能語言聲不出者半夏苦酒湯主之傷寒論註少陰病解在太陽病篇半夏散及湯條下餘從略半夏苦酒湯方半夏片製者克雞卵殼及卵黃去之一個上二味中加適量之食醋短時間內煮沸去滓以少量徐徐咽下先輩之論說治驗錢氏曰半夏開上焦痰熱之結邪卵白清氣治伏熱苦酒味酸使斂降陰中熱淫之氣今之伶人每遇聲啞即以生雞子白啖之聲音即出者亦此方之遺意也醫宗金鑒曰半夏滌痰蛋清斂瘡苦酒消腫則咽清聲出矣方機本方主治曰咽中腫水穀不下者生生堂治驗曰一男子年二十患下疳瘡其毒上攻右耳潰聾咽喉腐爛自喉外發瘡嗣後咽喉腫痛米粒不能下久之唯待死耳先生省之且使門弟子診之謂曰二三子以何等方治之皆曰七寶丸或龍門丸先生笑曰否爾等泥我規則正以殺人耳古諺曰欲投鼠而忌器斯人有斯疾猶鼠之近器豈無顧忌乎然糧道已絕胃氣久憊二三子之言雖當但損其器亦未如之何矣因先與半夏苦酒湯含而飲之明日來人云咽痛如忘腫亦隨消旬餘其腹頗足當其毒因與桃仁解毒湯而行熏法後以龍門丸下之一二月耳亦能聞矣類聚方廣義本方條曰按半夏散之服法亦云少少咽之蓋咽中腫痛或生瘡者腫必及於會厭故多嚥則過咽必少若使冷而徐徐含嚥時不特藥汁易下亦可浸漬瘡處是以外治而寓內治之法用意最密也張子之術可謂委曲周悉矣半夏厚朴湯之注釋婦人咽中如有炙臠半夏厚朴湯主之金匱要略註炙臠者尾臺氏云說文臠者臞也臞者小肉也此證覺咽中如有肉片黏著也咽喉內雖有自覺的如小肉片黏著其實無黏著故非器質的疾患可得推知為神經證也冠以婦人二字者一因仲景之本論因列於婦人雜病篇之關係又一因婦人多神經證欲示本病亦不外此意也千金方云半夏厚朴湯治胸滿心下堅咽中帖帖如有炙肉吐之不出吞之不下此說可以補充仲景之論故欲說明之胸滿心以下堅者心下部膨滿按之則堅也但與大柴胡湯心下痞硬之內實而有抵抗異因內部無阻滯故外部反堅硬內部中空而無抵抗也是以方中有半夏厚朴而無枳實大黃也又帖者尾臺氏復云釋名曰床前之帷曰帖帖帖言垂也可見帖帖之義矣如上所述即小肉片垂下狀之形容詞也問曰病人苦水面目身體四肢皆腫小便不利師脈之不言水反言胸中痛氣上衝咽狀如炙肉當微咳喘審如師言其脈何類師曰寸口脈沉而緊沉則為水緊則為寒沉緊相搏結在關元始時尚微年盛不覺陽衰之後榮衛相干陽損陰盛結寒微動腎氣上衝咽喉塞噎脅下急痛醫以為留飲而大下之氣係不去其病不除後重吐之胃家虛煩咽燥欲飲水小便不利水穀不化面目手足浮腫又與葶藶丸下水當時如小瘥食飲過度腫復如前胸脅苦痛象若奔豚其水揚溢則浮咳喘逆當先攻擊衝氣令止乃治咳咳止其喘自瘥先治新病舊病當治在後金匱要略註原文末句無舊及治字此句與上句與同書之夫病痼疾若加卒病當先治其卒病後治痼疾也同義若不加此等字則意義不通故認為脫簡而加之本條細論水毒之終始而仲景未示其治法由余之經驗因誤治衝氣即像奔豚宜處以苓桂五味甘草湯其他諸證可與本方也以是可知本方有效於水腫之神經證咳嗽發作也半夏厚朴湯方半夏克厚朴克茯苓克生薑克紫蘇子克上細銼以水二合煎一合去滓一日分三回溫或冷服先輩之論說治驗三因方曰夫喜傷心者自汗不能疾行不可久立故經曰喜則氣散怒傷肝者上氣不可忍熱來而蕩心短氣欲絕不得息故經曰怒則氣擊一本擊作上求真按恐作上為是憂傷肺者心係急而上焦閉榮衛不通夜臥不安故經曰憂則氣聚思傷脾者氣留不行積聚在中脘不得飲食腹脹滿四肢怠惰故經曰思則氣結悲傷心者善忘不識人不得取還置物之所在筋攣四肢浮腫故經曰悲則氣急也恐傷腎者上焦之氣閉而不行還於下焦而不散猶豫不決嘔逆噁心故經曰恐則精卻驚傷膽者神無所歸慮無所定說物不竟而迫故經曰驚則氣亂七者雖不同但本於一氣藏氣不行憂而生涎隨氣積聚大如塊在心腹中或塞咽喉如粉絮吐不出咽不下時去時來每發欲死如神靈所作逆害飲食皆七氣所生成治之各有其方求真按是主要說本方之主治也大七氣湯求真按此即本方也治喜怒不節兼憂思多生悲恐或時震驚而致藏氣不平憎寒發熱心腹脹滿傍衝兩脅上塞咽喉如有炙臠吐咽不下皆七氣之所生也求真按可見本方併治機能的及器質的疾患矣證治大還曰半夏厚朴湯治積塊堅硬如石形大如盤而致人坐臥不安中滿腹脹孫氏三吳醫按曰張溪亭喉中梗梗如有炙臠吞之不下吐之不出鼻塞頭暈短氣耳常啾啾不安汗出如雨心驚膽怯不敢出門若稍見風即遍身疼至小便時則小水淋瀝而痛脈兩寸皆短兩關滑大右關尤搏指此梅核氣證也水煎半夏四錢厚朴一錢紫葉一錢五分茯苓三錢三分生薑三分使食後服每用此湯調理多效求真按曾治十歲女兒咳嗽頻發短氣汗出如雨尿利頻數尿後尿道微痛與本方二分之一得奇效醫方口訣集三因七氣湯求真按此本方也條曰括蒼之吳球治一官者年七十少年之時患虛損好服補劑一日事不遂意頭目眩暈精神短少請醫調治遂以前證告之謂嘗服人參養榮湯補中益氣湯每帖用人參三五錢其效甚速醫者不察遂用前方倍以人參熟地無效都以為年高氣血兩虛當合固本丸而湯與丸並進則當有速效數服反加氣急吳診其脈大而力薄問其病情之因得之曰先生歸休之意切而當道欲留豈抑鬱所致耶蓋氣有所鬱醫者不審同病異名同脈異經之說概行補藥病所以日加也病者嘆曰斯言深中余病遂用四七湯數服稍寬氣血和平經旬而愈又按諸氣不調作痛者不一求真按此引用三因方說或手足疼痛走注如痛風或拘攣搐搦或膈腹掣痛不可忍或寒熱交作或小便短澀如淋者能審其證皆可用之按諸氣不調作疾者無擇三因方已詳但亦有變證類似危病者如西尾氏肚腹膨脹按之如鼓飲食不甘胸痞氣喘夜不安臥時或咳唾此證宛如鼓脹按其脈沉而滑余作氣鬱停痰治用四七湯二百餘帖而平復此從脈不從證也東洞翁本方定義曰半夏厚朴湯治咽中如有炙臠或嘔或心下悸者求真按本方不外於小半夏加茯苓湯之加味方故可治噁心嘔吐眩悸之證無待辨矣方機本方主治曰若感冒如桂枝證而有痰飲者與桂枝湯合方主之屢所經驗也求真按感冒如桂枝湯證而有痰飲即有噁心嘔吐嗽喘急聲音嘶啞等以本方與桂枝湯合方為佳者雖如東洞翁言然本方之合方不僅桂枝湯已也苟兼此證不問與葛根湯與小柴胡湯皆可合方此非余推斷是出於實歷也險證百問曰平常患感冒咳嗽而聲嘶者師曰平常風邪聲嘶者若以桂枝湯合半夏厚朴湯投之有效凡咳嗽聲嘶者若咳嗽治則數日自愈不藥亦可聲嘶者痰飲之變也求真按咳嗽而聲嘶者若咳嗽治則數日自愈者有之亦有咳嗽治尚聲嘶依然者必不可不藥若僅此證而無餘證即本方之主治也蕉窗方意解本方條曰易簡方加生薑七片大棗一枚名七氣湯局方亦同金匱曰婦人咽中如有炙臠半夏厚朴湯主之易簡方治喜怒悲憂思恐驚之氣結而成痰涎狀如破絮或如梅核在咽喉間咯不出咽不下此七氣之所為也或中脘痞滿氣舒不快痰涎壅盛上氣喘急或有痰飲因而嘔逆噁心並宜服之云云按此方既可用於中脘痞滿是以手按心下硬滿上迫胸中氣舒不暢鬱悶多慮之證此心下硬滿但非可用芩連苦味證又非芍藥甘草膠飴等之甘味證唯心下閉塞因蓄飲於胸中心下或為嘔逆噁心或為痰涎壅盛而氣急或咽中常覺有如炙臠咯不出咽不下等證是皆由心下痞硬所發之證也故心下痞硬甚反用淡味劑不礙蓄飲而痞硬即緩矣此法譬如張幕禦鐵炮所謂以柔制剛也此方之蘇葉以輕虛而理胸中與心下半夏辛溫疏通胸中心下之飲厚朴不苦不甘茯苓淡薄下降心下之飲亦以消導水道也至於後世加生薑大棗不過口頭禪耳不可悉從若以此方淡薄為主則不可用大棗若不得已時則加用生薑恐不以為苦矣求真按生薑為不可缺之要藥非不得已而加之導水瑣言曰又水氣蓄滯於心胸而難利用吳茱萸橘皮湯等而不通利者可用半夏厚朴湯加犀角又小瘡頭瘡內攻而腫不至喘滿甚只腹脹而小便難者亦妙求真按此證可用本方或本方加石膏無加犀角之必要東郭醫談曰疝氣累陰囊後世家用五積散加茴香或木香通氣或三和散等古方家用烏頭煎等不效者諸家術盡時余有治以半夏厚朴湯加犀角者叢桂亭醫事小言曰一婦人一日患急積飲食不入口夜中余使門人脈之平穩只有一滴水下咽即煩躁欲死而腹滿仍不可進藥門人歸問余方余曰非喉痹乎則曰否咽不痛曾問看守人昨日食餅後初發時一醫官治之卻增劇云門人曰恐係食滯乎使與中正湯至次日願乞余診至其家問之云前夜飲一醫官藥不能下咽亦吐不出乃大發汗而煩悶飲門人藥似稍減只有一滴潤喉耳診無異狀仍與水試之問下喉後如噎如嗆出自鼻孔耶則云無其事惟暫苦而漸下耳問其痛苦如何惟覺咽中梗塞集看護人三四努力撫心按背仍覺有物逆上心下其嗆勢而引張腹氣若以為喉中病則喉又無異狀方殆窮先與半夏厚朴湯得小快更經三四日而復原求真按有此逆上於心下者所謂癔病也余亦曾用本方治此證矣類聚方廣義本方條曰此證後世所謂梅核氣也加桔梗尤佳兼用南呂丸治妊娠惡阻極妙大便不通者兼用黃鐘丸或大簇丸若用蘇子則效勝蘇葉求真按梅核氣不必兼用南呂丸又妊娠惡阻不可加桔梗因桔梗有催起噁心嘔吐故也勿誤藥室方函口訣本方條曰此方局方名七氣湯為氣劑之祖求真按氣劑者神經證治劑也故不僅治梅核氣凡諸氣病皆可活用之據金匱外臺惟用於婦人者非也蓋婦人氣鬱多由血病而生者一婦人產後氣不舒暢少有頭痛前醫以為血證投芎歸劑不效診之脈沉此由氣滯生痰證與此方不日愈血病理氣亦一法也東廓水氣蓄滯於心胸不利用吳茱萸湯等倍不通利者及小瘡頭瘡內攻之水腫腹脹小便甚少者此方加犀角取奇效云又加浮石有效於噎膈之輕證雨森氏治驗睾丸腫大如斗者其腹必滯水阻隔心腹之氣因不升降使用此方加上品之犀角屑百餘日心下漸開囊裡之水消化而痊身體發巨瘤者亦有效且不限於此二證凡腹形有血水二毒痼滯者皆可以此方取奇效云可試之橘窗書影曰一男子年四十餘患噎膈食管常如有物梗塞飲食至此悉吐出肢體枯柴其人決死余診曰自心下至中脘間無凝結頑固之狀病方在食管況年強壯何必待斃因與半夏厚朴湯理其氣時用化毒丸動蕩其病兼灸大椎節下間至七椎節下間每節七八壯過五六日咽喉之間覺如火燃試吞冷水無梗塞之患由是飲食稍進病亦漸愈求真按化毒丸為水銀砒素劑由此觀之此證恐為梅毒性食管狹窄後芻言曰四七湯求真按此即本方也之妙在紫蘇葉一味以辛散結以香醒脾而順氣消脹行水其餘事也徐忠可云余治王小乙咽中每噎塞咳嗽不出以半夏厚朴湯而愈皆由金匱脫化而來葛仙翁曰凡婦人諸病兼治憂患使寬其思慮則病無不愈金匱載此方亦此意耳紫蘇葉及子之醫治效用本草綱目曰蘇莖葉氣味辛溫無毒主治下氣除寒中其子尤良別錄除寒熱治一切冷氣孟詵補中治心腹脹滿止霍亂轉筋開胃下食止腳氣通大小腸日華通心經益脾胃煮飲尤勝與橘皮相宜蘇頌解肌發表散風寒行氣寬中消痰利肺和血溫中止痛定喘安胎解魚蟹毒治蛇犬傷時珍以葉生食作羹解一切魚肉毒甄權蘇子氣味辛溫無毒主治下氣除寒溫中別錄治上氣咳逆冷氣及腰腳中濕氣風結氣甄權調中益五臟止霍亂嘔吐反胃補虛勞肥健人利大小便破瘕結消五膈消痰止嗽潤心肺日華治肺氣喘急宗奭治風順氣利膈寬腸解魚蟹毒時珍勿誤藥室方函口訣香蘇散條曰此方於氣劑中有揮發之功故凡男女氣滯胸中心下痞塞默默不欲飲食懶於動作脅下痞硬用大小柴胡等反激者或鳩尾甚痛晝夜悶亂用建中瀉心類無寸效者與之奏意外之功有一婦人患心腹痛盡諸醫手不能愈一老醫用此方三帖霍然昔之醫師以此方療兵卒亦揮發氣鬱故也求真按用香蘇散之病證可與半夏厚朴湯但不可拘泥於局方之主治又蘇葉能解食積故由食魚毒而腹痛或喘息若用多量紫蘇即有效由此等說觀之則本藥可謂有亢奮性發汗鎮咳健胃利尿藥兼有鎮靜鎮痛解毒魚毒作用半夏乾薑散之注釋乾嘔吐逆吐涎沫半夏乾薑散主之金匱要略註由余之經驗本方於實際上不甚緊要特有此創方者恐仲景欲示此方包含小青龍湯乾薑半夏人參丸半夏瀉心湯等之方意半夏乾薑散方半夏乾薑各等分上為細末混合之以醋二勺和水一合二勺煮藥末克取勺頓服之乾薑半夏人參丸之注釋妊娠嘔吐不止乾薑半夏人參丸主之金匱要略註本條雖述惡阻之證治然此嘔吐不止者非唯不止之意是曾用諸鎮嘔劑猶嘔吐不止也因本方中有生薑半夏故其鎮嘔作用與小半夏湯等但與彼異者此二藥之外因尚有乾薑不僅有半夏乾薑散之能力更含人參有似於理中丸之作用故此方之主證與其他鎮嘔劑異有不熱不渴不悸心下痞硬噁心嘔吐之陰虛狀者即用小半夏湯小半夏加茯苓湯亦無效也以是可知仲景之意深且長矣乾薑半夏人參丸方乾薑人參各克半夏克上為細末以生薑汁及米糊為丸一回服用克但用上三味加生薑以水三合煎一合去滓一日三回分服亦可先輩之論說治驗東洞翁本方定義曰治嘔吐不止心下痞硬者方機本方主治曰心下痞硬乾嘔不止者求真按以方中有人參云心下痞硬可信類聚方廣義本方條曰妊娠惡阻殊甚不能服湯藥者宜用此方徐徐收效大便不通者間服大簇丸黃鐘丸等若兼蛔者宜鷓鴣菜丸勿誤藥室方函口訣本方條曰此方本治惡阻之丸方但今以丸料用於諸嘔吐不止胃氣虛者有捷效橘窗書影曰一婦人年二十許產後胃中不和時吐飲食羸瘦已極遂發大嘔吐藥食不入脈微細四肢微冷口乾燥欲冷水醫束手無如何余診之作乾薑半夏人參丸料煎而待冷時時使飲一合許又以冷水送下烏梅丸藥始下咽嘔吐止經二三日啜稀粥胃氣漸復用前方月餘愈而肥胖一婦人年四十餘嘗有吐水之癖經炎暑其病益甚飲食不能進身體骨立心中疼熱好飲冷水西醫五六輩療之更無效余與半夏乾薑人參丸料兼用烏梅丸嘔吐頓止心中疼熱日漸減少飲食得以漸進其夫謝曰余五十年來誤信西醫不知中醫之治有如是之速效者真不堪慚愧矣溫知堂雜著曰乾薑人參半夏丸用於嘔吐須以本條所謂不止為目的是用他藥無效惡阻久不止胃中帶虛寒者故自始即與此方無效者也余以三味等分人參用官種為煎藥之一帖量以水一合三勺煮取六勺約分十回之極少量頻服之此方之病候飲食即吐出諸藥不能受者此方若適服一二帖後必見效若服二三帖尚不見微效者可知此方不適矣且不限於惡阻亦可運用於諸病余與暴瀉病之嘔吐不止者即得效半夏瀉心湯之注釋傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與之宜半夏瀉心湯傷寒論註詳小柴胡湯及大陷胸湯條嘔而腸鳴心下痞者半夏瀉心湯主之金匱要略註和久田氏解本條頗詳密故列之於下以代注釋心下痞滿按之硬而不痛嘔而腸鳴者為半夏瀉心湯證其鳴者如雷之鳴走故又謂之雷鳴雷鳴者熱激動其水也多由胸中至於中脘臍上之間腸鳴痞痛頓而大瀉者謂之熱瀉又病人食時忽欲瀉者此證亦有之但須詳審腹證後可用之此方以有黃芩解心下之痞有黃連去胸中之熱亦有瀉心之名然其證之大部分為水主半夏以去水伍乾薑以散結伍人參以開胃口和以甘草大棗以緩攣時之急諸藥相和而退胸中之熱以逐水氣所以治其嘔而去心下之痞也嘔而腸鳴之因為水氣也明矣故雖不下利亦用此方也半夏瀉心湯方半夏克黃芩乾薑人參甘草大棗各克黃連克煎法用法同小柴胡湯半夏瀉心加石膏湯方前方中力口石膏克煎法用法同前主治治前方證而兼石膏證者半夏瀉心加茯苓湯方半夏瀉心湯中加茯苓克煎法用法同前主治治半夏瀉心湯證而兼茯苓證半夏瀉心加茯苓石膏湯方半夏瀉心加石膏湯與半夏瀉心加茯苓湯二方之合方也煎法用法同前主治治半夏瀉心加石膏湯半夏瀉心加茯苓湯之二方證相合者先輩之論說治驗千金方心虛實門中曰瀉心湯求真按此即本方也治老少下利水穀不消腸中雷鳴心下痞滿乾嘔不安者煮法後云並治霍亂若寒加附子一枚渴加瓜蔞根二兩求真按加石膏處卻多嘔加橘皮痛加當歸一兩求真按雖有疼痛亦必不可加當歸客熱以生薑代乾薑求真按此非仲景之方法也不可從之三因方心實熱門曰瀉心湯求真按是本方之去大棗者但去之非也治心實熱求真按本方證非實熱也心下痞滿身重發熱乾嘔不安涇溲不利水穀不消欲吐不吐煩悶喘急者東洞翁本方定義曰治嘔而心下痞硬腹中雷鳴者求真按此說是也可從之方機本方主治曰心下痞硬腹中雷鳴者大簇嘔而腸鳴心下痞硬者大簇心中煩悸或怒或悲傷者紫圓漫游雜記曰有一人病大便燥結平素十餘日一行下後肛門刺痛不堪經數年不愈請余診之其脈沉勁臍之左右積有結塊連於心下余曰此病在腹不在肛門若不能持久則不愈乃作半夏瀉心湯加大黃三分與之日二服數日後便利肛門不痛余按其腹連結者未解試休藥數日又如舊於是再服前方經三月腹候漸穩灸背數百壯遂痊愈芳翁醫談曰休息痢世皆以為難治蓋亦穢物不盡也宜服篤落丸兼用瀉心湯之類求真按休息痢者謂下痢與便秘交代也篤落丸大黃一味之丸方也下利如休息而無膿血唯水瀉耳或自止則腹脹瀉則爽然而日漸羸憊面色萎黃噁心吞酸時腹自痛者與半夏瀉心湯兼用篤落丸為佳且宜長服也成績錄曰一賈人年十八嘗患癇發則鬱冒默默不言但能微笑惡與人應接故圍屏風垂蚊帳避人蒙被臥其時方大汗出渴而引飲飲湯水數十杯小便亦如之先生診之心下痞硬腹中雷鳴乃使服半夏瀉心湯發則與五苓散大渴頓除小便復常續服半夏瀉心湯久之癇減七八後怠不服藥不知其終一賈人中鼠毒微腫微熱未幾疵瘳瘳後諸證雜出心氣不定手足腫經年不愈就先生求治診之心下痞硬腹中雷鳴與半夏瀉心湯兼用木鱉子大黃甘草三味煎湯而愈古方便覽曰一男子嘔吐下利四肢厥逆心中煩躁氣息將絕一醫云霍亂用附子理中湯吐而不受煩躁益甚余即用此方三服痊愈類聚方廣義本方條曰痢疾腹痛而嘔心下痞硬或便膿血者及每因飲食湯藥下腹即轆轆有聲而轉泄者可選用以下三方求真按此說是也可信以下三方者指本方及甘草瀉心湯生薑瀉心湯也治疝瘕積聚痛侵心胸心下痞硬噁心嘔吐腸鳴或下利者若大便秘者兼用消塊丸或陷胸丸勿誤藥室方函口訣本方條曰此方飲邪併結求真按飲邪併結者水熱二毒併結也而心下痞硬者為目的故對於支飲或澼飲之痞硬無效若由飲邪併結而致嘔吐噦逆下利者皆可用之有特效千金翼加附子即附子瀉心湯之意溫散飲邪之老手段也山田業廣曰欲用連理湯之病人心下痞硬甚則用半夏瀉心湯痞硬隨愈而口中糜爛亦痊愈矣一婦人腹滿經閉數月心下痞硬氣宇鬱甚診之經閉急恐不通欲先瀉其心下痞硬用半夏瀉心湯七八日經水大利氣力快然而痊愈甘草瀉心湯之注釋傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非熱結但以胃中虛客氣上逆故使硬也甘草瀉心湯主之傷寒論註丹波元堅說三瀉心湯證謂本方及半夏瀉心湯生薑瀉心湯也云結在心下有冷熱不調者何也因其人胃氣素弱水液不行而誤治更虛胃因冷熱相搏致成痞硬者是也因虛實相半故病勢頗緩實係少陽之類變如其治法以溫涼並行而調停之本方證本係胃弛緩有停水人患傷寒或中風有表證時醫誤下之胃腸俱益衰弱內陷熱毒乘之而發也若不誤下雖不無發本方證仲景欲示其為陽虛證故取誤下為例也穀不化者食物不消化也因胃腸衰弱與下痢頻數無暇消化也其被排泄者與下利清穀異腹中雷鳴者胃腸內水氣鳴走由於熱毒激動水毒也心下痞硬而滿者是示心下痞即胃部膨滿不由於他因而基於痞硬也乾嘔心煩不得安者因下利日數十行穀不化與水熱二毒之急迫也故宜以增量半夏瀉心湯之甘草如本方對之醫見心下痞謂病不盡復下之其痞益甚者以不可下之本方證誤認為大柴胡湯之心下痞硬嘔吐而下利者以下之致心下痞硬加甚也此非熱結以下為本方證之痞硬非如大柴胡湯證之由於結熱唯因熱水二毒乘胃衰弱而上逆致成痞硬也狐惑之為病狀如傷寒默默欲眠目不得閉起臥不安蝕於喉為惑蝕於陰為狐不欲飲食惡聞食臭其面目乍赤乍黑乍白蝕於上部則聲喝一作嗄求真按嗄字為是甘草瀉心湯主之金匱要略註就本條古說雖多未得正解余亦不知其意由南涯琴溪二氏之治驗記於下考之則本條可能是述胃腸性神經證之證治甘草瀉心湯方半夏克甘草克黃芩乾薑人參大棗各克黃連克煎法用法同上先輩之論說治驗傷寒六書曰動氣在上下之則腹滿心痞頭眩者宜甘草瀉心湯張氏醫通曰如痢不納食俗名噤口因邪留胃中胃氣伏而不宣脾氣因而澀滯者連枳朴橘紅茯苓之屬頭疼心煩嘔而不食手足溫暖者甘草瀉心湯東洞翁本方定義曰治半夏瀉心湯證而心煩不得安者方機本方主治曰下利不止乾嘔心煩者默默欲眠目不得閉起臥不安不欲飲食惡聞食臭者生生堂治驗曰某人來見先生屏人竊語云小女年方十六已許配矣然有奇疾其證無所聞也每夜待家人熟睡後竊起跳舞其舞也俏妙閑雅天將明罷而就寢余間窺之每夜異曲從曲之變而奇也不可名狀日中動止無異於常亦不自知其故告之則愕然竟怪而不信不知是鬼所憑耶抑狐所惑耶若他人聞之恐害其婚是以陰祝祈禱但無效果聞先生善治奇疾幸來診之先生應曰此證蓋有之所謂狐惑病也診之果然與甘草瀉心湯不數日夜舞自止遂嫁某子又聞大津一婦人有奇疾初婦人不知貓在柜中誤蓋之二三日後開之貓饑甚瞋目嚇且走婦人大驚遂以成疾號呼臥起其狀如貓清水某者師友也乃效先生方與甘草瀉心湯以治之求真按前者所謂夢游病後者即憑依證也青州治談曰師曰前泉州有一病男初感風寒發為痰喘或以痰喘為急用十棗湯下之瞑眩甚而吐下故四肢微冷食餌不進看者甚以為危篤前醫頻用茯苓四逆湯微冷不得復乞余往診之心下有痞滿之氣味但因吐而逆上故也乃調合甘草瀉心湯五帖謂之曰自五更迄黎明飲盡之微冷漸復逆上漸降遂愈麻疹一哈曰一婦人年可二十傷寒愈後十四五日發熱三四日疹子欲出不出心下痞硬煩躁不得眠下利日二三行因作甘草瀉心湯使服之明日大發汗疹子皆出諸證自安疹收健食如常求真按非汗劑因發汗而愈者如此此古方所以為原因療法也類聚方廣義本方條曰此方於半夏瀉心湯內加甘草一兩其主治即大不同曰下利日數十行穀不化曰乾嘔心煩不得安曰默默欲眠目不得閉臥起不安此皆有所急迫使然所以用甘草為君藥也慢驚風有宜此方者勿誤藥室方函口訣本方條曰此方主胃中不和之下利故以穀不化雷鳴下利為目的若穀不化無雷鳴下利者則處以四逆理中輩外臺作水穀不化與清穀異文可從之又用於產後口糜瀉有奇效此等芩連可謂反有健胃之效橘窗書影曰一婦人年二十五六產後數月下利不止心下痞硬飲食不進口糜爛兩眼赤腫脈虛數羸瘦甚乃與甘草瀉心湯服數十日下利止諸證痊愈是張氏醫通所謂口糜瀉也余每用甘草瀉心湯屢奏奇效蓋本於金匱狐惑條與傷寒論下利條也世醫用他方多誤治者一婦人年二十六七妊娠有水氣至產後不去心下痞硬雷鳴下利口中糜爛不能食鹽味僅啜淡粥噫氣吐酸水醫多以為不治余以為口糜瀉胃中不和之證與甘草瀉心湯數日痞硬去食少進益使連服口中和酸水止而水氣下利依然乃與大劑四苓湯加車前子旬餘兩證痊愈求真按四苓湯雖為五苓散去桂枝之煎劑但失卻仲景之本旨不可採用山田業廣曰余好用甘草瀉心湯曾治一男子四五日許夜間卒昏冒其狀如癲癇而吐沫或以為癇或以為蛔諸治無效一年餘乞余治投甘草瀉心湯一次不發今有一酒店主嗜酒無度屢不食數登廁先類下利氣鬱懶惰心氣失常時健忘而罵詈又有發大聲者用歸脾湯等無效乞余治嚴禁其酒投以甘草瀉心湯加茯苓日漸爽快得大效一人脾虛無食氣羸瘦晝夜吐涎沫侍醫雖用種種治療反日漸疲勞招余治之處以甘草瀉心湯二十日許愈其大半歸京後發微腫處以香砂六君子湯痊愈求真按用香砂六君子湯不如處以小柴胡湯加橘皮茯苓白朮焉溫知堂雜著曰一男孩八歲自春間面色青白神氣不振但別無苦惱因家貧未醫治至仲夏觸時氣微熱下利且以時下血而驚乞余治與胃苓湯下利及下血止及大暑全身水腫腹滿甚二便不通大渴煩熱繼發下利與四苓散加車前子雖不難治但下利不止腹滿雷鳴右肋下見痞塊漸漸膨大且面色青白神氣不振等證依然余因身體衰弱不甚與甘草瀉心湯加陳皮茯苓下利雖略止諸證仍舊適為八月之醫會期試招患兒出使眾醫診按與會之西醫或云心病或云肝臟肥大因肝臟肥大過甚故先治肝臟為宜但頗難治耳余曰治法是矣然雖肝臟肥大與貧血及心病但此證腸胃不和之患多假令與他病藥恐於肝臟心臟有不利故宜先研究治腸胃之法後治他病姑與甘草瀉心湯因此癖塊初由胃腸之運化不足而生若能得胃腸之健運則肝大或隨而治矣請先從余之治法若無效則請從諸君之良法因是連進前方漸漸起色痞塊縮小色澤亦復求真按胃苓湯者平胃散後世方合五苓散也但無必要以小柴胡加橘皮厚朴湯足矣生薑瀉心湯之注釋傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之傷寒論註若由此文表面觀之傷寒因發汗劑之應用而汗出愈後突發胃中不和之病證也其實此證本來存在為傷寒一時之隱蔽故於其愈也即現出胃中不和者胃內不如平時之調和也乾噫食臭者傷寒雜病辨證云噫者噯也噯為噫之俗字按噫說文云飽食臭也金匱云中焦氣未和則不能消穀故使噫也平脈法云噫而吞酸食不卒下又云上焦不歸噫而吞酸皆同義也蓋有宿停而含酸謂之噫酸水不出曰乾噫噫即噯而食臭也故曰乾噫食臭曰噫氣者皆無物出之謂也即消化不良兼吞酸嘈雜也脅下有水氣者胃內有停水也以是可知本方所以用於胃之弛緩擴張及多酸證矣又由謂雷鳴下利者復可知能應用於急性胃腸炎生薑瀉心湯方半夏克甘草人參黃芩大棗各克黃連乾薑各克生薑克煎法用法同前但本方之加味方同半夏瀉心湯先輩之論說治驗施氏續易簡方曰生薑瀉心湯治大病新瘥脾胃尚弱穀氣未復強食過多停積不化心下痞硬乾噫食臭脅下有水腹中雷鳴下利發熱者名曰食復最宜服之東洞翁本方定義曰生薑瀉心湯治半夏瀉心湯證而乾噫食臭下利者醫事惑問曰余前曾治療一男子病泄瀉世醫謂難治招余診之心下痞硬水瀉嘔逆而將絕余曰此方療治世人將大恐也因今醫皆用柔藥若用此方中病時將大發瞑眩恐其瞑眩者病不治也病家領會而乞藥乃用生薑瀉心湯三帖其日七時許病人大吐瀉而氣絕因是家人騷動集醫診之皆云已死而歸急招余又診之色脈呼吸皆絕病家謂死實似死矣但其形狀有可疑且由死僅二時耳可靜觀其死乎抑不死乎以前方入口而可通因是而回至夜九時許病人如夢醒而開目問何故眷屬咸集皆驚云今日由七時許至今呼吸色脈皆絕雖集醫者皆云不治而去故咸聚集也病人亦以為不可思議云自晝間大瀉後無病苦而覺睡耳現已無病皆可歸矣眷屬招日間所診之醫診察之亦云脈已如常後云甚饑以茶漬食三碗大悅而寢翌日更健如忘多年之病此人自幼年以白粥當食物而養育四十餘年不食他物若食之則積於中而不能食然此病治愈後皆可照常飲食至七十歲而終求真按服本方後往往因瞑眩有發瀉下者不可驚也成績錄曰一男子年三十餘心下痞塞左脅下有凝結腹中雷鳴過食必下利如是已六年先生用生薑瀉心湯而愈二神傳曰生薑瀉心湯治卒癇乾嘔荻野家口訣曰鼓脹自心下處處脹者實也生薑瀉心湯大半夏湯血脹者小腹脹也先用生薑瀉心湯則塊徐徐減矣若不長用則無益因有血塊則必凝結留水其塊將漸大也水解投血脹方則奏效易求真按余之經驗自心下處處脹者大柴胡加厚朴湯自小腹脹者大黃牡丹皮湯等證反多留飲留飲痞硬者生薑瀉心湯主之嘈雜有水火相持者治法三瀉生薑瀉心之類無痞者難用求真按吞酸嘈雜者停水兼炎證也三瀉者指半甘生之三瀉心湯也產後下利者因娩後屈腸驟伸有水流也故遂下利無他與生薑瀉心湯以逐腸中之水產後咳嗽多因水浸肺治方同前求真按上二證不必以本方為主治由實驗小柴胡湯當歸芍藥散之合方證反多帶下因脈下流故名帶下凡帶下者水與血凝結也初起水飲下衝脈傳帶脈而下入於臟與血相結而成帶下也求真按此亦揣測之言故以生薑瀉心湯去其水飲兼用坐藥以去帶下求真按白帶下由於水血合併雖如荻野氏說但治法非如是之單純也類聚方廣義本方條曰凡患噫氣乾嘔或吞酸嘈雜或平日飲食每覺噁心煩滿脅下水飲升降者其人多心下痞硬或臍上有塊長服此方並灸自五椎至十一椎及章門日數百壯兼用消塊丸硝石大圓等自然有效方伎雜志曰僻囊或稱吐水病有吐腐敗水者或食物亦有交吐者概有胸中嘈雜心胸痞塞脅腹攣急癥結等證亦有肩背凝痛者亦有日日或隔日四五日必發痛吐苦酸水或無味之水者亦有吐前唯噫氣噁心而不痛者大抵大便秘結之人為多主方以生薑瀉心湯合用附子粳米湯芍藥甘草湯或大建中湯等兼用消塊丸或大陷胸丸一錢每夜或隔一二夜用之則三四月痊愈矣又自七八椎至十四五椎與章門等穴以灸痞根但須嚴禁飲食不然則無效如酒硬飯蕎麥麵餐餅糕酢鮓油膩湯茶滷魚乾脯之類俱宜禁止後可服藥針灸且嘔吐一證並宜知照病人節飲食為要吐水後能耐渴者宜使多服茯苓澤瀉湯及慎飲食十日許則痛吐俱止矣其有腹中黏著之宿毒致拘攣癥塊者多因好酒與美味及嗜鹹味之切麵等而成故禁物頗難然不守禁治療無益也求真按由余之經驗此證有宜單用本方者有宜處以本方加茯苓者有宜與本方加茯苓石膏者又有宜以此等方劑合用芍藥甘草湯大建中湯桂枝茯苓丸當歸芍藥散等方中之一方者又有用本方之加味或合用方兼用黃解丸者常無一定之方宜臨證處之旋覆花代赭石湯之注釋傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆花代赭石湯主之傷寒論註本條病證亦與前同已存於未患傷寒之前非初發於汗吐下後也餐英館治療雜話曰此方亦可用於心下痞硬大便秘而噫氣不除者然三黃瀉心用於熱秘求真按有熱便秘此方用於虛秘求真按虛證便秘也此病者之證候宜注意之反胃嗝噎證皆知不治證也求真按食道胃癌者不治元氣未大虛者順氣和中加牡蠣求真按可用順氣和中湯證亦可用生薑瀉心也或大便久秘者用大黃甘草湯則大便通一旦覺快若元氣已疲大便秘而吐食者脾胃虛極虛氣聚於心下此時不宜與大黃劑也假令欲其一旦覺快反促命期也此時用此方者以代赭石鎮墜虛氣之逆半夏旋覆花以逐飲所以妙也此非余研究之所得周揚俊曰反胃噎食氣逆不降者治之有神效余經驗數人此方面不治者畢竟不治也傷寒論云噫氣不除不除二字妙已用生薑瀉心噫氣不除者虛氣之逆也宜以此方鎮墜之也古人下字雖一字亦不苟以此等文可知矣此說雖不無小疵但尚為良說以是可解本條矣旋覆花代赭石湯方旋覆花甘草大棗各克人參克生薑克半夏克代赭石克煎法用法同前先輩之論說活人書曰有旋覆代赭證其人咳逆氣虛者先服四逆湯胃寒者先服理中丸再服旋覆代赭石湯為良求真按氣虛者陰虛也雖胃寒亦為陰虛但較輕微耳勿誤藥室方函口訣本方條曰此方治生薑瀉心湯證之更劇者醫學綱目病解後痞硬噫氣不下利者用此方下利者用生薑瀉心湯今用於嘔吐諸證大便秘結者有效又下利不止而嘔吐或吐宿水者亦有效一宜秘結一宜下利其妙不可拘有表裡也又治噦逆屬於水飲者周揚俊曰余用此方治反胃噎食氣逆不降者有神效亦可試之旋覆花之醫治效用本草綱目曰旋覆花氣味權曰甘無毒大明曰無毒主治主水腫逐大腹開胃止嘔逆不下食甄權行痰水去頭目風宗奭消堅軟痞治噫氣好古發明時珍曰旋覆其功只在行水降氣理血脈耳由上文觀之則本藥為健胃利尿藥而兼有治噯氣之特能代赭石之醫治效用本藥不外於酸化鐵故有收斂補血止血作用也明矣乾薑黃連黃芩人參湯之注釋傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之傷寒論註本條文義不明自來醫家以為脫簡余亦同感故此注釋暫置之試就其方劑觀察本方可作瀉心湯去大黃半夏瀉心湯去半夏甘草大棗人參湯去朮甘草之合方因是亦得其證如瀉心湯證之心中煩悸上熱無大黃故無實狀而有虛狀無便秘有下痢又似半夏瀉心湯證有嘔吐下痢因缺半夏甘草大棗故無雷鳴腹痛又類人參湯證有陰虛狀之心下痞硬下痢下寒無朮甘草故無胃內停水小便不利腹痛證東洞翁謂此方求真按此即本方也主心中煩悸及心下痞硬而吐下者此與鄙見之臆測略同非示上熱下寒之病情者以不備之故而載仲景之本方於厥陰篇失卻真意矣乾薑黃連黃芩人參湯方乾薑黃連黃芩人參各克煎法用法同前先輩之論說治驗方機本方主治曰治下利心下痞硬乾嘔者成績錄曰一小孩年甫七歲恍惚不知人事煩悶不語急請先生往診之直視胸滿心下痞硬身熱殊甚先生曰此俗所謂蟲熱由血氣聚於心胸也乃作乾薑黃連黃芩人參湯及黃連解毒散一日夜迭進六帖兒能服之二日病愈一小兒十餘歲夏月不大便十餘日終煩悶不語一醫以為暍病與白虎湯一醫以為外邪與發表劑皆無效因請先生診之胸滿頗甚腹中虛軟但胸腹熱如烙他處無熱舌上微黃無苔問曰胸滿幾日乎家人曰不過三日先生曰此病非外襲也血氣自內上迫也凡自內發者初多吐下家人曰實然乃與乾薑黃連黃芩人參湯兼用解毒散服之二日大便一行煩悶止更與紫圓少許復與前方如前遂痊愈類聚方廣義本方條曰治胃反心胸鬱熱心下痞硬或嘈雜者兼用消塊丸骨蒸勞熱心胸煩悶咳嗽乾嘔或下利者宜此方求真按余亦用本方治此證矣勿誤藥室方函口訣本方條曰此方治膈有熱而吐逆不受食與生薑半夏之諸嘔吐之藥無寸效者有特效又治噤口痢黃連湯之注釋傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之傷寒論註胸中有熱者熱煩在胸中即心中有煩悸也胃中有邪氣者胃內有熱毒及水毒也腹中痛者此二毒刺激胃腸黏膜之結果欲嘔吐者被水毒熱毒激動而上迫也本方之原方為桂枝去芍藥湯少生薑腹狀亦相類似而不已故用半夏瀉心湯代黃芩以桂枝增量黃連之本方是以方意亦頗近似不僅治欲嘔吐者且有治療下痢處可知黃連湯方黃連甘草乾薑桂枝大棗各克人參克半夏克上細銼以水二合煎一合去滓一日分三回溫或冷服先輩之論說治驗保赤全書曰黃連湯治痘瘡熱毒在胃中而致腹痛甚時欲嘔吐者東洞翁本方定義曰治心煩心下痞硬腹痛嘔吐上衝者求真按心煩由有黃連上衝由有桂枝故云爾方機本方主治曰心煩嘔逆者方輿輗本方條曰此方治腹痛有嘔氣者蓋此腹痛自心下至臍上部分痛也臨證時宜明察痛處而處劑傷寒論述義曰此方求真按即本方治霍亂之吐瀉腹痛應效如神類聚方廣義本方條曰治霍亂疝瘕攻心腹痛發熱上逆心悸而欲嘔吐以及婦人血氣痛嘔而心煩發熱頭痛者勿誤藥室方函口訣本方條曰此方本文雖云胸中有熱胃中有邪氣然從喻嘉言濕家下之舌上如苔者丹田有熱胸中有寒也仲景亦用此湯治之之說舌上如苔四字可為一徵此證苔形舌奧處以苔厚之關係少帶黃色舌上有潤滑之苔假令雖無腹痛但有雜證乾嘔諸治無效者決有效若有腹痛則更效也求真按此舌苔說可信見於津田玄仙著疔治茶談非淺田氏之創見又此方雖為半夏瀉心湯去黃芩代以桂枝之方但其效用大異求真按不大異頗相類似也其組合甘草乾薑桂枝人參之意近於桂枝人參湯但彼用於協熱利此則用於上熱下寒所以用黃連為主藥也求真按二方俱有上熱下寒證但桂枝人參湯惟桂枝耳故上熱輕本方以桂枝黃連俱存故上熱強也然本方之下寒比於桂枝人參湯及乾薑黃連黃芩人參湯證則甚弱又按此桂枝主腹痛即與外臺生地黃湯之桂枝同旨求真按桂枝非必主腹痛橘窗書影曰一婦人年四十餘感暑邪嘔吐腹痛心下煩悶與黃連湯加茯苓病大安黃連阿膠湯之注釋少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之傷寒論註仲景以本方載於少陰篇者以此證虛而心煩下痢本方證往往有下痢類於下列之少陰病少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也故列於此篇為欲示其病情似於少陰病然本條之病證尿色不清白反而赤濁其實非少陰病是屬於少陽病瀉心湯證之虛者心中煩者即心中煩悸也不得臥者不得安臥就眠也黃連阿膠湯方黃連克黃芩克芍藥克卵黃個阿膠克上細銼先三味以水一合五勺煎五勺去滓納阿膠烊盡之納卵黃攪和頓服先輩之論說肘後百一方曰治大病瘥後虛煩不得眠眼中疼痛懊憹方黃連四兩芍藥二兩黃芩一兩阿膠三小挺以水六升煮取三升分三服亦可納雞子黃尾臺氏曰類於梔子豉湯證而證情不同實然可注意醫宗必讀曰黃連阿膠湯一名黃連雞子湯治溫毒下利膿血少陰煩躁不得臥東洞翁本方定義曰治心中悸而煩不得眠者方機本方主治曰胸中有熱心下痞煩而不能眠者類聚方廣義本方條曰治久痢腹中熱痛心中煩而不得眠或便膿血者治痘瘡內陷而熱氣熾盛咽燥口渴心悸煩躁清血者求真按清血者鮮血也治諸失血證胸悸身熱腹痛微利舌乾唇燥煩悸不能寐身體困憊面無血色或面熱潮紅者尾臺氏曰淋瀝證小便熱如湯莖中焮痛而血多者黃連阿膠湯有奇效勿誤藥室方函口訣本方條曰此方治柯韻伯之所謂少陰瀉心湯而病陷於陰分求真按非陷於陰分陷於虛證也上熱猶不去心煩或虛躁者故吐血咳血心煩而不眠五心熱而漸漸肉脫者及凡諸病已久熱氣浸淫於血分而成諸證者毒利腹痛膿血不止口舌乾者等治之有驗又有用於少陰下利膿血者但與桃花湯上熱有別又活用於疳瀉不止者與痘瘡煩渴不寐者有特效白頭翁湯之注釋熱利下重者白頭翁湯主之金匱要略註有內熱而下痢裡急後重者以本方為主治也下利欲飲水者以有熱故也白頭翁湯主之金匱要略註本方證有渴雖如仲景所云但其渴也不出微渴之範圍非如石膏劑證煩渴引飲也白頭翁湯方白頭翁黃連黃柏秦皮各克煎法用法同小柴胡湯秦皮現在難得可以黃芩代之此擁鼻老人之經驗先輩之論說東洞翁本方定義曰治熱利下重而心悸者求真按仲景僅云熱利下重者下利欲飲水者頗不備新加心悸二字可從之方機曰胸中熱而心煩下利者白頭翁湯主之方輿輗本方條曰熱痢下重者即後世所謂痢證也此方可用於痢熱熾而渴甚者因白頭翁為解痢熱之著藥也蓋痢熱與傷寒熱大異非白虎輩所能治而黃連黃柏白頭翁之類能治之他家用黃連解毒湯或三黃加芒硝等但余用此湯而屢奏效此由白頭翁有治痢熱之殊效也此湯之的證雖屬強熱然非可用下劑之處也求真按本方有效於痢熱者雖如有持氏說但非特效藥不可忘之類聚方廣義本方條曰熱痢下重渴欲飲水心悸腹痛者此方主治之求真按此說較東洞翁之定義更加具體可從之貉丘岑先生曰嘗在甲斐時痢疾流行無不傳染其證每大便時肛門灼熱如火用此方多有效余奉此說而數得效求真按本方有效於急性大腸炎赤痢者雖如貉丘岑及尾臺氏說若不加用大黃則其效果不全治眼目鬱熱赤腫陣痛風淚不止者又為洗蒸劑亦有效求真按本方本為消炎收斂劑故可治此證不待辨矣但不如加用大黃以誘導腸管也白頭翁加甘草阿膠湯之注釋產後下利虛極白頭翁加甘草阿膠湯主之金匱要略註下利虛極者因下痢而虛證至極也然本方不特治產後下痢虛極亦能治白頭翁湯證而有急迫之情及黏血便血便或子宮出血等東洞翁曰雖曰產後實不僅言產後也當以血證為準又按云當有急迫證概括言之為白頭翁加甘草阿膠湯治白頭翁湯證而有血證急迫者白頭翁加甘草阿膠湯方白頭翁黃連黃柏秦皮各克甘草阿膠各克煎法用法同前先輩之論說治驗方機曰胸中熱而心煩下利者白頭翁湯主之若心煩不得眠或煩躁者白頭翁加甘草阿膠湯主之求真按心煩不得眠與煩躁皆甘草阿膠之主治也成績錄曰一男子患疫八九日一醫下之黑血數行下利不止氣力頗脫渴不能食晝夜煩躁不得眠先生診之脈微弱舌上有苔乃與白頭翁加甘草阿膠湯未幾痊愈求真按對於腸傷寒之經過中裡急後重排黏血便恰如赤痢者以白頭翁加大黃湯而速愈類聚方廣義本方條曰治痔疾肛中焮熱疼痛或便血者若大便燥結者加大黃治產後下利腹痛荏苒不止羸瘦不食心悸身熱唇舌乾燥便血急迫或惡露猶不止者求真按亦用本方於此證得奇效勿誤藥室方函口訣本方條曰此方唯云虛極者之極字與六極之極同義謂虛憊甚也阿膠主下利求真按阿膠不特主下痢亦主心煩出血也甘草扶中氣也求真按甘草惟有緩和黏滑作用非扶中氣也橘窗書影曰一婦人產後下血久不止肛門疼痛日夜不得忍顏色青慘短氣有微熱脈數無力余診曰腸中濕熱釀內痔血管破裂也故有苦痛非直下血也即與白頭翁甘草阿膠湯兼用蠟礬丸疼痛大減下血亦隨止後無疼痛時時下血因與溫清飲而痊愈求真按兼用蠟礬丸者蛇足也可用當歸芍藥散兼用第二黃連解毒丸以代溫清飲一婦人產後下利不止虛羸不足診之脈數無力舌上無苔而乾燥有血熱便色亦茶褐色而帶臭氣因與白頭翁加甘草阿膠湯下利逐日減血熱大解白頭翁之醫治效用本草備要曰白頭翁苦堅腎寒涼血治熱毒血痢溫瘧寒熱齒痛骨痛鼻衄禿瘡癭癧瘕疝血痔偏墜歸納以上諸說則本藥可謂為消炎性收斂藥而有作用於大腸之特能秦皮之醫治效用本草備要曰秦皮苦寒性澀色青補肝膽而益腎故能治目疾洗目赤退翳膜驚癇以其收澀故治下利崩帶以其澀補下焦故能益精令有子由此說觀之則本藥亦可謂為消炎性收斂藥矣木防己湯之注釋膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之金匱要略註膈間者心下部也支飲者寓咳逆倚息短氣不得臥其形如腫甚時至於通身浮腫也喘滿者因水毒侵肺也心下痞堅者為心下痞硬之高度也人參主治之面色黧黑者如尾臺氏云黧與犁黎皆通用正字通曰黧黃黑色也此條之黧黑謂面色黃黑而有浮垢五色澤也脈沉緊者水氣之脈應也以上諸病證全由水毒使然故可以本方治之也因醫妄吐下之經數十日猶未愈也木防己湯方木防己克石膏克桂枝克人參克煎法用法同前木防己加茯苓湯方前方中加茯苓克煎法用法同前主治本方為吉益南涯翁之創設治前方證兼有茯苓證者先輩之論說治驗東洞翁本方定義曰治水病喘滿心下痞堅煩渴而上衝者求真按此方可作為仲景前方之補充也以方中有石膏故云煩渴有桂枝故云上衝也可從之方機本方主治曰腫滿而心下硬滿者短氣或逆滿而痛或渴者成績錄曰一婦人病後兩腳微腫久之一身面目浮腫小便不利短氣微喘不能自轉側迎先生求治乃與木防己加茯苓湯日盡七帖數日小便快利徐徐得愈一人一身面目浮腫小便不利肚腹滿腫短氣不得臥其水滴滴溢於皮外日夜更衣數回飲食減少眾醫以為必死先生與木防己加茯苓湯數日小便快利遂得痊愈一賈人患所謂腳氣病腰下腫不仁小便不利短氣喘息微嘔自心下至臍上硬滿頗甚與木防己加茯苓湯數日痊愈求真按用本方治浮腫性腳氣及心臟瓣膜病代償機能障礙性水腫得捷效一門生患腳氣兩足微腫通身麻痹而口吻最甚自作越婢湯服之後兩腳痿弱不能行步頭痛發熱自汗出心下痞硬而食不進胸中悸如奔豚狀絕食已四日先生使服木防己加茯苓湯嘔而煩悸惡聞食臭一日大吐命殆危自謂不復起矣先生再診使服茯苓飲悸即已但兩腳痿弱不瘥更使服桂枝芍藥知母湯病痊愈一婦人患腳氣水腫醫治不奏效迎先生療之其人兩腳內廉及口吻麻痹胸中悸大小便秘結心下痞硬滿與木防己加茯苓湯兼服消塊丸不日腫消麻痹盡愈自將停服先生曰毒未全盡而停服後必再發不聽後果短氣息迫凶證漸具乃狼狽迎先生懇請不已復處前方下咽則吐更服茯苓湯嘔乃已又與木防己加茯苓湯兼服乾薑人參半夏丸不日愈一人年三十餘自胸下至臍旁有形如盤者面目四肢水腫大便自調小便不利時時胸下痛短氣不得臥乃作木防己加茯苓湯使飲之短氣益劇喘咳倚息煩悸不安仍與前方使間服吳茱萸湯數十日小便快利日三四升餘三月餘痊愈一婦人全身腫滿四肢脹破水自漏出煩悶不得臥凡六七日喘咳殊甚肚腹硬滿先生診之與木防己加茯苓湯兼麻杏甘石湯數日而愈類聚方廣義本方條曰治水病喘滿心下痞堅上氣而渴者兼用陷胸丸或蕤賓丸無喘滿證者效少學者可以驗之木防己去石膏加茯苓芒硝湯之注釋膈間支飲其人喘滿心下痞堅面色黧黑其脈沉緊得之數十日醫吐下之不愈木防己湯主之虛者即愈實者三日復發復與不愈者宜木防己去石膏加茯苓芒硝湯主之金匱要略註虛者以下之義謂膈間支飲證與木防己湯心下痞堅緩解虛軟者喘滿即治但服之猶心下實滿者病根未全去也即假令喘滿證一旦雖除不數日而再發此時雖與前方亦無效者即以本方為主治也木防己去石膏加茯苓芒硝湯方防己克桂枝克人參茯苓各克芒硝克煎法用法同前但芒硝用量宜隨證加減木防己加茯苓芒硝湯方前方中加石膏克煎法用法同前主治治前方證有石膏證者先輩之論說東洞翁本方定義曰治木防己湯證不煩渴小便不利痞堅甚者求真按此說可以補充仲景之論幾無遺憾可從之叢桂亭醫事小言腳氣條曰此心下堅與塊凝小腹等相似手足如常其起於水腫者稀也宜木防己加茯苓芒硝主之本論雖去石膏如有熱渴不可去也求真按余曾用木防己加茯苓芒硝湯速治急性尿閉證矣類聚方廣義本方條曰此證用木防己湯痞堅和心下虛軟者則喘滿痊愈而不復發也若心下堅實依然不解者是病根未除也故喘滿一時退不日復發也故加芒硝茯苓以破其堅壘而決水道則病根全散諸證脫然又按枳朮湯條曰心下堅大如盤云云其症狀與此條略同方後云腹中耎即當散耎與軟同柔也與此條虛者即愈完全相同以是可知此條之虛字虛軟之意也治腳氣一身面目浮腫心下石硬喘滿氣息咽燥口渴二便不利胸動甚者兼用鐵砂煉陷胸丸蕤賓丸等防己之醫治效用本草備要曰防己大苦大寒太陽經藥膀胱能行十二經通腠理利九竅瀉下焦血中之濕熱為療風水之要藥治肺氣喘咳水濕熱氣諸癇降氣下痰濕瘧腳氣水腫風腫癰疽惡瘡或濕熱流入十二經致二陰不通者非此不可然性險而健陰虛及濕熱在上焦氣分者禁用方伎雜志曰防己稱唐物無著效但德廟時自清國取苗附植於駿府藥園甚繁盛至文化時不絕利水之效反勝舶來品亦能略通大便今普通者形如木通不詳出自何地得朮茯苓烏頭等之助僅似有效由此等說觀之本藥可謂有消炎緩下作用兼利尿藥也陽明病篇陽明病之注釋陽明之為病胃家實是也傷寒論註吉益南涯曰明為離明之明示陽實也取照臨四方熱氣充實表裡內外無所不在謂之陽明在外則見潮熱在內則致譫語此其候也大便硬或燥汗不出時則發黃色此病起於內而迫發於外水血內鬱此為陽氣明實之狀因名曰陽明吉益羸齊曰謂陽明為離明之明者以解明字之義非謂配於離卦也求真按是引用南涯氏說易曰離者明也為正南方之卦南方配於夏夏為在內之陽氣外見極盛之狀與陽明見潮熱等之陽證外見者同故以釋明字之義示有陽實之狀也夫傷寒論中以三陰三陽名篇者示疾病轉變之條理使見機而施治凡初自表起者漸進而至於裡故上篇云三日之日數中篇云四五日五六日之日數求真按上篇中篇就傷寒論云爾是示表位進於四五日之裡證也求真按四五日之裡證指半表半裡證也五六日之裡證求真按是四五日五六日裡證之略為血氣未激而外發之狀因見往來寒熱胸脅苦滿故以柴胡湯自裡發表與柴胡湯時必蒸蒸而振卻發熱汗出而解可徵迫裡極時有向內迫之狀故於下篇之終舉大柴胡湯之發熱汗出證以示其義下篇是辨裡證血氣不動者其結胸與痞皆血氣不動之貌也此太陽病三篇暢論自表至裡間之病變也然裡極以後之病變未明故設陽明厥陰二篇示所變之極也若裡位極時則實實如木實之實有實於內而向外擴張之勢其狀適與陽明內實水氣向外擴張之潮熱腹滿證可見但亦有外發不能者是以有內外共通之方故曰陽明之為病胃家實是也可證求真按解此陽明病之腹狀頗切宜熟讀思辨之因是太陽篇之下即為陽明篇以示自表傳裡若至裡極則實也又內實之極則欲迫發於外故陽明篇中有小柴胡湯二章桂枝湯麻黃湯都四章以示陽明實極而有外發之狀也總之太陽與陽明二篇是說明凡病自表位起者至裡若極則內位實實極則反迫於表也換言之自表起者必及於內自內起者必反迫於表也萬病莫不如是山田正珍曰陽明者指裡言蓋邪之中人始於太陽中於少陽終於陽明自表而裡由輕漸重勢必然也實謂邪實乃腹滿便結之病故曰胃家實也凡人腸胃素虛有邪陷之則成三陰之下痢嘔吐諸寒證求真按寒證與陰證同腸胃素實有邪陷之則成陽明之腹滿便結譫語妄言身熱自汗諸實熱證此非邪有寒熱皆從其人固有之虛實而同化也求真按以上三說是取腸傷寒為例議論痛切殆無間然之處然本條非單指腸傷寒即其他一切之疾病若胃家實即胃腸內病毒充實按之堅硬而有抵抗者悉為陽明病也故以之為陽明病之腹證以下所記仲景之原文及脈應可為其外證問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也傷寒論註汪氏曰上言陽明病之胃家內實未及外證故此條設問答之辭夫身熱與發熱異其熱在肌肉之分非如發熱翕翕然僅在皮膚以外也汗自出者因胃中有實熱則津液受其蒸迫故其汗自出也與太陽中風之汗出不透其出甚少者亦異此條之汗由內熱而蒸迫其出必多而不能止也不惡寒者非邪在表也反惡熱者明其熱在裡也因傷寒當惡寒故以惡熱為反也求真按反惡熱者與表證之惡寒發熱半表半裡之寒熱往來等之寒字對辭非對一般傷寒而言也夫惡熱雖為在內證其狀必外見或揚手擲足迸去蓋覆等此勢所必然因是於外以徵內其為陽明胃實證也無疑求真按前說概佳茲更補之身熱已述於前見少陽病篇小柴胡湯條汗自出者與太陽之自汗出少陽之大汗出或頭汗出相似而非因太陽之自汗出因於翕翕發熱少陽之大汗出或頭汗出因於往來寒熱此汗自出者因於不惡寒反惡熱故也不惡寒意義甚深試詳論之凡惡寒者陰證之惡寒作例外因病毒有欲由汗腺排泄之可能表位即汗腺所在地故太陽病必惡寒或惡寒發熱其位置距此稍遠存於表裡間之少陽病本來以和解為要雖不必汗解但往往有可汗解之機故往來寒熱陽明病之位置遠離汗腺反接近於肛門因而不大可能汗解陽明病亦有桂枝湯麻黃湯小柴胡湯等證不無由汗解者但此所謂太陽陽明或少陽陽明之合病故為例外不得不由瀉下而解故惡熱而不惡寒也以是可鑒別三陽病矣惡熱者傷寒雜病辨證云按惡熱之惡如惡寒噁心之惡其熱在於分肉之中爝爝如蒸炎炎如焮能使人常煩是以本論求真按本論指傷寒論也每與惡寒相對之調胃承氣湯曰不惡寒但惡熱者實也陽明篇曰不惡寒反惡熱也如上所述為表裡內外無所不熱而使懊憹煩悶者是也本太陽病初得病時發其汗汗先出不徹因轉屬陽明也傷寒論註方有執曰徹除也非對發汗言而謂病不除也山田正珍曰按徹除也與厥陰篇之傷寒脈遲六七日反與黃芩湯徹其熱同義程應旄訓為盡為透非也凡傷寒中風既離太陽則純為陽明或少陽但此為轉入而不純是轉屬轉係也轉屬轉係者皆併病也求真按如此二說所示本條初患太陽病雖發汗而病不除病毒過半入於消化管為太陽與陽明之併病即表裡二證併發而不經過少陽病是示由太陽病直至陽明病也傷寒發熱無汗嘔不能食而反汗出濈濈然者是轉屬陽明也傷寒論註本條如山田正珍所述傷寒無汗嘔不能食者此為少陽病小柴胡湯證也若其人反汗出濈濈然者此為轉屬陽明乃少陽陽明之併病也當與大柴胡湯或柴胡加芒硝湯以潤下之是示由小柴胡湯證轉屬於陽明證之徑路為今時所現之證也山田氏云宜大柴胡湯或柴胡加芒硝湯由余之經驗須大柴胡加石膏湯之機會反多濈濈然者程氏云連綿也方氏云熱而汗出貌和久田氏云汗出如流貌由上說可知其義矣傷寒嘔多雖有陽明證不可攻之傷寒論註見少陽病篇小柴胡湯條夫實則譫語虛則鄭聲鄭聲重語也直視譫語喘滿者死下利者亦死傷寒論註成無己曰內經云邪氣盛則實精氣奪則虛譫語者由邪氣盛神識昏也鄭聲者由精氣奪聲不全也王肯堂曰譫語者謂亂言無次數數更端也鄭聲者謂鄭重頻繁也只一句舊言將重疊言之終日殷勤不換他聲也蓋神有餘則能機變亂語數數更端神不足則無機變只守一聲也程應旄曰直視譫語尚非死證即帶微喘亦有脈弦者生之一條求真按宜參看下列大承氣湯條若兼喘滿下利則真氣脫而難回矣山田正珍曰諸注本截直視以下為一章非也今從宋版合之蓋此條主譫語立論所謂下利者多屬死證然亦間有得治者厥陰篇所載下利譫語者有燥屎也宜小承氣湯是也故曰下利者亦死亦字有味喘滿者因喘懣由喘而滿也滿懣通用參看諸說可知本條之義矣發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死傷寒論註汪琥曰此係太陽病轉屬陽明之譫語證本太陽經得病時發汗多轉屬於陽明重發其汗汗多亡陽也汗本血液汗多而亡陽則陰亦虧求真按陰亦虧云為後世醫之套語不可從之津血耗竭胃中燥實而譫語譫語者脈當弦實或洪滑是為自和自和者脈病不相背也此病雖甚不死若譫語脈短者為邪熱盛而正氣衰即陽證見陰脈也故主死山田正珍曰亡陽者謂損失元氣也凡病人譫語其脈洪大滑數者是脈與證不相齟齬也以是謂之和非無病之平脈也短者為微弱亡陽之徵故為死證若自和者邪熱雖有內熾之候但其陽不亡故為不死宜與承氣湯求真按指大承氣湯也傷寒四五日脈沉而喘滿沉為在裡而反發其汗津液越出大便為難表虛裡實久則譫語傷寒論註山田正珍曰滿懣悶也越猶言發也又散也言傷寒四五日脈沉而喘滿此為邪氣在裡以脈沉故也此證宜白虎湯以解其裡熱而反以發汗使津液越出則胃中求真按是胃腸中也乾燥大便因而為難難者求之不可得之辭以屎已硬故也此為表虛裡實若至於久則發譫語以穢氣犯神明也求真按因細菌毒素犯大腦故也宜用大小承氣湯以下之求真按腸傷寒病者之譫語妄言由菌毒侵襲頭腦也由仲景之言可明矣而猶可謂禁忌下劑乎小承氣湯之注釋陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下傷寒論註尾臺氏曰雖大滿不通而未至潮熱故與小承氣湯以和之是以與之不曰主之子炳以為大承氣湯證誤也且曰外證雖有微發熱惡寒但已稱微亦何必拘拘乎此亦誤也凡發熱惡寒未去者仲景氏未嘗用大小承氣湯失之毫釐謬以千里執匕臨病者可不慎乎又按腹大滿不通疑為腹滿大便不通之誤山田正珍曰按手足濈然而汗出者謂自腹背以至於手足之末濈然而汗出也蓋承上文汗出二字言之若身無汗手足有汗則當於手足之上有一但字所謂但頭汗出身無汗者可見成無己以為但手足汗出誤也求真按由冒頭陽明病觀之則本條之病證有胃家實及身熱汗自出不惡寒反惡熱之證已明於前矣雖加汗出不惡寒之二句似乎畫蛇添足豈行文上之必要乎脈遲者裡實之應其身必重者與表證之身重異因胃家實即充實於消化管內之病毒壓出裡水腹內之體液於外表也若更加短氣腹滿而喘有潮熱見少陽病篇小柴胡湯條者因凡外證已去而全身汗出濈然達於手足大便因裡熱水分被奪為已硬化之徵候是大承氣湯之主治也若汗雖多但有微發熱惡寒者為外證表證未解則不宜大承氣湯當處以桂枝湯也與太陽病篇桂枝湯條陽明病脈遲汗多而微惡寒者表未解也當發汗宜桂枝湯同義又假令脈遲汗出不惡寒身重短氣腹滿而喘手足濈然汗出大便雖已硬但未潮熱者不可與大承氣湯然若此證不潮熱只腹部大膨滿而大便不通者可與小承氣湯慎其用量以微利為度不可大瀉損其體力也陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎乃可攻之若不轉矢氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉矢氣者慎不可攻也傷寒論註燥屎因高熱持久水分被奪而成乾燥之糞塊轉失氣者為轉矢氣之誤昔時矢與屎通用轉矢氣者即後氣俗謂之屁也全文之義陽明病發潮熱大便微硬者可與大承氣湯其未至硬者不可與之若陽明病六七日間不大便者疑有燥屎欲試有無之方法使飲少量之小承氣湯待藥入腹內後得後氣者為有燥屎之確徵可以大承氣湯攻下之倘不得後氣假令雖以此湯攻下但始終不出硬便即初雖硬便後必排軟便也故不可以此湯攻下之若誤攻下則水氣聚於腹部而致脹滿壓迫於胃使不能食且因攻下咽喉乾燥至欲飲水若與之因腹內已有水氣而使呃逆其後潮熱者為腹中水氣去大便復硬之徵但因誤下後不可與大承氣湯亦以小承氣湯和其大便也後段轉不矢氣者慎不可攻之是因大小承氣二湯頗相近似醫易誤失故大書特書以警其誤用也尾臺氏曰陽明病潮熱大便微硬者可與大承氣湯唯此一語其義已明豈可拘泥於燥屎之有無耶蓋大承氣湯本非因燥屎一證且欲知燥屎先以小承氣湯驗轉矢氣者豈可謂法乎直可謂陋且拙矣若欲知燥屎之有無則按腹即決此吾輩所以宜研究腹候也不硬者不足以取下此說雖不無一理但腹滿甚時診定為燥屎者頗難其試法不可妄信陽明病其人多汗以津液外出胃中燥大便必硬硬則譫語小承氣湯主之若一服譫語止更莫復服傷寒論註張璐曰多汗譫語者下證急也求真按下證急者急宜以大承氣湯下之之證也因其人汗出已多津液外耗故不宜大下但當略求真按此略治略也與小承氣湯和其胃氣譫語將自止矣若過服則反傷津液也太陽病若吐若下若發汗後微煩小便數大便因硬者與小承氣湯和之愈傷寒論註本條由太陽病直轉於陽明病者因太陽病之際或發汗或吐或下亡失體液胃腸內已乾燥再加小便數益使腸內枯燥大便因硬者與小承氣湯緩下之則愈矣微煩者雖非太陽證而為陽明證但裡熱未甚之候故不用大承氣湯而與小承氣湯也得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯傷寒論註方有執曰有言太陽不言藥者以有桂枝麻黃不同也少陽言藥者以專主柴胡也凡以此為文者皆互發也山田正珍曰承氣之上脫一小字當補之四五日五六日者皆不大便之日數也故下文承之曰不大便六七日古文錯綜之妙乃爾否則至字無所承當也不大便而能食者為其屎才硬而未燥之候若不大便而不能食乃可診定為硬而燥也得病二三日脈弱者熱未熾盛可知無太陽柴胡證求真按是無太陽及少陽證之謂也煩躁心下硬者其邪已入裡可知不大便至四五日者其人雖能食當以小承氣湯少少與微和之可使小安也少少者不過三四合之謂對一升言也若少少與之而得屎延至五六日者乃可與小承氣湯一升雖然其小便少者若不大便至六七日且雖不能食但攻之求真按是以大承氣湯攻之也則必溏須待其小便數屎定硬始可攻之宜大承氣湯下利譫語者有燥屎也宜小承氣湯傷寒論註尾臺氏曰雖下利譫語其他無所苦故雖有燥屎用小承氣湯也千金翼小承氣湯治大便不通噦數譫語金匱要略註腹滿大便不通使水氣逆而成噦熱氣上衝而譫語也以上仲景所論雖以腸傷寒為主其至論不待辯矣但本方不限於此病萬病皆可通用因欲示此意引東洞翁之本方定義曰治腹滿而大便硬者學者宜參照諸說而運用之小承氣湯方大黃克厚朴枳實各克上細銼以水一合五勺煎五勺去滓頓服初服湯當更衣不爾者盡服之求真按一回量分二回服是仲景之原法故如是注明之余為便利計改為上之煎法用法若更衣者勿服之註尾臺氏曰論衡四諱篇曰更衣之室可謂臭矣錢潢曰更衣者貴人大便必更換所服之衣故稱大便曰更衣先輩之論說醫學綱目曰順利散求真按即本方也治消穀善饑為中消熱在胃而能食小便黃赤微利者至不欲食為效不可多利求真按此中消即多嗜證也入門良方曰小承氣湯治痢初發精氣甚盛腹痛難忍或作脹悶求真按脹悶者腹部脹滿而煩悶也裡急後重數至圊不能通窘迫甚者傷寒緒論曰少陰病手足厥冷大便秘而小便赤脈沉滑者小承氣湯主之求真按稱少陰病者由於手足厥冷但自大便秘小便赤脈滑觀之其實非少陰病是陽明病矣幼科發揮曰三化丸求真按即本方之丸方去胸中之宿食求真按腹中之誤乎菀莖求真按陰莖也之熱小青囊曰小承氣湯治痘因飲冷傷食而腹痛甚者方機本方主治曰腹滿而大便不通者汗多而大便硬譫語者發潮熱大便初頭硬後必溏者微煩小便數大便硬者下利譫語者大便不通噦而譫語者類聚方廣義本方條曰子炳曰大小承氣湯本屬同證若去芒硝則如鈍刀不可用矣甚矣子炳之不辨方法也夫方有大小以病有輕重緩急也豈特大小之制哉凡長沙之方雖一味之去加乘除即異其義因而效用亦無不異是故醫之臨病也見證時能審其輕重緩急縝密處方則能合長沙之矩度而後可得其治期若粗心武斷輕試漫投僥幸其治而不殺人者罕矣可不慎哉傷寒噦逆證有屬熱閉邪實者有屬寒飲精虛者又有因蛔蟲者宜精診甄別以措方庸醫皆懼呃逆故一見噦證即為胃寒虛脫概用治噦之劑可謂粗矣王宇泰用瀉心湯小承氣湯調胃承氣湯桃仁承氣湯龔廷賢用黃連解毒湯白虎湯等可謂具眼之士矣大黃之醫治效用藥徵曰大黃主通利結毒也故能治胸滿腹滿腹痛及便閉小便下利兼治發黃瘀血腫膿上歷觀此諸方張仲景用大黃者特以利毒而已故各陪其主藥而不單用焉合厚朴枳實則治胸腹滿合黃連則治心下痞合甘遂阿膠則治水與血合水蛭虻蟲桃仁則治瘀血合黃柏梔子則治發黃合甘草則治急迫合芒硝則治堅塊也學者審諸仲景方中用大黃者不止於此而以其用之之徵顯然著明於此故不復疣贅也大黃合諸藥瀉下身體各部之病毒而排除之雖如此說但此作用限於病者呈實證之際始能發揮不然不僅不能起作用反與病者以惡影響故前說宜改作大黃者主通利實證之結毒也始成完璧而其奏效之理由則如下藥物學曰瀉下藥之應用一便秘又屢因誘起諸多不定症狀其主者眩暈頭痛胃之重感等又因硬便致成局處之機械刺激及滯便之異常分解或由於化學的刺激有呈赤痢樣症狀者皆須瀉下藥之應用也二急性及慢性之腸炎腸炎之證候發下痢者因欲排泄腸中之有害物也不消化物毒物刺激性分解產物此際若用制瀉藥則反有害故須用瀉下藥助其排泄時則有害物被排泄同時下痢亦自止矣是以瀉下藥亦有時有制瀉之效也三尿閉證腎臟之疾患或婦人之神經病癔病儒門醫學譯作煩惋善怒神經疾患等之尿量減少或閉止致可由尿排泄之水分及固形分蓄積於體中而發所謂尿毒證者若用瀉下藥抑制腸之吸收亢進其分泌至一定度時得防遏之四浮腫及蓄水不問原因如何水分蓄積於組織或體腔內時減其飲料兼用瀉下藥而妨腸液之吸收時與由皮膚肺臟腎臟等之排水相等使血液濃厚增加其滲透壓因而吸收是等蓄積之水分同時講發汗利尿之法其效果更顯著也五脂肪過多若檢查下痢之便見大便中脂肪顯著增加及有多量養素此因腸內容排泄迅速故不能吸收脂肪與養素也對於肥胖病之用瀉下藥實由於此六遠隔部之炎證瀉下藥之刺激腸壁因與皮膚刺激藥同一理由故亦可作用於遠隔臟器之炎證如對於腦肺虹膜等之充血炎證與以有利之影響此因腸管之充血或全身之水分損失也植物性下劑之一般的性質一因酸性不溶解於胃液而到腸管始行溶解又因於腸管內之消化液或細菌等之作用始被變化而起刺激性二其吸收緩慢所以能發揮其瀉下作用故瀉下藥以生藥為適當也三假令雖被吸收但其毒力作用亦不至於強烈四其刺激止於腸壁之表面故較緩和植物性下劑其作用一植物性之下劑能刺激腸管故使蠕動亢進及腸腺之分泌增加然通常皆由腸壁滲出二腸之充血多數在大腸因大腸之充血延及於骨盆內之臟器子宮及其附屬臟器之充血致有引起月經過多子宮內出血及孕婦之早產或流產等證大黃少量克內服則因鞣酸及苦味質有收斂健胃作用適合於胃腸炎內服大量克有緩下作用自六至十時間有糜粥狀之排便其作用極緩和故適合於小兒及貧血衰弱之患者併恢復期等又習慣性便秘有效若為廢藥反致便秘因其含有鞣酸故也更與大量則能引起數次之排便此說經科學的研究故議論頗適當而啟發吾人不少惜只一味作用之注意且應用範圍失之狹小故宜熟讀下說以擴充其應用本草綱目曰大黃根氣味苦寒無毒求真按本藥為冷性瀉下藥故不適於陽虛及陰虛證而適於陽實證也主治下瘀血血閉寒熱破癥瘕積聚留飲宿食蕩滌腸胃推陳致新通利水穀調中化食安和五臟本經註血閉者為月經閉止通利水穀者通利水穀二毒也安和五臟是除去五臟之病毒則自能安和矣平胃下氣除痰實腸間結熱心腹脹滿女子寒血閉脹求真按寒血恐是瘀血之誤小腹急痛諸老血留結別錄註瘀血閉脹由瘀血閉塞而腹部脹滿也諸老血留結者因陳久瘀血凝結於諸臟器組織也通女子經候利水腫利大小腸貼熱腫毒小兒寒熱時疾煩熱蝕膿甄權註時疾者流行性疾患也蝕膿者化膿證也通宣一切氣調血脈利關節泄壅滯水氣溫瘴熱瘧大明註通宣一切氣及調血脈者皆由本藥驅逐鬱滯病毒之歸結也瀉諸實熱不通除下焦濕熱消宿食瀉心下痞滿元素下痢赤白裡急腹痛小便淋瀝實熱燥結潮熱譫語黃疸湯火傷時珍本草備要曰大黃大苦大寒用以蕩滌腸胃下燥結祛瘀熱治傷寒時疾之發熱譫語溫熱瘴瘧下痢赤白腹痛裡急水腫癥瘕積聚積久成形謂之積聚散無常謂之聚留飲宿食心腹痞滿二便閉結吐血衄血血閉血枯一切實熱血中伏火行水通經蝕膿消腫胃虛血弱人禁用一本堂藥選曰療痢疾腹痛裡急後重潮熱譫語腹間結熱一切之梅毒下疳便毒一身之結毒下瘀血血閉厚朴之醫治效用藥徵曰厚朴主治胸腹滿也兼治腹痛註胸腹滿者胸滿或腹滿也此說雖不敢以為不可但腹滿有虛實之分實滿有由食毒充實者有由瘀血鬱滯者有由水毒壅滯者有由此二三因合併者其虛滿亦有由水毒蓄積者有瘀血兼水毒者有由腸管麻痹氣體充滿而然者其原因各不相同故以厚朴為胸腹滿之主治不妥當也依余之經驗本藥之主治胸腹滿宜限於食毒或食兼水毒者故宜將前說改作厚朴主治因食毒或食兼水毒之胸腹滿也可以參看下列諸說本草綱目曰厚朴皮氣味苦溫無毒主治溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止泄痢淋露除驚去留熱心煩滿厚腸胃別錄求真按由益氣下氣除驚去心煩滿觀之則本藥有作用於神經係矣由消痰去胸中嘔不止觀之可知有治水之作用矣健脾治反胃霍亂轉筋冷熱氣瀉膀胱及五臟一切氣婦人產前產後腹臟不安殺腸中蟲明耳目調關節大明治積年冷氣腹中雷鳴虛吼宿食不消去結水破宿血化水穀止吐酸水大溫胃氣治冷痛主病人虛而尿白甄權求真按由治宿食不消去結水化水穀止吐酸水觀之則本藥之治食毒或食兼水毒也明矣主肺氣脹滿膨而喘咳好古註肺氣脹者即肺脹也宜參照太陽病篇越婢加半夏湯條滿膨腹部滿膨也本草備要曰厚朴苦能降瀉實滿辛溫能散濕滿平胃調中消痰化食厚腸胃行結水破宿血求真按本藥無祛瘀血作用殺臟蟲求真按本藥殺蟲作用可疑治反胃嘔逆喘咳瀉利冷痛霍亂榛樹之皮也肉厚紫潤者良枳實之醫治效用藥徵曰枳實主治結實之毒也兼治胸滿胸痹腹滿腹痛此說是也可為本藥應用之主目的但更欲補充之主治結實之毒者謂治心下肋骨弓下此部結實雖類似於柴胡之胸脅苦滿但較彼為強度及腹直肌之結實也其作用雖類於芍藥然與彼之結實拘攣較則結實之度優於彼拘攣之度劣於彼也其治胸滿腹滿有似厚朴但本藥以結實為主脹滿為客彼以脹滿為主結實為客也而治食毒或食兼水毒者則同矣本草綱目曰枳實氣味苦寒無毒主治大風在皮膚中如麻豆苦癢除寒熱結止痢長肌肉利五臟益氣輕身本經除胸脅痰癖逐停水破結實消心下急痞痛脅風痛安胃氣止溏泄明目別錄註寒熱結胸脅痰癖心下急痞痛者皆結實之毒也解傷寒結胸主上氣喘咳腎內傷冷陰痿而有氣加而用之甄權註腎內傷者內因性生殖器疾患也冷陰痿者為冷性之陰痿而有氣者有氣力也消食散敗血破積堅去胃中濕熱元素枳殼氣味苦酸微寒無毒主治通利風痹淋痹關節勞氣喘咳背膊悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛開寶註淋痹淋毒性麻痹也勞氣喘咳肺結核之喘咳也留結胸膈痰滯者水毒結實於胸膈也遍身風疹肌中如麻豆惡瘡腸風痔疾心腹結氣兩脅脹滿關格壅塞甄權註心腹結氣兩脅脹滿關格壅塞者皆由結實之毒使然也健脾開胃調五臟下氣止嘔逆消痰治反胃霍亂瀉痢消食治瘕結痃癖五膈氣及肺氣水腫大小腸除風明目大明註癥結痃癖五膈氣皆結實之毒也泄肺氣除胸痞元素治裡急後重時珍本草備要曰枳實枳殼苦酸微寒其效皆能破氣行氣故行痰止喘消痞脹息刺痛除後重治傷寒結胸食積痰癖癥結五膈嘔逆咳嗽水脹脅脹肝鬱瀉痢淋閉腸風痔腫除風去痹開胃健脾所主略同枳實力猛枳殼力緩為異耳由以上諸說觀之則本藥主治由結實之毒而成諸證者明矣厚朴三物湯之注釋痛而閉者厚朴三物湯主之金匱要略註痛而閉者謂腹痛而大便秘結也但仲景列本方於腹滿寒疝宿食病篇與厚朴為君藥觀之則腹部大滿痛而大便秘結者以本方為主治也而本方與小承氣湯藥味同而分量異即小承氣湯以大黃為君藥厚朴枳實為臣藥而本方以厚朴為君藥枳實為臣藥大黃佐之故兩相比較則此腹滿證為劇是以東洞翁以本方為治小承氣湯證而腹滿劇者為定義之原因也支飲胸滿者厚朴大黃湯主之金匱要略註方名不同藥味無異由仲景之支飲胸滿云則此方主治胃內停水及心下部膨滿可知矣厚朴三物湯方厚朴克枳實克大黃克煎法用法同前先輩之論說方機本方主治曰腹滿心下痛而大便不通者心下滿痛吐出水者險證百問曰師曰腹滿吐水謂大便閉而吐水者有與厚朴三物湯而愈求真按是本仲景論之支飲胸滿也方輿輗曰厚朴三物湯痛而閉者此條略去腹滿唯是提其主證耳曰痛曰閉比七物湯證則較急且七物湯有甘草大棗方意稍緩此湯只三味有勇往直前之勢也腹證奇覽曰胸滿心下有支飲結實而大便硬或秘閉時時心下痛或吐水者為厚朴大黃湯證枳實治胸脅間之痰飲結實厚朴開痞滿大黃和之而利宿便硬便疏滌腸胃證云支飲胸滿者厚朴大黃湯主之此方與小承氣湯藥味同但分量不同耳厚朴大黃湯以厚朴為君枳實為臣大黃為佐故主治胸滿非主疏滌也小承氣湯大黃為主枳實為臣厚朴佐之故主利大便硬或不通也其腹證亦僅腹微滿心下硬耳此古方詳其分量之所以也類聚方廣義本方條曰諸病不能服大承氣湯者宜以此湯送下消塊丸每服一錢求真按諸病者有大承氣湯證嫌其藥味不能服者使以本方服消塊丸大黃芒硝之丸藥也一錢則易服也治痢疾腹滿甚裡急後重者子炳曰長沙氏有小承氣湯吾不信也恐是厚朴三物湯之誤按此方是大承氣湯無芒硝而煮法已異故所主治亦不同也蓋疾病萬狀無所底止所以應付亦無窮極長沙氏建方法之極盡其變化以制千狀萬態之病非庸俗所可思議也吾輩宜守其法以修吾術此所謂信而好古者也如子炳者不信古而已信矣特不知長沙氏方法之旨趣并不知東洞先生選斯書之意致有如是之謬論也厚朴七物湯之注釋病腹滿發熱十日脈浮而數飲食如故厚朴七物湯主之金匱要略註此證所謂太陽與陽明合病也發熱脈浮而數表證也腹滿陽明證也故以治表證之桂枝去芍藥湯治腹滿之厚朴三物湯相合而成之本方厚朴七物湯方厚朴克甘草大黃各克大棗克枳實生薑各克桂枝克上細銼以水三合煎一合去滓一日分三回溫或冷服先輩之論說治驗東洞翁本方定義曰治腹滿發熱上逆嘔者按此方合厚朴三物湯桂枝去芍藥湯而加生薑二兩也由是觀之當有二方之證而上逆嘔證方機本方主治曰腹滿發熱脈浮數而嘔大便不通者痢疾手足惰痛或發熱脈浮數或嘔者方輿輗本方條曰金匱主治雖曰精詳然亦不待此證悉備千金七物湯方下唯云治腹滿氣脹然脈浮而數為用此湯之真面目叢桂亭醫事小言曰一農家子二十歲由石尊歸寒熱如勞顏色衰瘦腹滿少氣衣不前合自乳下至扶容邊青脈絡如絲瓜常坐暗室不欲見客斷為難治告其父其父知非小病懇乞賜藥與厚朴七物湯後再求藥時云頗快又與前藥經數日乞再診余以前斷難治不必再診答之使者謂漸愈而強懇至時病者已輕輕出迎於堂上余驚診之腹滿已消寒熱已止元氣清爽云已出游近鄰矣然余至今尚不知何故有如是之速效也類聚方廣義本方條曰治食傷吐下後胸中不爽快乾嘔腹滿或頭痛有熱者治痢食腹滿拘急發熱腹痛劇而嘔者加芍藥或芒硝亦良大承氣湯之注釋傷寒不大便六七日頭痛有熱小便反赤者與承氣湯其小便清者知不在裡仍在表也當須發汗若頭痛者必衄宜桂枝湯傷寒論註詳太陽病篇桂枝湯條陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裡也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下傷寒論註在小承氣湯條陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎欲知之法少與小承氣湯湯入腹中轉矢氣者此有燥屎乃可攻之若不轉矢氣者此但初頭硬後必溏不可攻之攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉矢氣者慎不可攻也傷寒論註在小承氣湯條傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生澀者死微者但發熱譫語者大承氣湯主之主之之下有若一服利止後服七字認為後人所添補故去之傷寒論註脈經譫語之下無者字今從傷寒論獨語者無人相對而自語也如見鬼狀者謂病者有奇奇怪怪之舉動恰如鬼神之狀也若劇者謂劇發潮熱也循衣摸床者如字義惕而不安者因恐怖而不安臥於席也脈弦者生澀者死謂前證微喘直視且呈弦脈者以大承氣湯攻下之則治若現澀脈者假令用此方亦不免於死也微者但發熱譫語者謂脈微不呈餘證僅止發熱譫語也大承氣湯主之者現此弦脈及呈微脈者皆以本方為主治也陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉矢氣者更服一升若不轉矢氣勿更與之明日不大便脈反微澀者裡虛也為難治不可更與承氣湯也傷寒論註尾臺氏曰陽明病云云脈滑而疾者是大承氣湯證也脈經及千金俱無小字為是因與承氣湯以下為後人之注文可刪此說是也以之解本條陽明病譫語有潮熱反不能食者胃中必有燥屎五六枚也若能食者但硬耳宜大承氣湯下之傷寒論註山田正珍曰反當作煩因聲近而誤也傷寒有譫語潮熱者固應不能食豈可謂反耶尾臺氏曰陽明病譫語有潮熱反不能食云云反字衍也一說反當作煩因音近致誤似牽強蓋衍不字復誤作反耳求真按二說是非暫置不論反字無重大意義可去之而不能食與能食皆以本方為主治也汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛裡實故也下之則愈宜大承氣湯傷寒論註山田正珍曰風當作實傳寫之誤也本篇有大便難身微熱者此為實也急下之宜大承氣湯下篇曰病腹中滿痛者此為實也當下之宜大承氣湯是也下之若早語言必亂之八字錯簡也當在宜大承氣湯句之下始合過經者謂表解也錢氏曰下之若早則胃氣一虛外邪內陷必至熱盛神昏語言必亂也蓋表間之邪氣皆陷入於裡表空無邪邪皆在裡故謂之表虛裡實也求真按汗出譫語者因腹中有燥屎腹中有燥屎者裡實之極也故可以大承氣湯瀉下之表證解轉入陽明者亦可以此湯下之若表證未全解早以承氣湯瀉下表熱因下劑之勢而陷於裡此充實之病毒必犯頭腦使至譫語故用此方者必待表解也二陽併病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯傷寒論註成無己曰本太陽病併陽明病名曰併病太陽證罷者是無表證也但發潮熱者是熱列於陽明也一身汗出為熱越今漐漐而汗出者是熱聚於胃也必大便難而譫語者經曰手足漐漐然而汗出者必大便已硬也以大承氣湯下胃中之實熱山田正珍曰按手足漐漐而汗出者謂手足至末漐漐然而汗出也成注誤矣陽明病下之心中懊憹而煩胃中有燥屎者可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯傷寒論註和久田氏曰此章辨梔子豉湯證下之心中懊憹者梔子豉湯證也然梔子豉湯證心中濡而不實滿此證腹實滿而心中懊憹按其實滿為胃中為燥屎之候可以大承氣湯攻之若腹雖實滿但其滿微者未有燥屎也是宜和以小承氣不可以大承氣攻之若有燥屎者則攻其燥屎故曰宜大承氣湯也尾臺氏曰陽明病下之心中懊憹而煩云云似於梔子豉湯證也其別在煩與虛煩及有燥屎與否脈狀亦不無虛實之異故診病者能觀其腹證與脈應然後處方可無誤矣病人不大便五六日繞臍痛煩躁發作有時者此有燥屎故使不大便也傷寒論註錢氏有言曰不大便五六日繞臍痛者燥屎在腸胃也煩躁者實熱鬱悶之所致發作有時者日晡潮熱之類也求真按發作有時者痛與煩躁發作有時也錢氏之說非也張志聰曰不言大承氣湯者省文也此接上文言亦宜大承氣湯也明矣病人煩熱汗出則解又如瘧狀日晡所發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之與大承氣湯發汗宜桂枝湯傷寒論註在太陽病篇桂枝湯條大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者本有宿食故也宜大承氣湯傷寒論註方有執曰煩不解則熱未退可知求真按為不大便煩而不解之略也腹滿痛則當診為胃實故云有燥屎也醫宗金鑒曰下之不盡仍可下之求真按此指燥屎也山田正珍曰所以然之十字為叔和之釋文當刪之病人小便不利大便乍難乍易時有微熱喘冒不能臥者有燥屎也宜大承氣湯傷寒論註山田正珍曰燥屎為前日所食之糟粕牢結乾著於腸內者大便乃現今所食之糟粕軟潤而順下於肛門者今病人小便不利大便乍難乍易因燥屎橫道而障礙之況微熱喘冒不能臥是煩躁譫狂之漸耶雖無滿痛亦必有燥屎故宜大承氣湯以下之尾臺氏曰病人小便不利云云此指裡熱結成燥屎也故小便不利大便乍難乍易亦不至於溏泄也其時有微熱者裡熱隱然見於表也喘冒不能臥者裡熱上衝使然也此證脈多沉滑或沉遲舌色赤而光亮或起炲刺而渴也得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食以小承氣湯少少與微和之令小安至五六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯傷寒論註在小承氣湯條傷寒六七日目中不了了睛不和無表裡證大便難身微熱者此為實也急下之宜大承氣湯傷寒論註成無己曰目中不了了睛不和者邪熱甚於內上熏於目也方有執曰了了猶瞭瞭也尾臺氏曰目中不了了者眼睛矇瞳而不慧然也以金匱驚悸篇目睛慧了可證和久田氏曰目中不了了者謂睛子不明也睛不和者無潤澤之謂也無表裡證者六七日時宜有由表及裡之寒熱往來胸脅苦滿等證已有日數而無其證也大便硬身有微熱者此因邪氣內實外證雖不劇而內實之勢已迫急下之不可忽也求真按患傷寒經過六七日後眼球朦朧而亡光澤且不滋潤無表證及半表半裡證而大便難通身有微熱者裡實之機已迫急宜以大承氣湯下之也陽明病發熱汗多者急下之宜大承氣湯傷寒論註和久田氏曰陽明病發熱不惡寒而汗出多者胃中津液被熱驅出內實之機已迫攻下不可忽緩也尾臺氏曰陽明病發熱汗多者急下之因已是陽明病又加多汗發熱則津液枯竭而燥屎譫語之險證可立而待也此機不可失故急下之雖發熱汗多若仍惡寒者宜更發汗也凡曰急下之急溫之急救之皆一時之救急也本論急下之凡六條皆僅見證之一二然此不制則必危險竟起災生不測而至於無可如何也故曰急以示不可緩治也所以用大承氣湯以應機而制變為醫者之要務可不慎歟發汗不解腹滿痛者急下之宜大承氣湯傷寒論註成無己曰發汗不解邪熱傳入於府也求真按入府者入於胃腸也而成腹滿痛者傳之迅速也求真按由太陽傳於陽明之迅速也此須急下之和久田氏曰發汗而熱不解腹滿痛者亦內實之候也以其來速宜急下之腹滿不減減不足言當下之宜大承氣湯傷寒論註和久田氏曰腹滿下之不減減不足言者須下之至腹滿消至相當程度者當用大承氣湯此承前腹滿痛而言傷寒腹滿按之不痛者為虛痛者為實當下之舌黃未下者下之黃自去宜大承氣湯玉函經註程林金匱直解曰求真按金匱雖載本條無宜大承氣湯句且傷寒腹滿作病者腹滿腹滿證虛者可按實者不可按求真按虛者不痛故得按實者因痛故不得按也若舌有黃苔未經下者則因實熱結於中焦下之實熱除而黃苔自去矣山田正珍曰此承上二條辨腹滿之虛實也求真按傷寒論無本條恐係脫簡今從玉函經補之可與少陽病篇大柴胡湯條參照陽明少陽合病必下利其脈不負者順也負者失也互相克賊名為負也脈滑而數者有宿食也當下之宜大承氣湯傷寒論註和久田氏曰其脈不負十八字為後人羼入當刪之陽明少陽合病者不惡寒但熱而心下痞硬下痢及脈滑有力而數者雖下利亦有宿食停滯也故當以下去之少陰病得之二三日口燥咽乾者急下之宜大承氣湯傷寒論註山田正珍曰自此以下三條皆是陽明病有燥屎者實非少陰病也今冒以少陰病三字以其無熱而有欲寐等證與太陰病桂枝加大黃湯同例按承氣湯以脈滑數為法二百六十四條曰脈滑而數者有宿食也當下之宜大承氣湯二百二十四條曰陽明病譫語發潮熱脈滑而疾者小承氣湯主之可為明證下篇曰下利脈遲而滑者內實也宜大承氣湯下利脈反滑者當有所去下之乃愈宜大承氣湯合考之以下三證可知其脈滑數矣求真按本條以下三證皆因有少陰病之外觀仲景雖冠此三字其實非少陰病是陽明病也若為真少陰病時口中必和今不然而口燥咽乾故也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯傷寒論註醫宗金鑒曰自利清水者謂下利無糟粕也色純青者謂所下者皆污水也山田正珍曰清圊也清水猶言下水也與清穀清便清血清膿血之清同非清濁之清也若是清濁之清其色當清白不當純青也注家皆作清濁之清非也求真按二說俱是但欲再補之自利清水色純青者瘟疫論所謂熱結旁流也若不急下之則忽變為死證之劇證矣少陰病六七日腹脹不大便者急下之宜大承氣湯傷寒論註腹滿不大便者為病毒鬱積於腹內之候已當下之況此毒已波及於全身使呈少陰病之證乎故仲景曰急下之病腹中滿痛者此為實也當下之宜大承氣湯傷寒論註腹中滿痛者腹部膨滿有自他覺的疼痛也脈雙弦而遲者必心下硬脈大而緊者陽中有陰也可下之宜大承氣湯傷寒論註脈雙弦而遲心下硬及脈大而緊者皆陰陽交錯之證其屬陽證者宜以此方下之下後然後處置其陰證故曰宜不曰主也問曰人病有宿食何以別之師曰寸口脈浮而大按之反澀尺中亦微而澀故知有宿食當下之宜大承氣湯金匱要略註參照總論脈應及診脈法脈數而滑者實也此有宿食下之愈宜大承氣湯金匱要略註實者實證也下利不欲食者有宿食也當下之宜大承氣湯金匱要略註下利病者而不好飲食因不消化物停滯也故宜本方下之下利三部脈皆平按之心下堅者急下之宜大承氣湯金匱要略註三部之脈平者寸關尺三脈皆為平脈即常脈也按之指心下也下利脈遲而滑者實也利未欲止急下之宜大承氣湯金匱要略註利未欲止者謂病毒尚熾而未止也下利脈反滑者當有所去下乃愈宜大承氣湯金匱要略註下利脈反滑者下利病者之脈常微小今反得滑脈故曰反也當有所去者病毒有自去之機也下利已瘥至其年月日時復發者以病不盡故也當下之宜大承氣湯金匱要略痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯金匱要略註口噤者牙關緊急也臥不著席者因角弓反張背部不能緊著於席上也齘齒者上下齒相切即牙關緊急之劇者本條為說明破傷風之證治也問曰新產婦人有三病一者病痙二者病鬱冒三者大便難何謂也師曰新產血虛多汗出喜中風故令病痙亡血復汗寒多故令鬱冒亡津液胃燥故大便難產婦鬱冒其脈微弱嘔而不能食大便反堅但頭汗出所以然者血虛而厥厥而必冒冒家欲解必大汗出以血虛下厥孤陽上出故頭汗出所以產婦喜汗出者亡陰血虛陽氣獨盛故當汗出陰陽乃復大便堅嘔不能食小柴胡湯主之病解能食七八日更發熱者此為胃實宜大承氣湯註在少陽病篇小柴胡湯條產後七八日無太陽證少腹堅痛此惡露不盡不大便煩躁發熱切脈微實更倍發熱日晡時煩躁者不食食則譫語至夜即愈宜大承氣湯主之熱在裡結在膀胱也註脈經作日晡所發熱者不能食而譫語刺之則愈利之亦愈頗合理故可從之且末句之熱在裡結在膀胱也為後人羼入宜去之無太陽證者脈不浮無頭項強痛惡寒也少腹堅痛者下腹部堅滿有自他覺的疼痛也因已存之裡熱與停滯之惡露因有裡熱使惡露停滯也相合所致大便秘煩躁發熱亦然切脈微實者診為微實脈也更倍發熱者二次發熱較初次更劇也日晡時煩躁者即日沒時煩躁也如是之更倍發熱日晡煩躁不能食而譫語與不大便使煩躁發熱之增進皆由裡熱熾盛所致故以大承氣湯瀉下之則諸證及小腹堅痛皆治愈而惡露亦盡下矣類聚方廣義本方條曰此證脈實裡實發熱煩躁便閉譫語及小腹堅痛者皆非急結之比所以用大承氣湯也子炳為桃核承氣湯證未深考耳由是可以鑒別二方證矣大承氣湯方大黃克厚朴克枳實克芒硝克上細銼以水一合五勺煎五勺去滓納芒硝溶而頓服之大承氣湯之腹證東洞翁本方定義曰大承氣湯治腹堅滿或下利臭穢或燥屎者凡有燥屎者臍下必磊砢肌膚必枯燥也如云腹堅滿即腹部膨滿而堅抵抗力大者雖為本方之腹證未免有泛而不切之弊蕉窗雜話云用大柴胡或柴胡加芒硝湯求真按此柴胡加芒硝湯即大柴胡加芒硝湯證若概用承氣湯其瀉下雖同而緩解兩脅心下之痞硬則甚薄弱此二類瀉下藥之所以分別也夫承氣湯之腹候心下寬緩自臍上至臍下緊張有力又陽明篇所說之小柴胡湯證若不進至大承氣則有不能緩解之勢因小柴胡僅有緩解兩脅及心下而不能解決中脘以下之硬滿也又此處若用大柴胡柴胡芒硝湯求真按此亦大柴胡加芒硝湯等瀉下時解熱反遲緩終成壞證也是以與大小柴胡及柴胡加芒硝等證各有差別宜注意其差別處則能了然如指掌矣如上所云則本方證之腹滿足臍部中心及於上下左右堅滿而以心下及下腹部無變化為常前之少腹堅滿為例外若有心下硬時雖疑似於大柴胡湯之心下痞硬但此外必有胸脅苦滿而本方則無此證可以判別若此二方證併發時宜斷其劇易緩急應先處以本方後用大柴胡湯乎或先處大柴胡湯後用本方乎或二方合用乎神而明之存乎其人又或為大黃牡丹皮湯證劇乎或此證與大柴胡湯證合併時往往酷似本方證鑒別頗不易須切記之又本方除燥屎決非本方之特能調胃承氣湯亦能之故僅由腹堅滿有燥屎一證不可漫投焉先輩之論說治驗明理論曰承順也傷寒之邪氣入胃則謂之入府府猶聚也胃為水穀之海榮衛之源水穀會聚於胃變化而為榮衛邪氣入胃胃中之氣鬱滯糟粕秘結壅而為實是以正氣不得舒順也本草曰通可去滯泄可去邪若塞而不利閉而不通則以湯蕩滌之使塞者利閉者通故正氣得以舒順是以名之為承氣也內臺方義曰仲景用大承氣湯處有二十五證證雖各異法即下泄也用法雖多不外大滿大熱大實其脈沉滑而實者用之無不當矣傷寒蘊要曰大抵用下藥必須切脈沉實或沉滑沉疾而有力者可下也再以手按臍腹而硬者或叫痛而不可按者則下之可無疑義凡下後不解者再按臍腹有無硬處如有不可以手按者下未盡也復再下之若下後腹中虛軟而脈無力者此為虛也衛生寶鑒曰治發狂觸冒寒邪因失解利轉屬陽明證胃實譫語者本方加黃連求真按本方加黃連者為本方與大黃黃連瀉心湯合方之意也理傷續斷方曰大成湯一名大承氣湯治損傷瘀血不散腹肚膨脹大小便不通上攻心腹悶亂至死者急將此藥通下瘀血方可服損藥大成湯大承氣湯加甘草陳皮紅花當歸蘇木木通損藥乃小承氣湯也求真按本方加甘草陳皮紅花等不如本方合用桃核承氣湯也醫學正傳曰治一人六月涉深淵取魚至深秋而雨涼半夜小腹痛甚大汗出脈沉弦細實重取如循刀砉砉然夫腹痛之脈微弦細實如循刀砉砉然者為陰邪固結之象不當有汗今大汗出此必瘀血留結營氣不能內守而滲泄於外也且弦脈亦為肝血受傷之候與大承氣加桂使二服微利而痛減連日復於未申時堅硬不可近與前藥加桃仁泥下紫血升餘而痛止脈雖稍減而砉砉然猶在又以前藥加川附子下大便四五行有紫黑血如破絮者二升而愈求真按此證宜本方合用桃核承氣湯加附子吳氏勉學匯集單方曰余治一少年腹痛目不見人陰莖縮入喊聲徹天醫方灸臍而愈痛欲用附子理中湯余偶過其門使諸親友邀入余曰非陰證也陰證聲低小只呻吟耳今宏厲有力故以為非脈之伏而數且弦為肝甚外腎為筋之會肝主筋肝火盛也肝脈絡陰莖肝開竅於目故目不明用承氣湯一服立止可知有結糞在下故也凡痛須審察其寒熱虛實諸證皆然腹久痛多有積宜消之求真按此說病理雖未可盡據但其治術實堪讚賞古今醫統曰大承氣湯治癲狂熱壅大便秘結傷寒緒論曰治病人熱甚脈來數實欲登高棄衣狂妄詈罵不避親疏者蓋陽盛則四肢實實則能登高也宜大承氣湯仁齋直指曰熱厥者初病身熱然後發厥其人畏熱揚手擲足煩躁飲水頭汗大便秘小便赤怫鬱昏憒蓋因當下失下血氣不通故四肢逆冷所謂熱深厥亦深也下證悉具而見厥逆者此也與大承氣湯求真按此為熱極反呈陰狀也與寒厥正反不可誤治小青囊曰大承氣湯治舌之四邊微紅中央見灰黑色者此由失下所致用本方退之又治舌見黃色而黑點亂生者其證必渴而譫語又治舌見灰黑色而有黑紋脈實者求真按此雖述本方之舌證若不與腹脈證參照而僅由此舌證者不可處方痘證寶箋曰承氣湯治痘色赤紫形塌頂焦齒燥唇裂腹脹悶而拒按舌刺譫語睡臥不穩痘不能起長者皆因燥屎閉結用此去之則毒火泄而痘自起色轉紅活矣但須認清實熱不可妄用誤投若誤下之則元氣反虛而致內陷禍如反掌也瘟疫論曰瘟疫發熱一二日舌上白苔如積粉早服達原飲一劑午前舌變黃色隨現胸膈滿痛大渴煩躁前方加大黃下之煩渴少減熱去六七午後復加煩躁發熱通舌變黑生刺鼻如煙煤此因邪毒最重瘀復到胃也急投大承氣湯傍晚大下至夜半熱退次早鼻黑苔刺如失求真按用達原飲不如用小柴胡湯此一日間有三變者是數日之法一日行之因其毒甚傳變亦速用藥不得不緊也設此證不服藥或投緩劑而羈遲二三日則必死雖不死服藥亦不及嘗見瘟疫一二日即斃者乃其類也求真按腸傷寒證而嚴禁下劑之醫家不可不三省之若邪已入胃則非承氣不愈誤用白虎既不能逐邪徒因剛悍而伐胃氣反抑邪毒因脈不行而致細小又認陽證得陰脈而妄言不治醫見脈微欲絕益不敢議下日惟雜進寒涼以為穩當愈投愈危至死不悔此當急投大承氣湯而緩緩下之六脈將自復矣求真按此以峻下劑有強心藥之用也邪發於半表半裡者有一定之法至於傳變或出於表或入於裡或表裡分傳醫見有表復有裡乃引經論先解其表乃攻其裡此大謬也求真按此非非議先表後裡之法是責泥守其法而不知變通之庸醫也嘗見連進大劑之麻黃無一毫之汗轉見煩躁者何也蓋發汗之理自內由中以達於表也今裡氣結滯陽氣不能敷布於外即四肢亦不免厥逆又安能以氣液蒸蒸達表耶譬如縛足之鳥雖欲飛升其可得乎蓋鳥之將飛也其身必伏先縱足而後揚翅方能升舉與此戰汗同義又如水注閉其後竅則前竅不得涓滴亦與發汗之義同凡見表裡分傳證務宜以承氣先通其裡裡氣一通不待發散多有自能汗解也求真按此以下劑能作發汗藥用之故也瘟疫下後二三日或一二日舌上復生苔刺者邪未盡也再下之苔刺雖未去已無鋒芒而軟然熱渴未除則更下之熱渴減苔刺脫日後更熱又生苔刺者宜更下之余里周因之患疫月餘苔刺凡三換計服大黃二十兩熱始不作其餘脈證得以漸退所以凡下不可以數計若有是證則投是藥醫家見理不透經歷未到疑生中道往往遇此證反致耽擱也朱海疇妻四十五歲患疫得下證四肢不舉臥床如塑目閉口張舌上苔刺問其所苦不能答因問其子兩三日所服何藥云進承氣湯三劑每劑投大黃兩餘不效更無他策惟待日耳但不忍坐視更祈一診余診得脈尚有神下證悉具藥淺病深也先投大黃一兩五錢目有時少動更投之舌刺無芒口漸開而能言三劑舌苔少去神思稍爽四日使服柴胡清燥湯五日復生芒刺煩熱又加再下之七日又投承氣養榮湯熱少退八日仍用大承氣肢體自能稍動計半月共服大黃十二兩而愈又數日始進糜粥調理兩月而平復凡治千人所遇此等證不過二三人耳姑存案以備參考求真按柴胡清燥湯不若柴胡去半夏加瓜蔞湯承氣養榮湯不如大柴胡去大黃瘟疫可下者雖約三十餘證但不必悉具若見舌黃心腹痞滿便用達原飲加大黃以下之設邪在膜原者已有行動之機而欲離未離之際若得大黃促之而下實為開門祛賊之法即使不愈邪亦不能久羈矣二三日後若餘邪入胃仍用小承氣湯徹其餘毒求真按用達原飲加大黃小柴胡湯加大黃與小承氣湯之間有用大柴胡湯之機會大凡客邪貴在早逐乘人氣血未亂肌肉未消津液未耗病尚未至危殆時投劑不至掣肘愈後亦易平復欲為萬全之策者不過知邪之所在宜早拔去病根為要耳但諒人虛實度邪輕重察病緩急揣邪氣離膜原之多寡然後藥不空投無太過不及之弊是以仲景自大柴胡湯以下立三承氣與多與少自有輕重之殊不可拘於下不厭遲之說應下之證見下無結糞以為下之過早或以為不應下之證誤投下藥殊不知承氣本為逐邪而非專為結糞設也若必待其糞結則血液因熱而搏變證迭起是猶養虎遺患醫之咎也況溏糞失下蒸作極臭如敗醬或如藕泥至臨死不結者有之但得臭穢一去則邪毒從此而消脈證由此而退豈可孜孜於結糞而後行耶假如經枯血燥之人或老人血液衰少多生燥結或病後血氣未復者亦多燥結在經所謂不更衣十日無所苦也有何妨害乎以是知燥結不致損人而邪毒殞命也要知因邪致熱熱致燥結非因燥結而致邪熱也但病久失下則燥結因之壅閉瘀邪鬱熱益難得泄若結糞一行則氣通而邪熱乃泄此又前後不同也總之邪為本熱為標結糞又其標也能早去其邪安有燥結之患哉假令滯下本無結糞初起質實頻數窘急者宜芍藥湯加大黃下之此豈因結糞而然耶乃因逐邪而設也或曰得毋因積滯而設乎余曰非也邪氣客於下焦則氣血壅滯鬱而為積若因去積而治則去已成之積而未成之積將復生故宜用大黃逐去其邪是乃斷其生積之原而使營衛流通則不治其積而自愈矣更有虛痢又非此論求真按用芍藥湯加大黃不如用大柴胡湯或問脈證相同其有糞結者有不結者何也曰其人病至大便當即不行續得蘊熱益難得出蒸而為結也一者其人平素大便不實胃家雖熱甚但蒸作極臭狀如黏膠至死不結者應下之證也設引經論初頭硬後必溏者不可攻之句誠為千古之弊求真按只知仲景有初頭硬後必溏之論而不顧少陰病自利清水云云之句也按三承氣湯之功用因熱邪傳於裡也但上焦痞滿者宜小承氣湯中有堅結者加芒硝以軟堅潤燥病久失下者雖無燥糞然多黏膩結臭惡物得芒硝則大黃有蕩滌之能設無痞滿惟存有宿結瘀熱者調胃承氣湯宜之三承氣湯之功用俱在大黃余皆為治標之品不耐湯藥或嘔或畏者當為細末蜜丸可以湯下求真按由此說可知三承氣湯腹證之別矣應下諸證舌白苔漸變黃苔邪在膜原舌上有白苔邪在胃家舌上有黃苔如老沉香色白苔不可下黃苔宜下求真按白苔為小柴胡湯證黃苔為小柴胡湯加大黃或大柴胡湯證也舌黑苔求真按自是以下概屬大承氣湯證邪毒在胃薰騰於上而生黑苔有黃苔過老而變焦黑者有津液潤澤而作軟黑苔者有舌上乾燥而作硬黑苔者下後二三日黑皮自脫又有一種舌上俱黑而無苔者此為經氣非下證也妊娠多見之陰證亦有此苔者皆非下證也下後裡證去舌尚黑者苔皮未脫也不可再下務有下證方可下之舌上無苔且無下證而誤下之舌反見黧黧黑色者危急當補之舌芒刺熱傷津液也此為疫毒最重者急當下之老人瘟疫無下證因舌上乾燥易生苔刺宜用生脈散以生津潤燥則芒刺自失矣求真按用柴胡去半夏加瓜蔞再加地黃麥門冬或麥門冬湯加瓜蔞根則無生脈散之必要舌裂日久失下血液枯竭多有此證又熱結旁流日久不治在下則津液消亡在上則邪火毒熾亦有此證急下之裂自滿矣舌短舌硬舌卷皆邪勝真虧也急下之邪毒去真氣回舌自舒矣白砂苔舌上白苔乾硬如砂皮一名水晶苔乃因白苔時津液乾燥邪雖入胃不能變黃宜急下之唇燥裂唇焦色唇口皮起口臭鼻孔如煙煤胃家熱多有此證固當下唇口皮起者用別證可較鼻孔煤黑者疫毒在胃下之無辭口燥渴更有下證者宜下之下後邪去胃和渴自減矣若服花粉門冬知母冀其生津止渴謬之甚也若大汗脈長洪而渴者未可下也宜白虎湯汗更出身涼而渴止目赤咽乾氣如噴火小便赤黑涓滴作痛小便極臭揚手擲足脈沉數皆為內熱之極下之無辭潮熱譫語邪在胃有此證宜下然又有不可下者善太息胃家實則呼吸不利胸膈痞悶每欲引氣下行故然註泰山氏曰太息太者已甚也劉奎曰古人所謂長太息者即此之謂也乃嘆息聲長呼氣也因氣不舒暢每一呼氣始覺寬鬆茲解呼吸不利欲引氣下行者尚不甚真切也此說極是心下滿心下高起如塊心下痛腹脹滿腹痛按之愈痛心下脹痛以上皆胃家邪實內結所閉也宜下之氣通則已頭脹痛胃家實則氣不降下之頭痛立止若初起頭痛別無下證者本可下也小便閉大便不通則氣結不舒若大便行小便立解矣誤服行氣利水之藥無益大便閉轉屎氣極臭更有下證下之無辭有血液枯竭無表裡證者為虛燥宜蜜煎導及膽導大腸膠閉設其人平素大便不實若遇疫邪傳裡但蒸作極臭狀如黏膠至死不結但愈蒸愈黏愈黏愈閉以胃氣不能下行致疫毒無路可出不下即死但得黏膠一去下證自除而霍然愈矣協熱下利熱結旁流皆宜下之協熱下利者其人大便素不調邪氣忽乘於胃便作煩渴一如平時泄瀉稀糞而色不敗但焦黃耳此伏邪傳裡不能稽留於胃至午後潮熱便作泄瀉子後熱退泄瀉亦減次日潮熱不作則利亦止為病愈潮熱未除利不止者宜小承氣湯撤其餘邪而利自止矣熱結旁流者因胃家實內熱壅閉也先大便秘結續得下利純臭水全然無糞日三四度或十數度宜大承氣湯得結糞則利立止服湯不得結糞仍純臭水及下利所進之湯藥因大腸邪勝失其傳送之職知邪猶在也病必不減更宜下之四逆脈厥體厥皆屬氣閉陽氣內鬱不能四布於外胃家實也宜下之下後反見此證者為虛脫宜補之脈厥解在總論脈應及診脈法條下體厥陽證而脈陰身冷如冰為體厥發狂胃家實陽氣盛也宜下之方機本方主治曰發潮熱大便硬者腹滿難解者腹滿脹而喘兩便不通一身面目水腫者潮熱譫語大便硬或有燥屎者腹滿痛大便不通者大便不通煩而腹滿者目中不了了睛不和大便硬者自利清水心下痛口乾燥者胸滿口噤臥不著席腳攣急咬牙者腹中有堅塊大便不通者痘瘡腹大滿兩便不通或譫語口乾咽燥者食滯腹急痛大便不通或嘔利者痢疾譫語或腹滿痛而不能食者建殊錄曰一人患天行痢一醫療之度數頗減但下臭穢日一再行飲食無味身體羸瘦四肢無力至年月日益甚眾醫無效先生診之作大承氣湯數日痊愈一人年十三患天行痢裡急後重心腹刺痛噤口三日苦楚呻吟四肢撲席諸醫無效先生診之作大承氣湯使飲之少頃蒸振煩熱快利如傾即愈一婦人積病五年初病腹痛諸證雜出復無定證其族有某醫久治之未見效以為必死因謝退於是請先生作大承氣湯與之尚未服某醫復至聞先生方因謂其夫曰嗟乎殆欲其速死耶夫承氣之峻烈猶發火銃於腹內豈可服乎其夫以其久治無效不聽連服數劑坐廁後心腹頓安但胸中尚覺喘滿先生又為控涎丹與之未服而醫復至謂其夫曰承氣尚不勝況此方呼再三叮囑必勿服去後其夫復不聽夜輒服之翌晨吐下如傾胸腹愈安醫復至見其如此嘆服而去後數日痊愈初其夫患腹瀉恒非稀粥不能食以為醫治無益未曾服藥見先生之殊效始信醫藥乃嘆曰先生良醫也豈有不治之病乎遂求診治作半夏瀉心湯使飲數月腹瀉止而吃飯矣一女子患腹滿醫皆盡其術而無一效於是請先生診之使飲大承氣湯二月許腹全減如平人按之臍旁有塊尚未解故與前方不已家人以為無所病託故謝罷六月許大便漸燥結飲食頗減一日忽腹痛而嘔吐不止於是始服先生之明更求診治作大半夏湯飲之數日痛止不復吐乃復以大承氣湯下之但隔十日或五日一行之耳塊尚如故久之自陰中下臭穢下利日十餘行如是者三日許利止塊解頓如平日漫游雜記曰一人食章魚中毒累日不解經二旬易醫三人病勢益劇命在旦夕客舍主人代請余診按其腹滿腔如盛石自心下至小腹絞痛不可觸藥食皆吐而不留脈緊數唇舌焦黑余呼主人問曰斯人平日苦積塊否曰有余曰是滯食激發積痛也先下其滯食隨調其積痛則猶或可解也惟須經數日耳乃作大劑大承氣湯下之數十行腹脹悉除絞痛益劇當其心下有一巨塊如活動狀於是與附子粳米湯調之三月腹痛減半舌苔皆去日啖薄粥二盞與粳米湯一百日漸漸而愈夫船主之滯食不以瓜蒂散吐之者察其情形知不堪瓜蒂之毒也既下後不進以芩連者因腹氣竭乏之際若以苦寒攻之則痛將益劇也成績錄曰一婦人六十餘歲一年夏天食筍及鹽藏之松蕈後噁心或腹痛延至翌年夏請診於先生飲以大承氣湯小頃吐出前夏所食之筍蕈續服前方數十帖復常求真按使下劑變為吐劑古方真神妙矣古方便覽曰一商人年六十患熱病諸藥雜投日漸增劇十七八日耳聾目瞑不知人事唇焦舌黑譫言燥渴唯求冷水水入則嘔噦揚手舞足病勢危甚家人以為惟有待斃耳余按其腹有硬滿疼痛狀乃作大承氣三劑使飲之夜下燥屎五六枚翌日目明而耳得聞始知人事然口渴未止猶欲冷水餘不禁之至三日不欲復飲與前方服十餘劑諸證日減復診時心下痞硬腹中雷鳴更作半夏瀉心湯及三黃丸病痊愈一男子年四十餘熱病十八九日口不能食目不得視身體不動手足清冷諸醫謂為陰證與參附輩無寸效余診兩脈如蛛絲欲絕候其腹臍下有物磊砢乃與大承氣湯下燥屎五六枚諸證頓退一婦人患傷寒譫語狂笑下利清水日數十行諸醫不能療余診腹硬滿按之痛甚乃作此方連進三劑利即止諸證皆退一老人患偏頭痛其痛如刀刳不愈四十餘日諸醫不能療余診腹硬滿大便不通十四日舌上黃苔面目黧黑乃與此方五劑下利五六行諸證頓退六七日痊愈方伎雜志曰一男子因傷寒請治立而大言家人抱止使臥於床其證腹滿大渴舌上乾燥齒齦色黑而不錯語二便不利脈沉微因與大承氣湯三帖謂之曰下後當復診歸不久其兄弟來云刻前醫來診謂宜人參劑不宜大承氣恐日後有誤特來請教余曰此證用人參恐後世醫書亦無查考可不必過慮也其兄弟歸排眾議而用大承氣下臭穢黑便極多三日許精神頗爽但夜間驚恐不能安眠因用柴胡加龍骨牡蠣湯三十餘日而愈此證初病時仍勞碌異常不覺病苦後病漸增醫者因是用人參而不知反成大病一婦人因大疫乞治余與大青龍湯取汗熱勢不挫反而增劇妄言如狂人因用大承氣湯夜半大地震居宅漸圮家人驚愕以門板載病人而逃天漸曉始幸安眠翌日請診余往診之見無風寒又無別證因再與大承氣湯六七日精神漸復因問何故在他處家人語以地震事病人大驚調養半月許回家三十餘日痊愈一婦人因時疫發熱譫語舌黑乾縮人事不知余用大承氣湯八九日許不食即點滴米飲亦不進惟服藥耳余以其不因前證處方之故而不食必須用大承氣以攻毒病雖危當除邪毒為要以此曉其家人及親戚半月餘精神稍清始用米飲後胃納漸加與柴胡薑桂承湯四十餘日而愈其母謂病人云十七日間米飲一滴不進余心大憂今能痊愈可謂幸矣病人云余於十七八日間每日奔走各寺吃蕎麥麵更不知有饑餓云可謂奇證矣一婦人因大疫乞診時已深夜余速往診病者年三十許病已十日餘大熱大渴神昏譫語口舌乾燥而卷縮言語不分脈洪數目不明便閉已八九日云余與大承氣湯日下穢物七八行經四五日神氣稍復即云尻痛看護人以為褥瘡使側臥視之瘡瘍也余視之是鸛口疽已含膿矣蓋因瘀血留滯於長強旁將成腫瘍者被邪熱蒸灼發生釀膿也初起恐甚痛因人事不省不知其痛者亦不幸中之大幸也是時邪熱尚盛故猶與大承氣湯疽上貼左突膏破潰後疽口陷下五六分徑約一寸二三分於是攤破敵膏於綿片填塞瘡口蓋以中黃膏日換三次以取膿使服大黃牡丹皮湯與伯州散三十餘日疫與疽皆愈一人年五十餘患大疫惡熱譫語腹滿便閉口渴舌黑脈沉實余用大承氣湯下利日七八行熱漸解十餘日精神復常一日又發大熱譫語如前耳前發腫所謂發頤是也腫起寸許根腳二寸餘用小柴胡石膏湯三四日現赤色因貼破敵膏二三日後破潰而膿頗多瘡口深約四五分以乾綿絲塗破敵膏押入瘡口晝夜三次而耳中亦破潰膿汁淋瀝因膿出而熱氣去漸能食精神亦漸復三十餘日痊愈傷寒發頤者證不多見余所治者僅數人耳然皆痊愈此其一例也類聚方廣義本方條曰凡痼毒壅滯證其人腹中堅實或硬滿而大便難胸腹動悸或喜怒無常或不寐驚惕健忘怔忡或身體不仁或戰曳癱瘓筋攣骨痛或言語蹇澀緘默如偶人而飲啖倍常或數十月不食不饑等證變怪百出不可名狀或稱狂或稱癇或稱中氣中風或稱心脾虛弱者能審其脈狀腹證與以此方交服真武湯附子湯桂枝加苓朮附湯桂枝去芍藥加蜀漆龍骨牡蠣湯等更間服七寶丸十乾丸之類寬猛並進掎角以攻則可回罷癃於安全救橫夭於垂絕矣腳氣胸腹硬滿一身浮腫胸動如怒濤短氣而嘔二便閉澀者衝心之基也非此方不能折衝其迅劇之勢蕩滌結轖之毒腳氣證其人胸中跳動心下硬短氣腹滿便秘而脈數者假饒其狀似緩證決不可輕視必有不測之禍早用此方逐除鬱毒則不至大患執匕者不可忽諸痘瘡麻疹惡熱腹滿煩躁譫語黑苔燥裂不大便而渴或自利臭穢者死在須臾宜此方痿躄腹中有堅塊便秘口燥脈實有力者非此方不能治與附子湯真武湯等交替互用亦佳治痢疾大熱腹滿而痛如錐刺口舌乾燥或破裂大便日數十百行或便膿血者治狂證大言罵詈晝夜不眠飲啖過常胸腹滿而大便不通者治疝積留飲痛不可忍胸腹煩滿心下堅硬二便不利或時吐下黑物者急驚風心下堅腹滿口噤肢體強急脈數實者宜此方破傷風其暴劇者舉體強直直視不語胸腹硬滿二便不利死不旋踵矣以此方可僥幸一生若不能服者宜用紫圓平居便秘腹滿上逆者或冒酷暑奇寒或因鯨飲過度則眼目昏暗赤脈四起有忽然失瞻視者急宜與此方下之速愈病者飲食無味或食中食後頻吐白沫或嘈雜刺胸或因食物停觸而胸膈痛或食後噁心懊憹不安或得吐反快腹裡堅韌有癥塊者嗝噎之漸也若精氣未衰疾苦未深能嚴絕世事謹慎酒色專事靜養調攝治以此方柔和弦韌削平癥結灸五椎至十四五椎不怠則不至於大患硝石大圓大黃硝石湯亦可選用淺田宗伯曰尾臺良作屢稱治腳氣腫滿衝心莫若大承氣湯一方余壯年不能信從其說後治某商年約二十四五患腳氣兩腳麻痹有微腫服藥四五日腳病若失某商大喜飲食不節起居不時五六日忽腹滿如鼓二便不利氣急促迫兩腳腫滿按脈洪數余大驚以為衝心在瞬息之間欲與降氣利水之劑但此人因恣飲食而停滯致現胃實證恐不能見效宜先去其宿滯後施前策未為晚也急使服大承氣湯二帖小便稍利腹滿少減連服五六帖大便漸通諸證皆安十餘帖大患霍然而愈余始服良作之說又三位中將琉璃壺閱書云若見必死病宜用承氣毋使人知頗佳龐安常總病論若營衛不通耳聾囊縮不知人即用大承氣湯下之亦可保一生於五死從容救溺病人水漿不入湯液不下勿謂無可奈何也亦同此意凡大便不通證當大病羸弱時諸醫多不議下遷延幾乎至死此時決用承氣時非無得生於萬一者此時多用參附而用承氣者甚少也千金之溫脾湯傷寒六書之黃龍湯雖由擴充此方而成不如直用本方為宜此方本主傷寒之胃實但金匱用於宿食及下利產後便難等證即雜證亦可大活用之一老醫云痢疾用大承氣近來古方家頗多不知近來古方家因李中梓醫宗必讀之說妄用於痢疾多致誤人若非腹滿大實舌上有黑苔如毒熱痢之類則難用之是因誤解仲景氏用與少陰病之自利清水及吳又可用於熱結旁流之用意也又此方有用於小便閉者療治雜話曰小便閉證宋朝方書雖多用豬澤或扁蓄木通等之利水藥但小便閉而至於涓滴不通小腹硬滿而悶亂用種種利水藥不通因而大便秘堅者則宜用大承氣大便一通小便亦自通矣是屢經驗之事實也又云病後小便閉雖當別論但無病之人壯實之人小便急閉者無有更比大承氣之效速者因急閉多屬實證也此所謂欲得南風須開北牖欲導瀦水須開支河之理同也醫者豈可無此種應變之手段乎橘窗書影曰一婦人因痔疾不大便者月餘燥結不能通肛門如火且痛甚余用大承氣湯加黃芩乳香使服另以豬膽汁和醋灌肛門且塗腫處一晝夜下燥屎七八枚痔痛亦安後數年不發云求真按加黃芩乳香蛇足也山田業廣曰某人因其妻患疫看護盡力大勞心氣妻愈一夜三更後卒然起欲他往家人皆以深更止之如不聞弟頗怪竊往跡之見登神社箕踞大聲妄言弟大驚知已發狂強之歸翌日乞余診投以柴胡加龍蠣湯數日自若此人年三十餘壯實有力手擲二三間之坐席甚捷因而狐祟之說以起凡經十日許一親戚來再乞診熟察之雖晝夜數十發但未發時稍有正氣至發時則握手張足按之心下苦悶項背手足筋絡弩張甚強觸之則不堪而發聲觀其反張之勢類於痙病之發狂因投大承氣湯五帖尤多用芒硝大黃想必有五六行之下利而不知每日僅有二行耳但其筋絡從是漸舒發病次數亦日漸減少十餘日後頗有正氣重與前方一月餘病減七八心想芒硝大黃豈可久用乎但少減即不適不得已又增之約用承氣七八十日其間藥慣腸胃若行硬大便一次則全快至後不通快時不一定用承氣矣此人腸胃特別厚實余五十年間多用芒硝大黃者惟此一人耳古聖立方之妙實可驚嘆焉芒硝之醫治效用藥徵曰芒硝主軟堅也故能治心下痞堅心下石硬小腹急結結胸燥屎大便難而兼治宿食腹滿小腹腫痞等諸般難解之毒也歷觀上方芒硝主治堅塊明矣且有軟堅之功也故兼治宿食腹滿少腹腫痞等諸般難解之證此說雖是有堅塊無不可用然難為完說依余之經驗本藥與石膏並稱大寒藥且瀉下作用有力故能適用於裡證而陽實者其他悉當禁用也故前說宜改作芒硝主治裡之陽實證而有堅塊者其適應證之詳細及奏效之理可視下說本草備要曰朴硝芒硝辛能潤燥鹹能軟堅苦能下泄大寒能除熱朴硝酷澀性急芒硝經煉稍緩能蕩滌三焦之寒熱推陳致新昂按致新則瀉亦有補與大黃同蓋邪氣不除則正氣不能復也治陽強之病傷寒疫痢積聚結癖留血停痰黃疸淋閉瘰癧瘡腫目赤障翳通經墮胎生於鹵地刮取煎煉在底者為朴硝在上有芒者為芒硝有牙者為馬牙硝藥物學曰鹽類芒硝下劑之特色一便秘之際若欲急速排除腸內容為稀薄溶液須內服大量硫酸鈉即芒硝之以下之溶液其溶解水已充分故不奪他水從其作用亦不關於體內水分之多寡因多量之水樣內容亢進約一二小時間而水瀉然非常頑固之便閉有不能奏效者則宜植物性下劑二鹽類下劑之濃厚液有減卻體內水分之效間有使用於浮腫水血證等例如使內服硫酸鈉芒硝大量之之溶液則由濃厚液之刺激亢進腸分泌鹽因被稀釋而瀉下故組織顯著失水此際瀉下必須溶解水之供給而仰給於腸分泌故其奏效須延長時間普通內服後自十至二十小時而通利便狀殆與腸液之成分相等腸分泌之多少與血液及組織中之水分多少成比例故一二日間渴者其分泌不充分也則濃厚鹽不得呈瀉下作用三用量過少不瀉下此時漸被吸收由鹽類作用而利尿也久坐職業之人或平臥患者雖與鹽類下劑但腸運動不甚亢進故漸被吸收而不呈瀉下作用此時因利尿作用而體中之水分減少腸液之分泌亦減致便秘如舊四肝臟之疾患充血膽石證卡他性黃疸等用之有效者恐因門脈係之血行強盛且因鹽類作用亢進組織液之灌流影響其營養也五瀉下藥之鹽類下劑無刺激腸壁之性故對於熱性病者或他臟器有炎證者得頻頻使用之因對於此等證仍有消炎的作用也碳酸亞爾加裡碳酸鹽或含其含鹼類礦物之應用求真按下記諸條亦為本藥之適應證一對於尿酸結石反於此求真按茲不記指第二項也其奏效之理由不明同一種病內服亞爾加裡則使疝痛輕快且時見崩壞之石片排出是結合結石之黏液沉澱由於亞爾加裡性尿而被溶解故分裂尿石為小片遂由增量之尿而至於排出又對於已結晶之尿酸雖不能溶解但有防止其新生之效不容疑矣二對於膽石證亞爾加裡性礦泉有減輕發作及根治之效三因氣管卡他而分泌少量時又於子宮內膜炎等婦人生殖器病與食鹽為伍又於亞爾加裡性食鹽泉形而被使用又與利尿劑為伍能治心腎疾患之浮腫大黃甘草湯之注釋食已即吐者大黃甘草湯主之金匱要略註食後即嘔吐者以本方為主治也由下說可得詳解尚可參照太陽病篇甘草醫治效用條勿誤藥室方函口訣本方條曰此方所謂欲求南風先開北牖也導胃中壅閉於大便而止上逆之嘔吐也妊娠惡阻不大便者亦有效同理丹溪治小便不通用吐法開提肺氣使上竅通而下竅亦通雖與此方異法而理卻同其他一切之嘔吐屬於胃腸熱者皆可用之欲辨胃熱即大便秘結或食已即吐或手足心熱或目黃赤或上氣頭痛則可知為胃熱矣若以上衝證為目的而用之即無大誤雖虛證而大便久燥結者亦可用此方是權道也不必膠柱贊州御池平作以此方為丸而多用之即今之大甘丸也中川修亭以調胃承氣湯為丸能治吐水病皆同此意也大黃甘草湯方大黃克甘草克上細銼以水一合五勺煎五勺去滓頓服鷓鴣菜湯方前方中加鷓鴣菜一名海人草克煎法用法同前主治驅逐蛔蟲及胃腸之宿毒立方者不明先輩之論說聖濟總錄曰大黃甘草湯治水黃狀面目俱青狂言妄語聲不出者古今醫鑒曰老軍散求真按即以大黃甘草湯為散也治發背癰疽疔毒惡瘡一切無名腫毒焮熱初起未潰者張氏醫通曰大黃甘草湯治痘為痰悶不能發出者東洞翁大黃甘草湯定義曰治大便秘閉而急迫者方機大黃甘草湯主治曰大便不通急迫者食已即吐大便不通者芳翁醫談曰若食則不得不吐故自探吐得稍安或時腹痛或時下利者全屬反胃宜大黃甘草丸求真按即大黃甘草湯之丸方古方丸散方曰鷓鴣菜湯治有蟲而見吐下諸證者類聚方廣義大黃甘草湯條曰治胃反嗝噎心胸痛大便難者倍加鷓鴣菜名鷓鴣菜湯治蚘蟲心腹痛噁心唾沫者小兒蛔證及胎毒腹痛夜啼頭瘡疳眼鷓鴣菜之醫治效用本藥有驅蛔作用為世人皆知之事實不敢再贅但此外如下說有治腹痛排除黏液之作用不可忘之方伎雜志曰鷓鴣菜謂出自薩州亦有出自紀州者此物歷代本草不載閩書南山漳州府志始載下蛔妙又雖無蛔亦治腹痛不久善祛腸垢調胃承氣湯之注釋傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯以攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯傷寒論註本條前半已述於芍藥甘草湯條茲就後半說明之若胃氣不和譫語者少與調胃承氣湯三句宜接續於以復其陽句之下可解其意因誤用桂枝湯而生變證即四肢厥冷煩躁吐逆與甘草乾薑湯復於陽證後若生內熱胃氣不調和而譫語者謂可與少量之本方也發汗後惡寒者虛故也但熱者實也當和胃氣與調胃承氣湯傷寒論註和久田氏曰發汗後表證解而惡寒者因汗亡津液精氣虛而惡寒也若消息移時則不治而自愈矣求真按仲景曰發汗病不解反惡寒者虛故也芍藥甘草湯主之由此觀之則發汗後惡寒者必非消息移時而自愈也不惡寒但發熱者為胃內實熱之候也凡發熱惡寒者表證也往來寒熱者裡證也求真按裡字之上脫半表半三字今汗後有熱內實也求真按此由太陽病直轉入於陽明也然汗後津液外出而有此內實之候者因不可輕易攻也求真按不可輕易攻者不可輕易攻以大承氣湯也用此方以潤燥緩急通利大便調和胃中之氣即可愈矣若不愈真為內實證可與大承氣因含以後治法故曰與調胃承氣湯也太陽病未解陰陽俱停求真按停恐微字為是必先振慄汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯傷寒論註汪氏曰脈微二字當活看此非微弱之微乃邪滯脈道細伏之義也邪滯於經求真按經者表也則表氣不得條達故陽脈微也邪滯於府求真按胃腸之謂也則裡氣不能通暢故陰脈微也先汗出而解者仲景無方千金云宜桂枝湯傷寒類方曰脈經無停字疑是沉滯不起即下微字之義寸為陽尺為陰微字因上停字之意與微弱不同若係微弱則不當復行汗下故也求真按太陽病當未解時寸尺二脈俱微者必惡寒戰慄雖有汗出而解之機然惟寸脈微者由發表劑先汗出而後解也僅尺脈微者由下劑先瀉下而後汗出解也若欲由此下劑解者宜用調胃承氣湯也是以本條為辨汗下之不同吃緊之要語故不可不注意之傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之傷寒論註和久田氏曰譫語為有內熱之候凡內熱實者法以湯藥下之若以丸藥下之僅去水氣而熱氣不退也凡自下利者脈當有微厥狀今脈調和而下利知非自然之下利是以丸藥下之非其治法致胃氣不和也厥脈按之初來大漸漸小更來漸大是脈不調和也脈不厥而下利為脈證相反故知非自然之下利雖有此下利仍為內熱實也法當以湯藥下之然今在錯治後故宜瀉其實而兼調胃氣以調胃承氣湯主之若未下而譫語大便硬者為小承氣湯證也太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者可與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也傷寒論求真按以嘔恐以溏之誤參照下記山田氏說註和久田氏曰太陽病過經十餘日而致柴胡證之胸滿心下溫溫欲吐而胸中痛大便當硬者反溏腹微滿鬱鬱微煩者非病之自然也先此自服他藥因極吐下而氣逆未調和吐後藥氣未盡溫溫欲吐下後藥氣未盡而便溏且柴胡之滿當胸滿今腹滿微煩明為吐下後胃氣未調和可與調胃承氣湯也是以此證可知為調胃承氣之腹候矣不極吐下者非調胃承氣證因是此方可知名調胃之意矣但欲嘔前之溫溫也胸中痛微溏者非柴胡證以嘔故知極吐下也此文為注文誤入正文也山田正珍曰溫溫讀慍慍以嘔當作以溏應上文之反溏也過經者謂表解也言太陽病表證已罷十餘日心下慍慍欲吐胸中痛大便不溏者此為邪傳少陽小柴胡湯證也今其人大便當不溏而反溏鬱鬱微煩者知醫先於此時極吐下極吐下者必用瓜蒂巴豆之類因而傷動腸胃而致下利也然此下利是毒藥未解非虛寒之下利也又非太陽病外證未除而數下之遂致虛寒之下利故與調胃承氣湯以和其胃則愈若不爾者謂非因極吐下而有此證時雖有似於柴胡證虛寒之溏虛寒之腹滿虛寒之煩然非實熱也其脈當微弱代結不可與調胃承氣湯宜以理中四逆輩溫之若但欲嘔胸中痛大便微溏者似於柴胡證而非柴胡湯證以其大便溏故知極吐下也又知其非柴胡證矣求真按此二說雖不無少異其實一也宜相互參看以解仲景意陽明病不吐不下心煩者可與調胃承氣湯傷寒論註和久田氏曰不吐者用吐劑而不吐也不下者用下劑而不下也而心煩者不拘於前後求真按不拘於前後者不拘在前後兩者之意也與調胃承氣湯以和胃氣則可吐者自吐可下者自能下利而免急迫也此心煩由於急迫此方有甘草以緩急迫故能治之太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之傷寒論註錢潢曰蒸蒸發熱者猶釜甑蒸物熱氣蒸騰自內達外為氣蒸濕潤之狀非若翕翕發熱之在皮膚也程應旄曰此即大便已硬之徵故云屬胃也熱雖聚於胃而未見潮熱譫語等證主以調胃承氣湯者於下法之內而從中治求真按中治者從大小承氣中間之治法也以其日未深也和久田氏曰屬胃者及於內實也然發汗不解若未蒸蒸發熱至於潮熱者不可謂胃實之正證求真按胃實之正證大承氣湯證也故曰屬此亦因發汗後無餘證故以調胃承氣為主治而非誤治也求真按自發太陽病經過三日許用發表劑發汗病猶不解蒸蒸發熱者因自太陽病而轉屬於陽明即以本方為主治也傷寒吐後腹脹滿者與調胃承氣湯傷寒論註和久田氏曰吐後腹滿宜消反脹滿者知胃氣未和與此方也山田正珍曰傷寒行吐方後諸證皆去唯胃中不和其腹脹滿者藥毒遺害也宜調胃承氣湯解毒以和胃大便不通胃氣不和者宜調胃承氣湯傷寒論註大便不通胃氣不和皆由於病毒之急迫宜與本方除病毒緩急迫也調胃承氣湯方大黃克甘草芒硝各克煎法用法同大承氣湯調胃承氣湯之腹證腹不滿吐後如腹脹滿者例外也於臍中心之腹底及上下左右有凝結而覺抵抗且有壓痛者即本方之腹證也先輩之論說治驗活人書曰大抵發斑不可用表藥因表虛裡實者若發汗開泄則更增斑斕矣可下者與調胃承氣湯陽明證頭疼不惡寒反惡熱者胃實故也陽明氣實故攻頭也調胃承氣湯主之求真按此說不必信不可妄從傷寒緒論曰脈浮而大心下反硬有熱屬於藏者可攻之此因燥屎上逆而攻脾調胃承氣湯求真按心下反硬者非燥屎逆上攻脾是燥屎橫行充實於結腸之內壓迫於胃也衛生寶鑒曰調胃承氣湯治傷寒發狂煩躁面赤脈實者試效方曰調胃承氣湯治消中而渴飲食多者口齒類要曰調胃承氣湯治中熱大便不通咽喉腫痛或口舌生瘡者外科樞要曰破棺丹求真按即本方之丸劑也治瘡瘍熱極汗多大渴便秘譫語發狂者求真按本方治化膿性腦膜炎者事實也證治準繩曰破棺丹治療瘡之氣入腹而危者玉機微義曰調胃丸治齒痛出血不止以調胃承氣湯為末蜜丸服東洞翁本方定義曰治大黃甘草湯證而實者求真按治但急迫大便不通者方機本方主治曰因汗吐下譫語者發汗後熱而大便不通者服下劑下利不止心煩或譫語者吐下之後心下溫溫欲吐大便溏腹微滿鬱鬱微煩者吐後腹脹滿者漫游雜記曰一老人過經十餘日不解手足冷心下滿口不能食舌上焦黃晝間微煩頭汗出脈細沉無力余診之與調胃承氣湯得燥屎八九枚脈變洪遲乃與竹葉石膏湯數十日而解成績錄曰一男子腹脹腳下浮腫小便不利不大便十餘日舌上黑苔唇口乾燥心煩嘔吐飲食如故先生與調胃承氣湯穢物大下小便快利諸證悉去生生堂治驗曰一婦人年二十大便點滴不通者三年矣但飲食行動如常約費巴豆大黃芒硝等數斤皆不應先生按其腹雖甚硬但燥屎及塊物等無一應手者即與調胃承氣加蔥白湯便利遂不失節調胃承氣加蔥白湯調胃承氣湯內加大蔥白十個求真按中神氏以本方加蔥白恐用孟詵說蔥能利大小便也用方經權本方條曰按膏粱太過之徒其毒釀於腸胃失其升降之職潮熱寢汗微咳脈數大便或秘或下利狀如虛勞心氣迫塞悲笑無時胸動步難其腹微滿或裡急拘攣者凡食毒蓄釀胃府發為諸證或下流鬱結於腸中小腹微滿大便不快月事為之失調者若審證不誤施以此方則有萬全之效類聚方廣義本方條曰痘瘡麻疹癰疽疔毒內攻衝心大熱譫語煩躁悶亂舌上燥裂不大便或下利或大便綠色者宜此方牙齒疼痛齒齦腫痛齲齒枯折口臭等其人多平日大便秘閉而衝逆宜此方胃反膈噎胸腹痛或煩滿腹中有塊咽喉乾燥鬱熱便秘者消渴五心煩熱肌肉燥瘠腹凝閉二便不利者皆宜此方或為兼用方亦良膈噎證因其人少壯時腹裡生癥結與年俱長常為胃府之消化及血精灌溉之障礙積至老境此證始萌蓋年齡漸高則癥結愈痼血液因之以枯精神隨之而衰是必然之勢也加以勤勞酒色過度而後此證始成然初起能勤藥餌謝世務絕情欲以就治療庶幾或可一生若姑息為治放恣縱情病勢張皇精氣衰脫身體枯槁至於飲食一切難以下咽時則決不可救治矣岡田昌春曰溫知醫談所載頃得二老先生承氣湯之高論有一治驗一男子年二十三四一日患外感寒熱往來頭痛如破邪氣漸進自人參飲子及於導赤各半湯證友人大淵常范為之治療並托余代為主持一切因診其脈弦數無神狀如醉人譫語煩躁變為鄭聲仍用前方二三日自汗淋漓不止漸至捻衣摸床於是轉升陽散火湯七八日諸證自若虛候日至親戚亦知恐至不治因是寄信知照其父請其另請高明近日有來一醫之信並再請主持治療故又朝夕省診以盡微力病人身體虛羸更甚但稀粥少進大便不利小便快利一醫來診曰聞此患者初中末治療無間但稍有愚見冀得余同意故與余約時同診醫曰此證雖形體虛羸已甚腹候虛軟無力但一時權道計宜活用承氣湯一類如何余雖亦注意其不大便恐有掣肘今得此醫一言可以直用無疑蓋因身雖柴瘦但似一團邪火內燔若無背城一戰之策則燃眉之急難救於是決與調胃承氣湯半日後下結糞五六枚充滿便器虛羸雖加但熱漸減脈來有神諸候霍然承氣之效可謂偉矣其後相商酌用柴胡劑之類熱去虛回得奏全凱因憶張長沙雖諄諄致意於胃氣不可輕用攻下但其變化有少陰急下及太陰寒實之例至於至虛有盛候大實有羸狀之成規可求之於經方者人皆知之至於活潑之妙在乎人之自得也許學士循衣撮空之治驗孫兆治東華門之竇大郎羅謙甫療真定府之趙吉夫皆因用承氣而得偉效可謂能應用經方矣余每感嘆以前之治驗以老醫之一言合於古人之成規因附贅焉求真按由余之經驗腸傷寒見大小承氣湯證者甚少調胃承氣湯證反多也且不限此病凡高熱持久及諸瘡瘍內攻如化膿性腦膜炎是也等而現此證者頗多學者須熟記之不可失誤白虎湯之注釋傷寒脈浮滑此表有熱裡有寒白虎湯主之傷寒論註林億曰按前篇云熱結在裡表裡俱熱者白虎湯主之求真按為白虎加人參湯主之之誤又云其表不解者不可與白虎湯而此處云脈浮滑表有熱裡有寒者必表裡二字互差也又陽明一證云脈浮而遲表熱裡寒者四逆湯主之又少陰一證云裡寒外熱者通脈四逆湯主之因是表裡自差也明矣程應旄曰讀厥陰篇中脈滑而厥者裡有熱也白虎湯主之據此可知表裡二字為錯簡也山田正珍曰林億程應旄二說考證明備援引詳確宜拳拳服膺焉張璐纘論遵奉之可謂見善從善者矣表有寒者以時時惡風背微惡寒及厥冷等證而言裡有熱者以脈滑大發熱汗出身重而喘咽燥口苦等證而言蓋僅舉其略證耳尾臺氏曰傷寒脈浮滑云云林億程應旄等以此章為寒熱二字差置極是以下條傷寒脈滑而厥者裡有熱也可見綜以上諸說觀之則本條當改作傷寒脈浮滑此表有寒裡有熱白虎湯主之是即舉其病因與脈應而略其腹證外證也三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之傷寒論註醫宗金鑒曰三陽合病者太陽之頭痛發熱陽明之惡熱不眠少陽之耳聾寒熱等皆具也山田正珍曰此證雖以三陽命名但腹滿身重譫語者皆屬於陽明內實病故不發汗不和解唯用大寒以挫其壯熱也發汗則譫語之下似脫一甚字當補之若發汗則譫語甚者由於津液越出大便燥結也如是者當議大小承氣湯若下之則額上生汗手足逆冷或自汗出者大便未硬其裡未實而早下之故也如是者急宜通脈四逆湯以救之按病證曰不仁者是無寒熱痛癢及知覺之名也所謂口不仁者是口不能言語或口不覺寒熱痛癢或口不能辨五味皆謂之口不仁也豈唯不知味為然哉尾臺氏曰三陽合病之口不仁謂口舌乾燥不知五味也與附子湯之口中和背惡寒者相反謹按發汗以下十七字為後人之注文又按玉函無若字為是求真按山田氏說雖不無理概以尾臺氏說為是茲從而解之故本條宜改作三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿自汗出者白虎湯主之以意解之因腹部膨滿而生重感身體難以自由運動口唇及舌黏膜乾燥味覺脫失面部生垢譫語遺尿汗自出者稱為三陽合病即以本方為主治也然本方證之腹滿與大承氣湯之堅滿異只腹壁膨滿內部無充實之毒故按之無抵抗與壓痛是二證腹滿之別傷寒脈滑而厥者裡有熱也白虎湯主之傷寒論註傷寒有滑脈而四肢或全身厥冷者為裡有熱此所謂熱厥即以本方為主治也然此證與大承氣湯調胃承氣湯等之熱厥及四逆湯通脈四逆湯等之寒厥疑似不易鑒別故宜熟讀下說以分辨之是醫之所最易忽誤而病者生死所關也錢氏曰滑者為動數流利之像無沉細微澀之形故為陽脈即傷寒鬱熱之邪在裡阻絕陽氣不能暢達於四肢而厥所謂厥深熱亦深也醫宗金鑒曰傷寒脈微細身無熱小便清白而厥者是寒虛厥也當溫之脈乍緊身無熱胸滿煩而厥者是寒實厥也當吐之脈實大小便閉腹滿硬痛而厥者熱實厥也當下之今脈滑而厥滑為陽脈可知裡熱是熱厥也然內無腹滿痛不大便證此雖有熱而裡未實不可下而宜清故以白虎湯主之活人書曰熱厥者初中病時必於身熱頭痛之外有陽證至二三日乃至四五日方發厥其熱厥者厥至半日卻身熱蓋熱氣深方能發厥故須在二三日之後也若微厥即發熱者熱微故也其脈雖沉伏按之滑者為裡有熱也其人或飲水或揚手擲足煩躁不得眠大便秘小便赤外證多昏憒者知其為熱厥宜白虎湯又下證悉具有見四逆者是失下之後血氣不通時四肢即厥醫人不識卻疑陰厥復進熱藥則禍如反掌矣大抵熱厥須脈沉伏而滑頭上當有汗其手雖冷指爪復溫便須用承氣湯以下之不可拘忌也白虎湯方知母克石膏克甘草克粳米克上細銼以水二合煎一合去滓一日分三回冷服先輩之論說治驗錢氏曰若胃實痛者為有形之邪當以承氣湯下之此但外邪入裡為無形之熱邪故用寒涼清肅之白虎湯以解陽明胃府之邪熱和劑局方曰白虎湯治傷寒大汗出後表證已解心胸大煩渴欲飲水及吐或下後七八日邪毒不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者宜服之又治夏月中暑毒汗出惡寒身熱而渴醫學綱目曰孫兆治一人自汗兩足逆冷至膝下腹滿人事不省孫診六脈小弱而急問其所服藥取視之皆陰病藥也孫曰非受病重藥能重病耳遂用五苓散白虎湯十餘帖病少蘇再服痊愈或問治法孫曰病人傷暑始則陽微厥脈小無力醫謂陰病遂誤藥而病厥用五苓散利小便則腹減白虎解利邪熱則病愈矣凡陰病脛冷則臂亦冷今病脛冷而臂不冷則非下厥上行是以知其為陽微厥也集驗良方曰白虎湯治中暑口渴飲水身熱頭暈昏暈等證醫學入門曰白虎湯治一切時氣瘟疫雜病胃熱咳嗽發斑及小兒疱瘡癮疹伏熱等證痘證寶箋曰白虎湯痘已發未發或胃火偏盛面紅齒燥口臭唇乾煩渴齬齒咬牙夾斑夾疹獨用兼用均宜東洞翁曰白虎湯治大渴引飲煩躁者求真按此說不無參考之價值但不足為定義何則因不僅本方證有大渴引飲故也方機本方主治曰手足厥冷或惡寒而自汗出譫語者手足厥冷胸腹熱劇者大煩渴舌上乾燥欲飲水數升者無大熱心煩背微惡寒者暑病汗出惡寒身熱而渴者胸腹熱劇或渴如狂者本方內加黃連六分成績錄曰一丈夫患疫經二十餘日譫語不識人舌上有黑苔遺尿不大便午後煩熱悶亂絕食數日兩腳痿弱足生微腫先生診之與白虎湯兼用黃連解毒散不日痊愈以遺尿有微腫故不與承氣湯也方輿輗曰白虎湯治赤斑口渴煩躁發斑咽乾渴甚煩躁悶亂證宜用此方今時發斑熱劇者雖用白虎湯但余用此方之前恐有大青龍湯證而寒熱劇躁煩口渴者當用大青龍湯用之熱猶不解渴益甚煩躁者宜用白虎湯白虎湯治痘純紅臉赤眼赤口氣熱唇口腫痛煩躁悶亂循衣摸床小便赤大便秘身如火發斑譫語實熱等證並主口氣臭是治痘因熱毒甚不能起脹灌膿又雖起脹灌膿然因痘擦破而熱益甚大渴引飲煩躁者生生堂治驗曰某兒因中暑身灼熱煩渴四肢懈惰一醫與白虎湯二旬餘猶未效先生曰某氏治法非不當也然不愈者劑輕故也即倍前藥與之須臾發汗如流翌日索食不日痊愈求真按石膏不用大量則無效中神氏之言是也類聚方廣義本方條曰傷寒脈滑而厥者及無大熱口燥渴心煩背微惡寒等證世醫不用白虎遂使病者至於不起可勝嘆哉嗚呼仲景諄諄垂躋壽之法後人不能從而奉行之反逞私見捏造方劑弊及於今洵可慨嘆治麻疹大熱譫語煩渴引飲唇舌燥裂脈洪大者治牙齒疼痛口舌乾渴者治眼目熱痛如灼赤脈怒張或頭腦眉棱骨痛煩渴者俱加黃連良兼用應鐘散時以紫圓攻之治狂證眼中如火大聲妄語放歌高笑登屋逾垣狂走不已大渴引飲晝夜不眠者亦加黃連隔三五日用紫圓一錢至一錢五分取峻瀉數行又日用灌水法則必效若用下藥難者惟宜用灌水法耳傷寒論述義曰溫病者熱結在裡是表裡俱熱證也即為陽明病之一證其來也如太陽由少陽而毒氣暴進陷入於裡內灼外熏勢如燎原故脈浮滑洪大證則蒸蒸發熱自汗出心煩大渴舌上乾燥欲飲冷水然燥未搏結僅胃家焦燥耳因立白虎湯以清涼之設如太陽因誤汗吐下而乏津液者則加人參以滋養之若失治則胃中枯竭遂不可救其變證或為胃實敢斷為非陰證也求真按此說甚佳宜熟讀之麻疹一哈曰一小兒發熱三四日疹子咸出稠密乾燥紫黑色舌焦唇裂煩渴引飲頗悶不得眠譫語如見鬼狀人事不省按其腹狀如毀手脅腹微滿大便難小溲不利因與白虎湯盡十帖諸證漸安疹子收身熱猶未退胸腹滿悶大便不通五六日兩目黯然晝不見物更作大柴胡湯服之兼用芎黃散時以紫圓攻之每服下利數行約五十日許始復原求真按此證初起即宜大柴胡加石膏湯勿誤藥室方函口訣本方條曰此方治邪熱散漫於肌肉之間發為大熱大渴脈洪大或滑數者成無己云此方為辛涼解散清肅肌表之劑今邪散漫於肌表之間欲成汗而不能發者用辛涼之劑清肅肌肉之分使成發勢而出汗譬如以手絞糟袋之汁同理是故白虎與承氣以表裡之劑同陽明之位故云表裡俱熱或云三陽合病用於胃實近表之方也石膏之醫治效用藥徵曰石膏主治煩渴也兼治譫語煩躁身熱歷觀上方石膏主治煩渴也明矣凡病煩躁者身熱者譫語者及發狂者齒痛者頭痛者咽痛者其有煩渴之證也得石膏而其效核焉此說雖無錯誤然非石膏證亦不無煩渴者故難為定義由余之經驗有本藥證者必口苦乾燥尿色赤濁為應用之主目的以煩渴及其他為副目的再宜參考下說而用之本草綱目曰石膏氣味辛微寒無毒別錄曰甘大寒主治中風寒熱心下逆氣驚喘口乾舌焦不能息腹中堅痛本經除時氣頭痛身熱三焦大熱皮膚熱腸胃中結氣解肌發汗止消渴煩逆腹脹暴氣喘咽痛別錄治傷寒頭痛如裂壯熱皮膚如火燥甄權治天行熱狂頭風旋下乳揩齒益齒大明求真按此頭旋即眩暈也腦充血所使然除胃熱肺熱散邪熱緩脾益氣李杲止陽明經頭痛發熱惡寒日晡潮熱大渴引飲中暑潮熱牙痛元素求真按陽明病以不惡寒為原則今云惡寒似乎矛盾其實不然是因非純陽明為三陽合病故也本草備要曰石膏甘辛而淡體重而降為足陽明胃經大寒藥色白入肺兼入三焦寒能清熱下火辛能發汗解肌甘能緩脾益氣生津止渴治傷寒鬱結無汗陽明頭痛發熱惡寒日晡潮熱肌肉壯熱小便赤濁大渴引飲自汗口乾能發汗又能止自汗舌焦苔厚無津牙痛又胃主肌肉肺主皮毛為發斑發疹之要品色赤如錦紋者為斑隱隱見紅點者為疹但用之尠少則難見功方伎雜志曰石膏宜中國產日本產亦潔白椎搗成細末用之石見產者多佳品如中國產不潔白碎後如有方解石物者不可用石膏一物人皆懼用不知其治煩熱及清解大熱滋潤枯燥鎮壓上逆等其效決非他藥所可及朱震亨曰藥之命名有種種或以色以形以氣以質以味以能以時膏字之義可深思焉岡田昌春氏曰蕉窗醫談云石膏若不用大劑則無效何則石膏之性不強也故白虎湯竹葉石膏湯等用石膏特多余平生多用大量他醫與小量之石膏劑故無效此語最可玩味藥徵開卷首列石膏述其效用宜參考之案白虎湯以石膏為君其質雖鎮重其性能善走外解肌熱內涼胃熱表裡煩熱頓然清楚大青龍湯因陽熱之氣鬱不得開越以扶麻黃桂枝之發力而逞外發之功效竹葉石膏湯為平未靖之餘寇與麥門冬奏其津潤之勛其他越婢湯厚朴麻黃湯朮防己湯等其運用不一配以粳米小麥等亦微妙詳審後人有不可思議者又劉跂錢乙傳云宗室子病嘔泄醫用溫藥而加嘔乙曰病本中熱奈何以剛藥燥之將不得前後溲矣宜與石膏湯宗室與醫者皆不信後二日果來召乙曰仍石膏湯證也竟如言而愈石膏其質重其用多主清熱配合適宜有消暑截瘧治嘔止瀉驅飲疏水解毒等效不可端倪東洞多用石膏當時有石粉之謗與彼陳石膏之評居雖異域其旨相同若有所偏必有專長取舍之權存乎其人耳知母之醫治效用續藥徵曰知母主治煩熱也本草綱目曰知母根氣味苦寒無毒主治消渴熱中除邪氣肢體浮腫下水補不足益氣本經療傷寒久瘧之煩熱脅下邪氣膈中惡及風汗內疸多服令人泄別錄心煩躁悶骨熱勞往來產後蓐勞腎氣勞憎寒虛煩甄權熱勞傳尸疰痛通小腸消痰潤心肺安心止驚悸大明涼心去熱治陽明火熱瀉膀胱腎經火熱厥頭痛下痢腰痛喉中腥臭元素安胎止子煩時珍發明權曰知母治諸熱勞患人虛而口乾者加用之杲曰知母其用有四瀉無根之腎火療有汗之骨蒸止虛勞之熱滋化源之陰本草備要曰知母辛苦寒滑上清肺金而瀉火下潤腎燥而滋陰消痰定驚止渴安胎無非清火之用治傷寒煩熱蓐勞骨蒸燥渴虛煩久瘧下痢治嗽者清肺火也治渴者清胃火也退骨蒸者瀉腎火也利二便消浮腫然苦寒傷胃滑腸多服令人瀉由以上諸說觀之則本藥可謂為一種之解熱藥若用量不誤則適於陽虛證粳米之醫治效用本草備要曰粳米甘涼得天地中和之氣和胃補中色白入肺除煩清熱煮汁止渴仲景之白虎湯桃花湯竹葉石膏湯皆以之清熱補不足粳乃稻之總名有早中晚三收晚得金氣多性涼尤能清熱北粳涼南粳溫白粳涼紅粳溫新米食之則動氣陳廩米衝淡可以養胃煮汁煎藥亦取其調腸胃利小便去溫熱除煩渴之功本藥澱粉豐富故有滋養強壯緩和包攝作用也明矣由上說觀之則於此等作用之外可謂更有清涼止渴作用焉白虎加人參湯之注釋服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之傷寒論註醫宗金鑒曰大煩渴脈洪大者是邪已入於陽明津液為大汗所傷也錢氏曰此因大汗出後遂至胃中之津液耗竭陽邪乘虛入裡大煩渴而不解也上篇之大汗出脈浮而數微熱消渴者及發汗後脈浮數煩渴之證皆因誤汗亡陽下焦無火膀胱之氣化不行失其蒸騰之用氣液不得上升而渴也求真按膀胱之氣化云云為以下小便不利而渴也然脈浮其邪仍在太陽故以五苓散主之今大煩渴而脈見洪大則邪不在太陽已傳入於陽明即陽明篇所謂陽明脈大是也故以白虎湯解煩熱加人參以補其大汗之虛救其津液之枯竭也求真按太陽病當有桂枝湯證時服此湯大汗後脈浮數而煩渴表裡二證兼有者則以五苓散為主治然脈洪大而煩渴甚若表證已解轉入陽明者則以本方為主治也傷寒病若吐下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之傷寒論註汪氏曰時時惡風者乃熱極汗出多不能收攝腠理疏故時時惡風也裡熱則胃府中燥熱故大渴舌上乾燥而煩欲飲水數升也此因吐下之後胃氣虛而內亡津液故燥渴甚極也周氏曰口至乾舌至燥無津液也極矣能生津液神速者莫若人參故加之醫宗金鑒曰傷寒二字之下當有若汗二字蓋用發汗較吐下則更多傷津液也山田正珍曰金鑒之說是也當補若發汗三字如前之第十六條云求真按指傷寒論原書而言已發汗若吐若下第二十三條云更發汗更下更吐第五十八條云若發汗若吐若下皆有發字也按此條為陽明病之淺證未至胃實者所謂陽明病汗出多而渴是也本當在陽明篇中以下二章及百八十五條亦然熱結在裡表裡俱熱者是因時時惡風以下之證也此因傷寒表邪熾盛而發汗若吐若下不解入裡而結然未至胃實故其熱熏蒸表裡使人且熱且渴也其致時時惡風者亦因未結實故也蓋此條之時時惡風與次條之背微惡寒皆因內熱熏蒸汗出肌疏所致故曰時時及不顯然於全身而微於背也非因於表不解之惡風寒也可知矣求真按由以上諸說觀之則本條當作傷寒若發汗若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之注釋宜從山田氏說傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之傷寒論註醫宗金鑒曰傷寒身無大熱不煩不渴口中和背惡寒者附子湯主之屬少陰病也今傷寒身無大熱則知熱漸去表而入裡口燥渴心煩則知熱已入於陽明矣背微惡寒一證雖有似於少陰但少陰證口中和今口燥渴是口中不和也背惡寒非陽虛之惡寒乃陽明內熱熏蒸於背汗出肌疏故微惡之也主以白虎湯直走陽明大清其熱加人參者蓋有顧於肌疏也傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之傷寒論註方有執曰無表證者謂惡寒頭身疼痛皆已除也醫宗金鑒曰其表不解者雖有燥渴乃大青龍湯證故不可與白虎湯也又曰加人參者大解熱中速生其津液故也求真按本條前半段如金鑒所說為大青龍與白虎湯二證之鑒別後半段為白虎加人參湯證非也因千金方千金翼外臺等作白虎湯主之如渴欲飲水無表證者此即白虎湯所主治無特加人參湯之理也陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上苔者梔子豉湯主之若渴欲飲水口舌乾燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之傷寒論註詳太陽病篇豬苓湯及第少陽病篇梔子豉湯條太陽中熱者暍是也汗出惡寒身熱而渴白虎加人參湯主之金匱要略註人若觸冒太陽之光熱而患病時謂之暍病其狀汗出惡寒身熱而渴者則以本方為主治也本條是述日射病之證治也由以上之仲景論本方之用途雖無不明然與白虎湯之區別尚難判然故宜參照東洞翁以本方為治白虎湯證而心下痞硬者之定義學者能深究此說與師論則本方可運用矣白虎加人參湯方知母克石膏克甘草克粳米克人參克煎法用法同前先輩之論說治驗活人辨疑曰化斑湯求真按即本方也治赤斑口燥渴中暍者徐同知方曰人參白虎湯求真按是即本方也治伏暑發渴嘔吐身熱脈虛自汗保赤全書曰人參白虎湯求真按此即本方也治暑盛煩渴痘出不快又解麻痘斑疱等熱毒漫游雜記曰一男子患氣疾兩脈洪數心下痞堅大便燥結寐寤不安語言失理稱王稱帝余以三聖散吐之二回後與參連白虎湯三十餘日痊愈求真按參連白虎湯者本方加黃連也方輿輗曰白虎加人參湯此方之正證為汗大出有微惡寒身熱大渴引飲也余按凡宜與白虎湯證脈當洪長但在暍卻多虛微狀是暍與傷寒所不同也由是觀之素問云脈虛身熱者得於傷暑甲乙經云熱傷氣而不傷形所以脈虛也金匱云弦細芤遲芤即虛豁也弦細遲即熱傷氣之應也由諸古訓可徵病暑之脈矣病因備考有言曰消渴未經年月者雖五十以上間有得治者白虎加人參湯主之世醫多以此病為難治畏石膏故也求真按雖如此說石膏劑善治糖尿病但未必以本方為主治也一男子年六十餘其鼻不聞香臭者四年來請治余曰病已積年藥無益也翁曰某自少壯即易氣逆幸逆氣得治足矣余乃漫然作白虎加參連與之六十餘日忽聞香臭而後平求真按鼻疾患多石膏劑證宜注意之生生堂治驗曰帥廬先生年七旬病消渴引飲無度小便白濁周殫百治頹敝日加舉家以為不愈病者亦囑辦後事矣先生診之脈浮滑舌燥裂心下硬曰可治乃與白虎加人參湯百餘帖痊愈類聚方廣義本方條曰治霍亂吐瀉後大熱煩躁大渴引飲心下痞硬脈洪大者治消渴脈洪數晝夜引飲不歇心下痞硬夜間肢體煩熱更甚肌肉日漸消鑠者治瘧病大熱如烙譫語煩躁汗出淋漓心下痞硬渴飲無度者白虎加桂枝湯之注釋溫瘧者其脈如平身無寒但熱骨節煩疼時嘔白虎加桂枝湯主之金匱要略註溫瘧者金匱云師曰陰氣孤絕陽氣獨發求真按無惡寒獨發熱也則熱而少氣煩冤手足熱而欲吐名曰癉瘧如無惡寒之前驅證而為熱獨發之麻拉利亞也其脈如平者其脈如平常而實不平常也故不難推察其脈為浮滑或浮洪也余雖不必解但治骨節疼煩及時嘔可知為主之石膏及桂枝之作用矣白虎加桂枝湯方知母克石膏克甘草克粳米克桂枝克煎法用法同前先輩之論說治驗東洞翁本方定義曰治白虎湯證而上衝者求真按此說雖無不可然不如作治白虎湯證而有桂枝證者較為完善耳方機本方主治曰瘧疾身熱骨節疼煩渴欲飲水者險證百問曰一婦人之瘧乾嘔不能食使強食之則必吐發時身體疼痛寒少熱多嘔吐益甚試多與冷水則嘔吐稍止於是作白虎加桂枝湯熱服之忽振寒發熱大汗出而愈求真按據此治驗觀之則仲景論之時嘔是發作時之嘔也類聚方廣義本方條曰霍亂吐瀉後身體灼熱頭疼身痛大渴煩躁脈洪大者宜此方勿誤藥室方函口訣本方條曰此方治溫瘧溫同溫病之溫謂不惡寒而熱也此病骨節煩疼為目的因邪散漫於肌肉之間至於骨節而發為煩疼故用辛涼解散之劑加桂枝峻其達表之力他病有上衝頭痛等劇證亦有效東洋用於此類之中風與白虎加黃連云橘皮大黃芒硝湯之注釋鱠食之在心胸間不化吐復不出速下除之久為癥病治之方金匱要略橘皮克大黃朴硝求真按朴硝與芒硝大同小異各克上細銼以水一合煎五勺去滓納芒硝溶之頓服註鱠同膾切細之魚肉也在心胸間不化者是鱠食停滯心胸間不消化也尾臺氏云按曰鱠食在心胸間不化可謂妄矣食物在胃腸不化者有之豈能留在心胸間而成癥病者耶若所患確在心胸間時當以瓜蒂吐之如上所說此條頗不合理恐為胃腸間之誤久成癥病者是謂若不驅除鱠食久放置之則沉著其他之飲食物殘渣及分解產物等而成假性腫瘤也此證所以用本方者恐因主藥橘皮有解毒作用魚毒乎先輩之論說東洞翁本方定義曰治心胸間有宿滯而結者求真按結凝結也類聚方廣義本方條曰治飲食傷吐下後心胸尚不爽快或噯氣吞酸者又治痰飲家心下或臍邊有塊平素每飲食作痛或吐食吐飲吐酸嘈雜大便難者合桂枝枳實生薑湯亦佳勿誤藥室方函口訣本方條曰此方為解魚毒之主劑橘皮解魚毒後世方書雖未著但今以橘皮一味燒黑用於骨骾時求真按骨骾者謂魚骨刺入咽喉或食道也即有效是本古方之治鱠食在胸中也有持桂里曰此不僅解鱠毒諸獸魚肉之毒亦可治之茵陳蒿湯之注釋陽明病發熱汗出者此為熱越不能發黃也但頭汗出而身無汗劑頸而還小便不利渴引水漿者此為瘀熱在裡身必發黃茵陳蒿湯主之傷寒論註山田正珍曰陽明病發熱汗出而渴者白虎加人參湯證也若發熱汗多不渴者此為有燥屎大承氣湯證也二證俱不能發黃因其熱已發揚也越者猶言發也劑者猶限也尾臺氏曰劑與齊通齊者限也劑頸而還者謂頸以下無汗也玉函茵陳蒿湯條亦作齊頸列子湯問篇曰際畔不知所齊限以是可知其義矣瘀者以淤從病淤者淤泥也說文曰淤澱滓濁泥也錢潢曰瘀留蓄壅滯也蓋飲食之澱濁留滯於內壅閼作熱更與邪氣搏結鬱燠熏灼而作渴若無汗小便不利則沸鬱蒸騰必致發黃猶麴蘖入庫則發黃也但熱屬瘀熱故雖引水漿與五苓白虎專欲冷水者其證情自有不同也求真按因陽明病發熱汗出時由汗失水分致體內枯燥故不至於發黃疸若發熱僅頭部出汗頸以下無之又尿量減少渴而欲飲其他之飲料者腹內存積食水熱三毒則必發為黃疸以本方為主治也傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之傷寒論註前條是說本方證之原因本條示其外證腹證也即本方證之黃疸其色澤恰如成熟之橘子色鮮黃而有金色之光澤與他證之黃疸不同必尿量減少腹部膨滿然不如大承氣湯證之大實滿而有微滿耳穀疸之病寒熱不食食即頭眩心胸不安久久發黃為穀疸茵陳蒿湯主之金匱要略註穀疸金匱云趺陽脈緊而數數則為熱熱則消穀緊則為寒食即為滿尺脈浮為傷腎趺陽脈緊為傷脾風寒相搏食穀即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃為穀疸如上說即因食水熱三毒而發黃疸也寒熱不食者雖為惡寒發熱食機減少但此寒熱與表證異因裡有濕熱則同時不食也又食即頭眩者食物衝動濕熱使然亦因心胸不安也茵陳蒿湯方茵陳蒿克梔子大黃各克上細銼以水三合煎一合去滓一日分三回冷服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也先輩之論說治驗錢氏曰茵陳性雖微寒能治濕熱黃疸及傷寒滯熱通身發黃小便不利梔子苦寒瀉三焦之火除胃熱時疾之黃病通小便解消渴心煩懊憹鬱熱結氣更入血分大黃苦寒下泄逐邪逆通腸胃三者能蠲濕熱去鬱滯故為陽明發黃之主劑瘟疫論曰按茵陳為治疸退黃之專藥今以病證較之黃因小便不利故用山梔而除小腸屈曲之火瘀熱既除小便自利當以發黃為標小便不利為本及論小便不利病原不在膀胱乃係胃家移熱又當以小便不利為標以胃實為本是以大黃為專效山梔次之茵陳又其次也設去大黃服山梔茵陳是忘本而治標耳無效也或用茵陳五苓非惟不能退黃小便亦難利焉求真按吳氏雖排斥茵陳五苓散是其用法之拙非此方之誤也古方有三承氣證故當加茵陳山梔於三承氣而隨證施治方為盡善求真按茵陳山梔子不獨可加於三承氣湯中即大小柴胡湯中亦可加用東洞翁本方定義曰治一身發黃心煩大便難小便不利者方機本方主治曰治發黃色小便不利渴欲飲水者發黃色小便不利腹微滿者寒熱不食頭眩心胸不安者方輿輗曰按於茵陳蒿湯云腹微滿於大黃硝石湯不云微而單曰腹滿因是可分二湯之劇易矣續建殊錄曰一男子胸中煩悶反覆顛倒溫溫不能食腹微滿小便不利一身微發黃色與以茵陳蒿湯兩便快利諸證頓愈求真按因在發病初期故只呈微黃色也古方便覽曰一男子年三十餘冬月旅行逗留海邊恣吃魚肉又感寒氣歸家未幾面目身體浮腫發黃如橘子色小便亦如柏汁心胸苦煩腹滿不能飲食余乃與此方時以紫圓下之十二三日痊愈生生堂治驗曰一男子年三十心中懊憹水藥入口輒吐經日益甚先生診之眼黃心下滿按之痛乳下扇動紊亂不定求真按是謂心悸亢進也曰此瘀熱在裡也不日當發黃乃以食鹽三匕使白湯吞之大吐冷水更與茵陳蒿湯身果發黃而圊黑糞使乃服前方十五日而復常生生堂醫談曰一婦人每次經候十七八日不止時已三年醫藥無效請余診脈細數身色青白起則作喘小便漏巨里如奔馬幾瀕於死余作茵陳蒿湯與之其夫業藥稍知藥能問曰荊妻之病固由血證非發黃證也然不與利血調血之劑卻用茵陳蒿湯豈無虛虛之弊乎願聞其故余曰犀角地黃芎歸膠艾之屬前醫已用方證雖對實未的當也豈有服對證方藥三年而不愈乎今余所用之方非一朝一夕所能見效縱令解語恐不能悟總之鬱熱若除血證自治矣其人竟信伏服五十日許諸證退而復常求真按泥守常規不知變通之徒當看此驗案勿誤藥室方函口訣本方條曰此方為治發黃之聖劑庸醫每於黃疸初發雖用茵陳五苓散非也宜先用此方取下後與茵陳五苓散茵陳治發黃為專長因有解濕熱利尿之效也故蘭室秘藏之拈痛湯醫學綱目之犀角湯亦用此藥惟不拘於發黃耳與梔子大黃為伍者有利水之效也方後云尿如皂角汁狀者此也後世加味逍遙散龍膽瀉肝湯等之梔子皆主清熱利水也但此方用於發黃者宜以陽明部位之腹滿及小便不利為主而用之若心下有鬱結者反以大柴胡加茵陳為佳求真按若心下有鬱結者用大柴胡加茵陳梔子湯或大柴胡湯與枳實梔子豉大黃湯合用亦可茵陳蒿之醫治效用本草綱目曰茵陳蒿莖葉氣味苦平微寒無毒主治風濕寒熱邪氣熱結黃疸本經治通身發黃小便不利除頭熱去伏瘕別錄通關節去濕熱傷寒用之藏器石茵陳治天行時疾熱狂頭痛頭旋風眼疼瘴瘧女人癥瘕並閃損乏絕大明本草備要曰茵陳苦燥熱寒勝熱發汗利水以泄太陰陽明之濕熱為治脾黃疸之君藥又治傷寒時疾狂熱瘴瘧頭痛頭旋女人之瘕疝皆濕熱為病由以上諸說觀之則本藥為消炎性利尿藥有治黃疸之特能大黃硝石湯之注釋黃疸腹滿小便不利而赤自汗出此為表和裡實當下之宜大黃硝石湯金匱要略註自汗出若似於表證則臟當無他病今有腹滿證加以小便不利而赤為病不在表而在裡之明徵故曰表和裡實當下之大黃硝石湯方大黃黃柏硝石各克梔子克上細銼以水二合煎一合去滓納硝石溶之一日分三回冷服脈經本方稱大黃黃柏梔子芒硝湯用芒硝不用硝石我日本先輩亦然故余隨之亦用芒硝先輩之論說治驗東洞翁本方定義曰治發黃小便不利腹中有塊者方機本方主治曰發黃色而腹滿小便不利者身熱心煩大便不通者方輿輗本方條曰此裡實證其腹滿大而堅小便不利亦添赤字是明其裡熱甚也況已經久恐大黃硝石湯亦難取效此方是蕩滌瘀熱之劑而治疸者無比此方更劇也此本治黃疸之藥余假治血淋脈數者常加甘草或去芒硝按崔氏用大黃芒硝二味療尿血見外臺意旨相似凡熱淋暴淋雖見血亦可用此方得效靜儉堂治驗曰一男子患黃疸更數醫累月不見效發黃益甚周身如橘子色無光澤帶黯黑眼黃如金色小便短少色如黃柏汁呼吸迫促起居不安求治於余以指按胸肋上黃氣不散此為疸證之極重者仍用茵陳蒿湯合大黃硝石湯作大劑日服三四帖三十日許黃色始散小便清利而痊愈凡察疸證之輕重以指重按病者之胸肋骨間放指後黃散跡白而忽復黃者輕證也易治按重黃不少散者重證也當與大黃硝石湯合茵陳蒿湯飯菜用蜆炒類聚方廣義本方條曰治嘈雜胸中煎熬腹滿有塊二便不利或口中覺苦辛酸鹹等味者此證後必成膈噎早用此方可防之梔子厚朴湯之注釋傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之傷寒論註山田正珍曰此虛煩兼腹滿者故去梔子豉湯內之香豉加厚朴枳實以主之心煩即虛煩臥起不安者即不得眠也其致腹滿者下後內虛氣澀不通也與厚朴生薑半夏甘草人參湯同為虛脹是以雖滿不堅實也此其所以不用大黃芒硝也求真按山田氏說甚佳但臥起不安因腹滿而臥起皆不安非不得眠也梔子厚朴湯方梔子克厚朴枳實各克上細銼以水二合五勺煎一合去滓一日分三回溫或冷服先輩之論說治驗東洞翁本方定義曰治胸腹煩滿者類聚方廣義本方條曰下後心煩腹滿臥起不安者庸醫以為病未盡猶用三承氣湯等致誤治者長沙氏所以有此等方法也措治之間宜注意心煩當作虛煩腹滿亦非實滿也某氏曰一男子患黃疸數月東京淺田氏療之不效其證腹硬滿呼吸迫促遍身黃黑色若臥則難起晝夜臥起不止余以梔子厚朴湯加朮兼硝黃丸互用之不日胸腹煩悶即減益投前方病勢益減三十餘日病減半更與前方不止百餘日痊愈感謝不已厚朴生薑半夏甘草人參湯之注釋發汗後腹脹滿者厚朴生薑半夏甘草人參湯主之傷寒論註發汗後腹部虛滿者以本方為主治也類聚方廣義本方條曰治霍亂吐瀉後腹猶滿痛有嘔氣者腹滿非實滿也如上說雖吐瀉後腹虛滿有嘔氣者亦主治之故東洞翁本方定義曰治胸腹滿而嘔者厚朴生薑半夏甘草人參湯方厚朴生薑各克半夏克人參克甘草克上細銼以水三合煎一合去滓一日分三回溫或冷服先輩之論說張氏醫通曰厚朴生薑半夏甘草人參湯治胃虛嘔逆痞滿不食喻氏曰移此求真按此者指師論發汗後腹脹滿也治泄後腹脹果有驗類聚方廣義辨本方條曰治血氣外行腹有留飲不能消化者曰發汗後者示血氣外行也腹脹滿者為有留飲不消化證也用方經驗本方主治曰平生敦阜證或噫氣或吞酸心下不堅滿而膨脹者桃核承氣湯之注釋太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯傷寒論註山田正珍曰下者愈三字脈經作下之則愈四字宜從而改之否則下文尚未可攻一句無所照應少腹之少玉函及程應旄本作小是也蓋臍上曰大腹臍下曰小腹素問藏氣法時論有明文可徵又考釋名云自臍以下曰水腹今本作小腹非也格致鏡原引釋名作水腹為水溝之所聚也又曰少腹之少當作小因比臍以上為小也由是觀之小訛為少由來久矣又劉元素傷寒直格云臍上為腹下為小腹小腹兩旁謂之少腹亦可為徵熱結膀胱者謂邪氣鬱結於下焦膀胱之部分下文所謂小腹急結者即其外候非直指膀胱一府言之也如抵當湯證其人發狂者以熱在下焦小腹當硬滿下血乃愈可以相徵謂太陽病數日不解小腹急結即硬滿其人如狂自下血者此為邪氣結於下焦膀胱之地位也結乃鬱之甚者邪氣鬱在頭中則致頭痛項痛衄血等證鬱於胸中則致胸悶心煩嘔吐等證結於胃中則大便不通穢氣上乘於心使人如狂也今邪結於下焦血氣不行停而為瘀以此瘀氣上乘於心使人如狂然其血若自下小腹不急結者無需服藥而能自愈因血下則邪熱隨血而解也如太陽病脈浮緊發熱身無汗自衄者愈及婦人傷寒經水適來譫語如見鬼狀者毋犯胃氣及上二焦必自愈者皆是也今此證其血雖自下然急結不散故非下之則不愈猶少陰篇飲食入口則吐心下溫溫欲吐復不能吐者非吐之則不愈自利清水色純青心下必痛口乾燥者非下之則不愈也故曰下之則愈然其人外證不解猶有惡寒頭痛脈浮等候者不可妄下之當先與桂枝湯以解外外解已但熱結膀胱之證不去者乃始可攻之若外未解而下之則必變為壞病如結胸痞硬挾熱痢等證是也按此條上文言熱結膀胱不言小腹急結下文言小腹急結不言熱結膀胱本論錯綜之妙如是求真按此說解本條雖近於詳悉無遺憾然以急結為硬滿非也不可從之桃核承氣湯方桃仁克桂枝芒硝甘草各克大黃克上細銼以水二合五勺煎一合去滓一日分三回溫或冷服桃核承氣湯之腹證仲景曰熱結膀胱又稱少腹急結然由余多年之經驗此急結存於膀胱部位者較少而常位於下行結腸部即以此部分沿其橫徑向腹底以指頭擦過的強按壓而觸知堅結物病者訴急痛者當以之為少腹有急結此雖即為急結之正證然不僅有大小廣狹長短之不同且時上迫左季肋下及心下部使上半身亦有病又下降於左腸骨窩及膀胱部不無使下半身病者故診時必須用意周到也和久田氏曰由左臍旁天樞邊求真按天樞者假定臍廣一寸更在其外端側方一寸之部位也上下二三指間以三指探按得有結者由此邪按求真按邪按者謂沿其橫徑而按也痛甚上引者為桃核承氣湯之腹證也或臍上臍下亦有結按之痛但得於左臍旁者為正候而及於臍之上下者可知其結之甚也但按之雖得結不覺痛者非急結也又按之雖痛甚然其結處指頭覺軟者雖為血結非此方證也又按之痛引腰背少腹者亦非此證求真按此未必然不可信之也且其結有大小不能一定不可草率診過此結因瘀血而逆上於胸腹甚者迫於脅下求真按迫於左脅下之略自胸脅徹背而痛發作有時不問男女均稱肝積攻左肝經此證多因血氣上衝而急迫求真按當為瘀血上衝性情急暴不堪或眼白多其人如狂觸事易怒或擲器物泄散其怒之類常使心腹間急或有頭痛頭重衄血齦血等患或毒及下部有痔疾脫肛婦人經水不利之患或劇時胸脅逆滿攣急而痛甚有噤口斷齒卒倒者或有攻於心胸胸背徹痛時時吐苦酸水者此證似於水氣上衝左脅下轉下降於左臍旁治之以熱酒或牡蠣末辛蠃末等雖即能見效然經時再發有似留飲但留飲止於心下此證留於左臍旁以分辨之動氣自左服此方有應效者動氣復於任脈之行求真按有本方證者腹部大動脈之搏動偏倚於左側腹部然服本方有效者是復於正位也是引病也其他傷寒瘟疫痢疾及一切雜證胎前產後落馬墜損等證有用此方者亦須審其腹證耳此說概佳宜精究之先輩之論說治驗古今錄驗方曰往來寒熱胸脅逆滿者桃仁承氣湯主之求真按此即本方也求真按非往來寒熱胸脅苦滿也是小腹急結逆滿於胸脅左側而使往來寒熱也故有似於柴胡湯證而實非也總病論曰桃仁承氣湯又治產後惡露不下喘脹欲死服之十有十效求真按此恐是肺栓塞三因方陰㿗門曰黃金丸求真按此即本方之丸方治熱入膀胱兼及臍腹上下脅肋疼痛便燥欲飲水按之而痛者婦人血閉疼痛亦宜服之傷寒六書曰傷寒按之當心下脹滿不痛者宜瀉心湯加桔梗是痞滿也求真按加桔梗蛇足也以手按之小腹苦痛小便自利大便兼黑或身黃譫妄燥渴脈沉實者為蓄血以桃仁承氣湯盡下黑物則愈小青囊曰桃仁承氣治傷寒呃逆舌強短者又治瘧發於夜者又治藏毒下瘀血又治痘後失血證乃餘毒熱邪迫經血妄行自大便出又治痘後狐惑證其人好睡不欲食上唇有瘡蟲食其府下唇有瘡蟲食其藏求真按上唇有瘡以下後世醫之妄語也不可取其聲啞嗄上下不定故名狐惑此候最惡麻疹後猶多如大便不通則以此下之識病捷法曰桃仁承氣湯治噎膈有積血者求真按瘀血性癌腫猶未衰脫者則用本方佳醫史攖寧生傳曰一婦人體肥氣盛因無子服暖子宮藥積久火甚迫血上行而為衄每衄必數升面赤脈躁疾神恍如痴醫者猶以為上盛下虛治以丹劑鎮墜之滑壽曰經云上者下之今血氣俱盛溢而上行法當下導奈何可實實耶即與桃仁承氣湯下積瘀三四次繼服既濟湯二十劑而愈證治準繩攖寧生卮言曰血溢血泄諸蓄妄證求真按血溢者血自上部出也血泄者自下部出也諸蓄妄者謂諸蓄血妄行也其始也余率以桃仁大黃行血去瘀之劑折其銳氣而後區別治之往往獲中然猶不得其故後來四明遇故人蘇伊舉共論諸家之術伊舉曰吾鄉有善醫者治失血蓄妄每必先以快藥下之或問失血而復下之則虛何以當乎答曰血既妄行迷失故道若去蓄而不利瘀則以妄為常何以禦之且去者自去生者自生何虛之有乎余聞之愕然曰名言也昔日之疑今始釋然求真按快藥者即指本方也諸證辨疑曰一婦長夏患痢疾痛而急迫其所下者皆黃黑色諸醫以薷苓湯倍用枳殼黃連其患愈劇因請余治診脈兩尺脈緊而澀知寒傷榮也細問之婦答曰行經時飲冷水一碗遂得此證今方覺悟血被冷水所凝瘀血歸於大腸熱氣所以墜下也求真按說此病理不足取遂用桃仁承氣湯內加馬鞭草玄胡索求真按加味蛇足也一服後次早下黑血數升許痛止臟清次用調脾活血之劑其患遂痊今後治痢不可不察焉求真按本方有效於大腸炎者雖如治驗然以想象為治本者非也傳心尤易方曰桃仁承氣湯治淋血心法附錄曰吐血胸中覺氣塞上吐紫血者桃仁承氣湯下之名醫方考曰桃仁承氣湯痢疾初起質實者此方主之若初起失下反用固澀之藥以致邪熱內蓄血不得行腹痛欲死者急以此湯攻之證治大還曰吐血勢不可遏胸中氣塞上吐紫黑血者此因瘀血內熱盛也桃仁承氣湯加減下之求真按加減者加減方中之大黃芒硝乎打撲內損有瘀血者必用之方也張氏醫通曰齲蛀數年不愈當作陽明蓄血治以桃仁承氣為細末煉蜜丸如梧桐子大服之好飲者此方屢服有效虛人雖有瘀血其脈亦芤必有一部帶弦宜兼補以去其血以桃仁承氣加人參五錢分三服緩緩攻之則可十救其二三求真按由余之經驗此虛證當以小柴胡湯與桃仁承氣湯合用之柯氏方論曰桃仁承氣湯與女子月事不調先期作痛經閉不行者最佳種痘新書曰桃仁承氣湯治因痘大便秘結者瘟疫論曰大小便蓄血便血者不論傷寒時疫盡因失下邪熱久羈無由以泄血為熱搏留於經絡敗為紫血溢於腸胃腐為黑血便色如漆大便反易求真按宜參考抵當湯條雖為結糞得瘀求真按瘀為瘀血之略潤下結糞雖行真元已敗多至危殆其有喜笑如狂者此為胃熱波及血分也血屬心血中留火易蔓延心家也其有是證者仍從胃治求真按從胃治者選用大小調胃承氣湯也求真按此述所謂熱溶血證初期之證治也選用大小調胃承氣湯雖如吳氏說然本方之原方為調胃承氣湯而轉為驅瘀血劑者故知亦有應用於此證之機會胃實失下至夜發熱者熱留血分也若更失下必致瘀血求真按至夜發熱者多因瘀血概屬本方證也初則晝夜發熱日晡益甚既投承氣晝日熱減至夜獨發熱者瘀血未行也宜桃仁承氣湯服湯後熱除則愈或熱時前後縮短再服再短求真按熱時前後者發熱時為前解熱時為後也縮短者遲發熱早解熱也蓄血盡熱亦盡矣大熱已去亡血過多餘焰尚存者宜犀角地黃湯調之求真按用犀角地黃湯不如用桂枝茯苓丸至夜發熱亦有癉瘧者求真按癉瘧溫瘧也有熱入血室者均非蓄血證皆不可下也宜審之東洞翁本方定義曰治血證小腹急結而上衝者求真按本方原方為桂枝甘草湯所以有上衝也方機本方主治曰小腹急結如狂者胞衣不下氣急息迫者產後小腹堅痛惡露不盡或不大便而煩躁或譫語者痢疾小腹急痛者芳翁醫談曰齒痛難堪有宜桃仁承氣湯者成績錄曰一男子年六十五喘息咳唾不得安臥已數十年近時身熱或休或作數日不愈遂吐痰血一日齒縫出血連綿不止其色黑如敗絮以手引之或一二尺或三四尺劇時鼻耳悉出血大便亦下黑血如是三日夜絕穀好飲有精神如無病然平日所患之喘息頓止得以平臥而不能轉側乃與桃仁承氣湯不日而愈求真按此以瘀血外發喘息自愈也可知其多因瘀血矣一男子惡寒身熱汗出後卒發腹痛臍旁殊甚自小腹至脅下拘急二便不通食即吐舌上白苔劇則痛至胸中如刀割頭汗流出先生與以桃仁承氣湯諸證痊愈一婦人常患鬱冒心中煩悸但欲寐飲食或進或否一日卒然如眠人事不知脈微細呼吸如絕血色不變手足微冷齒閉不開經二時許神氣稍復呻吟煩悶言苦於有物在胸中胸腹動氣甚脅下攣急與桃仁承氣湯一晝夜服十二帖下利數行諸證漸退後與茯苓建中湯而全治一婦人每好飲酒一日大醉忽然妄語如狂人後卒倒直視四肢不動吸吸少氣人事不識手足溫脈滑疾不大便已十餘日額上微汗面部赤自胸中至少腹硬滿不能食與桃仁承氣湯服五六日瞳子少動手足得以屈伸至七八日大便通而呻吟十餘日諸證漸退一人患疫迎先生治診之脈微細身熱煩躁時時譫語口燥而渴大便秘閉乃與桃仁承氣湯後大下血家人驚愕告先生先生恬然置之益使服前方不日痊愈求真按是看破其將起熱溶血證以先制其機也一婦人患疫身熱如灼口舌糜爛渴好熱飲一日妄語如狂自胸下至小腹硬痛不可近手十餘日不大便先生投以桃仁承氣湯黑便通快諸證悉去一男子年十五頭痛發熱翌日發譫語其狀如狂醫診曰此癇也與藥數日病益甚先生診之脈洪數舌上黑苔身熱如灼胸腹有急迫狀而無成形者與以黃連解毒湯翌夜病勢益甚再請先生診之眼中帶赤色不能語言飲食殆絕熱勞鬱伏脈益洪數頭汗出手足不動乃與桃仁承氣湯至明日盡五帖遺尿一次臭不可近放屁五六次言語尚不通目閉不開捩視之滿眼皆赤頭面手足微冷汗不復出唇稍焦黑而神氣不全昏呼之則應心胸下硬按之則蹙額手足擗地經二時許復診之心胸下有痛狀仍進前方至明日大便一行四肢微冷人事不知先生曰勿怖所謂瞑眩耳益進前方數日而愈求真按對此險證始終主持一方而自若非凡庸所能得也可以想見南涯翁之手腕矣一婦人年四十許病疫經三日舌苔已黑獨語絕穀醫與三消飲下利十餘行病婦不知其下劑驚愕更醫醫與人參養榮湯服一日下利即止而自汗出煩渴引飲病狀似更危篤因又迎醫與柴胡白虎合方諸證稍瘥食亦少進病婦少安以為漸愈矣未幾險證復發殆不可救又更醫醫診曰大虛也與真武加人參湯下利黑血六七行餘證自若凡更醫十餘無微效後請先生診之腹微滿舌尖赤稍腫大便滑而渴乃與桃仁承氣湯服數帖下燥屎如漆者數枚經三日諸證大瘥但心下痞硬不欲飲食因與人參湯數日復常一女子年九歲有寒疾求治於先生門人某診之發熱汗出而渴先與五苓散服湯後渴稍減然熱汗尚如故其舌或黃或黑大便燥結胸中煩悶更與調胃承氣湯服後下利數行而益煩加食即吐熱益熾將難救療先生曰調胃承氣湯非其治也此桃仁承氣湯證也服而痊愈求真按本方為調胃承氣湯加桃仁桂枝而主治有如是之不同此古方之所以精妙不可不精究也續建殊錄曰一男子其項生瘍醫針治之明日如寒疾狀發熱熾盛或有惡寒瘡根凸起自項至缺盆悉見紫朱色且譫語大便不通病狀危篤一醫以為瘟疫療之無效乃請先生先生曰非疫也瘡毒上攻也與葛根加桔梗湯兼用梅肉散得湯稍瘥後再診之轉與桃仁承氣湯兼以梅肉散峻下五六行熱乃退蓋此人譫語煩悶眼中碧色為血證之候也求真按由此人初於項部有瘡瘍後昏冒不識人事眼中碧色觀之其為瘡毒內攻性腦靜脈竇炎也明矣然本方能易治之以是可知古方之絕妙也某男年十七毒發腦戶十餘日後針之膿出腫減寢食稍復如平日然瘡口不閉膿水如湧一日大戰慄身熱殊甚腫復凸起延及顏頰瘡頭結口膿滴不出譫語煩躁大便秘澀眾醫以為傷寒治之無效因迎先生請治其父問曰兒病眾醫皆以為傷寒先生以為然否曰否此瘡毒所致非傷寒也乃與葛根加桔梗湯及應鐘散下利三四行諸證頓減爾後困頓如眠脈細數熱不去飲食大減於是與梅肉散大便快利熱去腫減半日許漸昏冒人事不識唇燥舌乾狂言妄語坐為演戲之狀乃以桃仁承氣湯攻之下利臭積稍覺人事三日後下黑血飲食漸進神氣爽然服二月餘轉當歸芍藥散數日痊愈一婦人小產後胞衣不下忽上攻喘鳴促迫正氣昏冒人事不知自汗如湧眾醫以為必死因迎先生診之心下石硬而小腹濡求真按是急結迫於心下也眼中如注藍乃與桃仁承氣湯須臾胞衣忽下至明日爽快如常求真按流產後胎盤不剝離忽然喘鳴促迫正氣昏冒人事不知眼中如注藍由是觀之此即腦及肺栓塞也一童子年八歲大吐食後發熱微汗出明日無熱譫語咬牙煩躁尤甚嘔不能食四肢擗席胸脅煩脹按之無腹力兩便不通與桃仁承氣湯服後神氣復常諸證悉退方輿輗曰桃仁承氣湯治惡露澀滯臍腹大痛胎死腹中胞衣不出血暈等證亦佳產後惡露澀滯臍腹大痛手不可近者服桃仁承氣湯二三帖即愈此證脈多洪數雖聞有細數者當舍脈從證又死胎及胞衣不下血暈等證亦可通用此方證本論曰血下曰小腹急結若比抵當湯證其血猶未沉痼也茲舉余所屢驗之一治驗於下經血欲來腹痛不可忍甚至失心妄語者以桃仁承氣攻之二三帖痛失如神此證經年不瘥久患成宿疾者皆由輕劑微湯無效故也宜每月經期時用桃仁承氣二三帖或四五帖得以定痛即停服至下月經期之間緩服逐瘀丸散之類至期時復服桃仁承氣湯過期後復服緩攻之藥如前如是回環四五月則數年之滯患亦得痊愈求真按本方治月經困難證有神效雖如有持氏說然本方宜長服至證盡為止不可間歇痢疾腹痛甚裡急後重亦劇而下紫黑色者瘀血也李挺曰諸痢皆知為瘀血要惟黑色為瘀甚耳此證非桃仁承氣湯則不能立功吳氏醫方考云治初起質實者然可不拘日數但認其質實不問初中末且所下如紫黑或如魚腦者知因瘀血也即可用此湯求真按本方有效於赤痢及大腸炎等雖如有持氏說然用本方者宜以腹證為主不可以排泄物為主也但以之為參考則極佳痘毒深劇酷烈庸工不能療者此湯有回生之效是時當用藥數帖峻攻之不然則無效余初年用涼膈散然不能及自中年用此方救之屢奏神驗古方便覽曰一婦人陰門腫痛如剜上衝頭痛日夜號泣不愈數日後余診之腹硬滿少腹急結用此方三劑夜痛益劇及天曉忽出膿血病頓愈求真按服本方痛反增劇者是即瞑眩也一婦人經水不通已三月矣小腹硬滿結痛如刺叫號動鄰余與此方五十餘劑痊愈一男子小腹堅結而上下痛氣上逆不欲食三月許不愈與此方五十餘劑而瘳青州醫談曰一男子入井中上井時井石自上下落其人頗有力立即以手承石幸未受傷然出井後忽精神昏憒而失人事四肢痿弱請南涯翁治之投以桃核承氣數帖神氣恢復云蓋此人雖未受損傷然初受石時因有意努力損其經絡又因其變動血阻經絡故致四肢痿弱桃核承氣證有血迫經絡者本條云熱結膀胱其人如狂血自下者愈青州治譚曰婦人久患頭痛諸藥不效者與桃仁承氣湯兼用桃仁散有效火患頭瘡藥無效者與桃仁承氣兼用桃花散頗有應效者外貼桃仁油亦可生生堂醫談曰一婦人初吐瀉如傾盆狀似霍亂全身冰冷厥逆脈絕半日許煩躁棄衣不食大渴飲水則吐四五日許依然不死請余治見前醫所與之附子理中湯尚剩一二帖於爐邊診其腹臍下如石硬余曰是血證也理中湯不可與之作桃仁承氣湯下臭穢物頗多三日內厥回諸證退而痊愈經二年又發如前余又與桃仁承氣湯而愈此等證若不審證的確則必殺人可不慎乎今之醫家大概若見四肢厥逆者則用四逆湯身大寒反不欲近衣者則用白虎湯其次者附子理中或真武湯當歸四逆之類見有水逆者不出五苓散之類若不愈則用參附獨參之類此皆現今醫家之通弊也求真按此證雖似寒厥實為瘀血的熱厥也分別處不可不精究焉一婦人三十餘歲全身肉脹而腳最巨大四體不仁苦於起居已有年矣請余治余乃放痧每日取血自二三合至四五合約三十日許血幾八九升且與桃仁承氣湯而痊愈求真按由此治驗可知知覺麻痹之多因於瘀血者一人走來叩門謂先生曰急事請速來因倉皇不告其故而去先生至則堂上下男女狂躁而有一婦人斃於旁先生怪問之曰有一惡少年屢來求乞不饜我今罵之惡少怒將打我拙荊驚遮之渠扼其喉立斃惡少駭走事急矣先生來速幸甚乞救之先生命旁人汲冷水盈盤枕之灌水於頸項半時許刺之即蘇再使安臥又以巾浸水敷頸覺溫即換不使瘀血凝結與桃仁承氣加五靈脂湯而去明日復往視之婦人大喜且謝曰余幸蒙神救得以不死今咽喉已無恙唯胸肋體灣覺微疼耳飲食亦已如常矣師復以巾灌冷水蔽脅肋如初經三日而愈求真按能得方意而活用之則其效出於意外者如此不可不深思之方伎雜志曰一婦人請診家人云妊娠已六月初月初下瘀血眾治無效經三十月許而產恐因溫熱故致子胎糜爛以逆產惟頭不出身體出耳其後雖用種種方法而首總不出究因何故請先生診之身體無血色而柴瘦唇舌乾燥脈微弱按撫腹部其頭游移旋轉恰如西瓜之浮於水中余謂病家曰宜強出之因按撫其腹部或不至於發血暈故宜以藥下之一夜服桃核承氣湯三帖翌朝快利頭忽出病者及病家感謝不已余視此證亦屬初次此古方之妙誠不可思議矣余自十三歲至七十餘歲信仰古方由此故也一婦乞診余至其家呻吟之聲徹於四鄰姑氏云自三月經水阻滯時時腹痛至八月請醫服藥則瘀血下後又發腹痛數日不止漸增劇藥更無效故辭醫治因乞先生療之余診其腹拘滿攣急及於胸脅小腹滿苦痛甚困憊極惟食少許糜粥因為藥之瞑眩與桃核承氣湯兼用當歸建中湯日服兩方三帖果腹痛倍前下利日三四行三日許其痛截然而止病家悅甚然腹滿攣急依然仍用前劑三十日許腹中漸軟飲食大增因寒中故覺腰腹冷兩腳麻痹是以去當歸建中湯而兼用當歸四逆加吳茱萸生薑湯病漸去歲末梳浴尚未自然因使更服前方三十日翌年春正母子相攜來診腹部已軟胎兒隆然母子大喜而歸類聚方廣義本方條曰治痢疾身熱腹中拘急口乾唇燥舌色殷紅便膿血者治血行不利上衝心悸小腹拘急四肢麻痹或痼冷者淋家小腹急結痛連腰腿莖中疼痛小便涓滴不通者利水劑不能治若用此方則二便快利苦痛立除小便癃閉小腹急結而痛者或打撲疼痛不能轉側二便閉澀者亦良會陰打撲速宜驅逐瘀滯若不洗滌血熱則瘀血凝滯焮熱腫脹必致小便不通也若尿道焮閉至於陰莖腫痛亦甚不能用導尿管徒見其死耳故若遇此證不問二便之利不利早用此方以驅瘀滯解熱閉即不至於凝腫溺閉是為最上乘之法且打處即以鈹針輕輕亂刺放血為佳勿誤藥室方函口訣本方條曰此方治傷寒蓄血小腹急結外亦可運用於諸血證譬如吐血衄血不止不用此方則無效又走馬疳齦疽出血不止者非此方不能治癰疽及痘瘡紫黑色欲內陷者以此方快下之則能向外揮發也又婦人陰門腫痛或血淋有效若產後惡露下少腹痛者與胞衣不下經日者宜此湯加清酒徐徐與之又用於打撲經閉等之瘀血腰痛以瘀血為目的者必晝輕而夜重痛風等晝輕夜痛者由於血也又數年齒痛不止者此方為丸服有驗其他加荊芥治痙病及發狂求真按加荊芥蛇足也加附子治血瀝腰痛及月信痛求真按必不可加附子其效難以枚舉桃仁之醫治效用本草綱目曰桃核仁氣味苦甘平無毒主治瘀血血閉癥瘕邪氣殺小蟲本經止咳逆上氣消心下堅硬去卒暴擊血通月水止心腹痛別錄治血結血閉血燥通潤大便破蓄血元素殺三蟲孟詵主血滯風痹骨蒸肝瘧之寒熱鬼疰疼痛產後血病時珍發明杲曰桃仁苦以泄滯血甘以生新血故破滯血用之其效有四治熱入血室一也泄腹中滯血二也除皮膚血熱燥癢三也行皮膚凝聚之血四也本草備要曰桃仁苦比甘重苦以泄血滯甘以緩肝氣而生新血通大腸血秘治熱入血室血燥血痞損傷積血血痢經閉咳逆上氣血和則氣降皮膚血熱燥癢蓄血發熱如狂血虛者禁用續藥徵曰桃仁主治瘀血少腹滿痛故兼治腸癰及婦人經水不利據此諸方則桃仁主治瘀血急結少腹滿痛也明矣凡毒結少腹則小便不利或如淋其如是者後必有膿自下也或瀉血或婦人經水不利者此又因臍下久瘀血所致也據以上諸說觀之則本藥為消炎性驅瘀血的解凝藥兼有鎮咳鎮痛緩下殺蟲殺菌作用矣桂枝茯苓丸之注釋婦人宿有癥病經斷未及三月而得漏下不止胎動在臍上者為癥痼害妊娠六月動著前三月經水利時胎也下血者後斷之月衃也所以血不止者其癥不去故也當下其癥桂枝茯苓丸主之金匱要略註原文癥痼害妊娠下有六月動者前三月經利時胎也下血者後斷三月衃也二十一字程林云當有缺文意義全不通故去之宿者從前也癥及癥痼者如已述血寒之謂也全文之義謂婦人由從前臍下部有血塞偶當妊娠未滿三月時子宮出血不止且臍下有胎動者本論在臍上恐為臍下之誤何也因未滿三月之妊娠子宮未嘗有達於臍上之理故也因血塞障害妊娠也若子宮出血不止而亦不去者當以本方下其血塞也則其治出血與妊娠障害之意在言外矣桂枝茯苓丸方桂枝茯苓牡丹皮桃仁芍藥各克上為細末以蜂蜜及米糊為丸一日三回分服但現今普通將上用量之二或三倍以水二合五勺煎一合去滓一日分三回溫或冷服桂枝茯苓丸加大黃湯方前方中加大黃克以上煎法用法同前主治治前方證之可下者桂枝茯芩丸之腹證因本方中有芍藥當然有腹直肌攣急之症然其攣急與由水穀二毒之攣急異是由於血毒之故所以僅有左腹直肌攣急耳而右側全不攣急也假令有之亦必比左側弱度為常又有桃仁牡丹皮故得徵知有癥即血塞在臍直下部然不如大黃牡丹皮湯之小腹腫痞及抵當湯之小腹硬滿等之高度而呈比較的軟弱凝塊按之微痛為止又以有桂枝茯苓則可能有如苓桂朮甘湯證之上衝眩暈心下悸等證然與彼必伴水毒沿右腹直肌上衝而致胃內停水者異必憑左腹直肌上衝且無胃內停水也故病者若訴上衝心悸心下悸等證橫經其左腹直肌而按之認為攣急疼痛且在臍下部觸知軟弱凝塊亦診得壓痛者不問男女老少以之為本方之腹證先輩之論說治驗婦人良方曰奪命丹求真按此即本方也治婦人小產下血過多子死腹中其人憎寒手指唇口爪甲青白面色黃黑或胎上搶心則悶絕欲死冷汗自出喘滿不食或食毒物或誤服草藥傷動胎氣下血不止若胎尚未損服之可安已死服之可下此方係異人傳授至妙也方後又曰胎糜爛於腹中至甚危者立可取出濟陰綱目曰催生湯求真按此即本方之煎劑也候產婦腹痛見胞漿已下水煎熱服又奪命丸求真按此亦本方也治胞衣不下並治胎死東洞翁本方定義曰治經水有變或胎動拘攣上衝心下悸者求真按本方當治男女有瘀血而腹拘攣上衝心下悸者為定義方機本方主治曰漏下不止胎動在臍上者婦人衝逆頭眩或心下悸或肉筋惕者經水不利面部或足腫者病有血證之變手足煩熱小便不利者續建殊錄曰一婦人身體羸瘦腹中攣急經水少而不絕上逆目眩飲食如故大便秘結唇口乾燥乃與桂枝茯苓湯兼用蟅蟲丸經日諸證愈方輿輗本方條曰金匱此條似有衍文脫簡姑從斷章取義言經斷定為妊娠未及三個月而血下胎動夫血下胎動恐將小產然其胎動宜在臍下今在臍上是因素有癥害累及於胎也以桂枝茯苓丸制其癥則血反止而胎得安矣雖為妊娠若有病則不可不攻癥者為舊血積聚之稱痼者凝固也此方於產前則催生在生後則治惡露停滯心腹疼痛或發熱憎寒者又出死胎下胞衣及胎前產後諸雜證功效不可具述求真按本方不僅產前產後有偉效苟見腹證則不論男女老少不問如何病證未嘗無效也經水不通即通亦少或前或後或一月兩至兩月一至等蓄泄失常者用之皆有效每加大黃水煎可也如積結久成癥者非此方所主也青州醫談曰留飲有蓄血者若非此腹候則難得有心痛等證者以甘草乾薑湯加牡丹桃仁或桂枝茯苓丸之類為宜求真按余屢以本方合用大小柴胡湯治此證效甚速生生堂治驗曰醫人藤本氏之妻始患瘟疫餘邪未除者有日矣神氣憂鬱懶於動作飲食不進好居暗處來見先生曰余閱金匱千金諸方苟有相似之方無不行之然無寸效煩先生賜診為幸診之脈細有力小腹急結求真按急結二字不妥曰邪已除矣今所患者唯血室有殘熱耳醫治苟有錯誤恐將變為骨蒸夫骨蒸瘵疾者余雖往往見之然真者稀有之多是問切不審藥劑不中誤治而成子其可忽乎即與桂枝茯苓丸加大黃湯後復來曰諸證雖退更患疫痢之厄其腹絞痛裡急後重所下者赤白糅然先生復診之曰鷓鴣菜湯證也與十三帖果下蛔蟲數條乃愈方伎雜志曰一農家婦產後患痿躄三年矣病中又妊娠腹隨而大時坐便桶來乞診診畢曰此證非產後不能速治腹部足部暫緩置之產後足可立也以桂枝茯苓丸加大黃煎湯使服大小便快利氣分全體均大舒適至月末而分娩於產後時轉方桃核承氣湯由惡露下毒便晝夜二行一切閉塞之毒皆渙解氣血亦次第宣通故腰膝亦漸漸而動服藥二十日許起步如常矣古人云跛者不忘履盲者不忘視病人欣悅不可名狀類聚方廣義本方條曰又孕婦顛仆子死腹中下血不止小腹攣痛者用之則胎即下又血淋腸風下血選用之皆有效以上諸證加大黃煎服為佳牡丹皮之醫治效用本草綱目曰牡丹根皮氣味辛寒無毒主治除癥堅瘀血療癰瘡本經除時氣頭痛客熱五勞氣頭腰痛風噤癩疾別錄散諸痛女子經脈不通血瀝腰痛甄權通關腠之血脈排膿消撲損瘀血除風痹治胎下胞產後一切冷熱血氣大明治神志不足無汗之骨蒸衄血吐血元素和血生血涼血治血中之伏火除煩熱時珍本草備要曰牡丹皮辛苦微寒瀉血中之伏火和血涼血生血破積血通經脈為吐衄必用之藥治五勞中風瘈瘲驚癇筋急而縮為瘈緩而伸為瘲伸縮不已為瘛瘲卒然眩仆瘛瘲抽掣或口眼喎斜吐涎身軟時發時止者為癇除煩熱療癰瘡退無汗之骨蒸以單瓣花紅者入藥肉厚者佳如以上諸說本藥之作用酷似桃仁其所異者彼以驅瘀血鎮痛緩下作用為優此則以消炎止血作用為優又不如彼含阿米苛他林故無毒性大黃牡丹皮湯之注釋腸癰者少腹腫痞按之即痛如淋小便自調時時發熱自汗出復惡寒其脈遲緊者膿未成可下之當有血脈洪數者膿已成不可下也大黃牡丹皮湯主之金匱要略註腸癰即闌尾炎也下腹部腫痞按壓之則痛其壓痛或自發痛如淋狀放散於膀胱尿道部非真淋病故尿利無變化也時時發熱自汗出反惡寒其脈遲緊者為未全化膿故用本方瀉下之即下瘀血而治矣然脈洪數者為已化膿不可以此方下之以薏苡附子敗醬散排膿散排膿湯等為主治之意在言外矣大黃牡丹皮湯方大黃冬瓜子各克牡丹皮克桃仁克芒硝克上細銼以水三合煎一合去滓入芒硝溶之一日分三回溫或冷服有膿當下如無膿當下血求真按由有膿當下觀之則前之膿未成者當謂膿未全成也大黃牡丹皮湯加薏苡仁方前方中加薏苡仁克煎法用法同前主治治前方證有薏苡仁證者大黃牡丹皮湯去芒硝加薏苡仁方前方中去芒硝煎法用法準前方主治治前方證無堅塊者大黃牡丹皮湯去大黃芒硝加薏苡仁方求真按千金方名腸癰湯前方中去大黃煎法用法同前主治治大黃牡丹皮湯加薏苡仁方證之不可下者大黃牡丹皮湯之腹證仲景謂小腹腫痞東洞翁以本方治臍下有結毒按之則痛及便膿血者為定義臍下部有凝塊或有堅塊按之則疼痛者即本方腹證也然係故恩師和田先生之創見故余從而實驗之如前說者比較的稀有而對於盲腸或闌尾部之左側腹部各有一個之凝塊或堅塊按之則疼痛者為反多故合此二說以為本方之腹證苟見此腹證時不問為闌尾炎或其他如何之病證均當以本方治之而大黃牡丹皮湯去芒硝加薏苡仁方之凝塊或堅塊之堅度比較的稍弱大黃牡丹皮湯去大黃芒硝加薏苡仁方為尤弱也先輩之論說治驗產育保慶曰牡丹皮散求真按此即本方也治產後血暈悶絕狼狽若口噤者則拗開灌之必有效方後曰欲產者先煎下以備緩急方機本方主治曰腹癰按之即痛時時發熱自汗出復惡寒者腹中有堅塊經水不順者腹脹滿如鼓而生青筋或腫而小便不利者小腹有堅塊小便淋瀝者建殊錄曰一老人年八十餘嘗以賣藥出入先生家數日不來使人問之謝曰因病慍鬱故不出隔數日復問之臍上發癰徑九寸許正氣乏絕邪熱如熾先生憫其貧困無力服藥使飲大黃牡丹皮湯及伯州散數日膿盡肉生矍鑠能行一人素剛強臍下發癰瘍醫治之無效乃自用刀剜之且灸其上汁出而愈然按之如硬石亦無痛苦之東都經道諏訪浴於溫泉即大痛不可忍於是再剜之並灸其上數十壯自以為初剜猶淺其根未盡也少焉而腸燒爛血水進出然能食食則清穀出故常以綿縈其腹先生診之作大黃牡丹皮湯及伯州散使飲之數日痊愈求真按此證即小腸腹壁以本方及伯州散能速療之可知中藥方內服之奇效矣成績錄曰一婦人腹痛十有三年諸藥無效小腹硬結與大黃牡丹皮湯後數日下如碗狀者割碎視之有牛蒡根一撮問之答曰十餘年前食牛蒡所傷遂發腹痛而至今後不復食牛蒡矣下後腹痛乃已食牛蒡如故一婦人患鼓脹者三年百治不效乃棄置而不治者數月後聞先生有起廢排痼之術來求診治其腹脹大現青筋不能行步使服大黃牡丹湯旬餘小便通快經一月許舊疴如失一婦人患鼓脹已五年脹勢最甚治之無效乃請先生先生診之曰非不治證也然已成痼疾非久服藥則病必不除敢從否婦人諾乃使服大黃牡丹湯十餘日小便通快續服數帖隨服隨減進前方數十日疾去如平日一婦人腹滿八九日飲食如故小便自利色如柏汁請先生治診之曰此瘀血也與大黃牡丹湯十日許下赤白穢物益進前方遂下如魚腸狀者數枚腹滿漸減經三十餘日諸患悉退一商人年三十許腹大滿四肢枯燥眾醫療之歲餘無寸效請先生治診之作大黃牡丹湯與之兼用夷法丸穢物下腹滿減終復常一婦人年甫十九已八月經水不來大便不通小便自調飲食如故時腹自痛至十一月大便始一通他無所苦醫時與下劑則大便少通明年自春至夏大便僅一次經水亦少來至七月下旬請先生治診之腹軟弱小腹突兀如有物狀按之即痛與大黃牡丹湯一月許諸證盡治求真按腹軟弱小腹突兀有物按之即痛者為小腹腫痞之變態是亦本方所主治也余嘗遇斯證投以此方腹劇痛後塊物脫落而得速效古方便覽本方條曰有一男子患風毒腫愈後瘡口未收而出水後腳攣急疼痛不可忍余用此方痛除瘡口亦痊愈一女子十四歲初發左腿腫毒潰後餘毒不消膿汁淋漓不瘥腳強直如棒不能登廁已有六年諸醫不能療求余治即作此方使飲之時時以虎黛丸攻之兩月餘痊愈求真按余曾治一十六歲女子左股關節疼痛強直發赤腫脹煩痛不可按歷訪諸大學名家年餘無寸效因其腹證與大柴胡加石膏湯大黃牡丹皮湯桃核承氣湯之合方兼用黃解丸數月痊愈唯左腳稍短縮行時微跛耳一男子患熱病大半愈後一日腹大滿臍旁如刺與此方三劑而愈方輿輗曰瓜子仁湯求真按此即大黃牡丹皮湯去大黃芒硝加薏苡仁方也治產後惡露或經行瘀血作痛或作腸癰者此方千金第二十三卷名腸癰湯腹中㽲痛煩痛不安或脹滿飲食不下小便澀此病多是腸癰人多不識或婦人產後虛熱者多為此病縱非癰疽便服此方無損也大黃牡丹皮湯脈遲緊者膿未成可下之脈洪數者膿已成不可下也四句示大法也然臨證者無界限可劃是以方後再云有膿當下無膿當下血此是活用大黃牡丹湯之意也痢經日下膿血或如魚腦髓之惡物者可用大黃牡丹湯蓋此惡物留於腸胃腸胃面之皮肉為熱毒糜爛腐敗而下求真按如下魚腦髓者雖由於有持氏說之機轉然多瘀血乘機自發也畢竟為腸癰之類故以治腸癰之法治之為妙此為奧村翁發千載所未發之理今雖舉一大黃牡丹方然瓜子仁湯排膿散薏苡附子敗醬散等亦可參酌用之生生堂治驗曰一男子二十一歲一日更衣忽腹痛四肢急縮不能屈伸家人聞其悶呼就觀之昏絕而四肢厥即扶之臥於室內延醫針灸徐徐厥回脈應腹復進痛悶呼不忍聞肛門脫出即下如腐爛魚腸者雜以膿血心中懊憹飲食不能下咽醫謂噤口痢療之數日時聞先生多奇術使人迎先生往診之脈遲而實按之闔腹盡痛至於臍下則撓屈拗悶曰其痛不堪先生曰腸癰也先漬食於冷水使食之病者鼓舌盡一盂因與大黃牡丹皮湯五六日痊愈一婦人年三十許有奇疾後竅閉塞不通大便卻由前陰泄如是者旬許腰腹陣痛而大煩悶於是燥屎初通前陰泄止嗣後周年又發患十餘年百方醫治形容日羸神氣甚乏師診之脈數無力按其臍下即有粘屎自前陰出再按之有一塊應手師問曰月事不行者幾年矣曰十餘年矣先與大黃牡丹皮湯緩緩下之佐以龍門丸瀉之者月一次由是前後得所經數旬自謂曰余有牡痔方臨廁即痛不可忍師視之肛旁有如指頭者以藥線截治之仍服前方一年許塊亦自消求真按是直腸痔也麻疹一哈曰一女子年二十許疹後經十四五日鼻內生息肉如赤小豆粒大五六十日不愈醫疑為梅毒用藥不知更請余治按腹狀臍腹有塊如盤按之堅硬腰腳酸痛小便淋瀝大便難經水不利因作大黃牡丹湯使飲之約百日許大便下利二三行經利以多息肉徐消鼻內復故諸證自寧求真按雖局部精診然亦不可不顧及其腹內耳鼻科醫以為何如方伎雜志曰一婦人經水不來已三四月一醫以為妊娠至五月皆以為孕而施鎮帶等至十一月無產氣乞診於余余詳診之腹狀雖如孕樣然非妊娠因經閉也夫婦大驚乞藥乃與大黃牡丹皮湯日四服四五日下紫血衃血頗多二十日許血止腹狀如常翌月月經來後受孕舉一子無瘀血因先已下盡故也類聚方廣義本方條曰大黃牡丹皮湯治諸癰疽疔毒下疳便毒淋疾痔疾臟毒瘰癧流注陳久疥癬結毒痿瘡無名惡瘡膿血不盡腹中凝閉或有塊二便不利者隨證兼用伯州散七寶丸十乾丸等或以七寶十乾如法用之其間暫停湯藥或用薰藥用畢咽口腐爛甚者宜用瀉心湯調胃承氣湯等可以疏滌殘毒且用含漱劑為佳治產後惡露不下小便不利血水壅遏少腹滿痛通身浮腫大便難者又產後惡露不盡過數日寒熱交作脈數急小腹或腰髀痛劇者將發癰之兆也能審病機可早以此方下之已潰膿者亦宜此方治經水不調赤白帶下赤白痢疾小腹凝結小便赤澀或有水氣者福井楓亨疝氣八味方條曰此方多用於小腹以下病夫寒疝之目的繞臍痛此證本因水氣與瘀血而作痛之病名也實證者臍下及腳攣急陰囊腫或痛婦人有腰痛等證可用此方又小腹有瘀血塊而腳攣急如寒疝形者或婦人引陰門時時作痛或陰中突出者又可用於腸癰等證此方之立意自大黃牡丹皮湯中取牡丹皮大黃桃仁牡丹五積散中之桂枝本事方無憂散中之牽牛木通四烏湯及烏沉散中之烏藥用烏藥所以溫肉順氣也又用延胡以和瘀血之痛共八味而成若腹痛者用莪朮難用將者去之而名疝氣七味方夫牽牛比大戟甘遂之藥力不劇用於小腹以下痛者有速效求真按福井氏以為自制此方附加種種理由其實活用仲景方也若能活用大黃牡丹皮湯及其去加方或合用桃核承氣湯桂枝茯苓丸當歸芍藥散中之一方則無此方之必要故可知其適應證即為上列諸方或合方之適應證也勿誤藥室方函口訣大黃牡丹皮湯條曰此方雖用於腸癰潰膿以前之藥然其方與桃核承氣湯相似故先輩運用於瘀血衝逆凡桃核承氣證小便不利者宜此方其他用於內痔毒淋便毒有效皆因排血利尿之功故也又痢疾下如魚腦者用此方即奏效若虛者宜駐車丸之類凡痢疾久不痊腸胃腐爛下赤白者為後藤艮山之發明奧村良築本其說陽證用此方陰證用薏苡敗醬散而即愈云可謂自古未有之新發明也同書腸癰湯條下曰此方因腸癰用大黃牡丹湯等攻下之後精氣虛敗四肢無力餘毒未解腹痛淋漓不已者因是可運用於肺癰之虛證臭膿未已面色萎黃者又如後藤艮山說痢疾可與腸癰同治故有用於痢後餘毒不盡者又婦人帶下證疼痛不已睡臥不安已經數日亦有與腸癰一揆而用之者故靈機活法存乎其人耳冬瓜子之醫治效用本草綱目曰白瓜子別錄曰冬瓜仁也八月採之氣味甘平無毒主治使人悅澤好顏色益氣不饑久服輕身耐老本經除煩滿不樂可作面脂別錄去皮膚風及黑䵟潤肌膚大明治腸癰時珍本萆備要曰冬瓜寒瀉熱甘益脾利二便治水腫止消渴散熱毒癰腫子補肝明目凡藥中所用之瓜子皆冬瓜子也由以上諸說觀之則本藥為消炎性利尿兼緩下藥而主治癰腫有特能焉大黃甘遂湯之注釋婦人少腹滿如敦狀小便微難而不渴生後者此為水與血俱結在血室也大黃甘遂湯主之金匱要略註敦字注和久田氏云敦者對也祭時用盛黍稷之器而似腹者也又尾臺氏云如敦狀者少腹高起形如敦而不急結不硬滿者也敦音對器名禮明堂位曰有虞氏之兩敦鄭注曰盛黍稷之器也周禮天官曰珠盤玉敦鄭注曰敦盤類也故以盤盛血以敦盛食也生後者產後也全文之義婦人於產後如敦狀下腹部膨滿小便少難通不渴者為水血二毒併結於子宮即以本方為主治也大黃甘遂湯方大黃克甘遂阿膠各克上細銼以水一合五勺煎五勺去滓頓服其血當下先輩之論說治驗東洞翁本方定義曰治小腹滿如敦狀小便微難或經水不調者方機本方主治曰治小腹絞痛堅滿手不可近者續建殊錄曰一婦人產後忽煩悶二便閉小腹硬滿按之則痛不可近手兩足浮腫不能屈伸乾嘔短氣命迫旦夕與八味湯兼用大黃甘遂湯兩便快利小便晝夜六七行惡露續下小腹滿大減按之不痛經日浮腫不去乃與木防己湯兼以夷則丸諸證痊愈成績錄曰一婦人產後煩悶二便閉小腹硬滿手不可近兩足浮腫不可屈伸乾嘔短氣命迫旦夕先生診之投桃核承氣湯兼大黃甘遂湯二便快利小便晝夜六七行惡露續下小腹滿去按之不痛經日足腫未除更用木防己加茯苓湯諸證痊愈古方便覽本方條曰一僧年二十八患淋瀝數年時出膿血或如米泔水大便下利有時閉結若下利時淋瀝稍安閉結則甚余診小腹滿如敦狀按之則莖中引痛乃作此方使飲之大下利後病頓退數日痊愈類聚方廣義本方條曰按大黃甘遂湯與抵當湯皆主小腹滿而抵當湯證硬滿小便自利此方證小腹膨滿甚而不硬小便微難因此可見瘀血與水血結滯之異此方不特產後凡經水不調男女癃閉小腹滿痛者及淋毒沉滯梅淋小腹滿痛不可忍溲膿血者皆能治之子炳曰此方與甘遂半夏湯同證而小異婦人則用此方男子則用甘遂半夏湯夫甘遂半夏湯主心下堅滿此方主小腹滿如敦狀雖為同用甘遂其證其部位本自懸殊何可混同且隨證處方豈問男女耶子炳不特不知藥方之主治又陷膠柱之誤說也勿誤藥室方函口訣本方條曰此方主去水血二物然重水氣而以血為客也微難云者非一向不通之謂此證頗多然婦人急於小腹滿結小便不利者有速效又男子疝證小便閉塞小腹滿痛者此方尤有驗下瘀血湯之注釋師曰產婦腹痛法當以枳實芍藥散假令不愈者此為腹中有乾血著臍下宜下瘀血湯主之亦主經水不利金匱要略註詳總論瘀血之毒害及少陽病篇枳實芍藥散條下瘀血湯方大黃二兩桃仁二十枚蟅蟲二十枚上三味末之煉蜜和為四丸以酒一升煎一丸取八合頓服之新血下如豚肝如上本方本為煎方今改為丸方如下下瘀血丸方大黃克桃仁克蟅蟲克上為細末以蜂蜜為丸一回克許一日一回乃至三回酒又白湯服用之下瘀血湯之腹證如仲景所謂有乾血著臍下則本方證之瘀血塊密著於臍下部之腹底按之則有抵抗而壓痛然往往因知覺過敏難以觸診與其他之瘀血證有別也先輩之論說治驗東洞翁本方定義曰治臍下毒痛及經水不利者稻葉克禮著腹證奇覽本方條曰有瘀血著臍下則小腹急痛不可忍甚則手不可近者本方之所主也此證探診臍下指頭觸之覺堅而急痛者此方之正證也余考此大血證婦人多因經水不通男子亦多血證者其人或因腰痛久不止或有淋疾痔脫肛等之患者或發大建中湯證者間亦有此證余前在東都時一男子三十四五歲因大腹痛而臍下痛者三年百治無效余診之暗然覺冷氣腹皮強急如有頭足乃與大建中湯一月許漸愈又覺臍下痛不可忍乃與下瘀血湯數日痊愈成績錄曰一婦人月經過度或每月再見肩背強腹中攣急或硬滿飲食能進大便秘結陰門時癢患已數年不得治效先生與當歸芍藥散兼用下瘀血丸宿疴遂愈類聚方廣義本方條曰此方本草綱目蟅蟲條稱大蟅蟲丸治產後腹痛有乾血者又大觀本草亦稱大黃蟅蟲丸主久瘕積結按此本為丸方非湯方也其制亦與抵當丸相似故當稱丸也其稱下瘀血者疑為後人以其效名之亦猶陷胸備急之類耳又倪珠謨本草彙言曰仲景方治五勞虛極羸瘦腹滿不能飲食內有乾血肌膚甲錯者以乾漆大黃各一兩蟅蟲十個酒煮半日搗膏為丸黍米大每服十丸白湯送下此比金匱大黃蟅蟲丸藥味寡少而功力專也雖似後人裁酌然簡捷而有效產後腹中結實拘攣或煩滿而痛者當以枳實芍藥散和之若不愈者其人必有乾血宜下瘀血湯蟅蟲之醫治效用本草綱目曰蟅蟲氣味鹹寒有毒甄權曰鹹苦主治血積癥瘕破堅下血閉生子大良本經月水不通破留血積聚藥性通乳脈宗奭行產後血積折傷瘀血治重舌木舌口瘡小兒腹痛夜啼時珍發明頌曰張仲景治雜病方及久瘕積結有大黃蟅蟲丸又有大鱉甲丸及婦人藥併用之以其有破堅下血之功也由以上諸說對照仲景論時則本藥為一種之驅瘀血藥比桃仁牡丹皮則主治其更陳舊者也土瓜根散之注釋帶下經水不利少腹滿痛經一月再見者土瓜根散主之金匱要略註帶下者帶下病也尾臺氏曰本草綱目於土瓜根附方一月之上有或字土瓜根散方陰㿗腫亦主之土瓜根芍藥桂枝蟅蟲各克上為細末一日三回分服或增量二倍以上以水二合五勺煎一合去滓一日分三回溫或冷服註陰㿗者類聚方廣義本方條曰㿗同㿉陰囊腫大也劉熙釋名曰陰腫曰隤氣下隤也然則隤亦與㿗通按本草綱目鯪鯉條引摘玄方曰婦人陰㿗硬如卵狀云云一婦人自言陰戶左邊突起凝𩊅者十餘年年年發痛眾治無效診之形如騖卵即㿗疝也發則其大倍常堅硬疼痛寒熱交作痛自小腹達臍旁甚則及於心胸苦楚不可忍年年二三發發則每用桃核承氣湯大黃附子湯芍藥甘草湯之合方痛退腫消又有一婦人年十七陰戶右邊隆起形如睾丸亦陰㿗也與大黃牡丹皮湯而愈可見陰㿗男女皆有之如上說則於鼠蹊或陰囊陰唇部如假性腫瘤之小腸氣可謂亦屬於是矣先輩之論說腹證奇覽曰有臍旁小腹滿而拘攣者婦人有經水不利或下白物或有帶下之患男子因血證而時腹痛者此證間有之且有小腹拘急者可考求真按此小腹拘急可知為左腹直肌下部攣急也類聚方廣義本方條曰土瓜根散與抵當湯同治瘀血而有其別抵當湯證瘀血凝結不動者此方證未凝結也故治帶下及經水不利或再見陰㿗腫白帶等證以是可知其不同也求真按本方及下瘀血湯治血塞未組織化者抵當湯及丸治其半組織化也不可混同土瓜根之醫治效用本草綱目曰王瓜釋名土瓜根氣味苦寒無毒主治消渴內痹瘀血月閉寒熱酸疼益氣愈聾本經療諸邪氣熱結鼠痿散癰腫留血婦人帶下不通下乳汁止小便不禁逐四肢骨節中水別錄天行熱疾酒黃病壯熱心煩悶熱勞排膿消撲損瘀血落胎大明利大小便治面黑面瘡時珍本草備要曰王瓜即土瓜根苦寒瀉熱利水治天行熱疾黃疸消渴便數帶下月閉瘀血利大小腸排膿消腫下乳通乳藥多用之單服亦可落胎列觀上說則本藥為驅瘀血的利尿藥兼有消炎排膿作用矣抵當湯之注釋太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦小腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之傷寒論註劉棟曰所以然者以下十五字為後人之注文誤入本文也山田正珍曰此辨太陽病有蓄血者比桃核承氣湯證則更重也彼則小腹急結此則小腹硬滿彼則如狂此則發狂彼則在於汗後此則因於下後自有差別也且桃核承氣湯證其血自下故其為瘀血病也不俟辨矣此則血不下故因小便之利不利以斷其為是否瘀血也桃核承氣主治傷寒病中熱邪結於下焦其血因之不行而滯為瘀者抵當湯丸主治素有瘀血而邪熱乘之者故陽明篇曰其人喜忘者本有久瘀血宜抵當湯其別如是下焦本有積血之人適病傷寒熱乘瘀血穢氣上而乘心使人發狂也按劉向新序云楚惠王因食寒葅而得蛭遂吞之有腹疾不能食令尹入問曰王安得此疾王曰我食寒葅得蛭念譴之不行其罪乎是法廢威不立也譴而行其誅乎則庖宰食鹽法皆當死心又不忍也故吾恐見蛭因遂吞之令尹避席再拜而賀曰臣聞天道無親惟德是輔君有仁德天所奉也雖病不傷是夕惠王自後出蛭故其久病心腹之疾皆愈王充論衡福虛篇云蛭性食血惠王心腹之積殆積血也故食血之蟲死而積血之病亦愈矣由此觀之雖男子亦有積血之疾自古已然第婦人最多不及言耳此章大意太陽病六七日下之後仍有頭痛發熱惡寒等證脈沉而微者當變為結胸如大陷胸湯條之脈沉而緊也夫結胸之脈多沉今反不結胸其人發狂者此為熱乘蓄血也試看小腹雖硬滿小便則快利如常是以決其為蓄血而宜下之也何以知其已經攻下耶以仍在二字及反不結胸四字知之且下篇云病發於陽而反下之熱入因作結胸是也再按結胸必為下後之病也傷寒下法雖有種種然皆宜俟其表解後下之今此條表證仍在而用下法者何也因其脈已變為沉微也若猶浮大者未可下之也下條曰太陽病身黃脈沉結亦以其脈假在於表而實則決其已解也求真按患太陽病經過六七日下之而後尚有頭痛發熱惡寒等證若加脈微而沉者因誤下表熱內陷於下腹部與已存之瘀血相合而成少腹硬滿其餘波波及於上部而使發狂其熱專迫於血不與水結故在上不成結胸在下無小便不利且表證雖如仍在但止有其痕跡餘皆陷入內部與瘀血相合使成諸證者故用本方下其瘀血則熱亦隨而泄前證悉愈也太陽病身黃脈沉結少腹硬小便不利者為無血也而小便自利其人如狂者血證諦也抵當湯主之傷寒論註成無己氏曰身黃脈沉結小便不利者胃熱發黃也宜與茵陳蒿湯身黃脈沉結小腹硬小便自利其人如狂者非胃中有瘀熱為熱結下焦而蓄血也與抵當湯以下其蓄血錢潢氏曰此由小便之利不利以別是否為血證身黃者遍身俱黃也求真按本條是述血性黃疸之證治也陽明證其人喜忘者必有蓄血所以然者本有久瘀血故令喜忘屎雖硬大便反易其色必黑宜抵當湯下之傷寒論註成無己曰內經素問調經論曰血并於下則亂而喜忘此本下有久瘀血所以喜忘也程應旄曰血蓄於下則心竅易塞而智識昏故應酬問答必失常也病屬陽明故屎硬血與糞並故易黑傷寒準繩曰按邪熱燥結色未嘗黑但瘀血則溏而黑黏如漆若燥結則硬黑晦如煤此為明辨山田正珍曰喜忘者謂數忘也此是陽明證論下焦有蓄血也凡論中稱少陰證陽明證者皆於章中言之其為起首者特此一條耳陽明二字以其久不大便言言病人久不大便喜忘前言往事者下焦久有瘀血也抵當湯下之則愈矣病人無表裡證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善饑至六七日不大便者有瘀血也宜抵當湯傷寒論註病人無表證及半表半裡證七八日繼續發熱者明為裡證也故雖有浮數脈亦可以適方下之假令雖已下之惟浮脈去而數脈不解者此為熱合瘀血必發多嗜證至六七日不大便者明為有瘀血宜用本方下之也婦人經水不利下者抵當湯主之金匱要略註雖無特解之必要然此經水不利對於下瘀血湯及土瓜根散之經水不利而言是示其障礙更高度也抵當湯方水蛭虻蟲桃仁各克大黃克上為細末以水一合煎五勺頓服之抵當湯之腹證仲景謂本方之腹證為小腹硬滿或小腹硬然視觸診上與大黃牡丹皮湯之小腹腫痞多不能區別宜參照脈證外證而決之先輩之論說治驗金匱要略本方小注曰亦治男子膀胱滿急而有瘀血者瘟疫論曰按傷寒太陽病不解從經傳府熱結膀胱其人如狂血自下者愈血結不行者宜抵當湯求真按是以桃核承氣湯無效者宜抵當湯也然抵當湯為行瘀逐蓄之最者前後二便不分亦可取用然蓄血之結甚者非桃仁之力所可及宜抵當湯蓋非大毒猛厲之劑則不足以抵當之故名東洞翁本方定義曰治瘀血者凡有瘀血者二焉少腹硬滿小便快利者一也腹不滿其人言我滿者二也急則以湯緩則以丸求真按若不改作治最陳久之瘀血者則難為定義又腹不滿其人言我滿者為瘀血之一般徵侯非特此方為然也方機本方主治項中曰小腹硬滿小便自利發狂者喜忘大便硬反易通色黑者脈浮數善饑大便不通者經水不利者漫游雜記曰一婦人三十餘歲月事即斷年年肥大腰帶數圍每月必發大頭痛一二次藥食皆吐不能下咽余診之腹脈堅實心下硬塞推之難以徹底與抵當丸濕漆丸數百帖血亦不來乃以瓜蒂末一錢大吐一日翌日按心下硬塞減半又作抵當湯與之數日大便溏瀉日五六次十日後再與瓜蒂五分又與抵當湯如前肚腹劇痛代用以丸日三五分三十餘日經水來已如常頭痛亦除古方便覽曰一婦人年三十患癩病三年眉毛脫落鼻梁腫大一身盡腫赤斑如云手足麻痹月經不通余乃作抵當丸使飲之日服三錢三十日血下數升百日痊愈方輿輗曰抵當湯此方云蓄血與小腹硬滿若比桃核承氣湯證則其病沉結而根深蒂固矣此時若不以水蛭虻蟲之類不能破之以上二方詳考本論則可盡其變化上證有體虛者夫體虛之人雖有瘀血在小腹亦不可專攻然不攻則病不去善哉陳自明以此方去大黃加地黃名通經丸去加僅一味即有攻守兼施之妙豈非孫吳之兵法乎余嘗以此四味煎水有療乾血勞者傷寒論述義曰瘀血者血失常度瘀留下焦是也說文曰瘀血積血也然瘀血之瘀與瘀熱之瘀恐同其義蓋邪熱壅鬱血中則相搏為瘀唯其瘀也血為水之類故必就下以結於小腹其證有結日淺而病勢劇者有結日深而病勢漫者治之之法亦隨而別結日淺病勢劇者桃核承氣湯證是也此蓋因失汗邪熱內併所致其結未緊故熱未斂而勢殊劇故以此方逐利之也膀胱者猶言下焦也蓋與胃中有燥屎同例結日深而病勢漫者抵當湯丸證是也大抵亦由於失汗所致其結既緊其熱已斂故勢殆漫所以專破潰之但更有輕重之異是以有湯丸之分也六七日仍有表證者蓋發汗不徹故耳仍有表證一句之內蘊有其外未解者不可攻之義宜與桃核承氣湯條互看脈微而沉之微所謂沉滯不起之狀而非微弱之微也楊士瀛曰挾血者脈來乍澀乍數閃爍明滅或沉細隱伏是也反不結胸之義未瑩程氏曰脈沉者結胸之脈也脈沉而不結胸則邪已深入可知直結於下焦血分矣桃核之血多結於得病之後抵當之血多結於得病之先然未可一例而論也張兼善曰或云桃核承氣及抵當湯證俱係下焦畜血中間雖有輕重然未知緣何致此耶此皆發汗未得其宜或當汗不汗或汗遲或脈盛汗微或覆蓋不周而不汗其太陽之邪從而不出故隨經入府結於膀胱要之病雖在下然均是屬實乃陽明病之類變也類聚方廣義本方條曰腹不滿其人言我滿者此不特血塊也而瘀血專在於絡之證也若驗其證自能知之子炳云心下痞按之濡腹不滿其人言我滿者於證則同於方則異男子必用三黃丸婦人則用浮石丸或抵當丸誤也心下痞與瘀血壅滯豈同證耶況二方主治所不同而方用豈可拘泥耶墮撲折傷瘀血凝滯心腹脹滿二便不通者或經閉而少腹硬滿或眼目赤腫疼痛不能瞻視者或經水閉滯腹底有癥腹皮見青筋者皆宜此方若不能煮服者為丸以溫酒送下亦佳水蛭之醫治效用本草綱目曰水蛭氣味鹹甘平有毒主治逐惡血瘀血月閉破血瘕積聚無子利水道本經墜胎別錄治女子月閉欲成血勞藥性赤白游疹及咂癰腫毒腫藏器治折傷墜撲蓄血宗奭由以上諸說及活蛭吸盤制止血液凝固作用觀之則本藥有溶解凝血作用也明矣虻蟲之醫治效用本草綱目曰蜚虻釋名虻蟲蜚同飛氣味苦微寒有毒主治逐瘀血破血積堅痞癥瘕通利血脈及九竅本經除女子月水不通積聚賊血之在胸腹五臟者及喉痹結塞別錄破癥結消積膿墜胎日華由以上諸說觀之則本藥與水蛭可謂大同小異耳抵當丸之注釋傷寒有熱少腹應滿小便不利今反利者為有血也當下之不可餘藥宜抵當丸有熱下玉函外臺俱有而字為是傷寒論註方有執曰由上條之方變湯為丸名雖為丸而猶煮湯也山田正珍曰比抵當湯輕一等也故無發狂如狂等證唯滿而不硬故方亦為四分之一耳求真按本條不舉發狂如狂等證者是省略也非謂無此證也故與湯所異者只有緩急之差而無輕重之別若傷寒有熱小腹滿小便不利者五苓散證也求真按豬苓湯證亦然若身發黃者茵陳蒿湯證也今小便反利故知其為血證也抵當丸方水蛭虻蟲桃仁大黃各克上為細末蜂蜜為丸一回克一日三回服用晬時當下血若不下者更服之註陶弘景曰晬時周時也由今旦至明旦也先輩之論說類聚方廣義本方條曰余家用此方取上四味求真按指水蛭虻蟲桃仁大黃四味也為末煉蜜和分八丸以溫酒咀嚼下日服二丸四日服盡不能酒服者白湯送下產後惡露不盡凝結為塊有成宿患者平素用藥其效難收當再孕分娩後用此方不過十日其塊盡消求真按平素用之非全無效唯不如產後之捷效耳大黃蟅蟲丸之注釋五勞虛極羸瘦腹滿不能飲食食傷憂傷飲傷房室傷饑傷勞傷經絡榮衛氣傷內有乾血肌膚甲錯兩目黯黑者緩中補虛大黃蟅蟲丸主之金匱要略註程氏曰五勞虛極一句是一章之題目羸瘦腹滿不能飲食是其證候食傷憂傷飲傷房室傷饑傷勞傷是其所因蓋此諸因之一皆足以經絡榮衛氣傷而血脈凝積以致內有乾血遂為五勞虛極更有肌膚甲錯兩目黯黑之二證俱為乾血之徵蓋其脈數蒸熱亦概可知也求真按憂傷者傷頭腦食傷飲傷饑傷傷消化器房室傷傷生殖器也勞傷者神身過勞也而經絡榮衛氣傷者謂傷害血管係及血液淋巴也大黃蟅蟲丸方大黃克黃芩克甘草克桃仁克芍藥克地黃克乾漆克虻蟲蠐螬各克水蛭克蟅蟲克丸法用法同抵當丸先輩之論說治驗程氏曰婦人虛勞大半內有乾血男子亦間有之審其可攻而攻之則厥疾可愈求真按攻之者以本方攻之也魏氏曰此在婦人女子寡婦女尼因不月而漸成虛勞者尤宜投之求真按尤宜投之者尤宜投以本方之略也醫學綱目本方條曰結在內者手足之脈必相失宜此方求真按由余之經驗血結甚者左手脈常相失蘭臺軌范本方條曰血乾則結而不流非草木之品所能下必用食血之蟲以化之此方專治瘀血成勞證若瘀不除則正氣永無復理故去病即所以補虛也求真按此說治病之規矩準繩也宜熟思之方輿輗本方條曰喻嘉言曰此世俗所稱乾血勞之良治也余按腹滿二字是診乾血勞之第一義曾有一婦人年十七八寒熱尪羸時時盜汗食少一身倦怠勞狀稍具然唯脈不細數而腹滿太甚余謂婦曰是乾血勞也然大肉未脫元氣未敗亟宜服大黃蟅蟲丸夫惡瀉喜補者庸俗之常態也汝若非庸俗則治如反掌耳婦信余言即欲用之但囊中無此丸使服四物鱉甲湯加芒硝不月得愈求真按四物鱉甲湯由虎杖鱉甲桃仁大黃而成後世方也續建殊錄曰一婦人年二十餘去春以來穀肉之類一口不能食若食則心下滿痛或胸中滿痛吐之則止每好飲熱湯或冷水若過飲則必腹痛而吐水頗多腰以下羸瘦甚胸以上如平人行步如常按腹臍旁少腹堅如石大便秘閉若用下劑徒水瀉耳其婦自言腹苦滿然按之不滿因與茯苓澤瀉湯兼用硝黃湯服五六十日渴稍減少食糖果腹痛如故微有咳而吐絡血後投當歸芍藥散兼用蟅蟲丸諸證漸退腹證奇覽曰似小建中湯證而虛羸甚肌膚乾腹滿攣急按之堅痛者為乾血大黃蟲丸證也今之金匱誤作大黃蟅蟲丸大黃蟅蟲丸者下瘀血湯之本名也證類詳於本草證曰五勞虛極羸瘦腹滿不能飲食內有乾血肌膚甲錯兩目黯黑者緩中補虛甲錯者如鮫肌也黯黑者黑白不明也此證比小建中湯則為更重之血證方中四蟲及乾漆桃仁者皆破血結癥瘕也此方可轉用於鼓脹血瘕產後之血腫水腫瘰癧小兒之癖瘕等或曰勞咳吐白沫中雜血線者試之有效求真按肺結核性咯血用之得效類聚方廣義本方條曰治婦人經水不利心腹漸脹滿煩熱咳嗽面色楳黃肌膚乾皮細起狀如麩皮目中曇暗或赤澀羞明怕日者治小兒疳眼生雲翳瞼爛羞明不能視物並治雀目蠐螬之醫治效用本草綱目曰蠐螬氣味鹹微溫有毒主治惡血血瘀痹氣破折血在脅下堅滿痛月閉目中淫膚青翳白膜本經療吐血在胸腹不去破骨折血結金瘡內塞產後中寒下乳汁別錄取汁滴目去翳障主血止痛日華汁主赤白游擦破塗之藏器取汁點喉痹得下即開蘇頌主唇緊口瘡丹破傷風瘡竹木入肉芒物眯目時珍發明頌曰張仲景治雜病大黃蟅蟲丸方中用之取其去脅下堅滿也由上說觀之則本藥之作用可謂與水蛭虻蟲大同小異也乾漆之醫治效用本草綱目曰乾漆氣味元素曰辛平有毒主治療咳嗽去瘀血痞結之腰痛女子瘕疝利小便去蛔蟲別錄殺三蟲主女人經脈不通甄權治傳尸勞除風大明削年深堅結之積滯破日久凝結之瘀血元素發明時珍曰漆性毒而殺蟲降而行血所主之證雖繁其功只在二者耳本草備要曰乾漆辛溫有毒功專行血殺蟲削年深堅結之積滯破日久凝結之瘀血能化瘀血為水續筋骨絕傷損傷則瘀血停滯治傳尸勞瘵瘕疝蛔蟲由以上諸說則本藥為驅逐陳舊瘀血及發揮殺蟲殺菌作用者矣起廢丸方乾漆桃仁反鼻霜乾漆桃仁反鼻霜各克大黃克上為細末混合之以蜂蜜及米糊為丸一日三回分服主治主治陳久性瘀血與下瘀血湯抵當湯丸無大差有乾漆故帶殺蟲殺菌作用有反鼻有兼治瘀血性皮膚病瘡瘍之特能而本方本稱蝮蛇起廢丸由蝮蛇生漆大黃三味組成然生漆作用猛烈不能耐忍者不鮮故余以乾漆代之基於下瘀血湯等之方意新加桃仁也第二起廢丸方乾漆桃仁反鼻霜地黃各克丸法用法同前主治治大黃蟅蟲丸證及前方證之虛者先輩之論說治驗松原家藏方曰起廢丸求真按是缺少蝮蛇起廢丸之蝮蛇也以下同此治一切痼疾求真按痼疾多因瘀血而成故云爾蝮蛇起廢丸治痼疾難動者同書哮喘條曰起廢丸治年久不愈者同書中風條曰起廢丸治年久不愈者芳翁醫談曰起廢丸主治甚多不論血塊積聚凡腹中有塊外發攣急氣促諸證者皆必用之世所謂勞瘵者多因於瘀血故又名乾血勞其腹必有塊而腹中拘急形體瘦小者皆宜長服此丸蓋治勞之方未有良於此者反胃難治者每於吐食後宜貪食之世醫以為脾胃虛法當長服小半夏加茯苓湯然非此方則難盡也唯有驅逐其停飲耳虛勞咳甚者宜麥門冬湯並宜兼用起廢丸凡此丸男女皆可用之求真按不可必定兼用起廢丸方輿輗曰起廢丸求真按此即蝮蛇起廢丸療癲癇及血毒諸證此藥實有排山決海之力起廢之稱不誣也一方無反鼻加麵粉名曰赤丸又呼濕漆丸治血癖瘕痼為痛者並治蛔蟲百疢一貫曰起廢丸用此方有效者必發赤疹可徵本治瘀血久腹痛又與諸痼瘀血用抵當湯證小有異同抵當治因經閉之瘀血者似有效起廢丸一切瘀血用之皆良是故活用抵當於癩時起廢丸有大效又濕勞亦用之由於胎毒瘀血而成勞也起廢丸用於瘀血腹痛及一切痼疾因瘀血者用此方後瘙癢出者妙此方兼用鷓鴣菜湯等亦能治蟲積而下蟲也若病人精氣脫難用大黃者用千金地黃煎丸其方主治月經不通臍下堅結如杯盤發熱往來下利羸瘦而成血瘕者以地黃三十錢取汁乾漆一斤為末二味納漆末於地黃汁中微火煎熬為丸每服以酒下梧子大三丸不知加之常以食後服蓋乾血勞之目的證月水不調小腹急結肌膚甲錯手掌斑紋唇口乾燥消穀善饑也叢桂亭醫事小言曰生漆五十錢和味淋酒一升七日飲盡一身發疹如癩瘀濁外泄宿疾頓治多年之血枯腹痛等證用之妙赤丸效亦同赤丸又呼濕漆丸為治血痼腹痛之方生漆大黃麵粉各等分上三味和蜜調為丸每服五分白湯送下日二夜一發赤疹為知生生堂治驗曰一男兒年三旬不語歲餘凡百治療以及符咒禱祝無所不盡先生診之心下急腹內如盤試開口發聲舌輒隨而攣縮與大陷胸加烏頭湯兼用漆膝丸求真按起廢丸加牛膝也五六日通身發紫斑灼然如蝦魚之發於新鼎悶癢不堪搔抓衅隙病者彌憤突然喝曰伽由呂和言謂癢為伽由呂與沉吟之聲交發一座大駭復使言即如揬口欲出者狀至翌日喉舌旋轉言足達意矣斑亦經日愈服前方百餘帖他醫所拒之病竟辭藥矣麻子仁丸之注釋跌陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則硬其脾為約麻於仁丸主之傷寒論註山田正珍謂上四條求真按本條亦四條之一為叔和所攙當刪之尾臺氏亦云謹按此章非仲景氏之辭氣方意亦不明疑非仲景之方外臺引古今錄驗而不引傷寒論亦可為證然賦質脆薄之人或久病虛羸及老人血液枯燥者以此方使緩緩轉泄亦佳如上說則論方皆非出仲景手然從慣例茲載之麻子仁丸方麻子仁克芍藥枳實厚朴各克大黃克杏仁克上為末以蜂蜜及米糊為丸克許一日三回服用先輩之論說東洞翁本方定義曰治平日大便秘者求真按可改作治無病毒而大便秘者蜜煎導及大豬膽汁之注釋陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導硬字之上玉函有大便二字是也傷寒論註成無己曰津液內竭腸胃乾燥大便因硬此非結熱故不可攻宜以藥外治導引之方有執曰竭亦亡也醫宗金鑒曰大便雖硬若無滿痛之苦則不可攻之求真按陽明病自汗出又誤發汗體液亡失故尿量減少今反常而尿利過多小便自利者即尿利比尋常為多也體液益失以致體內涸竭假令大便雖硬不可以大承氣湯攻下之待病者自催便意宜以蜜煎導及土瓜根大豬膽汁誘導之蜜煎導方蜜七合上一味納銅器中微火煎之稍凝似飴狀攪之勿令焦著俟可丸並手捻作挺令頭銳大如指長二寸當熱時急作冷則硬以納穀道中以手急抱之欲大便時乃去之大豬膽汁方大豬膽一枚瀉汁和醋少許以灌穀道中如一食頃當大便出先輩之論說東洞翁此二方定義曰治肛中乾燥大便不通者求真按當訂正為治直腸內乾燥大便不通者類聚方廣義蜜煎導條中曰傷寒熱氣熾盛汗出多小便自利津液耗竭肛中乾燥硬便不得通者及諸病大便不通嘔吐不入藥汁者老人血液枯燥大便秘閉小腹滿痛者皆宜此方以蜜一合溫之改用唧筒射入肛中較為便利求真按可知灌腸法中醫早已採用且其用途與下劑所行儼然有別不如西醫之無所分別也己椒藶黃丸之注釋腹滿口舌乾燥此腸間有水氣己椒藶黃丸主之金匱要略註勿誤藥室方函口訣本方條曰此方是治有留飲在腸間而變水腫者有效由四肢浮腫致腹脹滿者為主腹堅實者宜加芒硝與木防己去石膏加茯苓芒硝同意以挫實利水為主也有加於方後渴者可不拘己椒藶黃丸方防己椒目葶藶大黃各克上為細末以蜂蜜及米糊為丸一回克許一日三回服用但作煎劑亦可稍增尾臺氏曰疑稍增之上脫有不知二字此說是也口中有津液渴者加芒硝半兩先輩之論說東洞翁本方定義曰治腹滿口舌乾燥二便澀滯者椒目之醫治效用本草綱目曰椒目氣味權曰苦辛有小毒主治利水腹脹滿之小便蘇恭治十二種水氣及腎虛耳卒鳴聾膀胱急甄權止氣喘震亨本草備要川椒條曰求真按川椒者謂產於四川之山椒也子名椒目苦辛專行水道不行穀道能消水蠱除脹定喘及腎虛耳鳴由上說觀之則本藥為溫性刺激的利尿藥主治腹水有特能走馬湯之注釋外臺走馬湯治中噁心痛腹脹大便不通金匱要略巴豆二個去外皮杏仁二個上二味以綿纏槌令碎納於五勺熱湯中捻汁頓服之當下老小量之通治飛尸鬼擊病註中惡者肘後方云中惡者人得之道間門外心胸刺痛氣衝心胸而使胸脹若不治則害人是飛尸鬼擊病述於太陽病篇麻黃湯條下此皆不過證候的病名耳其實水毒急劇充塞於體內而然故無須眩惑於此等病名以腹脹劇烈而上迫胸咽或心痛或障礙呼吸下則二便閉澀為目的而宜運用之先輩之論說治驗東洞翁本方定義曰治胸腹結毒或腹滿不大便或有水氣者建殊錄曰一女子患痘布根稠密起發不快煩躁癢渴不少安已而瘡窠黑陷復無潤色眾醫皆以為必死先生診之作紫圓飲之下利數十行翌早盡紅活諸證皆退一男孩生三歲痘前大熱喉乾口燥有物自臍下上衝心胸則咬牙喘渴不勝悶苦痘亦灰色無光眾醫皆謝去先生為紫圓飲之從廁之後忽發紅澤諸證頓退險證百問曰師曰瘧久不愈者方不當也又有毒結而藥力不達者治之湯藥隨其證先發時與紫圓五六分吐下之則必治矣若再發則復與如初雖劇病二三發後必截也師曰卒中風痰涎壅盛不能息正氣昏冒者不問其證先去痰涎為宜與桔梗白散或紫圓吐黏痰數升即得治痰涎壅塞藥汁不下口開眼閉四肢不動厥不復者即日必死雖厥復半身動口如平藥汁得下而眼不開神氣不正吼喘不止面色如醉足大熱者一二日死引其日者病不劇也雖有吼喘鼻息鼾睡等證然吐瀉得度厥復不大熱吼喘稍退身體安靜者必起其半身不遂者宜桂枝加朮附湯或烏頭湯兼用南呂丸或姑洗丸時時以白散攻之隨證瓜蒂散亦可用先人多用紫圓所謂卒中風之稍輕者諸惡證緩解後脈洪大面色赤他醫施治既引日者病毒凝結不治也又有一種諸證大同脈沉微面色如常四肢拘急或疼痛或麻痹手足冷者此病人雖有痰飲之變非主證也宜用附子湯兼用應鐘時時以紫圓攻之其不奏效者可以七寶丸攻之雖麻痹偏枯之類有緩急而治法無異也求真按雖有桂枝加朮附湯烏頭湯附子湯等證但可初用之此論不可盲從師曰手之二三指得大屈不得小屈者云云此證頗多若不久服則無效以桂枝加朮附湯兼應鐘可也頭不能正或大仰或大俯之證此毒皆在胸中宜以紫圓攻之師曰一女子八九歲忽然四肢痿弱身體如無骨足不能坐口不能言神色如常而無苦容先人與桂枝加朮附湯兼用紫圓五六分下利穢物二旬復常小兒發熱嘔吐諸藥無效者數日必下利如傾盆而熱益盛其腹心下陷而全無力唯有堅塊如拳者時時上衝世人謂之慢驚風皆不治師曰小兒發熱嘔吐云云此證為毒迫心胸之劇證而實難治者也多屬黃連證先人不拘於下利以紫圓攻之下利穢物間有得治者若雖下利不下穢物則不治小兒忽發大熱呼吸促迫頤下大腫者實如發頤而弄舌悶亂頃刻死者師曰小兒忽發大熱云云實難治也此等證先人必投紫圓余與桔梗白散有大吐黏痰而治者小兒乍搐搦上竄人事不知日數發或每發叫呼或羞明脈象皆數實夏月最多世謂之驚風或稱癖疾或中暑或癇甚則弄舌厥冷而死雖有少異大抵相同師曰小兒乍搐搦云云吾嘗投紫圓有得治者非他緩劑所能治也小兒一身顫振不已者初生多有之二三歲者亦有之師曰小兒一身顫震云云雖大人小兒不異治按此毒上迫心胸所致也先人投紫圓此證經數年者難治有與真武湯而治者婦人兼身體攣痛有與當歸芍藥散而治者心痛徹背如刀刺心下痞噁心嘈雜時時下利或嘔吐不食腹中拘急諸治無效遂死此證甚多師曰心痛徹背云云以紫圓或備急圓間有得治者與瓜蔞薤白半夏湯吐痰飲數升而治者亦有之足下所謂諸藥無效者何證乎成績錄曰京師一童子十餘歲起居無常面目失色因請先生按其腹如物在囊中累累相疊氣力羸弱能至盤薄不能寢臥乃與鷓鴣菜湯兼用紫圓吐蛔數十頭又下數百頭不日而愈蕉窗雜話曰一婦人年三十五因纏於病毒致形體如十二三歲之女子脊僂龜背兩膝屈而不伸腳肉瘦削凝於膝頭而非鶴膝月事不通行動難以自由脈沉緊腹虛濡而貼於背探肋下筋攣急內陷胸背謂之曰此證若不上推胸膈而下疏滌之則不能治與家方理氣湯加山慈姑兼用紫圓數月痊愈此等證因腹中癖塊上引脅肋甚而底攣急也不可專以胸膈故而行大黃附子湯是以用理氣湯推下胸中之癖物以紫圓疏滌蓄積之水毒也求真按理氣湯為半夏厚朴湯橘皮枳實生薑湯之合方也紫圓之功能先以赤石脂代赭石鎮墜胸膈之氣再以杏仁之利氣則胸中疏利而上下之氣得以升降更以巴豆下行之也小兒初生時見薄弱者亦不可惟慮其虛多由胎毒而薄弱也余長女初生下時其形至小而甚薄弱故人皆以為天稟之薄也余謂不然是因胎毒而然即於初生之日用紫丸一粒第二日是旦至暮不通氣全身色白如死狀然呼吸不絕候其腹心下有動氣余又謂是蓄毒所成即又用紫丸三粒心下動氣即下而面赤甚瞑眩而頻啼大吐下其黑物翌日又不通再用紫丸三粒已上經三日於是兩便快利全身見赤色漸漸生長矣求真按余第三女亦類此案身體瘦小而腹部膨滿不乳便秘時時涕泣因與本方涕泣立止便利哺乳反覆數回諸證全去漸漸成長以至於今日春林軒丸散便覽本方條曰此方取自胸膈至臍下間之毒也用於因結毒而以手觸之心下有凝結物或緊張者又欲利不利及小兒驚風之類或有塊或緊張者總之腹部有塊者無不可用之又此藥本來主治反張故用於積聚等證但治自下衝上也又此方治喘押下自下逆上及在上者之病毒故能治吐也惣之不得言或昏冒者皆病附於心也此方主之青州醫談曰解顱初起如驚風有發熱直視搐搦等證有頭腫者急與葛根加朮附以紫圓下之則治矣若治遲則漸漸腫而不治矣又小兒發熱之後有四肢痿弱者其證雖異其毒與解顱同其初起亦同後有脊骨大起等證者早與前方亦治矣求真按解顱者腦水腫也小兒發熱之後四肢痿弱者小兒麻痹也師曰用紫丸求真按紫丸與紫圓同方證紙上雖難述大概宜用紫丸者臍下有凝結而有微滿之情形錯雜之腹則難與之久習自能明了治龜背龜胸方紫圓每服二分乃至五分五日一次或十日一次以肩發痛為驗用之半年或一年所謂不食癇者以紫圓後用消癖湯則痊愈求真按此不食癇若因食毒停滯而然者則與紫圓後隨證治之不可預定消癖湯也方伎雜志曰紫圓之效驗服法詳見千金方宋之楊士瀛王碩清之陳復正輩善用之余載其事於橘黃醫談世醫有甚懼而不用者又有不知方而多懼嫌者當是迷信西洋之妄說謂巴豆糜爛腸胃之所致其無識不堪一笑若用熟時然後可知其用之廣矣小兒風邪或乳食停滯而發大熱脈數急而眠惴惴有忽然發驚風者雖有表證宜早以紫圓下之熱去胸腹和穩矣僅係風邪則用葛根加石膏湯若係咳嗽則用麻黃湯渴者大青龍湯前證嘔吐者麻杏甘石加半夏湯如前證而有任何一切停滯者則宜兼用紫圓也腸胃為受容飲食消化之器故雖能熟化轉輸然不能不生澱濁瘀液是亦自然之勢也夫感痢疾等證者因此毒有留滯故也若無留滯則氣血宣通毛蒸理泄時決無此患能預於疫痢流行時使服紫圓六七分至一錢取峻瀉八九行蕩滌其腹中翌日糜粥將養一日時則神氣爽快可免痢疾之厄試用之可知余言之不謬求真按諸病關係於自家中毒證者雖如此說然以紫圓一方應之非也宜隨證預防之橘窗書影曰某女發疹一日沒而無跡心下痞硬直視喘鳴脈洪數須臾悶絕如死父母相擁而泣余診之脈未絕因與紫圓忽吐瀉如傾喘滿若失尋與麻杏甘石湯而安備急丸方之注釋三物備急丸方見於千金司空裴秀為散用亦可先和成汁乃傾口中使自齒間入至良驗金匱要略大黃乾薑巴豆去外皮各克上為細末混合為散或蜜丸以溫湯或酒頓服克主心腹諸卒暴百病若中惡客忤心腹脹滿卒痛如錐刺氣急口噤停尸卒死者以暖水若酒服大豆許三四丸或不下捧頭起灌令下咽須臾當瘥如未瘥更與三丸當腹中鳴即吐下便瘥若口噤亦須折齒灌之註停尸卒死者是突然陷於假死之諸急證也其他注釋詳於太陽病篇麻黃湯及本篇走馬湯條本方及走馬湯紫圓三方皆以巴豆為主藥其所主治雖大相類似然其間不無小異焉夫走馬湯以治水毒作用為主驅逐食毒作用為客本方則以驅逐食毒作用為主而治水毒作用為客也紫圓與走馬湯甚近似而與彼惟用巴豆杏仁為異耳且另含鐵鹽類之赤石脂代赭石帶有沉降收斂強壯解凝諸性故作用不如彼之猛烈而能有深達之差是此方之特能反於前二方之專用於急性證而能通用於急慢二證也又雖主用小兒然以大實大滿為目的則一也且此三方大實大滿之目標甚疑似於大承氣湯證然大承氣湯有裡熱腹脹滿為目的此三方則無裡熱也是以其目標不難分別之先輩之論說治驗外臺秘要曰許仁則云霍亂有兩種一名乾霍一名濕霍乾霍死者多濕霍死者少俱係由飲食不節將息失宜所致乾霍之狀心腹脹滿攪刺疼痛煩悶不可忍手足逆冷甚者汗流如水大小便不通求吐不出求利不下須臾不救便有性命之虞巴豆等三味丸對於乾霍大小便不通煩冤欲死者使服之以取快利傷寒緒論曰下利瘥後至其年月日復發者此痼寒留結也備急丸求真按此證似大承氣湯證然痼寒留結即由於水毒留結而非有熱毒也故不用彼而與本方得效方曰備急圓治妊娠因熱而大便秘脈實死胎人事不知者以溫水下七圓即活求真按病證危急者不拘熱之多少宜以本方救之所以有備急之名也聖惠方曰備急丸治因食熱而飽及飲冷水過多上攻肺臟喘急不已求真按此食熱而飽是投熱劑之意頗難解恐是錯誤得效方說亦然聖濟總錄曰備急三物丸治喉痹水漿不下小兒重舌木舌腫脹而語聲不出水飲不下者幼幼新書指迷論曰寒熱如瘧以時無度脹滿膨脝起則頭暈大便不通或時腹脹膈痞悶者此因宿穀滯留不化結於腸間氣道不舒陰陽反亂宜備急圓東洞翁本方定義曰治心腹卒痛者求真按此定義極不完全因心腹卒痛者非僅以本方為主治故也方機本方主治曰食滯腹痛者心痛諸卒痛者霍亂吐下而心痛者求真按本方主治亦非完璧建殊錄曰有恕首坐者伯州人游學京師與我輩善一日首坐謁先生曰頃得鄉信貧道戒師某禪師病腫脹二便不通眾醫皆以為必死將還侍湯藥願自先生處得備急圓往可乎乃作數劑與之首坐還視禪師呼吸僅存即出備急圓服之下利數十行腫稍減未及十日而痊愈於是里中有患癩疾者見奇效謁首坐求治首坐謝曰京師有東洞先生者良醫也千里能瘳疾無所不治禪師所進者亦彼之藥也今再為汝請求之其人懇記而退首坐復來京師輒謁先生詳告證候且懇其治先生乃作七寶丸二劑贈之服後痊愈明年來京師輒謁先生則已如未病者矣一男子一日卒倒呼吸促迫角弓反張不能自轉側急作備急圓使飲之每服重五錢下利如傾即復原漫游雜記曰一男子病疥癬以散藥摩擦數日而愈後作湯藥浴浴後中風即發寒熱毒氣內攻滿身暴脹兩便斷而不下氣急脈數一步不能移請余治余謂家人曰此證死不旋踵若不用峻攻之藥則難與爭鋒與備急圓五分快利三行明日東洋先生作赤小豆湯使服三大碗又利二行明日又與備急圓利十餘行毒氣漸減瘡痕發膿續與赤小豆湯二十餘日而痊愈求真按東洋與赤小豆湯不如用麻黃連軺赤小豆湯加反鼻也一商人感暑而泄利時醫皆以為虛火上衝與益氣湯三十餘日利下雖斷而心下絞痛三日夜無間斷四肢拘攣口不能言服附子理中湯數帖不愈而欲死請余余曰是邪毒膠結而上攻也可下之醫生暨旁人皆以為不可商人曰下死與不下死一也不如服之可無遺憾於是與備急圓二十粒服後煩悶食頃絞痛不發便不肯來余診其腹臍下隱然怒脹曰心下雖解藥力為疝所閉也乃進黃連瀉心二帖至夜二更便下家人來告余曰將有五六行無他故也至明日共下六行神氣輕健可以行步矣更與半夏瀉心加大黃湯二十日而愈續建殊錄曰一男子當食時忽咽痛不久手足厥冷如死狀二醫診之一醫為寒疾一醫為纏喉風曰此證宜備急圓然未試故辭而不治乃迎先生先生曰備急圓固的當也與之一時許大便通快而疾如失方輿輗曰備急丸外臺許仁則曰乾霍之狀腹滿疼痛煩悶不可忍手足逆冷甚者流汗如水二便不通求吐不吐求利不利須臾不救即有性命之虞按此丸本酒服之方也今醫多以白湯送下若用酒下之則可助藥力而增其效一男子傷食社中醫生雖用備急走馬等無寸效技窮之餘試飲以酒誘服前藥而快得快吐下而復康余謂醫生曰羅謙甫云守常者眾人之見知變者智者之事今可與子言之叢桂亭醫事小言曰惡證霍亂雖藥水皆吐然以乾嘔而不吐所謂無吐瀉之乾霍亂為尤劇雖不必死若為惡證則多難救須合脈腹考之可斷吉凶其因皆由傷食若飲食有節則霍亂可免不因暑傷而食傷所以貴有吐瀉也故宜先於心腹卒痛時以備急丸為先鋒若能快吐下則手足能忽然溫暖脈亦漸出矣雖死證以備急紫圓之力亦不致誤春林軒丸散便覽曰大呂丸治毒迫心下心腹卒痛氣急者此方所謂備急圓是也後世家之徒亦多能知所用然多用於食毒其實不限於食毒一遇有毒迫於心下而急痛者即可用之其最效者為不大便或腹滿急痛四肢逆冷者或暑毒迫於心下而急痛用理中香薷飲等難效者皆宜用此方也類聚方廣義本方條曰此方治飲食傷霍亂一切諸病暴發而心腹滿痛者妊娠水腫死胎衝心便秘脈實者若用之則下矣紫圓亦佳但宜審其人之強弱以處之巴豆之醫治效用本草綱目曰巴豆氣味辛溫有毒主治破癥瘕結聚堅積留飲痰癖大腹蕩滌五臟六腑開通閉塞利水穀道去惡肉除鬼毒蠱疰邪物殺蟲魚本經療女子月閉爛胎別錄治十種水腫痿痹落胎藥性通宣一切病泄壅滯除風補勞健脾開胃消痰破血排膿消腫毒殺腹臟蟲治惡瘡息肉及疥癩丁腫日華導氣去臟腑之停寒治傷生冷硬物元素治瀉痢驚癇心腹痛疝氣風喎耳聾喉痹牙痛通利關節時珍本草備要曰巴豆辛熱有大毒生猛熟少緩可升可降能止能行開竅宣滯去臟腑之沉寒為斬關奪門之將破血瘕痰癖氣痞食積傷生冷硬物大腹水腫瀉痢驚癇口喎耳聾牙痛喉痹其毒性又能殺蟲解毒療瘡瘍蛇蝎諸毒若峻用可劫大病微用亦可和中通經爛胎本藥含巴豆油為瀉下作用之峻烈者雖西醫亦所知悉然不知陰陽虛實之法則不通藥物配合之機微故僅單用於頑固之便秘噫本藥之應用豈如是其狹窄乎是以宜熟讀玩味仲景之論及上記諸說以擴充其用途也然性峻烈不比他藥故初學者不可輕用大黃附子湯大附辛之注釋脅下偏痛發熱其脈緊弦此寒也以溫藥下之宜大黃附子湯金匱要略註脅下偏痛者謂疼痛偏在季肋下部之左或右也以下之意凡發熱者其脈當浮數今反弦緊者是水毒壅塞之明徵故宜以溫藥之本方下之也此寒也者此是寒實之意也然尾臺氏對於本方云此方實能治偏痛然不特偏痛已也亦能治寒疝胸腹絞痛延及心胸腰腳陰囊焮腫腹中時時有水聲而惡寒甚者若拘攣劇者合芍藥甘草湯如上所云不僅治偏痛亦能治兩側脅下及腰腹痛故不可拘泥於偏痛二字也大黃附子湯方大黃附子各克細辛克上細銼以水二合五勺煎一合去滓一日分三回溫服芍甘黃辛附湯方大黃附子各克細辛克芍藥甘草各克煎法用法同前主治本方為吉益南涯之創方是大黃附子湯與芍藥甘草湯之合方也主治此二方證之相合者先輩之論說治驗東洞翁大黃附子湯定義曰治腹絞痛惡寒者方機大黃附子湯主治曰胸下偏痛發熱者惡寒甚腹痛大便不通者漫游雜記曰有一男子膝脛刺痛腹脈無他異經三四年不愈請余治診之是濕氣也後將成為腳氣與大黃附子細辛湯求真按此即本方也一百日愈方輿輗曰大黃附子湯脅下偏痛者即久寒成聚著於一偏而痛也此證雖發熱而脈弦緊故取其寒宜以溫藥下之大黃附子湯其主方也此寒與當歸四逆加吳茱萸條云內有久寒同指平素而言也然當歸四逆條從問得之或有據現證得之者此條脈弦緊確徵也凡仲景書中有以論證起者有以說脈起者然今時之醫惟取證措脈者何耶曾有一男子自右脅下連腰疼痛甚經四五十日諸治無效余診脈緊弦因與此湯而奇效滯淹之患十餘日痊愈按金匱寒疝第一條曰下焦閉塞大便難兩胠疼痛此虛寒從下上也當以溫藥下之求真按此文與金匱原文不同即趺陽脈微弦法當腹滿不滿者必便難兩胠疼痛此虛寒從下上也當以溫藥服之此證雖言兩胠疼痛亦可用大黃附子湯不可拘於偏痛之偏字也蕉窗雜話曰一男子年二十五右膝微腫行步艱難已四年矣其狀稍類鶴膝風診候其腹右臍下拘攣尤甚按之痛引右腳又右膝所腫亦比左膝不同如貼肌肉然者因抱病已久性情甚急初用大黃附子加甘草湯後加用四逆散加良薑牡蠣劉寄奴而得愈夫此證多由肝氣而成者故唯注意其足者多不治是以用威靈仙杜仲牛膝等者皆治標之法也若能取去右腹裡之癖物以治其本則用藥至簡約而得效甚的確也凡遇此等病其病毒皆係沉痼不動者必須先用大黃附子湯以浮動沉於腹底之癖物且此證沉痼於小腹之癖物等尤須以附子浮動之亦能自覺此沉痼物有翼翼之情形然附子僅能激動其病根故當更用大黃削取其搖動處而拔下之又以附子加入於大黃中互相扶持而上之此藥方之妙用也又云附子有挽回脫陽之能者亦與此同義故成四肢厥冷證者是不能浮出於腹也因沉於腹致成厥冷而脫陽若浮其沉即為回陽故脫陽云者非脫於外之謂也求真按此說雖不免為後世醫家的口吻然尚屬卓論宜熟讀工作舂米等事時誤傷會陰上小水點滴不通只出血少許證先用桃核承氣湯等佳若不治宜用大黃附子湯此用附子進藤玄之曾數試之一帖用附子二錢許即有通利者用至血止佳又因證有用八味者求真按此尿閉與桃核承氣湯者為欲去瘀血之急迫也用本方或八味丸者為欲恢復尿道麻痹也而期於利尿則一古方便覽大黃附子湯條曰一男子年五十餘腹痛數年余診心下痞硬腹中雷鳴乃作半夏瀉心湯使飲之未奏效一日忽然大惡寒戰慄而絞痛二三倍於常於是更作大黃附子湯痛頓止續服數日病不再發榕堂翁療難指示前錄曰答脅下偏痛者固大黃附子湯之所主然痛引胸中且咳者雖惡寒腳冷脈微宜與十棗湯痛連臍旁或牽小腹者宜烏頭湯又有宜當歸四逆加吳茱萸生薑湯者蓋有宜攻擊者有宜調和者有宜攻和兼施者諸病皆然治療固非一途也須審明病情以處治若舉措一失則可治者反因而增劇也求真按大黃附子湯證往往易誤為大黃牡丹皮湯證因後證若劇時其疼痛放散於右脅下所謂疑似脅下偏痛故也橘窗書影曰一老醫曰產後及諸病後有腳不立證用桂枝加朮附湯或大黃附子湯宜隨證時時用紫圓總之宜用附子劑一男子腰腳拘急痛甚兩腳攣急不能起晝夜呻吟余與芍甘黃辛附湯二三日痛全安蓋此證屬寒疝而尋常之疝劑緩慢難效余平常治寒疝用此方及附子理中湯治熱疝用四逆散加茴香茯苓及大柴胡湯加茴香甘草而咄嗟奏效古方之妙如此求真按此加味法太複雜宜隨證加味或合方為是一男子左腳腫痛攣急難以屈伸數月不愈醫多以為風濕余診曰不熱不痹病偏筋脈恐由疝毒流注乎以芍藥甘草湯合大黃附子湯使服之外以當歸蒸荷葉礬石為熨劑數旬而愈芍甘黃辛附湯吉益南涯之創方也余用於由疝毒流注偏處者屢奏效其他如黃解散亦南涯之發明也一女子年將三十多年經事不調腰痛引腳不能俯仰步履經數醫無效余以血瀝痛與桂枝茯苓丸加附子大黃兼用角石散不應一日診之臍下右旁有塊按之痛引腰腳甚且因其塊之縮脹而痛亦有緩急云余斷為腸中瘀毒所致與芍甘黃辛附湯兼用趁痛丸另以當歸蒸荷葉礬石蒸熨塊上結塊漸解腰腳亦得屈伸數年痼疾因是痊愈余近年所診病人每年不下三千人而誤診如此真不堪慚愧焉求真按本方所謂疝塊不外為腸之假性腫瘤故時常縮脹而痛亦有緩急也然大黃牡丹皮湯是真結塊而非假性的故無如此之變化以是可以鑒別二方矣勿誤藥室方函口訣大黃附子湯條曰此方主偏痛不拘左右胸下各處即自胸肋至腰痛者亦宜用之但烏頭桂枝湯是自腹中及於偏腹者此方自脅下痛引於他處者也蓋大黃與附子為伍者皆非尋常之證如附子瀉心湯溫脾湯亦然凡頑固偏僻難拔者皆涉於陰陽兩端故為非常之伍附子與石膏為伍亦然大烏頭煎之注釋腹滿脈弦而緊弦則衛氣不行即惡寒緊則不欲食邪正相搏即為寒疝寒疝繞臍痛若發則自汗出手足厥冷其脈沉弦者大烏頭煎主之金匱要略註本條解說和久田氏云弦者強引也緊者纏絲急也衛氣者守表之氣也弦脈者為寒邪干入衛氣不行處之候即惡寒是也緊脈者為寒邪犯胃腸而使停滯穀食之候故曰不欲食也例曰脈緊如轉索無常者有宿食也又曰脈緊云云腹中有宿食不化是也此脈弦而緊者是寒邪外干衛氣內犯胃陽與正氣相搏之候邪正相搏有戰爭之勢所以腹痛亦劇也名之曰寒疝者是邪與正氣並立非真寒也然寒干下焦其毒繞臍而凝結或現於小腹而弦急因毒而發為痛也痛發則自汗出手足逆冷而弦緊之脈至於沉伏也是故煎退寒逐水之烏頭更和以蜜治其急迫之毒也其義雖如上說然其本意是示腸閉塞之證治故不問為內外嵌頓小腸氣或腸捻轉證等苟有前證者悉宜處以本方也大烏頭煎方烏頭大者克上細銼以水九勺煎三勺去滓納蜂蜜六勺再煎成六勺頓服之不瘥明日更服不可一日再服先輩之論說治驗東洞翁本方定義曰治毒繞臍絞痛自汗出手足厥冷者方機本方主治曰治腹痛自汗出手足厥冷脈沉弦者建殊錄曰一男子年七十餘自壯年患疝瘕十日五日必一發壬午秋大發腰腳攣急陰卵偏大而欲入腹絞痛不可忍眾醫皆以為必死先生診之作大烏頭煎每帖重八錢使飲之須臾瞑眩氣絕又頃之心腹鳴動吐水數升即復原且後不再發求真按此是嚴重的嵌頓鼠蹊小腸氣然一舉而使根治可知古方之絕妙矣類聚方廣義本方條曰寒疝腹中痛叫呼欲死面色如土冷汗淋漓四肢拘急厥冷煩躁脈弦遲者用此方即吐水數升其痛立止此古方之妙非後人所得企及也黴瘡治方論曰一僧年五十餘患所謂長腹痛晝夜三四發腹中雷鳴刺痛小腹結塊心下痞塞一醫療之與附子粳米湯及滾痰丸半歲許無寸效因請他醫醫曰前醫所為誤也蓋此病因小腹結塊而心下為之痞塞腹中因之而痛其餘皆旁證耳乃與半夏瀉心湯及消塊丸又半年許病不動於是轉醫數十輩或服益氣劑或用補脾藥或曰疝曰癥曰積曰聚治盡無效已經四年日甚一日請余治診之腹裡有一痼毒輕按不覺重按則微覺之餘證如前因先作烏頭煎及三黃丸使服之五十餘日更作化毒丸與之且時時用流毒丸此方由大黃礬石巴豆輕粉而成之丸方攻之出入百餘日數年之腹痛忽然而退小腹之結塊忽然而解腹裡之痼毒亦消盡若失矣烏頭桂枝湯之注釋寒疝腹中痛逆冷手足不仁若身疼痛灸刺諸藥不能治抵當烏頭桂枝湯主之千金無抵當二字金匱要略註和久田氏曰寒疝者下焦寒毒凝結之名也逆冷者手足倒逆而冷非謂手足逆冷也此證之冷不止手足承腹中而言不仁者不知痛癢也身疼痛者由於氣血不和也抵訓當以物當之也此方以瞑眩劑而當病毒之凝結是以謂之抵當故曰灸刺諸藥不能治是示篤劇之病狀也丹波元堅曰按烏頭煎證為寒氣專盛於裡此條證是表裡俱壅塞所以須桂枝也灸刺諸藥不能治者謂病勢劇烈不得以套法治之非謂灸刺諸藥之誤治也烏頭桂枝湯方烏頭克上細銼以蜂蜜一合二勺煎六勺去滓以桂枝湯六勺和解之頓服六勺若無效更服六勺初服二合不知即服三合又不知復加至五合其知者如醉狀得吐者為中病先輩之論說治驗東洞翁本方定義曰治腹中絞痛手足逆冷或不仁或身疼痛者古方便覽本方條曰一男子年四十三數月疝氣腰冷如坐水中大抵每旬必一發發則臍腹大痛手足強不能屈伸與此方二十劑大吐其水病減大半更以控涎丹下之而痊愈一男子年五十左半身不遂口眼歪斜言語蹇澀手足振動余用此方大吐水而困倦病家驚駭余曰不必畏是藥之瞑眩也後諸證盡除而收全效腹證奇覽本方條曰臍下現大筋如張弓弦其筋引睾丸或股際或上腹而腹痛如絞或有繞臍成塊者是寒疝也兼有氣血不和者烏頭桂枝湯證也按此方為烏頭煎與桂枝湯之合方所以為合方者因身疼痛也身疼痛者由於肌表氣血不和也論曰身疼痛者急當救表宜桂枝湯是也求真按由此說本方與烏頭煎可以鑒別矣類聚方廣義本方條曰按身疼痛千金作一身盡痛且無抵當二字皆是也寒疝繞臍痛上連心胸下控陰囊苦楚不可忍手足逆冷汗如流者非此方莫能救之疝水毒也其發多由外感而來或有兼瘀血而作者或有挾蛔蟲而動者或有因宿食而發者處治之際宜甄別而下手之東洞先生曰煎法宜從大烏頭煎法然余每從本論之煎法而分量服法以意裁酌耳勿誤藥室方函口訣本方條曰此方為寒疝之主劑故用於腰腹陰囊苦痛者後世雖用附子建中湯不如蜜煎此方之有速效也又失精家常腰腳冷臍腹無力腳弱羸瘦腰痛者此方及大烏頭煎有效依證加鹿茸或為末加入亦佳烏頭湯之注釋病歷節不可屈伸疼痛烏頭湯主之金匱要略註歷節者和久田氏曰歷者經也歷節者各關節疼痛也如上說諸關節疼痛之名稱也烏頭湯治腳氣疼痛不可屈伸金匱要略外臺烏頭湯治寒疝腹中絞痛賊風入攻五臟拘急不得轉側發作有時令人陰縮手足厥逆金匱要略註和久田氏曰此章為外臺文絞者轉榨也絞痛者如轉榨絞物而痛也此絞痛二字善能形容用烏頭煎之腹痛狀則前二章求真按指大烏煎及烏頭桂枝湯也之腹疼亦可想而知矣此證因寒疝病而賊風入攻五臟致身體拘急不得轉側也因此賊風之入所以合用麻黃等四味發作有時者腹痛也陰囊縮者寒疝之毒使然也烏頭湯方麻黃芍藥黃耆甘草各克烏頭克上細銼先以蜂蜜六勺煎烏頭成三勺去滓別以水一合八勺煎餘藥成六勺去滓納蜜煎中更煎成六勺頓服之先輩之論說治驗東洞翁本方定義曰治骨節疼痛不可屈伸及腹中絞痛手中厥冷者按當有自汗盜汗浮腫等證方機本方主治曰歷節疼痛不可屈伸者腳腫疼痛者以上兼用蕤賓丸時時以紫圓攻之仲呂亦可腰以下腫而疼痛者蕤賓或仲呂或桃花散腹中絞痛拘攣不得轉側身重手足厥冷陰縮者小腹攣急陰囊偏大者自汗盜汗出浮腫者成績錄曰一男子左腳攣急不得屈伸時時轉筋入腹自小腹至胸下硬滿上衝不得息自汗如流兩足厥冷二便秘閉微渴日夜不得眠仰臥不能轉側舌上微黑先生與烏頭湯汗止厥已諸證少緩然兩便不通硬滿如故轉筋益甚更與桃仁承氣湯二三日大便快利小便亦能通歷十日許諸證悉愈續建殊錄曰一男子心下硬痛手足厥冷頭出冷汗嘔吐不能飲食服紫圓二錢下利數行痛益甚如絞冷汗不止乃與大柴胡湯硬痛益甚更作烏頭湯使服之諸證頓退腹證奇覽本方條曰以上三方求真按以上三方指大烏頭煎烏頭桂枝湯烏頭湯是也皆以烏頭煎為本方更隨外證加味即各異其意趣要之合桂枝湯以救表諧營衛合麻黃黃耆芍藥甘草所以祛風邪逐瘀水和筋脈宣正氣者為隊伍皆以烏頭煎獨為先鋒散凝寒解結水其勢猛非尋常之材也故服之者雖量少亦能惡寒身痹口舌如噉椒溫溫欲吐起則頭眩多服之則身體冷自汗如流吐瀉嘔逆而脈沉伏甚者如死狀輕則一二時重則半日許乃可解故方後曰知者如醉狀得吐者為中病是實瞑眩之劑也不可不慎焉若夫瞑眩時不可妄駭遂與他藥及以火暖之宜靜待其醒也有醒後得吐者有方暝眩而吐瀉併至者但醒後發渴欲飲者則宜與冷水將息若誤中烏頭附子之毒者宜服味噌汁或黑豆甘湯或乾薑甘草湯亦不可不知也或曰若欲其緩宜用川烏頭然病劇者若不用草烏頭則不能取功但其分量及蜜水煎法不可差誤慎之慎之以上三方可施於疝家偏墜證求真按偏墜者陰囊小腸氣也一婦人苦梅毒十餘年諸藥皆無效請余治診之脈沉數顏色憔悴四肢拘急肩腕腹背結毒膿汁常出臭氣射鼻因先作烏頭湯及伯州散使服之四十餘日更作化毒丸求真按此方薰陸大黃雄黃亂髮霜生生乳而成之丸方也服之凡八日諸患減半後二十日再作化毒丸服之如前至八日止服用紫圓隔日攻之病減十之八九毒猶未盡周身微腫因換越婢加朮附湯時以梅肉散攻之五十日許毒盡除類聚方廣義本方條日腳氣痿弱不能起立麻痹殊甚諸烏附劑無效者宜此方治痛風百節疼痛腫起及偏枯癱瘓結毒骨節酸疼或隆起者俱宜兼用七寶承氣丸十乾承氣丸腹滿便秘或有塊者兼用夾鐘圓或大承氣湯有經水之變者桃核承氣湯偏枯證心氣不定或健忘心下痞者瀉心湯治痘瘡起脹灌膿其勢不振灰白內陷下利身冷寒戰咬牙掉頭不止者癰疽累日膿不潰堅硬疼痛不可忍者或已潰後毒氣凝結腐蝕不復新肉難生者或附骨疽痿瘡瘀膿不盡者或久年梅毒沉滯不動者皆主之隨宜兼用七寶十乾梅肉等又有宜用薰藥者方伎雜志曰破傷風多由足發疪如切疪打撲足傷等小疪過五日七日乃至十五日二十日自己亦已忘卻矣此時有發為風者醫每誤診之甚者有角弓反張兩便不利手足拘急人事不省等證此證輕者宜用大劑葛根加附子湯重證宜用烏頭湯與大承氣湯拘攣而牙關緊閉者宜與紫圓六七分或一錢若不敏捷治療死亡即不旋踵又有心下痞塞時時鬱冒者宜用瀉心湯一人乞診曰九月間腰腳痛不能步行托藩醫治以為疝病療三十日許無效又請他醫是氣血水家也其醫云因氣血之滯所謂乾腳氣是也服藥三十餘日更無效又視一醫問曰有無損傷乎答曰是矣從前學習弓馬槍劍柔術等時腰足時覺疼痛或由宿疾之發動乎於是服其藥親族以為損傷之病宜用鏝以治其外如是則內外併治氣血容易循環即疾病亦可速效矣然經五十日亦無效云余診之伏枕已久故全身大肉已脫腰股仍甚痛余用烏頭湯兼七寶承氣丸服五六日痛稍輕用丸藥十日便少通轉用芍藥甘草附子大黃湯六帖二十日許能扶杖行走於房內云至十二月中旬大概已愈至廿四五離床如案可謂幸矣一婦人乞診病人云三四年前右脛發附骨痘一瘍科治之而愈去年臘月往遠方感受風寒腰臀兩腳疼痛惡寒甚不知如何仰臥時兩腳雖可稍伸然不能動恐不因附骨疽所致此是正月二日事也熟診之是附骨疽殘毒發動所致用葛根加朮附反鼻霜治之後長強骨邊痛甚而漫腫兩足跟及十指頭皆成黑色想已當死矣後暑熱隨退飲食稍進瘡口亦漸愈至九月天氣清爽時而大快然因久於伏臥腰腳強直如棒不能跪坐飲食可不論而兩便亦不通轉方烏頭湯兼用七寶丸另請推拿揉筋術故漸能屈伸至十月末復原勿誤藥室方函口訣本方條曰此方用於歷節之劇證有速效又白虎風痛甚者亦用之白虎風證詳於聖濟總錄謂以不可屈伸為目的一婦人臂痛甚不可屈伸晝夜號泣眾醫不能治余用此方得速效又腰痛數年不止如佝僂狀者少翁門人中川良哉用此方腰貼蕪菁膏而痊愈青州翁用於囊癰而奏效此方若少用甘草且不加蜜則無效因此二味能和血脈緩筋骨也橘窗書影曰一小孩八歲去年起右腳攣急不能行步漸致右臂骨突出經筋痛不可按其他如故概作肝證治與抑肝散之類余以為胎毒所流注如法使服烏頭湯蜜煎兼用化毒丸數十日攣痛漸緩得以起步矣余近治此證十人大抵以此法拔其痼疾但足病如枯柴或椎骨突出成龜背或兩足繚戾指甲橫斜者其初不可不慮之一婦人產後手中疼痛不解醫為風濕治之不愈余診曰身無寒熱而不走痛凝結腫起恐為瘀血流注所致與桂苓丸料加大黃附子外以當歸蒸荷葉礬石熨其痛處腫散痛和兩足平復但左手掌後腫後突出不得屈伸而痛甚與烏頭湯掌後貼蕪菁膏膿水出痛止而復常太陰病篇太陰病之注釋太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬玉函結作痞是也傷寒論註山田正珍曰三陰諸證多是平素虛弱人所病故傳變早而速也少陰篇云少陰病得之二三日以麻黃附子甘草湯微發汗因二三日無裡證故微發汗也可見三四日便兼裡證矣裡證者即自利腹痛之類如真武證等是也則知少陰雖曰表病求真按此少陰指少陰之表證也其稍重時則兼下利腹痛等證太陰者謂少陰之邪求真按少陰之邪為少陰表邪之略也轉入於裡者也求真按太陰病非因少陰之邪轉入於裡有因太陽病誤下者又有非因誤下而自然成之者又有自少陽變化者寒邪在裡則臟腑失職是以腹滿而吐食不下自利益甚時腹自痛也吐者有物由胃中反出食不下者胃脘不肯容也時腹自痛者謂有時自痛也時者何因得寒則痛得暖則止也自者何以內無燥屎也蓋陽明之腹滿痛由於內有燥屎故非得寒而發非得暖而止所以不同也可見時自二字非苟下也故後之論曰腹滿時痛者屬太陰也其義益明所謂若下之者謂粗工見其腹滿以為陽明之滿痛而妄攻下之殊不知此滿痛固屬虛寒與陽明實熱證大有攻救之別此必胸下結硬因裡虛益甚心氣為之鬱結故也前一百三十八條曰病發於陰而反下之因作痞是也求真按此腹滿雖與陽明證相似然與彼陽實證不同此因陰虛故唯腹壁膨滿攣急若按其內部則空虛無物且無抵抗而不熱也又吐而食不下似少陽柴胡湯然與彼因陽熱者不同是因胃筋衰弱之結果而停水使然自利益甚者不僅因腸筋痿弱而使停水且不能保持故也又時腹自痛者以水毒之侵襲為主故得寒即自痛得暖亦時自止也下之必胸下痞硬者以如是之虛滿證誤為陽明之實滿而瀉下之必至心下痞硬此即警戒誤下之辭也本條是說太陰病之大綱故以下所列諸方皆不出此定義之範圍然其證之劇者或有與少陰病或厥陰病兼發者此陰病所以與陽病不同也陽病有轉入轉屬合病等證然無兼發者例如太陽病轉入少陽或與陽明合病然無太陽病與陽明病或少陽病兼發也甘草乾薑湯之注釋傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯以攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽傷寒論註醫宗金鑒曰微惡寒者表陽虛而不能禦也方有執曰厥者謂四肢冷也程應旄曰得之便厥者真寒也咽中乾煩躁者假熱也類聚方廣義本方條曰此厥只因誤治致成一時激動而急迫之厥不比四逆湯之下利清穀四肢拘急脈微大汗厥冷也其甘草之分量倍乾薑者以緩急迫也觀咽乾煩躁吐逆證可以知其病情矣求真按脈浮自汗出小便數心煩微惡寒腳攣急者是表裡陰陽相半為桂枝加附子湯證故若據脈浮自汗出微惡寒證為純表證以桂枝湯發表者誤也若誤與之致四肢厥冷咽喉乾燥煩躁吐逆者是因誤治激動水毒而急迫故與本方以鎮靜緩和之可復其血行也肺痿吐涎沬而不咳者其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷必眩多涎唾甘草乾薑湯以溫之若服湯已渴者屬消渴金匱要略註肺痿吐涎沫不渴遺尿小便數皆因有水毒而無熱故謂此為肺中冷也必眩暈者因水毒之上衝急迫也餘雖不及解若服湯已以下謂肺痿證不渴者服本方後至於渴者是已非肺痿而轉化為消渴病矣甘草乾薑湯方甘草克乾薑克上細銼以水一合煎五勺去滓頓服先輩之論說吳遵程氏方注曰甘草乾薑湯即四逆湯去附子也辛甘合用專復胸中之陽氣其夾食夾陰面赤足冷發熱喘咳腹痛便滑內外之邪相合難以發散或寒藥傷胃宜合用理中不便於參朮者皆可服之真胃虛挾寒之聖劑也若夫脈沉胃冷嘔吐自利者雖不厥逆仍屬四逆湯也外臺秘要備急曰治吐逆水米不下者乾薑甘草湯求真按此即本方也求真按雖吐逆水米不下若無本方證則不可用之直指方曰乾薑甘草湯求真按是本方加大棗也治脾中冷痛嘔吐不食甘草乾薑湯治男女諸虛出血胃寒不能行氣歸元無以收約其血者魏氏家藏方曰二宜丸求真按此即本方之丸方治赤白痢為末蜜丸服傷寒緒論曰傷寒若心下結痛無熱證不渴不煩者此寒實結胸也甘草乾薑湯不效則用枳實理中湯實人三物白散求真按本方及枳實理中湯理中湯加枳實也證非寒實結胸也不可從之平易方曰頭暈吐逆胃冷生痰乾薑二錢半甘草一錢二分水煎服證治要訣曰飲酒過多而衄甚則用理中湯加乾葛川芎各半錢或止用乾薑甘草二味求真按飲酒過多而衄甚必不可用本方及理中湯又理中湯加乾葛川芎畫蛇添足也朱氏集驗方曰二神湯求真按此即本方也治吐血極妙男子婦人吐紅病蓋因久病或作急勞損其榮衛壅滯之氣上而血妄行所致若投以藕汁生地等之涼劑是必欲求其死耶求真按本方非吐血特效藥此說不可輕信東洞翁本方定義曰治厥而煩躁涎沫多者方機本方主治曰吐涎沫而不咳遺尿小便數者南呂求真按苓薑朮甘湯是胚胎於本方所以能治遺尿也可知矣足厥咽中燥煩躁嘔逆者吐下後厥逆煩躁無可如何者青州醫談曰甘草乾薑湯治毒迫心下而盜汗又治胸中痛左臥則左痛右臥則右痛等證者皆毒迫於心胸所致也宜與此方有氣上迫而喘咳汗出多證涎沫亦多吐者世醫不知以此方治汗此方所以能治汗者因氣逆盛毒自內外發故也因癇而角弓反張筋惕氣急息迫或叫呼者甘草乾薑湯可也百疢一貫曰用四逆湯而嘔甚者有與甘草乾薑湯而得效矣腹陷於脊而拘攣不論何種脈腹證若用於有急迫處良又以心煩為目的及脊筋等痛而心煩者亦有效分量可等分因玉函是等分也呃逆有急迫貌雖用橘皮竹茹湯然有與甘草乾薑湯而得大效者用甘草乾薑湯時若用四逆湯除附子亦可類聚方廣義本方條曰此方與生薑甘草湯雖同治肺痿然結果適得其反可知乾薑與生薑主治不同也老人平日小便頻數苦於吐涎短氣眩暈難以起步者宜此方勿誤藥室方函口訣本方條曰此方藥簡而用廣如傷寒之煩躁吐逆肺痿之吐涎沫傷胃之吐血等皆可用之又以此方送下黑錫丹治虛候之喘息及肺痿之冷證其人肺中冷氣虛不能溫布津液因而津液聚化為涎沫致唾多出然非如熱證者之唾凝而重濁也又不咳而咽必渴遺尿小便數者與此方有奇效又病人嫌服此方不咳只多吐涎沫而非唾者用桂枝去芍藥加皂莢湯有奇效又不煩躁而但吐逆難用苦味藥者用此方而弛緩有奇效人參湯理中丸之注釋傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便傷寒論註醫以理中千金作以人參湯復利不止千金作利不止皆是也茲隨解之服瀉下之湯藥而下痢不止心下痞硬者此不外於甘草瀉心湯證故服之病即輕快復以他藥誤下之至下利不止故治以人參湯然不僅無效反致下利益甚者因理中湯丸本係理治自心下至臍之部分此下利由於再三之誤治致臍以下之腸部虛衰若不以赤石脂禹餘糧湯收澀之則無可如何也然以此湯尚無效時則為腎機能障礙之結果不外於代償性下利也故用利尿劑而使利尿則下利自治矣尾臺氏曰若欲利其小便則可選用豬苓湯真武湯等此說是也可信霍亂頭痛發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之傷寒論註霍亂解在太陽病篇五苓散條頭痛發熱身疼痛等熱證多欲飲水者以五苓散主治之然無是等熱證反多寒狀而不好水者以本方為主治也大病瘥後喜唾久不了了者胃上有寒當以丸藥溫之宜理中丸傷寒論註方有執曰唾者口液也寒以飲言不了了者無已時之謂也醫宗金鑒曰大病瘥後喜唾久不了了者胃中虛寒不能運化津液聚而成唾故唾雖日久然無已時也宜理中丸以溫補其胃山田正珍曰按論中之寒字有對熱而言者有指留飲而言者有指痰而言者此條與小青龍湯條四逆湯條皆以留飲而言也胸痹心中痞留氣結在胸胸滿脅下逆搶心枳實薤白桂枝湯主之人參湯亦主之金匱要略註叢桂亭醫事小言曰胸中痞留氣結在胸而滿自下逆搶心用枳實薤白桂枝湯治之亦可用人參湯二方方意大異宜分緩急而用之類聚方廣義本方條曰按此條為枳實薤白桂枝湯之正證若係人參湯證而胸痹者可與人參湯雜病辨要胸痹條曰若心中痞逆滿搶心者枳實薤白桂枝湯主之若中氣虛寒逆而搶心心中痞胸滿者人參湯主之今由上三說觀之本條雖為枳實薤白桂枝湯之正證若胸痹有人參湯證亦可用之者因此證與彼之比較的實證不同既因陰虛證而轉化雖亦心中痞胸滿逆而搶心然皆比彼為緩弱余以此為結論可知本條之意矣人參湯理中丸方人參甘草朮乾薑各克上細銼以水二合五勺煎一合去滓一日分三回溫服又為細末以蜂蜜為丸一日分三回服但丸方不如煎劑之劑捷先輩之論說治驗千金方曰四順理中圓求真按此即本方也已產訖宜服此方新產藏虛所以養藏氣也求真按若有本方證則可與之不然即不可用後世家往往有此語病不可不慎傷寒六書曰誤下太陰而結胸項強因大陷胸丸一法者頻與理中丸求真按誤下太陰病無結胸之理亦無用大陷胸丸之語恐似是而非三因方曰病者因飲食過度而傷胃或胃虛不能消化致翻嘔吐逆而物與氣上衝蹙胃口而使決裂吐出所傷其色鮮紅心腹絞痛白汗自流名曰傷胃吐血理中湯能止傷胃吐血者因其效最能理中脘分利陰陽安定血脈也方證之廣如局方但吐血不出證學者當自知之或煮乾薑甘草湯飲之亦妙求真按吐血若是本方證則可處之不然者不可用甘草乾薑湯不外於本方之原方故有類似之效不難察之醫方選要曰理中湯治五臟中寒口噤失音四肢強直兼治胃脘停痰冷氣刺痛衛生寶鑒補遺曰仲景之理中湯治傷寒陰證寒毒下利臍下寒腹脹滿大便或黃或白或青黑或有清穀及寒蛔上膈而吐蛔者此因胃寒非實寒也求真按此非實寒者是暗示本方能治陰虛證之輕證而不能治重證也婦人良方曰人參理中湯求真按此即本方也治產後陽氣虛弱小腹作痛或脾胃虛弱而少思飲或去後求真按後大便也無度或嘔吐腹痛或飲食難化胸膈不利者直指附遺曰理中湯治柔痙之厥冷自汗聖濟總錄曰白朮丸求真按此即本方之丸方治小兒躽啼脾胃傷風冷心下虛痞腹中疼痛胸脅逆滿也又理中湯治風入腹心腹㽲痛痰逆噁心或時嘔吐膈塞不通赤水玄珠曰理中湯治小兒吐瀉後脾胃虛弱四肢漸冷或面有浮氣四肢虛腫眼合不開小青囊曰理中湯治噁心乾嘔欲吐不吐心下映漾如人畏船者又治小兒慢驚脾胃虛寒泄瀉及受寒而腰痛等症外科正宗咽喉門曰理中湯治中氣不足虛火上攻咽間乾燥作痛妨礙吐嚥及脾胃不健食少作嘔肚腹陰疼等症瘍醫大全曰理中湯治癰疽潰瘍臟腑中寒四肢強直者痘疹金鏡錄曰理中湯治痘因裡虛寒而泄瀉方後曰手足厥冷泄瀉甚者加附子名附子理中湯東洞翁本方定義曰治心下痞硬小便不利或急痛或胸中痹者方機本方主治曰心下痞硬者大簇心下痞喜唾不了了者南呂暑病所謂霍亂嘔吐下利心下痞硬者紫圓成績錄曰一男子項背強急或腰痛飲食停滯時時胸痛心下痞硬噫氣喜唾先生與人參湯兼用當歸芍藥散而愈求真按項背強急或腰痛者為當歸芍藥散證餘皆本方證也續建殊錄曰一婦人患胸痛一二年發則不能食食即不下咽手足微厥心下痞硬按之如石脈沉結乃與人參湯服之數旬諸證漸退胸痛痊愈求真按此所謂胸痹也古方便覽曰一男子一身悉腫小便不通心下痞硬鬱鬱不欲飲食以此方兼用三黃丸二十劑而愈證治摘要鼓脹條曰人參湯加附子腹平滿而大便滑者求真按本方主治之腹脹滿按之軟弱而有多少之冷感使仰臥之則側腹部膨起其脹滿即減退矣類聚方廣義本方條曰產後續得下利乾嘔不食心下痞硬而腹痛小便不利者及諸久病不愈見心下痞硬乾嘔不食時時腹痛大便濡瀉微腫等證者又老人每至寒暑時下利腹中冷痛瀝瀝有聲小便不禁心下痞硬乾嘔者皆為難治證宜此方若惡寒或四肢冷者加附子求真按本方中含朮乾薑甘草方意類似於苓薑朮甘湯以有小便不利或自利證也且本方證以老人為多勿誤藥室方函口訣本方條曰此方為治胸痹之虛證方然以理中丸為湯宜用於中寒霍亂太陰吐利證厥冷者宜從局方加附子朮與附為伍時有附子湯真武湯意效能驅內濕與四逆湯意稍異四逆湯是以下利清穀為第一目的此方以吐利為目的也橘窗書影曰一女子從來患痔疾脫肛不止灸數十壯忽發熱衄血心下痞硬嘔吐下利一醫以寒涼劑攻之而增劇余與理中湯而漸愈一醫欲以藥緩攻余答曰痞有虛實邪氣為痞宜用疏劑若胃中空虛客氣衝逆為痞者攻之有害古方瀉後膈痞者用理中湯又以理中湯治吐血洵有故也大建中湯之注釋心胸中大寒痛嘔不能飲食腹中寒上衝皮起出見有頭足上下痛不可觸近者大建中湯主之金匱要略註由余之經驗本方證之病者因屢見腹壁胃腸弛緩縱脹而胃與子宮因而下垂者甚多上衝皮起出見者是胃腸蠕動不安之狀隱見於皮表也有頭足上下者謂被氣體充滿之腸管成假性腫瘤狀出沒於上下左右也然仲景此論謂其發作之劇者未必通常如是也稻葉克禮云腹皮脹起如有頭足譬如推看以袋包樹枝也其痛發時為大寒痛嘔而不能食上下不可近手或大便秘或心胸大寒痛而上衝者時時如蛇或如鰻者游走腹中其頭似痛尾似患傷不能延伸之狀諸藥無效其餘所患因人而異都非此方不能治或腹常平穩發則腹皮如波紋者或平常按腹無別狀發時忽如塊物游走上下往來而疼不可近手者又時如小囊忽去來時而痛難忍忽似在腹中忽似迴於背來去無定所者如上說其休作有輕重緩急外變證亦多故宜就病者自述之然假令雖有如上述之症狀若不認腹中有寒即非本方證矣大建中湯方蜀椒克乾薑克人參克上細銼以水三合煎一合二勺去滓納膠飴一升再煎為一合一日分三回溫服但胃部有停滯膨滿感者及嫌忌甘味者飴宜減適量先輩之論說治驗東洞翁本方定義曰治胸腹大痛嘔而不能飲食腹皮起如有頭足者方機本方主治項中曰心胸間痛嘔而不能食者腹中寒上衝皮起出見有頭足上下痛而不可觸近者兼用紫圓求真按此陰虛證而兼用紫圓非也不可從之古方便覽本方條曰有一男子年七十餘胸滿心下痛發作有時或吐蛔蟲而不能食伏枕三月許余與此方病即愈求真按此方能治胃腸神經痛又能治蛔蟲古方之妙宜深味之一婦人年三十二飲食不進日漸羸瘦而患腹痛三月許諸醫作血積治或用藥以下瘀血病漸甚余診之臍旁有塊物如張手足心下及脅拘攣重按即痛不可忍輕按即若仿佛乃作此方與之病日消而痊愈方輿輗本方條曰此方用於蛔蟲之心腹痛有效一女子患傷寒瘥後腹痛大發余視其脅下痞硬與大柴胡及柴桂之類無寸效於是潛心脈之寸關洪大蓋因蛔所致即用鷓鴣菜湯及檳榔鶴虱散痛猶自若然病家懇請不能辭乃與大建中湯一帖知三帖能思食五帖痛若失此女腹中雖無大建中湯之定候然試之如神故記之以備參考求真按以此證為本方無定候不外腹診未熟所致不然曷得奏此奇效乎類聚方廣義本方條曰小建中湯治裡急拘攣急痛此方治寒飲升降心腹劇痛而嘔故能治疝瘕腹中痛者又能治挾有蛔蟲也千金作治心胸中大寒大痛嘔而不能飲食若飲食下咽則偏於一面下流有聲決決然若腹中寒氣上衝皮起出見有頭足上下而痛不可觸近其頭者勿誤藥室方函口訣本方條曰此方雖與小建中湯方意大異然因有膠飴一味建中之意明了矣治寒氣腹痛者莫如此方也蓋因大腹痛而衝胸有嘔狀腹中如塊凝結為目的故諸積痛甚自下而上者用之有妙效解急蜀椒湯治此方證之更劇者求真按解急蜀椒湯本方中去人參膠飴而與附子粳米湯之合方也此種去加法後世家之淺見也蜀椒之醫治效用本草綱目曰蜀椒求真按因產蜀者最良故有此名其實即山椒也氣味辛溫有毒主治六腑之寒冷心腹之留飲宿食腸澼下痢泄精散風邪瘕結水腫黃疸鬼疰蠱毒殺蟲魚毒別錄治頭風下淚腰腳不遂虛損留結破血下諸石水治咳嗽腹內冷痛除齒痛甄權破癥結開胸暖腰膝縮小便止嘔逆大明散寒除濕解鬱結消宿食通三焦暖脾胃殺蛔蟲止泄瀉時珍本草備要曰川椒辛熱純陽入肺發汗散寒治咳嗽入脾暖胃消食除脹治心腹冷痛吐瀉澼痢痰飲水腫治陽衰溲數泄精癥結下焦虛寒通經安蛔蟲見椒則伏殺鬼蛀最能殺勞蟲魚蟲毒肺胃素熱者忌服據上說觀之本藥為溫性刺激的殺蟲殺菌藥兼有健胃祛風解凝利尿作用吳茱萸湯之注釋食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也傷寒論註方有執曰食穀欲嘔者胃寒也山田正珍曰陽明二字本當作中焦乃對下文上焦句而言王叔和不知文法如是妄謂中焦即陽明胃腑之位遂改作陽明耳食穀欲嘔者胃中虛寒飲水淤蓄也吳茱萸溫中生薑逐飲即此故也按太陽下篇云傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之由是觀之屬上焦者乃胸中有熱之謂宜與小柴胡湯者也前一百五十四條為指小柴胡湯以治上焦之方亦可以為徵求真按山田氏說甚是本來此方為陰證之法劑故其主治為食穀欲嘔證然服之嘔反加劇者非陰證也明矣所以謂屬上焦暗示其以小柴胡湯為主治也因本方證是屬於內由下方迫胃小柴胡湯證是屬於外由上部迫之者且有寒熱之差但皆有嘔證甚相疑似判別不易故師托說本方之證治以示二方之類證鑒別也尚有稻葉克禮之腹證奇覽本方條云用柴胡而不能治者此證間有之因胸脅苦滿而嘔不已故也然胸脅苦滿而嘔者用柴胡而愈如柴胡證唯胸滿者是吳茱萸湯證也又由亡師之愛兒瀕於危篤用小柴胡加吳茱萸湯而得奇效觀之能窺其間之秘要故也然尾臺氏所著類聚方廣義本方條云得湯反劇者益與此方則嘔氣自止但一帖藥二三次服為佳此因注家徒執字句解不能有所知也學者宜親驗自得此以本方瞑眩之例證曲解本條者也不可妄從嘔而胸滿者茱萸湯主之金匱要略註以產吳國之茱萸為佳品故有吳茱萸之名茱萸即本名也嘔而胸滿者先嘔而後胸滿也則以嘔為主證而胸滿為客證矣與小柴胡湯之胸脅苦滿而嘔者不同須切記之不可失誤少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之傷寒論註本條載於少陰病篇雖屬至當茲因便利而列之其吐利手足厥冷者似於四逆湯證劉棟云下利清穀手足厥冷煩躁欲死者四逆湯主之嘔吐下利手足厥冷煩躁欲死者吳茱萸湯主之故吳茱萸湯以吐為主四逆湯以利為主也此下利二證之別不可不識又尾臺氏類聚方廣義本方條云吐利手足厥冷煩躁欲死者與四逆湯證相似而不同四逆湯以下利厥冷為主此方以嘔吐煩躁為主是其別也又治腳氣衝心煩憒嘔逆悶亂者如上說其間自有分別又張璐本方條下云為少陰兼厥陰之候也仲景單稱少陰病其實少陰病兼厥陰病可知乾嘔吐涎沬頭痛者吳茱萸湯主之傷寒論註亦載於厥陰篇然因與前條有連絡故列之乾嘔吐涎沫食穀欲嘔者與嘔而胸滿之三證同為水毒由內之下方迫於肺胃所致頭痛者此毒更上迫而侵及頭腦之劇證故仲景欲示此意不揭於太陰少陰篇而載於厥陰篇也然此頭痛續醫斷云證有主客者即物有主客也治其主者而客從矣故治法宜分主客也主者先見客者後出故吐而渴者以吐為主滿而吐者以滿為主也桂枝湯有頭痛有乾嘔吳茱萸湯亦有頭痛有乾嘔桂枝湯以頭痛為主乾嘔為客故頭痛在首吳茱萸湯以乾嘔為主頭痛為客故頭痛在末凡客者動而主者不動此頭痛不過是客證乾嘔實為主證也以之可以鑒別其類證矣吳茱萸湯方吳茱萸克人參大棗各克生薑克上細銼以水一合五勺去滓頓服先輩之論說治驗肘後方曰一方求真按此即本方也治人食畢即噫醋及醋心求真按噫醋及醋心吞酸嘈雜也聖濟總錄曰人參湯求真按此即本方也治心痛張元素曰吳茱萸湯之用有三去胸中之逆氣滿塞止心腹感寒之㽲痛消宿酒也東洞翁本方定義曰治嘔而胸滿心下痞硬者方機本方主治曰食穀欲嘔者方意以氣逆為主證吐利吐瀉也手足厥冷煩躁者乾嘔吐涎沫頭痛者南呂嘔而胸滿者紫圓腳氣上攻而嘔者紫圓若因水腫而嘔者非此湯所治也續建殊錄曰一某客嘗患頭痛痛則嘔發劇時語言不出但以手自擊其首家人不知其頭痛皆以為狂先生診之腹大攣恰如引線之傀儡狀蓋因頭痛甚有如狂狀也急與吳茱萸湯二帖藥盡疾愈一人卒發乾嘔醫與小半夏湯七日不瘥聲動四鄰於是迎先生診之心下痞硬四肢厥冷乃與吳茱萸湯三帖而愈一人初患頭痛次日腹痛而嘔手足厥冷大汗如流正氣昏冒時或上攻氣急息迫不能語言先生與吳茱萸湯諸證頓除既而困倦甚四肢擲席乃更與當歸四逆加吳茱萸生薑湯數日而瘳成績錄曰一男子卒然如狂捧頭踊躍如頭痛狀不能言語乾嘔目閉手足微冷面無血色周旋堂中不得少安先生與吳茱萸湯五六帖痊愈一男子乾嘔頭痛胸中㽲痛周身微冷面色青白先生與吳茱萸湯數帖稍緩兼用當歸芍藥散而痊愈餐英館治療雜話曰傷寒論有吐利手足厥冷煩躁欲死者吳茱萸湯主之之證已見於前矣雖與四逆湯證相同然四逆湯證吐利而元氣飛騰手足厥冷雖煩躁而元陽欲脫故手足之厥冷有自底下冷起之氣味且腹軟而心下無特別阻塞也吳茱萸湯之目的雖云手足厥冷然不惡冷且自手指表尖冷起者四逆之證自指裡冷起亦煩躁也又吳茱萸湯證必心下痞塞有物宜以此為目的因此痞塞阻其上下氣血往來之經脈故手足厥冷也此證傷寒論雖無脈然兩證之脈當絕或沉微沉細之類故若以脈辨證雖似相同實若冰炭也夏月霍亂吐瀉證吐利後間有手足厥冷煩躁等證世醫以為吐利後是虛寒證連進四逆附子理中等反增煩躁心下膨滿痞塞者非虛塞證也宜用吳茱萸湯以吳茱萸之苦味壓心下之痞塞則陰陽通泰煩躁已厥冷回此余新得之法也只宜以心下痞塞為標準手足自指表冷起為目的此證若黏汗出而脫陽者非附子則不治夏月雖宜出汗然通身出薄汗者則宜吳茱萸湯猶煩躁厥已回心下之痞雖開七八尚有少少之痞不除者宜活人書之枳實理中湯總之吐下後心下痞者枳實理中湯妙即理中湯加枳實也類聚方廣義本方條曰噦逆有宜此方者按外臺曰療食訖醋咽多噫也霍亂不吐不下心腹劇痛欲死者先用備急丸或紫圓繼投此方則無不吐者若已吐則無不下者矣已得快吐下則苦楚脫然其效至速也不可不知勿誤藥室方函口訣本方條曰此方主下降濁飲故治吐涎沫治頭痛治食穀欲嘔治煩躁吐逆肘後治吐酸嘈雜後世治噦逆凡危篤之證審因濁飲上溢而處此方其效難數吳昆加烏頭而用於疝此證自陰囊上攻有刺痛嘔惡等證凡一切上迫者皆可為目的又久腹痛吐水穀者此方加沉香有效又霍亂後轉筋加木瓜有大效求真按加沉香木瓜小策也橘窗書影曰一男子患梅毒瘥後頭痛肩背強急眼睛時時朦朧醫概為遺毒連用仙遺糧及汞劑血液枯燥胃中空虛一日大發嘔吐而絕食心下痞塞煩躁欲死眾醫驚辭余診曰體本無深毒因其人懼此病致醫過攻而生此變所謂割雞用牛刀也先平其胃而下嘔逆或可得其活路因作吳茱萸湯加半夏黃連官參三分二日嘔吐止食少進余仍前方不動某醫笑為頑固連服數旬頭痛肩背強亦隨而愈吳茱萸之醫治效用本草綱目曰吳茱萸氣味辛溫有毒主治溫中下氣止痛除濕血痹本經利五臟去痰冷逆氣飲食不消心腹諸冷絞痛中噁心腹痛別錄治霍亂轉筋胃冷吐瀉腹痛產後心痛遍身癬痹刺痛腰腳軟弱利大腸之壅氣腸風痔疾殺三蟲甄權下產後之餘血治腎氣腳氣之水腫通關節起陽健脾大明治痞滿胸塞咽膈不通好古開鬱化滯治吞酸厥陰之痰厥頭痛陰毒腹痛疝氣血痢喉舌口瘡時珍本草備要曰吳茱萸辛苦大熱有小毒燥脾溫中下氣除濕解鬱去痰殺蟲開腠理逐風寒治厥陰頭痛陰毒腹痛痛在少腹也嘔逆吞酸痞滿噎膈胃冷食積瀉痢血痹陰疝腸風痔疾腳氣水腫口舌生瘡衝脈為病氣逆裡急性雖熱而能引熱下行利大腸壅氣下產後之餘血然走氣動火昏目發瘡血虛有火者禁用由以上諸說觀之本藥之作用酷似於蜀椒然彼治水毒上攻之力微而此藥則力甚峻也乾薑附子湯之注釋下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之傷寒論註本條雖不合太陰病之定義然本方與甘草乾薑湯皆為四逆湯之原方故載之其大意論由汗下誤施表裡皆虛全陷陰證也晝日煩躁不得眠夜而安靜者非因瘀血也因瘀血者恐晝日明了至夜則譫語煩躁或病苦增進也見二卷小柴胡湯條不嘔者無少陽證也不渴者無陽明證也身無大熱者山田正珍云身無大熱者謂皮膚之表無翕翕之熱也如上說是無表熱之謂也類聚方廣義本方條曰乾薑附子湯因汗下誤施致變若是之證也與甘草乾薑湯之煩躁略相似然彼因誤治致病勢激動急迫此病因誤治而不加重又無急迫之證也唯精氣脫甚所以甘草與附子相易身無大熱一句以其頭面至於四未可見皆無大熱也此條宜參考梔子豉湯證以見其異此亦發本條之義者宜精思之乾薑附子湯方乾薑附子各克上細銼以水一合五勺煎五勺去滓頓服先輩之論說外臺秘要曰深師乾薑丸求真按此即本方之丸方治傷寒病啘不止也和劑局方曰薑附湯求真按此即本方也治暴中風冷久積痰水心腹冷痛霍亂轉筋及一切之虛寒並皆治之三因方曰乾薑附子湯治中寒卒然暈倒或吐逆涎沫狀如暗風手腳攣搐口噤四肢厥冷或復燥熱者求真按此燥熱所謂真寒假熱也易簡方曰薑附湯求真按此即本方也陰證傷寒大便自利而發熱者尤宜服之名醫方考曰附子散求真按此即本方之散劑治寒痰反胃者衛生寶鑒曰身冷脈沉數煩躁而不飲水者此名陰盛格陽以乾薑附子湯加人參半兩治之聖濟總錄曰附子散治小兒凍足爛瘡以附子二枚乾薑二兩搗羅為散入綿中裝如韈若有瘡膿即以臘月之豬脂塗之痘證寶箋曰朱子薑附湯求真按此即本方也痘出傳風眼直斜視牙關緊閉不可用祛風藥應服此方以解之東洞翁本方定義曰治下利煩躁而厥者方機本方主治曰煩躁不得眠脈沉微者四逆湯之注釋傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯以攻其表此誤也得之便厥咽中乾煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之傷寒論註本方證醫宗金鑒云若重發汗者謂不止誤服桂枝湯而更誤服麻黃湯也或復加燒針劫奪其汗以致亡陽證具時則非甘草乾薑湯所能治故又當與四逆湯急救其陽也若誤桂枝加附子證以桂枝湯發表至有甘草乾薑湯證者不在此例更與麻黃湯誤汗復加燒針奪取正氣因使表裡虛乏者則以甘草乾薑湯乾薑附子湯之合方如本方者應之傷寒醫下之續得下利清穀不止身疼痛者急當救裡後身疼痛清便自調者急當救表救裡宜四逆湯救表宜桂枝湯傷寒論註解在太陽病篇桂枝湯條病發熱頭痛脈反沉若不差身體疼痛當救其裡宜四逆湯傷寒論註尾臺氏曰按此章意義不明必有脫誤不可強解是本條有脫文明矣然醫宗金鑒云身體疼痛之下當有下利清穀四字方合當溫其裡觀太陽篇云傷寒醫下之續得下利清穀不止身疼痛者急當救裡宜四逆湯此雖未下但脈反沉故知裡寒必是脫簡又柯氏曰此太陽表證得少陰裡脈也宜以麻黃附子細辛湯發之若不差而下利清穀即有身體疼痛之表未解亦不可更汗當溫其裡宜四逆湯由此觀之則本條當是病發熱頭痛脈反沉與麻黃附子細辛湯若不差身體疼痛下利清穀當救其裡宜四逆湯也脈浮而遲表熱裡寒下利清穀者四逆湯主之傷寒論註此即真寒假熱證也故裡有真寒而現脈遲下利消穀雖表有假熱而使脈浮此脈浮表熱不可作為表證也自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩傷寒論註張兼善曰經言輩字者謂同類之藥性有輕重優劣之不同耳醫宗金鑒曰凡自利而渴者裡有熱屬陽也若自利不渴則為裡有寒屬陰也今自利不渴則知太陰本臟有寒故當溫之四逆輩者指四逆理中附子等湯而言也山田正珍曰臟字為泛指臟腑而言注家以為脾之一臟非也厥陰篇云下利欲飲水者以有熱故也白頭翁湯主之今自利不渴知其裡有寒也按自利而渴之一證間有津液內亡而然者惟其人小便不利則屬虛寒耳余嘗療不利煩躁小便不利者每用四逆輩屢收全效若徒以渴為熱以不渴為寒則為未盡然也所謂自利不渴為有寒者特語其常耳至於變證則未必盡然也求真按以其臟有寒之寒字有二義即一為寒冷之意一為水毒之義然水性本寒故所歸則一也又當溫之溫字亦有二義即一如字義一為除水毒也然去之則自溫暖矣故所歸亦一也全文之意凡自然下利不渴者屬於太陰病也內臟因有水毒而寒冷則選用四逆湯類似諸方以去此毒而使內臟溫暖者適當之處置也少陰病脈沉者急溫之宜四逆湯傷寒論註山田正珍曰按本節不說病證獨說脈者承上三條求真按上三條者指少陰病得之二三日口燥咽乾者急下之宜大承氣湯少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少陰病六七日腹脹不大便者急下之宜大承氣湯之三條也而發謂少陰病雖有如上三條所述若脈沉者不可下之急宜溫之也乃上三條雖名曰少陰可知其脈不沉矣再按少陰病之脈沉乃脈微細而沉也微細二字含蓄在少陰病三字中矣少陰病飲食入口則吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯傷寒論註山田正珍曰溫溫即慍慍古字通用當以慍慍為正膈上當作膈下脈經第七卷不可吐篇引此條云若膈下有寒飲乾嘔者不可吐當溫之本論勞復篇云胃上有寒當以丸藥溫之宜理中丸太陽中篇小青龍湯條云心下有水氣乾嘔合考之上字當作下字也復反也少陰病三字以始得之無熱惡寒而言謂少陰病飲食入口則心下慍慍欲吐反不能吐始得之手足寒其脈弦遲者此為邪氣實於胸中蓋邪實胸中則陽氣為閉不能通達於四末是以使人手足厥寒其脈弦遲也如是者當以瓜蒂散吐之素問所謂因其高者而越之是也若下之則於治為逆故曰不可下也厥陰篇第三百六十三條云病人手足厥冷脈乍緊者邪結在胸中心中滿而煩饑不能食者病在胸中當須吐之宜瓜蒂散蓋與本節同因而殊證耳按小柴胡湯之心煩喜嘔黃連湯之欲嘔吐乾薑黃連黃芩人參湯之食入口即吐者皆胸中有熱也吳茱萸湯之食穀欲嘔者中焦有寒也金匱大黃甘草湯之食已即吐者亦由胸中有熱也此條飲食入口則吐心中慍慍欲吐反不能吐始得之手足寒脈弦遲者此為邪氣實於胸中陽氣因之而閉故不論其寒熱以吐達其鬱閉也若其人手足厥冷不吐飲食惟乾嘔者此為膈下有寒飲蓋因脾胃虛寒不能轉化水漿也不可吐之宜以四逆湯急溫之中焦得溫寒飲自散矣類聚方廣義本方條曰少陰病飲食入口則吐云云者疑有調胃承氣湯證故曰不可下也按當吐之之下脫宜瓜蒂散四字又按千金方引此條溫溫作慍慍是也正字通曰慍心被鬱積而煩憒也此條之溫溫蓋謂噁心憤悶狀也又素問玉機真藏論曰使人逆氣背痛慍慍然王注曰不舒暢也張注曰悲鬱貌也至真要大論曰慍慍而復已萌也張注曰蘊積貌合觀之亦可發溫溫之義矣由此二說觀之可知本條之意矣大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之傷寒論註以下諸條本宜載於厥陰篇本篇所以列之者因與前記諸條有連帶關係也其意如山田正珍云內者腹內也此證脈微欲絕者主以通脈四逆湯也類聚方廣義本方條曰大汗出熱不去是脫汗也內腹中也脈經無又字由此可知本條之意矣大汗若大下利而厥冷者四逆湯主之傷寒論註成無己曰大汗與大下利內外雖殊其亡津液損陽氣則一陽虛陰勝故生厥逆與四逆湯固陽退陰也求真按此大汗若因大下利而亡失體液則致血行微細之結果而厥冷也下利腹脹滿身體疼痛者先溫其裡乃攻其表溫裡宜四逆湯攻表宜桂枝湯傷寒論註仲景雖列本條於厥陰篇反近於太陰病者也注釋詳太陽病篇桂枝湯條嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之傷寒論註山田正珍曰既云難治又處以四逆湯論中斷無此例疑非仲景之言吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之傷寒論註以下二條揭於霍亂病篇本條是論其裡寒外熱之甚者不可誤以汗出發熱惡寒為表證也既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絕者四逆湯主之傷寒論註山田正珍曰此是虛寒內盛陽氣外脫也四逆之上脫通脈二字一說云復利當作不利是也類聚方廣義本方條曰既吐且利云云疑四逆之上脫通脈二字求真按此二說是也脈微欲絕者不外於水毒急迫之劇則以增量乾薑之通脈四逆湯主治之當然之理也四逆湯方甘草克乾薑克附子克煎法用法同前先輩之論說醫林集要曰乾薑附子湯求真按此即本方也治傷寒陰證唇青面黑身背強痛四肢厥冷者以及諸虛沉寒等證濟生方曰薑附湯求真按此即本方也治五臟中寒口噤四肢強直失音不語或卒然暈悶手足厥冷者萬病回春曰凡陰證身靜而重語言無聲氣少難以喘息目睛不了了口鼻氣冷水漿不下大小便不禁面上惡寒有如刀刮者先用搜熨法次服四逆湯傷寒六書曰四逆湯治脈浮熱甚反灸之因火必動咽燥吐血東洞翁本方定義曰治四肢厥逆身體疼痛下利清穀或小便清利者方機本方主治曰手足厥冷者下利清穀者腹拘急四肢厥冷下利惡寒者大汗出熱不去拘急四肢厥冷者下利腹脹滿身體疼痛者古方便覽本方條曰世醫所謂中寒中濕及傷寒陰證霍亂等證若有厥冷惡寒下利腹痛等皆宜用此方又可用於一年或二年下利清穀不止者類聚方廣義本方條曰霍亂吐利甚者及所謂暴瀉證而急者死不崇朝若倉皇失措擬議誤策使人斃於非命其罪何歸乎醫者當研究於平素始可救急而濟變也大汗出熱不去云云可參考以下諸章霍亂病雖因外感蓋傷食也又有挾疝癥激動者其不吐不下胸腹劇痛者當先與備急圓紫圓以吐下之腹痛悶亂止而嘔不止藥汁不入者宜以小半夏加茯苓湯止其嘔吐下後頭痛發熱身疼痛渴而嘔吐小便不利脈浮數者宜五苓散前證吐利不止四肢微冷好熱飲者人參湯吐下止大熱大渴煩躁心下痞硬者白虎加人參湯前證頭痛汗出惡寒身體疼痛心下不痞硬者白虎加桂枝湯乾嘔不止冷汗厥逆轉筋腹痛脈微欲絕者宜用四逆湯苟精究攻伐之術治安之策不誤於施設而起其可起者豈難事乎四逆湯為救厥之主方也然傷寒之熱結在裡者中風卒倒痰涎沸湧者霍亂未吐下內猶有毒者老人食鬱及諸卒病閉塞不開者縱令全身厥冷冷汗脈微能審其證以白虎瀉心承氣紫圓走馬之類解其結通其閉則厥冷不治而自復若誤認為脫證遂用四逆真武則猶下井投石也庸工殺人常坐於此嗚呼方技雖小生死所關若無高才卓識者難以得其蘊奧也勿誤藥室方函口訣本方條曰此方為陰證正面之治法以四肢厥逆下利清穀等為主證其他假熱證有使冷服此方之法亦近於加豬膽汁之意也又此方加烏梅蜀椒名溫中湯治蛔厥附子粳米湯之注釋腹中寒氣脹雷鳴切痛胸脅逆滿嘔吐附子粳米湯主之金匱要略註金匱無脹字今從外臺加之腹中寒氣脹者腹中寒冷而為無形物之腹部脹滿也雷鳴切痛者水聲如雷鳴疼痛如切也胸脅逆滿者自下方向胸脅部氣張之謂也附子粳米湯方附子克半夏克甘草克大棗克粳米克上細銼以水二合五勺煎一合去滓一日分三回溫服先輩之論說治驗東洞翁本方定義曰治腹中雷鳴切痛嘔吐惡寒者方機本方主治曰治惡寒或手足厥冷而腹疼痛嘔吐者漫游雜記曰有一壯夫病梅毒七年兩腳拘攣不起易醫三十餘不愈因是漫然置之余偶至其地親故來請診氣色飲食如常其脈遲緩腹無他病唯臍下有一癖築築然余曰是疝也攻濕頻年為藥所脅沉結不解也與附子粳米湯三十日徐徐而腳伸時余將去書方與之曰服之勿怠一年後訊來言服二百日即愈有一婦人四十餘歲下利腰痛膝脛有時微腫脈沉結欲絕微喘潮熱食穀日僅一二盞腹底有癥瘕搖動則人事不省余曰此下利由於癥瘕腰間兼有積冷也與附子粳米湯囑曰戒酒色勿思慮若由酒色或思慮而復發者我不知也非藥之罪也服五十餘日病除八九其夫偶愛一女子婦人覺之妒忌忿恚數日諸證復發惶遽請余余曰病因忿恚不散用藥頗難如使該女子離去三日後再與粳米湯可也百餘日而愈腹證奇覽曰下脘以下繞臍周圍以及脅下腰間雷鳴切痛或嘔或瀉者附子粳米湯證是寒疝也必當於腹中腰間覺有冷氣且心下不痞硬是其別也求真按本方證若有嘔吐下痢時易疑於半夏瀉心湯證然彼為陽證而心下痞硬且雷鳴多在臍以上而疼痛不劇此為陰證心下不痞硬雷鳴多在臍以下而腹痛劇也類聚方廣義本方條曰孫思邈以此方治霍亂四逆吐少嘔多者有老工自脫套之手段也寒氣即水氣也若痛劇及於心胸者宜合大建中湯有奇效疝家留飲家多有此證求真按於前證用上合方而得奇效後世家去此合方中之人參膠飴名解急蜀椒湯不可從之勿誤藥室方函口訣本方條曰此方用粳米者主切痛也外臺腹痛用秫米一味可徵此方不僅寒疝之雷鳴切痛且宜於澼飲之腹痛甚者又外臺有用於霍亂吐瀉者求真按粳米不僅主切痛已也橘窗書影曰一人因過食魚肉心腹刺痛欲死與備急圓吐利數行痛稍安因與黃連湯一夜大發嘔吐飲食不能入口苦悶頗甚乃使服甘草粉蜜湯嘔吐漸收後發寒疝少腹急痛雷鳴甚迫於胸中自汗出欲絕先與附子粳米湯若發則兼用大建中湯數旬諸證全和人始蘇息一女子十九歲小腹有塊自心下至小腹拘急而痛時時衝逆而痛甚不可按默默不欲飲食脈微細足微冷醫為鬱勞與藥不愈余曰寒疝也乃與解急蜀椒湯服數日衝逆止小腹之塊稍減但腹裡拘急飲食不進因與小建中湯加蜀椒漸次快愈求真按用解急蜀椒湯非也當用附子粳米湯與大建中湯之合方薏苡附子散之注釋胸痹緩急者薏苡附子散主之金匱要略註以下六方雖不合太陰病之定義然皆屬於此類故載之本條之緩急者吉益南涯曰胸痹緩急者略舉胸痹證也緩急者所謂喘息咳唾有休作也尾臺榕堂曰緩急者謂痛有緩急也本草綱目薏苡仁條引金匱作周痹緩急按金匱水病篇曰身腫而冷如周痹狀今胸痹之痛有休作緩急者或一身痹而惡寒或浮腫疼痛者用之皆有效且此方與下方求真按下方指薏苡附子敗醬散也皆宜㕮咀而煮服更宜參看靈樞周痹篇又如丹波元堅曰此緩急主在急字非或緩或急之謂也史記倉公傳曰無可使緩急者袁盎傳一旦有緩急寧足恃乎游俠傳曰且緩急人所時有皆是一時切迫之謂足以為證淺田宗伯曰此方為散暝眩難堪煎服治胸痹急劇證腸癰急現脫候者亦可用之上可分為甲乙二說雖不明其是非然恐以甲說為是因甲說皆出於實驗而丹波氏以字義為先例也淺田氏亦然淺田氏有剽竊癖此余所以不能深信也薏苡附子散方薏苡仁附子各克上二味為末一日分三回服或細銼以水二合五勺煎一合去滓分三回溫服先輩之論說東洞翁本方定義曰治胸中痹惡寒或浮腫者用方經驗本方條曰與身體麻痹如隔靴搔癢或遍身生疣子之類有效薏苡附子敗醬散之注釋腸癰之為病其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈數此為腸內有癰膿薏苡附子敗醬散主之金匱要略註其身甲錯者謂腸癰病者之皮膚尤其是腹皮如魚鱗也腹皮急者其腹皮雖攣急然按之則軟如浮腫狀且腹內無凝結物其攣急度極微弱也身無熱脈數者凡數脈為有熱之候此證無熱而現脈數故曰身無熱脈數而示其為陰證也此為腸內有癰膿者凡有以上諸證者謂腸內有化膿證也薏苡附子敗醬散方薏苡仁克附子克敗醬克煎法用法同前小便當下先輩之論說治驗東洞翁本方定義曰治一身甲錯腹皮急按之濡如腫狀腹無積聚者鶴臺先生腹證圖錄本方條曰如圖腹脹似屬脹滿其身甲錯腹皮急按之濡此證間有之若方證不相對即經年亦不治一婦人二十七歲許患此證已三年諸醫術盡後請余治乃往診之腹滿身重如孕雖不敢臥然心煩而不能步行余因術未熟故見腹堅滿誤以大承氣湯攻之無效因轉與大柴胡凡半年亦無效病家憮然謂余曰足下常以古醫道自負而治吾婦病如此其無效將如何余聞之愧言行不能一致於是告師霍先生先生乃往診察責余曰汝術未嫻故後有病者乞治必須告我今此腹證大誤汝猶不知投以峻劑使病者受苦至不仁也夫大承氣湯之腹證堅滿按之有力且腹底有抵抗又大柴胡湯證胸脅苦滿腹實少有拘攣今病者雖腹滿按之濡且腹底無力身甲錯腹皮急此即薏苡附子敗醬散之正證也而汝所投之藥方孟浪甚矣余惶恐謝過慎與薏苡附子敗醬散不滿二旬而愈嗚呼先生之腹診術可謂微妙矣於是診察病者必告先生朝夕受教自東洞先生復古後霍先生嫻其術以傳於余可謂大幸矣後治此病八九人咸得速效後有人以余稱古方家來舍多以古書試余然不才惟學傷寒論耳因侮余甚一日問余曰鵝掌風何以治之答曰余未知名鵝掌風者因問其故曰手足皮癢俗稱水蟲者余曰雖言其外狀然須按其腹證方可言方藥其人許諾且云我治此證百發百中也足下不知可傳之翌日引病人來余乃候其腹曰薏苡附子敗醬散證也其人大嘆息曰我之奇方即此也世醫知者鮮初謁足下時疑為大言者今知誤矣後屬余門下問醫事頗努力用方經驗本方條曰兼治遍身有瘡癤如癩風肌膚不仁不知痛癢者類聚方廣義本方條曰此方與大黃牡丹皮湯同為治腸癰之方有輕重淺深之分不俟論矣彼云小腹腫痞痛如淋此云腹皮急按之濡如腫狀彼云時時發熱自汗出復惡寒此云身無熱彼云脈遲緊此但云數可見證有輕重而毒所結亦有淺深也腸癰可針者當認肌層甲錯處入針若猶豫曠日則腐潰蔓延膿自臍孔出荏苒而不愈或致不起也審斷膿之淺深其淺者速入針為要腸內二字宜活看方伎雜志曰一女子十九歲乞診視之病人云去年麻疹後各處皆痛如痛風然治療之止發無定遷延之間水氣出而腹痛甚又更醫醫云誤治矣決不能逐水氣務宜先以補劑補元氣復精力則水氣自治矣雖服其藥自覺精神日衰耳診之自腹迄於面部四肢皆腫小腹之右方底部有釀膿之情形謂之曰若取其膿十日亦恐不保病家驚而吐舌謂前醫未有言有膿者但以補元氣逐水氣為治於是頻乞用針謂之曰余知即用針於一月後恐出膿後十日亦不能保然死生數也故以鈹針下寸許則膿吹出於是用薏苡附子敗醬散瘡口插入如細筆管者下盛以杯雖日日出瘀膿但精神漸脫十一日而斃此皆因醫者辨證不明含糊治療致病毒增劇或變化為他證而成不治者醫殺之也豈不可嘆哉橘窗書影曰一人年六十餘少腹凝結覺微痛小便淋瀝而不通快若步行則小腹攣急苦於汗出身無寒熱飲食如故邸醫以為寒疝或為淋毒療數旬無效余診曰腸間有一種壘壘然之凝固物然無疝塊無積聚按之濡活似腸癰狀宜溫和之以觀其進退因與歸建中湯以溫啟熨熨臍下四五日臍中忽突出赤色其夜臍中噴出白膿一合餘即投薏苡附子敗醬散二三日膿盡小腹之塊若失敗醬之醫治效用本草綱目曰敗醬根氣味苦平無毒別錄曰鹹而微寒權曰辛苦微寒而酸時珍曰微苦帶甘主治除癰腫浮腫結熱風痹產後痛別錄治毒風𢂽痹破多年之凝血能化膿為水止產後諸病腹痛餘疹煩渴甄權治血氣心腹痛破癥結催生落胞血運鼻衄吐血赤白帶下赤眼障膜弩肉聤耳瘡癤疥癬丹毒排膿補瘻大明由此觀之則本藥為消炎解凝排膿性之利尿藥而帶有驅瘀血作用也天雄散之補遺失精家少陰脈弦急陰頭寒目眩髮落脈極虛芤遲者為清穀亡血失精脈得諸芤動微緊者男子則失精女子則夢交桂枝龍骨牡蠣湯主之天雄散亦主之金匱要略血痹虛勞病證治篇天雄散方天雄龍骨各克朮克桂枝克上為細末以酒一回克許一日三回服用或以水三合煎一合去滓一日三回分服不知稍增之有此方而無證其用途不明東洞翁本方定義曰治失精臍下有動上衝惡寒小便不利者又按失精家小便不利臍下有動或惡寒或衝逆者主之是以本方以此說為主目的參照他說運用之可也今錄東洞翁之論據如下藥徵曰天雄散金匱要略載在桂枝加龍骨牡蠣湯條後而不載其證李時珍本草綱目曰此仲景治男子失精之方也然則舊有此證而今或脫也男子失精女子夢交桂枝加龍骨牡蠣湯主之下當云天雄散亦主之以余觀之時珍之見豈以朮附為治失精夢交乎此則觀於本草可以知之蓋失精夢交水氣之變故以朮為主藥也先輩之論說類聚方廣義本方條曰治老人腰冷小便頻數或遺溺小腹有動者陰痿病臍下有動或小便兼白濁者嚴禁入房服此方不過一月必有效作湯用反良勿誤藥室方函口訣本方條曰此方治桂枝加龍骨牡蠣湯之屬陰寒者一人常苦陰囊冷時精汁自出者此方為丸藥長服而愈芎歸膠艾湯之注釋師曰婦人有漏下者有半產後因續下血都不絕者有妊娠下血者假令妊娠腹中痛為胞阻膠艾湯主之金匱要略註尾臺氏著類聚方廣義本方條曰此條當做四段讀曰漏下也曰半產後續下血不絕也曰妊娠下血也曰妊娠腹中痛也金鑒曰胞阻者胞中氣血不和阻其化育也然則本方為主治子宮出血之頗甚者流產後惡露雖盡尚續子宮出血不止者妊娠中子宮出血者妊娠中腹內疼痛者胞阻者子宮內有阻礙也芎歸膠艾湯方芎藭阿膠甘草各克艾葉當歸各克芍藥克地黃克上細銼以水酒各一合煎一合去滓一日分三回溫服但用水煎加酒服亦可又忌酒者水煎亦可芎歸膠艾湯之腹證因方中有芍藥甘草腹診上雖認為腹直肌攣急然與由於其他原因者不同若因於瘀血者則其攣急限於左側故雖似於桂枝茯苓丸證然不如彼有桂枝故無上衝之候無茯苓故無心悸心下悸肉瞤筋惕證又與彼有桃仁牡丹皮異而含有芎藭當歸艾葉故彼治比較的實證性瘀血而此主陰虛性瘀血也故腹部之實狀不如彼一般軟弱無力也臍下雖有瘀血塊亦軟弱微小也雖然因有地黃則煩熱著且有臍下不仁證有阿膠為治脫血頗有力也先輩之論說東洞翁本方定義曰治漏下腹中痛及吐血下血者按凡治吐血下血諸血證者男子與婦人無別求真按余之經驗本方主治吐血不如主治下血也方輿輗本方條曰妊娠下血一應者任其下可也如不止名曰漏胞此證恐將胞乾子死又妊娠中有忽然下血者不速治必致墜胎以上二證雖緩急異勢皆宜芎歸膠艾湯且此湯不僅下血妊娠雜證效用甚多千金卷三妊娠諸病篇引曰治妊娠二三月上至七八月其人頓仆失踞胎動不安傷損腰腹而痛欲死若有所見及胎奔上搶心短氣方又數墜胎者吾師以此為保孕之藥求真按本方有效於傷胎墜胎者雖如二說若無如上之腹證不可輕用之假令妊娠腹中痛因下血而腹痛者此證用膠艾湯千金方已注明矣求真按本方治下血有腹痛無論矣即不下血而有腹證時亦能主治腹痛不可偏執明薛立齋曰大產求真按生理的分娩也如栗熟自脫小產求真按流產也如生採之破其皮殼斷其根蒂也半產後所以有下血不絕證也然大產後亦有下血不絕者凡治血須看其色紫色為舊瘀血任其下可也紅新血也亟宜止澀之策然紫者已盡紅必繼之紅盡則淡勢必然也宜斟酌治之血如屋漏水沉黑不紅或時來時斷或如水或有塊淋瀝不休者虛候也不可誤與寒涼之藥如脈浮脫宜用附子此方載於千金卷三名大膠艾湯方後云治婦人產後崩傷下血過多虛喘欲死腹中激痛下血不止者之神方主治詳明卻超原論類聚方廣義本方條曰孕婦顛躓胎動衝心腹痛引腰股或胎覺萎縮狀或下血不止者宜用此方胎不殞者即安若胎殞者即產治腸痔下血綿綿不止身體萎黃起則眩暈四肢無力少腹刺痛者若胸中煩悸心悸鬱結大便燥結者兼用瀉心湯黃連解毒湯血痢不止無腹滿熱實證唯腹中攣痛唇舌乾燥者此方間有效求真按腹痛引腰股或覺胎有萎縮狀身體痿黃起即眩暈四肢無力腹滿無熱實證者為用本方之眼目宜精思之婦人妊娠每有墮胎者有每產不育者此證始終宜服此方更能於五月以後嚴慎枕席可免不育之患若浮腫小便不利者宜當歸芍藥散求真按習慣性流產之原因頗多若無上記之腹證不可用本方勿誤藥室方函口訣本方條曰此方為止血之主藥故不僅用於漏下胞阻也千金外臺用於妊娠跌仆傷產及打撲傷損及諸失血又千金之芎歸湯局方之四物湯雖皆祖於此方然其妙效在於阿膠之滋血艾葉之調經加以甘草之和中也是以先輩之四物湯可謂板滯不靈矣芎藭之醫治效用本草綱目曰芎藭根氣味辛溫無毒主治治中風入腦頭痛寒痹筋攣緩急求真按筋攣緩急者筋肉之攣縮或急或緩也金瘡婦人血閉無子本經除腦中之冷動面上游風去來目淚出涕唾多忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中去內寒別錄腰腳軟弱半身不遂胞衣不下甄權一切風一切氣一切勞損一切血補五勞壯筋骨調血脈破癥結宿血養新血吐血衄血溺血腦癰發背瘰癧癭贅痔瘻瘡疥長肉排膿消瘀血大明燥濕止瀉痢行氣開鬱時珍本草備要曰川芎辛溫乃為血中之氣藥助清陽開諸鬱潤肝燥補肝虛上行頭目下行血海搜風散瘀調經止痛治濕氣在頭血虛頭痛腹痛脅風氣鬱血鬱濕鬱血痢寒痹筋攣目淚涕多及癰疽瘡瘍男婦一切血證然香竄辛散能走泄真氣單服久服使人暴亡由以上諸說觀之本藥為溫性強壯藥有去貧血性瘀血之特能當歸之醫治效用本草綱目曰當歸根氣味苦溫無毒杲曰甘辛溫無毒主治咳逆上氣婦人漏下絕子諸惡瘡瘍金瘡煮汁飲之本經溫中止痛除客血內塞中風痙汗不出濕痹中惡客氣虛冷別錄嘔逆虛勞寒熱下痢腹痛齒痛女人瀝血腰痛止崩中補諸不足甄權治一切風一切氣補一切勞破惡血養新血大明治頭痛心腹諸痛潤腸胃筋骨皮膚治癰疽排膿止痛和血補血時珍主痿躄嗜臥足下熱而痛氣逆裡急腹痛腰溶溶如坐水中好古本草備要曰當歸甘溫和血辛溫散內寒苦溫助心散寒治虛勞寒熱咳逆上氣血和則氣降澼痢便血曰澼頭痛腰痛心腹諸痛散寒和血風痙無汗痿痹癥瘕癰疽瘡瘍氣逆裡急腹痛滿腰溶溶如坐水中及婦人諸不足一切血證陰虛陽無所附者潤腸胃澤皮膚養血生肌血旺則肉長排膿止痛使血氣各有所歸故名如以上諸說所示本藥之作用殆與芎藭無異然強壯作用則勝之此其別也艾葉之醫治效用本草綱目曰艾氣味灸百病可作煎止吐血下痢下部䘌瘡婦人漏血利陰氣生肌肉辟風寒使人有子別錄搗汁服止傷血殺蛔蟲弘景主衄血下血膿血痢任用水煮及丸散蘇恭止崩血腸痔血搨金瘡止腹痛安胎苦酒作煎治癬甚良搗汁飲治心腹一切冷氣鬼氣甄權治帶下止霍亂轉筋痢後寒熱大明治帶脈病腹脹滿腰溶溶如坐水中好古溫中逐冷除濕時珍本草備要曰艾葉苦辛生溫熟熱純陽之性能回垂絕之元陽通十二經走三陰太少厥理氣血逐寒濕暖子宮止諸血溫中開鬱安胎治吐衄崩帶腹痛冷痢霍亂轉筋殺蛔治癬苦酒煎服灸之能透諸經治百病血熱病者禁用由以上諸說觀之則本藥為溫性收斂性止血藥兼有強壯作用矣當歸芍藥散之注釋婦人懷孕腹中㽲痛當歸芍藥散主之金匱要略註懷孕者妊娠也㽲痛之㽲緩緩之義也婦人妊娠腹內攣痛者雖以本方為主治然此證未必皆以本方為主治恐腹中㽲痛之上省略其證之二字婦人腹中諸疾痛當歸芍藥散主之金匱要略註婦人腹內有諸種之急痛者以本方為主治也然此證未必皆以本方為主治亦恐省略有其證等字當歸芍藥散方當歸芎藭各克茯苓朮各克澤瀉克芍藥克上為細末一日三回分服或增量二倍以上以水二合五勺煎一合去滓一日分三回溫服但腹痛不劇無下痢者不增量芍藥當歸芍藥散之腹證仲景不過示本方宜用於婦人之腹痛然本方用途不如是少也苟有腹證不論男女老少一切之病證皆可用之實一日不可缺之要方也余由經驗歸納之本方類似芎歸膠艾湯其主治亦相似所異者彼有當歸川芎之外因有地黃阿膠艾葉故止血作用頗有力此僅有當歸芎藭其作用比較的微弱也然反於彼而含茯苓朮澤瀉故有治冒眩心悸心下悸肉瞤筋惕小便不利之特能是以本方能奏效於腦神經肌肉心腎子宮等疾患也腹證亦相酷似然此證本因水毒停蓄故腹部稍軟弱而胃內必有停水且他體部亦得認為停水之候此其別也先輩之論說治驗三因方曰當歸芍藥散治妊娠腹中絞痛心下急痛及產後血暈內虛氣乏崩中久痢常服之則通暢血脈癰瘍不生消痰養胃明目生津註此血暈腦貧血也崩中子宮出血也消痰去胃內停水也明目治弱視也元和紀用經云本為六氣經緯圓能祛風補勞養真陽退邪熱緩中安和神志潤澤容色散邪熱溫瘴時疫安期先生賜李少君久餌藥後仲景增減之求真按增減用量也為婦人懷孕腹痛之本方註補勞本方治肺結核疑似證也使潤澤容色者此方治貧血之結果也而陳言謂退邪熱散溫瘴時疫然由余之經驗本方解熱作用不顯著僅能治有微熱耳此說不可妄信續建殊錄曰某人患腹痛來謁先生自手按其腹良久曰余得斯疾醫索四方吐下針灸無不極盡其術然百治無效遷延七年矣今請公賜診雖死無怨先生診之自臍旁至胸下攣急㽲痛日夜無間乃與當歸芍藥散三日沉疴頓去求真按吾國用此方殆自南涯氏始余用之者亦氏治驗之賜也婦人年二十三左腳攣急百日許一日上攻吐而不能言語醫作腳氣治不效先生診之胸腹有動自小腹至胸下攣急小便不利乃作當歸芍藥湯求真按此即本方之煎劑與之二帖上攻稍弛言語復常腹痛依然因與硝石丸求真按是大黃芒硝之丸方也食頃二便通快尿色如血諸證漸除月餘痊愈求真按自小腹至胸下攣急是左腹直肌攣急也尿色如血者瘀血自泌尿器排泄之證一婦人足趾疼痛不得步行一日腹中攣急上衝於心絕倒不知人事手足溫脈數兩便不通與當歸芍藥散小便快利色如血諸證頓除求真按是仲景所謂厥陰病即腦貧血之劇者成績錄曰一男子腹痛七年上迫胸背請先生治與當歸芍藥湯服十五六帖下黑血而愈一男子六七年來病腹痛湯液丸散鑱石蹻引求真按鑱石用於治療之砭針也蹻引與導引同按摩也無所不至未見小效遂來求治先生診之腹中攣急不能俯仰痛引胸背其腹如刺胸背如嚙與以當歸芍藥湯時調下消塊丸以漸而愈一人病鼓脹一醫以大黃劑攻之其脹自如短氣腹痛倍於前日先生診之脹自胸肋起波及於心下小腹其氣沸騰搶胸勢如激波日晡潮熱大便秘結或咳或眩飲食如平日使塾生診之皆曰其治一在大黃芒硝先生與以當歸芍藥散告曰若日散莞蓄之氣疏滯瘀之血則病必愈病者買藥去服之三日瀉下數回約去水五六升數日脹減半然迫氣未除仍用前方兼消塊九未幾而愈求真按實證有虛候虛證有實候若不達自得之域則往往易失正鵠學者不可不勉焉一婦人日食三十餘次每食不過一二口腳以下不遂已二年許胸下攣急時迫心下先生與以當歸芍藥散而愈一男子眩而不能立胸下急痛肩背強大便秘結飲食如故先生投以當歸芍藥湯諸證頓治求真按肩背強急必非葛根湯之主治可知一賈人當行路時人誤踏其足遂為跛躄眾皆以為腳氣因延先生診之無短氣倚息證腹痛上迫時時上竄神氣將亂乃用當歸芍藥湯小便通快色如皂角汁躄亦隨愈險證百問曰兩腳或一腳乍大酸痛不能步行如是凡二三日或十日許用藥即止不用亦止然或每年一二發遂成沉疴矣師曰兩腳或一腳大酸痛云云頃有一婦人患此證不能步行數月遂痛近胸腹而腹攣痛飲食俱吐小便不利唇口乾燥氣息短迫人事不知自心下至小腹手不可近醫以為腳氣投藥數劑無寸效余診之胸中無動悸短氣有緩急非腳氣衝心證也乃以當歸芍藥散作湯液與之服三帖痛退腹中雷鳴小便快利其色紫黑忽知人事好飲不吐翌日腹滿大便不通兼以消塊丸大便下黑血腹滿頓退服煎劑十餘日行步如常青州醫談曰當歸芍藥散之腹候臍旁有拘攣其痛推右移左按左移右痛徹心下或背之七八椎也求真按青州氏為南涯翁之門人故於仲景學說多有心得雖未可悉從然其言可味也類聚方廣義本方條曰治妊娠產後下利腹痛小便不利腰腳麻痹無力者或眼目赤痛若下利不止惡寒者加附子若不下利大便秘者加大黃求真按下利不止雖惡寒者不可輕加附子有婦人經斷已三四月診之腹中攣急胎不應手或腹中㽲痛類於血瘕孕否難決者用此方加大黃則二便快利不過十日腹中鬆軟矣若懷孕者胎氣速張又懷孕已累月胎萎縮不長腹中拘急者亦宜此方婦人血氣痛小便不利有宜此方者求真按婦人之胃及子宮痙攣有宜用本方者多奇效眼目赤痛證其人心下有支飲頭眩涕淚腹拘攣者又宜此方求真按此眼赤痛證只赤痛流淚耳非炎證之劇者可知脫肛腫痛出水不止者有奇效求真按脫肛若為胃腸肌弛緩之一分證即水不出來者亦可用本方有奇效黃土湯之注釋下血先便後血此遠血也黃土湯主之亦主吐血衄血金匱要略註消化器或泌尿器之出血先有大小便而後出血者為由深部之出血以本方為主治也然出血不問自深部或淺部若存下記之腹證皆可用之余嘗用本方治痔出血也治吐血衄血血尿子宮出血亦然黃土湯方甘草地黃朮附子阿膠黃芩各克灶中黃土克上細銼以水二合五勺煎一合去滓一日分三回溫服黃土湯之腹證本方證因裡虛而陰陽相半故腹部軟弱無力心臟及腹部大動脈雖虛悸黃土證心下雖痞滿黃芩證然臍下不仁而無力地黃附子證外表則煩熱惡寒或煩熱地黃證與惡寒附子證交互四肢殊以手掌足蹠煩熱厥冷交代尿利減少地黃朮附子證瀉下頗易殆常現諸種之出血地黃阿膠黃芩黃土證概在諸病之經過中或出血持久後致成此證者故一般有貧血衰弱之候脈亦準之多沉弱也先輩之論說治驗方機本方主治曰下血四肢不仁或冷痛者下血手足煩熱心煩不得眠者吐血衄血若有前證則以此湯主之續建殊錄曰有一婦人兩腳酸痛自膕至膝臏見紫色筋婦云有時臍下悸上突胸間劇則精神變亂此時紫色處倏隱倏現先生使服黃土湯因是下血而苦疾全解求真按止血劑反變驅血劑可謂神妙矣成績錄曰一男子年二十餘喘咳數日時時咯血脅下結硬旁有動先生診之與黃土湯四五日血止咳未解乃與小柴胡湯諸患已愈後復發咳於是作芩甘薑味辛夏仁湯與之而愈求真按與小柴胡湯誤治也一男子久咳數月胸中痛時少吐血巨里動甚微盜汗出且下血亦二三次面無血色羸瘦骨立先生與黃土湯兼赤石脂散而愈用方經驗本方條曰婦人崩血不止男子下血久久不愈面色萎黃掌中煩熱爪甲乾色求真按乾色恐為褪色之誤脈數胸動或見微腫者得效是禁血之劑不可漫投求真按一切方劑不可漫投況附子劑乎類聚方廣義本方條曰治吐血下血久久不止心下痞身熱惡寒面青體瘦脈弱舌色刷白或腹痛下利或微腫者又治臟毒痔疾膿血不止腹痛濡瀉小便不利面色萎黃日漸羸瘠或微腫者橘窗書影曰一婦人傷寒數日不解一日下血數行或如豚肝或時漆黑數塊脫下四肢厥冷汗出喘鳴欲絕余與黃土湯下血止一婦人暑疫數日不解虛羸煩熱脈微細手足微冷不能飲食僅啜米飲少許耳元氣稍復食少進一日下黑血過多舌上乾燥而身發熱精神恍惚殆至危篤余作黃土湯使服之一晝夜下血止精神爽然矣求真按上二治驗為腸傷寒之腸出血之劇者然本方有如是之速效西醫以為何如黃土之醫治效用本草備要曰伏龍肝重澀調中止血燥濕消腫辛溫調中止血去濕消腫咳逆反胃吐衄崩帶尿血遺精腸風癰腫醋調塗催生下胎為釜心多年之黃土腹證奇覽曰有傳欲得黃土之真物須由山野僻地之民家以不雜他土之生土作灶燒用不斷凡廿餘年其色紫者水乾七次去砂石灰澄清用之上黃土一味名龍肝散功能如下龍肝散之功能可用於心痛反胃中惡等證腋臭小兒臍瘡頻塗亦可用之小兒重舌和醋塗又產後惡血攻心而痛者以酒服二錢崩漏帶下吐血咳血及催生下胞衣有大效子玄子產論曰病候曰逼心下嘔吐者治法曰以虎翼飲伏龍肝汁煎服一婦臨月嘔吐不止請子為之且說以坐草子先與伏龍肝汁不復嘔矣由以上諸說觀之則本藥為溫性收斂藥有鎮嘔止血之特能少陰病篇少陰病之注釋少陰之為病脈微細但欲寐也傷寒論註山田正珍曰但字之下脫惡寒二字宜補之因原文所說但者示無他事之辭也如但頭汗出餘無汗不惡寒但熱及溫瘧身無寒但熱等語可見少陰病豈得以但欲寐之一證盡之乎若以但欲寐為少陰病則所謂太陽病十日已去脈微細而嗜臥者亦名少陰病耶其為缺文也明矣但惡寒者所謂無熱惡寒者是也故麻黃附子細辛湯條云少陰病始得之反發熱通脈四逆湯條云少陰病反不惡寒可見無熱惡寒乃少陰之本證也凡外邪之中人也其人屬實熱者則發為太陽其人屬虛寒者則發為少陰寒熱雖不同然均是外感之初證耳故太陽篇辨之云發熱惡寒者發於陽也無熱惡寒者發於陰也此二發字是示其初證也今邪從虛寒之化故其脈微細但惡寒而欲寐也與麻黃附子甘草湯微發其汗也求真按山田氏謂麻黃附子甘草湯者云少陰病有表證之處也非謂治少陰病之全體也不可誤之上說甚是本條宜作少陰之為病脈微細但惡寒欲寐也故假令一切之病證苟有此證候時皆宜作少陰病而施治之以下所載諸方亦不外此義然其證劇者不無兼發厥陰病不可忘之少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便色白者以下焦虛有寒不能制水故令色白也傷寒論註本條似非仲景之正文然能示少陰病之病形故列之凡陰病者為新陳代謝機能之沉衰若此病漸達高度時更使其機能衰減因使尿中少固形成分故尿中清白也附子湯之注釋少陰病得之一二日口中和背惡寒者當灸之附子湯主之傷寒論註醫宗金鑒曰背惡寒者為陰陽俱有證如陽明病無大熱口燥渴心煩背微惡寒者乃白虎加人參湯證也今少陰病但欲寐得之二三日口中不燥而和其背惡寒者乃少陰陽虛之背惡寒而非陽明熱蒸之背惡寒也故當灸之更主以附子湯也魏荔彤曰少陰病三字中含有脈沉細而微與但欲寐之見證卻不發熱只該背惡寒此為少陰裡證之確據也全篇亦視此句為標的求真按二說雖俱是然口中和者是味覺與平常無異也宜附加之少陰病身體痛手足寒骨節痛脈沉者附子湯主之傷寒論註太陽病之身體骨節痛必脈浮今雖身體骨節痛然手足寒而脈沉則以少陰病之本方為主治也附子湯方附子克茯苓芍藥各克人參克朮克上細銼以水二合五勺煎一合去滓一日分三回溫服先輩之論說治驗東洞翁曰附子湯治身體攣痛小便不利心下痞硬或腹痛者求真按治身體攣痛者附子芍藥朮也療小便不利者附子茯苓朮也醫心下痞硬者人參作用也附子湯方是真武湯之去薑加參者也真武湯條下有心下悸頭眩身瞤動證則此湯證有脫證也明矣求真按本方雖不可無心下悸頭眩身瞤動證然不過是客證故仲景不言及之方機本方主治曰脈微細其背惡寒者身體痛手足冷骨節痛脈沉者應鐘身體痛小便不利仲呂心下悸或痞硬者成績錄曰一男子兩腳疼痛不得屈伸手足寒腹拘攣食頗減羸瘦尤甚時時痔血二三升他無所苦先生與附子湯疼痛退拘攣緩食亦進能行步唯有痔血乃投黃連解毒散而止古方便覽本方條曰一僧年三十六請余診治曰貧道二十前後患淋疾二三年愈後諸證雜出此後腰下冷如在冰雪中雖盛夏須覆重絮每發時心腹㽲痛而手不得動腰脊痛痙而不得反側甚則不能息又忽忽少氣終夜不安席大抵每夜必發且自幼即有痔漏自初患至今經十四年矣余診以心下悸痞硬腹皮拘攣乃使飲附子湯及平水丸時時以紫圓攻之服半歲許諸證痊愈一婦人年五十餘患胸痹飲食無味身體尪羸半歲許不愈余診之心下痞硬心悸小便少即作人參湯及三黃丸使飲之二十餘日未見其效病者欲速乃更他醫醫視之率爾灸臍旁忽心腹切痛下利數十行臭穢不可近殆至欲死於是復召余乃以大承氣湯下之五六日諸證頓退飲食倍前七八日小便不利遍身浮腫心下痞硬腹皮拘攣余又用附子湯及平水丸三十日諸證痊愈一十歲兒脊梁曲而傴僂兩腳攣急不能起已二年矣余以此方及紫圓使飲之兩月痊愈類聚方廣義本方條曰治水病遍身腫滿小便不利心下痞硬下利腹痛身體痛或麻痹或惡風寒者金匱妊娠病篇曰婦人妊娠六七月脈弦發熱其胎愈張腹痛惡寒者小腹如扇所以然者子臟開故也當以附子湯溫其臟按扇扉也正字通曰戶之開合猶如鳥羽之翕張故從戶從羽今驗之妊娠六七月間小腹時時縮張而為痛者多發熱惡寒小便不利若用附子湯當歸芍藥散則小便快利脹痛速瘥又按愈張者恐為翕張之誤此條似張氏之口氣用之即有效學者試之真武湯之注釋太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲擗地者真武湯主之傷寒論註山田正珍曰擗地二字諸說紛紜按字典云擗音僻類編仆也正字通云躃與辟通又字典擗字注云通做辟合考之躃擗辟三字通用所謂擗地者即躃地也蓋字以音為本形則亞之若音既同則互相通用而不泥於字義又按脈經作仆地字異而義同宋版注云擗一作僻是亦同音故通用耳此條謂太陽病以麻黃青龍輩大發其汗其人充實者當汗出復常矣若虛弱者汗出表證罷病仍不解發熱心下悸頭眩身瞤動欲仆地者此因汗出多亡陽故也雖有發熱非表不解之發熱也乃虛火上炎之發熱也即後世所謂真寒假熱者是也心下悸者胃陽虛水飲停蓄也頭眩者頭中之陽虛也靈樞衛氣篇所謂上虛即眩是也身瞤欲仆者經中之陽虛也求真按頭眩身瞤欲仆者由陽虛者無論矣然水毒之侵襲與大有力焉茯苓桂枝白朮甘草湯條所謂發汗則動經身為振振搖是也此為表裡上下俱虛之候故與真武湯以復其陽行其水也求真按患太陽病者身體虛弱或誤發其汗或身體壯實因誤汗雖汗出病猶不去病者續發其熱此非表證之發熱少陰之發熱也心下悸身體亦肉瞤筋惕震顫而欲倒地上者為表裡俱虛若已陷於少陰者則以本方為主治也與傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之相似而有陰陽虛實之別不可誤也少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之傷寒論註尾臺氏曰玉函或小便利作或小便自利按或下利者當作或不下利否則與上文自下利語不相應故也或下四證亦皆為本方所治也此說是也或以下宜看作或咳或小便自利或不下利或嘔者真武湯主之餘不及解真武湯方茯苓芍藥生薑各克朮克附子克煎法用法同前先輩之論說治驗傷寒緒論曰不得眠者皆為陽盛切禁溫劑惟汗吐下後虛煩脈浮弱者因津液內竭則當從權用真武湯溫之醫史攖寧生傳曰宋可與之妻暑月身冷自汗口乾煩躁欲臥泥水中伯仁診其脈浮而數內之豁然而虛數曰此為陰盛格陽得之於飲食生冷坐臥風露者煎真武湯使冷飲之一進汗止再進煩躁去三進而平復如初易簡方曰真武湯不惟陰證傷寒可服若虛勞之人憎寒壯熱咳嗽下利皆宜服之因易名為固陽湯求真按雖虛勞之人憎寒壯熱咳嗽下利然不認為陰證則不可漫然服本方東洞翁本方定義曰治心下悸身瞤動振振欲擗地腹痛小便不利或嘔或下利者方機本方主治曰腹痛消塊小便不利四肢沉重疼痛下利或咳或嘔者心下悸頭眩應鐘身瞤動振振欲擗地者舌上乾燥而生黑苔口中有津液身熱頭眩手足振振或下利者紫圓求真按陽證舌之黑苔以舌上乾燥口中亦乾燥而決無津液者陰陽虛實宜判別之成績錄曰一僧年三十許胸中煩悶數日吐下黑血診之脈沉微腹滿小便難手足浮腫沉重不仁大便日二三行默默不欲飲食食即停滯胸間入腹則氣急腹滿殊甚其狀如世所謂黃胖病者先生與真武湯百患悉治一婦人腹痛硬滿攣急時時發熱小便不利手足微腫微咳目眩已百餘日一醫投大柴胡湯諸證日甚熱亦益熾先生診之與以真武湯一二日熱退利止經五六日小便快利而腫隨去食亦漸進腹已不痛目亦不眩但硬滿攣急如故兼以當歸芍藥散諸證痊愈古方便覽本方條曰一男子年四十二患下疳瘡後左半身不遂手足顫掉欲擲地且兼發癇十日五日必一發食時使人代哺之仰臥蓐上已三年矣余診之自小腹至心下硬滿心悸而拘攣乃作此方及三黃丸與之時時以備急圓攻之服一月癇不發又作七寶丸服之每月一次凡七次而痊愈求真按自小腹至心下硬滿者即右腹直肌攣急之謂也類聚方廣義本方條曰治痿躄病腹拘攣腳冷不仁小便不利或不禁者腰疼腹痛惡寒下利日數行夜間尤甚者此稱疝痢宜此方又久痢見浮腫或咳或嘔者亦良產後下利腸鳴腹痛小便不利肢體酸軟或麻痹有水氣惡寒發熱咳嗽不止漸成勞狀者尤為難治宜此方方伎雜志曰某人年四十乞診云二三年來氣分非常不舒而食無味夜不安眠診之面色青黑一身無滋潤氣少有水氣舌色刷白聲嘶息迫脈不浮不沉但無力如綿所謂游魂行尸狀重患也余說明之使病人有所覺悟先與真武湯半歲許少有氣力息迫亦緩聲音漸出矣冬月腰痛自腳至少腹麻痹而息又迫轉八味丸料通計一年而全快因思縱令難證而盡力治之亦有得效者醫人之於術不可不勉焉勿誤藥室方函口訣本方條曰此方以內有水氣為目的而與其他附劑不同此因水飲心下悸身瞤動振振欲擗地或覺麻痹不仁手足牽引或水腫小便不利其腫虛濡而無力或腹以下有腫而臂肩胸背羸瘦其脈細或浮虛而大心下痞悶而飲食無味者或四肢沉重疼痛下利者用之有效方名宜從外臺及千金翼作玄武也橘窗書影曰一人旅行後嬰瘟疫醫療之數十日不解微熱水氣脈沉微四肢微冷精神恍惚但欲寐余診曰病在少陰因與真武湯加人參二三日精氣大復微熱已解而食大進調理數旬而愈余每逢此等證不論熱之有無與真武加人參每每奏效或難曰異於仲師之旨也余曰唯認其為少陰病與真武湯附子湯等之正方耳況發熱一證真武湯中具載耶一婦人年垂七十自春至夏頭眩不止甚則嘔逆欲絕脈沉微兩足微腫醫二三療之不愈余與真武湯兼用妙香散數日目眩大減起居得安矣通脈四逆湯之注釋少陰病下利清穀裡寒外熱手足厥逆脈微欲絕身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之傷寒論註本條之病證山田正珍曰此亦少陰兼病厥陰者寒邪太盛陽氣虛脫也是四逆湯證之更劇者反不惡寒四字對少陰病言之此證外雖發熱然非表有實邪也乃後世方書所謂無根之虛火上泛也若以此湯救其虛脫則瘥矣或字以下則為所兼之客證耳裡寒外熱四字說其因也非謂其證也雖為四逆湯證之更劇者然所窮極者不外為該湯證之急迫虛脫皆劇也故亦如四逆湯主用甘草且增量乾薑之本方以應之中醫之強心療法緩和無害同時下利清穀手足厥逆腹痛乾嘔等亦皆治愈矣下利清穀裡寒外熱汗出而厥者通脈四逆湯主之傷寒論註本條亦少陰病兼厥陰病者汪氏云下利清穀者為裡寒也外熱者為身微熱兼汗出也此為真陽之氣外走欲脫也因虛脫而脫汗者則有脈微欲絕之候也明矣通脈四逆湯方甘草乾薑各克附子克煎法用法同四逆湯先輩之論說心法附錄拔萃曰附子理中湯求真按此即本方也治中風無汗而身涼者東洞翁本方定義曰治四逆湯證而吐利厥冷甚者方機本方主治曰吐利汗出發熱惡寒四肢厥冷脈微欲絕或腹痛或乾嘔或咽痛者通脈四逆湯主之類聚方廣義本方條曰通脈四逆湯比諸四逆湯則其證更劇面赤色以下則兼證也疑其人之下脫一或字霍亂治略曰下利甚嘔腹中水鳴或腹痛小便不利四肢冷或攣痛者真武加半夏湯真武湯小半夏湯之合方下利不止厥冷煩躁四肢轉筋腹拘急面青肉脫眼凹聲嘶者四逆湯隨證宜用四逆加人參湯宜用直根人參下利轉筋益甚厥冷過臂膝精神衰弱脫汗綴珠脈微細或沉伏不見者通脈四逆湯前證心胸氣閉乾嘔甚或發呃逆者宜通脈四逆加豬膽汁湯無豬膽時可用極上熊膽此證多死若下利乾嘔皆止厥冷煩躁轉筋自汗呃逆不止小便不利者宜茯苓四逆湯此證亦多死然用此方而小便通利至於大便帶黃色諸證漸退有回生者白通湯及白通加豬膽汁湯之注釋少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生傷寒論註少陰病下利脈微者可與白通湯服此湯尚下利不止四肢厥逆脈沉微而難觸乾嘔煩躁者為白通加豬膽汁湯之主治也服此湯後脈暴出者則必死微現持續者回生也尾臺氏曰按疑此條下利之下脫腹痛利不止下脫若字此方證比四逆湯證則下利稍緩且無清穀大汗四肢拘急等急迫證故不用甘草也蔥白陶弘景曰治傷寒頭痛陳子良曰止陰毒腹痛此說是也可從之白通湯方蔥白克乾薑附子各克煎法用法同前白通加豬膽汁湯方蔥白克乾薑附子各克豬膽或熊膽克上細銼以水一合五勺煎五勺去滓和豬膽頓服以上二方原方加人尿童便今去之先輩之論說活人書曰病人有譫語者有鄭聲者鄭聲為虛宜用溫藥白通湯主之譫語為實須調胃承氣湯主之求真按譫語者未必以調胃承氣湯為主治名醫方考曰白通加人尿豬膽汁湯求真按此即白通加豬膽汁湯久坐濕地則傷腎腎傷則短氣腰痛厥逆下冷陰脈微者宜此方東洞翁此二方定義曰白通湯治下利腹痛厥而頭痛者白通加豬膽汁湯治白通湯證而厥逆乾嘔煩躁者餐英館治療雜話白通加豬膽汁湯訣曰一切大吐瀉後面色眼彩屬於虛寒而厥冷其冷發自指裡完全不背虛寒而心下有膨滿煩躁證夏月霍亂亦間有之脈微欲絕或全絕世醫於此證雖知用附子理中等回陽藥然忘治心下之膨滿故藥無效此時宜用此方有十倍參附理中之效夫大吐瀉後何故心下痞塞乎究其病源因大吐瀉後脾胃暴虛氣與餘邪相搏結而聚心下故用此方以附子乾薑回陽以豬膽汁壓痞塞以蔥白溫下元用人尿鎮墜下行之品引腎中欲飛騰之陽氣而歸源以一方而四能備仲景之制方其精密如此如何世之庸盲者豈不知耶且此方不僅有效於霍亂吐瀉證凡中風卒倒小兒慢驚及其他一切暴卒病脫陽證等亦能建奇效總以心下為目的而用之為要今僅舉其效能之一隅耳圓機活法存乎其人蔥白之醫治效用本草備要曰蔥生者辛散熟而甘溫故發汗解肌以通上下之陽氣治傷寒腹痛陰毒腹痛益目睛利耳鳴通二便氣通則血治故治吐血衄血便血痢血折傷出血乳癰風痹通乳安胎婦人妊娠傷寒以蔥白一物湯發汗安胎加薑亦佳通氣故能解毒解藥毒魚肉毒蚯蚓毒塗猘犬傷由此觀之則本藥為溫性興奮藥而有殺蟲殺菌作用熊膽之醫治效用本草備要曰熊膽苦寒涼心平肝明目殺蟲治驚癇瘛瘲通明者佳性能辟塵撲水上塵投膽米許則豁然開矣一本堂藥選曰熊膽療癥瘕疝痞痃癖心胸痛腹痛傷食不吐不下癲狂瘧疾痢疾殺蟲止嘔吐發痘瘡疳疾驚癇妊脹腹痛產後腹痛催生點眼去翳塗痔止痛用於一切之急病以喚起元氣開通蔽塞由以上諸說及余之實驗觀之則本藥為有力之興奮藥而有鎮痙鎮痛解毒等之特能又有時現鎮嘔催吐緩下之作用實醫家不可一日或缺之要藥也桃花湯之注釋少陰病下利便膿血者桃花湯主之傷寒論註本條之病證汪氏云此條乃少陰中寒即成下利證下利便膿血者雖協熱者多然今謂少陰病下利則必脈微細欲寐而復下利也下利日久至於便膿血者乃裡寒滑脫也錢氏曰見少陰證下利者為陰寒之邪在裡濕滯下焦大腸受傷也故皮折血滯變為膿血滑利下脫故以溫中固脫之桃花湯主之尾臺氏云便膿血者是腸垢求真按是指黏液與血同出也病源痢候中所謂膿涕耳腸癰與下利真膿血不同如上所言為大腸黏膜下行結腸以下糜爛破潰下痢黏血便因而有衰弱脈微細但欲寐之病情也少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之傷寒論註本條之病證錢氏云自二三日至四五日為陰邪在裡氣滯腸間故腹痛也下焦無火氣化不行故小便不利且下利不止則小便隨大便頻出膀胱不得瀦蓄小便不得分利也下利不止者氣虛不固而大腸滑脫也便膿血者邪在下焦氣滯不流而大腸傷損也此屬陰寒虛利故以澀滑固脫溫中補虛之桃花湯主之腹痛者因腸潰瘍面為病的異產物刺激而引起小便不利者因下利不止消耗體液也下利不止者因於腸管麻痹故用溫性收斂劑之本方以治之也下利便膿血者桃花湯主之金匱要略桃花湯方赤石脂克乾薑克粳米克上細銼以水一合五勺煎五勺去滓納赤石脂末克頓服之若一服愈餘勿服先輩之論說東洞翁本方定義曰治腹痛下利便膿血者方輿輗本方條曰此方用於膿血痢久不止者便膿血痛在小腹者良求真按本方證為大腸黏膜潰瘍故其痛在下腹部也蓋膿血痢有陰證陽證之別陽證有柏皮湯求真按是後世方也白頭翁加甘草阿膠湯陰證有桃花湯柏皮湯已如前粗辨之矣桃花求真按是略湯字赤禹求真按是赤石脂禹餘糧湯之略也痛在小腹此與素有裡熱者痛及小腹之下而已成裡寒腸滑等時乃桃花湯之陰證也因是痢疾痛在小腹者縱令有裡熱亦以赤石脂阿片之類止之為良求真按有裡熱時雖縱令痛在小腹不可用赤石脂阿片也此時熱勢大減不渴只膿血甚者用桃花湯其利膿血不甚而下利尚不止者宜赤石脂禹餘糧湯此時若誤陽證之柏皮湯而用此陰證之桃花赤禹則更加腹滿或為氣腫或為氣塊或為痿躄鶴膝諸證宜細辨之不可有誤此余所試驗也後閱本事方已有載之且為丸用但效驗遲鈍故不如從論煎湯也若有嫌惡此湯者宜隨分以輕劑服較為有利痢疾經久如陰證者其痛在大腹是理中四逆白通等方之所也不可用赤禹之類又經久無腸滑只下真膿血者桃花湯之正證也求真按此方以黏血便為目的非主真膿血也以常下血無膿無痛亦可知之下重亦有裡寒者非一概熱證也蓋痢有始終不痛者逐毒乎止利乎決其可止者有後重謂但有下重者又遺尿也遺尿者謂十次有二三次也故有後重亦有遺尿者當遏止之大概屬陽證者赤物多白物少若係裡寒用赤石脂者多帶白物此謂腸滑而非後重也類聚方廣義本方條曰按乾薑分量甚少可疑外臺載阮氏桃花湯作赤石脂八兩粳米一升乾薑四兩余多用此方吳儀洛曰服時再加末方寸匕者以留滯固腸胃也痢疾累日後熱氣已退脈遲弱或微細腹痛下利不止便膿血者宜此方若身熱脈實嘔渴裡急後重等證猶存者當先隨證以疏利之劑驅逐熱毒蕩滌腸胃也若執腹痛下利便膿血證而用此方及禹餘糧湯等方者猶關門養盜其患寧可測耶學者思之求真按此說有理可信勿誤藥室方函口訣本方條曰此方千金為丸用至極便利也膿血下利非此方則治若有後重則非此方之所主也宜用白頭翁湯後重而大腹痛用之則有害又此方與禹餘糧湯稍有不同病專下焦稱腸滑者宜赤石脂禹餘糧湯也赤石脂之醫治效用本草備要曰赤石脂甘溫故益氣生肌調中酸澀故收濕止血固下療腸澼泄痢崩帶遺精腸痔潰瘍收口長肉催生下胞本藥不外於過格魯兒鐵故有收斂止血止瀉作用然無益氣生肌催生下胞之能故不可不取舍之赤石脂禹餘糧湯之注釋傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便傷寒論註在人參湯條赤石脂禹餘糧湯方赤石脂禹餘糧各克上細銼以水一合五勺煎五勺去滓頓服先輩之論說幼科發揮曰自大腸來者則變化盡而成屎但不結聚而所下皆酸臭也宜禹餘糧湯求真按此即本方也方機本方主治曰下利小便不利者小腹痛小便不利者若下利者百疢一貫曰有一種腸滑證續下而腸胃失固者此證無毒以臍下微痛為目的用赤石脂禹餘糧湯類聚方廣義本方條曰治腸澼滑脫脈弱無力大便黏稠如膿者若腹痛乾嘔者宜桃花湯又合用二方亦妙禹餘糧之醫治效用本草備要曰禹餘糧甘平性澀能固下治咳逆下痢血閉血崩又能催生由此說觀之則本藥有收斂作用也明矣厥陰病篇厥陰病之注釋厥陰之為病消渴氣上撞心心中疼熱饑而不欲食食則吐蛔下之利不止傷寒論註厥陰病者吉益南涯曰厥者謂其病之暴迫也血氣暴迫上攻內位者謂之厥陰消渴氣上撞心心中疼熱饑不能食此其候也陽明與厥陰均是暴急者也厥起上行直在內位外不循氣四肢厥逆此為陰氣暴劇之狀因名曰厥陰陽明者陽氣明實故曰陽明而不曰明陽也厥陰者厥而有陰狀故曰厥陰不曰陰厥也吉益羸齊曰裡極而無實狀也先於表裡之位血氣不行而成厥狀內之血氣不循於外而上迫極則血氣不得止卻反下行而現下利致成陽狀也故設厥陰篇示其極後不實而上迫有見陽狀者如上所述因陰證之極病毒迫於上半身而及頭腦致現消渴渴雖飲水然尿利不增進者心中疼熱等證且雖感空腹然不欲飲食強食時則吐蛔蟲若誤下之遂致下痢不止也一言盡之此因陰虛證而致上熱下寒之劇者是也傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死傷寒論註本條山田正珍云傷寒脈遲句下當有發熱二字可與下文反與黃芩湯徹其熱語相應蓋黃芩湯本為治太陽少陽合病之方豈可用於不發熱者耶徹與撤通除去也經典通作徹除中者謂中氣翦除也除中反能食者胃氣將絕引食以自救也如上說脈遲發熱者為陰證之發熱所謂真寒假熱證是也誤與黃芩湯除去其熱致腹中冷卻不能飲食至當也今反能飲食者稱為除中恰如燈火將滅一時反加明者必死也凡厥者陰陽氣不相順接便為厥厥者手足厥冷是也傷寒論註山田正珍曰陰陽之氣不相順接者謂血氣痞塞不能升降所謂天地不交否者是也嘗考和蘭解體書人身血行有二一起心臟以順行周身是謂動脈一起動脈盡處受動脈之血逆行還入於心是謂血脈求真按靜脈也更出更入如環無端若有痞塞則出者不入入者不出厥逆於是發脈道於是絕乃至於死也所謂陰陽二字蓋動脈血脈是也病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也傷寒論註本條解如金鑒曰病者手足厥冷言我不結胸者是大腹不滿惟小腹滿按之痛也論中有小腹滿按之痛小便自利者是血結膀胱證小便不利者是水結膀胱證手足熱小便赤澀者是熱結膀胱證也此則手足冷小便數白知是冷結膀胱證也程氏曰雖發厥不結胸然小腹滿作實結痛者則似可下矣然下焦結多冷不比上焦結多熱也況手足厥而上焦不結惟結於膀胱關元處耶故曰冷結也錢氏曰關元者任脈穴也在臍下三寸求真按本條是暗示厥陰病冷結膀胱者不可瀉下之所以也另示桃核承氣湯抵當湯之瘀血結在膀胱者大黃甘遂湯之水與血結在膀胱者大承氣湯之熱結膀胱者之鑒別法也傷寒發熱下利厥逆躁不得臥者死傷寒論註陰證之極裡寒外熱下利厥逆加躁不得安臥者必死也傷寒發熱下利至甚厥不止者死傷寒論註厥不止者謂服藥無效則至死必然也傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也傷寒論註山田正珍曰不利便者當作小便不利有陰無陽故也六字係後人之言此說是也傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死傷寒論註山田正珍曰濡程應旄改作滿是也若腹濡脈虛而厥則皆無可下之理而曰不可下則為無謂矣此說亦是可信傷寒脈促手足厥逆者可灸之傷寒論註山田正珍曰以灸挽回陽氣繼以四逆輩可也此說亦可信傷寒四五日腹中痛若轉氣下趣少腹者此欲自利也趣成本作趨傷寒論註本條山田正珍曰此乃心下有水漬入腸中為利之兆蓋承厥而心下悸條求真按傷寒厥而心下悸者指先宜治水宜服茯苓甘草湯條也而發也俚語有之腸鳴者必下蓋喻事必有前兆也此條之意與一百五十七條生薑瀉心湯證曰脅下有水氣腹中雷鳴下利同是有水而雷鳴也金匱曰腹中寒氣雷鳴切痛者附子粳米湯主之此條亦宜用粳米湯不可用生薑瀉心湯也水雖則一然證有痛與不痛之別也自患傷寒四五日腹內疼痛水鳴自上方下走於下腹部者必為下利之先兆也附子粳米湯證雖如山田氏說然此湯與生薑瀉心湯不但有痛與不痛之差且有陰陽虛實之別也不可不追加之下利手足厥冷無脈者灸之不溫若脈不還反微喘者死傷寒論註本條宜作下利手足厥冷無脈者灸之不溫若服白通加豬膽汁湯而脈不還反微喘者死也下利清穀不可攻表汗出必脹滿傷寒論註山田正珍曰下利清穀者為裡寒甚宜與四逆湯溫之雖有表證不可發汗汗出則表裡俱虛中氣不能宣通故令人脹滿求真按脹滿即腹脹滿也亦四逆湯證也下利後脈絕手足厥冷晬時脈還手足溫者生脈不還者死不還之下玉函千金有不溫二字是也傷寒論註本條下利後脈絕手足厥冷服通脈四逆湯晬時脈還手足溫者生脈不還手足不溫者死也晬時者證類本草弘景云晬時周時也即今旦至明旦也方有執云晬音醉晬時周時也即一晝夜也傷寒下利日十餘行脈反實者死傷寒論註金鑒曰傷寒下利日十餘行則正氣虛矣其脈當虛今反實者邪氣盛也正虛邪盛故主死也山田正珍曰素問玉機真藏論曰泄而脈大脫血而脈實皆難治嘔家有癰膿者不可治嘔膿盡自愈傷寒論註金鑒云心煩而嘔者內熱之嘔也渴欲飲水而嘔者停水之嘔也今嘔而有膿者此內有癰膿故曰不可治嘔嘔俟膿盡而自愈矣此是體內有化膿性疾患而有嘔吐膿汁者決不可鎮吐而以適方排膿膿盡時則嘔吐自治矣傷寒噦而腹滿視其前後知何部不利利之則愈傷寒論註因呃逆而腹滿者視病者之前小便後大便知因何者不利以適方利其不利則呃逆腹滿皆自治矣然噦而腹滿恐是腹滿而噦之誤何則有因腹滿而呃逆者然未有因呃逆而腹滿之理也又若非腹滿為主呃逆為客則下文視其前後知何部不利利之即愈數句全無意義矣烏梅圓之注釋傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非為蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩此為藏寒蛔上入膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅圓主之又主久利傷寒論註成無己曰藏厥者死陽氣絕故也蛔厥者雖厥而煩然吐蛔已則靜不若藏厥而躁無暫安時也病人藏寒胃虛蛔動上膈聞食臭出因而吐蛔與烏梅丸溫藏安蛔希哲氏曰此為藏寒蛔上入膈故煩十字為一句藏寒者胃寒也古書有指府為藏者不可拘泥也醫宗金鑒曰傷寒脈微而厥者厥陰之脈證也至七八日不回手足厥冷更加通身膚冷躁無暫安時者此為厥陰陽虛陰盛之藏厥非陰陽錯雜之蛔厥也若是蛔厥其人當吐蛔今病靜而復時煩者不似於藏厥之躁無暫安時則知為蛔上入膈故其煩須臾復止也得食而吐又煩者是蛔聞食臭出故又煩也得食蛔動而嘔蛔因嘔吐出故曰其人當自吐蛔主以蛔厥之烏梅圓也又主久利者此藥之性味酸苦辛溫寒熱併用故能解陰陽錯雜寒熱混淆之邪也喻氏曰脈微而厥可知陽氣衰弱矣然未能定其為藏厥蛔厥也惟膚冷而躁無暫安時者乃為藏厥用四逆湯及灸法而厥不回者則死矣參照上之四說可知本條之義矣烏梅圓方烏梅細辛附子桂枝人參黃柏各克乾薑克黃連克當歸蜀椒各克上細銼以蜂蜜及米糊為丸一回克許一日三回服用先輩之論說治驗內科摘要曰烏梅丸治自胃府發咳咳而嘔嘔甚則長蟲出聖濟總錄曰烏梅丸為產後冷熱劑治久下不止也方輿輗本方條曰吐蛔證先哲已有論之或為寒或為熱其治法由此丸分出雖似各有確見然余以此藥由寒熱各性錯綜成方即是立方之妙旨故余常守故規不為一味之去加而屢得巧驗茲舉一二例以證之一人年二十餘久患蟲積腹痛更醫數人不效上嘔下泄羸困頗甚余以此丸為料用之十餘帖而痊以此丸為料用不載於書又不見世醫為之頃讀陳復正幼幼集成以烏梅丸方為末水煎十分之一亦可此說可謂先得我心矣百疢一貫曰以烏梅圓煎劑亦有效蛔證雖有臟寒熱病之分病末吐蛔多難治而死此處後世有用理中安蛔湯者即古方之烏梅丸也類聚方廣義本方條曰胃反噤口痢間有宜此方者以生薑汁湯送下為佳勿誤藥室方函口訣本方條曰此方之蛔厥全冷者也痛煩有休發者輕證起時有厥者柯琴謂不僅蛔厥概為厥陰之主方又厥陰多寒熱錯雜證茯苓四逆湯吳茱萸湯外運用此方多能奏效故雖別無蛔厥之候亦用於胸有刺痛者又反胃之壞證以半夏乾薑人參丸料送下此方有奇效又能治久下利也烏梅之醫治效用本草綱目曰烏梅求真按由梅實熏製而成也氣味酸溫平澀無毒杲曰寒忌豬肉主治下氣除熱止肢體痛偏枯不仁死肌去青黑痣蝕惡肉本經去痹利筋脈止下痢別錄治傷寒煩熱弘景止渴調中去痰治瘧瘴止吐逆霍亂除冷熱痢藏器治虛勞骨蒸消酒毒治休息痢有大驗大明斂肺澀腸止久嗽瀉痢反胃噎膈蛔厥吐利消腫漏痰殺蟲解魚毒馬汗毒硫黃毒時珍由此等說觀之本藥為清涼性收斂藥兼有殺蟲殺菌贅肉腐蝕作用矣當歸四逆湯之注釋手足厥寒脈細欲絕者當歸四逆湯主之傷寒論註和久田氏曰平素氣虛之人外邪襲入於心胸正氣為之抑壓自四肢厥逆脈細欲絕者以此方排心胸間之寒邪導下水氣舒暢正氣則厥寒復溫脈帶陽氣而愈矣與三味之四逆湯不同彼已在內有下利清穀證故於四肢謂厥冷冷者自內冷也屬於內之詞也寒者自外來也屬於外之詞也此證在心胸間非腹內之變也故變文而書厥寒示其異也細者脈幅如絲也故曰欲絕也可以想見其情矣下利脈大者為虛以強下之故也設脈浮革因爾腸鳴者屬當歸四逆湯傷寒論註和久田氏曰脈大者所謂洪大無倫也淺按則大雖有幅然重按則細如蛛絲之脈也革者謂弦大而芤之脈也芤者中空如蔥之切口也此為虛寒之候但此言下利脈大者為虛之一語例也以強下之以下謂此方證也謂凡下利脈大者虛寒之例也今病人以強下之故而胃腸衰設脈浮革者則不可以實論也因爾者因強下也因強下雖不下利然脈浮革而腸中水鳴者當為虛寒此方主之也此證與前章脈之細大如相反其歸一也而此脈較彼更虛也余按凡虛寒證脈浮大者腹候時其動氣迫於心下有浮大之狀也不可誤為陽證又案三味之四逆湯因下而致下利清穀者此方因下而但腸鳴脈有虛證者亦內外之不同也當歸四逆湯方當歸桂枝芍藥細辛大棗各克甘草通草各克上細銼以水二合五勺煎一合去滓一日分三回溫服先輩之論說治驗傷寒六書曰傷寒少陰病但厥無汗強發之必動其血或自口鼻耳目中出名曰下厥上竭為難治又咽喉閉塞不可發汗發汗則吐血氣欲絕手足厥冷踡臥而不能自溫又脈弱者不可發汗發之則寒慄不能自還皆以當歸四逆湯主之幼幼集成曰當歸四逆湯治小兒血虛體弱寒邪傷榮以致眼目翻上身體反張蓋太陽主筋病故也求真按本方雖非主治太陽病然不去於桂枝湯之去加方續建殊錄曰一童子年十餘有寒疾初二三日雖服藥發汗然不解而熱反倍於前日眼中赤短氣躁煩手足厥冷大便秘澀眾醫皆謂元氣虛曰若非參附及白朮等則不能補其虛因與理中湯得湯疾彌進因求先生治診之曰此所謂厥陰證血氣內迫所致乃與桃仁承氣湯翌日下利如傾盆續服數貼後厥冷甚殆將如死狀更與當歸四逆湯厥冷即愈再用前方疾痊愈求真按下利如傾盆厥冷甚殆將如死者是以桃仁承氣湯強下之則已存之本方證突然發現也與前述之仲景原文對照可明此旨方輿輗曰當歸四逆湯用於下純血痢之血便耳傷寒下血雖為惡候然非痢疾之下血可以此湯愈之和久田氏曰腹皮拘攣似桂枝加芍藥湯及小建中湯之腹狀且左臍旁天樞求真按天樞者臍作一寸寬由其端左右各一寸之處也上下有攣痛者似當歸建中湯當歸芍藥散證於右小腹腰間有結聚手足冷脈細無力者當歸四逆湯證也按此方為桂枝湯方中去生薑代以細辛更加當歸通草而增大棗也下焦之寒氣上在心下正氣抑塞不充肌表不及四肢血脈澀滯無決流之勢細辛能散中焦之冷氣排除抑塞胃口之水氣通草能引其水而利小便通關節便導其陽餘為和血脈滋達正氣者桂枝湯之方意可知矣但以當歸為主和以芍甘二味能解腹中之結血攣引者也百疢一貫曰休息痢求真按此謂下痢與便秘之交代性者有因疝來者此時有用當歸四逆湯等者黑便與血交下當歸四逆湯有效五更瀉求真按謂晝不下利深更有之有用當歸四逆真武等者二方無效死證也譯者按未盡然也五更瀉有因於伏暑者作伏暑治都效餐英館治療雜話本方條曰此方證以熱手按之則如蛙鳴又腹中或左或右病人自覺有冷處或自腰至足股處或左足全體覺冷證是用此方之標準也此證屬慢性有歷五年十年不愈時發時止者但起居形態不衰精神疲憊耳類聚方廣義本方條曰治疝家發熱惡寒腰腹攣痛腰腳拘急手足寒小便不利者兼用以消塊治婦人血氣痛腰腹拘攣者治經水不調腹中攣急四肢酸痛或一身習習如蟲行日頭痛者勿誤藥室方函口訣本方條曰此方雖為治厥陰表寒之厥冷藥然原係桂枝湯之變方故用於桂枝湯證之血分閉塞者有效是以先哲謂不僅厥陰病亦可用於寒熱勝復而手足冷又加吳茱萸生薑湯為後世疝積之套劑陰㿗求真按此陰㿗鼠蹊小腸氣也輕者以此方治之清川玄道曰凍風俗謂凍瘡外科正宗云凍風者肌肉寒極氣血不行肌死之患也凍風證諸家有種種之治方雖未必皆無效然未聞有神方也余壯年西游時訪遠州見付驛古田玄道翁翁篤信仲景著有傷寒論類辨傷寒勿論矣即其他雜證皆以金匱傷寒論為規矩見翁治凍風用當歸四逆湯奏速效余問其所以翁云傷寒論厥陰篇不云乎手足厥寒脈細欲絕者當歸四逆湯主之余因大有所得別後殆將三十餘年於凍風每用此方必見效庚辰二年一婦人年三十許左足拇指及中指紫黑潰爛自踵趺上及腳膝寒熱煩疼晝夜苦楚不能寢食一醫誤認為脫疽之類證雖種種施治而無效因是主人倉皇邀余治余診曰去年曾患凍風乎曰多年有之余曰決非脫疽之類是凍風也完全誤治矣乃與當歸四逆湯外貼破敵中黃膏等一月餘痊愈此為凍風之最重者也若平常紫斑癢痛者僅用前方四五帖效如桴鼓也可謂神矣因云當歸四逆湯如傷寒溯源集傷寒論注以下諸注家疑方中無薑附而有區區之論說然余以為皆拘泥四逆之方名而誤其病候也蓋厥寒者為寒在表候之外冷其人自覺寒也厥冷者寒在裡候之冰冷其人自不覺也夫手足厥寒脈細欲絕者由太陰所分歧也太陰第二條因於宋板之名號云自利不渴者屬太陰也以其臟有寒故也宜服四逆輩此由太陽中篇第十條小青龍湯所岐分也小青龍湯條云傷寒表不解心下有水氣或利由是觀之當歸四逆湯為桂枝湯加減之方專以外發寒邪非如他四逆湯專救裡寒之劑也豈可怪方中無薑附耶余今不敢誹謗古人是欲活用仲景師之方劑可治萬病此不過其一端耳當歸四逆加吳茱萸生薑湯之注釋手足厥寒脈細欲絕者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之傷寒論註參照下說可解本條之義和久田氏曰久寒者非水毒之寒也乃下焦之虛寒疝毒宿飲之類集於胃口抑塞陽氣而妨飲食剋化之利是也此證但謂久寒不詳其證或雖有指吐利者然由余所試驗或因宿飲滯於中焦而成吐酸吞酸等證者或因冷氣衝逆迫心下攻胸脅乾嘔吐涎沫者或為腹痛或為吐利或成轉筋婦人冷積血滯經水短少腹中拘攣時迫心下脅下肩背強急頭項重痛之類概因久寒之所致審其脈證而得手足寒脈細者若用本方無不效也不僅吐利一證也吳茱萸生薑細辛盡力以排除胸膈之宿飲停水豁胃口散冷氣下衝逆使利其用也一老翁患轉筋其證胸腹拘急背膊強頭腦痛口舌乾燥若弄舌濡唇則忽轉筋強直欲死使門生處方雖進桂枝加芍藥湯或瓜蔞桂枝湯無寸效因服雞屎白二錢亦無效近鄰有湯村生者診之曰脈澀轉筋宜用當歸四逆加吳茱萸生薑湯其口舌燥者由於舌筋不轉血分動而津液乾不宜作熱候也乃作本方使服之且加針治病熱稍減續服一晝夜翌夕愈而復常翁大稱嘆湯村生之偉效當歸四逆加吳茱萸生薑湯方當歸桂枝芍藥細辛大棗各克甘草通草各克吳茱萸克生薑克上細銼以水酒各一合三勺煎一合去滓一日分三回溫服或如當歸四逆湯水煎溫服先輩之論說治驗千金方曰四逆湯求真按此即本方也治霍亂多寒手足厥冷而脈欲絕者續建殊錄曰某人一日患頭痛狀如感冒及次日譫語煩躁不得眠翌日周身厥冷於是求治於先生診之脈微細欲絕眼中赤四肢強直口不能言而嘔乃與當歸四逆加吳茱萸生薑湯食頃嘔止諸證稍瘥但心下如石硬按之則痛不欲以手觸之更與桃仁承氣湯二帖大便快通硬痛頓除於是復與前方數日而痊愈一丈夫惡寒身熱而嘔腰痛口乾燥一日振寒發熱汗出而渴如瘧狀朝夕皆發脈緩惡寒後嘔止身熱腰痛口乾燥如故五六日振寒再發其狀如初與當歸四逆加吳茱萸生薑湯諸證少退八九日發懸癰痛不可忍與大黃牡丹皮湯膿潰數日而愈一男子初患頭痛惡寒手足惰痛恍惚如夢微渴微嘔胸肋攣急而引胸下痛咳嗽吐痰血處以當歸四逆加吳茱萸生薑湯兼用解毒散求真按此即黃連解毒散之略也服之諸證得以痊愈成績錄曰一男子寒熱六七日譫語不大便至八九日昏冒不能言舌上黑腹硬滿按之痛不可忍乾嘔而食不下四肢疼痛不得屈伸先生診之與以當歸四逆加吳茱萸生薑湯兼用桃仁承氣湯大便快利大下黑物黑苔去神氣復諸證乃已一丈夫患疫四肢惰痛身熱惡風乾嘔不能食頭汗出腹攣急按之即痛先生與當歸四逆加吳茱萸生薑湯經五六日不大便小便日夜僅一行三四合許譫語煩悶喘咳潮熱心下硬滿舌上有黑苔於是與大柴胡加芒硝湯遂得全治方輿輗本方條曰內有久寒者男子為疝瘕婦人為帶下之類是也此病痛引臍腹腰胯者此湯甚良戴氏證治要訣曰治陰㿗大如斗諸藥不能效者余以為可療一般之疝瘕陰㿗已至大者猶蚍蜉之撼大樹是此方等不能敵也類聚方廣義本方條曰治當歸四逆湯證而胸滿嘔吐腹痛劇者治產婦惡露綿延不止身熱頭痛腹中冷痛嘔而微利腰腳酸麻或微腫者方伎雜志曰水㿗求真按此即陰囊水腫也以針取水是為上策然有一度治者有取二度三度而愈者腸疝求真按此即小腸氣也則不宜用針以當歸四逆加吳茱萸生薑湯大黃附子湯芍藥甘草湯合方之類至小腹柔軟為佳然㿉下成慣性者不能治之若施紐帶雖為姑息之事但可救其苦痛如㿉下在左則步行起居如常人求真按本方未必為小腸氣之特效藥不可妄信橘窗書影曰一女子年十九患傷寒尼崎醫員高井玄益療之十餘日精神恍惚舌上無苔而乾燥絕食五六日四肢微冷脈沉細按其腹自心下至臍旁之左邊拘急重按則如有痛血氣枯燥宛如死人余以為厥陰久寒證與當歸四逆加吳茱萸生薑附子湯求真按此即本方加附子服一日夜心下大緩始啜粥飲三日精神明了始終服一方其人痊愈一婦人數年患頭痛發則吐苦清水藥食不下咽苦惱二三日頭痛自然止飲啖忽如故如此一月二三次兩醫交治之無效余診曰濁飲上逆頭痛也飲留則發飲湧則止所以休作也宜制其飲與當歸四逆加吳茱萸生薑湯兼用半硫丸求真按是半夏硫黃二味之丸方也服一月病不發繼續二三年積年之頭痛得愈通草木通之醫治效用本草綱目曰通草釋名木通氣味辛平無毒甄權曰微寒主治除脾胃之寒熱通利九竅血脈關節去惡蟲本經療脾疽常欲眠而心煩出音聲治耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆鼻息肉墜胎去三蟲別錄治五淋利小便治人多睡去水腫脈浮大甄權安心除煩止渴退熱明耳目治鼻塞通小腸下水破積聚血塊排膿治瘡癤止痛催生下胞女人血閉月候不勻頭痛目眩羸劣乳結及下乳大明利大小便寬人心下氣藏器主諸瘻瘡喉痹咽痛濃煎含咽珣通經利竅導小腸火杲本草備要曰木通古名通草甘淡輕虛上通心包降心火清肺熱化津液下通大小腸膀胱導諸濕熱自小便出通利九竅血脈關節治胸中煩熱通身拘痛大渴引飲中焦之火淋瀝不通下焦之火耳聾目眩口燥舌乾喉痹咽痛鼠齆失音脾疽好眠除煩退熱排膿止痛行經下乳通竅催生汗多者禁用由以上諸說觀之本藥為消炎性利尿藥兼有鎮痛排膿通經作用矣四逆加人參湯之注釋惡寒脈微而復利利止亡血也四逆加人參湯主之傷寒論註本條雖列於霍亂病篇然不外於厥陰病故載之金鑒云利止當是利不止亡血當是亡陽如利止亡血如何可用大熱補藥乎此說甚佳則本條當作惡寒脈微而復利利不止者亡陽故也四逆加人參湯主之復利者如山田正珍云復利者其利暫止而復利也四逆加人參湯方甘草克乾薑克附子人參各克煎法用法同四逆湯先輩之論說景岳全書曰四味回陽飲求真按此即本方也治元陽虛脫危在頃刻者衛生寶鑒補遺曰四逆加人參湯治傷寒陰證身涼額上手背有冷汗東洞翁本方定義曰治四逆湯證而心下痞硬者求真按以此說可知本方之腹證矣方機本方主治曰下利惡寒脈微手足厥冷或心下痞硬者方輿輗本方條曰血脫及於手足逆冷者宜亟與四逆加人參湯若遲延即不救類聚方廣義本方條曰此方主因下利脫證茯苓四逆湯主汗下脫證然醫者不必拘泥唯能操縱自在諸方莫不如是按此條疑有脫誤勿誤藥室方函口訣本方條曰此方以亡血亡津液為目的後世一名參附然仲景陽虛主附子陰虛主人參茯芩四逆湯之注釋發汗若下之病仍不解煩躁者茯苓四逆湯主之傷寒論註本條由下說可解金鑒曰大青龍證為不汗出之煩躁乃未經汗下之煩躁而屬於實也此條為病不解之煩躁乃汗下後之煩躁而屬於虛也然脈之浮緊與沉微自當有別山田氏曰發汗或下之後仍不復常反生煩躁者為亡陽假熱求真按亡陽假熱作陰虛為佳之煩躁與乾薑附子湯之煩躁同求真按宜作與乾薑附子湯之煩躁相似而與乾薑附子湯相比則其證稍異大青龍湯條所謂汗多亡陽遂虛而惡風煩躁者是也非實熱之煩躁也宜與茯苓四逆湯而回復其陽氣按乾薑附子湯條是汗下俱犯證此則或汗或下僅犯其一耳觀若字可知成無己作汗下兩犯解非也此蓋四逆湯證求真按宜作四逆加人參湯證而兼煩躁耳何謂四逆湯證乎曰下利清穀或下利腹脹滿或自利不渴或大汗出腹內拘急四肢厥逆而惡寒或吐利汗出發熱惡寒四肢拘急手足厥冷或膈下有寒飲乾嘔或大汗大下利而厥冷之類是也若夫言脈則或浮而遲或弱或沉或脈微欲絕之類是也茯苓四逆湯方茯苓克人參克甘草克乾薑克附子克上細銼以水一合煎五勺去滓頓服先輩之論說治驗聖濟總錄曰平胃湯求真按此即本方也治霍亂臍上築悸者東洞翁本方定義曰治四逆加人參湯證而悸者求真按宜作治四逆加人參湯證而有茯苓證者方機本方主治曰手足厥冷而煩躁者肉瞤筋惕手足厥冷者心下悸而惡寒腹拘急下利者類聚方廣義本方條曰治四逆加人參湯證而心下悸小便不利身瞤動煩躁者求真按此說較東洞翁之定義則更具體矣霍亂重證吐瀉後厥冷筋惕煩躁無熱不渴心下痞硬小便不利脈微細者宜用此方服後小便利者得救治諸久病精氣衰憊乾嘔不食腹痛溏泄而惡寒面部四肢微腫者產後失調多有此證治慢驚風搐搦上竄下利不止煩躁怵惕小便不利脈微數者勿誤藥室方函口訣本方條曰此方以茯苓為君者以煩躁為目的也本草云茯苓主煩躁也四逆湯證求真按宜作四逆加人參湯證汗出煩躁不止者若非此方則不能救橘窗書影曰一女子患疫八九日汗大漏煩躁不得眠脈虛數四肢微冷眾醫束手余診投以茯苓四逆湯服一二日汗止煩悶去足微溫一婦人四十許經水漏下一日下血塊數個精神昏憒四肢厥冷脈沉微冷汗如流眾醫束手余與茯苓四逆湯厥愈精神復常通脈四逆加豬膽汁湯之注釋吐下已斷汗出而厥四肢拘急不解脈微欲絕者通脈四逆加豬膽汁湯主之傷寒論註吐下已斷者吐下已盡而自止也吐下自斷汗出而厥者殆因吐下體液盡後更由脫汗亡失之益使血液濃稠障礙其循環故致厥冷也四肢拘急不解者四肢肌肉之攣急服通脈四逆湯後尚不解也脈微欲絕者即上血行障礙之應徵也通脈四逆加豬膽汁湯方甘草乾薑各克附子克豬膽或熊膽克上細銼先以水一合五勺煎三味成五勺去滓納膽和之頓服先輩之論說東洞翁本方定義曰治通脈四逆湯證而乾嘔煩躁不安者類聚方廣義本方條曰霍亂吐瀉太甚後脫汗如珠氣息微微厥冷轉筋乾嘔不止煩憒躁擾脈微欲絕者死生係於一線若非此方則不能挽回服後脫汗煩躁俱止小便利者為佳兆若無豬膽則以熊膽代之諸四逆湯證無不危篤而此為最重極困之證宜查照參究以了其義子炳曰慢驚風危篤者此方有效可信然云豬膽代以水銀鉛丹金汁等反有效者誤也勿誤藥室方函口訣通脈四逆湯及本方條曰二方皆治四逆湯之重證後世雖用薑附湯參附湯等單方然其妙旨在有甘草有混合薑附多量之力所以名通脈也分布地麥求真按地黃麥門冬之略之滋潤所以名復脈非漫然也補遺篇此篇名余所定也本篇雖為仲景之方劑然臨床上不緊要者及疑非其方者集錄之葵子茯苓散之注釋妊娠有水氣身重小便不利洒淅惡寒起即頭眩葵子茯苓散主之金匱要略註洒淅惡寒者如被注水之惡寒也起即頭眩者為茯苓之主治似於苓桂朮甘湯證然無如彼之上衝證唯眩暈而已葵子茯苓散方葵子克茯苓克上為細末一回克許一日三回服用小便利則愈若增量二倍以上作煎劑亦可先輩之論說東洞翁本方定義曰治小便不利心下悸而腫滿者類聚方廣義本方條曰婦人妊娠每有因水腫而墜胎若難用其他逐水劑者宜煎服此方喘咳者合甘草麻黃湯為良葵子之醫治效用本草備要云冬葵子甘寒淡滑潤燥利竅通營衛滋氣脈行津液利二便消水腫通關格下乳滑胎由此觀之則為黏滑性利尿藥兼有緩下作用也蒲灰散之注釋小便不利蒲灰散主之金匱要略厥而皮水者蒲灰散主之金匱要略蒲灰散方蒲灰克滑石克上為細末一回克許一日三回服用蒲灰之醫治效用本藥為香蒲草之燒灰存性者茲列原植物之醫治效用於下本草綱目曰香蒲氣味甘平無毒主治去熱燥利小便寧原補中益氣和血脈正要搗汁服則治妊婦之勞熱煩躁胎動下血時珍由此觀之則本藥為消炎性利尿兼止血藥矣滑石白魚散之注釋小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之金匱要略滑石白魚散方滑石亂髮霜白魚今以鯉魚代之各克上為細末一回克許一日三回服用亂髮霜之醫治效用本草備要曰髮一名血餘髮為血之餘味苦微寒入於少陰厥陰補陰消瘀治諸血疾能去心竅之血燒灰吹鼻止衄合雞子黃煎為水療小兒驚癇合諸藥為膏涼血去瘀長肉據此說觀之則本藥為清涼性止血藥鯉魚之醫治效用本草備要曰鯉魚甘平下水氣利小便療喘嗽腳氣腫脹黃疸叢桂亭醫事小言曰鯉魚湯治腳氣上氣而渴脈大者水腫亦用之治一切水腫有光艷者生鯉魚一尺者去腸洗淨上以水六合煮至三合去鯉服一合日二夜一凡服用漆器隨好加生柚皮獨活芽山椒等以避腥臭方輿輗曰一人病癆病中腳氣腫滿諸藥不應眾醫皆不能治余亦診之篤疾交加真無生理然腫病則我將消之須戒慎口味耳與鯉魚湯小便稍長腫脹漸消病家大喜過十餘日尿復短少余不解其所以然反覆問之且究侍病嫗嫗沉思稍久曰病人養護無異於前但現今因煮過鯉魚棄之可惜再用豆油煎為下飯耳余曰水能浮舟亦能覆舟食藥不得法豈得無害乎因是益慎口腹仍進前方小便復利而腫全消此人及水病愈而向患之勞病亦烏有矣豈非奇事乎據以上諸說觀之則本藥為一種之利尿藥矣茯苓戎鹽湯之注釋小便不利蒲灰散主之滑石白魚散茯苓戎鹽湯並主之金匱要略註和久田氏曰茯苓戎鹽湯治小便淋瀝難通或小便閉者渴而好鹽味者此方為妙茯苓戎鹽湯方茯苓克朮克戎鹽克上細銼以水二合先煎二味為一合去滓納鹽一日三回分服先輩之論說東洞翁本方定義曰治心下悸而小便不利者戎鹽之醫治效用本草綱目曰戎鹽釋名胡鹽青鹽集解當之曰戎鹽味苦臭是海潮水澆山石經久鹽凝著石取之北海者青南海者赤氣味鹹寒無毒主治助水臟益精氣除五臟癥結心腹積聚痛瘡疥癬大明據上說觀之則本藥為一種解凝性利尿藥麻黃醇酒湯之注釋千金麻黃醇酒湯治黃疸金匱要略黃疸病脈證並治篇註雖仲景以之治黃疸然甚漠然東洞翁下此定義為治喘而發黃或身微痛者此說有理可信麻黃醇酒湯方麻黃克上細銼以酒二合煎一合去滓一日分三回溫服半夏麻黃丸之注釋心下悸者半夏麻黃丸主之金匱要略驚悸吐衄下血胸滿瘀血病證治篇註心下悸者未必以本方為主治也東洞翁定義為治心下悸喘而嘔者半夏麻黃丸方半夏麻黃各等分各為細末以蜂蜜為丸一回克許一日三回服用赤丸之注釋寒氣厥逆赤丸主之金匱要略註僅寒氣厥逆不甚明了東洞翁以本方治心下悸而有痰飲嘔而腹痛惡寒或微厥者為定義赤丸方茯苓半夏各克烏頭克細辛克上為細末納真朱為色以蜂蜜作丸一回克許一日三回以酒服用先輩之論說方機本方主治曰治厥逆惡寒而心下悸者類聚方廣義本方條曰疝家脅腹攣痛惡寒腹中轆轆有聲嘔而眩悸其證緩者常用此方為佳若不能酒服者可以白湯送下蜀漆散之注釋瘧多寒者名曰牡瘧蜀漆散主之金匱要略註牡瘧為牝瘧之誤其意瘧疾發作時發熱少而惡寒多者名曰牝瘧即以本方為主治也蜀漆散方蜀漆雲母龍骨各等分上為細末於發作前以水和醋少許頓服克先輩之論說東洞翁本方定義曰治寒熱發作有時臍下有動者類聚方廣義本方條曰牝瘧七八發或十餘發後病勢漸衰者於未發前一時許求真按古之一時即今之二小時也以酢水等分或新汲水服一錢匕當今之克則吐水而愈按牡為牝之誤雲母之醫治效用本草備要曰雲母甘平入肺下氣補中堅肌續絕治勞傷瘧癖瘡腫癰疽據此說以觀則本藥有多少之殺蟲殺菌作用矣礬石湯之注釋礬石湯治腳氣衝心金匱要略註仲景曰治腳氣衝心只用外治恐不能奏效為輔佐內治之劑耳礬石湯方礬石克上銼細以水一升二合醋三合煎浸腳先輩之論說東洞翁本方定義曰治腳氣痿弱不仁及入於上而搶心者古方便覽本方條曰腳氣腫滿之類或腳痛中風痛風或腰痛之類皆以此湯浸洗其腳或可為腰湯礬石之醫治效用礬石為明礬之別名有收斂消炎催吐防腐諸作用也明矣硝石礬石散之注釋黃家日晡所發熱而反惡寒此為女勞得之膀胱急少腹滿身盡黃額上黑足下熱因作黑疸其腹脹如水狀大便必黑時溏此女勞之病非水病也腹滿者難治硝石礬石散主之金匱要略註本條雜病辨要云色欲內傷額上黑微汗出手足中熱薄暮即發膀胱急小便自利者名曰女勞疸其腹脹如水狀大便必黑時溏者硝石礬石散主之則本方不僅此證已也全身貧血腹部膨滿恰如腹水之劇者而排出黑便且時時緩下痢者亦所能治不可以狹義解也硝石礬石散方硝石礬石等分上為細末以大麥粥汁服克許一日三回服用先輩之論說東洞翁本方定義曰治一身悉黃腹脹如水狀大便黑時溏者類聚方廣義本方條曰蘇恭曰療腹滿黃胖病求真按此即一種之貧血證也腹滿有塊胸膈跳動短氣不能起步者宜此方加鐵粉為丸亦良硝礬散證痰喘咳嗽氣急息迫不能臥起面身有煤黃色者為極惡之候宜撰麻杏甘石湯木防己湯等與此方交互用之能食者可起硝石之醫治效用硝石不外於硝酸鉀故有消炎利尿解凝作用也明矣礬石丸之注釋婦人經水閉而不利臟堅癖不止中有乾血下白物礬石丸主之金匱要略註沈淋云臟即子宮也止字當作散堅癖不散者子宮有乾血故也白物世謂之白帶甚是故本條宜作婦人經水閉而不利臟堅癖不散而下白物者中有乾血故也礬石丸主之臟堅癖者子宮內有堅硬瘀血塊也然本方僅治白帶下不能作用於其原因之乾血故必併用內服藥也礬石丸方礬石克杏仁克上為細末以蜂蜜作球插入陰道劇者日再插之先輩之論說東洞翁本方定義曰治經水不利而下白物者類聚方廣義本方條曰礬石丸蛇床子散二方相合加樟腦和煉蜜作小指大長一寸更用白粉為衣盛綿囊內納陰中為良求真按隨此法以煉蜜代可可豆脂為陰道球反便也蛇床子散之注釋蛇床子散方溫陰中為坐藥金匱要略蛇床子散方蛇床子仁上為細末加白粉粉錫鉛粉少量如前方為陰道球用自然溫先輩之論說東洞翁本方定義曰治下白物而陰中癢或有小瘡者求真按此說是也據此與仲景論可以運用本方矣蛇床子仁之醫治效用本草備要曰蛇床子辛苦而溫散寒祛風燥濕治陰痿囊濕女子陰腫陰癢子藏虛寒帶下脫肛喉痹齒痛濕癬惡瘡風濕諸病煎湯而浴去風癢據此說則本藥為溫性的收斂的消炎藥葦莖湯之注釋千金葦莖湯治咳有微熱煩滿胸中甲錯是為肺癰金匱要略註煩滿者胸腔內有充滿之自覺而煩悶也葦莖湯方葦莖克薏苡仁克瓜瓣今以冬瓜子代之克上細銼先以水六合煎葦莖成三合去滓入餘藥煎一合一日三回分服再服當吐如膿先輩之論說類聚方廣義本方條曰當以吐膿血臭痰為目的然非多日多服則難見效且每過七日十日用白散或梅肉丸取吐下為佳瓜瓣今用冬瓜子胸中甲錯者胸膈之肌膚枯蠟血液不滋也勿誤藥室方函口訣本方條曰此方平淡而有意外之效當以微熱與胸中甲錯為目的胸中甲錯者有蓄血故也無蓄血亦宜有咳血葦莖之醫治效用本草綱目曰蘆釋名葦葭莖葉氣味甘寒無毒主治霍亂嘔逆肺癰煩熱癰疽時珍治金瘡生肉滅瘢徐之才參照上說則本藥為消炎性排膿藥也當歸生薑羊肉湯之注釋寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之金匱要略註類聚方廣義本方條曰老人疝痛婦人血氣痛屬於血燥液枯者宜此方與烏頭附子劑判然有別診時宜注意羊肉難得可代用朝鮮產之朝牛肉產後腹中㽲痛當歸生薑羊肉湯主之並治腹中寒疝虛勞不足金匱要略註本方之主治酷似當歸芍藥散惟彼兼有水毒而此不兼之差耳當歸生薑羊肉湯方當歸克生薑克羊肉或牛肉克上細銼以水二合五勺煎一合去滓一日分三回溫服柏葉湯之注釋吐血不止者柏葉湯主之金匱要略註吐血不止者服他止血劑尚不止也柏葉湯方柏葉乾薑各克艾克上細銼以水一合五勺煎五勺去滓頓服先輩之論說千金方曰治吐血內崩上氣面色如土方此方即本方加阿膠也類聚方廣義本方條曰治咳血乾嘔煩熱腹痛脈微無力者又能止衄血柏葉之醫治效用本草備要曰側柏葉苦澀微寒最清血分為補陰之要藥止吐衄崩痢及一切血證去冷風濕痹歷節風痛生肌殺蟲據此說觀之則本藥為收斂性止血藥矣拾掇篇此篇名亦為余所定諸方概選自東洞翁所著古方兼用丸散方者巴豆鷓鴣菜丸巴豆克大黃克鷓鴣菜克必須為霜存性上三味各別為細末混合之以米糊為丸頓服克主治治因蛔蟲時時心腹急痛大便閉者疥癬摺藥巴豆大黃蓖麻子黑胡麻各等分上四味細銼麻布包漬熱酒數拍患處至半時一時許如麻疹之發於肌表發則以湯水洗之不禁如此六七日許而浴以湯則疹盡白而愈主治疥癬不問新久拍之必有奇效面部兩乳及前後陰邊不可拍之前七寶丸輕粉牛膝各克土茯苓克雞舌香克雞舌香丁子也丁子難作末須入白米七八粒同研即成末矣大黃克上五味各別為細末以米糊調勻為丸如綠豆大日服克三回分服主治治瘡毒求真按梅毒也之骨節疼痛求真按骨及關節疼痛也等陳痼之毒續七寶丸水銀克礬石芒硝各克鹽克上四味先碎礬石芒硝乃合四味納瓦盆中以茗碗覆之以泥封之安架火上自下燒之半日許既而取其所附著於茗碗之霜以棗肉為細丸用量同前主治治用前七寶丸而無功者先輩之治驗建殊錄曰某商人患梅毒瘥後鼻梁壞陷殆於兩頰等先生作七寶丸使服之鼻反腫脹三倍於常人及盡二劑則稍收縮再見全鼻矣續建殊錄曰一男子患大頭痛心下堅滿按之則痛時時欲嘔眼中赤眩不能見物舌上有黑苔不大便十餘日不欲飲食與大柴胡湯大便通快諸證稍退然頭痛如故後兼用七寶丸而痊愈求真按因兼用七寶丸而頭痛愈觀之則此證為腦梅毒也明矣生生堂治驗曰某人年三十患梅毒兩耳聾塞咽喉赤爛其會厭左邊有一竅臭膿不絕口曾治百餘方皆不驗亦惟待死而已會聞師名不遠千里而來乞治曰多年誤治至於如是死固不愛倘得蒙先生診治亦於泉下無悔焉若萬一有生路感何如之先生診之脈沉實曰若非巴豆輕粉則不能治其人有懼色故舍於先生之塾中使視服輕粉而無害於是以七寶丸如法服之諸證稍減復以續七寶丸下之求真按續七寶丸非下劑恐為後七寶丸之誤而後七寶丸由巴豆雞舌香各克大黃克而成之丸方也或以四賢丹洗口內求真按四賢丹為治汞毒性口內炎之含漱劑也凡月餘而痊愈黴瘡治方論曰某婦初患咽痛腫塞數日漸快爾後尚患咽喉爛痛凡食有鹽味者則痛苦難忍且不能熱飲雖冬月以冷水沃飯諸藥無效已五年矣請余診乃作七寶丸每服三分日二夜一服服之凡七日口中腐爛吐涎數升更作後方丸求真按後七寶丸之略也瀉下其動搖之毒出入四十日許諸患脫然後食鹽醬酢酒及熱飲等如常人矣生生乳水銀克砒石克硝石克礬石克綠礬克雲母食鹽各克青鹽克上各別搗篩為末以次調和之納瓮中密封之蓄積凡十旬以上取出燒之但一燒石之藥末為八十瓦許燒法丸法如續七寶丸法制如胡麻子大以辰砂為衣砂糖湯送下一丸或二丸也燒生生乳法如方藥為末其雲母須用中國雲母漬鹽水中晒乾為末七味和合入於乳缽其入水銀時吐唾液不止搗研之則水銀易與諸藥調和若不用唾液梅酢亦可研至不見星為度由是移入於燒壺而押實之置五六十日諸藥氣味融和堅硬時燒制之時候以五六七月為佳燒壺者以泥壺燒成花缽形者高約鯨尺四寸許口徑三寸五分許其蓋邊有指口中有三孔縛以銅絲封以鹽泥待乾後掘庭上之土而倒填其缽底微露出置炭其上約用炭五百兩許掘出倒壺待冷然後去土取蓋其乳如束針之附著約有十二三兩如細末者亦有十二三兩賣物所制將水銀增量以取乳多所以不甚有效也據方伎雜志譯者按日本尺分為直尺曲尺二種直尺即鯨尺據各國度量衡比較表合部尺主治治肺痿肺癰瘰癧諸瘡毒結於胸膈者先輩之論說治驗叢桂亭醫事小言曰生生乳不僅治下疳凡噎嗝中風水腫腳氣勞瘵血積寒疝疾喘小兒馬脾風等及其他難證配用之皆有奇驗難以勝數只與梅毒相違瞑眩而速先有發熱眩暈等即用冷水可解其毒分量約用二三釐許又有間日入鹽梅者黴瘡治方論本藥條下曰坎謹考此方能破逐沉潛固滯之毒故傳曰治所謂肺痿肺癰或梅瘡之壞證及諸痼毒或所謂積聚疝或所謂癩風者一人患所謂肺癰百治無效請余治診之脈沉遲喘咳上氣日吐膿沫數升羸瘦特甚余作生生乳丸使服之有一醫生詰余曰噫何不仁之甚耶此病雖屬不治證命在旦夕今妄用此劇藥恐徒促其命期耳且生生乳為治梅家之主藥非治他病之品乎夫醫仁術也子徒少年任氣不審因不察證妄投刻毒之劑殺人於刀圭之間不仁之事更有大於此乎坎雖不敏篤信古方深重比語是故不忍坐視因疾病而致死者且子以生生乳特為梅毒之要藥何拙乎夫乳之能也蓋有熔化沉潛固滯之毒耳故東洞先生曰治肺痿肺癰及諸瘡毒之在胸膈者且礬石傳曰活死肌除胸中熱止消渴療心腹積聚飲食不下以是可知生生乳之效矣不僅為濕毒家之主藥也唯熔化沉潛固滯之毒耳子其察諸使服之不已凡十日而停服作桔梗白散隔日攻之出入七十日許諸證痊愈今已強健如常矣化毒丸熔化積滯之毒故治梅瘡結毒壞敗之證兼療偏枯反胃一切之痼毒腹痛不已所謂積聚疝癥等證求真按化毒丸為山脅東洋裁酌黴瘡秘錄方由薰陸三錢大黃雄黃亂髮霜各九錢生生乳三錢而成生生乳實為其主藥故化毒丸之醫治效用即本藥之醫治效用也春林軒丸散便覽曰化毒丸用此方所以治毒氣之強劇者凡結毒痼疾毒氣輕者用端的丸求真按端的丸由川芎黃芩檳榔大黃黃柏檞木忍冬土茯苓荊芥連翹烏蛇苦參白物朱砂而成之雜駁丸方也瘡毒雖云初起毒氣頗劇者必用此方或用輕粉劑反骨痛者皆可用此方栗園雜纂曰用化毒丸之目的是病毒凝結將成痼疾腐敗難治者七寶丸用於其毒散漫成塊物等者求真按塊物者護謨腫之類也此二方之辨別也所謂自膝以下之骨高有成飯柜形饅頭樣證此化毒丸之所治也梅肉散輕粉巴豆各克乾梅肉山梔子各克此二物為霜則能解惡肉惡血上四味各別為末合為散若不能散服者糊丸亦佳用法用量同巴豆鷓鴣菜丸主治治惡毒難解者見一方云治諸惡瘡結毒及下疳瘡者先輩之論說治驗百疢一貫曰先生曰淋之重證莫如輕粉中神求真按中神指中神右內也用梅肉丸云方輿輗本方條曰疳瘡毒猛痛劇者宜以此散急峻下之若有遲疑恐寇仇深入不可防禦也惟此劑峻烈病者不耐或用度失法則貽意外之害也其餘諸結毒可運用者甚多春林軒丸散便覽曰梅肉散用於諸瘡毒連綿不愈者下是也凡臁瘡或陰瘡等而成大瘡連綿不愈者亦用之如梅毒不愈用此方翌日必出如砂仁瘡而赤者風毒腫等之餘毒膿汁出者及疳瘡亦用之一人患梅毒服五寶丹數劑而瘥後一年許固毒再發再服前劑諸證漸退獨結喉之左旋人迎腐爛膿漏臭不可近已六年矣請我治因先作葛根加朮附湯運動其痼毒別作伯州散使服之時時以梅肉散攻之出入百有餘旬而愈亦不再發栗園雜纂曰苦疳瘡痛甚血出不止者宜貼雞卵左突求真按膏藥名以梅肉丸峻下之不然則生種種之變也若用粉劑求真按輕粉劑之略有餘毒則宜用大劑梅肉丸便毒初起其人壯實起脹難者宜內消諸方若其毒勢猛烈連小腹者以此方下之預防後患為佳龍葵散輕粉巴豆各克龍葵為霜克上藥製法用法用量同梅肉散主治治一身發瘡而癢痛或疼痛者先輩之治驗方伎雜志曰某兒稟賦脆弱家人云五七日以來不稍飲乳但甘薯雞蛋之類則能食之是以能保生命然小兒不能問其所苦近處醫生亦不知為何病是以請診何故不能飲乳也診之不見何種異狀精思之想因會厭凝滯氣道開合不能如常之敏捷故不能飲急咽之乳甘薯雞蛋之類可以緩咽故能適合會厭之開合也聞其家人之言恐小兒不能多服煎藥故用龍葵丸日日下四五次本病本腫而不痛現時其肩凝滯如強急但過四五日即已如常矣解毒散川芎大黃各克甘汞克金硫黃克上各別為末混合之一日三回分服克主治本方為亡師和田先生之創製治梅毒性諸證有奇效而此與類方所異者以其平和穩健通用於陰陽虛實各證無汞毒性口內炎等之副作用伯州散反鼻霜津蟹霜求真按今以鼴鼠霜代之角石霜求真按今以鹿角霜代之各等分上各為細末混合之一日二回乃至三回服用克許但酒客宜以酒服用主治治惡毒難以發出者見一方云治一切之打身瘧疾瘡毒疼痛或諸瘡內攻者又見一方曰治毒腫或有膿者求真按此散為興奮性之溫藥故內臟有急性炎證者假令雖有以上之適應證亦決不可用若誤與之則反助長炎證也宜注意之先輩之論說治驗德本遺稿曰排膿黑散雞去腸中穢物肉骨腹背之霜五錢五八霜二錢五分花二錢五分以水銀硫黃製者鹿角霜鼴鼠霜蘩萋草霜各二錢主治宜於諸痼廢疾梅毒結毒或惡瘡痔漏瘰癧鶴膝風痘瘡黑陷者內托排膿有神效求真按此散有效於諸證者本藥與有大力焉以是可想見其作用矣排膿散反鼻鹿茸鼴鼠各黑燒各二錢土茯苓五錢上四味為散主治諸腫毒頑瘡無名惡瘡俱宜排膿散求真按此散所主者即本藥也以是可知其效用矣松原家藏方曰沉香解毒散治癰腫一切癰腫不問膿之已成未成若與此藥則能解毒消腫止痛成膿生新肉止腐潰求真按沉香解毒散為本藥加沉香加沉香者附與香氣為目的其作用有如是之多以是可知本藥之性能矣沉香解毒散腸癰潰後小腹脹痛不瘥者主之沉香解毒散痔漏久不瘥薄膿不止者及腐牙癰主之方輿輗曰超世散一名黑龍散求真按此散與沉香解毒散同方此方於癰歷試歷效妙不可言又疔瘡痘瘡乳瘡下疳便毒脫疽瘰癧等及一切無名腫毒皆可用之有大效此是本邦上古所傳之神方即大同類聚方中所稱之伯耆藥也又有常言伯州散者但諸家所傳僅有津蟹角石五八霜三味而無沉香有沉香者為四味又有加白芷等為七味者瀧伯耆守家傳等有傳說皆經驗方也此散吾門試效繁多比世醫所用則更有效故特名曰超世散百疢一貫曰鶴膝風有以綿包足仍冷者膝邊之上發腫如腫物然有宜芍藥甘草附子湯兼用伯州散者又濕毒後有足趺冷者亦用上方兼伯州散濕毒經久足發腫物若用伯州散則潰而愈矣伯州散可兼用於一切之瘡瘍已成膿者則潰膿未成膿者則內消實可謂外科之聖方也乳癰乳岩瘰癧之類亦兼用之黴瘡治方論曰下疳初起陰頭生細瘡者為漸漸變證矣葛根湯主之苦於爛痛或癢者葛根加大黃湯主之若膿汁出者葛根加桔梗湯主之兼服伯州散所謂魚口者隨證與大黃牡丹皮湯或葛根加大黃湯兼用伯州散時以梅肉散攻之溫知堂雜著曰所謂外科倒者本名伯州散也散藥之異稱由瘍科腫爛之故附其理由而異其稱也至後可了解之伯州散之名由伯州醫學會所稱余茲演述之本方由四味配合而成實以反鼻為主藥是以反鼻可謂外科倒之骨髓矣蓋特種之藥宜有特種之功用請申述之反鼻又稱飯匕疑即現今薩隅地方所稱之波布與反鼻似同音波布當為反鼻之一種反鼻亦云飯匕者取其形似也本名為蝮蛇即真蟲是也本品實屬奇藥余見識不廣未見中醫書籍多載之惟本草綱目蝮蛇條云溶化於酒以治癩疾諸瘻心腹痛又惡瘡瘰癧皮膚頑麻半身枯死等證且載服用法取活蛇一枚投器中以醇酒一斗封定埋於馬溺所周年取開蛇已消化酒味猶存有患諸證者不過服一升以來當覺身體習習而愈然有小毒不可頓服云其主治與今所用相合其心腹痛及瘰癧麻痹不仁者余未試求真按如上證若為陰虛證則本藥有奇效如陰虛諸瘻證反有害也求真按用本藥有害者因用於有急性炎證者非藥之罪也癩疾古來以大楓子配以烏蛇白蛇雖為特效藥不如以反鼻為伍也然余治癩疾無多故無經驗除此酒製之外醫籍寥寥也使用本品多而功效廣者實係近世之醫師如吉益東洞山脅東洋松原才助等數家求真按先於此輩者甲斐之德本已多使用本藥矣皆二百年前人也就中多用伯州散名聲嘖嘖者以東洞翁為最今摘東洞翁之治驗數則於下以供參考一人時有左臂痛俄頃而凸起甚則痛徹指頭晝夜廢寢食殆不自勝每發或三日或五日而止止則凸所亦消散如平人矣如是數年不已先生診之其色紅赤如血瘤乃作大黃牡丹皮湯及伯州散使飲之服一百劑而痊愈此等案其奏效之最著者併用大黃牡丹皮湯者東洞派之慣用手段也雖有一理不必併用之求真按若有大黃牡丹皮湯證則併用之不然則不宜併用之此東洞翁所熟知也決非慣用之手段藤田氏之說極非不可從之其奏效實宜歸功於反鼻也求真按反鼻之功雖偉大其奏效不可盡歸其力也伯州散為角石津蟹霜沉香反鼻四味等分之散藥也其奇效有如是之多故京師之人驚嘆之謂之東洞之外科倒於是伯州散之異名為外科倒矣為日本外治之常用藥余亦多經驗之催膿消散頗效今之外科療法雖在精巧時節然尚信不失倒之之名實松原方函伯州散名沉香解毒散治癰腫及一切瘡腫不問膿之已成未成若與此藥則能解毒消腫作膿止腐潰云片倉玄周黴癩新書伯州散條云此方本出於伯耆國民間舊名黑龍散主治癰疽疔腫瘰癧乳癰下疳潰爛難愈及痔漏脫疽等證眾人屢試有驗故世人泛稱為伯耆妙藥而不云其方名即黑龍之名亦已空矣余於腫下疳痔漏等未之試或與大脫疽其人發狂後意覺過敏謂因此藥毒入周身而不續服不知宜於酒製所謂周身覺習習也其後未遇脫疽難以再試惟待將來耳一醫謂伯州散為乳之妙藥其言不虛諸證皆有速驗癌證余亦未試之山脅發明再造散與赤小豆湯二方但二方皆引用漢方而加反鼻非山脅之新製方也再造散為鬱金皂角刺大黃牽牛子反鼻五味之散劑其主治為大風及梅毒久麻等證大風者癩病也麻余亦未試今用於肌膚腐爛者有奇效經久者反有速驗也求真按經久反有速驗者是急性炎證已去移行於慢性故也赤小豆湯為赤小豆商陸麻黃桂枝大黃生薑反鼻八味之煎劑求真按用赤小豆湯不如用麻黃連翹赤小豆湯加反鼻為佳治諸瘡尤其是疥癬內攻之水腫有利水之速效又余在淺田宗伯之門時有一患者其證俗名印金頑癬蔓延全身肢體無餘經治數年不愈云師診之與活血解毒湯加反鼻求真按用活血解毒湯者變則也用葛根加反鼻大黃湯與桂枝茯苓丸之合方或以葛根加大黃湯桂枝茯苓丸之合方兼用伯州散為正則使服之僅五周間而痊愈活血解毒湯者為淺田之家方用於癩病之藥也一女子十二三歲周身發如錢之頑癬兼以頭瘡日久不治上嵨龍衝翁與東洋赤小豆湯有不日痊愈之事又淺田氏治驗錄一男子失心狂走妄語罵詈治後繼發健忘證神志默默終日如木偶人使服反鼻交感丹不日而痊愈本方為茯苓香附子乾薑反鼻四味之煎劑其主治為失心健忘亦為日本之製方而頗有效之藥是別於外科以外之效用也又原南陽之醫事小言痘瘡條云釀膿以反鼻為最古書所不載今加於葛根湯有神驗又治諸惡瘡癰疔兼用伯州散脹陷之效極速因發書於四方友人而報告之非他藥所可及也余亦有二三奇驗其人年二十餘右大腿外側發腫痛請治於中西醫者殆三十日無少效反增苦惱遂求余診其人稟質本虛弱不足加以數日之煩惱而身體大羸瘦見貧血證脈力軟弱且試其患部腿之外側頗漫腫毫無赤色當深底處覺少有流動應於指下求真按流動波動也是將成膿之兆至難證也然不使膿早泄而遷延之恐終陷於危險是以治法催其釀膿外無他策以補益劑托裡消毒散加反鼻使煎服之求真按宜隨證撰方加反鼻或兼用伯州散無托裡消毒散之必要七八日反於目的不成膿而更腫痛其他諸證日漸輕快僅二十餘日而痊愈可謂意外之幸福矣蓋亦反鼻之功也未幾又得一相似之患者一男子年十八性格虛弱腰骨部近橫腹處發漫腫焮熱疼痛諸藥無效經二十日許脈虛數身熱疲勞舌苔微黃食味不進時時惡寒發熱盜汗腫上稍隆起而痛加甚殆將成膿之兆衰弱證而呈此候頗屬危險偶思前例出強壯一方桂耆湯加反鼻求真按宜隨證撰用適方無桂耆湯加反鼻之必要二三日腫痛漸減四五日發熱盜汗亦止漸漸輕快十餘日僅有腫勢耳故去反鼻仍與前方七八日後患者對余云近日毫無消散之效何也余思再加反鼻又四五日順快而愈余從來之用反鼻主以催膿為目的今由此二人之經驗而知有消散腫瘍之效焉去年夏又有一患者年三十餘自右頸部耳下至結喉間焮熱腫痛甚身亦有熱不想其可能消散也與伯州散使不日化膿數日於頸動脈前部之最甚處欲以針破之但先試壓之築動至甚想部位外及膿中無有動脈之理或受頸動脈之波動乎但無論如何必有多少之惡影響是以躊躇下手焉且皮膚少有皺縮是膿氣未充滿也於是再問其經過彼云此前日漸次軟低矣暗想消散亦難測乎與前方使歸而不再來數日後其舅送謝禮來云怖於破針幸不自潰未幾即消散而不遺瘢痕誠幸福也可謂僥幸矣實亦反鼻之功力也爾後凡以消散為目的者無不屢試屢驗大人之腋瘍及小兒之股瘍雖屬輕證然可消散而恐用針者最便利也又便毒未呈赤色者使連用再造散消散後無少有殘害者既起焮赤者有催膿之速效也由求真之經驗橫玄未呈赤色者及已起焮痛者用葛根加大黃湯或大黃牡丹皮湯兼用伯州散時多數不至於化膿而消散故余否認用再造散之必要又皮膚各部糜爛甚者亦有效求真按此證亦可用伯州散也有一婦年三十許右腳發腫痛初受余親友某君治截割後大輕快然其後轉醫且聞苦惱事一日此婦突來乞膏藥且曰曾經數醫治一旦如有效未幾屢復發全治之望已絕且貧困不能繼續治療已多日放置矣然頗不快欲貼附膏藥少免其苦耳且云發病已年餘矣余深憫之詳為診視焮腫已退而自右膝部至髁骨邊殆全腳腐爛浸淫膿瘡泌出臭氣不可當少有疼痛且時搔癢不可忍云余懇切告之曰此證余雖不能知其是何毒性然如是之惡瘡僅洗與貼膏是必無效余有一案曾使服藥有效謝儀可勿憂也使服東洋再造散僅十餘日已有應驗其婦亦云此次乾處之膚色與前日大異而淡薄且甚覺輕快必為痊愈之兆仍服前方不怠不過月餘久時之患苦初覺如忘爾後亦不再發其他經驗雖不少然大概相同故不再贅據以上之經驗與古人諸說考之反鼻效用之結果蓋有起死回生之功誠稀有之良藥也而外科倒之名真不虛矣因是益欲擴充其功用然余未治化學自憾不能盡述且不能詳說之真有隔靴搔癢之感以後之發明窮理是有望於閱者若能深加研究而使完全其功用得救眾人之苦厄實生民之幸福也伯州膏伯州散黃柏末各等分硼酸軟膏適宜上調和為膏藥外用之主治本方余新製之貼用於創傷面及糜爛潰瘍部能現鎮痛止血排膿等作用且促進良性肉芽之新生雄黃散雄黃末克乳糖適宜上分三份一日三回服用主治治毒性蟲蛇等之咬傷有奇效其輕微者外用之亦良腋臭折藥輕粉克爐甘石礬石各克上三味先將礬石爐甘石為末乃合輕粉塗腋下芎黃散一名應鐘散大黃克芎藭克上二味各別為末合為散服法每服克以酒服之不知加至克以下為度又隨病證宜每夕服之主治治轉變不可治者轉變者病證轉變而不可治者也又見一方治瘡及頭上之毒先輩之論說方輿輗本方條曰此方出處不明楊氏家藏方有名芎黃圓者恐即原方也藥品僅二味而大有妙義艮山翁求真按指後藤艮山也大嘆賞此方之組合凡頭痛赤眼痛一切頭面頸部諸毒及下疳便毒膿淋或打撲之類用之無不效或治酒皶鼻鼻痔鼻瘡等此方加百草霜求真按不必加之十錢清酒或美淋酒送下當甚有奇效上部有毒證芎黃散之所主也春林軒丸散便覽曰應鐘散治難治諸證而上衝不大便者此方所謂芎黃散也主治難以確據求真按此主治指前記東洞翁之主治也此方治諸毒上衝而難治求真按此上衝似桂枝之上衝而非也大便不通者方中之大黃必當酒製而用之生用者誤也求真按宜生用不必酒製也承氣丸大黃克芒硝克上二味各別為末糊丸服法如梧桐子大每服克許以枳實克厚朴克煎湯服之即大承氣湯也大黃芒硝為丸是使病者易服也且不僅易服已也則陳久之病亦易解矣主治治腹中有堅塊而大便不通者是大黃硝石丸也又見一方曰治腹滿或燥屎不通者求真按是芒硝與硝石混同也其非已辨於前不可從之先輩之論說德本遺稿曰裡證潮熱秘閉黑苔譫語發熱無寒胸腹滿痛大渴煩躁下利臭穢自汗惡熱凡脈沉數者裡證也如若身厥冷而欲除衣者熱入骨髓也病在裡者無寒時或腹滿按之痛或大便結或下利臭穢或面色如醉譫語發狂舌苔黃黑者是宜順氣丸求真按此即本方也與解毒丸求真按此即黃連解毒丸也和服之三物浮石丸大黃浮石浮石海中之浮石也味鹹者真也不鹹者是火山焦石流出河海也桃仁各等分上三味各別為末糊丸一回克許一日三回服用主治治腹不滿其人言我滿者又治腹中腹中二字當作小腹堅塊膿血者求真按腹中堅塊以下之主治本為浮石丸大黃赤石脂浮石三味等分之主治然亦得為本方之主治故揭之硝石大圓一名夾鐘圓大黃克芒硝克甘草人參各克上四味各別為末以食醋三合先煮大黃減二合納甘草人參更煮如飴狀下火納芒硝攪之為丹用法用量同前主治治腹中結痛心下痞硬者人參大黃丸一名大簇丸大黃克黃芩人參各克上三味各別為末糊丸用法用量同前主治治心下痞硬大便難者鐵砂大黃丸剛鐵砂蕎麥各克大黃克上三味各別為末糊丸用法用量同前主治治發黃短氣者求真按發黃非黃疸是一種貧血也薏苡仁圓大黃克土茯苓克薏苡仁克上三味各別為末蜂蜜為丸用法用量同前主治治小兒頭瘡及胎毒諸瘡大人亦可用之瘡毒楊梅發於頭上及於一身者加輕粉克或克用之數人有奇效又小兒頭瘡胎毒者加輕粉克或克而全治之不可不知平水丸或名蕤賓丸甘遂克芒硝芫花各克商陸克吳茱萸克上五味各別為末糊丸頓服克主治治水腫小便不利胸中煩而喘及下疾者見一方曰治腳氣腫滿不大便者先輩之論說春林軒丸散便覽曰蕤賓丸治腳氣而痛小便不利不大便者此方所謂平水丸專去臍以下水之藥也故陰囊腫或足大腫腰重者皆用之但用此方則必腹痛宜於其先預告之滾痰丸或名南呂丸甘遂克大黃克黃芩青礞石各克燒礞石法以礞石芒硝各等分置於土鍋自下燒之見黃金星為度火力當熾否則效劣今藥鋪稱金礞石者尤良萬病回春稱金星礞石者主治治胸中苦煩痰喘者先輩之論說春林軒丸散便覽曰此方加減所謂滾痰丸之方也求真按指萬病回春之滾痰丸也用姑洗丹時其飲求真按飲謂水毒也雖不劇然凝滯於心下有痞硬之氣味而不痞硬也雖凝滯然無掣痛也唯以凝拒心下而喘咳者為目的控涎丹或名姑洗丹甘遂大戟白芥子各等分上三味各別為末蜂蜜和為丹用法用量同前主治治痰喘胸中不了了或背痛者先輩之論說春林軒丸散便覽曰姑洗丹治有毒在胸膈喜吐涎沫咳唾掣痛者此藥所謂控涎丹亦去胸膈間有毒之藥也其證喘急或胸膈間掣痛或心下硬滿或咽喉如水雞聲吐涎沫如反胃者皆飲所作故此方亦可用於水腫也水氣多集則必發喘故喘者未必皆可主以此方但用此方之證必以吐痰為的則用藥有效也不吐者亦能速吐其痰最易吐痰而喘或咳為的故哮喘亦用之如神丸或名仲呂丸大黃克牽牛子甘遂各克上三味各別為末糊丸用法用量同前主治治腹脹水腫小便不利者先輩之論說春林軒丸散便覽曰仲呂丸治腫滿小便不利不大便腰痛者此方所謂如神丸也用於實腫之脹滿腹部有物二便不通或有腰痛等證者普通水腫多屬實腫腹部有物大便十日不通者用此方下之有功然腹不痛不得已急欲拔其水時先用姑洗腹痛甚用蕤賓或用此方亦佳故婦人轉胞用此方甚佳也五物解毒湯大黃川芎桂枝地黃甘草各克上五味細銼以水四合煮取二合一半一日三回分服一半浸指去甘草川芎加茯苓黃芩桔梗石膏能治口舌腐爛或牙齒疼痛者甚有奇效或云去大黃名六物桂枝湯主治治世俗所謂瘭疽者桃花大黃湯桃花克宜用今年者去年者不宜用之大黃克上二味細銼以水一合煎五勺去滓頓服主治治水氣有停滯小便不利身腫脹者先輩之治驗生生堂治驗曰一男子年五十餘身體浮腫短氣小便不通脈沉有力與桃花加芒硝湯瀉下如傾翌日腫減過半三十餘帖而痊愈求真按桃花加芒硝湯者不過本方之大黃代以芒硝也以是可以推想本方之治效矣一婦人年七十餘患脹滿五年其硬如石彈之有聲如鼓師診之沉緊乃與桃花加芒硝湯下利二十日滿稍平為俗醫所間而停藥五日脹滿如故於是初信師謹服不已五六月許腹皮漸作皺一人年三十餘兩腳以下發紫斑一醫灸下廉等穴兩腳麻木紫斑不退懼而告之乃謂瞑眩也灸火益不止遂不能立延師治之與桃花湯三帖峻瀉數行翌日省之則已病愈出外矣一男子年三十病下血旬餘其人常嗜酒身體尤肥豐師脈之頗有力按其心下悸乃使服桃花湯一帖瀉三五行而瘥求真按甘遂主治瘀血已全化水而凝結於一處也桃花主治未全化水而散漫於全身也此本方之治下血兼肥胖病之理由所以不與甘遂也石膏黃連甘草湯石膏克黃連克甘草克上細銼以水一合五勺去滓頓服主治治心煩大渴者先輩之治驗建殊錄曰一老婦人胸中煩悶短氣而渴且其脊骨自七椎至十一椎痛不可忍眾醫皆以為虛作獨參湯使飲之凡六日無效先生診之作石膏黃連甘草湯使飲之每帖重三十五錢一服盡痛即已出入五十日許痊愈某男年三十許發狂叫喚妄走不避水火醫生皆盡其術救之無效於是聞先生名詳錄證候懇求治方其略曰胸膈煩悶口舌乾燥欲飲水無休時先生乃作石膏黃連甘草湯及滾痰丸贈之服百餘劑而痊愈成績錄某婦人胸中熱如烙發作有時發則如狂貯水以漬胸須臾即覺水暖矣先生診之與石膏黃連甘草湯而愈蓖麻子之醫治效用本草綱目曰蓖麻子氣味甘辛平有小毒主治水癥以水研二十枚服之則吐惡沫加至三十枚三日一服瘥則止又主風虛寒熱身體瘡癢浮腫尸疰惡氣榨取油塗之唐本研敷瘡痍疥癩塗手足心催生大明治瘰癧取子炒熟去皮每臥時嚼服二三枚漸加至十數枚有效宗奭主偏風不遂口眼喎斜頭風耳聾舌脹喉痹齁喘腳氣毒腫丹瘤湯火傷針針入肉女人胎衣不下子腸挺出開通經絡關竅能止諸痛消腫追膿拔毒時珍本草原料不外於蓖麻子油有瀉下作用也明矣然由上說觀之則更兼有刺激誘導殺蟲殺菌作用矣黑胡麻之醫治效用本草備要曰胡麻甘平補肺氣益腎氣潤五藏填精髓堅筋骨明耳目耐饑渴利大小腸逐風濕氣涼血解毒生嚼敷小兒頭瘡麻油滑胎療瘡熬膏多用之涼血止痛生肌皮肉俱黑者勝由上說觀之則本藥為強壯性黏滑藥兼有緩下解毒作用外用之則有消炎治創之能力輕粉之醫治效用本藥不外於格魯兒化水銀故有殺蟲殺菌解凝驅梅作用也明矣牛膝之醫治效用本草備要曰牛膝苦酸而平益肝腎強筋骨治腰膝骨痛足痿筋攣陰痿失溺久瘧下痢傷中少氣生用則散惡血破癥結心腹諸痛淋痛尿血經閉產難喉痹齒痛癰腫惡瘡金瘡傷折以上皆散惡血之功然性下行滑竅夢遺失精及因脾虛下陷腿膝腫痛者禁用由上說觀之則本藥為一種之驅瘀血藥矣土茯苓之醫治效用本草備要曰土茯苓甘淡而平為陽明胃大腸之主藥健脾胃去風濕脾胃健則營衛從風濕除則筋骨利利小便止泄瀉治筋骨拘攣楊梅瘡毒瘰癧瘡腫由上說觀之則本藥為解凝性利尿藥矣水銀之醫治效用本藥有殺蟲殺菌解凝驅梅作用無俟辨矣砒石及綠礬之醫治效用砒石之主成分為砒素綠礬不外於硫酸銅宜就藥物學可知其作用食鹽之醫治效用宜參考藥物學梅肉之醫治效用本藥之作用與烏梅大同小異宜參考之龍葵之醫治效用本草綱目曰龍葵苗氣味苦微甘滑無毒主治食之解勞少睡去虛熱腫唐本治風補益男子元氣婦人敗血蘇頌消熱散血時珍由上說觀之則本藥為一種之強壯性消炎藥矣甘汞及金硫黃之醫治效用二者皆可據藥物學而知其效用唯金硫黃即五硫化安質母尼砒素與之同屬略與安質母尼之硫化物同效異質不可不記反鼻霜之醫治效用由余之經驗本藥為興奮強壯性之溫藥兼有鎮痛鎮痙止瀉止血排膿治創等諸作用應用範圍頗廣然本屬溫藥有炎證助長性於其外表暫置之內臟有急性炎證有舌苔發熱等候必須禁用鼴鼠及鹿角霜之醫治效用此二藥之治效與反鼻霜雖大同然其作用比較的緩弱為小異耳雄黃之醫治效用本草備要曰雄黃辛溫有毒殺百毒辟鬼魅治驚癇痰涎頭痛眩暈暑瘧澼痢泄瀉積聚又能化血為水燥濕殺蟲治勞疳瘡疥蛇傷本藥不外於硫化砒素其作用與砒石雖無大異然較彼則毒性稍微弱為小異而以上記之治效為主者為其殺蟲殺菌作用之歸結也爐甘石之醫治效用本草綱目曰爐甘石氣味甘溫無毒主治止血消腫毒生肌明目去翳退赤收濕除爛與龍腦同點去目中一切諸病時珍由上說觀之則本藥為收斂性消炎藥矣浮石之醫治效用本草備要曰浮石一名海石鹹潤下寒下火色白體輕入肺清其上源肺為水之上源止渴止嗽通淋軟堅除上焦之痰熱消癭瘤結核為水沫日久結成海中者味鹹更良由上說觀之則本藥為一種之消炎性利尿藥矣鐵砂之醫治效用參考藥物學可知蕎麥之醫治效用本草備要曰蕎麥甘寒降氣寬腸治腸胃沉積泄痢帶濁脾胃虛寒人勿服由上說觀之則本藥為冷性緩下藥矣青礞石之醫治效用本草備要曰礞石甘鹹有毒體重沉墜色青入肝製以硝石則為平肝下氣治驚利痰之聖藥氣弱脾虛者禁服由上說觀之則本藥為沉降性利水藥由消化管矣白芥子之醫治效用本草備要曰白芥子辛溫入肺通行經絡發汗散寒溫中開胃利氣豁痰消腫止痛痰行則腫消氣行則痛止治咳嗽反胃麻木腳氣筋骨諸痛久嗽肺虛者禁用由上說觀之則本藥為溫性刺激藥而兼有利尿作用者牽牛子之醫治效用本草備要曰牽牛辛烈有毒屬火善走入肺經瀉氣分之濕熱通下焦之鬱遏及大腸之風秘氣秘利大小便逐水消痰殺蟲墜胎治水腫喘滿痃癖氣塊濕熱在血分者及脾胃虛弱之人禁用由上說觀之則本藥為峻下藥主瀉水兼有利尿作用者桃花之醫治效用本草綱目曰桃花氣味苦平無毒主治殺疰惡鬼令人好顏色本經悅澤人面除水氣破石淋利大小便下三蟲別錄治心腹痛及禿瘡孟詵利宿水痰飲積滯治風狂研末敷頭上肥瘡手足瘍瘡時珍由上說及余之經驗觀之則本藥為峻下劑主以瀉水明矣引用書目此外書籍猶多與本書無重大關係者略之
